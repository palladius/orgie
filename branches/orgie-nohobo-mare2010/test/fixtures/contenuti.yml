  titolo: stellario furioso
  idcontenuto: "1644192597"
  tipo: storie
  idloginpubblicante: "294"
  m_battivo: "1"
  contenuto: "Stellario Furioso\r\n\
    Endecasillabi di ispirazione ariostea dedicati ad un amico.\r\n\
    Canto I\r\n\
    Del prode Stellario, dei Mori suoi nemici, dei suoi travagli e delle sue virt\xC3\xB9 prodigiose\r\n\
    Le donne, i motori, l'ano, gli odori,\r\n\
    lo scoreggiar, gl'audaci imprechi io canto,\r\n\
    che furo al tempo di Stellario, e i Mori\r\n\
    d'Africa, che per l'istrade il nocquer tanto,\r\n\
    sfidando l'ire e i giovenil furori\r\n\
    del nostro Stello, quand'ogni tanto,\r\n\
    fermo ai semaffori de lo centro urbano,\r\n\
    giungea a pulirgli il vetro un africano.\r\n\
    Dir\xC3\xB2 di Stello e 'l suo fetente sgrutto\r\n\
    cosa non detta in prosa mai n\xC3\xA9 in rima:\r\n\
    che per amor \xC3\xA8 il suo duoden contratto\r\n\
    e 'l cul tuonare il fa come Iroscima;\r\n\
    che pel brucior l'istomaco putrefatto\r\n\
    il poco ingegno ad or ad or gli lima;\r\n\
    gliene sia per\xC3\xB2 tanto concesso\r\n\
    che le terga gli basti a posar sul cesso.\r\n\
    Voi sentirete fra i pi\xC3\xB9 degni eroi\r\n\
    che nominar con laude mi apperesto\r\n\
    cantar di Stellario, che di tutti voi,\r\n\
    un d\xC3\xAC senza patente, al guidare fu maestro.\r\n\
    L'alto valore e' grutti e i pirti suoi\r\n\
    vi farei udir, se tal sar\xC3\xACa il mio estro,\r\n\
    ma di narrar le gesta all'altezza sar\xC3\xB2\r\n\
    del prode Stellario e della sua Pegi\xC3\xB2.\r\n\
    Canto II\r\n\
    Di come il prode Stello, recandosi da una donzella, fu sfidato in una giostra, e di come la vinse ricolmo di gloria, e dei ricordi che egli suscit\xC3\xB2 nel suo sfidante\r\n\
    Andava Stellario sul Pegi\xC3\xB2 da una donzella\r\n\
    quand'ecco sulla via spuntare una Mercede:\r\n\
    accanto ad esso si era affiancata quella\r\n\
    ed a semaffor verde gran sgommata diede,\r\n\
    convinto e certo, con la sua macchina bella,\r\n\
    di correre fin quando Stello pi\xC3\xB9 nol vede.\r\n\
    Ed or correvan per una stretta via:\r\n\
    Mercedes dopo e Stellario pr\xC3\xACa.\r\n\
    Ma dur\xC3\xB2 poco del Nostro il primato,\r\n\
    non per debolt\xC3\xA0 o spaventamento,\r\n\
    ma ch\xC3\xA9 avea l'altro il motor truccato,\r\n\
    e il tubo non avea d'iscappamento.\r\n\
    Ma 'l prode Stello, appen fu superato,\r\n\
    con un isgrutto lasci\xC3\xB2 nello sgomento\r\n\
    il suo fellon rivale col Mercede\r\n\
    che si trov\xC3\xB2 con l'auto sul marciapiede.\r\n\
    Vedendo poscia dal retrovisore\r\n\
    che anco il Mercede avea preso un muretto,\r\n\
    grazi\xC3\xB2llo Stellario co' alt\xC3\xACssimo onore:\r\n\
    cos\xC3\xAC dello nero intestino suo retto\r\n\
    ei chiuse lo buco ch'aperto \xC3\xA8 ognore,\r\n\
    ch\xC3\xA9 in tempo s'accorse esser vecchietto\r\n\
    lo suo antagonista cos\xC3\xAC tanto ardito,\r\n\
    e f\xC3\xA9gli soltanto il gesto del dito.\r\n\
    Costui si sovvenne, per lo gesto quello,\r\n\
    quando un meriggio, giovin quand'era,\r\n\
    vide una donna, in chiesa al paesello,\r\n\
    che pia era e bella, chinata in preghiera. \r\n\
    Nel confessionale menando l'augello\r\n\
    scopr\xC3\xACllo il prelato sul far della sera:\r\n\
    \"Che gli venga messo\" ordin\xC3\xB2 al sacrestano\r\n\
    \"per cento e una volta il dito nell'ano!\"\r\n\
    Canto III\r\n\
    Di come Stellario si ristor\xC3\xB2 e di come si macchi\xC3\xB2, tribolato dall'amore, di un orrendo peccato. \r\n\
    Tosto che ebbe sconfitto il vegliardo, \r\n\
    dacch\xC3\xA9 non aveva toccato vivanda \r\n\
    ed anco l'orario digi\xC3\xA0 era tardo, \r\n\
    decise di andare in una locanda, \r\n\
    che oltre a mangiare un buon pasto caldo \r\n\
    dovevasi tosto cambiar la mutanda, \r\n\
    ch\xC3\xA9 essendogli intanto scappata una loffa \r\n\
    il pirto ne aveva sdrucito la stoffa. \r\n\
    Continua....\r\n\
    \r\n\
    Kinta"
contenuti_062: 
  m_bInAttesa: "1"
  datapubblicazione: 
  datacreazione: 2006-01-25 01:39:15
  m_bSerio: "0"
  idlogin: "1849"
  m_nLivelloSegretezza: "5"
  titolo: classificazione delle donne
  idcontenuto: "1795215112"
  tipo: scienza
  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: "Dopo la classificazione degli esseri viventi di Linneo, mancava qualcosa di pi\xC3\xB9 specifico sulle donne. io ve la propongo. Siete d'accordo?  Questa non \xC3\xA8 lunga. E' lunghissima. Ma ne vale la pena di leggerla tutta.\r\n\
    \r\n\
    \r\n\
    La Fighetta:\r\n\
    \r\n\
    La categoria delle fighette, \xC3\xA8 composta essenzialmente da ragazze, in genere giovani (17-21 anni), che se la portano a spasso ridendo e scherzando con uno stuolo di amiche, in genere fighette anch'esse. La fighetta non si caratterizza per una particolare bellezza: essa semplicemente \xC3\xA8 un tipo che sembra disponibile, da come si comporta, salvo poi rivelare un carattere da vera rompicoglioni nel momento in cui l'approccio diviene piu esplicito...\r\n\
    \r\n\
    La Gnocca:\r\n\
    \r\n\
    La classe delle Gnocche \xC3\xA8 composta da elementi di sesso femminile con elevato grado di attrazione. Caratatterizzata di solito da forme assai piacevoli, \xC3\xA8 solita vestirsi in modo vistoso, gradevole e si distingue per i suoi modi sensuali e spigliati. Caratteristica fondamentale della gnocca \xC3\xA8 il tirarsela quel tanto che serve per fare passare la voglia, ai comuni mortali non dotati di conto corrente a 10 cifre, di tentare un approccio, adducendo la solita frase \"Naaa...se la tira troppo...\"\r\n\
    \r\n\
    La Cozza:\r\n\
    \r\n\
    Estremamente diffusa, la categoria delle cozze \xC3\xA8 composta da esemplari di sesso (forse) femminile che poco hanno di umano e molto di celenterato...\r\n\
    La cozza ha peso variabile, non necessariamente eccessivo, ma in caso di peso \"normale\", l'assenza di grasso non ne pregiudica l'appartenenza alla classe, dato che normalmente le sue forme assomigliano piu a quelle di un coccodrillo che di una donna. Non di rado, la cozza, pur di darsi un tono, se la tira come e piu della Gnocca, ottenendo come risultato una progressiva migrazione verso la categoria delle Brutte Zitelle Scassacazzi.\r\n\
    \r\n\
    La Figa Standard:\r\n\
    \r\n\
    Categoria molto apprezzata, quella delle fighe standard \xC3\xA8 una famiglia di medio-bassa diffusione, composta essenzialmente da esemplari con alcune caratteristiche peculiari (o belle tette o bel culo, o altro..), ma in ogni caso di aspetto piacevole, discreta disponibilita al dialogo e grande versatilita morale. \r\n\
    La Figa Standard si accompagna spesso ad una o piu Cozze, con le quali intrattiene rapporti di amicizia profonda, certa dell'assoluta impossibilita di una qualsiasi forma di concorrenza sessuale da parte delle amiche. Il difetto fondamentale della Figa Standard \xC3\xA8 una sua rapida declassificazione a Donna Elastico, non appena si rende conto della reale attrazione suscitata negli uomini. Questo ne rende pericolosa la frequentazione per lunghi periodi di tempo.\r\n\
    \r\n\
    \r\n\
    La Figa Pazzesca:\r\n\
    \r\n\
    Rarissima specie di donna, caratterizzata da un aspetto da far sbavare, curve perfette, sorriso ammaliante e abbigliamento preciso, la Figa Pazzesca \xC3\xA8 una delle prede piu ambite in ogni ambiente. La Figa Pazzesca \xC3\xA8 dotata in genere di una notevole simpatia, ma spesso anche di scarsa intelligenza, che la porta a volte ad infilarsi in storie assurde con personaggi maschili che, pur di tenersela stretta, depauperano tutte le loro risorse economiche nell'attivita di correlazione: aperitivi, cenette, locali notturni e, in non rari casi, droga. La Figa pazzesca \xC3\xA8, e rimane, un \"cult\" per ogni uomo che sia in grado di superare l'iniziale momento di euforia dato dalla conquista dell'esemplare.\r\n\
    \r\n\
    La Donna Elastico:\r\n\
    \r\n\
    La Donna elastico \xC3\xA8 una delle specie piu diffuse. Famiglia composta sia da esemplari nativi che da ex esemplari di Figa standard, la Donna elastico vive la propria esistenza tra N frequentazioni maschili, saltando da una all'altra con la stessa facilita con cui si cambia di abito. Generalmente dotata di scarso senso dell'autocritica, la Donna elastico \xC3\xA8 convinta che in ogni caso il suo comportamento sia corretto, anche se contrario a qualunque morale, persino la propria. Viene detta Donna elastico per la sua flessibilita nei rapporti interpersonali: essa non predilige una particolare persona, ma si deforma secondo le esigenze del momento, mantenendo al proprio interno una fortissima componente di cinismo. Caratteristica intrinseca della Donna elastico, \xC3\xA8 la sua capacit\xC3\xA0 di circuire gli uomini, facendogli credere di fare parte della famiglia delle Fighette o delle Fighe standard, per poi dimostrare, con il tempo di essere molto piu affine alla categoria delle Troie, rendendosi pertanto moolto pericolosa.\r\n\
    \r\n\
    La Brutta Zitella Scassacazzo:\r\n\
    \r\n\
    Terribile esempio di come un essere umano possa degenerare, le Brutte zitelle scassacazzo sono una vera e propria mina vagante. Generalmente orribili, questi esseri circolano liberamente con tutto il loro pesante carico di odio e invidia verso tutti gli altri generi femminili, con la sola esclusione delle Cozze, con le quali intrattengono spesso rapporti di pettegolezzo. Spesso la Brutta zitella scassacazzi \xC3\xA8 accompagnata dalla madre o dalla nonna, la quale fa opera di carita al mondo, sottraendole tempo che altrimenti sarebbe destinato alla devastazione dei rapporti altrui. Purtroppo, per\xC3\xB2, le appartenenti a questa famiglia hanno in genere una predisposizione naturale al disbrigo rapido di tutte le faccende e lavori che altri esemplari eseguono in tempi standard, rendendo quindi difficile la loro alienazione da troppo lavoro. Non sono rari i casi in cui la Brutta zitella scassacazzi, data la sua cronica inapplicazione sessuale, perde la testa per qualche esemplare maschile, subendo una temporanea trasformazione che la riporta alla famiglia delle cozze, dalla quale passa spesso alla famiglia delle Maialone orrende senza ritegno. Tali transizioni sono generalmente temporanee, tranne in rari casi in cui l'esemplare migra definitivamente all'ultima categoria e ci resta fino alla vecchiaia.\r\n\
    \r\n\
    \r\n\
    La Donna in Carriera:\r\n\
    \r\n\
    La classe delle Donne in carriera sta avendo grandissima diffusione negli ultimi anni. Questa categoria \xC3\xA8 sostanzialmente composta da donne provenienti da altre categorie, delle quali mantengono parte delle caratteristiche, aggiungendone di nuove che in alcuni casi si rivelano deleterie. Una di queste nuove  \xC3\xA8 l'atteggiamento: \"sotuttoioperchemifaccioilculoinufficioenonvogliosentirecazzateperchesonostanca!\".\r\n\
    Derivata di questo atteggiamento e il cosiddetto \"stress da troppi cazzi\", inteso sia in senso morale che materiale. Non di rado, infatti, pur di accedere alla categoria, le donne si prestano a innumerevoli compromessi, ivi compresi quelli di natura sessuale. La febbre da carriera le costringe quindi, per mantenere il corretto \"career improvement path\", a costanti sessioni di seduzione sul luogo di lavoro, con notevole dispendio delle proprie risorse umane.\r\n\
    Questo si riflette in modo moolto negativo sull'eventuale partner maschile, il quale, giustamente, dopo alcuni mesi di tolleranza all'assenza di un normale equilibrio nella psiche della compagna, inizia a farsi un pochetto i cazzi propri, mollando, come si suol dire, la presa per dedicarsi ad una piu sana attivita da scapolone. La donna in questione, resasi conto di tutto cio, in alcuni casi ritorna nella categoria di provenienza, ma di solito accede alla categoria delle Zitelle lavoratrici croniche \r\n\
    \r\n\
    \r\n\
    La Troia:\r\n\
    \r\n\
    Come da definizione, la Troia \xC3\xA8 colei la quale, pur di divertirsi, passa sopra a qualunque principio, morale o materiale. Naturalmente portata ai rapporti interpersonali, la Troia predilige spaziare in ambienti ad elevata concentrazione economica. In molti casi la Troia \xC3\xA8 di aspetto gradevole, ed e dotata di una notevole attrattivita. Essa \xC3\xA8 inoltre fornita di alcune capacita previsionali che hanno dell'incredibile: la Troia riesce, in moltissimi casi e con una semplice occhiata, ad intuire di qualsiasi uomo i seguenti dati: numero di conti correnti intestati, automobili possedute, fido della carta di credito, contanti posseduti nel portafoglio. Grazie a questa caratteristica, la Troia riesce ad approcciare qualunque uomo, sposato, fidanzato o libero, offrendo in modo piu o meno evidente i propri favori sessuali ed iniziando una costante opera di drenaggio di capitali, adottando la tecnica dello scambio 10minutidisesso-regalinodaalmeno300sacchi. Caratteristica distintiva della Troia \xC3\xA8 una normale predilezione per tutti quei generi di abbigliamento che coniugano l'alta sensualit\xC3\xA0 con la praticita di svestizione. Altra caratteristica importante del loro vestiario, \xC3\xA8 la estrema capacita di trattenere ogni  sorta di fluido organico maschile, in modo da poter utilizzare l'abito come arma di ricatto..\r\n\
    \r\n\
    La Suora:\r\n\
    \r\n\
    Nella categoria delle suore, rientrano tutte quelle gentili signorine che, nonostante la loro disponibilita al divertimento e alla vita notturna, manifestano una presumibilmente totale amenit\xC3\xA0 ai piaceri della carne. Un comportamento tipico delle suore \xC3\xA8 il presentarsi come gentili, affabili, disponibili e soprattutto libere da ogni vincolo, suscitando una legittima curiosit\xC3\xA0 negli esemplari maschili che frequentano, dato che molto spesso gli esemplari appartenenti alla famiglia in oggetto sono discretamente attraenti. Il problema \xC3\xA8 che, \r\n\
    come lascia intuire il nome della famiglia, le suore sono specializzate nel portare, pi\xC3\xB9 o meno volontariamente, gli uomini ad interessarsi sessualmente a loro, per poi opporre un secco rifiuto a qualunque genere di proposta anche solo blandamente erotica. Frase tipica delle suore \xC3\xA8:\"Ma per chi mi hai presa? Per una che la da a tutti quelli che incontra?\". La frase, riferita al contesto \xC3\xA8 in effetti oggettivamente corretta, in quanto la suora, per definizione di classe, non la da assolutamente a nessuno. Questo la porta spesso ad uno stato di eccezionale depressione (una donna senza cazzo si sciupa), che viene solitamente superato praticando delle feroci sedute di autoerotismo. Come risultato di questo comportamento, la Suora tende con il tempo a migrare verso altre famiglie, soprattutto verso la famiglia delle Acidone, a volte in quella delle Zitelle lavoratrici croniche oppure, in alcuni rari casi, per compensazione di una vita di privazioni, nella categoria delle Ninfomani insaziabili.\r\n\
    \r\n\
    La Maialona Orrenda Senza Ritegno (MOSR):\r\n\
    \r\n\
    A questa famiglia appartengono tutti quegli esemplari femminili che, non disponendo di caratteristiche attrattive sufficienti ad attirare l'attenzione autonoma degli uomini, ricorrono al vecchio trucco di \"sbatterla in faccia a tutti quelli che le capitano\". Riconoscibili per l'abbigliamento succinto, dal quale si evidenzia a colpo d'occhio la trabordanza della massa grassa, le MOSR o sono spesso dedite al bere, nonche alla frequentazione di tutti quei luoghi di aggregazione dove abbondano degli esemplari maschili in astinenza forzata. In alcuni casi, pero, le MOSR , si rivelano utili: capita infatti che qualche esemplare maschile, uscente da una relazione con un esemplare di donna elastico o di fighetta o ancora di donna in carriera, frustrato dalla momentanea situazione di abbandono, trovi rifugio nelle attenzioni di una qualche MOSR . Questo avviene perche spesso, le MOSR, sono esperte in una qualche pratica erotica inusuale. Questo stimola la curiosita del maschio, il quale, dopo un breve periodo trascorso a farsi sollazzare dalla zozzona, la abbandona al suo destino per ricominciare a dedicarsi a prede piu ambiziose.\r\n\
    \r\n\
    La Zitella Lavoratrice Cronica (Z.L.C.):\r\n\
    \r\n\
    Questa famiglia \xC3\xA8 strettamente legata alla famiglia delle donne in carriera. In effetti si potrebbe definire come una sottospecie della donna in carriera, dato che normalmente l'atteggiamento e lo stesso, tranne che per alcune caratteristiche che ci permettono di distinguere una classe dall'altra. La ZLC, infatti, ha perso il fondamentale interesse alla prosecuzione della carriera, in quanto ha spesso ottenuto uno stop forzato alla crescita professionale causato da un qualche errore di percorso. Ad esempio: capita che una donna in carriera, nello svolgimento delle sue funzioni, cerchi di sedurre l'uomo di una qualche altra donna in carriera pi\xC3\xB9 in alto di lei nella scala gerarchica. Questo porta la donna in carriera di rango pi\xC3\xB9 elevato a tramutarsi istantaneamente in femmina vendicativa, scatenando tutte le armi a sua disposizione per frenare l'avanzata della concorrente. La poveretta (si fa per dire) si trova a questo punto sputtanata in tutto l'ufficio e, vuoi per la vergogna o per costrizione, si rifugia nello stakanovismo piu feroce. Questo la costringe ad abbandonare ogni velleit\xC3\xA0, sia in ambito professionale che privato, lasciandola dedita solo ed esclusivamente al lavoro. Le ZLC possono provenire  che da altre categorie, ma difficilmente escono dalla loro condizione per mutare di classe.\r\n\
    \r\n\
    \r\n\
    La Ninfomane Insaziabile:\r\n\
    \r\n\
    Come il nome lascia intuire, la ninfomane insaziabile \xC3\xA8 quel tipo di ragazza, bella o brutta, che non puo fare a meno di un pene per pi\xC3\xB9 di sei/otto ore. La fame di sesso di queste donne \xC3\xA8 incredibile: esse sono addirittura disposte a raccattare i lavavetri agli angoli delle strade, pur di farsi infilare, anche se ovviamente preferiscono frequentare altri generi di esemplari maschili. In alcuni casi davvero eccezionali, la ninfomane insaziabile presenta anche le caratteristiche esteriori della figa pazzesca. In tal caso si  parla di Pornodonna. La ninfomane insaziabile e una preda discretamente ambita, pur presentando lo svantaggio di non essere assolutamente affidabile dal punto di vista psicologico.. Chiunque si sposasse con una  Ninfomane insaziabile avrebbe la virtuale certezza di essere cornuto gia all'inizio del banchetto di nozze.\r\n\
    \r\n\
    La Acidona:\r\n\
    \r\n\
    La famiglia delle acidone comprende tutti quegli esemplari che, per un motivo o per l'altro, non sono in grado di passare una serata in compagnia senza scazzare con qualcuno del gruppo. Caratteristica dell'Acidona, \xC3\xA8 la sua capacita di criticare qualunque frase le venga rivolta come se fosse un insulto nei suoi riguardi. Ad un classico \"Ciao, come stai?\", l'Acidona risponde quasi immancabilmente \"Che ti frega? Fatti i cazzi tuoi!\". Da questo comportamento ne deriva un generale disprezzo nei suoi riguardi, che la porta negli anni\r\n\
    ad inacidirsi sempre di piu, fino a sfociare nella categoria delle Isteriche \r\n\
    \r\n\
    \r\n\
    La Tipa:\r\n\
    \r\n\
    Probabilmente la categoria piu diffusa. Le tipe sono tutte quelle che si incontrano normalmente ad una festa, che ti chiedono se gli fai accendere, se gli cambi le mille lire, se gli reggi la borsa, ma con le quali non si intrattengono discorsi che durino piu di 30 minuti (a dire tanto). In generale la Tipa si presenta come un esemplare femminile normale, salvo poi presentare caratteristiche che ne permettono una migliore classificazione in una delle seguenti sottofamiglie: Tipa che la da, Tipa che non la da, Tipa che la darebbe ma ha il tipo, Tipa che te la faresti se non ci fosse la tua Tipa, Tipa che te la fai facendole credere che sei chissacchi e poi non la accompagni neanche a casa \r\n\
    \r\n\
    Il Puttanone:\r\n\
    \r\n\
    Il puttanone \xC3\xA8 una curiosa deviazione della tipologia Troia. Di norma, una Troia resta semplicemente Troia, e vive la sua troiaggine piu o meno coerentemente. In alcuni casi, si verifica qualcosa che porta la Troia a riconsiderare la propria condizione e, in una botta di moralismo incredibile, decide di non dedicarsi piu al drenaggio di capitali. Il fatto \xC3\xA8 che essa, ormai, \xC3\xA8 abituata a saltare da un membro all'altro con agilita. Questo desiderio di uscire dal proprio schema classico \"la do se cacci la lira\", la porta ad intraprendere un cammino dove il bisogno di purgare la propria anima dall'istinto meretricio le impone di fornire favori sessuali senza richiedere nulla in cambio. Come risultato, Il Puttanone, scopa con le stesse modalit\xC3\xA0 della Troia, ma non chiede nulla in cambio, se non il mero appagamento sessuale. In questo dimostra un atteggiamento simile alla Ninfomane insaziabile, anche se il ritmo erotico \xC3\xA8 decisamente piu basso. Nel caso della Ninfomane insaziabile si tratta di bisogno fisico di cazzi, mentre il puttanone e piu che altro spinto  dalla scelta personale di essere disponibile ad ogni uomo.\r\n\
    \r\n\
    La Pornodonna:\r\n\
    \r\n\
    Definire la Pornodonna equivale ad una solenne descrizione di uno dei desideri pi\xC3\xB9 osceni di molti maschi: una donna splendida, simpatica e soprattutto assetata di sesso piu di qualunque altra cosa. Chiaramente un esemplare del genere, puo avere il suo campo di applicazione per un periodo massimo di 10 giorni...seguire il ritmo di una Pornodonna \xC3\xA8 pressocch\xC3\xA8 impossibile gi\xC3\xA0 se si \xC3\xA8 dei ricconi nullafacenti, figurarsi se in pi\xC3\xB9 si \xC3\xA8 tenuti al lavoro...  Una pornodonna rappresenta quindi un'impresa, nel vero senso del termine...ella si prester\xC3\xA0 a qualsiasi tipo di rapporto sessuale, in qualsiasi momento e in qualunque situazione; permetter\xC3\xA0 all'uomo di turno di passeggiare amabilmente abbracciato ad una ragazza splendida, abbandonandosi alla sacrosanta bastardaggine data dal poter comunicare a sguardi ai propri amici il famoso: \"Guardate un po' chi mi scopo io...\". Tale sensazione, per\xC3\xB2, \xC3\xA8 destinata a durare poco, dato che la Pornodonna in questione non mancher\xC3\xA0 di tenere gli occhi aperti...ed in capo a poco piu di un mese...tutti gli amici del gruppo avranno ottenuto lo stesso trattamento dalla suddetta, e gli sguardi saranno molto meno fieri....\r\n\
    \r\n\
    L'Isterica:\r\n\
    \r\n\
    Definire l'isterica corrisponde a dare uno sguardo un po' a tutte le donne...tuttavia ci sono alcuni esemplari che fanno dello sclero la propria ragione di vita: L'isterica non si proccupa minimamente della situazione, del momento, delle persone con cui ha a che fare, e si lascia generosamente andare a degli scatti di ira furiosa che in non rari casi sfociano in un vero e proprio attacco di violenza gratuita.. Il problema \xC3\xA8 che queste poverette, non si rendono conto del fatto che la pazienza umana ha un limite, quindi, giunte all'ennesimo scazzo feroce, quando cercano per l'ennesima volta di schiaffeggiare il povero cristo di turno, perdono i sensi e si risvegliano doloranti con il tatuaggio della mano di lui sulla faccia... Di solito, a questo punto, cercano di  rimediare con l'ennesima botta isterica, questa volta dominata dal pianto furioso...in soli 5 secondi, la faccia della sciagurata sembra flagellata da un monsone, con litri e litri di lacrime che si riversano al suolo, mentre dalla bocca le fuoriescono degli strani mugolii assolutamente incomprensibili. Questi momenti sono estremamente delicati: MAI COMUNICARE L'INCAPACITA' DI COMPRENDERE CIO' CHE LA MATTA DICE!! Il rischio minore \xC3\xA8 quello di riportarla allo stadio immediatamente precedente al pianto, ossia quando pretende di mandarvi al tappeto, quello maggiore e di ritrovarvi effettivamente al tappeto vittime di una feroce ginocchiata nelle parti basse. \r\n\
    \r\n"
