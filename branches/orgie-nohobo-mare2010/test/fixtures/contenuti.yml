  tipo: cazzate
  idloginpubblicante: "3"
  m_battivo: "1"
  contenuto: "La Peteide\r\n\
    poemetto di autore ignoto \r\n\
    Molti scrittori inneggiano\r\n\
    al gusto del cacare,\r\n\
    io credo sia pi\xC3\xB9 nobile\r\n\
    il peto encomiare.\r\n\
    Perch\xC3\xA9 son molti e varii\r\n\
    i modi di tal bene:\r\n\
    \xC3\xA8 la natura provvida\r\n\
    da cui quel ben s'ottiene.\r\n\
    Dal ventre ch'\xC3\xA8 aggravato,\r\n\
    ne togli il triste flato,\r\n\
    e senza sbottonarti,\r\n\
    il peto puoi scacciar!\r\n\
    Del peto, or che ne f\xC3\xB2?\r\n\
    L'esame ne far\xC3\xB2:\r\n\
    v\xC3\xA8 il peto affievolito\r\n\
    che dicesi vestito,\r\n\
    v'\xC3\xA8 il peto ch'esce solo\r\n\
    e nasce dal fagiolo,\r\n\
    che a lungo il suono avanza\r\n\
    l'acuta sua fragranza!\r\n\
    V'\xC3\xA8 il peto brontolone\r\n\
    che vien dal peperone,\r\n\
    v'\xC3\xA8 il peto che spessissimo\r\n\
    sen va alla chetichella,\r\n\
    e figlio \xC3\xA8, semplicissimo,\r\n\
    di gialla farinella.\r\n\
    E allora lo precedono,\r\n\
    e quasi avvien di sera,\r\n\
    le due sorelle eccentriche:\r\n\
    la loffa e la lumera.\r\n\
    Ma il peto salutifero\r\n\
    secondo me, e non sbaglio,\r\n\
    \xC3\xA8 quello che si genera\r\n\
    nell'olio cotto all'aglio.\r\n\
    Amici, dunque, unitevi\r\n\
    meco, e gridate lieti:\r\n\
    abbiano lode e vivano\r\n\
    gli svariati peti!!\r\n\
    \r\n\
    Kinta"
