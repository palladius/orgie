    E' previsto anche un esame di \"lingua\". Per superare occorre sostenere una prova scritta ed una \"orale\". La III Universit\xC3\xA0 favorisce gli scambi universitari con l' estero attraverso un organo (non sempre rigido) che \xC3\xA8 il programma ORGASMUS. Per i pi\xC3\xB9 \"dotati\" sono state messe a disposizione \"borse di stupro\". \r\n \r\n"
