  titolo: LEGGENDE UNIVERSITARIE 3:altro che leggenda....
  idcontenuto: "484936892"
  tipo: altro
  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: "Di tutte le leggende su professori arrapati, nessuna raggiunge i livelli dei fatti a cui ha dovuto assistere la facolt\xC3\xA0 di Giurisprudenza dell'universit\xC3\xA0 di Camerino per un ventennio....\r\n\
    il geniale prof. Capizzano, ordinario di diritto commerciale, il quale aveva porci incontri con svariate studentesse, con tanto di filmino....\r\n\
    si narra che questo grandioso uomo (mito ed esempio per tutti gli studenti) sia caduto da un albero di pero, e poi portato d'urgenza all'ospedale con la sua compagna, mentre tentava quello che in gergo si chiama \"sport estremo\".\r\n\
    un'altra volta pare che sia rimasto incastrato in una studentessa al 1\xC2\xB0 fuoricorso.....\r\n\
    solo il perbenismo sodato del mondo d'oggi (e la legge) ha messo fuori uso questa macchina scopante....\r\n\
    vai Capizzano, segna per noi!"
contenuti_073: 
  m_bInAttesa: "1"
  datapubblicazione: 
  datacreazione: 2006-05-15 22:55:51
  m_bSerio: "0"
  idlogin: "2887"
  m_nLivelloSegretezza: "5"
  titolo: Regolamento per donne durante i mondiali
  idcontenuto: "1261929377"
  tipo: altro
  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: "CAMPIONATI DEL MONDO DI CALCIO\r\n\
    GERMANIA  9 GIUGNO \xE2\x80\x93 9 Luglio  2006\r\n\
    \r\n\
    REGOLAMENTO (da appendere in cucina)\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    Cara Moglie / compagna / fidanzata\r\n\
    \r\n\
    dal 9 giugno al 9 luglio 2006 si svolgeranno i Campionati del Mondo di Calcio. \r\n\
    \r\n\
    Qui di seguito ti invio le regole da seguire scrupolosamente per tutta la durata degli stessi.\r\n\
    \r\n\
    IMPARATELO A MEMORIA !!!!!!!!!!!\r\n\
    \r\n\
    1. Ti consiglio di leggere quotidianamente la Gazzetta dello Sport. In questo caso sarai sempre aggiornata su quello che sta succedendo al Campionato del Mondo ed avrai degli argomenti di discussione con i quali dialogare con me. Se non lo farai, sono CAZZI TUOI e non ti lamentare se non avremo nulla da dirci.\r\n\
    \r\n\
    2. Durante i Campionati del Mondo la televisione sar\xC3\xA0 mia e solo mia (a tutte le ore) e se ti capitasse di venire in possesso del telecomando, anche solo per pochi secondi, il consiglio che ti do \xC3\xA8 quello di non cambiare mai canale.\r\n\
    \r\n\
    3. Se sarai costretta a passare davanti alla TV durante una qualsiasi partita, sei pregata di farlo strisciando sul pavimento e senza disturbarmi.Se ti balenasse l\xE2\x80\x99idea di passare davanti all Tv in perizoma o, peggio, completamente nuda, con l\xE2\x80\x99idea di farti scopare, lascia perdere e  vedi che questo tuo comportamento non ti porti a prendere l\xE2\x80\x99influenza. Non ho assolutamente intenzione di perdere tempo nel doverti curare.\r\n\
    \r\n\
    4. Durante tutte le partite, io per te sar\xC3\xB2 cieco, sordo e muto fino a quando non avessi bisogno di chiederti qualche cosa da bere o da mangiare. Sei fuori di testa se pensi che io sia a tua disposizione per qualsivoglia richiesta..(non aprir\xC3\xB2 la porta, non risponder\xC3\xB2 al telefono, non terr\xC3\xB2 a bada il bambino che sta piangendo).\r\n\
    \r\n\
    5. Sarebbe opportuno che nel frigo non mancassero mai delle lattine di birra ghiacciata e qualche cosa da sgranocchiarci assieme. \r\n\
    \r\n\
    6.Per favore non fare mai battute simpatiche o faccie strane quando i miei amici sono a casa nostra a guardare le partite, saresti patetica. Come premio per il tuo buon comportamento, sarai autorizzata a guardare la TV nei pochissimi momenti in cui non si parler\xC3\xA0 di calcio.\r\n\
    \r\n\
    7. Per favore, ti prego, se l\xE2\x80\x99 Italia dovesse perdere qulche partita, non venirmi mai a dire\xE2\x80\x9DNON TE LA PRENDERE E\xE2\x80\x99 SOLO UN GIOCO\xE2\x80\x9D, o , \xE2\x80\x9CVINCEREMO LA PROSSIMA VOLTA\xE2\x80\x9D. Se mi dirai queste cose mi farai incazzare ancora di pi\xC3\xB9 ed io  ti amer\xC3\xB2 di meno\r\n\
    \r\n\
    8. Sarai pi\xC3\xB9 che benvenuta qualora tu decidessi di guardare  una partita assieme a me. Fai attenzione ho detto una partita. Non prendere i Campionati del Mondo come pretesto per passare pi\xC3\xB9 tempo assieme.\r\n\
    \r\n\
    9. I REPLAY dei goals sono molto molto importanti. Non  me ne frega niente se l\xE2\x80\x99 ho visto o non  l\xE2\x80\x99ho visto , voglio rivederli , anche mille volte..\r\n\
    \r\n\
    10. Di alle tue amiche di NON PARTORIRE, , di non organizzare eventi dove \xC3\xA8 richiesta la mia presenza. Io per te avr\xC3\xB2 solo tre risposte.\r\n\
    a) Non ci vengo,\r\n\
    b) Non ci sono, \r\n\
    c) Non rompere i coglioni\r\n\
    \r\n\
    11. ATTENZIONE, se qualche amico ci inviter\xC3\xA0 a vedere la partita a casa loro, devi essere pronta all\xE2\x80\x99orario stabilito. Non saranno tollerati ritardi. In tal caso verrai a piedi\r\n\
    \r\n\
    12. Le trasmissioni sportive durante il Mondiale sono importanti tanto quanto il mondiale stesso. Non voglio mai sentirti dire \xE2\x80\x9C MA L\xE2\x80\x99ABBIAMO GIA\xE2\x80\x99 VISTO QUESTO\xE2\x80\x9D o \xE2\x80\x9CNON POSSIAMO VEDERE QUALCHE COSA D\xE2\x80\x99ALTRO ??\xE2\x80\x9D perch\xC3\xA8 la risposta sar\xC3\xA0 sempre la stessa (leggi punto 2):\r\n\
    \r\n\
    13. Per finire, evita pure l\xE2\x80\x99espressione \xE2\x80\x9C GRAZIE A DIO IL MONDIALE E\xE2\x80\x99 OGNI 4 ANNI\xE2\x80\x9D. Io sono immune da questa espressione, perche non ti scordare che dopo i mondiali c\xE2\x80\x99\xC3\xA8 il CALCIOMERCATO, I PRELIMINARI DI CHAMPIONS LEAGUE, IL CAMPIONATO e LA COPPA ITALIA.\r\n"
