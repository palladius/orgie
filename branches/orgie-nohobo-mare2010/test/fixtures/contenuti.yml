  contenuto: |
    1) Un carabiniere: "Mi sono comprato un gommone". "Perche' hai molto da cancellare?" 
    
    2) In Sicilia la Centrale dei carabinieri manda un messaggio a tutte le auto: "Controllare tutte le auto che vanno a Marsala". Al posto di blocco i carabinieri controllano: "Passi pure, anche questa va a benzina!".
    
    3) .Il carabiniere (in borghese) alla fermata dell'autobus col sacchetto con le mele. Un tizio: "Scusi, passa di qui il 19?"Il caramba: "Il 19.. il 19... mah! Dovrei essere a Roma!"
    
    4) Carabiniere in attesa in sala parto. Nasce un negretto. L'infermiera: "E' suo?". "Puo' darsi, mia moglie brucia sempre tutto!".
    
    5) Carabiniere in negozio : vorrei un portafoglio impermeabile. "Perche' ?" "Per metterci il denaro liquido!". 
    
    6) Carabinieri: "Brigadiere, sua moglie ha rischiato di annegare! Ha bisogno della respirazione artificiale". "No no, ho i soldi! Voglio la respirazione vera!".
    
    7) Carabinieri: "Appuntato, accendete la luce!". Tic tac tic tac tic tac ... "Ma che sta facendo?". "C'e' scritto 220 volt!".
    
    8) Che differenza c'e' fra un carabiniere e una bottiglia di birra? Nessuna: sono vuoti entrambi dal collo in su.
    
    9) .Incendio alla biblioteca della caserma dei carabinieri: salvati entrambi i libri. 
    
    10 Un carabiniere siciliano entra in una pasticceria di Milano: "Vorrei una colomba". "Motta?". "E che viva me la vuole dare?!".
    
    
    11) Un carabiniere al capitano mentre sta leggendo il giornale: "Capitano, e' morto Tusi!". "Ma no e' impossibile: e' in ferie!". "Ma e' scritto sul giornale: Incidente d'auto: morti 3, 4 con...tusi!". 
    
    12) Una talpa danneggia la caserma dei carabinieri che decidono di ucciderla. Ma come? Si riuniscono i capi che alla fine sentenziano: "Seppellitela viva!".
    
    13) Perche' la carta igienica usata dai carabinieri e' due volte piu' lunga? Perche' la prima meta' e' occupata dalle istruzioni.
     
    14) Posto di blocco dei carabinieri: "Alt! Documenti". "Digos". E il carabiniere: "Los documentos, por favor!". 
    
    
    
    
    
    

