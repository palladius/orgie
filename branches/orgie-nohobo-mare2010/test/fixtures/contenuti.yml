  contenuto: "Codex Iuris Goliardici Romani\r\n\
    \r\n \r\n\
    \r\n \r\n\
    \r\n\
    CODEX JURIS GOLIARDICI\r\n\
    Romani \r\n  \r\n\
    \r\n  \r\n\
    \r\n\
    Prima edizione a cura di Franciscus I\xC2\xB0 R.P.M. \r\n\
    \r\n\
    (Franco Maria Quadro) \r\n\
    \r\n\
    Roma, 1945 \r\n\
    \r\n  \r\n\
    \r\n\
    Seconda edizione a cura di Amedeus I\xC2\xB0 R.P.M. \r\n\
    \r\n\
    Roma, 1963 Mario Bulzoni Editore \r\n\
    \r\n\
    Libreria Ricerche, Roma - DCLXI ab Studio Urbis Condito \r\n\
    \r\n  \r\n\
    \r\n\
    (Testo riprodotto dall'originale della 2 edizione) \r\n\
    \r\n  \r\n\
    \r\n  \r\n\
    \r\n\
    DUE RIGHE DELL'EDITORE \r\n  \r\n\
    \r\n\
    Con piacere stampo la presente edizione, riveduta e aggiornata, del \"Codex Juris Goliardici\", sicuro di fare cosa gradita ai giovani perch\xC3\xA9 possano meglio comprendere lo spirito della Goliardia e agli anziani affinch\xC3\xA9 ricordino con nostalgia i bei tempi spensierati in cui regnavano \"Bacco, Tabacco e Venere\".  \r\n\
    \r\n\
    Era mia intenzione ristamparlo cos\xC3\xAC com'era nella sua prima edizione, che risale al lontano 1945 - anno in cui pontificava il suo autore Franco Maria Quadro - senonch\xC3\xA9 in questi giorni mi sono giunti gli ultimi emendamenti. \r\n\
    \r\n\
    Intendo con ci\xC3\xB2 rendere omaggio all'autore della prima edizione e all'attuale Pontefice - Amedeus I - che saggiamente ha proceduto al rifacimento del \"Codex\" secondo lo spirito dei giovani d'oggi.  \r\n\
    \r\n\
    Mi \xC3\xA8 ancora una volta gradito l'incontro con le \"colonne\" del nostro glorioso Ateneo.  \r\n\
    \r\n \r\n Mario Bulzoni \r\n   \r\n\
    \r\n  \r\n\
    GOLIARDIA \r\n\
    Le accuse nei confronti della goliardia sono, qui a Roma, quelle di sempre.  \r\n\
    \r\n\
    Il Goliarda - come lo si intende generalmente - \xC3\xA8 un beato incosciente, che ogni mattina si gode il sole nei vialetti dell'Universit\xC3\xA0, che d\xC3\xA0 la caccia alla matricola per professione, che fa la corte alle colleghe prosperose e opulente invece di andare a lezione, che si dedica ai balli, alle feste e che non ha alcuna preoccupazione del fatto che, sul suo libretto, i \"bolli\" aumentino in proporzione geometrica.  \r\n\
    \r\n\
    Da tale considerazione discende poi il discredito generale verso la stessa concezione goliardica e verso la stessa \"vita goliardica\".  \r\n\
    \r\n\
    Faremmo torto a noi stessi - come universitari -, faremmo torto alla \"Goliardia\" - come movimento di cultura e libert\xC3\xA0, come essa indubbiamente fu all'inizio stesso della vita dei nostri Atenei - se cercassimo di difendere lo spirito goliardico da queste accusa.  \r\n\
    \r\n\
    La vera Goliardia ed il vero goliarda si difendono da s\xC3\xA9, come si sono difesi da secoli, soltanto dimostrandosi continuamente e dimostrando continuamente di essere connaturati all'istituto universitario, che essi hanno generato e da cui sono perennemente generati, di essere connaturati, quindi, soprattutto allo studio e alla cultura.  \r\n\
    \r\n\
    Quanto alle manifestazioni e a quelle tradizioni che si vorrebbero far tramandare, si convincano tutti che \xC3\xA8 sciocco e assurdo rinunciare a quella parte veramente e pi\xC3\xB9 tipicamente \"critica\" della Goliardia, a quella visione scanzonata e burlesca del mondo in cui viviamo, che \xC3\xA8 uno dei modi di vivere e di sentire pi\xC3\xB9 caratteristico della giovent\xC3\xB9.  \r\n\
    \r\n\
    Questa edizione, riveduta e aggiornata, del \"Codex Iuris Goliardici\" - che va soprattutto alle nostre \"matricole, che dovranno garantire la nostra continuit\xC3\xA0 - pubblicato per la prima volta nel '45 a cura del nostro grande Franco Maria Quadro, Franciscus I, sia gradita ai Goliardi romani: sar\xC3\xA0 questo il pi\xC3\xB9 ambito premio per il nostro modesto lavoro.  \r\n\
    \r\n\
    Valete!  \r\n\
    \r\n  \r\n   \r\n \r\n  \r\n      Amedeus I\r\n Rom. Pont. Max. \r\n\
    \r\n  \r\n \r\n\
    \r\n\
    SALUTO AGLI UNIVERSITARI ROMANI \r\n\
    A tutti voi, o colleghi - e con questo termine vi comprendo tutti, fuori corso, anziani ed anche voi, matricole - giunga il mio saluto e il mio abbraccio di vecchio goliarda.  \r\n\
    \r\n\
    Ho voluto mettere un mio appuntino in questa nuova edizione del \"Codex\", sia per un doveroso atto di omaggio verso il pi\xC3\xB9 grande goliarda che Roma abbia mai avuto - Franciscus - sia per esortare tutti i giovani, e financo le matricole, a una vita universitaria e goliardica.  \r\n\
    \r\n\
    Vi invito anche ad aiutare i nostri sforzi verso un sempre pi\xC3\xB9 grande riconoscimento della Goliardia: a formare con noi un unico corpo capace di rintuzzare qualsiasi avversit\xC3\xA0 nel nome di nostra santa Madre Goliardia.  \r\n\
    \r\n\
    Sicuro di un vostro sollecito interessamento vi abbraccio. \r\n\
    \r\n  \r\n\
    \r\n \r\n Mauritius \r\n\
    \r\n\
    Vicarius Romanae Goliardiae \r\n\
    \r\n  \r\n \r\n\
    \r\n  \r\n\
    \r\n \r\n  \r\n \r\n\
    \r\n\
    NOS\r\n\
    ARCHIGYMNASII ROMANI \r\n\
    PRO GRATIA\r\n\
    BACCHIS TABACCHIS VENERISQUE \r\n\
    ATQUE VOLUNTATEM GOLIARDORUM\r\n \r\n\
    Pontifex Maximus \r\n\
    - visam maximam traditionem Romanorum Goliardorum quae matriculas et universitaria vitam esque ab universitade condita,  \r\n\
    \r\n\
    - auditum parerem Comitatui pro costututione Codicis Juris Goliardicis,  \r\n\
    \r\n\
    - auditum ululatum famelicorum collegum paucos-bolatos,  \r\n\
    \r\n\
    - habemus decretatum atque decretamus:  \r\n\
    \r\n  \r\n\
    \r\n\
    Art. 1 \r\n\
    \r\n\
    Textum Chodicis Juris Goliardicis, qui traditiones compendiat et ad tempus actuales eas actas adhibent, approvatum est et in esecutione incipit a die primo mensis octobris anni gratiae millesimo nongentesimo sexagesimo tertio. \r\n\
    \r\n  \r\n\
    \r\n\
    Art. 2 \r\n\
    \r\n\
    Exemplarem unum huius Chodicis, nostris firmationis convalidantibus, horiginalis eris et depositum atque conservatum eris in Archjvio Curiae. \r\n\
    \r\n  \r\n\
    \r\n\
    Art. 3 \r\n\
    \r\n\
    Imperamus quo hunc decretum habeat valorem offitialem et demandamus omnibus quibus expectata ut eum observent et eum observandum faciant. \r\n\
    \r\n\
    Datum in Archigymnasio Romano die primo mensis octobris anni gratiae millesimo nongentesimo sexagesimo tertio. \r\n\
    \r\n \r\n Pontifex Maximus\r\n \r\n\
    \r\n  \r\n\
    \r\n  \r\n\
    \r\n\
    Liber Primum: De lo Pontefice Maximo \r\n\
    1.    Lo Pontefice Maximo est la summa actoritade dello Archigymnasio.  \r\n\
    \r\n\
    2.    Lo Pontefice Maximo est lo presidente de la Curia, de la Summa Corte Goliardica Inquisitoria et de la radunanza de lo Pontificatus Romani Archigymnasii.  \r\n\
    \r\n\
    3.    Lo Pontefice Maximo li rei solvere aut damnare puote.  \r\n\
    \r\n\
    4.    Sachro est lo verbo suo.  \r\n\
    \r\n\
    5.    Lo Pontefice Maximo est electo non minus quam sex bollationi chonvien che abeat. \r\n\
    \r\n\
    6.    Lo Pontefice Maximo est electo quotannis de lo Conclave.  \r\n\
    \r\n  \r\n\
    Liber Secundum: De lo Vicario Generale \r\n\
    7.    Lo Vicario Generale est supervisor activitatis organizzativae Ordinis.  \r\n\
    \r\n\
    8.    Lo Vicario Generale sedet ad dextreram Pontificis. Sede vacante et absentia Pontificis est lo supremo regitore.  \r\n\
    \r\n\
    9.    Lo Vicario absistet lo Pontefice Maximo ne lo regimento de la Romana Goliardia. \r\n\
    \r\n  \r\n\
    Liber Tertium: De la Curia \r\n\
    10.La Curia est la maxima auctoritade juridica de lo Archigymnasio.  \r\n\
    \r\n\
    11.La Curia est composta da lo Pontefice, da lo Vicario Generale, da lo Summo Inquisitore et da septem (tot quot sunt li colli de Roma) Tribuni qui non minus quam quattuor bollationi habeant.  \r\n\
    \r\n\
    12.La Curiaest organon consultivo et deliberativo: consiliat lo Pontefice de juribus consuetudinibusque goliardicis; deliberat de Feriis Matricularum, de inauguratione anni goliardici et de aliis rebus gestis goliardicis. \r\n\
    \r\n\
    13.La Curia legiferat de regulis, che quotannis respectate deon esser per lo texto de lo Papiro. \r\n\
    \r\n\
    14. La Curia administrat sestertios goliardorum, sed huius rei chonvien che pubblice rededat rationem erga omnes, ostentando li bilanci de la cassa.  \r\n\
    \r\n  \r\n\
    Liber Quartum: De la Inquisitione \r\n\
    15.La Summa Corte de la Inquisitione est lo maximo Tribunale de lo Archigymnasio.  \r\n\
    \r\n\
    16.La Summa Corte Inquisitoria est composita de lo Pontefice Maximo, uti presidente, de lo Vicario Generale, uti judex a latere, de lo Sommo Inquisitore, uti adcusatore, de lo summo Cancelliere, de li Tribuni collis Palatini et Quirinali, de li Vassalli, de li Archiepiscopi et Episcopi Parrocchiarum,uti jurati. \r\n\
    \r\n\
    17.La Summa Corte Inquisitoria sedet ne lo processo matriculare et sindacat indicatque facta ac opera de tutti li Goliardi, ostendendo a lo dispregio populare li culpabili et damnandoli atque, si necesse est, extromettendoli da li sachri et fortificati bastioni de lo Studium Urbis, cum interditione perpetua vel temporanea da li Offici.  \r\n\
    \r\n  \r\n\
    \r\n\
    Liber Quintum: De li Vassallati \r\n\
    18.Vassallatus est lo Ordine minore, residente in locatione limitrofa a la Civitate Romana sed compresa in regione latiale, cum suis ordinibus regolamentiisque, qui habet compiutum actum vassallagii ne li confronti de lo Pontefice Maximo. \r\n\
    \r\n\
    19.Lo Vassallo caput ordinis insignito de la bolla pontificale sedet uti juratus ne la Summa Corte Inquisitoria de la Goliarda Romana.  \r\n\
    \r\n  \r\n\
    \r\n\
    Liber Sestum: De le Parrocchiae \r\n\
    \r\n\
    20.La Parrochia est la congrega de li Goliardi iscripti a lo Archigymnasio Romano et provenienti ex regionibus diversis ab regione latina. Omni regione puote corrispondere una sola Parrochia. Diverse regiones limitrofae puoton etiam congregarsi in una Parrochia. \r\n\
    \r\n\
    21.La Parrochia complet actum submissionis et puote essere constituta cum minimum quinquaginta aderentibus.  \r\n\
    \r\n\
    22.La Parrochia est directa ab Episcopo aut Archiepiscopo, secundum voluntate Pontificis, cum auxilio de quinque Parrochi. Lo caput Parrochiae sedet ne la Summa Corte Inquisitoria.  \r\n\
    \r\n  \r\n\
    Liber Septimum: De lo Conclave \r\n\
    23.Lo Conclave est la radunanza de omnes li inscripti a lo &laquo;Pontificatus Romani Archigymnasii&raquo;, id est lo Sovrano Ordine Goliardico de lo Studium Urbis, advocata da lo Pontefice Maximo uscente antea anni goliardici inaugurationem per la electione de lo novello Pontefice Maximo et de le altre cariche vassallate et parrochiales.  \r\n\
    \r\n\
    24.Li votanti lo sguardo fisso averanno a le virtudi goliardicae de li candidati: ullo politico preiudicio, maximo spirito goliardico, summa abilitate organizzativa, superlativa intellighentia, sviscerato amore pro Baccho, Tabacco, Veneraque.  \r\n\
    \r\n\
    25.Tutti li conclavisti candidati essere puoton. \r\n\
    \r\n\
    26.La plebe non inscripta poterae presentiare a la electione pontificale extra moenia Conclavis. La fumata blanca darae advisum advenutae electionis Pontificis. Nuntium electionis datum erit ab novello VicarioGenerale.  \r\n\
    \r\n  \r\n\
    Liber Octavum: De lo Summo Inquisitore et de l'Armata \r\n\
    27.Lo Summo Inquisitore habet compitum garantire observantiam Codicis presenti et goliardicarum institutionum Ordinis. Contra lo reo la Inquisitione conduce et la justa poena a lo maximo Tribunale propone. Est lo Dux de l'Armata et appellatur etiam Questore dum Armata Politia Goliardica dicitur. \r\n\
    \r\n\
    28.Lo Summo Inquisitore ad minimum quinque bollationi chonvien che abeat. \r\n\
    \r\n\
    29.Li Armigeri et li Archibugeri allo di lui comando supposti, sunt qui - manu militari - l'observantia legis cureranno. \r\n\
    \r\n\
    30.Li Armigeri et li Archibugeri phamelici sed tolerati Phaseoli chonvien che sieno \r\n\
    \r\n  \r\n\
    Liber Nonum: De lo Cancelliero \r\n\
    31.Lo Cancelliero gloriosa colonna chonvien che sia.  \r\n\
    \r\n\
    32).Lo Cancelliero est lo segretario de la Summa Corte Inquisitoria; li acti et regypstra conservat.  \r\n\
    \r\n  \r\n\
    Liber Decimum: De lo Sidereus Extracursus \r\n\
    33.Sidereus Extracursus est lo Goliarda qui de la Facultate elepta li anni de lo rigulare corso superato habeat.  \r\n\
    \r\n\
    34.Lo sidereus extracursus a lo cappello intiera frangiatione chonvien che abbia.  \r\n\
    \r\n\
    \r\n\
    Liber Undecimum: De lo Divinissimo Laureando \r\n\
    \r\n\
    35.Divinissimo Laureando est lo goliarda lo quale de la Facultade elepta a lo postremo anno de lo regulare corso inscripto sia.  \r\n\
    \r\n\
    36.Lo Divinissimo Laureando puote infrangiarsi lo cappello dimidie. \r\n\
    \r\n  \r\n\
    Liber Duodecimum: De lo Magnifico Antiano \r\n\
    37.Magnifico Antiano est lo goliarda lo quale a lo quinto aut a lo quarto de la Facultate de li medici et cerusici inscripto est, et lo goliarda lo quale a lo quarto anno de la facultade de li alchimisti, de li machinatori et de li architeptori inscripto est. Lo Magnifico Antiano puote implumare lo capello. \r\n\
    \r\n  \r\n\
    Liber Decimum Tertium: De la Gloriosa Columna \r\n\
    38.Gloriosa Columna est lo goliarda a lo tertio ano de omne Facultate inscripto. A lo cappello pinnam imponere potest et cordonem turacciolatum inferre. \r\n\
    \r\n  \r\n\
    Liber Decimum Quartum: De lo Phamelico sed Tolerato Phaseolo \r\n\
    39.Phamelico sed Tolerato Phaseolo est lo goliarda a lo secundo anno de omne Facultade inscripto. A lo cappello non plus quam quinque ammenicula recare puote et cordonem sine turacciolo.  \r\n\
    \r\n  \r\n\
    Liber Decimum Quintum: De la putridissima matricola \r\n\
    40.Putridissima Matricola est lo homo aut la foemina qui goliarda non est, sed a lo primo anno de omne Facultade inscripto est. A lo cappello unum ammeniculum tantum portare puote. \r\n\
    \r\n\
    41.La putridissima matricola goliardica sit post purificationem processi. \r\n\
    \r\n\
    42.La putridissima matricola semper li Siderei Extracursi, li Divinissimi Laureandi, li Magnifici Antiani, le Gloriosae Columnae, li Phamelici sed Tolerati Phaseoli respectare dee, intra et extra li fortificati bastioni de lo Ateneo et lo passo a li Superiori cedere dee. \r\n\
    \r\n\
    43.La putridissima matricola semper comunque culpabile est usque ad primam examinationem sublatam, in codesto lasso temporis ad omnem richiestationem lo papiro mostrerae.  \r\n\
    \r\n  \r\n\
    Liber Decimum Sextum: De lo Processo matricolare \r\n\
    44.Lo Processo Matricolare est lo procedimento qui purificat da le colpe la matricula et la rende meritevole de lo papiro.  \r\n\
    \r\n\
    45.Ne lo Processo Matricolare lo plus bollato intra li goliardi presenti sedet Praesidente circumdatus ab duabus judices a latere. Lo publico adcusatore et l'advocatus minimu columnae chonvien che sieno. Lo cancelliero esser puote lo Phaseolo, lo Boia etiam pure. \r\n\
    \r\n\
    46.Lo processo aperitur cum scaramantiae ad spiritos malignos fugandos et invocationes ad sanctam Matrem Goliardiam. Propter richiestam defensoris, conscii putritudinis et culpae immoralis matriculae, processum puote farsi clausis portis.  \r\n\
    \r\n\
    47.Indi lo cancelliero introducit causam et dat verbum a lo Praesidente, lo quale, causacognita, invitat l'adcusatore a l'eloquio. A codesto, si Praesidente credet opportunam respondet la defensa. Postremo, lo Praesidente concedit duas testimoniantas pro capite a l'accusa et a la defensa, post quales, adcertat maturitate matriculae cum goliardica examinatione. Si nondum matura est, morti damnaretur; contra - vita salva ob miraggium pappatae - la matricula damnata est poenis spiritualis et corporalis. Bibitio cicutae est prammaticae.  \r\n\
    \r\n\
    48.Tandem lo Praesidente leget et illustrat Papirum a la matricula et cum benedictione absolutoria claudit processo. Conferendo lo Papiro et lo Cappello a la matricula intonat canticas et imnos goliardicos.  \r\n\
    \r\n\
    49.Per omnem duratam processi matricula - sicut fantoccium - prostrata a la pedagna di lui superiori sarae usque ad benedictionem, in manum tenens candelam a significatione de la perennitade de lo spirito goliardico.  \r\n\
    \r\n  \r\n\
    Liber Decimum Septium: De lo Papiro et eius Compilatione \r\n\
    50.Lo Papiro est lo dochumento qui adtestat che la matricula lo regulare processo subito habeat et non putritudine (quod vero impossibile est) sed magno fetorte Licei monda et purificata est.  \r\n\
    \r\n\
    51.Lo Papiro - in latino atque vulgari idioma - ab uno Phamelico Phaseolo scripto sarae.  \r\n\
    \r\n\
    52.Textum ufficiale Papiri est quotannis dectatum a Pontifice Maximo Archigymnasii. Lo Papiro constat duas partes: la introductiva et la normativa. La introductiva incipit cum notatione annorum post Cristum natum et ab Studio Urbis condito, cum indicatione jocosa de li gubernanti, de lo Rectore, de lo Administratore, de lo caput idellorum Athenei, de lo Pontefice Maximo. La pars normativa incipit cum Nos in nomine Bacchi, Tabacchi Venerisque, in sustantia con lo Decretemasu et consistit ne lo Decalogon. Haec praefata sunt essentialia, id est sine quibus lo Papiro infirmato est. Accidentalia sunt aliae quae raccomandatae erunt sed non necessaraie - Leges, Calendarium, Basilicae, Indiritia utilia, Codicillia et Libri Texti -, validum permanendum papirum. Clarum sit quod - ad exceptionem de le norme dictatae da lo Pontefice Maximo - ognuno puote dectare ea quae ad esso medesimo magis conveniente videtur, intellighente et satirico, secundum circumstantias. \r\n\
    \r\n\
    53.Lo verbo Decalogon in ellenico idioma inscripto sarae et umquam ex decem, sed ex novem vel undecim artichuli composito sarae. Lo decimo, si est, esser dee \"non est\". \r\n\
    \r\n\
    54.Ad facillimos alterationes atque imbroglios vitandos, quotannis la Curia stabilirae et lo Pontefice promulgherae le regulae particulari de lo anno medesimo. \r\n\
    \r\n  \r\n\
    Liber Decimum Octavum: De la Revisione Papiri et de lo Pedaggio \r\n\
    55.La matricula, de lo papiro richiesta, debet instantaneamente satisfecere quesitum Superioris. La matricula poterae solum richiedere a lo Superiore, supplice ac remissive, la visione de lo documento de lo Archigymnasio. Haec oratio da lo Superiore satisfacta chonvien che sia. \r\n\
    \r\n\
    56.Lo superiore poterae revisionare lo papiro toties quoties lo Papiro redactum est contra et in deroga a li artichulis 52, 53, 54. \r\n\
    \r\n\
    57.Sciatur quod li parvuli errores, li lapsus calami, le minuscolae subtilitates non justificano la revisione. Lo goliarda culpabile de arbitrium, sovraffatione, estortione, sarae tosto deferitum a la Summa Corte Goliardica, ad operam de lo Summo Inquisitore. \r\n\
    \r\n\
    58.Normae particulares revisionis stabilitae erunt quotannis da la Curia. \r\n\
    \r\n\
    59.Revisione facta chonvien che la matricula omaggio prestet bono revisore. Si omaggio negat ostendendo malcelata micragna se ipsum presterae a la pharsam ad sollatium revisori, si nollet, a li giri di pista circum fontanonem at spron battutum. \r\n\
    \r\n\
    60.Lo Pedaggio est brevis permissio pasculationis inter sachra moenia Athenei, valido - ad maximum - per tres dies, cum datatione nigro inchiostro inscripta et minimum tres firmationes. \r\n\
    \r\n\
    61.Lo Pedaggio est rilasciato omnibus qui reperiti sunt intra li sachri et fortificati bastioni, sine alchuno documento aut sine ulla justificazione. Li soprascripti bastioni, aperti a la juventude, sunt infatti clausissimi a l'infantia et alla senectude. \r\n\
    \r\n\
    62.Lo Pedaggio puote esseer rilasciato etiam a la matricula in aspettativa de lo regulare Papiro.  \r\n\
    \r\n\
    63.Lo forestiero reperito pagare doverae lo pedaggio a li Goliardi invenitores, in ragionem bibationis aut manducationis. \r\n\
    \r\n\
    64.La bibatio aut manducatio da lo forestiero oblata, compenso est de la fatica per rinvenirlo, de la injuria a la Goliardia adrecata et de l'onere gravosus de la scriptura de lo pedaggio che viengli rilasciato. \r\n\
    \r\n  \r\n\
    Liber Decimum Nonum: De la Fagiolata et Antianata \r\n\
    65.Praemisso che intra li sachri 65 et fortificati bastioni de lo studium Urbis imperat sovrano lo comandamento \"ubi maior minor cessat\" lo quale ne lo vulgare idioma volto, segnificat\"dov'\xC3\xA8 lo maiore lo minore vae a lo cesso\" dicitur fagiolata jocus jocundus che alcuni goliardi majores sono usi facere a lo Phaseolo pi\xC3\xB9 zelante, attraverso lo mascheramento de la propria maioritade.  \r\n\
    \r\n\
    66.Oportet adjungere che talune fiate permanet jocatus la columna et lo istesso antiano: in hoc casu jocus antianata appellatur. \r\n\
    \r\n\
    67.La majoritade aut la minoritade est testificata da lo anno de inscriptione et da li bolli contenuti ne lo libercolo de lo Archigymnasio.  \r\n\
    \r\n\
    68.La aperitura de lo libercolo facta sarae dentro taberna post manducationem aut bibationem aut fumationem: lo goliarda minus bollatus pagherae.  \r\n\
    \r\n\
    69.Si li bolli in egual numero fussero, li goliardi pagheranno in egual partitura. \r\n\
    \r\n    \r\n\
    \r\n\
    \r\n\
    \r\n \r\n\
    \r\n\
    Parole\r\n"
