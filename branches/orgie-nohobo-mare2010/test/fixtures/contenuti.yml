  titolo: Birra vs Figa
  idcontenuto: "963990457"
  tipo: cazzate
  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: "BIRRA e/o FIGA?\r\n\
    \r\n\
    \r\n\
    1) Una birra \xC3\xA8 sempre bagnata. La figa va incoraggiata.\r\n\
    \r\n\
    Vantaggio: birra.\r\n\
    \r\n\
    2) Una birra fa schifo servita calda.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    3) Una birra fredda ti soddisfa, una figa fredda no.\r\n\
    \r\n\
    Vantaggio: birra.\r\n\
    \r\n\
    4) Se ti ritrovi un pelo nei denti bevendo birra potresti aver voglia di\r\n\
    vomitare.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    5) Se torni a casa puzzando di birra, tua moglie ti rimprovera.\r\n\
    \r\n\
    Se torni a casa puzzando di figa, tua moglie potrebbe lasciarti.\r\n\
    \r\n\
    Vantaggio: pari (punti di vista!)\r\n\
    \r\n\
    6) Dieci birre in una notte, e non puoi pi\xC3\xB9 guidare.\r\n\
    \r\n\
    Dieci fighe in una notte, e non c'\xC3\xA8 pi\xC3\xB9 bisogno di guidare.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    7) Compra troppa birra, e diventi grasso; compra troppa figa, e diventi\r\n\
    povero.\r\n\
    \r\n\
    Vantaggio: pari.\r\n\
    \r\n\
    8) Se ti fai una birra in un locale affollato, \xC3\xA8 normale.\r\n\
    \r\n\
    Se ti fai una figa in un locale affollato, sei un mito.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    9) Se un poliziotto ti sente addosso puzza di birra, potrebbe arrestarti.\r\n\
    Se un poliziotto ti sente addosso puzza di figa, potrebbe offrirti una\r\n\
    birra.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    10) La birra, pi\xC3\xB9 \xC3\xA8 stagionata, meglio \xC3\xA8.\r\n\
    \r\n\
    Vantaggio: birra.\r\n\
    \r\n\
    11) Se ti fai una birra con un preservativo indossato non senti la\r\n\
    differenza di gusto.\r\n\
    \r\n\
    Vantaggio: birra.\r\n\
    \r\n\
    12) Tanta birra pu\xC3\xB2 farti vedere gli ufo.\r\n\
    \r\n\
    Tanta figa pu\xC3\xB2 farti vedere Dio.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    13) Se ti chiedi sempre come sar\xC3\xA0 la prossima figa, sei normale.\r\n\
    \r\n\
    Se ti chiedi sempre come sar\xC3\xA0 la prossima birra, sei alcolizzato.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    14) Strappare l'etichetta da una bottiglia di birra, \xC3\xA8 divertente.\r\n\
    \r\n\
    Strappare le mutandine da una figa, \xC3\xA8 MOLTO pi\xC3\xB9 divertente.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    15) Lo stato tassa la birra.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    16) Se provi a farti una birra durante il lavoro, potresti essere\r\n\
    licenziato.\r\n\
    \r\n\
    Se provi a farti una figa durante il lavoro, potresti essere arrestato con\r\n\
    l'accusa di molestie sessuali.\r\n\
    \r\n\
    Vantaggio: birra.\r\n\
    \r\n\
    17) Se ti cade una birra, potrebbe rompersi.\r\n\
    \r\n\
    Se ti cade una figa, potrebbe prenderti a calci in culo.\r\n\
    \r\n\
    Vantaggio: birra.\r\n\
    \r\n\
    18) Se cambi birra, potresti amaramente ricordarti del vecchio sapore.\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    19) La pi\xC3\xB9 bella figa che ti sei mai fatto, non \xC3\xA8 scomparsa appena te la sei\r\n\
    goduta\r\n\
    \r\n\
    Vantaggio: figa.\r\n\
    \r\n\
    20) La peggiore figa che ti sei mai fatto, non \xC3\xA8 scomparsa appena te la sei\r\n\
    goduta.\r\n\
    \r\n\
    Vantaggio: birra.\r\n\
    \r\n\
    21) Se ti fai un'altra birra, la prima non si incazza.\r\n\
    \r\n\
    Vantaggio: birra.\r\n\
    \r\n\
    \r\n\
    RISULTATO: FIGA BATTE BIRRA 11 \xE2\x80\x93 8\r\n"
