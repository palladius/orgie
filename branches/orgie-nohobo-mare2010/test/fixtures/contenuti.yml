  contenuto: "Elenco di telefonate fatte da clienti della Telecom Italia Mobile al customer care. \r\n\
    \r\n\
    CLONAZIONI \r\n\
    Cliente: Mi scusasse, ma m'hanno cromato il citofonino. \r\n\
    Cliente: Ho il telefono cotonato. \r\n\
    Cliente: Cosa devo fare, mi hanno cronato il cellulare. \r\n\
    Cliente: Aiuto, mi hanno clinizzato. \r\n\
    Cliente: Ho un problema di colazione. \r\n\
    Cliente: Vorrei controllare se sono teleclonato. \r\n\
    Cliente: Attendo la bolletta con importo sclonato. \r\n\
    Cliente: Ho il telefono coronato. \r\n\
    Cliente: Mi hanno croccato. \r\n\
    Cliente: Ho il telefono bloccato per traffico frodiaco. \r\n\
    \r\n\
    BOLLETTE \r\n\
    Cliente: La ratatizzazione come si fa? \r\n\
    Cliente: Mi mandate la strisciata del telefono? \r\n\
    Cliente: Mi controlla il cannone di abbonamento? \r\n\
    Cliente: Mi scusi, la bolletta \xC3\xA8 troppo alta, non si pu\xC3\xB2 diluire? \r\n\
    Cliente: Non mi sono intervenute due bollette. \r\n\
    Cliente: Allora mi mandi al centro dilazionale. \r\n\
    Cliente: Sa com'\xC3\xA8, mi stranizzava questo importo. \r\n\
    Cliente: Vorrei la dilatazione della bolletta. \r\n\
    Cliente: Ho pagato tramite bollettaio. \r\n\
    Cliente: Ma allora la bolletta \xC3\xA8 tremesturale!! \r\n\
    \r\n\
    APPARATI \r\n\
    Cliente: Posseggo una radia mobile.......(telefono cellulare). \r\n\
    Cliente: Buongiorno, sono un cellulare rotto. \r\n\
    Cliente: Possiedo un citofonino. \r\n\
    Cliente: Salve, sono un radiomobile. \r\n\
    Cliente: Siccome dovessi pigliare un cellulare..... \r\n\
    \r\n\
    READY TO GO E TIM CARD \r\n\
    Cliente: Buongiorno, io sono l'elencato dell'abbonato. \r\n\
    Cliente: Vorrei avere un problema. \r\n\
    Cliente: Vorrei fare una slim/cart.....(Sim card). \r\n\
    Cliente: Ho acquistato una redio go..(Ready to go-carta prepagata) \r\n\
    Cliente: Vorrei fare l'emigrazione dal contratto....(migrazione). \r\n\
    Cliente: Mi scusi, ma dopo aver inserito il PIN non mi va in ricettazione della linea... \r\n\
    (ricerca rete). \r\n\
    Cliente: Senta, mi hanno rapito il telefonino!!! \r\n\
    Cliente: Perch\xC3\xA8 mi da il tritone? \r\n\
    Cliente: Mi si \xC3\xA8 disintegrato il cellulare. \r\n\
    Cliente: Ho un contratto cess/emme..... \r\n\
    Cliente: Voglio chiamare il numero l\xC3\xA0 per chiamare qua.....(12). \r\n\
    Cliente: Il mio numero non \xC3\xA8 abitabile. \r\n\
    Cliente: Ho il palloncino sul display. \r\n\
    Cliente: Punto prima.... \r\n\
    Cliente: Vorrei la disintegrazione del telefonino. \r\n\
    Cliente: La Tim/card \xC3\xA8 troclodita. \r\n\
    Cliente: Ho il telefono in trans. \r\n\
    Cliente: Quando io facesso la cessazione. \r\n\
    Cliente: Vorrei un'infamazione se \xC3\xA8 impossibile... \r\n\
    \r\n"
contenuti_093: 
  m_bInAttesa: "0"
