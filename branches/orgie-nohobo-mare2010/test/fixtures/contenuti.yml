  contenuto: "SEGRETERIA TELEFONICA\r\n\
    [messaggio da inserire nella propria segreteria telefonica]\r\n\
    \r\n\
    QUESTA E\xE2\x80\x99 LA SEGRETERIA DEL NUMERO CHE HAI CHIAMATO\r\n\
    MI DISPIACE SE IN CASA NON MI HAI TROVATO\r\n\
    LASCIA PURE IL MESSAGGIO TI RICHIAMERO\xE2\x80\x99 POI\r\n\
    DIMMI ALLORA DOPO IL SEGNALE ACUSTICO\xE2\x80\xA6 CHE CAZZO VUOI!\r\n\
    \r\n                                                *****\r\n\
    \r\n\
    OGNI RUTTO\xE2\x80\xA6 FACCIO UN LUTTO! (*)\r\n\
    [da declamare dopo l\xE2\x80\x99emissione di un rutto]\r\n\
    \r\n\
    SCUSATE SE DALLA BOCCA MIA QUESTO RUMORE E\xE2\x80\x99 USCITO\r\n\
    LO SO CHE E\xE2\x80\x99 MALEDUCATO SPONTANEO PERO\xE2\x80\x99 E\xE2\x80\x99 PARTITO\r\n\
    CON L\xE2\x80\x99ARIA CHE NELLO STOMACO DA TEMPO ORMAI RISTAGNAVA\r\n\
    SORTIRE LEI NON SAPEVA DA DOVE E SI TORMENTAVA\xE2\x80\xA6\r\n\
    \r\n\
    VI E\xE2\x80\x99 ANDATA POI PURE BENE DOVRESTE ANCHE RINGRAZIARE\r\n\
    SE ALFIN QUESTA SOLUZIONE RIUSCITA LEI E\xE2\x80\x99 A TROVARE\r\n\
    PENSATE ALLE CONSEGUENZE COL TANFO SI\xE2\x80\x99 DISUMANO\r\n\
    SE INVECE CHE DALLA BOCCA USCITA FOSSE\xE2\x80\xA6 DALL\xE2\x80\x99ANO!\r\n\
    \r\n\
    (*)\r\n\
    \xE2\x80\xA6E OGNI VOLTA CHE SCORREGGIO FACCIO ANCHE IO DI PEGGIO\xE2\x80\xA6\r\n\
    \xE2\x80\xA6QUANDO ALZO POI LE ASCELLE FACCIO IO VEDER LE STELLE\xE2\x80\xA6\r\n\
    \xE2\x80\xA6ED INFINE AD OGNI FIATO SEMPRE FACCIO UN TRAPASSATO!\r\n\
    \r\n                                                *****\r\n\
    \r\n\
    MANGIANDO A \xE2\x80\x9CUFO\xE2\x80\x9D\xE2\x80\xA6 NON MI STUFO!\r\n\
    [mai rifiuto \xC3\xA8 cosa certa\xE2\x80\xA6 quando gratis \xC3\xA8 l\xE2\x80\x99offerta!]\r\n\
    \r\n\
    SE IL PREZZO E\xE2\x80\x99 FISSO O MANCA E\xE2\x80\x99 COME UNA MAGIA\r\n\
    FATTI CAPANNA ADESSO CORAGGIO PANCIA MIA\r\n\
    NON E\xE2\x80\x99 UNA FRASE NUOVA LO SO NON SON POETA\r\n\
    SAREBBE DA COGLIONI PERO\xE2\x80\x99 RESTARE A DIETA\xE2\x80\xA6\r\n\
    \r\n\
    SUPERA A VOLTE IL SESSO NON SONO ESAGERATO\r\n\
    NON CHIEDE NIENTE IN CAMBIO DOPO CHE HAI CONSUMATO\r\n\
    E ALLORA CI DO DENTRO PROVANDO FINO IN FONDO\r\n\
    LA SENSAZIONE MITICA\xE2\x80\xA6 DI ANDARE IN CULO AL MONDO!\r\n\
    \r\n                                                *****\r\n\
    LA PISCIATA\r\n\
    [da declamare, preferibilmente in compagnia, durante l\xE2\x80\x99effettuazione di una pisciata]\r\n\
    \r\n\
    PISCIA PISCIA BEL CAZZONE\r\n\
    SENTI CHE LIBERAZIONE\r\n\
    FUORI VIA DALLA VESCICA\r\n\
    TUTTA IN MEN CHE NON SI DICA\r\n\
    LIQUIDO RIFIUTO ORGANICO\r\n\
    CHE ESCE FUORI DA \xE2\x80\x98STO MANICO\r\n\
    COME UN FIORE QUANDO SBOCCIA\r\n\
    FINO ALL\xE2\x80\x99ULTIMA SUA GOCCIA!\r\n\
    \r\n\
    P.S.:\r\n\
    QUANDO E\xE2\x80\x99 DURO COME ROCCIA\r\n\
    BEATA LEI\xE2\x80\xA6 CHE SE LO \xE2\x80\x9CSOCCIA\xE2\x80\x9D!\r\n\
    \r\n                                                *****\r\n\
    MI SCAPPA DA PISCIARE\r\n\
    [da declamare allo scopo di provocare una persona che non sa dove e come espletare un bisogno fisiologico\xE2\x80\xA6 assai impellente o per sdrammatizzare un proprio dramma analogo]\r\n\
    \r\n\
    MI SCAPPA DA PISCIARE NON NE POSSO PIU\xE2\x80\x99\r\n\
    MI SCOPPIA LA VESCICA PERCHE\xE2\x80\x99 RIDI TU?!\r\n\
    SOFFRO COME UN CANE\r\n\
    E MEZZ\xE2\x80\x99ORA CHE STO MALE\r\n\
    NELLA FOLLA TRA LA GENTE\r\n\
    DISPERATO INCONTINENTE\r\n\
    TRATTENERLA QUASI A STENTO\r\n\
    TU SAPESSI CHE TORMENTO\r\n\
    QUINDI NON MI RICORDARE\r\n\
    CHE MI SCAPPA DA PISCIARE!\r\n\
    \r\n\
    MI SCAPPA DA PISCIARE CHE SUCCEDERA\xE2\x80\x99\r\n\
    NEANCHE UN ANGOLINO RIPARATO QUA\r\n\
    PROVO A NON PENSARE\r\n\
    CHE MI DEVO LIBERARE\r\n\
    MA E\xE2\x80\x99 UN \xE2\x80\x9CBISOGNO\xE2\x80\x9D TROPPO GROSSO\r\n\
    TRA UN PO\xE2\x80\x99 ME LA FACCIO ADDOSSO\r\n\
    HO SBAGLIATO A CALCOLARE\r\n\
    VEDI DI NON AGGRAVARE\r\n\
    SE FAI \xE2\x80\x9CPS\xE2\x80\xA6 PS\xE2\x80\xA6\xE2\x80\x9D TI ASSICURO\r\n\
    CHE TI MANDO A FARE IN CULO!\r\n\
    \r\n                                                *****\r\n\
    \r\n\
    IL \xE2\x80\x9CBUON FALCETTO\xE2\x80\x9D\xE2\x80\xA6 TAGLIA TUTTE LE \xE2\x80\x9CERBE\xE2\x80\x9D!\r\n\
    [nei periodi di\xE2\x80\xA6 \xE2\x80\x9Cs-figa\xE2\x80\x9D bisogna accontentarsi!]\r\n\
    \r\n\
    NEI MOMENTI DI \xE2\x80\x9CGUERRA\xE2\x80\x9D OGNI \xE2\x80\x9CBUCO\xE2\x80\x9D E\xE2\x80\x99 \xE2\x80\x9CTRINCEA\xE2\x80\x9D\r\n\
    NEI FRANGENTI DI CRISI DI \xE2\x80\x9CBASSA MAREA\xE2\x80\x9D\r\n\
    SE A TROVARLA DECENTE IO PROPRIO NON RIESCO\r\n\
    BASTA UN FORO NEL MURO CON L\xE2\x80\x99INTONACO FRESCO\r\n\
    \r\n\
    PERCHE\xE2\x80\x99 DEVI ADATTARTI SE SEI IN EMERGENZA\r\n\
    QUANDO PIU\xE2\x80\x99 DELL\xE2\x80\x99ONORE PUO\xE2\x80\x99 - AHIME\xE2\x80\x99 - L\xE2\x80\x99ASTINENZA\r\n\
    SEMPRE MEGLIO DI NIENTE FINCHE\xE2\x80\x99 \xE2\x80\x9CLUI\xE2\x80\x9D RESTA SU\r\n\
    PERDI OGNUNA CHE LASCI E NON LA TROVI MAI PIU\xE2\x80\x99!\r\n\
    \r\n\
    P.S.:\r\n\
    OGNI LASCIATA E\xE2\x80\x99 PERSA CHI SE NE FREGA\r\n\
    OGNI \xE2\x80\x9CUCCELLATA\xE2\x80\x9D IN MENO\xE2\x80\xA6 E\xE2\x80\x99 IN PIU\xE2\x80\x99 UNA SEGA!\r\n\
    RI-P.S.:\r\n\
    E ANCHE SE BELLA NON TI TOCCA\xE2\x80\xA6\r\n\
    \xE2\x80\xA6AL LIMITE DI BOCCA!\r\n\
    \r\n                                                *****\r\n\
    LA CAGATA\r\n\
    [da declamare prima, dopo\xE2\x80\xA6 oppure - perch\xC3\xA9 no?! - anche durante la defecazione]\r\n\
    \r\n\
    CHE GODURIA CHE PIACERE\r\n\
    QUANDO ESCE DALLO SFINTERE\r\n\
    \xE2\x80\x9CSOMMERGIBILE\xE2\x80\x9D O \xE2\x80\x9CCIAMBELLA\xE2\x80\x9D\r\n\
    LA MORALE E\xE2\x80\x99 SEMPRE QUELLA\r\n\
    CHE QUALUNQUE SIA IL FORMATO\xE2\x80\xA6\r\n\
    \xE2\x80\xA6IO MI SENTO LIBERATO!\r\n\
    \r\n                                                *****\r\n\
    \r\n\
    \xE2\x80\xA6E OGNI VOLTA CHE SCORREGGIO FACCIO ANCHE IO DI PEGGIO! (I)\r\n\
    [da declamare come\xE2\x80\xA6 \xE2\x80\x9Cproclama di preavviso\xE2\x80\x9D da parte dell\xE2\x80\x99agente]\r\n\
    \r\n\
    E ADESSO SENZA INDUGIO IN PRATICA IO METTO\r\n\
    SI DEGLI ANTICHI GRECI MEDICI UN VECCHIO DETTO\r\n\
    CHE ANCHE SE L\xE2\x80\x99ODORE A VOLTE E\xE2\x80\x99 UN PO\xE2\x80\x99 MALSANO\r\n\
    TROMBA DI CULO SEMPRE UGUALE CORPO SANO!\r\n\
    \r\n                                                *****\r\n\
    \r\n\
    \xE2\x80\xA6E OGNI VOLTA CHE SCORREGGIO FACCIO ANCHE IO DI PEGGIO! (II)\r\n\
    [da declamare in caso di\xE2\x80\xA6 accusa proveniente da terzi]\r\n\
    \r\n\
    CHI PER PRIMO L\xE2\x80\x99HA SENTITA\r\n\
    DAL SUO CULO GLI E\xE2\x80\x99 SORTITA\r\n\
    FETIDA E MALEODORANTE\r\n\
    CON UN TANFO NAUSEANTE\r\n\
    COME SONO QUELLE CHE\r\n\
    FARE SAI SOLTANTO TE\r\n\
    CHE OLTRETUTTO MI HAI ACCUSATO\r\n\
    BRUTTO STRONZO HAI SCORREGGIATO!\r\n\
    (Varianti testo: \xE2\x80\x9CMA SEI TU CHE HAI SCORREGGIATO!\xE2\x80\x9D\r\n\
    \xE2\x80\x9CSARAI TU CHE HAI SCORREGGIATO?!\xE2\x80\x9D)\r\n\
    \r\n                                                *****\r\n\
    \r\n\
    SOGNO (DICHIARAZIONE\xE2\x80\xA6 D'AMORE)\r\n\
    [da declamare, preferibilmente in ginocchio, davanti alla persona\xE2\x80\xA6 amata]\r\n\
    \r\n\
    SOGNO \r\n\
    E QUESTO LO SAI E\xE2\x80\x99 IL MIO PIU\xE2\x80\x99 GRANDE TORMENTO\r\n\
    DI POTERTI AVVICINARE ANCHE SOLO UN MOMENTO...\r\n\
    \r\n\
    SOGNO\r\n\
    CON TE BELLA COME UNA PERLA RARA\r\n\
    DI POTER ANNULLARE QUELL\xE2\x80\x99ABISSO CHE CI SEPARA...\r\n\
    \r\n\
    SOGNO\r\n\
    E DIO MI PERDONI NON E\xE2\x80\x99 UN FATTO GRAVE\r\n\
    ...DI CHIUDERMI IN CAMERA CON TE E BUTTAR VIA LA CHIAVE!\r\n\
    \r\n"
