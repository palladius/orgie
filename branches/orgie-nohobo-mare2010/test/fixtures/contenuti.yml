  titolo: Criceto
  idcontenuto: "843436885"
  tipo: altro
  idloginpubblicante: "1744"
  m_battivo: "1"
  contenuto: "Criceto \xC3\xA8 stato capace di vincere una partita a scacchi anche dopo che gli avevano mangiato il re. \r\n\
    \r\n\
    Criceto una volta ha trovato lavoro in un lunapark. Era il calcinculo. \r\n\
    \r\n\
    Criceto un giorno ha creato un lanciafiamme urinando in un accendino. \r\n\
    \r\n\
    Una notte, durante un temporale, Criceto \xC3\xA8 stato colpito da un fulmine. Il fulmine \xC3\xA8 morto sul colpo. \r\n\
    \r\n\
    Criceto ha creato un milione di posti di lavoro. Tutti becchini. \r\n\
    \r\n\
    Criceto da piccolo amava i cartoni. Soprattutto allo stomaco. \r\n\
    Criceto guarda la videocassetta di \"The ring\" tutte le sere e il suo telefono non squilla mai. \r\n\
    \r\n\
    Il governo degli Stati Uniti spende 40 miliardi di dollari all'anno in prevenzione di calamit\xC3\xA0 naturali. Di questi, 35 miliardi sono spesi per garantire che la birra di Criceto sia sempre fredda. \r\n\
    \r\n\
    Un giorno, dopo aver sentito \"I will survive\", Criceto decapit\xC3\xB2 Gloria Gaynor con un calcio rotante: l'aveva interpretata come una sfida. \r\n\
    \r\n\
    Criceto ha fatto il suo primo milione di dollari all'et\xC3\xA0 di sei anni grazie alla fatina dei dentini. I denti che lasciava sotto il cuscino per\xC3\xB2 non erano i suoi. \r\n\
    \r\n\
    I comunisti in realt\xC3\xA0 non mangiano i bambini, perch\xC3\xA8 se li mangia prima Criceto. I comunisti. E anche i bambini. \r\n\
    \r\n\
    Durante un concerto dei Pooh, Criceto ha fermato la musica. \r\n\
    \r\n\
    Criceto ha contato fino ad infinito. Due volte \r\n\
    \r\n\
    Quando Criceto fissa il sole, \xC3\xA8 il sole a distogliere lo sguardo per primo. \r\n\
    \r\n\
    Sting riesce a fare sesso per dodici ore di fila. Criceto riesce a non fare sesso per dodici ore di fila. \r\n\
    \r\n\
    Criceto mangia la pizza con le mani. A volte ci mette anche le olive. \r\n\
    \r\n\
    Il segnale con l'uomo in carrozzella non indica che un parcheggio sia riservato ai disabili, ma che appartiene di diritto a Criceto, e che verrai ridotto su una sedia a rotelle se oserai parcheggiarci sopra. \r\n\
    \r\n\
    Criceto salta i fossi per lungo. \r\n\
    \r\n\
    Criceto fuma toscani. Vivi. \r\n\
    \r\n\
    Criceto pu\xC3\xB2 superare il tonno insuperabile. A destra. \r\n\
    \r\n\
    Per diventare famoso, il diavolo ha venduto l'anima a Criceto. \r\n\
    \r\n\
    Criceto taglia i grissini col tonno. \r\n\
    \r\n\
    In una rara scena tagliata de \"L'Impero colpisce ancora\", Criceto rivela a Darth Vader di essere suo padre. \r\n\
    \r\n\
    Criceto pu\xC3\xB2 sbattere una porta girevole. \r\n\
    \r\n\
    Criceto pu\xC3\xB2 essere visto ad occhio nudo dallo spazio. \r\n\
    \r\n\
    Il primo a dividere l'atomo non \xC3\xA8 stato Einstein. E' stato Criceto: l'ha frantumato con un solo calcio rotante. \r\n\
    \r\n\
    Berlusconi pu\xC3\xB2 unire la Sicilia all'Italia con un ponte. Criceto pu\xC3\xB2 farlo a mani nude. \r\n\
    \r\n\
    A morra cinese, Criceto sconfigge carta, forbice e sasso contemporaneamente. \r\n\
    \r\n\
    Ci sono solo quattro cavalieri dell'Apocalisse, perch\xC3\xA8 Criceto preferisce andare a piedi. \r\n\
    \r\n\
    McGyver pu\xC3\xB2 costruire un aereo con una gomma da masticare e delle graffette, ma Criceto pu\xC3\xB2 spiaccicargli la testa contro un muro con un calcio rotante e portarglielo via. \r\n\
    \r\n\
    Se Bruce Banner perde il controllo si trasforma nell'incredibile Hulk. Se l'incredibile Hulk perde il controllo si trasforma in Criceto. \r\n\
    \r\n\
    Se Criceto si sveglia con la luna storta, la raddrizza a calci rotanti. \r\n\
    \r\n\
    Quando Criceto ha lasciato le sue impronte delle mani e dei piedi sulla Hollywood Walk of Fame, il cemento era asciutto. \r\n\
    \r\n\
    Nel Vangelo secondo Criceto, Dio ha un ruolo di secondo piano. E di Ges\xC3\xB9 non c'\xC3\xA8 traccia. \r\n\
    \r\n\
    L'erba del vicino di Criceto \xC3\xA8 meno verde della sua. \r\n\
    \r\n\
    Criceto detiene il record di punti in un'unica partita di basket: centosettanta. Distribuiti equamente tra gambe, braccia e volto degli avversari. \r\n\
    \r\n\
    Se mia nonna avesse le ruote, sarebbe una cariola. Se Criceto avesse le ruote, sarebbe la batmobile. \r\n\
    \r\n\
    Nella botola di Lost c'\xC3\xA8 Criceto. \r\n\
    \r\n\
    Freddy Krueger non dorme mai per paura di sognare Criceto. \r\n\
    \r\n\
    Criceto ha bandito gli arcobaleni dallo stato del North Dakota. \r\n\
    \r\n\
    Criceto non segue la moda: la moda segue Criceto. Poi lui si volta e la colpisce con un calcio rotante. \r\n\
    \r\n\
    Se un battito d'ala di farfalla in Brasile pu\xC3\xB2 scatenare un tornado in Oklahoma, un calcio rotante di Criceto in Oklahoma spiega facilmente il Big Bang. \r\n\
    \r\n\
    Godot non arriva perch\xC3\xA8 si \xC3\xA8 preso un calcio volante di Criceto. \r\n\
    \r\n\
    Quando Criceto fa l'occhiolino, le ragazze si sciolgono. Letteralmente. \r\n\
    \r\n\
    Anche Criceto ha un Cuore. E lo usa come portachiavi. \r\n\
    \r\n\
    Mio cuggino conosce un colpo segreto che se te lo d\xC3\xA0 dopo tre giorni muori. Gliel'ha insegnato Criceto. \r\n\
    \r\n\
    Criceto \xC3\xA8 particolarmente consigliato nelle diete povere di calcio. \r\n\
    \r\n\
    Il presidente Roosevelt proclam\xC3\xB2: \"L'unica cosa di cui dobbiamo avere paura \xC3\xA8 la paura stessa. E Criceto\". \r\n\
    \r\n\
    Alle morbide Fruit Joy, Criceto pu\xC3\xB2 resistere. \r\n\
    \r\n\
    Criceto d\xC3\xA0 fuoco alle formiche con una lente di ingrandimento. Di notte. \r\n\
    \r\n\
    Criceto ha perso la verginit\xC3\xA0 prima di suo padre. \r\n\
    \r\n\
    Criceto ogni weekend uccide 14 bianchi, solo per dimostrare che non \xC3\xA8 razzista. \r\n\
    \r\n\
    Contrariamente a quanto si crede, il vero nome di Criceto \xC3\xA8 Criceto Morris. Purtroppo, una stanghetta della M \xC3\xA8 stata inavvertitamente amputata da un calcio rotante eseguito da Criceto all'anagrafe. \r\n\
    \r\n\
    I globuli bianchi di Criceto sono sue copie in miniatura e sconfiggono i virus a calci rotanti. \r\n\
    \r\n\
    Criceto non bagnava il letto da bambino. Il letto si bagnava da solo per la paura. \r\n\
    \r\n\
    Ne uccide pi\xC3\xB9 la penna della spada. Criceto uccide pi\xC3\xB9 della penna. \r\n\
    \r\n\
    Quando Criceto fa le flessioni, non alza s\xC3\xA8 stesso, abbassa la Terra. \r\n\
    \r\n\
    Uno studio ha rivelato che le principali cause di morte negli Stati Uniti sono: \r\n\
    1-infarto \r\n\
    2-Criceto \r\n\
    3-cancro \r\n\
    \r\n\
    Criceto non porta l'orologio. Decide lui che ora \xC3\xA8. \r\n\
    \r\n\
    Il titolo originale di \"Alien vs Predator\" era \"Alien e Predator vs Criceto\". Il film \xC3\xA8 stato cancellato subito dopo essere entrato in preproduzione. Nessuno avrebbe pagato nove dollari per vedere un film che durava 14 secondi. \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    NUOVE AVVENTURE DI SUPERCRICETO!!\r\n \r\n\
    Quando Criceto fa sesso con un uomo, non \xC3\xA8 perch\xC3\xA9 \xC3\xA8 gay, ma perch\xC3\xA9 aveva finito le donne. \r\n\
    \r\n\
    Criceto non legge i libri. \r\n\
    Li fissa fino a quando non ottiene le informazioni che gli servono. \r\n\
    \r\n\
    Se chiedete l'ora a Criceto lui vi risponder\xC3\xA0 \"Ancora due secondi.\" \r\n\
    Dopo aver chiesto \"Ancora due secondi cosa?\", vi colpisce con un calcio volante a girare. \r\n\
    \r\n\
    Criceto usa i profilattici stimolanti al rovescio, cos\xC3\xAC pu\xC3\xB2 provare piacere. \r\n\
    \r\n\
    Dal 1940, anno di nascita di Criceto, le morti causate da calci volanti a girare sono aumentate del 13.000%. \r\n\
    \r\n\
    Non ci sono disabili. Solo persone che hanno incontrato Criceto. \r\n\
    \r\n\
    Non c'\xC3\xA8 mento dietro alla barba di Criceto. \r\n\
    C'\xC3\xA8 solo un altro pugno. \r\n\
    \r\n\
    Una volta si credeva che Criceto avesse perso uno scontro con un pirata, ma \xC3\xA8 un falso, creato da Criceto stesso per attirare pi\xC3\xB9 pirati su di lui. \r\n\
    \r\n\
    Criceto una volta si \xC3\xA8 schierato per calciare il tiro di trasformazione di una partita di football tra scuole superiori. \r\n\
    Visto che il pallone si era forato, ha persuaso gli arbitri a fargli effettuare il calcio con un putto di 3 mesi. \r\n\
    Criceto ha spedito 60 metri oltre i limiti del campo, e poi ha proceduto a scoparsi ogni ragazza dello stadio. \r\n\
    \r\n\
    Quando la moglie di Criceto ha bruciato il tacchino il giorno del Ringraziamento, Criceto ha detto: \"Non preoccuparti tesoro\" e si \xC3\xA8 diretto nel cortile dietro casa. \r\n\
    Dopo cinque minuti \xC3\xA8 rientrato con un tacchino vivo, lo ha interamente ingoiato, e quando l'ha ritirato fuori pochi secondi dopo era interamente cotto in salsa di mirtilli. \r\n\
    Alla richiesta di spiegazioni da parte della moglie, Criceto l'ha colpita in volto con un calcio volante e ha dichiarato: \"Mai discutere con Criceto.\" \r\n\
    \r\n\
    Quelli che scorrono alla fine di una puntata di Walker Texas Ranger non sono i titoli di coda; in realt\xC3\xA0 \xC3\xA8 la lista delle persone che hanno ricevuto un calcio volante in faccia da Criceto quel giorno. \r\n\
    \r\n\
    Le lacrime di Criceto curano il cancro. Il problema \xC3\xA8 che lui non ha mai pianto. \r\n\
    \r\n\
    Criceto una volta diede un calcio volante cos\xC3\xAC veloce che il suo piede oltrepass\xC3\xB2 la velocit\xC3\xA0 della luce, torn\xC3\xB2 indietro nel tempo e uccise Amelia Earhart mentre si trovava in volo sopra l'Oceano Pacifico. \r\n\
    \r\n\
    Criceto non ha l'AIDS, ma lo trasmette comunque alle persone. \r\n\
    \r\n\
    Piuttosto che venire al mondo come un putto normale, Criceto ha deciso invece di guadagnarsi l'uscita dalla placenta della madre a forza di pugni. \r\n\
    Poco dopo gli spunt\xC3\xB2 la barba. \r\n\
    \r\n\
    Criceto ha costruito una macchina del tempo e l'ha usata per tornare indietro in tempo per fermare l'assassinio di JFK. Come Oswald spar\xC3\xB2, Criceto riusc\xC3\xAC a deviare la traiettoria dei tre proiettili con il solo uso della barba. \r\n\
    La testa di JFK per\xC3\xB2 esplose comunque dallo stupore. \r\n\
    \r\n\
    Criceto ha venduto l'anima al diavolo in cambio della ruvida bellezza e dell'incomparabile abilit\xC3\xA0 nelle arti marziali. \r\n\
    Subito dopo aver concluso la transazione, Criceto colp\xC3\xAC in faccia il diavolo con un calcio volante e si riprese indietro l'anima. \r\n\
    Il diavolo, che notoriamente apprezza l'ironia, ammise lo sbaglio e dichiar\xC3\xB2 che avrebbe dovuto schivare il colpo invece di abbassare la guardia. \r\n\
    La coppia ora si ritrova per il poker ogni secondo Mercoled\xC3\xAC del mese. \r\n\
    \r\n\
    Un uomo una volta chiese a Criceto se il suo vero nome fosse \"Charles\". \r\n\
    Criceto non rispose, si limit\xC3\xB2 a fissare l'uomo fino a farlo esplodere. \r\n\
    \r\n\
    Criceto ha recentemente avuto l'idea di vendere la sua urina come bibita in lattina. \r\n\
    Il nome della bevanda \xC3\xA8 Red Bull. \r\n\
    \r\n\
    Criceto pu\xC3\xB2 portare una donna all'orgasmo semplicemente indicandola con un dito e dicendo \"booya\". \r\n\
    \r\n\
    Criceto non dorme. Aspetta. \r\n\
    \r\n\
    Criceto una volta abbatt\xC3\xA8 un'aereo tedesco puntandolo con un dito e urlando \"Bang!\" \r\n\
    \r\n\
    Dopo attenta analisi, il Presidente Truman scelse di lanciare la bomba atomica su Hiroshima all'alternativa di mandare Criceto. \r\n\
    Il motivo fu che venne ritenuta la soluzione pi\xC3\xB9 \"umana\". \r\n\
    \r\n\
    Criceto spesso chiede alle persone di tirargli il dito. \r\n\
    Quando lo fanno, li colpisce con un calcio volante nell'addome. Dopodich\xC3\xA8 scoreggia. \r\n\
    \r\n\
    Criceto \xC3\xA8 attualmente in causa con l'NBC, reclamando il fatto che Law and Order sono i nomi depositati per le sue gambe. \r\n\
    \r\n\
    Se riuscite a vedere Criceto, lui pu\xC3\xB2 vedere voi. \r\n\
    Se non riuscite a vedere Criceto potreste essere a pochi secondi dalla vostra morte. \r\n\
    \r\n\
    Criceto si \xC3\xA8 preso la mia verginit\xC3\xA0, e sicuramente prender\xC3\xA0 anche la vostra. \r\n\
    Se state pensando \"Impossibile, l'ho gi\xC3\xA0 persa\", vi state sbagliando di grosso. \r\n\
    \r\n\
    Criceto usa un serpente a sonagli vivo come preservativo. \r\n\
    \r\n\
    Gli Alieni esistono. \r\n\
    Stanno semplicemente aspettando la morte di Criceto, prima di attaccare. \r\n\
    \r\n\
    L'ex-ragazza di Criceto una volta gli chiese quanta legna avrebbe potuto fare una marmotta se le marmotte avessero potuto fare legna. \r\n\
    Lui url\xC3\xB2: \"COME OSI FARE RIME IN PRESENZA DI CRICETO!\" e le tagli\xC3\xB2 la gola. Tenendo la gola della ragazza ancora sanguinante tra le mani, mugg\xC3\xAC: \"Nessuno prende per il culo Criceto!\". \r\n\
    Due anni e cinque mesi dopo, cap\xC3\xAC l'ironia dell'affermazione e rise cos\xC3\xAC forte che chiunque nel raggio di 160km divent\xC3\xB2 sordo. \r\n\
    \r\n\
    Criceto era previsto come personaggio nel video game \"Street Fighter II\", ma fu rimosso dai Beta Testers perch\xC3\xA8 ogni bottone gli faceva comunque compiere un calcio a girare. \r\n\
    Quando gli viene chiesto di questo bug, Criceto dice \"Non era un bug.\"\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    CRICETO FOR PRESIDENT!!\r\n\
    \r\n\
    Per un nuovo miracolo Italiano vota Criceto. \r\n\
    Per il 18 politico vota Criceto. \r\n\
    Criceto, Pane e figa per tutti (anche per lui). \r\n\
    Ricorda, nel segreto dell'urna, Dio ti vede, Criceto anche. \r\n\
    Criceto, un uomo un perch\xC3\xA8, soprattutto un \"perch\xC3\xA8 no?\". \r\n\
    Vota Criceto, il voto \xC3\xA8 segreto. \r\n\
    Criceto ama la mamma, anche la tua. \r\n\
    \r\n\
    ma la migliore resta sempre: \r\n\
    \"Criceto c'\xC3\xA8!!\" \r\n\
    (scrivila sui cavalcavia autostradali)\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    CRICETO FOREVER!!\r\n\
    \r\n\
    Criceto \xC3\xA8 il Gran Maestro, ma \xC3\xA8 troppo impegnato a salvare il mondo e perci\xC3\xB2 ha delegato in gran segreto Tornasole. \r\n\
    \r\n\
    Criceto non gaudea davanti a tutti perch\xC3\xA8 alla fine lancerebbe un sonoro rutto che strapperebbe a tutti la feluca dalla testa e dalle mani e si troverebbe poi a doverci uccidere tutti per non pagare gli scazzi. \r\n\
    \r\n\
    Criceto ha un panzer tedesco come amenicolo, ma dice che per contropesare la feluca si sta procurando lo Sputnik II da Putin. Con le minacce di fare esplodere anche il serbatoio 4 di Chernobyl.. \r\n\
    \r\n\
    Il serbatoio 2 di chernobyl non \xC3\xA8 esploso da solo: \xC3\xA8 stato Criceto che ci ha buttato dentro Lasagna (chi l'ha pi\xC3\xB9 visto?) solo perch\xC3\xA8 era dell'Oca. \r\n\
    \r\n\
    Criceto al collo non ha il Cuore di Montecristo: ha il telecomando per l'autodistruzione del mondo camuffato da Cuore di Montecristo. \r\n\
    \r\n\
    Quando sono nati Scontex ed Ericius erano alti uguali: poi Criceto ha roteato 1264 volte in un minuto Scontex e l'ha scagliato contro Ericius alla folle velocit\xC3\xA0 di mach3.. \r\n\
    \r\n\
    Criceto sta cercando Ipot\xC3\xA8ticus per strappargli peli e barba che spettano a lui di diritto. \r\n\
    \r\n\
    Attraverso gli occhiali Criceto vede tutti nudi tranne Animalo che non \xC3\xA8 un bello spettacolo. \r\n\
    \r\n\
    Una volta Criceto e Badello si sono incrociati con lo sguardo: l'antimateria che si form\xC3\xB2 quel giorno uccise 18 persone e fagocit\xC3\xB2 Elvis Presley. \r\n\
    \r\n\
    Io conosco Criceto ma lui continua a dire che mi conoscer\xC3\xA0 solo dopo che mi avr\xC3\xA0 ammazzato. \r\n\
    \r\n\
    Criceto non sorride: digrigna i denti come i lupi famelici. \r\n\
    \r\n\
    Criceto non si incazza mai: il giorno che si incazzer\xC3\xA0 non potremo raccontarlo. \r\n\
    \r\n\
    Sherif (lo scroccone del Contavalli) non domanda pi\xC3\xB9 le sigarette in giro da quando ha scoperto che Criceto ha sempre un pacchetto in tasca e rischierebbe di chiedergliene una distrattamente!"
