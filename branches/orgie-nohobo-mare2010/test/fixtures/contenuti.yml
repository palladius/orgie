contenuti_065: 
  m_bInAttesa: "0"
  datapubblicazione: 2006-07-12 18:51:46
  datacreazione: 2006-01-25 01:50:07
  m_bSerio: "0"
  idlogin: "1849"
  m_nLivelloSegretezza: "5"
  titolo: frasi romantiche per le ragazze
  idcontenuto: "95515559"
  tipo: cazzate
  idloginpubblicante: "1849"
  m_battivo: "1"
  contenuto: "Mi piacerebbe che fossi una porta, cos\xC3\xAC potrei sbatterti tutto il giorno.\r\n\
    \r\n\
    (Dopo averle leccato la maglietta) Perch\xC3\xA9 non ti togli questi vestiti umidi?\r\n\
    \r\n\
    Belle gambe... A che ora aprono?\r\n\
    \r\n\
    Hai 206 ossa nel corpo, ne vuoi una in +?\r\n\
    \r\n\
    Non sar\xC3\xB2 il tipo + bello nei paraggi, ma sono l'unico che ti parla assieme.\r\n\
    \r\n\
    Oh, scusami, pensavo che fosse una sigla in braille.\r\n\
    \r\n\
    Sono vere?\r\n\
    \r\n\
    Lo sai, se fossi te, farei sesso con me.\r\n\
    \r\n\
    Tu. Io. Panna montata. Manette. Qualche domanda?\r\n\
    \r\n\
    Scopami se sbaglio, ma il tuo nome non \xC3\xA8 Helga?\r\n\
    \r\n\
    Il mio nome \xC3\xA8 XYZ... Ricordalo, lo urlerai + tardi.\r\n\
    \r\n\
    Credi nell'amore a prima vista o devo ritornare?\r\n\
    \r\n\
    Ti va una pizza e un po' di sesso? No? Non ti piace la pizza?\r\n\
    \r\n\
    Hey, belle scarpe... Vuoi scopare?\r\n\
    \r\n\
    Con lei che lecca il gelato: Lui - Posso dare una leccata? Lei -Nooooo!!! Lui - E al gelato...?\r\n\
    \r\n\
    Salve, sono iscritto all'AIDO. Ti interesserebbe un organo...?\r\n\
    \r\n\
    cara amica, prendi esempio dal grande Lucio, ... Dalla!!\r\n\
    \r\n\
    Sono in fin di vita e sono vergine. Se me la dai poi metto una buona parola con il padre eterno(SXXS)\r\n\
    \r\n\
    Ciao, ti ho guardata un po' e ho preso in considerazione l'opportunit\xC3\xA0 di provarci con te, poi per\xC3\xB2 ho pensato che sarebbe stato pi\xC3\xB9 bello che ci avessi provato TU con me, sai tanto per cambiare. Bene, io sono disponibile quindi sai gi\xC3\xA0 che se ci provi con me non vai in bianco. A te la prima mossa. (SXXS)\r\n\
    \r\n\
    I tuoi vestiti starebbero bene sul pavimento accanto al mio letto. (Fatina Sgualdrina)\r\n\
    \r\n\
    Se indovini cosa c'ho tra le gambe te ne do' un'ala (ptta)\r\n\
    \r\n\
    Ho un grosso affare tra le mani, ti interessa? (ZYXTEL76)\r\n\
    \r\n\
    Tolgiti le mutande che ti voglio parlare!!!! (ZYXTEL76) "
contenuti_101: 
  m_bInAttesa: "0"
  datapubblicazione: 2008-06-25 10:24:11
  datacreazione: 2008-06-25 10:22:41
  m_bSerio: "0"
  idlogin: "953"
  m_nLivelloSegretezza: "5"
  titolo: AVVISO AGLI STUDENTI AVVISO AGLI STUDENTI
  idcontenuto: "1626622843"
  tipo: cazzate
  idloginpubblicante: "953"
  m_battivo: "1"
  contenuto: "\r\n\
    ( durex 69, 2008-06-24 20:29:58) \r\n\
    \r\n\
    Per tutti gli studenti di Ingegneria Meccanica, Civile, Eletttronica ed Informatica, si rende noto che \xC3\xA8 in fondazione un nuovo indirizzo di Ingegneria rivolto a chi ha una visione pi\xC3\xB9 naturalistica della tecnologia \r\n\
    moderna. E' cos\xC3\xAC nato il corso di Ingegneria Sessuale suddiviso negli indirizzi etero, omo e/o trans. Il Corso di Laurea dura una vita e comprende 18 annualit\xC3\xA0 comuni, pi\xC3\xB9 10 esami propedeutici. Gli esami fondamentali per il corso sono: \r\n\
    \r\n\
    I\xC2\xB0 anno \r\n\
    1) Anal 1 \r\n\
    2) Disegno dei cazzi sui quaderni \r\n\
    3) Sfondamenti di informatica \r\n\
    4) Chimica del piacere \r\n\
    5) Ricerca delle zone erogene \r\n\
    \r\n\
    II\xC2\xB0 anno \r\n\
    6) Anal 2 \r\n\
    7) Scienza delle fiche \r\n\
    8) Elettronica applicata a 'sto astrokazzo di Gundam \r\n\
    9) Topagrafia \r\n\
    10) Meccanica degli amplessi \r\n\
    \r\n\
    III\xC2\xB0 anno \r\n\
    11) Sessuologia tecnica \r\n\
    12) Macchine del piacere \r\n\
    13) Idraulica anale \r\n\
    14) Teoria degli amplessi 1 \r\n\
