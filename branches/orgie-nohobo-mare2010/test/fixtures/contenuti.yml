  m_nLivelloSegretezza: "0"
  titolo: Statuto dei Democratici di Sinistra (secondo il Dott. Brodin)
  idcontenuto: "1659305007"
  tipo: attualita
  idloginpubblicante: "3"
  m_battivo: "1"
  contenuto: "DS\t(brodin, 2005-09-13 13:46:07)\r\n\
    \r\n\
    Statuto dei Democratici di sinistra\r\n\
    Modificato a Roma il 3/4/5 febbraio 2005\r\n\
    \r\n\
    Parte Prima \xE2\x80\x93 Principi fondamentali\r\n\
    \r\n\
    Titolo I \xE2\x80\x93 I valori\r\n\
    \r\n\
    Articolo 1 \xE2\x80\x93 Valori fondanti\r\n\
    \r\n\
    1) Costituiti sul convergere di differenti tendenze culturali e politiche che si rifanno ai valori democratici e antifascisti fondativi della Repubblica italiana, al pensiero socialista \xE2\x80\x93 nella pluralit\xC3\xA0 delle esperienze storiche riconducibili alla tradizione democratica e riformista del Pci, del Psi e del movimento operaio italiano \xE2\x80\x93, al pensiero laico e repubblicano, al pensiero cristiano sociale, al pensiero ecologista, aperti all\xE2\x80\x99incontro con culture e movimenti che hanno messo al centro della loro azione i diritti umani e il valore delle differenze, il personalismo comunitario e la salvaguardia dell\xE2\x80\x99ambiente, i democratici di Sinistra assumono queste tendenze consapevoli della necessit\xC3\xA0 della loro continua rielaborazione a confronto con le sfide della modernizzazione e del mondo che cambia e si uniscono per contribuire alla costruzione di una societ\xC3\xA0 aperta e plurale, libera e solidale, giusta e sicura.\r\n\
    \r\n\
    2) Il partito dei \xE2\x80\x9CDemocratici di Sinistra\xE2\x80\x9D, cofondatore del Partito del Socialismo Europeo, aderisce all\xE2\x80\x99Internazionale Socialista e si riconosce nelle idealit\xC3\xA0 e nei valori del socialismo democratico.\r\n\
    \r\n\
    3) Gli iscritti e le iscritte ai Democratici di Sinistra condividono i valori della libert\xC3\xA0 e dell\xE2\x80\x99uguaglianza, dell\xE2\x80\x99equit\xC3\xA0 e della giustizia, del lavoro, della solidariet\xC3\xA0 sociale, della pace. Operano per affermare tutti i diritti di cittadinanza promuovendo uno sviluppo umano sostenibile e una societ\xC3\xA0 interetnica e interculturale.\r\n\
    \r\n\
    4) Per i Democratici di Sinistra la libert\xC3\xA0 \xC3\xA8 strettamente legata all\xE2\x80\x99uguaglianza e si fonda sul riconoscimento della differenza come valore, rifiutando ogni discriminazione di sesso e di orientamento sessuale, di razza, religione, cultura. La libert\xC3\xA0 nell\xE2\x80\x99uguaglianza si afferma pienamente nella fraternit\xC3\xA0 e quindi nella solidariet\xC3\xA0 che ne \xC3\xA8 la forma sociale. I Democratici di Sinistra si impegnano per il superamento delle disuguaglianze sociali e per la piena affermazione delle pari opportunit\xC3\xA0 per ognuno. Il dispiegarsi delle libert\xC3\xA0 individuali trova la sua prima sede nelle dimensioni relazionali, familiari e comunitarie. In coerenza con questi valori, e con i principi della Costituzione Repubblicana, i Democratici di Sinistra assumono i diritti umani, i diritti di tutte le donne e di tutti gli uomini come criterio costitutivo della loro politica e si impegnano a promuovere una convivenza civile fortemente orientata allo sviluppo delle libert\xC3\xA0 individuali, al diritto di ogni donna e di ogni messere a progettare e realizzare il proprio sviluppo umano e la propria cittadinanza civile e politica. Per i Democratici di Sinistra la cittadinanza \xC3\xA8 garanzia di diritti e di opportunit\xC3\xA0 per gli individui e, insieme, assunzione di responsabilit\xC3\xA0 di ciascuno verso la libert\xC3\xA0 degli altri e di tutti.\r\n\
    \r\n\
    5) I Democratici di Sinistra condividono una concezione della politica che ha forte il senso delle sue ragioni fondanti e la consapevolezza del proprio limite. Aderiscono con convinzione all\xE2\x80\x99idea e alla pratica di uno stato laico e sono per una politica fortemente orientata a valori. In una realt\xC3\xA0 di pluralismo etico e di fronte a questioni complesse e delicate come quelle che riguardano la vita umana, il nascere e il morire, le relazioni interumane, la non-violenza, il partito e la sua politica riconoscono e rispettano la libert\xC3\xA0 di coscienza di tutti e concorrono a delineare i tratti di un\xE2\x80\x99etica civile condivisa.\r\n\
    \r\n\
    6) I Democratici di Sinistra assumono pienamente la coscienza e la responsabilit\xC3\xA0 verso tutte le specie viventi e la promuovono impegnandosi, in particolare, a salvaguardare le condizioni che rendono sostenibile sulla Terra la vita delle generazioni future.\r\n\
    \r\n\
    7) Il partito \xE2\x80\x9CDemocratici di Sinistra\xE2\x80\x9D \xC3\xA8 un partito di donne e di uomini che promuove la democrazia paritaria e il superamento della divisione dei ruoli tra donne e uomini nella societ\xC3\xA0 e nella politica. Assume, pertanto, isto orientamento come costitutivo nell\xE2\x80\x99organizzazione, nella democrazia e nell\xE2\x80\x99elaborazione progettuale del partito.\r\n\
    \r\n\
    8) Per i Democratici di Sinistra un rinnovato patto di solidariet\xC3\xA0 tra le generazioni \xC3\xA8 uno dei valori e degli obiettivi centrali per la ricostruzione di un pi\xC3\xB9 ampio patto sociale nel paese. Sono dunque impegnati a realizzare nel partito una forte promozione dell\xE2\x80\x99adesione dei giovani, un dialogo costante tra le generazioni, un\xE2\x80\x99elaborazione progettuale e un\xE2\x80\x99iniziativa politica coerenti.\r\n\
    \r\n\
    9) I Democratici di Sinistra assumono il valore della non violenza come principio regolatore delle relazioni tra le persone, tra i popoli, tra le nazioni, tra gli stati.\r\n\
    \r\n\
    10) I Democratici di Sinistra sono un partito che si fonda sui principi di sussidiariet\xC3\xA0 e di federalismo solidale e che organizza la sua democrazia federale secondo i principi della democrazia di mandato.\r\n\
    \r\n\
    11) I Democratici di Sinistra sono un partito in cui la sovranit\xC3\xA0 appartiene alle iscritte ed agli iscritti che la esercitano secondo le modalit\xC3\xA0 democratiche e le garanzie previste dal presente Statuto Nazionale.\r\n\
    \r\n\
    12) Il Consiglio nazionale dei Garanti verifica la coerenza degli Statuti regionali con i principi generali dello Statuto.\r\n\
    \r\n\
    Articolo 2 \xE2\x80\x93 Il simbolo dei Democratici di Sinistra\r\n\
    \r\n\
    1) Il simbolo del partito Democratici di Sinistra \xC3\xA8 l\xE2\x80\x99immagine di un albero con chioma verde e tronco marrone piantato su un terreno di verde pi\xC3\xB9 chiaro. Il tronco si inserisce nel fogliame con quattro rami. Nella parte superiore intorno alla chioma dell\xE2\x80\x99albero, si sviluppa la scritta DEMOCRATICI DI SINISTRA, di colore rosso. Accanto al tronco campeggia una rosa rossa con gambo verde. Nella parte inferiore, in bianco su fondo verde, c\xE2\x80\x99\xC3\xA8 la scritta Partito del Socialismo Europeo. Il fondo del simbolo \xC3\xA8 bianco.\r\n\
    \r\n\
    2) Il Segretario del Partito \xC3\xA8 responsabile del simbolo e ne autorizza l\xE2\x80\x99uso secondo il regolamento approvato dalla Direzione nazionale.\r\n\
    \r\n\
    Titolo II \xE2\x80\x93 L\xE2\x80\x99iscrizione: diritti e doveri\r\n\
    \r\n\
    Articolo 3 \xE2\x80\x93 L\xE2\x80\x99iscrizione\r\n\
    \r\n\
    1) Possono liberamente associarsi ai Democratici di Sinistra ogni donna e ogni messere cittadini italiani, ovunque residenti, e cittadini dell\xE2\x80\x99Unione Europea o di altri paesi che abitano in Italia o dove il partito abbia una struttura organizzata, che condivida le finalit\xC3\xA0, i valori fondanti e l\xE2\x80\x99ispirazione programmatica del partito.\r\n\
    \r\n\
    2) L\xE2\x80\x99iscrizione \xC3\xA8 un patto politico che d\xC3\xA0 vita ad una reciproca assunzione di diritti e di responsabilit\xC3\xA0 tra chi si associa e il partito. I contenuti e le regole del patto sono stabiliti in isto Statuto.\r\n\
    \r\n\
    3) L\xE2\x80\x99iscrizione al partito \xC3\xA8 individuale e annuale. La sua registrazione al fine della partecipazione alla vita democratica del partito, avviene presso la Sezione del comune di residenza, o di domicili o di luogo di lavoro, pagando la quota di iscrizione prevista, e ricevendo la tessera.\r\n\
    La richiesta di iscrizione pu\xC3\xB2 esercitarsi anche tramite le sedi della Direzione nazionale, la Sezione online, le Autonomie tematiche e le Consulte di cui all\xE2\x80\x99art 8 C, le Associazioni politico-culturali di cui all\xE2\x80\x99art 10 secondo le modalit\xC3\xA0 previste dal Regolamento per l\xE2\x80\x99Anagrafe degli iscritti.\r\n\
    Presso il Dipartimento Organizzazione/Partito della Direzione nazionale e presso le strutture organizzative delle Unioni regionali e delle Federazioni viene istituito un Ufficio per le adesioni al Partito.\r\n\
    Tali Uffici avranno il compito di gestire il tesseramento, di promuovere, con apposite campagne, l\xE2\x80\x99adesione, di registrare le richieste di iscrizione.\r\n\
    L\xE2\x80\x99Ufficio nazionale registra le richieste di adesione pervenute direttamente alle sedi della Direzione nazionale o tramite la Sezione online, le Autonomie tematiche, le Consulte e le Associazioni politico-culturali e le trasmette tempestivamente all\xE2\x80\x99Ufficio della Federazione di competenza. Questa le trasmette al Segretario della Sezione interessata, il quale ha l\xE2\x80\x99incarico di contattare immediatamente il richiedente dell\xE2\x80\x99adesione.\r\n\
    Le richieste sono depositate e datate, per iscritto o per e-mail presso i vari Uffici (nazionale, regionale, federale e presso la Sezione).\r\n\
    La richiesta di adesione alla Sezione deve essere accettata o respinta, in tal caso con motivazione scritta, entro un termine di quattro settimane; decorso tale termine si d\xC3\xA0 per acquisita la iscrizione.\r\n\
    Quando una richiesta di iscrizione alla Sezione del Partito viene respinta o vengono presentate obiezioni, l\xE2\x80\x99interessato ha la possibilit\xC3\xA0 di presentare ricorso all\xE2\x80\x99Ufficio nazionale, che di concerto con l\xE2\x80\x99Ufficio federale per le adesioni, adotta una decisione in un tempo breve.\r\n\
    Contro la decisione di quest\xE2\x80\x99ultimo \xC3\xA8 possibile ricorrere presso il Consiglio di garanzia del livello superiore.\r\n\
    \r\n\
    4) L\xE2\x80\x99iscrizione, ai fini dell\xE2\x80\x99elettorato attivo e passivo, \xC3\xA8 perfezionata dalla certificazione, all\xE2\x80\x99associato o all\xE2\x80\x99associata e all\xE2\x80\x99organizzazione che ha rilasciato la tessera, da parte dell\xE2\x80\x99Anagrafe degli iscritti.\r\n\
    \r\n\
    5) Le iscritte e gli iscritti dei Partiti membri del PSE (Partito del Socialismo europeo) non italiani, residenti in Italia possono iscriversi ai Democratici di Sinistra e partecipare alla vita democratica del Partito.\r\n\
    \r\n\
    6) L\xE2\x80\x99Anagrafe degli iscritti registra e verifica l\xE2\x80\x99unicit\xC3\xA0 dell\xE2\x80\x99iscritto anche in presenza di sua partecipazione a diverse articolazioni del partito. Sulla tessera sono riportate, a cura dell\xE2\x80\x99organizzazione che l\xE2\x80\x99ha rilasciata, anche le adesioni ad altre organizzazioni federate e l\xE2\x80\x99avvenuto pagamento della quota associativa. L\xE2\x80\x99Anagrafe archivia i dati delle iscritte e degli iscritti secondo un programma informatico unico nazionale, definito e annualmente aggiornato dal Consiglio nazionale di garanzia con il concorso delle Federazioni e delle Unioni regionali e da esse condiviso. La verifica dell\xE2\x80\x99Anagrafe viene svolta annualmente dal Consiglio nazionale di Garanzia che nomina, nel rispetto del pluralismo, una sua sottocommissione incaricata di certificare l\xE2\x80\x99Anagrafe degli iscritti. Laddove a livello di Federazione l\xE2\x80\x99Anagrafe degli iscritti non sia stata istituita, o non risulti adeguatamente aggiornata, il Segretario nazionale, previo parere del Presidente del Consiglio nazionale di Garanzia, nomina un commissario ad acta. La violazione delle norme per la correttezza dell\xE2\x80\x99Anagrafe \xC3\xA8 considerata caso di danno al partito.\r\n\
    \r\n\
    7) La gestione dell\xE2\x80\x99Anagrafe deve essere adeguata ai fini di analizzare la composizione e l\xE2\x80\x99insediamento del partito, ad organizzare la informazione delle iscritte e degli iscritti, a promuovere la loro consultazione e partecipazione democratica. L\xE2\x80\x99Anagrafe degli iscritti opera, sulla base di un regolamento approvato dalla Direzione nazionale del partito, in collaborazione con gli Uffici per le adesioni. La Direzione del partito delibera il Regolamento entro tre mesi dal suo insediamento.\r\n\
    \r\n\
    8) L\xE2\x80\x99iscrizione al partito \xC3\xA8 incompatibile con l\xE2\x80\x99iscrizione ad un altro partito o a movimenti che presentino liste concorrenziali a quelle del partito in consultazioni elettorali, altres\xC3\xAC con il sostegno a liste o coalizioni non sostenute dal partito. La dichiarazione di incompatibilit\xC3\xA0 e la sua risoluzione sono regolate dal regolamento disciplinare.\r\n\
    \r\n\
    9) L\xE2\x80\x99iscrizione al partito \xC3\xA8 incompatibile con l\xE2\x80\x99iscrizione, o la partecipazione, ad associazioni che comportino un vincolo di segretezza e forme di mutuo sostegno, tali da porre in pericolo il pieno rispetto dei principi di uguaglianza di fronte alla legge e di imparzialit\xC3\xA0 della Pubblica amministrazione sanciti dalla Costituzione. Essa \xC3\xA8 altres\xC3\xAC incompatibile con l\xE2\x80\x99adesione a associazioni culturali e politiche che professino idee e pratichino politiche palesemente in contrasto con i valori fondanti di cui al presente Statuto."
contenuti_066: 
  m_bInAttesa: "0"
  datapubblicazione: 2006-06-14 16:13:49
  datacreazione: 2006-01-25 01:55:31
  m_bSerio: "0"
