  titolo: Editoriale
  idcontenuto: "758818556"
  tipo: PALNEWS
  idloginpubblicante: "3"
  m_battivo: "1"
  contenuto: "Bella l\xC3\xAC a tutti quanti!\r\n\
    Mi presento: io sono [qgfd] Palladius, attuale Marchese a Vita di Montecristo (x saperne di pi\xC3\xB9 su di me, visitate la mia <a href=\"http://www.palladius.it/\">HOMEPAGE</a>, contiene cose a mio parere interessanti). \r\n\
    \r\n\
    Questo sito pu\xC3\xB2 considerarsi una <b>e-community goliardica</b>, nel senso che raccoglie utenti perlopi\xC3\xB9 goliardi (cos'\xC3\xA8 la goliardia? Non potrei dare una definizione senza che met\xC3\xA0 dei frequentatori del sito mi scannino... diciamo che \xC3\xA8 un modo gaudioso di vivere l'Universit\xC3\xA0 e di intendere la vita) e consente loro di interagire. <u>Non \xC3\xA8 assolutamente un sito per soli goliardi</u>: chiunque (possibilmente belle gnocche) \xC3\xA8 ben accetto. Ovviamente se siete goliardi vi divertirete di pi\xC3\xB9 poich\xC3\xA8 molti contenuti 'di nicchia' sono difficilmente comprensibili dal resto del mondo. Ma a voi provarci... :-)\r\n\
    \r\n\
    Cosa troverete in questo sito:\r\n    * Un <b>forum</b> in cui dire tutto ci\xC3\xB2 che si vuole (o quasi).\r\n    * Un sistema di GMS, simile agli sms in modo da non intasare il forum x msg privati.\r\n     * Un <b>calendario</b> in cui mettere le occasioni goliardiche (cene, feste, ...)\r\n     * Una belizzima chat in cui condividere emozioni e numeri di telefono ;-) con altri utenti (\xC3\xA8 lenta e inefficiente, non x colpa mia ma x motivi tecnologici: qua dentro abbiamo quasi tutti MSN e quindi siete invitati a mettere l'account nel vs profilo...)\r\n     * un bel gioco delle coppie in cui condividere voti, gusti sessuali e non solo, insomma un piccolo angolo rosa.\r\n     * un insieme di FAQ da leggere prima di rompere i coglioni al WebMaster (DAVVERO! Al mondo esiste chi lavora ed \xC3\xA8 triste sentirsi sempre chiedere le stesse cose quando la risposta \xC3\xA8 a portata di click; un tempo ero gentile ed educato, ora proprio smetto di rispondere!)\r\n     * documentazione di ordini goliardici di tutta italia (ho voluto filtrare solo quelli vivi e attivi, se no sai quante pagine mezze vuote...) e di goliardi singoli.\r\n\
    \r\n\
    Purtroppo <b>questo sito \xC3\xA8 a login</b>, sia per motivi di privacy/sicurezza, sia per motivi di efficienza. Non me ne vogliate, ma cos\xC3\xAC \xC3\xA8. Capisco che sia una rottura, ma \xC3\xA8 stato necessario. Se vi consola, sappiate che la vostra email viene sfruttata SOLAMENTE x mandarvi la pwd, o da me x chiedervi 2 3 cose (foto + bella, di dove sei, e cos\xC3\xAC via). Rimane invisibile agli altri utenti a meno che non siate a voi a decidere <i>esplicitamente</i> di renderla pubblica."
