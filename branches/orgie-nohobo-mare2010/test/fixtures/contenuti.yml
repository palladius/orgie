  titolo: In ricoro di Arturo Golia II
  idcontenuto: "1130940524"
  tipo: goliardia
  idloginpubblicante: "1818"
  m_battivo: "1"
  contenuto: "Ricordo che quel giorno , in Bocconi , il mio incontro con la goliardia non fu proprio esaltante. Ero matricola , non ero particolarmente contento di varcare la soglia di quell\xE2\x80\x99universita\xE2\x80\x99  ed ero licealmente infastidito dall\xE2\x80\x99idea di essere maltrattato da qualche anziano (se ne parlava con riverenza mista a terrore)  in ragione di chiss\xC3\xA0maicosa.\r\n\
    Entrai dunque nell\xE2\x80\x99atrio , non molto affollato , dirigendomi verso la scala che portava alle aule e pensando \xE2\x80\x9C be\xE2\x80\x99 in fondo fin qui e\xE2\x80\x99tutto tranquillo\xE2\x80\x9D. A quel punto, circa all\xE2\x80\x99altezza del quarto gradino, risuono\xE2\x80\x99 dietro di me la fatidica frase :\xE2\x80\x9C Ehi tu, matricola !\xE2\x80\x9D.\r\n\
    Il seguito fu molto deludente : mi aspettavo qualche domanda impossibile cui tentare di rispondere con arguzia ( sai tu dirmi qual\xE2\x80\x99e\xE2\x80\x99 il mistero della Sfinge, la quale prima caca e dopo spinge ?) e invece tutto si risolse nell\xE2\x80\x99accordo su un banale pizzo in Marlboro da pagarsi in data concordata presso il Pensionato, in cambio di un Papiro prefirmato, alquanto anonimo , senza alcun valore aggiunto , avaro  persino di bei disegni (ricordavo i cazzoni cardanici  visti su quello , esaltante ,di un\xE2\x80\x99amica che faceva biologia a  Padova)  che non parlava , non fumava ,non volava ,non fischiava e che nessuno mai  mi reclamo\xE2\x80\x99 , per controllare se lo portavo appresso come da consuetudine .\r\n\
    Questo fu l\xE2\x80\x99inizio : niente feluche ,niente mantelli ,niente Ordini , niente Abelardo..trasgressioni e donzelle  compiacenti , poi, neanche a sognarsele.\r\n\
    Poi vi fu silenzio , nessuno piu\xE2\x80\x99 mi cerco\xE2\x80\x99, non vi furono incontri , feste o baccanali , solo un anonimo  grigiore che si coloro\xE2\x80\x99 di rosso e di fracassi ben poco gioiosi nei mesi (caldi) che seguirono.\r\n\
    Ma i goliardi dov\xE2\x80\x99erano ? E si\xE2\x80\x99 che ero riuscito a vedere la mitica Corsa delle Bighe al Castello , avevo visto manti e piume della Tirannide ( seppi solo dopo cos\xE2\x80\x99era , al momento mi pareva bello) , goliardi in casacca , veicoli strani, gente che cantava...volti appassionati , anche qualche bella ragazza.\r\n\
    Poi, il nulla..no,anzi, il casino , le assemblee infuocate , gli animi furibondi.. altro che bimbe belle ! Solo  stuoli  di Erinni in preda a furori politici , ansiose di farsi trombare da qualche arrabbiato arrapato come un tapiro del Madagascar...\r\n\
    Finche\xE2\x80\x99 un mattino, uscendo incazzatissimo dall\xE2\x80\x99aula Maggiore dopo l\xE2\x80\x99ennesimo dibattito senza risultato ,incontrai il mio futuro di goliardo  urtandolo senza volerlo, mentre maledivo quei tempi vigliacchi,  e lui mi disse : \xE2\x80\x9Cfigurati cosa dovrei dire io che sto cercando di rimettere in piedi la Goliardia !\xE2\x80\x9D\r\n\
    Quelle parole e il modo con cui furono pronunciate mi fermarono. Lo guardai meglio : vidi un ragazzo dall\xE2\x80\x99aspetto serissimo (giuro, inizialmente avevo pensato a un qualche assistente giovane) e mi colpirono sia una certa aria di distacco dal generale casino, sia una sua borsa di cuoio  che sembrava piu\xE2\x80\x99 quella di un medico di campagna che quella di uno studente (\xE2\x80\x9Cci tengo anche un tubo d\xE2\x80\x99ottone\xE2\x80\x9D mi confesso\xE2\x80\x99 poco dopo, \xE2\x80\x9Cperche\xE2\x80\x99 non si sa mai\xE2\x80\x9D).\r\n\
    Nacque cosi\xE2\x80\x99 l\xE2\x80\x99amicizia con Tiziano , in arte Tiziano VI il Gufo, grande  goliarda che qualcuno maliziosamente ridenominava il Pettirosso per la gentilezza dei suoi modi e per un certo qual colore di fodera del suo mantello , oltreche\xE2\x80\x99 per una sua predilezione a farsi presente con donzelle generalmente molto giovani.\r\n\
    \r\n\
    Tiziano era allora l\xE2\x80\x99unico referente del Mercurio , il mitico Ordine ormai decaduto della Bocconi e cercava accoliti per ridare vita ad un minimo di attivita\xE2\x80\x99 goliardica , se non nell\xE2\x80\x99ambito dell\xE2\x80\x99universita\xE2\x80\x99 , dove ormai contavano di piu\xE2\x80\x99 i violenti, almeno nel privato e nelle feste che ancora a volte  si tenevano in qualche locale. \r\n\
    Fui quindi coinvolto in alcuni incontri di tipo carbonaro, sfociati poi nell\xE2\x80\x99ammissione a un clandestino meeting serale presso il bar Matricola (il nome mi sembro\xE2\x80\x99 promettente) dove ci (nel frattempo si aggiunse qualche altro incauto)  sarebbe stato presentato nientepopodimeno che il Gran Maestro cittadino.\r\n\
    E qui , devo dire, le cose presero una piega decisiva : il suddetto Gran Maestro era (per me che avevo vent\xE2\x80\x99 anni) un rispettabile giovin signore, con baffi e pizzetto alla Robert Taylor (Lancillotto ,nel mitico I Cavalieri della Tavola Rotonda )  che mi incanto\xE2\x80\x99 subito per la schiettezza dei modi , il parlare franco , il lasciar trasparire, dietro una burbera e in parte autoironica consapevolezza del ruolo , l\xE2\x80\x99ombra di un Sogno forse non pienamente dichiarato nemmeno a se\xE2\x80\x99 stesso ,ma sicuramente vissuto quasi come  un imperativo categorico.\r\n\
    Il Personaggio era sicuramente interessante e quella prima positiva impressione venne   confermata ,poco tempo dopo ,da una mitica serata (di soli uomini,ovviamente.. le premesse erano gia\xE2\x80\x99 quelle) trascorsa nel suo \xE2\x80\x9Cscannatoio\xE2\x80\x9D di Segrate (introvabile covo avvolto nelle nebbie padane)  fra progetti , battute , brindisi e ..merdoline di criceto (i suoi criceti) inopinatamente scoperte nei calici.\r\n\
    Fu cosi\xE2\x80\x99 che conobbi Arturo ,detto anche Golia II o, meglio, Il Bedendo, magico nome capace di evocare in un sol colpo , per noi studentelli, autonomia, indipendenza, spirito d\xE2\x80\x99iniziativa, fascino dell\xE2\x80\x99 uomo arrivato, accesso a belle gnocche ,capacita\xE2\x80\x99 di affrontare ogni situazione e chi piu\xE2\x80\x99 ne ha piu\xE2\x80\x99 ne metta (sfido chiunque a sostenere che a quel tempo non ci apparisse cosi\xE2\x80\x99) .\r\n\
    Dunque, il Bedendo spiego\xE2\x80\x99 chiaramente che ci attendeva un\xE2\x80\x99opera praticamente disperata perche,\xE2\x80\x99 si\xE2\x80\x99 , era vero che gli studenti avevano ancora voglia di divertirsi ma , purtroppo,  la goliardia si era  autocastrata  a causa di troppi anni malamente portati avanti, senza idee, ciurlando nel manico di una comoda consuetudine il cui aspetto piu\xE2\x80\x99 evidente e quotidiano era lo sfruttamento degli studenti.\r\n\
    A quel punto, disse ancora l\xE2\x80\x99Arturo, gli Ordini si erano autodissolti, qualcuno aveva rimediato sganassoni assembleari , la maggior parte aveva smesso feluche e altri orpelli (anzi,molti si erano pure fregati le insegne stesse degli Ordini) e quindi era tutto da rifondare senza poter contare su maestri o su testi da cui trarre ispirazione  (solo tradizione orale, fatti e...via andare !) , contro tutti e senza speranze di ricevere incoraggiamenti da alcuno.\r\n\
    Venne dunque un periodo \xE2\x80\x9Ccripto\xE2\x80\x9D in cui , mentre fuori risuonavano le sirene e il clangore delle armi,  si cercarono adepti porta a porta , passando parola e con discrezione, iniziando a creare un gruppo da cementare  con partecipazioni a feste (genialmente predisposte anche sfruttando il temporaneo e non disinteressato contributo di un poliedrico maneggione non goliardico operante in Bocconi) , con incontri e bevute (allietate a volte da fuggevoli visioni di  belle damigelle) ,con discussioni  e con l\xE2\x80\x99attribuzione formale  di appartenenza alla Sacra Goliae Conphraternita , il nuovo Ordine Goliardico fondato dal Bedendo con l\xE2\x80\x99intento di far sopravvivere quel che di buono c\xE2\x80\x99era nella tradizione goliardica ( e c\xE2\x80\x99era, ve lo assicuro, bastava accantonare un po\xE2\x80\x99 di simbologia esteriore , usare la testa  per guardare dentro le cose , trovare i contenuti e  poi capire come reinventarli ) mettendo da parte , anche per comprensivi motivi logistici (si era veramente quattro gatti ,anzi no , forse sei..) , la suddivisione in Ordini, di cui comunque ciascuno poteva fregiarsi di far parte  sotto la piu\xE2\x80\x99 ampia protezione della Conphraternita ( credetemi, nessuno si sentiva per questo depauperato di qualche cosa anche perche\xE2\x80\x99, in alternativa , nelle universita\xE2\x80\x99 c\xE2\x80\x99erano solo i ben noti virtuosi della spranga ).\r\n\
    Sempre in quei tempi  il Bedendo ( coadiuvato da altri validi accoliti) varo\xE2\x80\x99 una titanica operazione di pubbliche relazioni nei confronti di alcune Autorita\xE2\x80\x99 cittadine, riuscendo in breve  a portarci , in costume d\xE2\x80\x99epoca rigorosamente fornito dal Piccolo Teatro, prepotentemente sulla scena pubblica  , nei panni di figuranti alla Festa dei Navigli dove impersonammo il Corteo Storico di Ludovico il Moro (giuro : il Moro /Bedendo me lo vedro\xE2\x80\x99davanti sino alla fine del tempo !) acquisendo quindi quel minimo di notorieta\xE2\x80\x99 positiva che contribui\xE2\x80\x99 a farci sopravvivere.\r\n\
    Grazie dunque anche a queste esperienze, corroborate da una trionfale Festa della Matricola al Castello,  il gruppo si ando\xE2\x80\x99 rafforzando e qualcuno, vista anche la positiva esperienza del Corteo Storico, penso\xE2\x80\x99 anche di riappropriarsi di qualche simbolo (mantelli , scudi , armi di rappresentanza...in fondo la derivazione medievale degli ordini piaceva a tutti) e qui una  svolta significativa  fu rappresentata dalla Sede, mitico scantinato su due piani (a scendere )  di via Jean Jaures , affittato dal Golia ( a quell\xE2\x80\x99epoca facoltoso dirigente di supermercato ) a costo di terribili danni, a noi poi eternamente rinfacciati,  al (suo) estratto conto : la\xE2\x80\x99 dentro la SGC (ma a me piace di piu\xE2\x80\x99 chiamarla la Golia) crebbe, si svezzo\xE2\x80\x99, celebro\xE2\x80\x99, creo\xE2\x80\x99 canzoni e coreografie , amoreggio\xE2\x80\x99 , litigo\xE2\x80\x99 ,soffri\xE2\x80\x99 , contesto\xE2\x80\x99 pure lo stesso Golia , origino\xE2\x80\x99  antitesi a se\xE2\x80\x99 stessa ma , soprattutto, visse...  creando esperienze che  hanno lasciato dentro  qualcosa, difficile da definirsi senza cadere nel banale , potrei dire un senso di appartenenza comune ( ma il termine e\xE2\x80\x99 riduttivo),  che ha oltrepassato anni , scazzi , morti , tempi infami , crisi personali , delusioni , tradimenti , defezioni , ibernazioni : chi ha vissuto quell\xE2\x80\x99esperienza con onesta\xE2\x80\x99 intellettuale  ancor oggi si ritrova a fiuto , a pelle  magari riincazzandosi perche\xE2\x80\x99 qualcosa di allora  riemerge e sembra non risolto (o forse fa parte del gioco far finta ,credendoci,  che sia tuttora non risolto)  ma sapendo  in buona sostanza di essere stato \xE2\x80\x9Cuno di Arturo\xE2\x80\x9D o , meglio,  \xE2\x80\x9C uno della Golia \xE2\x80\x9C  anche se magari oggi  fa finta di non ricordarsene ......\r\n\
    \r\n\
    $extertius"
