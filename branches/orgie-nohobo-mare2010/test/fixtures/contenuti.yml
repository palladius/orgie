  titolo: pagina dei brindisi
  idcontenuto: "1310675050"
  tipo: cazzate
  idloginpubblicante: "3"
  m_battivo: "1"
  contenuto: "La pagina dei brindisi\r\n\
    In questa pagina, finalmente qualcosa di mio.\r\n\
    Ecco una serie di brindisi da me inventati nel corso di memorabili bevute... in nomine bacci, tabacci venerisque\r\n\
    (La pagina \xC3\xA8 ancora in allestimento, per cui ancora c'\xC3\xA8 solo questo... )\r\n \r\n\
    Brindiamo al maschio augello\r\n\
    che fin dai tempi antichi\r\n\
    tra mille e mille frutti\r\n\
    di coglier scelse i fichi.\r\n\
    Ma onor sia anco al Pube,\r\n\
    ch\xC3\xA9 mai ni\xC3\xB9n s\xE2\x80\x99accorse\r\n\
    che esso regge il nerbo\r\n\
    con tutte le suo borse:\r\n\
    Se non vi fosse stato,\r\n\
    verosimilmente,\r\n\
    l\xE2\x80\x99augel sar\xC3\xACa spuntato\r\n\
    dal petto oppur dal ventre.\r\n\
    \r\n\
    Kinta"
contenuti_038: 
  m_bInAttesa: "0"
  datapubblicazione: 2005-05-30 14:49:44
  datacreazione: 2005-05-19 16:04:50
  m_bSerio: "0"
  idlogin: "1770"
  m_nLivelloSegretezza: "0"
  titolo: la rosa dei venti
  idcontenuto: "1270975111"
  tipo: storie
  idloginpubblicante: "294"
  m_battivo: "1"
  contenuto: "ROSA DEI VENTI\r\n\
    ovvero\r\n\
    Fior di Scorregge\r\n\
    Arie celebri attraverso i secoli\r\n\
    (Riduzione e adattamento in versi dal \"De petis illustribus\" e dal \"De peto italico\")\r\n\
    Sin da quando il mondo aveva \r\n\
    ancor vivi Adamo ed Eva, \r\n\
    era in voga in tutti quanti \r\n\
    un riparo li davanti. \r\n\
    Ma nessun pens\xC3\xB2, che strano, \r\n\
    di coprirsi il deretano.\r\n\
    E cos\xC3\xAC dall'orifizio, \r\n\
    per bisogno oppur per sfizio, \r\n\
    calda arietta prima oppressa \r\n\
    variamente fu trasmessa \r\n\
    con sussurro un po' confuso \r\n\
    o con colpo d'archibuso.\r\n\
    In antico i vari suoni \r\n\
    non urtavano i calzoni: \r\n\
    n\xC3\xA9 gli strappi repentini, \r\n\
    capricciosi o pizzichini, \r\n\
    n\xC3\xA9 le loffe pi\xC3\xB9 discrete\r\n\
    conturbavano la quiete.\r\n\
    La melodica emissione \r\n\
    per anal stimolazione \r\n\
    e anche il peto tracotante \r\n\
    dal fragore dilaniante \r\n\
    ebbe grande rinomanza \r\n\
    e innegabile fragranza.\r\n\
    Tanto grato fu l'odore \r\n\
    di quel vento propulsore \r\n\
    che l'usanza fu apprezzata \r\n\
    e dai posteri adottata \r\n\
    con piacere sovrumano \r\n\
    sia del retto che dell'ano.\r\n\
    Fin da quando sodomiti, \r\n\
    d'ogni musica periti, \r\n\
    per eccesso di misura \r\n\
    s'otturavan l'apertura, \r\n\
    la scorreggia di gran gloria \r\n\
    s'e coperta nella storia.\r\n\
    Con sconquasso intestinale \r\n\
    e tremore universale, \r\n\
    dall'Olimpo i sacri Numi \r\n\
    deviavan tanti fiumi \r\n\
    e asciugavano i pantani \r\n\
    col soffion dei deretani.\r\n\
    Un bel peto giornaliero \r\n\
    intonava il vate Omero. \r\n\
    Scorreggiava il re di Troia \r\n\
    finche un d\xC3\xAC tir\xC3\xB2 le cuoia \r\n\
    e pungenti come spille \r\n\
    le faceva il prode Achille.\r\n\
    Di scorregge astute Ulisse \r\n\
    tutti quanti in guerra afflisse. \r\n\
    Si sa pur che dal cavallo \r\n\
    fuorusciva vento giallo \r\n\
    e Penelope da sola \r\n\
    ingialliva le lenzuola.\r\n\
    Agamennone all'attacco \r\n\
    le faceva a squarciasacco. \r\n\
    Sibilanti e a vasto raggio \r\n\
    eran quelle d'ogni ostaggio. \r\n\
    E Cassandra profetessa \r\n\
    scorreggiava come ossessa.\r\n\
    Ci ha Platone riferito \r\n\
    che di Socrate erudito, \r\n\
    poi che bevve la spremuta \r\n\
    d'amarissima cicuta, \r\n\
    trafiggente come scheggia \r\n\
    parve l'ultima scorreggia.\r\n\
    I coltissimi Ateniesi, \r\n\
    se da coliche eran presi, \r\n\
    dilatavan lo sfintere \r\n\
    emettendo dal sedere \r\n\
    filosofiche ventate \r\n\
    molto acute e ponderate.\r\n\
    Gli Spartani, da Licurgo \r\n\
    impararono lo spurgo \r\n\
    dei piu fetidi elementi \r\n\
    che producono fermenti: \r\n\
    e di drastiche zaffate \r\n\
    saturavan le adunate.\r\n\
    Ma fondata che fu Roma, \r\n\
    ogni greco cadde in coma \r\n\
    poich\xC3\xA9 in lega con gli Etruschi, \r\n\
    i Romani, a peti bruschi \r\n\
    e col gas delle fanfare, \r\n\
    cominciarono a imperare.\r\n\
    Tutti i popoli, asfissiati, \r\n\
    furon presto soggiogati \r\n\
    e il Senato, tra gli allori, \r\n\
    diede l'ordine ai Pretori \r\n\
    di dettare ovunque legge \r\n\
    coll'ausilio di scorregge.\r\n\
    Venne poi innalzato un tempio \r\n\
    a chi diede il primo esempio: \r\n\
    proprio Romolo in persona \r\n\
    s'era messa la corona \r\n\
    sopprimendo il fratellino \r\n\
    con il gas dell'intestino.\r\n\
    Ogni nobile patrizio \r\n\
    scorreggiava con giudizio: \r\n\
    il fragor di Coriolano \r\n\
    si sentiva da lontano \r\n\
    e con schiaffo sulla trippa \r\n\
    scorreggiava pure Agrippa.\r\n\
    Si suol dir che Cincinnato \r\n\
    scorreggiasse in mezzo al prato, \r\n\
    e che Manlio in Campidoglio \r\n\
    le lisciasse come l'olio \r\n\
    accorrendo alle non poche \r\n\
    spernacchiate delle oche.\r\n\
    Muzio Scevola a Porsenna \r\n\
    fece un peto come strenna \r\n\
    mentre peti da bisonte \r\n\
    fece Coclite sul ponte \r\n\
    e arditissimi petini \r\n\
    fece Clelia tra i Chiusini.\r\n\
    Rivolgendosi agli Dei \r\n\
    scorreggiavano i plebei. \r\n\
    Ma alle feste d`lmeneo \r\n\
    il triumviro Pompeo \r\n\
    e pi\xC3\xB9 ancora il gran Lucullo \r\n\
    scorreggiavan per trastullo.\r\n\
    Ciceron, per ore intere, \r\n\
    chiacchierava col sedere \r\n\
    ma sul far della mattina \r\n\
    scorreggiava Catilina \r\n\
    dedicando all'Arpinate \r\n\
    insolenti serenate.\r\n\
    Scorreggiava come un tuono \r\n\
    fin Cleopatra dal suo trono \r\n\
    mentre Cesare, suo drudo, \r\n\
    le faceva sempre nudo \r\n\
    ed Antonio, grande e grosso, \r\n\
    scorreggiava a piu non posso.\r\n\
    Pure Augusto Imperatore \r\n\
    scorreggiava a tutte l'ore \r\n\
    con la corte sua perfetta \r\n\
    scorreggiante in etichetta, \r\n\
    mentre solo in casi gravi \r\n\
    scorreggiavano gli schiavi.\r\n\
    Si racconta che Tiberio \r\n\
    scorreggiasse serio serio, \r\n che Caligola il tiranno \r\n\
    scorreggiasse tutto l'anno, \r\n\
    che Traiano in quel di Dacia \r\n\
    scorreggiasse con audacia.\r\n\
    Scorreggiava l'Urbe intera \r\n\
    dal mattino fino a sera. \r\n\
    Scorreggiava in grande stile \r\n\
    anche il sesso femminile \r\n\
    e Cornelia ai suoi gioielli \r\n\
    ne faceva dei fardelli.\r\n\
    Scorreggiava senza posa \r\n\
    Messalina silenziosa, \r\n\
    imitata da Agrippina \r\n\
    che facevale in sordina. \r\n\
    E coi peti le Vestali ci \r\n\
    spegnevano i fanali.\r\n\
    Le barbariche calate, \r\n\
    da scorregge accompagnate, \r\n\
    provocaron nei Romani, \r\n\
    prorompenti un di dagli ani, \r\n\
    tale e tanta ristrettezza \r\n\
    che il fragor si mut\xC3\xB2 in brezza.\r\n\
    Di scorregge, Goti e Franchi \r\n\
    non sembravano mai stanchi. \r\n\
    Pur sconfitti, i Longobardi \r\n\
    scorreggiavano testardi \r\n\
    mentre gli Arabi ad oltranza \r\n\
    si sfiatavano la panza.\r\n\
    A Ravenna i Bizantini, \r\n\
    grandi esperti levantini \r\n\
    di scorregge e di cavilli, \r\n\
    inventarono i fusilli; \r\n\
    scorreggiando invece a Reggio \r\n\
    inventarono il solfeggio.\r\n\
    Venne tosto l'Evo Medio \r\n\
    e, per rompere un po' di tedio, \r\n\
    scorreggiavano i Signori \r\n\
    in risposta ai valvassori \r\n\
    e sganciava Bonifazio \r\n\
    ricchi peti senza strazio.\r\n\
    Scorreggiavano a Firenze \r\n\
    per poetiche esigenze: \r\n\
    scorreggiava assai felice \r\n\
    la dolcissima Beatrice \r\n\
    ed il sommo padre Dante \r\n\
    le annusava tutte quante.\r\n\
    Come l'acqua, chiare e fresche \r\n\
    eran quelle petrarchesche, \r\n\
    meritevoli d'alloro \r\n\
    e dei lunghi capei d'oro \r\n\
    d'una Laura sorridente \r\n\
    che petava nel torrente.\r\n\
    Le scorregge del Boccaccio \r\n\
    ti lasciavano di ghiaccio: \r\n\
    tra le suore dei conventi \r\n\
    scorreggiava ai quattro venti \r\n\
    e ogni monaca lasciva \r\n\
    rispondeva assai giuliva.\r\n\
    Belle grasse come il lardo \r\n\
    le facea Matteo Boiardo. \r\n\
    Armeggiando ma composto \r\n\
    le facea soltanto Ariosto, \r\n\
    sempre in mezzo ai cavalieri, \r\n\
    ben pi\xC3\xB9 arditi trombettieri.\r\n\
    Scorreggiava Machiavelli \r\n\
    sradicando gli alberelli: \r\n\
    ma, finito lo spuntino \r\n\
    presso il Prence Valentino, \r\n\
    fece solo poche scorie \r\n\
    che divennero le Istorie.\r\n\
    Lo splendore d'ogni corte \r\n\
    diede al peto nuova sorte: \r\n\
    di petare i mecenati \r\n\
    si sentivano onorati \r\n\
    tra gli artisti piu famosi \r\n\
    dagli addomi assai ventosi.\r\n\
    Inneggianti Arianna e Bacco, \r\n\
    di scorregge, pi\xC3\xB9 d'un sacco \r\n\
    il Magnifico ne fece; \r\n\
    e vischiose come pece \r\n\
    le sparava Ludovico \r\n\
    comprimendo l'ombelico.\r\n\
    Proprio al suon di qucl tamburo, \r\n\
    come tela usando il muro \r\n\
    del cenacolo lombardo, \r\n\
    il grandissimo Leonardo, \r\n\
    di scorregge sempre in vena, \r\n\
    affresc\xC3\xB2 l'Ultima Cena.\r\n\
    Puro gas esilarante \r\n\
    seppe emettere Bramante, \r\n\
    il gran re degli architetti, \r\n\
    per dar lustro a quei banchetti, \r\n\
    mentre a colpi di pennello \r\n\
    le faceva Raffaello.\r\n\
    Tra le quinte anche Goldoni \r\n\
    dava sfogo a gran soffioni. \r\n\
    Frizzantine, dopo i pasti, \r\n\
    Ie faceva Alfieri d'Asti: \r\n\
    ma sprezzanti, ad intervalli, \r\n\
    Ie scagliava contro i Galli.\r\n\
    Lungo il giorno, poi, Parini \r\n\
    educava i Signorini, \r\n\
    con precetti inconsueti, \r\n\
    a eleganti, caldi peti \r\n\
    dall'olezzo di letame, \r\n\
    eccitante per le dame.\r\n\
    Sopra un ramo del suo lago, \r\n\
    dei romanzi il vero mago, \r\n\
    detto al secolo Manzoni \r\n\
    si scrollava i pantaloni \r\n\
    dopo avere ventilato \r\n\
    su un amore contrastato.\r\n\
    Tutto ardore veneziano \r\n\
    parea il peto foscoliano: \r\n\
    ma pur tese a egregie cose, \r\n\
    senza il gas delle gasose \r\n\
    le scorregge del buon Ugo \r\n\
    eran fumo e niente sugo.\r\n\
    Pessimista, a mo' di dardi, \r\n\
    Ie mollava Leopardi, \r\n\
    mentre Silvia, bene o male, \r\n\
    per rispondere al segnale, \r\n\
    sia d`inverno che d'estate \r\n\
    le faceva ricamate.\r\n\
    Solo in casa o sulla soglia, \r\n\
    e non gi\xC3\xA0 di malavoglia, \r\n\
    aerandosi le terga, \r\n\
    Ie tirava lievi Verga: \r\n\
    ma da zotico ribaldo \r\n\
    scorreggiava Gesualdo.\r\n\
    Con un dito Pirandello \r\n\
    tratteneva il venticello \r\n\
    fino a che, tutto ispirato \r\n\
    e col ventre dilatato, \r\n\
    liberava gli ingranaggi \r\n\
    dando fiato ai personaggi.\r\n\
    Succulente come il miele \r\n\
    le plasmava Gabriele: \r\n\
    Ermione nel pineto \r\n\
    si sorbiva pioggia e peto, \r\n\
    ma i pastori dell'Abruzzo \r\n\
    emigravan da quel puzzo.\r\n\
    Onorava i gagliardetti \r\n\
    con scorregge Marinetti \r\n\
    mentre in ombra il buon Gozzano \r\n\
    le faceva piano piano \r\n\
    e, allargandosi la gonna, \r\n\
    scorreggiava anche sua nonna.\r\n\
    Non soltanto i letterati \r\n\
    fecer peti appassionati. \r\n\
    All`udito gran letizia \r\n\
    diede pur chi con perizia, \r\n\
    tra le note musicali \r\n\
    fe scorregge magistrali.\r\n\
    Su due piedi fermi e saldi \r\n\
    scorreggiava anche Vivaldi \r\n\
    con alcune esitazioni \r\n\
    nel comporre le Stagioni; \r\n\
    quando poi l'ebbe composte, \r\n\
    fece vento senza soste.\r\n\
    Gioacchino pesarese \r\n\
    col suo ritmo, a piu riprese, \r\n\
    rapidissimo e vivace, \r\n\
    scorreggiava senza pace. \r\n\
    E il barbiere di Siviglia \r\n\
    gli rendeva la pariglia.\r\n\
    Del maestro di Busseto \r\n\
    patriottico fu il peto \r\n\
    che sull'ali del pensiero \r\n\
    s'opponeva sempre fiero \r\n\
    con olezzo tricolore \r\n\
    al petar dell'invasore.\r\n\
    Di scorregge fu provetto \r\n\
    il gibboso Rigoletto; \r\n\
    sconreggiava Butterfly \r\n\
    aspettando i marinai \r\n\
    e il sospir della Traviata \r\n\
    fu un gran peto a schioppettata.\r\n\
    Di sconregge vasta gamma \r\n\
    seppe offrire il melodramma: \r\n\
    il concerto di quei miasmi \r\n\
    accendeva gli entusiasmi \r\n\
    e spegneva i parassiti \r\n\
    che non erano graditi.\r\n\
    Con i peti gi\xC3\xA0 Mascagni \r\n\
    sopprimeva topi e ragni \r\n\
    mentre invece Donizetti \r\n\
    tramortiva solo insetti, \r\n\
    emulato da Puccini \r\n\
    che uccideva i moscerini.\r\n\
    Era il peto dell'Aida \r\n\
    micidiale insetticida; \r\n\
    fecer strage d'ogni mosca \r\n\
    le scorregge della Tosca \r\n\
    e annientate senza trucco \r\n\
    fur le pulci dal Nabucco.\r\n\
    Pur la Scienza s'\xC3\xA8 fregiata \r\n\
    d'onorevole ventata; \r\n\
    cosi ieri come oggi, \r\n\
    senza mezzo o con appoggi, \r\n\
    la ricerca ha sempre avuto \r\n\
    vento in poppa urlante o muto.\r\n\
    Strofinandosi al magnete \r\n\
    sconreggiava gi\xC3\xA0 Talete. \r\n\
    Tutti quanti ormai sappiamo \r\n\
    che Pitagora da Samo \r\n\
    le faceva con la crema \r\n\
    dimostrando il teorema.\r\n\
    Nella vasca a Siracusa, \r\n\
    senza chiedere mai scusa, \r\n\
    le faceva anche Archimede \r\n\
    sollevando un solo piede \r\n\
    e gridando: \"Gente, all'erta: \r\n\
    anche questa \xC3\xA8 una scoperta!\"\r\n\
    Quando il re gli di\xC3\xA9 in affitto \r\n\
    le piramidi d'Egitto \r\n\
    per studiar la geometria, \r\n\
    preso forse da euforia, \r\n\
    dal didietro emise Euclide \r\n\
    una tossica anidride.\r\n\
    Convogliava nei cannelli \r\n\
    ogni peto Torricelli \r\n\
    e alla propria beneamata \r\n\
    quell'arietta riciclata, \r\n\
    ben compresa col mercurio, \r\n\
    lui spediva come augurio.\r\n\
    Fu Galvani in riva al mare \r\n\
    un bel di a paralizzare, \r\n\
    scaricando vento immane, \r\n\
    le zampette delle rane \r\n\
    che in pozzette soleggiate \r\n\
    scorreggiavano beate.\r\n\
    Un'elettrica raccolta \r\n\
    di scorregge fece Volta \r\n\
    e, contatele poi tutte, \r\n\
    lunghe, corte, belle, brutte, \r\n\
    le rimise tosto in fila \r\n\
    per dar carica alla pila.\r\n\
    Queste nobili memorie \r\n\
    sono peti e non son storie: \r\n\
    a emulare tal passato \r\n\
    ci hanno sempre stimolato, \r\n\
    con sermoni flatulenti, \r\n\
    gl'illustrissimi docenti.\r\n\
    All'invito dei vegliardi \r\n\
    obbediscono i goliardi: \r\n\
    e nessun se n'abbia a male \r\n\
    n\xC3\xA9 ci dica ch'\xC3\xA8 triviale \r\n\
    se noi pure qualche volta \r\n\
    le facciamo a briglia sciolta.\r\n\
    Voi, Pulzelle pi\xC3\xB9 educate \r\n\
    che le fate soffocate \r\n\
    e talora un po' farcite, \r\n\
    non sentitevi inibite.\r\n\
    Non \xC3\xA8 indegna d'una reggia \r\n\
    qualsivoglia vil scorreggia \r\n\
    n\xC3\xA8 ci pare maleolente \r\n\
    il trattato qui presente.\r\n\
    Aura lieve od aria spessa, \r\n\
    liberata se repressa, \r\n\
    pur di fronte a un concistoro \r\n\
    puo donar giusto ristoro.\r\n\
    Alla fin d'ogni fatica, \r\n\
    checch\xC3\xA8 dunque se ne dica, \r\n\
    di rispetto mai non manca \r\n\
    chi in tal modo si rinfranca. \r\n\
    Perci\xC3\xB2 e logico e prescritto \r\n\
    che scorreggi il sottoscritto.\r\n\
    \r\n\
    Kinta"
