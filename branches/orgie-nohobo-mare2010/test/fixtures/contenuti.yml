  tipo: goliardia
  idloginpubblicante: "3"
  m_battivo: "1"
  contenuto: "S    5 e 3 , 8\r\n\
    P    8 e 2 ,10\r\n\
    S    scorregiava il senatore vento\r\n\
    P    il senatore vento scorregiava\r\n\
    S    mentula mea vobis\r\n\
    P    et a tue puru \r\n\
    S    fillus e bagassa\r\n\
    P    Heeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee\r\n\
    S     Nel 1\xC2\xB0 mistero gaudioso si contempla frate bernardo che con le palle poggiate sul biliardo   giocava a carambola\r\n\
    P  sotmaior \r\n\
    Rit \r\n\
    S    nel 2\xC2\xB0 mistero gaudioso si contempla frate Arturo che col cazzo proiettato nel futuro inculava i posteri.\r\n\
    P sotmaior\r\n\
    Rit.\r\n\
    Nel  3\xC2\xB0 mistero gaudioso si contempla frate batista che con il culo fatto a pista allenava bartali\r\n\
    P sot maior\r\n\
    Nel 4 mistero gaudioso si contempla frate andal\xC3\xB9 che col cazzo rosso bl\xC3\xB9 correggeva i compiti\r\n\
    \r\n\
    Nel 5 ed ultimo mistero gaudioso si contempla frate alberti che mangiava ombrelli chiusi e li cagava aperti\r\n\
    Nel primo mistero doloroso si contempla suor agnese che con le pezze del marchese spolverava i mobili\r\n\
    Nel 2 mistero doloroso si contempla suor marianna che col culo a capanna proteggeva gli armenti\r\n\
    \r\n\
    Nel 3 mistero doloroso si contempla suor benedetta che con la figa a cornetta faceva i concerti\r\n\
    \r\n\
    Nel 4 mistero doloroso si contempla suor luisa che con le tette di ghisa fondeva le rondelle \r\n\
    \r\n\
    Nel 5  ed ultimo mistero doloroso si contempla suor bianca che con la figa fatta a panca ospitava i viandanti\r\n\
    Nel 1 mistero glorioso si contempla frate Guglielmo che col cazzo fatto a pompelmo faceva i frullati\r\n Nel 2 mistero glorioso si contempla frate mariano che col cazzo fatto a nano inculava i giganti\r\n\
    \r\n\
    Nel 3 mis\xC3\xACtero glorioso si contempla frate camillo che col cazzo fatto a spillo inculava i microbi\r\n\
    \r\n Nel 4 mistero glorioso si contempla frate arazzo che col cazzo fatto a cazzo passava inosservato\r\n \r\n\
    Nel 5 ed ultimo mistero glorioso si contempla frate diodoro che col cazzo tutto d\xE2\x80\x99oro valutava il dollaro.\r\n\
    Rit\r\n\
    P: Uniremo il vostro col nostro per vedere se il nostro e + lungo del vostro, e qual\xE2\x80\x99 ora risultasse che il vostro fosse pi\xC3\xB9 lungo del nostro toglieremo al vostro per aggiungere al nostro affinch\xC3\xA9 anche il vostro risulti uguale al nostro. E non sia fuori ordinanza e lo metteremo in culo a tutti \r\n\
    Sot maior\r\n"
contenuti_096: 
  m_bInAttesa: "0"
  datapubblicazione: 2008-03-27 00:53:35
  datacreazione: 2008-03-26 23:52:32
  m_bSerio: "0"
  idlogin: "4224"
  m_nLivelloSegretezza: "3"
  titolo: "\xC2\xA7 CARABINIERI \xC2\xA7"
  idcontenuto: "1316084366"
  tipo: barzellette
  idloginpubblicante: "1818"
  m_battivo: "1"
  contenuto: "\r\n\
    Con rispetto e riconoscenza nei confronti della benemerita...\r\n\
    FACCIAMOCI DUE RISATE! \r\n\
    \r\n\
    \r\n\
    \r\n\
    1)-Il maresciallo sta spiegando all'appuntato che debbono recarsi al casin\xC3\xB2 per alcuni controlli:\r\n\
    - Mi raccomando - dice il maresciallo - non dobbiamo far capire che siamo carabinieri altrimenti va all'aria la nostra ispezione; saremo due borghesi che vanno a giocare e basta!\r\n\
    - Non si preoccupi Maresciallo, ci penso io.\r\n\
    - E non mi devi chiamare neanche maresciallo!!!\r\n\
    Allora entrano al casin\xC3\xB2 e alla vista di tante macchine da gioco l'appuntato si incuriosisce:\r\n\
    - Maresciallo ha visto l\xC3\xAC?\r\n\
    - NON mi devi chiamare maresciallo! Vuoi che scoprano tutto?\r\n\
    La storia va avanti un p\xC3\xB2 cos\xC3\xAC, l'appuntato continua a chiamare il maresciallo col rischio di far scoprire tutto. Ad un certo punto i due si avvicinano al tavolo della roulette e il maresciallo per seguire meglio il gioco poggia le mani sul tavolo; il croupier credendo che voglia giocare gli chiede:\r\n\
    - Ha puntato lei?\r\n\
    - No no, io sono maresciallo! L'appuntato \xC3\xA8 lui! \r\n\
    \r\n\
    \r\n\
    2)-Un carabiniere chiede al suo collega:\r\n\
    - Perch\xC3\xA8 quando vai al bagno indossi sempre il giubbotto anti proiettili?\r\n\
    risponde il collega:\r\n\
    - Il capo ha detto, state attenti che qualche stronzo vi puo' sparare \r\n\
    \r\n\
    \r\n\
    \r\n\
    3)-Un Carabiniere affannato dopo una lunga corsa...\r\n\
    - Maresciallo... ci hanno rubato la macchina!!!!!\r\n\
    - Accidenti!!! Almeno avete visto chi \xC3\xA8 stato?\r\n\
    - No purtroppo! Per\xC3\xB2 abbiamo preso il numero di targa!! \r\n\
    \r\n\
    \r\n\
    \r\n\
    4)-Un maresciallo entra in caserma con due fasce nere: una al braccio destro e l'altra a quello sinistro.\r\n\
    Un carabiniere si avvicina e gli chiede:\r\n\
    - Mi scusi maresciallo, ma cos'\xC3\xA8 quel lutto?\r\n\
    Il maresciallo risponde:\r\n\
    - Ieri \xC3\xA8 morta mia madre...\r\n\
    E il carabiniere:\r\n\
    - Beh allora perch\xC3\xA9 due fasce?\r\n\
    E il maresciallo:\r\n\
    -Questa mattina mi ha chiamato mio fratello e mi ha detto che \xC3\xA8 morta anche la sua!!! \r\n\
    \r\n\
    \r\n\
    \r\n\
    5)-In una caserma dei Carabinieri del soccorso alpino, il maresciallo chiama a raccolta i sottoposti:\r\n\
    - Ragazzi, questo inverno si prevede alquanto rigido e perci\xC3\xB2 avremo bisogno di molta legna per i camini e le stufe. Domani mattina tutti a fare legna nel bosco.\r\n\
    Interviene il brigadiere:\r\n\
    - Maresciallo, posso portare la motosega?\r\n\
    - No tu vieni a piedi come tutti gli altri!!! \r\n\
    \r\n\
    \r\n\
    \r\n\
    6)-Un finanziere, un poliziotto ed un carabiniere hanno da diversi mesi lo stesso turno allo stesso posto e si trovano a mangiare insieme. Puntualmente aprono i loro portapranzo e trovano dentro un panino al prosciutto. Un giorno il finanziere distrutto dalla ripetitivit\xC3\xA0 del pasto perde le staffe e dice:\r\n\
    - Ragazzi, mi sono rotto le palle. Ora apro il portapranzo e se dentro ci trovo un panino al prosciutto mi sparo quanto \xC3\xA8 vero Dio!!!\r\n\
    Apre il portapranzo e trova il solito panino, estrae la pistola dalla fondina e si spara un colpo alla tempia.\r\n\
    Gli altri due restano attoniti e dopo qualche secondo di commenti di preoccupazione il poliziotto dice:\r\n\
    - Senti, il collega ha dimostrato di avere le palle quadrate, ha fatto bene. Anzi, anche io se trovo il maledetto panino oggi faccio l'uomo e mi sparo!!!\r\n\
    Anche lui apre il portapranzo, trova il panino al prosciutto e con un urlo disumano si spara.\r\n\
    Il carabiniere rimasto solo riflette un attimo e per senso di solidariet\xC3\xA0 fa la stessa promessa. Apre il portapranzo, trova il panino al prosciutto, prende la pistola e fa il suo dovere.\r\n\
    Al funerale le vedove in lacrime commentano il gesto.\r\n\
    La vedova del finanziere:\r\n\
    - Caro, lo potevi dire, hai lasciato 2 figli, siamo in una valle di lacrime... non mi costava nulla prepararti qualcos'altro...\r\n\
    La vedova del poliziotto:\r\n\
    - Amore mio ci hai lasciati soli, averlo saputo ti avrei preparato i pi\xC3\xB9 buoni manicaretti... ma perch\xC3\xA9 ti sei tenuto tutto dentro...\r\n\
    La vedova del carabiniere:\r\n\
    - Tesoro mio, io gli altri due potrei anche capirli... ma te il pranzo te lo preparavi da solo!!! \r\n\
    \r\n\
    \r\n\
    \r\n\
    7)-Due Carabinieri si trovano ad un posto fisso fuori la casa di villeggiatura di un noto personaggio politico. Ad un tratto uno dei due fa al collega:\r\n\
    - Senti... mi scappa proprio di fare la cacca!\r\n\
    - Allora vai dietro quei cespugli...\r\n\
    Il Carabiniere va dietro i cespugli a fare il suo bisogno. Dopo cinque minuti fa al collega:\r\n\
    - Ehi!!! Non ho niente per pulirmi!\r\n\
    - E io non ho niente da darti! Usa cinque euro!\r\n\
    Passano altri cinque minuti e dal cespuglio esce il Carabiniere con la mano tutta sporca di merda, notevolmente incazzato:\r\n\
    - Che bel consiglio che m'hai dato! Non solo mi sono smerdato la mano, ma c'ho anche cinque monete da 1 euro infilate nel culo! \r\n\
    \r\n\
    \r\n\
    \r\n\
    8)-Subito dopo le elezioni due Carabinieri stanno discutendo:\r\n\
    - Sai... non far\xC3\xB2 pi\xC3\xB9 l'errore di andare a votare da solo, mi porter\xC3\xB2 tre amici in cabina!!\r\n\
    - E perch\xC3\xA9?\r\n\
    - Perch\xC3\xA9 l'ultima volta non se ne sono accorti e mi hanno lasciato andare, per\xC3\xB2 sulla scheda c'\xC3\xA8 scritto: PIEGARE IN QUATTRO! \r\n\
    \r\n\
    \r\n\
    \r\n\
    9)-Dopo il terremoto in Irpinia, i carabinieri stanno dando una mano per ricostruire la loro caserma distrutta dal sisma. Un carabiniere a fine giornata fa al collega:\r\n\
    - Ges\xC3\xB9! Ciro... hai lavorato come un pazzo tutto il giorno!!!\r\n\
    Quell'altro gli fa l'occhietto e risponde:\r\n\
    - Sto solo prendendo in giro quel fesso del maresciallo! Ho portato su e gi\xC3\xB9 per tutto il giorno sempre la stessa carriola di mattoni!!! \r\n\
    \r\n\
    \r\n\
    \r\n\
    10)-Ci sono due Carabinieri che escono di pattuglia con una gazzella nuova nuova, ancora da rodare. Dopo un po' che sono in perlustrazione nella loro zona ricevono la segnalazione di una macchina in fuga nella loro direzione. Riescono ad intercettarla e si mettono all'inseguimento sul filo dei 180 all'ora. In prossimit\xC3\xA0 di una curva la macchina perde aderenza e fanno un incidente pauroso. Fortunatamente i due Carabinieri vengono sbalzati fuori dall'abitacolo, ma la gazzella, cappottatasi una dozzina di volte, \xC3\xA8 ridotta ad un ammasso informe di lamiere. I due Carabinieri dopo alcuni minuti riprendono i sensi. Uno dei due guarda la macchina e fa all'altro:\r\n\
    \r\n\
    - Oh mio Dio! Brigadi\xC3\xA8! E ora chi ce lo dice al colonnello?\r\n\
    \r\n\
    Quell'altro, bench\xC3\xA9 stordito, \xC3\xA8 colpito da un'idea fulminante:\r\n\
    \r\n\
    - Senti un po'... a me una volta il carrozziere mi disse che soffiando nel tubo di scappamento, la macchina si gonfia e torna come nuova!\r\n\
    \r\n\
    Detto fatto, si alternano al tubo di scappamento e, con quanto fiato hanno in corpo, vi soffiano dentro... senza per\xC3\xB2 alcun risultato. In quel momento arriva l'ambulanza, pi\xC3\xB9 altre gazzelle dei Carabinieri, tra cui l'auto del colonnello, il quale scende sconsolato:\r\n\
    \r\n\
    - Ma guarda quei due deficienti! E poi dicono che fanno le barzellette su noi Carabinieri! Ma non lo vedete che c'avete i finestrini aperti??? \r\n\
    \r\n\
    \r\n\
    \r\n\
    11)-Un giorno il figlio di un carabiniere, tornando dalla scuola (la prima elementare) corre dal padre esultando:\r\n\
    - Pap\xC3\xA0, pap\xC3\xA0, ho preso il miglior voto della classe; la maestra mi ha dato ottimo! Ho fatto le 'i' piu' diritte della classe!\r\n\
    - Bravo, bravo! Non per niente sei figlio di carabiniere!\r\n\
    Il giorno successivo il figlio ritorna ancora piu' contento e, come al solito, corre dal padre:\r\n\
    - Pap\xC3\xA0, pap\xC3\xA0, ho preso il miglior voto della classe; la maestra mi ha dato ottimo! Ho fatto le 'o' piu' tonde della classe!\r\n\
    - 'Bravo, bravo! Non per niente sei figlio di carabiniere!\r\n\
    L'indomani il figlio torna raggiante e corre dal padre:\r\n\
    - Pap\xC3\xA0, pap\xC3\xA0, oggi la maestra ha fatto fare a tutti i maschietti un gioco strano!\r\n\
    - Che gioco?\r\n\
    - Ci siamo messi tutti in fila e abbiamo visto chi aveva il pisello piu' lungo. Pap\xC3\xA0, pap\xC3\xA0, ho vinto io Perch\xC3\xA8 sono figlio di carabiniere?\r\n\
    - No, Perch\xC3\xA8 hai ventotto anni deficiente! \r\n\
    \r\n\
    \r\n\
    \r\n\
    12)-Un medico spiega sconvolto alla sua segretaria, con disteso a terra senza vita il corpo di un carabiniere: \r\n\
    - Gli ho detto di trattenere il respiro, poi \xC3\xA8 squillato il telefono e mi sono allontanato...\r\n\
    \r\n\
    \r\n\
    \r\n\
    13)-Due Carabinieri fermano per un normale controllo una Ferrari con un negro molto distinto alla guida. \r\n\
    - Documenti per cortesia... \r\n\
    Il conducente presenta patente e libretto di circolazione, assolutamente in ordine. Il capo pattuglia legge: \r\n\
    - Nome: Leonardo \r\n\
    Sguardo stupito al guidatore. \r\n\
    - Cognome: Di Caprio \r\n\
    Altro sguardo stupito al guidatore. \r\n\
    - Occhi: azzurri \r\n\
    A questo punto rivolgendosi al collega: \r\n\
    - Anto', ma il Titanic \xC3\xA8 affondato o \xC3\xA8 bruciato?\r\n\
    \r\n\
    \r\n\
    \r\n\
    14)-Fatto realmente accaduto. \r\n\
    Un tale viene fermato dai carabinieri mentre transita per lavoro con la sua familiare. Si avvicina uno dei carabinieri e gli chiede se pu\xC3\xB2 dare un passaggio al suo collega fino alla citt\xC3\xA0 vicina. Il signore si dice contento di avere un p\xC3\xB2 di compagnia e accetta volentieri. Il carabiniere si siede davanti e tiene sulle ginocchia una grande valigia che disturbava non poco quello che doveva guidare. Dopo qualche chilometro  il signore dice al carabiniere: \r\n\
    - Metta pure dietro la valigia, tanto la macchina \xC3\xA8 vuota! \r\n\
    E di risposta il carabiniere: \r\n\
    - Ha gi\xC3\xA0 fatto un piacere per me, vuol fare un piacere anche alla valigia?\r\n\
    \r\n\
    \r\n\
    \r\n\
    15)-Lettera di una madre al figlio carabiniere\r\n\
    \r\n\
    Caro figlio, \r\n\
    ti scrivo queste poche righe perche tu sappia che ti ho scritto. Se ricevi questa lettera, vuol dire che \xC3\xA8 arrivata. Se non la ricevi, fammelo sapere, cos\xC3\xAC te la rimander\xC3\xB2. Scrivo lentamente perch\xC3\xA9 so che tu non sai leggere in fretta. \r\n\
    Qualche tempo fa tuo padre ha letto sul giornale che la maggior parte degli incidenti capitano entro un raggio di un chilometro dal luogo di abitazione. \r\n\
    Allora abbiamo deciso di traslocare un po' pi\xC3\xB9 lontano. La nuova casa \xC3\xA8 meravigliosa. C'\xC3\xA8 una lavatrice, ma non sono sicura che funzioni. \r\n\
    Proprio ieri ci ho messo dentro il bucato, ho tirato l'acqua e poi il bucato \xC3\xA8 sparito completamente. \r\n\
    Il tempo qui non \xC3\xA8 troppo brutto. La settimana scorsa ha piovuto due volte: la prima volta per tre giorni e la seconda per quattro. \r\n\
    A proposito della giacca che mi avevi chiesto, tuo zio Piero mi ha detto che spedirtela coi bottoni sarebbe stato molto caro (per via del peso dei bottoni). \r\n\
    Allora li ho staccati. Se pensi di riattaccarli, te li ho messi tutti nella tasca interna. \r\n\
    Tuo fratello Gianni ha fatto una grossa sciocchezza con la macchina: \xC3\xA8 sceso e ha chiuso di scatto la portiera lasciando dentro le chiavi. Allora \xC3\xA8 dovuto rientrare a casa a prendere il secondo mazzo di chiavi, e cos\xC3\xAC anche \r\n\
    noi abbiamo potuto scendere dalla macchina. \r\n\
    Se vedi Margherita salutala da parte mia. Se non la vedi, non dirle niente. \r\n\
    \r\n\
    La tua mamma che ti vuole tanto bene! \r\n\
    \r\n\
    P. S.: volevo metterti anche un po' di soldi, ma avevo gia chiuso la busta. \r\n\
    \r\n\
    \r\n\
    \r\n\
    16)-Una ragazza straniera sta guidando la sua auto parecchio sopra i limiti di velocit\xC3\xA0 quando un carabiniere spunta da dietro una curva e le mette in bella mostra la paletta: \r\n\
    - Favorisca i documenti prego! \r\n\
    La ragazza presa dal panico: \r\n\
    - Do... documenti? Scusi, cosa \xC3\xA8 \"documenti\"? \r\n\
    - I documenti sono quella cosa in cui si vede la sua faccia e che mi dimostra chi \xC3\xA8 lei! \r\n\
    La ragazza fruga nella borsetta, tira fuori uno specchietto, lo apre, vede la sua immagine riflessa e lo porge al carabiniere che, guardandoci dentro esclama rilassato: \r\n\
    - Beh, poteva dirlo che era un collega\r\n\
    \r\n\
    \r\n\
    \r\n\
    17)-Un appuntato chiede al maresciallo: - Signore cosa vuol dire \"pourquoi\"??? Il maresciallo: - Perch\xC3\xA9... - Cos\xC3\xAC... curiosit\xC3\xA0 mia...\r\n\
    \r\n\
    \r\n\
    \r\n\
    18)-Un carcerato all'altro: \r\n\
    - ...e allora il giudice mi ha chiesto come ho ucciso mia moglie, e io gli ho detto la verit\xC3\xA0: le ho raccontato una barzelletta che avevo inventato io che faceva morire dal ridere, io l'avevo avvertita, l'ho giurato in tribunale. Allora il giudice mi ha chiesto di raccontare la barzelletta... \xC3\xA8 morto il giudice, la giuria, il pubblico presente, e tre giorni dopo sono morti anche i carabinieri!!!\r\n\
    \r\n\
    \r\n\
    \r\n\
    19)-Un tizio con una carcassa di moto viene fermato dai carabinieri: \r\n\
    - Documenti... \r\n\
    - Non ce l'ho! \r\n\
    - Il casco? \r\n\
    - Non ce l'ho! \r\n\
    - Lo specchietto? \r\n\
    - Non ce l'ho! \r\n\
    - La targa? \r\n\
    - Non ce l'ho! \r\n\
    - Allora, riepilogando: lei \xC3\xA8 senza documenti, senza casco, senza specchietto e senza targa e ora come la mettiamo? \r\n\
    - Appoggiata al muro che \xC3\xA8 senza cavalletto...\r\n\
    \r\n\
    \r\n\
    \r\n\
    20)-Due carabinieri si incontrano e si mettono a parlare di hobby. \r\n\
    - Lo sai cosa faccio io la sera per passare il tempo? \r\n\
    - No... - risponde l'altro. \r\n\
    - Faccio il puzzle!!! \r\n\
    Allora l'altro incuriosito gli chiede: \r\n\
    - Ma cos'\xC3\xA8 questo puzzle?? \r\n\
    - Allora, \xC3\xA8 semplice... tu compri una scatola dove ci sono tanti pezzettini colorati e li devi unire fino a quando non formano l'immagine che \xC3\xA8 davanti alla scatola. \r\n\
    L'altro tutto eccitato decide di provarci anche lui, passano due settimane e si riincontrano. \r\n\
    - Allora ci sei riuscito? \r\n\
    L'altro: \r\n\
    - Macch\xC3\xA8 non riesco a incastrare tutti quei pezzettini arancioni per fare il gallo che \xC3\xA8 sulla scatola... \r\n\
    - Scusa ma che marca \xC3\xA8??? \r\n\
    -Boh!!! Davanti c'\xC3\xA8 scritto Kellog's Corn Flakes...\r\n\
    \r\n\
    \r\n\
    \r\n\
    21)-Un carabiniere che non riesce ad effettuare il suo servizio di pattuglia viene degradato dal Capitano che lo manda a fare il cameriere nel ristorante del Circolo Ufficiali. \r\n\
    Dopo qualche giorno incontra al ristorante il Capitano con tutta la famiglia venuti per il pranzo. Alla fine del pasto il carabiniere-cameriere torna al tavolo e chiede: \r\n\
    - Cosa vuole come frutta? \r\n\
    Il Capitano: \r\n\
    - Cachi per me, per mia moglie e per mia mamma... \r\n\
    Ed il cameriere: \r\n\
    - E due scorregge per il ragazzo vanno bene?\r\n\
    \r\n\
    \r\n\
    \r\n\
    22)-Cosa fanno 2 carabinieri in un armadio? - La squadra mobile...\r\n\
    \r\n\
    \r\n\
    \r\n\
    23)-Due carabinieri a cavallo stanno pattugliando una strada dell'immediata periferia cittadina quando un vecchio camion di robivecchie, scassato e carico di ogni sorta di oggetti affronta la salita rombando. \r\n\
    Passando, il camion, un vecchio BLR rumorosissimo, spaventa il cavallo del graduato che disarciona il carabiniere. \r\n\
    L'autista prosegue come se nulla fosse successo. Il carabiniere rimasto in sella lo insegue e, affiancatolo, intima: \r\n\
    - Fermo! Fermo! \r\n\
    L'autista, di rimando: \r\n\
    - 'Un posso, siamo in salita, se mi fermo 'un riparto!!! \r\n\
    Il carabiniere insiste: \r\n\
    - Fermo t'ho detto! E' cascato l'appuntato! \r\n\
    - S\xC3\xAC, se ce l'avevi appuntato meglio 'un cascava, io 'un mi posso ferma'!!!\r\n\
    \r\n\
    \r\n\
    \r\n\
    24)-Un maresciallo ed un appuntato sono di pattuglia su un'auto civetta. All'improvviso una macchina impazzita li sorpassa. \r\n\
    Il maresciallo ordina: \r\n\
    - Appuntato, esca subito la sirena!!! \r\n\
    L'appuntato si affretta a cercarla nel bauletto, sotto al sedile, ma non la trova: \r\n\
    - Marescia'... mi dispiace, ma non la trovo!!! \r\n\
    Il maresciallo: \r\n\
    - Allora facciamo una cosa, apra il finestrino, esca la testa e faccia il verso della sirena!!! \r\n\
    L'appuntato esegue gli ordini, apre il finestrino, mette fuori la testa e inizia: \r\n\
    - Naaa ni, na ni! Naaaa ni, na ni! \r\n\
    A quel punto anche il maresciallo apre il finestrino, mette fuori la testa e inizia a gridare a squarciagola: \r\n\
    - ROSSO-CELESTE! ROSSO-CELESTE! ROSSO-CELESTE...\r\n\
    \r\n\
    \r\n\
    \r\n\
    25)-Un carabiniere \xC3\xA8 in coda dal tabaccaio: - Mi da un pacchetto di Marlboro Oro! - fa il cliente prima di lui. Quando tocca a lui: - E a me uno di Muratti Atti\r\n\
    \r\n\
    \r\n\
    \r\n\
    26)-Un balbuziente incontra un carabiniere. Con estrema lentezza gli dice: \r\n\
    - S-s-cusi, d-d-ove s-s-i t-t-rova l-l-a s-s-cuola p-p-er b-b-albuzienti??? \r\n\
    Il carabiniere risponde: \r\n\
    - La scuola per balbuzienti?!? Perch\xC3\xA9? Cos\xC3\xAC non le basta???\r\n\
    \r\n\
    \r\n\
    \r\n\
    27)-Quanti carabinieri ci vogliono per affondare un sottomarino? - Due. Uno che bussa e l'altro che apre...\r\n\
    \r\n\
    \r\n\
    \r\n\
    28)-Un carabiniere \xC3\xA8 in spiaggia con il figlio: - Pap\xC3\xA0, quella \xC3\xA8 una barca? - No, \xC3\xA8 un hovercraft. - Come si scrive? - \xC3\x88 una barca figlio m\xC3\xAC !\r\n\
    \r\n\
    \r\n\
    \r\n\
    29)-Un turista chiede ad un carabiniere: - In questo paese sono nati grandi uomini? - No, signore. Qui nascono solo bambini...\r\n\
    \r\n\
    \r\n\
    \r\n\
    30)-Due carabinieri parlano delle loro vacanze passate. Uno dice all'altro:\r\n\
    - Quest'estate ho fatto delle immersioni e in una di queste mi sono spinto a 900 metri e mi sono imbattuto in un sottomarino. Ho bussato all'obl\xC3\xB2 e sono riuscito a capire che era americano perch\xC3\xA9 mi hanno risposto con \"OK!\".\r\n\
    - Anch'io quest'estate ho fatto delle immersioni e sono sceso fino a 1000 metri e anch'io mi sono imbattuto in un sottomarino dei carabinieri.\r\n\
    - Come hai fatto a capire che era dei carabinieri? Se non mi sbaglio non hanno segni riconoscibili...\r\n\
    - Semplice - risponde l'altro - ho bussato all'obl\xC3\xB2 anch'io e mi hanno aperto!!!\r\n\
    \r\n\
    \r\n\
    \r\n\
    31)-Un carabiniere in pattuglia si sporge dal finestrino della gazzella e viene colpito da una cacca di piccione. Allora fa all'altro:\r\n\
    - Cosa ho sulla testa?\r\n\
    E l'altro:\r\n\
    - Una cacca...\r\n\
    E lui risponde:\r\n\
    - Ma non DENTRO!!! Intendevo FUORI!!!\r\n\
    \r\n\
    \r\n\
    \r\n\
    32)-Durante uno scavo vengo ritrovate tre bombe della seconda guerra mondiale. Arrivano i carabinieri e le caricano sulla gazzella.\r\n\
    Durante il viaggio l'appuntato chiede:\r\n\
    - Maresciallo non e' pericoloso trasportare queste bombe? E se ne esplodesse una?\r\n\
    E il maresciallo:\r\n\
    - Si, ci ho pensato anch'io ma caso mai succedesse, sul verbale ne dichiariamo solo due...\r\n\
    \r\n\
    \r\n\
    \r\n\
    33)-Cosa succede se si chiama il 211 ?\r\n\
    -Arrivano i carabinieri in retromarcia !\r\n\
    \r\n\
    34)-\r\n\
    Cosa \xC3\xA8 uno scheletro nell'armadio? - E' un carabiniere che giocava a nascondino...\r\n\
    \r\n\
    \r\n\
    \r\n\
    35)-\r\n\
    Il comandante della caserma dei carabinieri raduna tutto il battaglione e dal palco con voce tonante si rivolge loro:\r\n\
    - Colleghi \xC3\xA8 ora di finirla con barzellette ad altre amenit\xC3\xA0 sul nostro conto, facciamoci valere e diamo esempio.\r\n\
    Detto ci\xC3\xB2 chiama sul palco l'appuntato Caputo e gli domanda:\r\n\
    - Caputo quanto fa 2 pi\xC3\xB9 2?\r\n\
    E Caputo:\r\n\
    - Tre!\r\n\
    Il comandante:\r\n\
    - Ma no, ma no... sforzati!!!\r\n\
    Mentre un grido si alza dalla platea degli altri carabinieri:\r\n\
    - Dagli un'altra possibilit\xC3\xA0, dagli un'altra possibilit\xC3\xA0!\r\n\
    Il comandante ripete la domanda e Caputo risponde \"5\":\r\n\
    - Ma no caputo, no!\r\n\
    Dalla platea un urlo ancora pi\xC3\xB9 forte:\r\n\
    - Dagli un'altra possibilit\xC3\xA0, dagli un'altra possibilit\xC3\xA0!\r\n\
    Il comandante ripete la domanda e caputo risponde \"4\".\r\n\
    Dalla platea:\r\n\
    - Dagli un'altra possibilit\xC3\xA0, dagli un'altra possibilit\xC3\xA0!!!\r\n\
    \r\n\
    \r\n\
    \r\n\
    36)-\r\n\
    Un carabiniere entra in caserma con un enorme cacca in mano e dice: Hey guardate cosa stavo per pestare!!\r\n"
contenuti_075: 
  m_bInAttesa: "0"
  datapubblicazione: 2006-07-21 00:35:23
