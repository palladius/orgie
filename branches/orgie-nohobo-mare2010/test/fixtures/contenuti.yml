  contenuto: "Buongiorno. \r\n\
    Questo documento (che ho cercato di 'redarre' alla bell'e meglio) tenta di riassumere la <i>netiquette</i> che verr\xC3\xA0 applicata a questo sito.\r\n\
    \r\n\
    In pratica, questo documento tenta di uniformare, regolarizzare e rendere 'oggettivo' (per quanto possibile!!!) l'uso del sito con particolare menzione al <b>FORUM</b>.\r\n\
    \r\n\
    <b>CHIUNQUE NON RISPETTI TALI NORME PUO' ESSERE AMMUTOLITO, RESO GUEST, BANNATO, O PESTATO A SANGUE DALL'ORDINE DEL QUINTALE (poich\xC3\xA9 siamo goliardi di un certo peso, e se l'energia cinetica non \xC3\xA8 un'opinione...)</b>.\r\n\
    \r\n\
    Ecco a voi alcune norme:\r\n\
    \r\n\
    - Non sono accettati titoli vuoti, o incomprensibili. E' importante che il titolo di un 'thread' (con esso intendendo il capofila di un messaggio) sia comprensibile da chi guarda la home (in modo da capire se il messaggio \xC3\xA8 interessante).\r\n\
    - Potete scrivere tutte le parolacce che volete nel forum, ma NON NEL TITOLO DI UN MESSAGGIO CAPOFILA (poich\xC3\xA9 questo \xC3\xA8 pubblico, e indicizzato da gugol!).\r\n\
    - Potete scrivere tutte le cazzate che volete sul forum MA NON A ME: non mentite sul sesso, la provenienza, ne' create vostri doppioni. Il motivo \xC3\xA8 che in giovent\xC3\xB9 mi innamorai di una ricelatasi poi essere un uomo. Da allora leggo Benni. Fanculo a chi ride. Ma non vi deve importare, ci\xC3\xB2 che conta \xC3\xA8 che non si fa. E vi assicuro che posso scoprire pi\xC3\xB9 cose su di voi di quanto crediate. ;)"
