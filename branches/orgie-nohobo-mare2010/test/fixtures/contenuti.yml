    7)Sacciula non \xC3\xA8 bastardadentro,\xC3\xA8 bastardafuori.\r\n\
    8)Le mineantiuomo fanno cortei per abbolire Sacciula.\r\n\
    9)I bambini non aprono l'uovo di pasqua perk\xC3\xA8 sanno che dentro ci      sia Sacciula.\r\n\
    10)I bambini hanno paura dell'Uomonero, l'Uomonero ha paura di Sacciula.\r\n\
    11)L'Uomonero prima  di andare a dormire controlla se nell'armadio c'\xC3\xA8 Sacciula."
contenuti_086: 
  m_bInAttesa: "1"
  datapubblicazione: 
  datacreazione: 2007-05-01 03:35:09
  m_bSerio: "0"
  idlogin: "3597"
  m_nLivelloSegretezza: "5"
  titolo: uomini che rimorchiano
  idcontenuto: "1473450779"
  tipo: cazzate
  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: "Uomini\xE2\x80\xA6sono tutti uguali, chi ha pi\xC3\xB9 fantasia, chi meno, i modi per rimorchiare sono spesso tutti uguali\xE2\x80\xA6e poi si lamentano del 2 di picche!!!\r\n\
    1) \r\n\
    \r\n\
    -Ciao, ma tu non sei la ragazza di Roberto? \r\n\
    \r\n\
    Io: no.. \r\n\
    \r\n\
    -Ah scusa ti ho scambiato per un\xE2\x80\x99altra persona, io sono Alberto comunque, piacere.. \r\n\
    \r\n\
    2) \r\n\
    \r\n\
    -Che bella questa collana (mentre guarda + gi\xC3\xB9) ma \xC3\xA8 quella breil no? \r\n\
    \r\n\
    Io: si\xE2\x80\xA6 \r\n\
    \r\n\
    -Infatti, ma dove l\xE2\x80\x99hai comprata? \r\n\
    \r\n\
    Io sorrido\xE2\x80\xA6(in macelleria deficiente??!!): me l\xE2\x80\x99hanno regalata \r\n\
    \r\n\
    -Ah, il tuo ragazzo? \r\n\
    \r\n\
    Io: no amici \r\n\
    \r\n\
    -Scusa, ancora non mi sono presentato, mi chiamo Fabio \r\n\
    \r\n\
    \xE2\x80\xA6 \r\n\
    \r\n\
    3) \r\n\
    \r\n\
    -I ragazzi mi hanno detto che sei di Trapani\xE2\x80\xA6 \r\n\
    \r\n\
    Io: si\xE2\x80\xA6 \r\n\
    \r\n\
    -Bella la Calabria!!!----\xC3\xA0DEFICIENTE!!! \r\n\
    \r\n  \r\n\
    \r\n\
    4) davanti al bancone, al disco-pub\xE2\x80\xA6 \r\n\
    \r\n\
    -Ciao, posso offrirti da bere? \r\n\
    \r\n\
    Io: no grazie, non disturbarti \r\n\
    \r\n\
    -Ma scherzi? \xC3\x88 un piacere x me! \r\n\
    \r\n\
    Io: no guarda, ti ringrazio \r\n\
    \r\n\
    -Almeno assaggia il mio (e mi porge il bicchiere) \r\n\
    \r\n\
    Io: no veramente, grazie.. \r\n\
    \r\n\
    -Almeno dimmi come ti chiami\xE2\x80\xA6 \r\n\
    \r\n\
    \xE2\x80\xA6 \r\n\
    \r\n\
    5) al supermercato.. \r\n\
    \r\n\
    -Scusa\xE2\x80\xA6 \r\n\
    \r\n\
    Io:si? \r\n\
    \r\n\
    -Sapresti dirmi qual \xC3\xA8 meglio tra questi?...mia madre mi ha incaricato di comprarle il detersivo ma io non me ne intendo\xE2\x80\xA6 \r\n\
    \r\n\
    Io:meglio questo \r\n\
    \r\n\
    -Grazie gentilissima, mi sembra di averti gi\xC3\xA0 visto, abiti da queste parti? \r\n\
    \r\n\
    \xE2\x80\xA6 \r\n\
    \r\n\
    6) ore 23 fermata dell\xE2\x80\x99autobus, si accosta uno con la macchina\xE2\x80\xA6 \r\n\
    \r\n\
    -Bambolina, \xE2\x80\x98ndo vai tutta sola??? \r\n\
    \r\n\
    Io:non ti riguarda \r\n\
    \r\n\
    -Sevvoi t\xE2\x80\x99accompagno io\xE2\x80\xA6 \r\n\
    \r\n\
    Io:no grazie! \r\n\
    \r\n\
    -Peccato, me sarebbe piaciuto port\xC3\xA0 \xE2\x80\x98n giro na bambolina come te\xE2\x80\xA6 \r\n\
    \r\n\
    Io:ritenta e sarai pi\xC3\xB9 fortunato! \r\n\
    \r\n  \r\n\
    \r\n\
    7)il barman \r\n\
    \r\n\
    -Io so gi\xC3\xA0 cosa vorresti bere\xE2\x80\xA6 \r\n\
    \r\n\
    Io:si e che cosa? \r\n\
    \r\n\
    -Per una bellezza del genere ci vuole il re dei cocktail\xE2\x80\xA6un cosmopolitan, le va bene signorina? \r\n\
    \r\n\
    Io:no, non mi piace \r\n\
    \r\n\
    -Allora ne scelga uno con calma, e me lo scrive qui insieme al suo nome e il suo numero\xE2\x80\xA6 \r\n\
    \r\n\
    Io: ok, capito, cambio barman! \r\n\
    \r\n  \r\n\
    \r\n\
    8)sabato sera con amici sull\xE2\x80\x99autobus per campo dei fiori parlavamo di Trapani e si avvicina uno\xE2\x80\xA6 \r\n\
    \r\n\
    -Scusate, siete de Trapani voi? \r\n\
    \r\n\
    Noi:si.. \r\n\
    \r\n\
    -Bella \xE2\x80\x98a Siciglia\xE2\x80\xA6ho un amico de Palermo, se chiama Antonio Palermo \xE2\x80\x98o conoscete? \r\n\
    \r\n\
    Noi:no\xE2\x80\xA6 \r\n\
    \r\n\
    -Peccato, fa taj\xC3\xA0 da le risate quell\xE2\x80\x99omo\xE2\x80\xA6 m\xE2\x80\x99aveva detto che \xE2\x80\x98e sicigliane s\xC3\xB2 belle ma nun pensavo mica cos\xC3\xAC.. \r\n\
    \r\n\
    E noi ridiamo\xE2\x80\xA6 \r\n\
    \r\n  \r\n\
    \r\n\
    -ma che begli occhi verdi... \r\n\
    \r\n\
    Io: daltonico sono castani!\r\n"
