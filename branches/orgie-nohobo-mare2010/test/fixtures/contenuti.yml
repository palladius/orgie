    07/11\r\n\
    \r\n\
    XI Il colore dei Goliardini.\r\n\
    \r\n\
    Blu : Giurisprudenza-Scienze politiche.\r\n\
    Rosa : Economia-Magistero.\r\n\
    Rosso : Medicina.\r\n\
    Bordeaux : Veterinaria:\r\n\
    Verde : Scienze:\r\n\
    Verde cupo : Agraria:\r\n\
    Questi sono i colori usati di consuetudine per ogni facolt\xC3\xA0 presente a Sassari.\r\n\
    Vengono comunque accettati e graditi i colori classici come da seguito:\r\n\
    Arancione : Sociologia.\r\n\
    Bianco : Lettere e filosofia-Magistero-Psicologia.\r\n\
    Blu : Giurisprudenza.\r\n\
    Bluette : Statistica.\r\n\
    Celeste : Accademia delle belle arti.\r\n\
    Giallo : Economia.\r\n\
    Grigio : Pedagogia. (To: Economia)\r\n\
    Lilla : Scienze Politiche.\r\n\
    Nero : Ingegneria-Architettura. (Fi: Scienze Politiche)\r\n\
    Rosa : Pedagogia.\r\n\
    Rosso : Medicina.\r\n\
    Rosso-calotta bianca : ISEF.\r\n\
    Rosso-bordeaux : Lingue.\r\n\
    Rosso-granata scuro : Farmacia-Veterinaria.\r\n\
    Verde : Scienze varie-Matematica.\r\n\
    Verde cupo : Agraria.\r\n\
