    Sfida un passeggero che puoi inserirti 3 dita nel naso.\r\n\
    Mostra agli altri passeggeri una ferita e chiedi se sembra infetta.\r\n\
    Entra con un frigo portatile su cui \xC3\xA8 scritto \"Testa Umana\".\r\n\
    Fissa un passeggero per un p\xC3\xB2 e poi urla \"Sei uno di loro!\" e spostati verso l'angolo pi\xC3\xB9 lontano, impaurito.\r\n\
    Lascia una scatola tra le porte.\r\n\
    Chiedi a tutti quelli che entrano se puoi premere il bottone per loro perch\xC3\xA8 un tossico li ha premuti tutti.\r\n\
    Porta una marionetta e parla agli altri passeggeri attraverso il pupazzo.\r\n\
    Inizia a cantare.\r\n\
    Disegna un quadrato sul pavimento e annuncia agli altri passeggeri che \xC3\xA8 il tuo posto riservato.\r\n\
    Urla con voce indemoniata \"Devo trovare un altro corpo!\"\r\n\
