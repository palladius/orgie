  titolo: La ricetta per l'amore
  idcontenuto: "1214778719"
  tipo: altro
  idloginpubblicante: "294"
  m_battivo: "1"
  contenuto: "Con l'euro ormai si sa non c'\xC3\xA8 cifra che abasti \r\n\
    hai voglia e sparagn\xC3\xA0 e di saltare i pasti \r\n\
    ho eliminato il cinema, a'birra e i'sigarette \r\n\
    per sparagnare ancora me posso fa'i pugnette \r\n\
    \r\n\
    Lo so che \xC3\xA8 un poco squallido, ma come fare altrimenti \r\n\
    pucchiacca e caro euro sgomentano i pezzenti \r\n\
    la femmina costava gi\xC3\xA0 ai tempi della lira \r\n\
    e con l'europ'e mammeta mo c'ha verimm nira \r\n\
    \r\n\
    T'accatt'o parapesce, le uoffr'na brioscia \r\n\
    e ncapa tu accuss\xC3\xAC 'a vuo' appar\xC3\xA0? \r\n\
    e mang' 'a coscia se far\xC3\xA0 mani\xC3\xA0... \r\n\
    \r\n\
    di Gianfranco Marziano inserita da Pernome\r\n\
    Fior di banano! \r\n\
    spiacente ma il suo credito \xC3\xA8 esaurito, \r\n\
    \xC3\xA8 meglio ca te fai nu pesce nmano! \r\n\
    \r\n\
    Ma essendo un p\xC3\xB2 rattuso io non mi sono arreso \r\n\
    essendo un p\xC3\xB2 scinziato mi sono scervellato \r\n\
    e ho trovato questa soluzione \r\n\
    e adesso ve la voglio rivelar \r\n\
    \r\n\
    Me chiavo nu criatur chiattulill \r\n\
    ce dic ca ce rong'e caramell \r\n\
    una c'ha vott' 'n terra just' po fa acal\xC3\xA0 \r\n\
    -Guagli\xC3\xB2 a memella'\xC3\xA8 bbella, n'allucc\xC3\xA0 (fii,bum!) \r\n\
    \r\n\
    \r\n\
    Al bar r'a stazione, me teng'a nu ricchione \r\n\
    invece nd'o palazz ce sta na vecchia pazza \r\n\
    ca si ta'aggarb' po te fa chiav\xC3\xA0 \r\n\
    la ricetta per l'amore \xC3\xA8 questa qua \r\n\
    \r\n\
    Fior di citrulo! \r\n\
    Se fai un pertuso dentro ad un melone \r\n\
    \xC3\xA8 tale e quale a 'o buc' ro culo! \r\n\
    \r\n\
    E un ultimo segreto, che forse \xC3\xA8 anche il pi\xC3\xB9 bello \r\n\
    per non andar mai in bianco compratevi un caniello \r\n\
    ce mitt'o perizoma e ce fai 'o depil\xC3\xA8 \r\n\
    c'ho chiav'ngul e chi sta megli'e te?\r\n"
