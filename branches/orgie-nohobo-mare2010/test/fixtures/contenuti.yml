    09/11\r\n\
    GAUDEAMUS IGITUR\r\n\
    \r\n\
    \r\n\
    GAUDEAMUS IGITUR                                     \r\n\
    IUVENES DUM SUMUS! (bis)\r\n\
    POST ICUNDAM IUVENTUTEM,\r\n\
    POST MOLESTAM SENECTUTEM\r\n\
    NOS HABEBIT HUMUS. (bis)\r\n\
    \r\n\
    UBI SUNT QUI ANTE NOS\r\n\
    IN MUNDO FUERE?\r\n\
    VADITE AD SUPEROS,\r\n\
    TRANSITE AD INFEROS\r\n\
    UBI IAM FUERE.\r\n\
    \r\n\
    VITA NOSTRA BREVIS EST,\r\n\
    BREVI FINIETUR;\r\n\
    VENIT MORS VELOCITER,\r\n\
    RAPIT NOS ATROCITER\r\n\
    NEMINI PARCETUR.\r\n\
    \r\n\
    VIVAT ACADEMIA,\r\n\
    VIVANT PROFESSORES;\r\n\
    VIVAT MEMBRUM QUODLIBET,\r\n\
    VIVANT MEMBRA QUAELIBET;\r\n\
    SEMPER SINT IN FLORE!\r\n\
    \r\n\
    VIVANT OMNES VIRGINES\r\n\
    FACILES, FORMOSAE!\r\n\
    VIVANT ET MULIERES\r\n\
    TENERAE, AMABILES,\r\n\
    BONAE, LABORIOSAE!\r\n\
    \tVIVAT ET RES PUBLICA\r\n\
    ET QUI ILLAM REGIT!\r\n\
    VIVAT NOSTRA CIVITAS,\r\n\
    MAECENATUM CHARITAS\r\n\
    QUAE NOS HIC PROTEGIT.\r\n\
    \r\n\
    PEREAT TRISTITIA,\r\n\
    PEREANT OSORES;\r\n\
    PEREAT DIABOLUS,\r\n\
    QUIVIS ANTIBURSCHIUS\r\n\
    ATQUE IRRISORES!\r\n\
    \r\n\
    (VIII STROFA APOCRIFA)\r\n\
    VIVAT BERRATTACULOS\r\n\
    OMNIUM COLORUM\r\n\
    VIVANT OMNIA GOLIARDORUM\r\n\
    APUD SCHOLAM,APUD FORUM.\r\n\
    IN TABERNA VIVANT.\r\n\
