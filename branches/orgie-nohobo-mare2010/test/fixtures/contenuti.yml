  titolo: SALVARE UNA PRINCIPESSA DA UN DRAGO SECONDO IL METAL
  idcontenuto: "997642121"
  tipo: altro
  idloginpubblicante: "3"
  m_battivo: "1"
  contenuto: "HEAVY METAL: Il principe arriva su una Harley Davidson rombante con le ruote di fuoco, uccide il drago con il suo martello da guerra, beve una birra e si scopa la principessa, il tutto mentre i suoi fratelli guerrieri del metallo si insediano nel castello e inneggiano a mani alzate le lodi del loro signore (sapendo che prima o poi quella troia della principessa se la passeranno tutti, essendo fratelli nel metallo).\r\n\
    \r\n\
    GRIND METAL: Il principe arriva, urla qualcosa di totalmente incomprensibile per circa 2 minuti e poi se ne va. La principessa fa spallucce e scopa con il principe HEAVY METAL.\r\n\
    \r\n\
    POWER/SPEED METAL: Il principe arriva, spara un acuto talmente acuto che fa esplodere i timpani del drago, e lo finisce con migliaia di colpi di doppia cassa che lo riducono in poltiglia; quindi beve una birra e perde i sensi perch\xC3\xA8 non \xC3\xA8 abituato a bere; la principessa fa spallucce e continua a scopare con il principe HEAVY METAL.\r\n\
    \r\n\
    POWER/EPIC METAL: Il principe arriva a cavallo di un unicorno bianco, fugge dal drago, salva la principessa e infine fanno l'amore in una foresta incantata, abitata dagli elfi.\r\n\
    \r\n\
    THRASH METAL: Il principe arriva, combatte col drago, salva la principessa e se la scopa, poi si ubriaca e le vomita addosso.\r\n\
    \r\n\
    FOLK METAL: Il principe arriva insieme a un gruppo di amici, suonando accordion, violini, flauti e molti altri strumenti stranissimi; il drago si addormenta (dopo aver ballato per molte ore), e il principe se ne va ubriaco dimenticandosi della principessa; quest'ultima, insoddisfatta, si scopa il principe HEAVY METAL.\r\n\
    \r\n\
    VIKING METAL: Il principe arriva con una nave, uccide il drago con la sua terrificante ascia da guerra, lo cucina e se lo mangia, violenta la principessa fino a ucciderla, svaligia il castello e da fuoco a tutto prima di andarsene.\r\n\
    \r\n\
    DEATH METAL: Il principe arriva, uccide il drago, si scopa la principessa e poi la uccide, quindi se ne va pi\xC3\xB9 incazzato di prima.\r\n\
    \r\n\
    BLACK METAL: Il principe arriva, uccide il drago e lo impala davanti al castello, poi sodomizza la principessa, beve il suo sangue in un rito satanico prima di ucciderla, e poi ne impala il cadavere deflorato di fianco a quello del drago.\r\n\
    \r\n\
    GORE METAL: Il principe arriva, uccide il drago, lo sventra e sparge tutte le sue budella di fronte al castello; poi si scopa la principessa e la uccide, poi si scopa una seconda volta il suo cadavere, gli apre la pancia con un coltello e si mangia le sue budella, si scopa la carcassa sanguinolenta per la terza volta, brucia il cadavere il drago e il castello, si scopa i due cadaveri una quarta e ultima volta.\r\n\
    \r\n\
    DOOM METAL: Il principe arriva, vede le dimensioni del drago e pensa che non potr\xC3\xA0 mai batterlo, si deprime e si taglia le vene; il drago si mangia il suo cadavere e anche la principessa.\r\n\
    \r\n\
    PROGRESSIVE METAL: Il principe arriva e suona un assolo di chitarra di 26 minuti che spinge il drago a suicidarsi per la noia, poi raggiunge la camera da letto della principessa e suona un altro assolo mettendo in mostra tutte le tecniche che ha imparato nell'ultimo anno di conservatorio; la principessa scappa alla disperata.\r\n\
    \r\n\
    GLAM METAL: Il principe arriva, il drago si disfa dalle risate vedendo il suo trucco assurdo e lo lascia entrare; il principe ruba il set da trucco della principessa e cerca di ridipingere tutto il castello di rosa shocking mentre beve un whisky, si fa di eroina e la principessa gli fa un pompino con ingoio.\r\n\
    \r\n\
    INDUSTRIAL METAL: Il principe arriva con una tuta da lavoro sporca di olio e grasso di motore, fa gesti osceni al drago e alla principessa, e viene scortato fuori dal mondo delle favole dai tizi della security.\r\n\
    \r\n\
    NU-METAL: Il principe arriva con una chitarra a 8 corde super rumorosissima, suona un riff sulla corda pi\xC3\xB9 bassa fatto da 1 solo accordo sincopatissimo, e rappa una canzone sulla libert\xC3\xA0 e sul s\xC3\xA8 interiore. Il drago lo guarda, alza un sopracciglio e lo incenerisce con uno sbuffo di fuoco. "
