    Venticello, Boing, Zaccheo, Popov, Gnomo, Asterix e Obelix..                                     \r\n\
    L\xE2\x80\x99ordine \xC3\xA8 un associazione apolitica e apartitica senza scopo di lucro che ha come obbiettivo tramandare il gioco della goliardia con la sua spensieratezza, (perch\xC3\xA9 i goliardi hanno sempre vent\xE2\x80\x99anni anche quando ne hanno di pi\xC3\xB9). La \xE2\x80\x9Ccondizio sine qua non\xE2\x80\x9D per far parte dell\xE2\x80\x99ordine \xC3\xA8 quella di essere iscritti all\xE2\x80\x99universit\xC3\xA0 e quella di portare, sul capo, la feluca detta anche goliardino, goliardo, berretto goliardico o pileo (\xC3\xA8 vietatissimo chiamarla capp\xE2\x80\xA6.) del colore della propria facolt\xC3\xA0 e, in fine, di essere muniti di una buona dose di spirito e autoironia. Possono fregiarsi del goliardino solo studenti universitari, anche se tali ad honorem. Sicuri che anche la vita sia un bel gioco con le sue regole sempre discutibili, magari davanti a un buon bicchiere di vino, sopra o sotto o sottosopra una, due o, chi ha culo, anche tre belle pulzelle (e se non son belle, belle o brutte ce le chiaviamo tutte) o fumando un buon sigaro.\r\n\
    I colori sociali sono il giallo e il blu.\r\n\
    \r\n\
    1 Il Cancelliere.\r\n\
    \r\n\
    Il gran maestro dell\xE2\x80\x99ordine \xC3\xA8 il Cancelliere.\r\n\
    Egli \xC3\xA8 capo indiscusso e indiscutibile del S.O.T. Presiede perci\xC3\xB2 a tutte le manifestazioni dell\xE2\x80\x99ordine: riunioni, cene, processi e quant\xE2\x80\x99altro. \xC3\x88 l\xE2\x80\x99unico che intona il Gaudeamus e l\xE2\x80\x99inno della Topa. Beve per primo. Ha potere legislativo esecutivo e giudiziario e ha n+1 bolli, ha cio\xC3\xA8 tanti bolli quanti ne ha il suo avversario pi\xC3\xB9 uno.\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    02/11\r\n\
    11 Il Consiglio dei Ministri (c.mm.)\r\n\
    \r\n\
    Il Consiglio dei Ministri \xC3\xA8 formato da 6,9 ministri, che coadiuvano il Cancelliere nella conduzione dell\xE2\x80\x99ordine.  \r\n\
    Hanno incarichi particolari e sono:\r\n\
    &#61580;\tMinistro vicario: assume la conduzione dell\xE2\x80\x99ordine in caso di assenza del gran maestro. Pu\xC3\xB2 essere investito di particolari e delicati incarichi. Siede sempre alla destra del Cancelliere.\r\n\
    &#61581;\tMinistro della Giustizia: imposta i vari processi e propone le pene da inferire, fa la spia di coloro che mancano di rispetto al cancelliere in sua assenza o in caso di sua \xE2\x80\x9Cdistrazione\xE2\x80\x9D (Coddatio, Ubriacatio, Masturbazio, ecc\xE2\x80\xA6.).Siede di fianco ai ministri. Vigila sul regolare svolgimento delle elezioni del Cancelliere e perde i poteri quando viene nominato il nuovo consiglio dei ministri. Siede di fianco ai Ministri\r\n\
    &#61582;\tMinistro degli Interni: sentito il Cancelliere \xC3\xA8 incaricato di convocare le riunioni; coadiuvato dal Ministro dei Ludi e dal Ministro dell\xE2\x80\x99Approvvigionamento organizza le cene e le manifestazioni pubbliche dell\xE2\x80\x99ordine. Si occupa del tesseramento. Siede sempre alla sinistra del Cancelliere..\r\n\
    &#61583;\tMinistro degli Esteri: tiene i contatti con gli altri ordini, in maniera diretta o tramite gli Ambasciatori dislocati nelle varie citt\xC3\xA0. Cura gli inviti (che se scritti devono essere firmati e timbrati dal Cancelliere) alle riunioni e a tutte le manifestazioni del S.O.T. Siede di fianco ai Ministri..\r\n\
    &#61584;\tMinistro delle Finanze: tiene i registri delle finanze dell\xE2\x80\x99ordine e, se affidatagli dal Cancelliere, la cassa. Ha il compito di racimolare i fondi. Organizza le questue. Siede di fianco ai ministri.\r\n\
    &#61585;\tMinistro dell\xE2\x80\x99Approvvigionamento: si occupa di racimolare Beozia Tabaccus et pulzellamine per il Cancelliere o per l\xE2\x80\x99 ordine tutto. Prende i contatti con i ristoranti e i locali. Siede di fianco ai Ministri.\r\n\
    &#61586;\tMinistro dei Ludi: organizza i giochi durante le riunioni le cene e tutte le manifestazioni ufficiali e non dell\xE2\x80\x99ordine. \xC3\x88 anche il cantore. Prende i contatti con le discoteche. Siede di fianco ai Ministri.\r\n\
    Il consiglio dei ministri e quindi tutti i ministri, (tranne quello alla Giustizia), perde i poteri alla vigilia dell\xE2\x80\x99elezione del nuovo Cancelliere.\r\n\
    Ogni ministro ha bolli n+\xC2\xBD (ne ha dunque sempre \xC2\xBD in meno del Cancelliere) tuttavia il Ministro Vicario e il Ministro della giustizia \xE2\x80\x9Channo bolli + forti\xE2\x80\x9D derivanti, non solo dei loro particolari incarichi, ma anche dall\xE2\x80\x99equivalenza, rispettivamente,con il Camerlengo e il Consigliere Fraudolento del S.O.G.F. :Da ci\xC3\xB2 \xC3\xA8 opportuno ribadire che solo il Ministro Vicario si pu\xC3\xB2 sostituire al Cancelliere, facendone le funzioni, in caso di sua assenza o momentaneo impedimento.\r\n\
    I ministeri non assegnati: possono essere assunti ad interim dal Cancelliere o dal vicario. \r\n\
    03/11\r\n\
    111 I Sottosegretari.\r\n\
    \r\n\
    I sottosegretari coadiuvano i ministri nei loro incarichi. Ciascun ministro ha 1 o se necessario pi\xC3\xB9 sottosegretari.\r\n\
    Il sottosegretario agli interni ha funzioni di capo della Polizia, quello alla giustizia ha funzioni di Boia e quello all\xE2\x80\x99approvvigionamento ha la funzione di ciambellano. \r\n\
    La polizia goliardica guidata dal sottosegretario agli interni ha il compito di proteggere il Cancelliere e tutto il materiale dell\xE2\x80\x99ordine nel pericolo di eventuali uccellagioni durante manifestazioni pubbliche e mantiene l\xE2\x80\x99ordine.\r\n\
    \r\n\
    1V Gli Ambasciatori.\r\n\
    \r\n\
    Gli ambasciatori rappresentano l\xE2\x80\x99ordine nelle varie citt\xC3\xA0.\r\n\
    Mantengono i contatti tra l\xE2\x80\x99ordine e gli altri ordini e rimangono perci\xC3\xB2 in stretto contatto con il ministro degli esteri. \r\n\
    \r\n\
    V Le cariche Honoris Causa.\r\n\
    \r\n\
    I goliardi dell\xE2\x80\x99ordine o di altri ordini o persino anche liberi goliardi, di particolare valore ricevono cariche H.C. che sono:\r\n\
    &#61580;\tCavaliere della Topa.\r\n\
    &#61581;\tMastro di Chiavi.\r\n\
    \r\n\
    VI Il Gran Consiglio dei Senatori (G.C.SS.)\r\n\
    \r\n\
    L\xE2\x80\x99ex Cancelliere diventa Senatore. I Senatori formano il G.C.SS., che avr\xC3\xA0 piene facolt\xC3\xA0 quando sar\xC3\xA0 composto da almeno tre membri. I Senatori partecipano alle riunioni di governo. Possono chiedere che vengano convocate le riunioni del medesimo. Partecipano a tutte le manifestazioni dell\xE2\x80\x99ordine. Il G.C.SS. pu\xC3\xB2 porre sotto processo il Cancelliere e, se \xC3\xA8 il caso, pu\xC3\xB2 destituirlo con parere unanime pi\xC3\xB9 il parere favorevole alla destituzione dei \xC2\xBE del C.MM (sei membri), sentito anche il parere del Pontefice del S.O.G.F..\r\n\
    Quella di Senatore \xC3\xA8 una carica vitalizia che decade in caso di assenza per tre volte consecutive alle votazioni per il Cancelliere; la delega scritta e firmata per la votazione ha valore di presenza. I Senatori hanno bolli n+1-1, il che significa che hanno un bollo di pi\xC3\xB9 di chiunque altro venga a diverbio con loro, tranne che col Cancelliere.                                                            04/11\r\n\
    VII I Notabili.\r\n\
    \r\n\
    Coloro che hanno ricoperto le cariche di ministri o ambasciatori e che non ricevono ulteriori incarichi, per motivi diversi da bolle d\xE2\x80\x99infamie, vengono detti Notabili. Degni sicuramente di gran rispetto, mantengono i propri bolli e hanno diritto di portare la placca. \r\n\
    Tutti coloro che non sono mantellati (e che non lo sono mai stati) formano il popolo goliardico.\r\n\
    \r\n\
    \r\n\
    VIII Le Nomine.\r\n\
    \r\n\
    Ad eccezione del primo, che viene eletto dall\xE2\x80\x99assemblea costituente, il Cancelliere viene eletto, previa candidatura, tra i pi\xC3\xB9 anziani e valorosi con le seguenti modalit\xC3\xA0:\r\n\
    -A-\tCancelliere uscente                      un voto\r\n\
    -B-\tMinistri uscenti                           un voto a testa\r\n\
    -C-\tSenatori                                    un voto a testa\r\n\
    -D-\tNotabili                                    un voto\r\n\
    -E-\tPopolo                                     un voto\r\n\
    -F-\tPontefice S.O.G.F.                        un voto  \r\n\
    Tutti gli iscritti all\xE2\x80\x99ordine, che siano stati almeno una volta ministri, possono candidarsi alla carica di Cancelliere, compreso il Cancelliere uscente che pu\xC3\xB2 essere quindi rieletto. Le candidature e quindi l\xE2\x80\x99eventuale rielezione pu\xC3\xB2 essere solo consecutiva.\r\n\
    Il Cancelliere dura in carica un anno e pu\xC3\xB2 comunque lasciare l\xE2\x80\x99incarico prima del tempo. La data dell\xE2\x80\x99elezione del cancelliere e della cena di apertura verr\xC3\xA0 stabilita con legge dal 1\xC2\xB0 Cancelliere. Il passaggio di consegna avviene immediatamente dopo l\xE2\x80\x99elezione con il passaggio del manto e di tutto il materiale dell\xE2\x80\x99ordine (questo statuto nel formato originale, il registro dei verbali e delle nomine, il timbro, il registro delle finanze pi\xC3\xB9 la cassa, il registro degli iscritti, il gonfalone dell\xE2\x80\x99ordine). Il Cancelliere nello stesso momento indossa la placca da gran maestro preparata per l\xE2\x80\x99occasione. Il Cancelliere provvede, nello stesso giorno o in quelli successivi, alla nomina dei ministri scelti tra i pi\xC3\xB9 anziani e valorosi, sentito anche il parere del   G.C.SS. Provvede quindi alla nomina dei sottosegretari.\r\n\
    Sentito il parere dei Ministri, nomina se necessario degli ambasciatori e assegna tutte le cariche H.C. e crea, se lo ritiene opportuno, cariche speciali.\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    05/11\r\n\
    \r\n\
    La cerimonia di elezione del Cancelliere avviene con il seguente rituale:\r\n\
    \r\n\
    Nos Magnum Consilium Senatores, Notabiles\r\n\
    Et populum Goliardicum : Nominamus Te \xE2\x80\xA6\r\n\
    Cancelliere Sacri Ordinis Topae\r\n\
    Accipe Salis Sapientiae et Pepis Argutiae\r\n\
    (viene cosparso sale e pepe sulle labbra)\r\n\
    In Nomine Bacci\r\n\
    \r\n\
    \r\n\
    \r\n\
    (si versa del vino sul capo)\r\n\
    Tabacci\r\n\
    (si mette del tabacco o della cenere sul capo)\r\n\
    Venerisque\r\n\
    (una leggiadra pulzella bacia il neo-Cancellire)\r\n\
    Et Nostra Sancta Matre Goliardia Gratia.\r\n\
    \r\n\
    \r\n\
    \r\n\
    \xC3\x88 consuetudine che il Cancelliere appena eletto assuma un appellativo che lo distingua o che questo gli venga dato dai senatori.\r\n\
    La stessa formula viene usata dal cancelliere per la nomina dei ministri e di tutte le altre cariche: \r\n\
    \r\n\
    Nos nome  Cancelliere Sacri Ordinis Topae\r\n\
    Nominamus Te carica  \r\n\
    Accipe Salis Sapientiae et Pepis Argutiae\r\n\
    In Nomine Bacci Tabacci Venerisque.\r\n\
    Et Nostra Sancta Matre Goliardia Gratia.\r\n\
    \r\n\
    Per l\xE2\x80\x99ammissione a far parte dell\xE2\x80\x99ordine si usa invece la seguente formula:\r\n\
    \r\n\
    Nos nome  Cancelliere Sacri Ordinis Topae\r\n\
    Accipimus Te In Nostra Familia Goliardica.\r\n\
    Cum Nomine  nome \r\n\
    Accipe Salis Sapientiae et Pepis Argutiae\r\n\
    In Nomine Bacci Tabacci Venerisque.\r\n\
    Et Nostra Sancta Matre Goliardia Gratia.\r\n\
    \r\n\
    06/11\r\n\
    \r\n\
    IX I Manti.\r\n\
    \r\n\
    A Il manto del Cancelliere \xC3\xA8 verde (che rappresenta la mescolanza dei colori sociali) con colletto giallobl\xC3\xB9.\r\n\
    BIl manto dei ministri \xC3\xA8 giallobl\xC3\xB9. Ciascun manto porta un fiocco del colore del suo ministero     (uguale quindi a quello della placca). \r\n\
    C Tutti i manti portano sul retro le insegne del S.O.T. \r\n   I sottosegretari portano la fascia del ministero competente; \r\n  Quello agli interni porta la mantella del colore del ministero degli interni\r\n\
    D La polizia Goliardica porta saio con insegne del colore del Ministro degli interni \r\n\
    E I Senatori portano manto nero con mantellina di colore giallobl\xC3\xB9 e recano le insegne.\r\n\
    \r\n\
    \r\n\
    X Le Placche.\r\n\
    \r\n\
    Il Cancelliere, i Ministri, i Notabili, i Cavalieri della Topa e i Senatori portano la placca.\r\n\
    A Quella del Cancelliere \xC3\xA8 pi\xC3\xB9 grande delle altre, ha fiocco verde e il nastro \xC3\xA8 verde con decorazioni dorate ed inserti gialli e blu. La stessa placca viene tenuta anche quando si diventa Senatori, perci\xC3\xB2 la placca viene preparata per ogni Cancelliere e reca inciso il numero progressivo del Cancellierato.\r\n\
    B Le placche dei Ministri hanno nastro giallobl\xC3\xB9 e fiocco di colore diverso di ciascun ministero:\r\n\
    &#61580;\tMinistro vicario: fiocco verde.\r\n\
    &#61581;\tMinistro degli interni : fiocco bordeaux.\r\n\
    &#61582;\tMinistro della giustizia: fiocco bianco.\r\n\
    &#61583;\tMinistro degli esteri : fiocco grigio.\r\n\
    &#61584;\tMinistro delle finanze: fiocco oro.\r\n\
    &#61585;\tMinistro dell'approvvigionamento: fiocco panna.\r\n\
    &#61586;\tMinistro dei ludi: fiocco rosa.\r\n\
    A Le placche dei notabili hanno nastro giallobl\xC3\xB9 e fiocco blu.\r\n\
    B Le placche dei Cavalieri della Topa hanno nastro e fiocco blu.\r\n\
    C I mastri di chiavi portano chiave con nastro giallobl\xC3\xB9.\r\n\
