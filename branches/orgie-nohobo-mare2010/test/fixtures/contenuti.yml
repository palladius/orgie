contenuti_098: 
  m_bInAttesa: "1"
  datapubblicazione: 
  datacreazione: 2008-05-07 02:13:19
  m_bSerio: "0"
  idlogin: "4009"
  m_nLivelloSegretezza: "0"
  titolo: CARABINIERI 2
  idcontenuto: "1877513604"
  tipo: barzellette
  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: |
    1) Un carabiniere: "Mi sono comprato un gommone". "Perche' hai molto da cancellare?" 
    
    2) In Sicilia la Centrale dei carabinieri manda un messaggio a tutte le auto: "Controllare tutte le auto che vanno a Marsala". Al posto di blocco i carabinieri controllano: "Passi pure, anche questa va a benzina!".
    
    3) .Il carabiniere (in borghese) alla fermata dell'autobus col sacchetto con le mele. Un tizio: "Scusi, passa di qui il 19?"Il caramba: "Il 19.. il 19... mah! Dovrei essere a Roma!"
    
    4) Carabiniere in attesa in sala parto. Nasce un negretto. L'infermiera: "E' suo?". "Puo' darsi, mia moglie brucia sempre tutto!".
    
     5) Carabiniere in negozio : vorrei un portafoglio impermeabile. "Perche' ?" "Per metterci il denaro liquido!". 
    
    6) Carabinieri: "Brigadiere, sua moglie ha rischiato di annegare! Ha bisogno della respirazione artificiale". "No no, ho i soldi! Voglio la respirazione vera!".
    
    7) Carabinieri: "Appuntato, accendete la luce!". Tic tac tic tac tic tac ... "Ma che sta facendo?". "C'e' scritto 220 volt!".
    
    8) Che differenza c'e' fra un carabiniere e una bottiglia di birra? Nessuna: sono vuoti entrambi dal collo in su.
    
    9) Perche' i carabinieri non inseguono mai i banditi per i campi? Perche' cosi' non rischiano di essere seminati! 
    
    10) Un carabiniere siciliano entra in una pasticceria di Milano: "Vorrei una colomba". "Motta?". "E che viva me la vuole dare?!".
    
    11) Un carabiniere arriva contento in ufficio: "Ieri ho finito un bel puzzle". L'appuntato: "E quanto ci hai messo?". "Due anni". "Ma mi sembra molto". "Ma che dici. Sulla scatola c'era scritto: da 3 a 6 anni!".
    
    12) Carabiniere telefona all'ufficio informazioni dell'aeroporto: "Quanto tempo impiega il volo Bologna-Roma?". La centralinista: "Un attimo...". E il carabiniere: "Grazie" e riattacca. 
    
    13) Carabiniere: "Non c'e' piu' democrazia! Mi hanno cacciato fuori dalla cabina elettorale!". "Come mai?". "Ero entrato con 4 colleghi: c'era scritto: piegare in 4!". 
    
    14) Un carabiniere al capitano mentre sta leggendo il giornale: "Capitano, e' morto Tusi!". "Ma no e' impossibile: e' in ferie!". "Ma e' scritto sul giornale: Incidente d'auto: morti 3, 4 con...tusi!". 
    
    15) Perche' in Russia i carabinieri vanno a tre a tre? Perche' uno sa leggere, uno sa scrivere e il terzo controlla i due intellettuali. 
    
    16) Posto di blocco dei carabinieri: "Alt! Documenti". "Digos". E il carabiniere: "Los documentos, por favor!". 
    
    17) Perche' ai carabinieri non fanno mai usare la Panda 4x4 ? Seno' cercano di salire in 16 ! 
    
    18) Un carabiniere fissa da 2 ore una camera in un hotel. Un collega, meravigliato, gli chiede cosa stia facendo. "Il capo mi ha detto: vai a fissarmi una camera all'hotel!".
    
    
    
    
    
    

