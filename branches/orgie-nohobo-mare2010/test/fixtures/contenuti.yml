  contenuto: "La Fighetta:\r\n\
    La categoria delle fighette, \xC3\xA8 composta essenzialmente da ragazze, in\r\n\
    genere giovani (17-21 anni), che se la portano a spasso ridendo e\r\n\
    scherzando con uno stuolo di amiche, in genere fighette anch'esse. La\r\n\
    fighetta non si caratterizza per una particolare bellezza: essa\r\n\
    semplicemente \xC3\xA8 un tipo che sembra disponibile, da come si comporta,\r\n\
    salvo poi rivelare un carattere da vera rompicoglioni nel momento in cui\r\n\
    l'approccio diviene pi? esplicito...\r\n\
    \r\n\
    La Gnocca:\r\n\
    La classe delle Gnocche \xC3\xA8 composta da elementi di sesso femminile con\r\n\
    elevato grado di attrazione. Caratatterizzata di solito da forme assai\r\n\
    piacevoli, \xC3\xA8 solita vestirsi in modo vistoso, gradevole e si distingue\r\n\
    per i suoi modi sensuali e spigliati. Caratteristica fondamentale della\r\n\
    gnocca \xC3\xA8 il tirarsela quel tanto che serve per fare passare la voglia,\r\n\
    ai comuni mortali non dotati di conto corrente a 10 cifre, di tentare un\r\n\
    approccio, adducendo la solita frase \"Naaa...se la tira troppo...\"\r\n\
    \r\n\
    La Cozza:\r\n\
    Estremamente diffusa, la categoria delle cozze \xC3\xA8 composta da esemplari\r\n\
    di sesso (forse) femminile che poco hanno di umano e molto di\r\n\
    celenterato... La cozza ha peso variabile, non necessariamente\r\n\
    eccessivo, ma in caso di peso \"normale\", l'assenza di grasso non ne\r\n\
    pregiudica l'appartenenza alla classe, dato che normalmente le sue forme\r\n\
    assomigliano pi\xC3\xB9 a quelle di un coccodrillo che di una donna. Non di\r\n\
    rado, la cozza, pur di darsi un tono, se la tira come e pi\xC3\xB9 della\r\n\
    Gnocca, ottenendo come risultato una progressiva migrazione verso la\r\n\
    categoria delle Brutte Zitelle Stressacazzi.\r\n\
    \r\n\
    La Figa Standard:\r\n\
    Categoria molto apprezzata, quella delle fighe standard \xC3\xA8 una famiglia\r\n\
    di medio-bassa diffusione, composta essenzialmente da esemplari con\r\n\
    alcune caratteristiche peculiari (o belle tette o bel culo, o altro..),\r\n\
    ma in ogni caso di aspetto piacevole, discreta disponibilit\xC3\xA0 al dialogo\r\n\
    e grande versatilit\xC3\xA0 morale. La Figa Standard si accompagna spesso ad\r\n\
    una o pi\xC3\xB9 Cozze, con le quali intrattiene rapporti di amicizia profonda,\r\n\
    certa dell'assoluta impossibilit\xC3\xA0 di una qualsiasi forma di concorrenza\r\n\
    sessuale da parte delle amiche. Il difetto fondamentale della Figa\r\n\
    Standard \xC3\xA8 una sua rapida declassificazione a Donna Elastico, non appena\r\n\
    si rende conto della reale attrazione suscitata negli uomini. Questo ne\r\n\
    rende pericolosa la frequentazione per lunghi periodi di tempo.\r\n\
    \r\n\
    La Figa Pazzesca:\r\n\
    Rarissima specie di donna, caratterizzata da un aspetto da far sbavare,\r\n\
    curve perfette, sorriso ammaliante e abbigliamento preciso, la Figa\r\n\
    Pazzesca \xC3\xA8 una delle prede pi\xC3\xB9 ambite in ogni ambiente. La Figa Pazzesca \xC3\xA8 dotata in genere di una notevole simpatia, ma spesso anche di scarsa intelligenza, che la porta a volte ad infilarsi in storie assurde con personaggi maschili che, pur di tenersela stretta, depauperano tutte le loro risorse economiche nell'attivit\xC3\xA0 di correlazione: aperitivi, cenette, regali, locali notturni e, in non rari casi, droga. La Figa pazzesca \xC3\xA8, e rimane, un \"cult\" per ogni uomo che sia in grado di superare l'iniziale momento di euforia dato dalla conquista dell'esemplare.\r\n\
    \r\n\
    La Donna Elastico:\r\n\
    La Donna elastico \xC3\xA8 una delle specie pi\xC3\xB9 diffuse. Famiglia composta sia\r\n\
    da esemplari nativi che da ex esemplari di Figa standard, la Donna\r\n\
    elastico vive la propria esistenza tra N frequentazioni maschili,\r\n\
    saltando da una all'altra con la stessa facilit\xC3\xA0 con cui si cambia di\r\n\
    abito. Generalmente dotata di scarso senso dell'autocritica, la Donna\r\n\
    elastico \xC3\xA8 convinta che in ogni caso il suo comportamento sia corretto,\r\n\
    anche se contrario a qulunque morale, persino la propria. Viene detta\r\n\
    Donna elastico per la sua flessibilit\xC3\xA0 nei rapporti interpersonali: essa\r\n\
    non predilige una particolare persona, ma si deforma secondo le esigenze\r\n\
    del momento, mantenendo al proprio interno una fortissima componente di\r\n\
    cinismo. Caratteristica intrinseca della Donna elastico, \xC3\xA8 la sua\r\n\
    capacit\xC3\xA0 di circuire gli uomini, facendogli credere di fare parte della\r\n\
    famiglia delle Fighette o delle Fighe standard, per poi dimostrare, con\r\n\
    il tempo, di essere molto pi\xC3\xB9 affine alla categoria delle Troie,\r\n\
    rendendosi pertanto moolto pericolosa.\r\n\
    \r\n\
    La Brutta Zitella Scassacazzo:\r\n\
    Terribile esempio di come un essere umano possa degenerare, le Brutte\r\n\
    zitelle scassacazzo sono una vera e propria mina vagante. Generalmente\r\n\
    orribili, questi esseri circolano liberamente con tutto il loro pesante\r\n\
    carico di odio e invidia verso tutti gli altri generi femminili, con la\r\n\
    sola esclusione delle Cozze, con le quali intrattengono spesso rapporti\r\n\
    di pettegolezzo. Spesso la Brutta zitella scassacazzi \xC3\xA8 accompagnata\r\n\
    dalla madre o dalla nonna, la quale fa opera di carit\xC3\xA0 al mondo,\r\n\
    sottraendole tempo che altrimenti sarebbe destinato alla devastazione\r\n\
    dei rapporti altrui. Purtroppo, per\xC3\xB2, le appartenenti a questa famiglia\r\n\
    hanno in genere una predisposizione naturale al disbrigo rapido di tutte\r\n\
    le faccende e lavori che altri esemplari eseguono in tempi standard,\r\n\
    rendendo quindi difficile la loro alienazione da troppo lavoro. Non sono\r\n\
    rari i casi in cui la Brutta zitella scassacazzi, data la sua cronica\r\n\
    inapplicazione sessuale, perde la testa per qualche esemplare maschile,\r\n\
    subendo una temporanea trasformazione che la riporta alla famiglia delle\r\n\
    cozze, dalla quale passa spesso alla famiglia delle Maialone Orrende\r\n\
    Senza Ritegno. Tali transizionisono generalmente temporanee, tranne in\r\n\
    rari casi in cui l'esemplare migra definitivamente all'ultima categoria\r\n\
    e ci resta fino alla vecchiaia.\r\n\
    \r\n\
    La Donna in Carriera:\r\n\
    La classe delle Donne in carriera sta avendo grandissima diffusione\r\n\
    negli ultimi anni. Questa categoria \xC3\xA8 sostanzialmente composta da donne\r\n\
    provenienti da altre categorie, delle quali mantengono parte delle\r\n\
    caratteristiche, aggiungendone di nuove che in alcuni casi si rivelano\r\n\
    deleterie. Una di queste nuove caratteristiche \xC3\xA8 l'atteggiamento \"so\r\n\
    tutto io perch\xC3\xA8 mi faccio il culo in ufficio e non voglio sentire\r\n\
    cazzate perch\xC3\xA8 sono stanca!\". Derivante da questo atteggiamento \xC3\xA8 il\r\n\
    cosiddetto \"stress da troppi cazzi\", inteso sia in senso morale che\r\n\
    materiale. Non di rado, infatti, pur di accedere alla categoria, le\r\n\
    donne si prestano a innumerevoli compromessi, ivi compresi quelli di\r\n\
    natura sessuale. La febbre da carriera le costringe quindi, per\r\n\
    mantenere il corretto \"career improvement path\", a costanti sessioni di\r\n\
    seduzione sul luogo di lavoro, con notevole dispendio delle proprie\r\n\
    risorse umane. Questo si riflette in modo moolto negativo sull'eventuale\r\n\
    partner maschile, il quale, giustamente, dopo alcuni mesi di tolleranza\r\n\
    all'assenza di un normale equilibrio nella psiche della compagna, inizia\r\n\
    a farsi un pochetto i cazzi propri, mollando, come si suol dire, la\r\n\
    presa per dedicarsi ad una pi\xC3\xB9 sana attivit\xC3\xA0 da scapolone. La donna in\r\n\
    questione, resasi conto di tutto ci\xC3\xB2, in alcuni casi ritorna nella\r\n\
    categoria di provenienza, ma di solito accede alla categoria delle\r\n\
    Zitelle Lavoratrici Croniche.\r\n\
    \r\n\
    La Troia:\r\n\
    Come da definizione, la Troia \xC3\xA8 colei la quale, pur di divertirsi, passa\r\n\
    sopra a qualunque principio, morale o materiale. Naturalmente portata ai\r\n\
    rapporti interpersonali, la Troia predilige spaziare in ambienti ad\r\n\
    elevata concentrazione economica. In molti casi la Troia \xC3\xA8 di aspetto\r\n\
    gradevole, ed \xC3\xA8 dotata di una notevole attrattivit\xC3\xA0. Essa \xC3\xA8 inoltre\r\n\
    fornita di alcune capacit\xC3\xA0 previsionali che hanno dell'incredibile: la\r\n\
    Troia riesce, in moltissimi casi e con una semplice occhiata, ad intuire\r\n\
    di qualsiasi uomo i seguenti dati: numero di conti correnti intestati,\r\n\
    automobili possedute, fido della carta di credito, contanti posseduti\r\n\
    nel portafoglio. Grazie a questa caratteristica, la Troia riesce ad\r\n\
    approcciare qualunque uomo, sposato, fidanzato o libero, offrendo in\r\n\
    modo pi\xC3\xB9 o meno evidente i propri favori sessuali ed iniziando una\r\n\
    costante opera di drenaggio di capitali, adottando la tecnica dello\r\n\
    scambio 10minutidisesso-regalinodaalmeno300sacchi. Caratteristica\r\n\
    distintiva della Troia \xC3\xA8 una normale predilezione per tutti quei generi\r\n\
    di abbigliamento che coniugano l'alta sensualit\xC3\xA0 con la praticit\xC3\xA0 di\r\n\
    svestizione. Altra caratteristica importante del loro vestiario, \xC3\xA8 la\r\n\
    estrema capacit\xC3\xA0 di assorbire \"con-macchia\" ogni sorta di fluido\r\n\
    organico maschile, in modo da poter utilizzare l'abito come arma di\r\n\
    ricatto..\r\n\
    \r\n\
    La Suora:\r\n\
    Nella categoria delle suore, rientrano tutte quelle gentili signorine\r\n\
    che, nonostante la loro disponibilit\xC3\xA0 al divertimento e alla vita\r\n\
    notturna, manifestano una presumibilmente totale amenit\xC3\xA0 ai piaceri\r\n\
    della carne. Un comportamento tipico delle suore \xC3\xA8 il presentarsi come\r\n\
    gentili, affabili, disponibili e soprattutto libere da ogni vincolo,\r\n\
    suscitando una legittima curiosit\xC3\xA0 negli esemplari maschili che\r\n\
    frequentano, dato che spesso gli esemplari appartenenti alla famiglia in\r\n\
    oggetto sono discretamente attraenti. Il problema \xC3\xA8 che, come lascia\r\n\
    intuire il nome della famiglia, le suore sono specializzate nel portare,\r\n\
    pi\xC3\xB9 o meno volontariamente, gli uomini ad interessarsi sessualmente a\r\n\
    loro, per poi opporre un secco rifiuto a qualunque genere di proposta\r\n\
    anche solo blandamente erotica. Frase tipica delle suore \xC3\xA8:\"Ma per chi\r\n\
    mi hai presa? Per una che la d\xC3\xA0 a tutti quelli che incontra?\". La frase,\r\n\
    riferita al contesto \xC3\xA8 in effetti oggettivamente corretta, in quanto la\r\n\
    suora, per definizione di classe, non la d\xC3\xA0 assolutamente a nessuno.\r\n\
    Questo la porta spesso ad uno stato di eccezionale depressione (una\r\n\
    donna senza cazzo si sciupa), che viene solitamente superato praticando\r\n\
    delle feroci sedute di autoerotismo. Come risultato di questo\r\n\
    comportamento, la Suora tende con il tempo a migrare verso altre\r\n\
    famiglie, soprattutto verso la famiglia delle Acidone, a volte in quella\r\n\
    delle Zitelle Lavoratrici Croniche oppure, in alcuni rari casi, per\r\n\
    compensazione di una vita di privazioni, nella categoria delle Ninfomani\r\n\
    Insaziabili.\r\n\
    \r\n\
    La Maialona Orrenda Senza Ritegno (M.O.S.R.):\r\n\
    A questa famiglia appartengono tutti quegli esemplari femminili (...)\r\n\
    che, non disponendo di caratteristiche attrattive sufficienti ad\r\n\
    attirare l'attenzione autonoma degli uomini, ricorrono al vecchio trucco\r\n\
    di \"sbatterla in faccia a tutti quelli che le capitano\". Riconoscibili\r\n\
    per l'abbigliamento succinto, dal quale si evidenzia a colpo d'occhio la\r\n\
    trabordanza della massa grassa, le M.O.S.R.o sono spesso dedite al bere,\r\n\
    nonch\xC3\xA8 alla frequentazione di tutti quei luoghi di aggregazione dove\r\n\
    abbondano degli esemplari maschili in astinenza forzata. In alcuni casi,\r\n\
    per\xC3\xB2, le M.O.S.R., si rivelano utili: capita infatti che qualche\r\n\
    esemplare maschile, uscente da una relazione con un esemplare o di donna\r\n\
    elastico o di fighetta o ancora di donna in carriera, frustrato dalla\r\n\
    momentanea situazione di abbandono, trovi rifugio nelle attenzioni di\r\n\
    una qualche M.O.S.R. Questo avviene perch\xC3\xA8 spesso, le M.O.S.R., sono\r\n\
    esperte in una qualche pratica erotica inusuale. Questo stimola la\r\n\
    curiosit\xC3\xA0 del maschio, il quale, dopo un breve periodo trascorso a farsi\r\n\
    sollazzare dalla zozzona, la abbandona al suo destino per ricominciare a\r\n\
    dedicarsi a prede pi\xC3\xB9 ambiziose.\r\n\
    \r\n\
    La Zitella Lavoratrice Cronica (Z.L.C.):\r\n\
    Questa famiglia \xC3\xA8 strettamente legata alla famiglia delle donne in\r\n\
    carriera. In effetti si potrebbe definire come una sottospecie della\r\n\
    donna in carriera, dato che normalmente l'atteggiamento \xC3\xA8 lo stesso,\r\n\
    tranne che per alcune caratteristiche che permettono la distinzione\r\n\
    delle due classi. La Z.L.C., infatti, ha perso il fondamentale interesse\r\n\
    alla prosecuzione della carriera, in quanto ha spesso ottenuto uno stop\r\n\
    forzato alla crescita professionale causato da un qualche errore di\r\n\
    percorso. Ad esempio: capita che una donna in carriera, nello\r\n\
    svolgimento delle sue funzioni, cerchi di sedurre l'uomo di una qualche\r\n\
    altra donna in carriera pi\xC3\xB9 in alto di lei nella scala gerarchica.\r\n\
    Questo porta la donna in carriera di rango pi\xC3\xB9 elevato a tramutarsi\r\n\
    istantaneamente in femmina vendicativa, scatenando tutte le armi a sua\r\n\
    disposizione per frenare l'avanzata della concorrente. La poveretta (si\r\n\
    fa per dire) si trova a questo punto sputtanata in tutto l'ufficio e,\r\n\
    vuoi per la vergogna o per costrizione, si rifugia nello stakanovismo\r\n\
    pi\xC3\xB9 feroce. Questo la costringe ad abbandonare ogni velleit\xC3\xA0, sia in\r\n\
    ambito professionale che privato, lasciandola dedita solo ed\r\n\
    esclusivamente al lavoro. Le Z.L.C possono provenire anche da altre\r\n\
    categorie, ma difficilmente escono dalla loro condizione per mutare di\r\n\
    classe.\r\n\
    \r\n\
    La Ninfomane Insaziabile:\r\n\
    Come il nome lascia intuire, la ninfomane insaziabile \xC3\xA8 quel tipo di\r\n\
    ragazza, bella o brutta, che non pu\xC3\xB2 fare a meno di un pene per pi? di\r\n\
    sei/otto ore. La fame di sesso di queste donne \xC3\xA8 incredibile: esse sono\r\n\
    addirittura disposte a raccattare i lavavetri agli angoli delle strade,\r\n\
    pur di farsi infilare, anche se ovviamente preferiscono frequentare\r\n\
    altri generi di esemplari maschili. In alcuni casi davvero eccezionali,\r\n\
    la ninfomane insaziabile presenta anche le caratteristiche esteriori\r\n\
    della figa pazzesca. In tal caso si parla di Pornodonna. La ninfomane\r\n\
    insaziabile \xC3\xA8 una preda discretamente ambita, pur presentando lo\r\n\
    svantaggio di non essere assolutamente affidabile dal punto di vista\r\n\
    psicologico. Chiunque si sposasse con una Ninfomane insaziabile avrebbe\r\n\
    la virtuale certezza di essere cornuto gi\xC3\xA0 all'inizio del banchetto di\r\n\
    nozze.\r\n\
    \r\n\
    La Acidona:\r\n\
    La famiglia delle acidone comprende tutti quegli esemplari che, per un\r\n\
    motivo o per l'altro, non sono in grado di passare una serata in\r\n\
    compagnia, senza scazzare con qualcuno del gruppo. Caratteristica\r\n\
    dell'Acidona, \xC3\xA8 la sua capacit\xC3\xA0 di criticare qualunque frase le venga\r\n\
    rivolta come se fosse un insulto nei suoi riguardi. Ad un classico\r\n\
    \"Ciao, come stai?\", l'Acidona risponde quasi immancabilmente \"Che ti\r\n\
    frega? Fatti i cazzi tuoi!\". Da questo comportamento ne deriva un\r\n\
    generale disprezzo nei suoi riguardi, che la porta negli anni ad\r\n\
    inacidirsi sempre di pi\xC3\xB9, fino a sfociare nella categoria delle Isteriche.\r\n\
    \r\n\
    La Tipa:\r\n\
    Probabilmente la categoria pi\xC3\xB9 diffusa. Le tipe sono tutte quelle che si\r\n\
    incontrano normalmente ad una festa, che ti chiedono se hai una\r\n\
    sigaretta, se gli fai accendere, se gli reggi la borsa, ma con le quali\r\n\
    non si intrattengono discorsi che durino pi\xC3\xB9 di 30 minuti (casi\r\n\
    eccezionali). In generale la Tipa si presenta come un esemplare\r\n\
    femminile normale, salvo poi presentare caratteristiche che ne\r\n\
    permettono una classificazione pi? specifica in una delle seguenti\r\n\
    sottofamiglie:\r\n\
    - Tipa che la d\xC3\xA0\r\n\
    - Tipa che non la d\xC3\xA0\r\n\
    - Tipa che la darebbe ma ha il tipo\r\n\
    - Tipa che te la faresti se non ci fosse la tua Tipa\r\n\
    - Tipa che te la fai facendole credere che sei chissacch\xC3\xA8 e poi non la\r\n\
    accompagni neanche a casa.\r\n\
    \r\n\
    Il Puttanone:\r\n\
    Il puttanone \xC3\xA8 una curiosa deviazione della tipologia Troia. Di norma,\r\n\
    una Troia resta semplicemente Troia, e vive la sua troiaggine pi\xC3\xB9 o meno\r\n\
    coerentemente. In alcuni casi, si verifica qualcosa che porta la Troia a\r\n\
    riconsiderare la propria condizione e, in una botta di moralismo\r\n\
    incredibile (di incredibile non c'\xC3\xA8 la grandezza dell'atto di moralismo,\r\n\
    ma il fatto che questo possa accadere), decide di non dedicarsi pi\xC3\xB9 al\r\n\
    drenaggio di capitali. Il fatto \xC3\xA8 che essa, ormai, \xC3\xA8 abituata a saltare\r\n\
    da un membro all'altro con agilit\xC3\xA0. Questo desiderio di uscire dal\r\n\
    proprio schema classico \"la d\xC3\xA0 se cacci la lira\" (l'euro), la porta ad\r\n\
    intraprendere un cammino dove il bisogno di purgare la propria anima\r\n\
    dall'istinto meretricio le impone di fornire favori sessuali senza\r\n\
    richiedere nulla in cambio. Come risultato, Il Puttanone, scopa con le\r\n\
    stesse modalit\xC3\xA0 della Troia, ma non chiede nulla in cambio, se non il\r\n\
    mero appagamento sessuale. In questo dimostra un atteggiamento simile\r\n\
    alla Ninfomane insaziabile, anche se il ritmo erotico \xC3\xA8 decisamente pi\xC3\xB9\r\n\
    basso. Nel caso della Ninfomane insaziabile si tratta di bisogno fisico\r\n\
    di cazzi, mentre il puttanone \xC3\xA8 pi\xC3\xB9 che altro spinto dalla scelta\r\n\
    personale di essere disponibile ad ogni uomo.\r\n\
    \r\n\
    La Pornodonna:\r\n\
    Definire la Pornodonna equivale ad una solenne descrizione di uno dei\r\n\
    desideri pi\xC3\xB9 osceni di molti maschi: una donna splendida, simpatica e\r\n\
    soprattutto assetata di sesso pi\xC3\xB9 di qualunque altra cosa. Chiaramente\r\n\
    un esemplare del genere, pu\xC3\xB2 avere il suo campo di applicazione per un\r\n\
    periodo massimo di 10 giorni... seguire il ritmo di una Pornodonna \xC3\xA8\r\n\
    pressocch\xC3\xA8 impossibile gi\xC3\xA0 se si \xC3\xA8 dei ricconi nullafacenti, figurarsi\r\n\
    se in pi\xC3\xB9 si \xC3\xA8 tenuti al lavoro... Una pornodonna rappresenta quindi\r\n\
    un'impresa, nel vero senso del termine... ella si prester? a qualsiasi\r\n\
    tipo di rapporto sessuale, in qualsiasi momento e in qualunque\r\n\
    situazione; permetter\xC3\xA0 all'uomo di turno di passeggiare amabilmente\r\n\
    abbracciato ad una ragazza splendida, abbandonandosi alla sacrosanta\r\n\
    bastardaggine data dal poter comunicare a sguardi ai propri amici il\r\n\
    famoso: \"Guardate un po' chi mi scopo io...\". Tale sensazione, per\xC3\xB2, \xC3\xA8\r\n\
    destinata a durare poco (10 giorni), dato che la Pornodonna in questione\r\n\
    non mancher\xC3\xA0 di tenere gli occhi aperti...ed in capo a poco pi\xC3\xB9 di un\r\n\
    mese...tutti gli amici del gruppo avranno ottenuto lo stesso trattamento\r\n\
    dalla suddetta, e gli sguardi saranno molto meno fieri....\r\n\
    \r\n\
    L'Isterica:\r\n\
    Definire l'isterica corrisponde a dare uno sguardo un po' a tutte le\r\n\
    donne... tuttavia ci sono alcuni esemplari che fanno dello sclero la\r\n\
    propria ragione di vita. L'isterica non si proccupa minimamente della\r\n\
    situazione, del momento, delle persone con cui ha a che fare, e si\r\n\
    lascia generosamente andare a degli scatti di ira furiosa che in non\r\n\
    rari casi sfociano in un vero e proprio attacco di violenza gratuita..\r\n\
    Il problema \xC3\xA8 che queste poverette, non si rendono conto del fatto che\r\n\
    la pazienza umana ha un limite, quindi, giunte all'ennesimo scazzo\r\n\
    feroce, quando cercano per l'ennesima volta di schiaffeggiare il povero\r\n\
    cristo di turno, perdono i sensi e si risvegliano doloranti con il\r\n\
    tatuaggio della mano di lui sulla faccia (da cazzo)... Di solito, a\r\n\
    questo punto, cercano di rimediare con l'ennesima botta isterica, questa\r\n\
    volta dominata dal pianto furioso...in soli 5 secondi, la faccia della\r\n\
    sciagurata sembra flagellata da un monsone, con litri e litri di lacrime\r\n\
    che si riversano al suolo provocando disidratazione (purtroppo mai\r\n\
    sufficiente a provocarne la morte), mentre dalla bocca le fuoriescono\r\n\
    degli strani mugolii assolutamente incomprensibili. Questi momenti sono\r\n\
    estremamente delicati: MAI COMUNICARE L'INCAPACITA' DI COMPRENDERE CIO'\r\n\
    CHE LA MATTA DICE!! Il rischio minore \xC3\xA8 quello di riportarla allo stadio\r\n\
    immediatamente precedente al pianto, ossia quando pretende di mandarvi\r\n\
    al tappeto, quello maggiore \xC3\xA8 di ritrovarvi effettivamente al tappeto\r\n\
    vittime di una feroce ginocchiata nei coglioni.\r\n"
