    08/11\r\n\
    XII Gerarchie Goliardiche e Vestimenta\r\n\
    \r\n\
    La gerarchia goliardica indica i vari \xE2\x80\x9CStatus\xE2\x80\x9D del goliarda riconducibili ai bolli sul libretto universitario.\r\n\
    Le \xE2\x80\x9Cvestimenta\xE2\x80\x9D del goliarda sono i vari ammennicoli che si possono attaccare sulla feluca in base allo \xE2\x80\x9Cstatus\xE2\x80\x9D in cui ci si trova.\r\n\
    \r\n\
    Matricola: \xE2\x80\x9Cminus quam merdam est\xE2\x80\x9D \xC3\xA8 il primo stadio della gerarchia goliardica, in cui il goliarda \xC3\xA8 vessato dagli anziani per la sua condizione \xE2\x80\x9Cfetida e inferiore\xE2\x80\x9D, per cui sempre deve rispettare le \xE2\x80\x9Cvoluntas anzianorum que suprema est\xE2\x80\x9D . Porta quindi il goliardino nudo (\xC3\xA8 ammesso il cordone fissato in un solo lato).\r\n\
    Lo status di matricola \xC3\xA8 mantenuto fino alla cena di apertura dell\xE2\x80\x99anno successivo a quello di immatricolazione o di iscrizione al S.O.T.; in quest\xE2\x80\x99ultimo caso il goliarda dalla cena in poi riassume lo status derivato dai bolli accademici.\r\n\
    \r\n\
    Fagiolo: \xE2\x80\x9CPhamelicus sed tolerato\xE2\x80\x9D \xC3\xA8 il goliarda con due bolli sul libretto, pu\xC3\xB2 portare affissi sul goliardino quattro fissi e due pendenti pi\xC3\xB9 due fagioli del colore della feluca, pi\xC3\xB9 forbici spuntate spazzola e lucido, che devono essere sempre portati durante le riunioni, feste, ecc\xE2\x80\xA6\r\n\
    \r\n\
    Colonna: \xC3\xA8 il goliarda con tre bolli sul libretto, pu\xC3\xB2 portare otto fissi e sei pendenti; pi\xC3\xB9 un modello di colonna che riproduca una delle colonne del Foro Turritano che deve essere portata durante le riunioni, feste, ecc\xE2\x80\xA6\r\n\
    \r\n\
    Anziano: \xC3\xA8 il goliarda con quattro bolli (a seconda della facolt\xC3\xA0) sul libretto, pu\xC3\xB2 portare ci\xC3\xB2 che vuole sul goliardino.\r\n\
    \r\n\
    Laureando: \xC3\xA8 il goliarda in tesi a cui manca un esame alla laurea (indipendente dall\xE2\x80\x99anno di iscrizione) e pu\xC3\xB2 portare, oltre al resto, una frangia dorata a destra.\r\n\
    \r\n\
    Fuori corso: \xC3\xA8 il goliarda che ha superato gli anni del corso regolare della sua facolt\xC3\xA0 e pu\xC3\xB2 portare, oltre al resto, la coda di volpe.\r\n\
    \r\n\
    Il sottogola \xC3\xA8 sempre lecito tranne che per le matricole, quando di sughero viene detto Tappo ed \xC3\xA8 posto quando si \xC3\xA8 stati rimandati ad un esame.  \r\n\
    I rapporti tra il Sacer Ordo Topae e il Sovranus Ordo Gaudentis Favae sono regolati dall\xE2\x80\x99atto di vassallaggio sottoscritto dai due ordini. \r\n \r\n\
    \r\n\
    \r\n\
