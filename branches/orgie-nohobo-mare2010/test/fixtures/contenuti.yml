  titolo: Manuale del bravo ubriaco
  idcontenuto: "325972698"
  tipo: cazzate
  idloginpubblicante: "294"
  m_battivo: "1"
  contenuto: "Manuale del bravo ubriaco : CONSUMO DI ALCOL. CAUSE, EFFETTI SECONDARI E POSSIBILI SOLUZIONI. \r\n\
    \r\n\
    1. \r\n\
    Sintomo: Piedi freddi e umidi. \r\n\
    Causa: Hai afferrato il bicchiere secondo un angolo di presa non corretto. \r\n\
    Soluzione: Gira il bicchiere fino a che la parte aperta rimanga verso l''alto. \r\n\
    \r\n\
    2. \r\n\
    Sintomo: Piedi caldi e bagnati. \r\n\
    Causa: Ti sei pisciato addosso. \r\n\
    Soluzione: Vai ad asciugarti nel bagno pi\xC3\xB9 vicino. \r\n\
    \r\n\
    3. \r\n\
    Sintomo: La parete di fronte \xC3\xA8 piena di luci. \r\n\
    Causa: Sei caduto di schiena. \r\n\
    Soluzione: Posiziona il tuo corpo a 90\xC2\xB0 rispetto al pavimento. \r\n\
    \r\n\
    4. \r\n\
    Sintomo: La bocca \xC3\xA8 piena di cenere di sigarette. \r\n\
    Causa: Sei caduto con la faccia in un portacenere. \r\n\
    Soluzione: Sputa tutto e sciacquati la bocca con un buon gintonic (va bene anche acqua tonica). \r\n\
    \r\n\
    5. \r\n\
    Sintomo: Il pavimento \xC3\xA8 torbido e sbiadito. \r\n\
    Causa: Stai guardando attraverso il bicchiere vuoto. \r\n\
    Soluzione: Riempi il bicchiere con un buon gintonic. \r\n\
    \r\n\
    6. \r\n\
    Sintomo: Il pavimento si sta movendo. \r\n\
    Causa: Ti stanno trascinando per terra. \r\n\
    Soluzione: Domanda per lo meno dove ti stanno portando. \r\n\
    \r\n\
    7. \r\n\
    Sintomo: Il riflesso della tua faccia ti guarda con insistenza dall''acqua. \r\n\
    Causa: Hai la testa nel cesso e stai cercando di vomitare. \r\n\
    Soluzione: Metti il dito (in gola). \r\n\
    \r\n\
    8. \r\n\
    Sintomo: Senti che la gente parla producendo un misterioso eco. \r\n\
    Causa: Stai tenendo il bicchiere sull''orecchio. \r\n\
    Soluzione: Smettila di fare il pagliaccio. \r\n\
    \r\n\
    9. \r\n\
    Sintomo: La discoteca si muove molto, la gente \xC3\xA8 vestita di bianco e la musica \xC3\xA8 molto ripetitiva. \r\n\
    Causa: Sei in ambulanza. \r\n\
    Soluzione: Non ti muovere: possibile coma etilico o congestione alcolica. \r\n\
    \r\n\
    10. \r\n\
    Sintomo: Tuo padre \xC3\xA8 molto strano e tutti i tuoi fratelli ti guardano con curiosit\xC3\xA0. \r\n\
    Causa: Hai sbagliato casa. \r\n\
    Soluzione: Domanda se per caso sanno dove abiti. \r\n\
    \r\n\
    11. \r\n\
    Sintomo: Un enorme fuoco di luce ti acceca la vista. \r\n\
    Causa: Sei per strada sbronzo...ed \xC3\xA8 gi\xC3\xA0 giorno. \r\n\
    Soluzione: Cappuccio, cornetto e una buona dormita. \r\n\
    \r\n\
    IMPORTANTE \r\n\
    Non tenere per te queste informazioni: mandale a un amico, ti sapr\xC3\xA0 ringraziare. \r\n"
