  m_nLivelloSegretezza: "5"
  titolo: CONSUMO DI ALCOL. CAUSE, EFFETTI SECONDARI E POSSIBILI SOLUZIONI.
  idcontenuto: "649675628"
  tipo: scienza
  idloginpubblicante: "1849"
  m_battivo: "1"
  contenuto: "\r\n\
    CONSUMO DI ALCOL. CAUSE, EFFETTI SECONDARI E POSSIBILI SOLUZIONI.\r\n\
    \r\n\
    1. Sintomo: piedi freddi e umidi\r\n\
    \xC2\xB7 Causa: hai afferrato il bicchiere secondo un angolo di presa non corretto \r\n\
    \xC2\xB7 Soluzione: gira il bicchiere fino a che la parte aperta rimanga verso l'alto\r\n\
    \r\n\
    2. Sintomo: piedi caldi e bagnati\r\n\
    \xC2\xB7 Causa: ti sei pisciato addosso \r\n\
    \xC2\xB7 Soluzione: vai ad asciugarti nel bagno pi\xC3\xB9 vicino\r\n\
    \r\n\
    3. Sintomo: la pareti di fronte \xC3\xA8 piena di luci\r\n\
    \xC2\xB7 Causa: sei caduto di schiena \r\n\
    \xC2\xB7 Soluzione: posiziona il tuo corpo a 90\xC2\xB0 rispetto al pavimento\r\n\
    \r\n\
    4. Sintomo: la bocca \xC3\xA8 piena di cenere di sigarette\r\n\
    \xC2\xB7 Causa: sei caduto con la faccia in un portacenere \r\n\
    \xC2\xB7 Soluzione: sputa tutto e sciacquati la bocca con un buon gintonic\r\n\
    \r\n\
    5. Sintomo: il pavimento \xC3\xA8 torbido e sbiadito\r\n\
    \xC2\xB7 Causa: stai guardando attraverso il bicchiere vuoto \r\n\
    \xC2\xB7 Soluzione: riempi il bicchiere con un buon gintonic\r\n\
    \r\n\
    6. Sintomo: il pavimento si sta muovendo\r\n\
    \xC2\xB7 Causa: ti stanno trascinando per terra \r\n\
    \xC2\xB7 Soluzione: domanda per lo meno dove ti stanno portando\r\n\
    \r\n\
    7. Sintomo: il riflesso della tua faccia ti guarda con insistenza dall'acqua \r\n\
    \xC2\xB7 Causa: hai la testa nel cesso e stai cercando di vomitare \r\n\
    \xC2\xB7 Soluzione: metti il dito (in gola)\r\n\
    \r\n\
    8. Sintomo: senti che la gente parla producendo un misterioso eco\r\n\
    \xC2\xB7 Causa: stai tenendo il bicchiere sull'orecchio \r\n\
    \xC2\xB7 Soluzione: smettila di fare il pagliaccio\r\n\
    \r\n\
    9. Sintomo: la discoteca si muove molto, la gente \xC3\xA8 vestita di bianco e la musica \xC3\xA8 molto ripetitiva.\r\n\
    \xC2\xB7 Causa: sei in ambulanza \r\n\
    \xC2\xB7 Soluzione: non ti muovere: possibile coma etilico o congestione alcolica.\r\n\
    \r\n\
    10. Sintomo: tuo padre \xC3\xA8 molto strano e tutti i tuoi fratelli ti guardano con curiosit\xC3\xA0\r\n\
    \xC2\xB7 Causa: hai sbagliato casa \r\n\
    \xC2\xB7 Soluzione: domanda se per caso sanno dove abiti\r\n\
    \r\n\
    11. Sintomo: un enorme fuoco di luce ti acceca la vista\r\n\
    \xC2\xB7 Causa: sei per strada sbronzo...ed \xC3\xA8 gi\xC3\xA0 giorno \r\n\
    \xC2\xB7 Soluzione: cappuccio, cornetto e una buona dormita\r\n\
    \r\n\
    \r\n\
    \r\n"
contenuti_103: 
  m_bInAttesa: "0"
  datapubblicazione: 2008-06-25 15:36:05
  datacreazione: 2008-06-25 15:34:53
  m_bSerio: "0"
  idlogin: "278"
  m_nLivelloSegretezza: "5"
  titolo: "Diario della piccola Lauretta (6 anni) "
  idcontenuto: "1850483230"
  tipo: cazzate
  idloginpubblicante: "278"
  m_battivo: "1"
  contenuto: "(postato da Onano e spostato nella sezione giusta)\r\n\
    \r\n\
    Oggi Giovanni mi ha chiesto di essere la sua ragazza, ma siccome non so molto bene cosa voglia dire, ho pensato di scoprirlo da me, spiando mia sorella con il suo ragazzo. \r\n\
    \r\n\
    Quando lui \xC3\xA8 arrivato sono andati sul divano, si sono seduti e hanno parlato per un po'... Poi lui ha spento quasi tutte le luci e ha cominciato ad abbracciarla e baciarla... \r\n\
    \r\n\
    Allora lei ha cominciato ad ammalarsi, perch\xC3\xA8 la sua faccia stava diventando molto strana... \r\n\
    \r\n\
    Il suo ragazzo deve aver pensato la stessa cosa, perch\xC3\xA8 le ha messo una mano sotto la maglietta per sentirle il Cuore, ma sembrava avesse problemi a trovarlo... \r\n\
    \r\n\
    Io ho pensato che anche lui si stesse ammalando perch\xC3\xA9 c'\xC3\xA8 stato un momento nel quale sono rimasti senza fiato... \r\n\
    \r\n\
    Lui doveva aver freddo alla mano destra, perch\xC3\xA8 l'ha messa sotto la gonna di mia sorella. Allora lei \xC3\xA8 peggiorata ed ha cominciato a trascinarsi per tutto il divano... Credevo avesse la febbre perch\xC3\xA9 diceva che aveva caldo e che non ce la faceva pi\xC3\xB9... Allora ho scoperto la causa della malattia: era un enorme verme che il ragazzo di mia sorella aveva dentro i pantaloni. Lui l'ha preso con la mano perch\xC3\xA8 non scappasse. Quando mia sorella l'ha visto, si \xC3\xA8 spaventata moltissimo. I suoi occhi si sono ingranditi e ha detto che era il pi\xC3\xB9 grande che avesse mai visto. \r\n\
    \r\n\
    Si \xC3\xA8 arrabbiata ed ha provato ad uccidere il verme staccandogli la testa a morsi. Poi di punto in bianco lei ha fatto un rumore strano ed ha lasciato andare il verme, immagino che l'abbia morsa. Allora l'ha preso con tutte e 2 le mani x non farlo muovere,intanto il suo ragazzo prendeva un tubicino di gomma da una scatolina e lo metteva sopra la testa del maledetto verme, perch\xC3\xA8 non mordesse mia sorella. \r\n\
    \r\n\
    Lei si \xC3\xA8 sdraiata ed ha aperto le gambe per poter fare una mossa di wrestling al verme. Il suo ragazzo l'ha aiutata a schiacciare il verme ed \xC3\xA8 iniziata una grande lotta. \r\n\
    \r\n\
    Lei ha cominciato a saltare e ad urlare come una matta e per poco non hanno rotto il divano. \r\n\
    \r\n\
    Immagino che volessero ucciderlo... \r\n\
    \r\n\
    Dopo un po' hanno smesso di muoversi e hanno sospirato perch\xC3\xA8 erano molto stanchi x la gran lotta. Il ragazzo si \xC3\xA8 alzato. Erano sicuri di aver ucciso il verme... Io sapevo che era morto, perch\xC3\xA9 dondolava immobile. Mia sorella e il suo ragazzo erano stanchi per la dura lotta, allora per riposarsi hanno cominciato a coccolarsi....ma il verme non era morto. \r\n\
    \r\n\
    Era vivo!!! Ed \xC3\xA8 saltato fuori di nuovo!! X fortuna che mia sorella lo ha visto e l'ha attaccato, aiutata dal suo ragazzo. Questa volta mi sorella ha provato ad ucciderlo sedendosigli sopra. Dopo una manciata di minuti l'hanno ucciso. Questa volta era morto x davvero, perch\xC3\xA8 il ragazzo ha buttato la pelle nel WC. \r\n\
    \r\n\
    Questa storia del fidanzato \xC3\xA8 veramente molto pericolosa...dir\xC3\xB2 a Giovanni di NO!!!"
