contenuti_037: 
  m_bInAttesa: "0"
  datapubblicazione: 2005-05-30 14:50:08
  datacreazione: 2005-05-19 16:02:59
  m_bSerio: "0"
  idlogin: "1770"
  m_nLivelloSegretezza: "0"
  titolo: la culeide
  idcontenuto: "1629448478"
  tipo: cazzate
  idloginpubblicante: "294"
  m_battivo: "1"
  contenuto: "La Culeide\r\n\
    poemetto giocoso in sestine\r\n \r\n\
    Non canter\xC3\xB2 di favolosi Numi\r\n\
    gli oracoli bugiardi; o di feroci\r\n\
    mentiti eroi le gesta, ed i costumi;\r\n\
    le gloriose colpe, o i casi atroci.\r\n\
    Gli orrori o i sogni d'una et\xC3\xA0 ferina\r\n\
    non vo' cantar; ma il cul di Carolina.\r\n\
    Che se lodare un cul non sia decente;\r\n\
    che dir\xC3\xB2 mai di Quei che lod\xC3\xB2 tanto\r\n\
    parti men belle, e che a noi fur sovente\r\n\
    cagion funesta di tristezza e pianto?\r\n\
    E sia Cocito di sanguigna urina\r\n\
    laudabil pi\xC3\xB9 del cul di Carolina?\r\n\
    E come in oggi esser si suole autore\r\n\
    comunque, ond'esser detto uom di calibro;\r\n\
    e tutti han di comporre il pizzicore,\r\n\
    mel sento anch'io d'impastocchiare un libro;\r\n\
    n\xC3\xA9 avendo in sacco altra miglior farina,\r\n\
    mi spazier\xC3\xB2 sul cul di Carolina.\r\n\
    Chi di donna lod\xC3\xB2 il leggiadro viso;\r\n\
    chi gli occhi, i denti, il labbro, e chi il capello;\r\n\
    chi la dolce favella; e chi 'I sorriso;\r\n\
    chi la mano gentil; chi 'I piede snello;\r\n\
    se niun lodonne il cul, ben s'indovina\r\n\
    perch\xC3\xA9: niuna ebbe il cul di Carolina.\r\n\
    Fu un bel cul sempremai laudabil cosa.\r\n\
    E sia una donna pur di poco ingegno:\r\n\
    siale fortuna e Venere ritrosa,\r\n\
    sempre di lode il suo bel culo \xC3\xA8 degno.\r\n\
    Che val belt\xC3\xA0? Che val ricca propina\r\n\
    senza un cul come quel di Carolina?\r\n\
    Esopo, ch'io credeva uom di giudizio,\r\n\
    nelle favole sue, con naso fino,\r\n\
    iva frusciando il culo a Caio e Tizio.\r\n\
    Io non cos\xC3\xAC: n\xC3\xA9 come Costantino,\r\n\
    che d\xC3\xA0 per vacca carne pecorina,\r\n\
    far\xC3\xB2. cantando il Cul di Carolina.\r\n\
    Fa ch'io dipinga un culo immalleabile,\r\n\
    atlantico, pittorico ed atletico,\r\n\
    classico, erculeo, magico, intoccabile,\r\n\
    magnifico, simpatico e magnetico,\r\n\
    in bei versi, qual'onda caballina\r\n\
    fluidi, e degni del cul di Carolina.\r\n\
    Ma, o che mi creda o no, non mi bisogna\r\n\
    la credenza del volgo e sciocco e ignaro.\r\n\
    So ben, che a voi non sembrer\xC3\xA0 menzogna,\r\n\
    a voi che avete l'intelletto chiaro\r\n\
    n\xC3\xA9 siete letterati da dozzina,\r\n\
    quel ch'esporr\xC3\xB2 sul cul di Carolina. \r\n\
    Quando in tal cul dal sen materno usc\xC3\xAC,\r\n\
    feto e cul tastando allor sbucciati, \r\n\
    esclam\xC3\xB2: che strano parto! e impallid\xC3\xAC \r\n\
    credendoli due feti aggrovigliati: \r\n\
    ma vistol coll'occhial poi la mammina,\r\n\
    lieta grido: oh! il gran cul che ha Carolina!\r\n\
    Culo non v'\xC3\xA8; n\xC3\xA9 fuvvi mai nel mondo \r\n\
    fra quanti pi\xC3\xB9 bei culi unqua fioriro, \r\n\
    pi\xC3\xB9 tornito, piu vago, e piu giocondo. \r\n\
    N\xC3\xA9 fra le statue del museo rimiro, \r\n\
    scavate l\xC3\xA0 in Pompei, Stabia e Resina, \r\n\
    simile un cul a quel di Carolina.\r\n\
    Napoli, \xC3\xA8 ver, di belle donne \xC3\xA8 piena \r\n\
    impareggiabil per la grazia e 'I brio, \r\n\
    che han di angelica forma, e non terrena,\r\n\
    e spalle e petto e seno, e che so io? \r\n\
    Ma non si ammira da Capodichina \r\n\
    a Miseno, che il cul di Carolina.\r\n\
    N\xC3\xA9 allor che tutto il mondo a Carditello \r\n\
    ca alla gran festa, n\xC3\xA9 a Capodimonte; \r\n\
    n\xC3\xA9 a Piedigrotta in mostra, o ad Architello;\r\n\
    ne al Vomer mai si vide, o a Vergin-monte; \r\n\
    ne ai passeggi di Chiaja e Mergellina \r\n\
    pi\xC3\xB9 bel cul di quel di Carolina. (...)\r\n\
    Te Napol non produsse: e non sei nato \r\n\
    del Bel Sebeto tu; te una Befana \r\n\
    e 'I Vesuvio produsse in fiamme irato; \r\n\
    e le mamme allattar di ruffiana; \r\n\
    che hai cor bastardo in petto, alma canina, \r\n\
    dispregiando il bel cul di Carolina.\r\n\
    Armida, Bradamante, Olimpia, Alzira, \r\n\
    Laura, Leonora, Angelica, Virginia, \r\n\
    Tamiri, Semiramide, Zaira, \r\n\
    Ersilia, Clitennestra, Argene, Erminia, \r\n\
    Giulia, Marzia, Aristea, Fulvia, Agrippina, \r\n\
    non ebbero il bel cul di Carolina.\r\n\
    N\xC3\xA9 Solimena, o Guido, e n\xC3\xA9 Bastiano \r\n\
    dipinser mai, ne Vinci, o Polignoto, \r\n\
    n\xC3\xA9 Rubens, Michelangel, n\xC3\xA9 Tiziano, \r\n\
    n\xC3\xA9 Apelle pur, tanto famoso e noto, \r\n\
    n\xC3\xA9 il sommo genio della terra urbina, \r\n\
    bello un culo come quel di Carolina.\r\n\
    Quando il fulgor d'un s\xC3\xAC bel cul t'irradia, \r\n\
    senti fuggir la noia, il duol, l'inedia. \r\n\
    Per me, lascio le Muse, Apollo e Arcadia; \r\n\
    e pi\xC3\xB9 che in San Carlino alla Comedia, \r\n\
    rido se amica sorte mi avvicina \r\n\
    al romantico cul di Carolina. \r\n\
    Come placida viene al lido l'onda\r\n\
    quando lieve sul mar Zeffiro scherza,\r\n\
    che alla prima succede la seconda,\r\n\
    e questa torna e va a lambir la terza,\r\n\
    lieta d'un bacio al sen di Mergellina,\r\n\
    cos\xC3\xAC movesi il cul di Carolina.\r\n\
    Non \xC3\xA8 si duro un corno o un ossomastro;\r\n\
    duro non \xC3\xA8 cos\xC3\xAC d'Aquila il rostro;\r\n\
    n\xC3\xA9 duro \xC3\xA8 tanto il marmo o l'alabastro;\r\n\
    n\xC3\xA9 le unghie in moda (onor del secol nostro);\r\n\
    n\xC3\xA9 i calli miei, n\xC3\xA9 il guscio di tellina\r\n\
    son duri quanto il cul di Carolina.\r\n\
    Sia benedetto il trenta ottobre, e l'anno\r\n\
    milleottocentotrentatre, e quel punto\r\n\
    in cui, scordando ogni primier affanno,\r\n\
    nel caro suol partenopeo son giunto;\r\n\
    ma benedetta ognor quella mattina\r\n\
    che il cul potei mirar di Carolina.\r\n\
    Fra i pi\xC3\xB9 bei don che possa farvi Dio,\r\n\
    \xC3\xA8 quello d'un bel culo, o donne care.\r\n\
    n\xC3\xA9 questo \xC3\xA8 sol per sentimento mio:\r\n\
    ma fu scritto in latin, greco e volgare,\r\n\
    e in lingua copta, egizia ed algonquina.\r\n\
    Oh! Che gloria pel cul di Carolina!\r\n\
    Siate giovani o vecchie, o belle o brutte.\r\n\
    O vedove, o zitelle o maritate,\r\n\
    v'assicuro che a noi piacete tutte,\r\n\
    se al passeggio un bel cul ci presentate,\r\n\
    finto non gi\xC3\xA0 com'\xC3\xA8 quel di Adelina,\r\n\
    ma vivo come il cul di Carolina.\r\n\
    Sii tu bella e laggiadra, o giovinetta;\r\n\
    sii pur vaga vieppi\xC3\xB9 che in stelo il fiore;\r\n\
    sii d'avvenenza e civilt\xC3\xA0 perfetta;\r\n\
    abbi in membra gentil gentile il core:\r\n\
    vatti in un chiostro a dar la disciplina,\r\n\
    se ti manca il bel cul di Carolina.\r\n\
    Donne mie, se l'avete o floscio o plastico,\r\n\
    non dite poi ch'io sia troppo sofistico;\r\n\
    Pregiasi un cul naturalmente elastico\r\n\
    (disse Nasone in non so qual suo distico).\r\n\
    l'elastica sottana taccolina\r\n\
    fa, fa: ma non d\xC3\xA0 il cul di Carolina.\r\n\
    Cul che di cul non ha se non la scorza,\r\n\
    \xC3\xA8 una larva di cul: non vale un frullo.\r\n\
    Cul che vita non ha, n\xC3\xA9 moto e forza,\r\n\
    serve sol di ludibrio e di trastullo.\r\n\
    Specchiansi Amalia e Cloe, Gemma e Rubina,\r\n\
    al semovente cul di Carolina.\r\n\
    Eh! cornacchie d'Esopo (in vostra pace) \r\n\
    perch\xC3\xA9 tradirci con un cul di stoppa, \r\n\
    con oudinot e paniers, che il cul verace \r\n\
    gonfianvi, e fan sembrare donne di coppa? \r\n\
    E copiar pu\xC3\xB2 la moda parigina \r\n\
    il non mentito cul di Carolina?\r\n\
    Deh! non spendete invan pei Ciceroni, \r\n\
    voi che venite in quest'alma Citt\xC3\xA0,\r\n\
    badate che vi truffano i bricconi, \r\n\
    additandovi sol le rarit\xC3\xA0\r\n\
    di Pozzuoli, Pompei, Stabia e Resina, \r\n\
    e non quella del cul di Carolina.\r\n\
    Poich\xC3\xA9 batterla a tergo invan procura \r\n\
    e or di fronte, or di fianco invan l'assale; \r\n\
    vedendo ben quanto la rocca \xC3\xA8 dura, \r\n\
    tenta il forte minar della rivale. \r\n\
    Ma ad altro canto. (Or lasciam fare Elvina). \r\n\
    Uh! che far\xC3\xA0 il gran cul di Carolina!\r\n\
    Una moglie (e 'l so io di causa-scienza) \r\n\
    tanta ai jupons en crin mise importanza\r\n\
    che il marito, acquistatili a credenza \r\n\
    (grazie agli uscieri) alla Concordia ha stanza. \r\n\
    Maledetti i sur-cul di taccolina,\r\n\
    simulacri del cul di Carolina!\r\n\
    Certi culi hanno un moto oscillatorio: \r\n\
    altri vibrato ed altri peristaltico, \r\n\
    altri roteante, ed altri ondulatorio: \r\n\
    altri stan fissi e inerti qual basaltico \r\n\
    masso. Oh! schietta, spontanea, ed intestina \r\n\
    mossa equabil del bel cul di Carolina.\r\n\
    Se di tastarlo un p\xC3\xB2 vienvi interdetto, \r\n\
    sta ben. Chi sa? potria covarci gatto. \r\n\
    E poi (soffrite ch'io vi parli schietto) \r\n\
    se a voi (quod absit) ne accordassi il tatto: \r\n\
    con quell'unghie da bestie di rapina \r\n\
    voi straccereste il cul di Carolina.\r\n\
    E oh! quanto piu di voi felice fu \r\n\
    quel ciuccio ch'io nel Vomer vidi un d\xC3\xAC\r\n\
    gir spetizzando e con le orecchie in s\xC3\xB9 \r\n\
    poich\xC3\xA9 annusando, un certo odor sent\xC3\xAC. \r\n\
    Felice lui, che la dorsal sua spina \r\n\
    sent\xC3\xAC premer dal cul di Carolina!\r\n\
    Uh! Quann'appassiunate! E che nce faje? \r\n\
    N'ave Rinaldo cientomila a u Muolo: \r\n\
    la Sonnambula p\xC3\xB2 n'ave cchi\xC3\xB9 assaje: \r\n\
    n'ave purz\xC3\xAC Mamozio de Puzzuolo. \r\n\
    Nte dico niente de la Paresina: \r\n\
    ma cchi\xC3\xB9 ne tene nculo Carolina. \r\n\
    Quanno la Si\xC3\xA8 Ndrianella e Cannetella \r\n\
    facene tanta luotene e cuntraste \r\n\
    a cchi u ttenea cchi\xC3\xB9 gruosso; e la gonnella \r\n\
    s'auzajeno, uh! scasati chilli nchiaste, \r\n\
    si scea nfra li doi culi ntridecina \r\n\
    co cchella scciort'i culo Carolina!\r\n\
    Faranvi i dotti iscrizion lapidaria: \r\n\
    ch'io per me, se a compor belli epitaffi \r\n\
    non basta mente acuta ed antiquaria \r\n\
    ma ci vogliono gli uomini coi baffi, \r\n\
    Imbaffus nequeo condere latine: \r\n\
    MAGN. HIC. IAC. CUL. CAR. \r\n\
    (Magnus hic jacet Culus Carolinae).\r\n\
    Qual Terra e mai da Napoli s\xC3\xAC disgiunta, \r\n\
    dall'alma Italia, o dal cammin del Sole; \r\n\
    qual'\xC3\xA8 l'isola ignota ove ancor giunta \r\n\
    non sia la fama di s\xC3\xAC bella Mole? \r\n\
    Fin della Luna ai regni \xC3\xA8 gi\xC3\xA0 inquilina\r\n\
    la fama del gran cul di Carolina.\r\n\
    Pi\xC3\xB9 non dirassi ormai Partenope \r\n\
    un cul che di sua fama ha pieno il Mondo; \r\n\
    ma a ragion si dir\xC3\xA0 culo europeo; \r\n\
    ch'Europa sol tal vanta un Mappamondo. \r\n\
    D\xC3\xA9 pi\xC3\xB9 famosi cul cos'\xC3\xA8 vicina \r\n\
    la rinomanza, a quel di Carolina?\r\n\
    Se altri invento il pallone; altri il planimetro; \r\n\
    chi le navi a vapore e chi il gassometro; \r\n\
    se v'\xC3\xA8 chi sogn\xC3\xB2 fin lo scampimetro; \r\n\
    chi sia che inventar sappia ora un culometro \r\n\
    che senza geometrica dottrina \r\n\
    misuri l'ampio cul di Carolina?\r\n\
    L'uomo sogna cio che fissa il suo pensiero. \r\n\
    Sogna liti il dottor; sogna il pastore \r\n\
    pecore e buoi; sognan le armate schiere\r\n\
    caserma e vin, le carte il giocatore; \r\n\
    il gallo sogna il cul della gallina \r\n\
    ed io? versi sul cul di Carolina.\r\n\
    N\xC3\xA9 curerei d'avere un braccio mozzo; \r\n\
    o che un ergastol fosse il mio palazzo; \r\n\
    n\xC3\xA9 d'esser posto in fondo a un vuoto pozzo; \r\n\
    o rinchiuso in Aversa come un pazzo, \r\n\
    o in prigion dura qual la Mamertina, \r\n\
    purch\xC3\xA9 mirassi il cul di Carolina.\r\n\
    Non ti seduca il suon, la danza, il canto, \r\n\
    la gola, il sonno, e l'oziose piume: \r\n\
    non ti alletti il piacer funesto tanto, \r\n\
    su cui scrisse Aretin sozzo volume. \r\n\
    Fuggiam la maga Circe, e Armida e Alcina: \r\n\
    cantiam l'innocuo cul di Carolina. \r\n\
    Fra i gentilizi stemmi del blasone\r\n\
    se altri adottaro il drago, il coccodrillo.\r\n\
    Ia pantera, la tigre, ed il leone,\r\n\
    la jena, il pardo, il boa, l'orsa, il mandrillo;\r\n\
    io (se alzer\xC3\xB2 il mio stemma) l'arma ferina\r\n\
    non v\xC3\xB2 adottar, ma il cul di Carolina.\r\n\
    S\xC3\xAC: scrivetene o dotti, a cui la sorte\r\n\
    di\xC3\xA8 ingegno, alto sentir, genio e talento;\r\n\
    n\xC3\xA9 vi faccia ritegno o vi sconforte\r\n\
    l'astruso s\xC3\xAC, ma pur degno argomento:\r\n\
    che n\xC3\xA9 Taide impudica, o una sgualdrina\r\n\
    voi loderete nel cul di Carolina.\r\n\
    Chi sia che a Dante di rispetto perda,\r\n\
    s'egli con faccia tosta di piperno,\r\n\
    nomin\xC3\xB2 m...e quel che segue in erda,\r\n\
    al canto diciotto dell'Inferno\r\n\
    in quella sua Commedia, ch'\xC3\xA8 divina?\r\n\
    Che fa. s'io il culo nomai di Carolina?\r\n\
    Ma ca... (caro, per poco or non ho detto\r\n\
    quella parola che non convien dire).\r\n\
    Non \xC3\xA8 tutt'un lodare il collo, il petto,\r\n\
    il seno, e che so io? Ci hai che ridire?\r\n\
    Chi fece il collo, il petto, il sen, la schina,\r\n\
    non f\xC3\xA8 pur Ei quel culo a Carolina?\r\n\
    Io ch'ebbi moglie con un cul ben grosso\r\n\
    cos\xC3\xAC elegante e bello e cos\xC3\xAC grasso,\r\n\
    che, vivaddio! direi fosse senz'osso\r\n\
    quel s\xC3\xAC compatto e ben tornito masso,\r\n\
    qual (se morte ahi! non feamene rapina)\r\n\
    potria far da secondo a Carolina.\r\n\
    Culo, splendor d'un secolo beato,\r\n\
    d'ogni bellezza e raro pregio adorno;\r\n\
    culo modello, cul s\xC3\xAC ben formato\r\n\
    che d'ogni cul formi l'invidia e scorno:\r\n\
    io ti saluto. E tu la mia sestina\r\n\
    serba pel tuo bel culo, o Carolina.\r\n\
    Qui, voi, cui non annotta innanzi sera,\r\n\
    coronate il culigrafo poeta\r\n\
    che usc\xC3\xAC per lei dalla prosaica sfera,\r\n\
    e voi, cui d'appressarvi Apollo vieta\r\n\
    (fra noialtri) alla fonte caballina,\r\n\
    ispiratevi al cul di Carolina.\r\n\
    \r\n\
    Kinta"
