  contenuto: "Once upon a time, many, many, many, ma 'na cifra of many years ago, at the beginning of the \r\n\
    initiation of the mond, there was the caos. \r\n\
    \r\n\
    One day, God (God is the nome d'art of Dio), God, \r\n\
    \r\n\
    who was disoccupated, had a folgorant idea and so God created the Nutell. \r\n\
    \r\n\
    And God saw that the Nutell was good, very good, very very good, good 'na cifra. \r\n\
    \r\n\
    The mangiation of God was long, He manged one million of barattols of Nutell sfrutting the fact \r\n\
    that God has not a Mamm that strills if you sbaff too much Nutell... \r\n\
    \r\n\
    And after this mangiation,God invented the Water Closed Run,the cors in the cabinet,and some \r\n\
    Nutell's derivates like the red bubbons, the panz, the cellulit and ceter, and ceter. \r\n\
    \r\n\
    After di which (dopodich\xC3\xA9) he invented Adamo ed Eva and all the paradise and he diss to Adamo \r\n\
    and Eva: \r\n\
    \r\n\
    \"Now you have all the Paradise, \r\n\
    \r\n\
    you can do everything, very tutt: you have the permission to eat, to drink, to kiss, to scop, \r\n\
    nothing lavor, nothing affit, nothing concors of impiegats, nothing cod alla post, nothing IRPEF, \r\n\
    ILOR. \r\n\
    \r\n\
    Only very ozious life: television, telenovels, football, moviols, process of Monday,appell of \r\n\
    Tuesday, cassazion of Wednesday, and ceter, and ceter. \r\n\
    \r\n\
    You have gratis restaurants,cinemas, theaters, all the Paradise is yours: \r\n\
    \r\n\
    air-conditioned, autom riscaldament, moquette,parquett, tresset, bidet, omelette, eccet, eccet... \r\n\
    \r\n\
    \"There's just one thing, remember: in tutt the Paradise just one thing absolutely prohibited. \r\n\
    \r\n\
    Come, come to me in the giardin: this is \"the Nocciol\", the alber of the Nutell. \r\n\
    \r\n\
    Only this alber of the Nutell is prohibited, because I like the Nutell very much, very very much, \r\n\
    \r\n\
    much 'na cifra and I want all the Nutell, tutt the Nutell for me.\" \r\n\
    \r\n\
    During the prim temps, Adamo and Eva were very happy. \r\n\
    \r\n\
    Adamo said: \"What a cool!\" (\"Cool\" is not in Italian \"freddo\", no, \"What a cool\" means \"Che cul\") \r\n\
    \r\n\
    \"All the Paradise is nostr!\" \r\n\
    \r\n\
    And everyday, ognigiorn, they discovered something new.A lot of scoperts, many scoperts,many many \r\n\
    scoperts, 'na cifra di scoperts. One day the scopert of the hot water, one day the scopert of the \r\n\
    spaghettis, one day the cigarettes, and ceter, and ceter. \r\n\
    \r\n\
    But one day, a trist day, a very very trist day, trist 'na cifra, Adamo and Eva fecer the scopert \r\n\
    of the first colazion. \r\n\
    \r\n\
    And after the scopert of the cappuccin, the scopert of the aranch succ, the scopert of the cornetts, \r\n\
    they understood that something was mancant. \r\n\
    \r\n\
    \"Eva!\" said Adamo \"Don't you think that qualcos is mancant here, proprio here, 'ncopp this fett?\" \r\n\
    \r\n\
    \"Second me\" Eva risposed \"'ncopp the fett you have to metter burr and marmelade.\" \r\n\
    \r\n\
    \"No, no Eva, you know that the marmelade schif myself. \r\n\
    \r\n\
    I want 'ncopp this fett something very particular, very very particular, particular 'na cifra. \r\n\
    \r\n\
    What do you think about the Nutell?\" \"No, Adamo you are scording that the Signor said that's vietat!\" \r\n\
    \r\n\
    \"Yes, I remember, but only a little assaggiation, don't succed nothing!\" \r\n\
    \r\n\
    And Adamo sces in the cortil where the alber of the Nutell was and he pres a small barattol and \r\n\
    spalmed the brown cream on the fett and assagged the Nutell. \r\n\
    \r\n\
    Adamo and Eva don't ebber the time to exprimer the godiment that the tuons and fulmins apparved \r\n\
    in the ciel and one voice said: \r\n\
    \r\n\
    \"Potevamo stupirv you with special effects, but I'm God, not Fantagod! Adamo, Eva, come here! \r\n\
    I'm very incazz with you, very very incazz, incazz 'na cifra! How did you permit to tocc the \r\n\
    Nutell? \r\n\
    \r\n\
    Didn't you remember that it was prohibited?\" \"Cazz!\" esclamed Adamo \"It was prohibited! \r\n\
    \r\n\
    Oh, sorry, God, I'm very very sorry, sorry 'na cifra, God, I really really was completely \r\n\
    scordat...\" \r\n\
    \r\n\
    \"Don't do that fint tont, Adamo, I'm God, I can see everything, very tutt, and I know that you \r\n\
    and the woman have deliberatament assaggiated the Nutell. So you have a big punhition, a very \r\n\
    castig for your peccat. But siccom I'm sconfinatly good, you can choose,you have two scelts: \r\n\
    \r\n\
    \"Scelt number 1: nothing Nutell for ever and ever in the secols of the secols, amen!\" \r\n\
    \r\n\
    \"Nooo!\" Eva was piagnucoling \"It's a thing very tragic, very very tragic, tragic 'na cifra!\" \r\n\
    \"Aspett!\" said God \"Don't be frettolous woman... \r\n\
    \r\n\
    \"Scelt number 2: you can take the Nutell, no problem, let's prend, prend, but for you is the \r\n\
    cacciation out of the Paradise. \r\n\
    \r\n\
    You will have to lavorar with the sudor of your front, you will zapp the terr, you'll have mal \r\n\
    of schien and, like this don't bastass, everytime you will mang Nutell, the malediction of the \r\n\
    brufols, of the mal of panch, of the cacarel will be cadent on you.\" \r\n\
    \r\n\
    \"Al\xC3\xA9!\" esclaimed Adamo \"Thank you God, thank you, we don't interess the cacciation dal Paradise, \r\n\
    the important is to have the Nutell! \r\n\
    \r\n\
    Goodbye! Ciao, tanti cari saluti!\" And so Adamo and Eva were cacciated and this original peccat and this \r\n\
    malediction cadded on lor and on lor discendents, and on the discendents of the discendents. \r\n\
    \r\n\
    Infact, tutt'ogg, you can veder in the pubblicity all the ragazz that per aver one fett of pan \r\n\
    and Nutell they scalan the mountains they stay in a tend al fredd and al gel and ceter, and ceter. \r\n\
    But the final pensier of tutti noi is \"It's meglio faticar and soffrir with the Nutell piuttost \r\n\
    che the Terrestr Paradise senz the Nutell.\" "
