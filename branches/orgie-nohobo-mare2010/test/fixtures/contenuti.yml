  m_bInAttesa: "0"
  datapubblicazione: 2006-01-03 21:49:15
  datacreazione: 2005-09-14 14:11:05
  m_bSerio: "0"
  idlogin: "542"
  m_nLivelloSegretezza: "0"
  titolo: Statuto Forza Italia (secondo il Dott. Brodin)
  idcontenuto: "393994387"
  tipo: attualita
  idloginpubblicante: "3"
  m_battivo: "1"
  contenuto: "Forza Italia!\t(brodin, 2005-09-13 13:44:06)\r\n\
    \r\n\
    \"Se dovessimo definire isto nostro partito come lo definirebbero gli studiosi di politica, lo dovremmo chiamare un partito di valori e di programma.\r\n\
    Se volessimo collocarlo ''geograficamente'' diremmo che \xC3\xA8 assolutamente un partito di centro, il centro del sistema politico italiano.\r\n\
    E'' un partito liberale ma non elitario, anzi un partito liberaldemocratico popolare;\r\n\
    e'' un partito cattolico ma non confessionale;\r\n\
    e'' un partito laico, ma non intollerante o laicista;\r\n\
    e'' un partito nazionale ma non centralista.\r\n\
    E'' un partito che vuole darsi un nome molto semplice: il partito della gente, della gente di buon senso, di buona volont\xC3\xA0, il partito degli italiani che portano nel quore un grande amore per gli altri e per il proprio Paese, il partito degli italiani che amano la libert\xC3\xA0. Forza Italia, forza di libert\xC3\xA0.\r\n\
    (...)\r\n\
    \r\n\
    \"Noi non siamo certo tra quelli che pensano che la storia della nostra Repubblica sia una storia negativa, una storia di criminalit\xC3\xA0. E non siamo neppure tra quelli che criticano coloro che hanno portato la libert\xC3\xA0, la democrazia, il senso di appartenenza all''Occidente, nel nostro Paese.\r\n\
    Noi, al contrario, ricordiamo con gratitudine i protagonisti di quell''evento, di quella storia, che hanno garantito a tutti noi cinquant''anni di libert\xC3\xA0 nella democrazia, nel progresso e nel benessere. I nomi li conosciamo Alcide De Gasperi, Giuseppe Saragat, Luigi Einaudi, Randolfo Pacciardi, Ugo La Malfa.\r\n\
    Quelle sono le nostre radici e per isto , per ricongiungerci al punto sano e forte delle origini della libert\xC3\xA0 e della democrazia in Italia, abbiamo voluto celebrare questa festa, i cinquant''anni dal 18 aprile 1948, come la nostra festa.\r\n\
    \r\n\
    I democristiani hanno detto che il 18 aprile e'' soltanto la loro festa. Non e'' vero. Nel voto del 18 aprile 1948 si riconobbero tutte le posizioni politiche e culturali che non erano social-comuniste, e lo stesso De Gasperi interpret\xC3\xB2 quel voto come non come la vittoria del partito democristiano ma come la vittoria di tutto il governo di centro. Il 18 aprile fu l''unit\xC3\xA0 dei liberi e forti, degli italiani che non volevano i comunisti al governo. Se il 25 aprile del ''45 segna la fine del nazifascismo, il 18 aprile del ''48 e'' la data in cui nascono in Italia la democrazia e la libert\xC3\xA0.\r\n\
    \r\n\
    Noi, nel ''94 e nel ''96, e ancora oggi, abbiamo ritrovato e rappresentiamo il popolo del 18 aprile, quel popolo che si e'' riconosciuto e si riconosce in noi per i medesimi valori del ''48: la demcrazia, la liberta'', l''Occidente.\""
