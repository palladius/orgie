  m_battivo: "0"
  contenuto: "Seguendo il semplice consiglio che ho letto in un articolo, ho finalmente trovato la pace interiore. \r\n\
    L'articolo diceva: \"Il modo per raggiungere la pace interiore consiste nel portare a termine tutte le cose che abbiamo iniziato.\" \r\n\
    Cosi mi sono guardato intorno, a casa, per vedere tutte le cose che avevo iniziato e lasciato a met\xC3\xA0 . Cos\xC3\xAC prima di venire al lavoro questa mattina ho finito una bottiglia di vino rosso, il Bailey's, il Martini e la Vodka alla pesca, il prozac, quattro grammini di hashish ed una scatola di cioccolatini. Non avete idea di come mi sento bene adesso...\r\n\
    --------\r\n\
    \r\n\
    Ci\xC3\xB2 che dice la donna: \r\n\
    - Questo posto fa schifo! Forza! Tu ed io dobbiamo pulire! \r\n\
    La tua roba \xC3\xA8 buttata in giro sul pavimento e resterai senza vestiti puliti se non li portiamo immediatamente in lavanderia!!! \r\n\
    \r\n\
    Ci\xC3\xB2 che sente l'uomo: \r\n\
    bla, bla, bla, bla, FORZA \r\n\
    bla, bla, bla, bla, TU ED IO \r\n\
    bla, bla, bla, bla, SUL PAVIMENTO \r\n\
    bla, bla, bla, bla, SENZA VESTITI \r\n\
    bla, bla, bla, bla, IMMEDIATAMENTE\r\n\
    ---------\r\n\
    \r\n\
    Una ragazzina di quattordici anni va dalla mamma e le dice che da un paio di mesi non ha pi\xC3\xB9 il ciclo. \r\n\
    Preoccupatissima, la mamma compra un kit di gravidanza e la ragazza risulta incinta. \r\n\
    Urla, pianti lacrime, \"chi \xC3\xA8 il porco, avanti voglio saperlo, ora lo dici a tuo padre.\" ecc.ecc..\r\n\
    La ragazza, lasciata sola prende il telefonino e fa una chiamata. \r\n\
    Mezz'ora dopo sotto casa si ferma una ferrari, sale un tipo brizzolato, ben vestito, che si siede in mezzo a padre madre e figlia. \r\n\
    Buongiorno\" - esordisce - \"vostra figlia mi ha informato. Dunque, io non posso sposarla perch\xC3\xA8 ho un'altra situazione famigliare, ma se nasce una femmina le posso intestare 3 negozi, due appartamenti, una villa ed un conto di 500.000 euro.\r\n\
    Se invece \xC3\xA8 un maschio un paio di fabbriche, oltre ai 500.000 euro, e se sono gemelli una fabbrica a testa e 250000 euro a testa, se per\xC3\xB2 perde il bambino...\" \r\n\
    A quel punto il padre, che era stato zitto, si alza, gli appoggia una mano sulla spalla e dice: \"te la scopi di nuovo!!!!\"\r\n\
    -------\r\n\
    \r\n\
    Un prete decide di prendersi un pappagallo da tenere in casa, cosi` si reca in un negozio di animali e dice al negoziante: \r\n\
    - \"Buongiorno, vorrei comprare un pappagallo \"\r\n\
    - \"Guardi, ho quello che fa per lei; vede questo e` un bellissimo pappagallo ...\" \r\n\
    - \"Si, beh vedo, ma non vorrei fosse uno di quei pappagalli che dicono le parolacce...\" \r\n\
    - \"No, anzi, come puo` notare le due cordicelle che ha legate alle zampe, se tira quella di destra il pappagallo recita l`Ave Maria, mentre se tira quella di sinistra recita il Padre Nostro.\" \r\n\
    - \"E se le tiro contemporaneamente tutte e due ?\" \r\n\
    E il pappagallo : \"Vado a culo per terra, brutto idiota !!\"\r\n\
    ------\r\n\
    \r\n\
    Una discussione all'ufficio immigrazione: \r\n\
    - Nome? \r\n\
    - Muhjmatil Ahmed Khan. \r\n\
    - Sesso? \r\n\
    - Tre volte a settimana! \r\n\
    - Intendevo dire: maschio o femmina??? \r\n\
    - maschio, femmina... a volte cammelli...\r\n\
    ------\r\n\
    \r\n\
    Gli scienziati hanno scoperto un cibo che diminuisce del 90% la spinta sessuale delle donne: si chiama \"torta di nozze\".\r\n\
    -----\r\n\
    \r\n\
    Al principio, Dio cre\xC3\xB2 il mondo e si ripos\xC3\xB2. \r\n\
    Poi Dio cre\xC3\xB2 l'Uomo e si ripos\xC3\xB2. \r\n\
    Poi Dio cre\xC3\xB2 la Donna. \r\n\
    Da allora, n\xC3\xA9 Dio n\xC3\xA9 l'Uomo si sono pi\xC3\xB9 riposati.\r\n\
    ------\r\n\
    \r\n\
    Perch\xC3\xA9 gli uomini muoiono prima delle loro mogli? \r\n\
    Perch\xC3\xA9 lo vogliono.\r\n\
    -----\r\n\
    \r\n\
    In una favela brasiliana, un giorno di sole, un caldo infernale. Tre uomini entrano in una piccola baracca, calda e umida, con il tetto in lamiera, trascinando un ragazzo magro e fragile per le braccia. \r\n\
    L\xC3\xAC dentro Marisa, un negrone enorme, bruttissimo, sudato, puzzolente, con uno stuzzicadenti in un angolo della bocca, si stava pulendo le unghie con un coltellaccio usato per aprire la noce di cocco. \r\n\
    Uno degli uomini dice: \r\n\
    - Marisa, il capo ha detto di dirti di metterlo in culo a questo qui. Dice che \xC3\xA8 per insegnargli che non deve fare il bullo con la gente della favela! \r\n\
    La vittima grida disperata e implora perdono. Ma Marisa se ne frega e risponde: - Sbattilo l\xC3\xAC nell'angolo! Fra poco me ne occupo... \r\n\
    Quando l'altro se ne va il povero ragazzo comincia a dire: \r\n\
    - Signor Marisa, per piet\xC3\xA0, mi lasci andare via! Non lo dir\xC3\xB2 a nessuno che sono stato rilasciato senza punizione, la scongiuro!!! \r\n\
    Marisa gli risponde bruscamente: \r\n\
    - Taci e stai buono l\xC3\xAC! \r\n\
    Cinque minuti dopo entrano altri due uomini trascinando un altro ragazzo: \r\n\
    - Il capo ha detto di dirti di tagliargli le mani e cavargli gli occhi. Dice che \xC3\xA8 per insegnargli che non deve toccare i soldi del capo! \r\n\
    Marisa, con voce grave: \r\n\
    - Lascialo l\xC3\xAC che me ne occupo fra un po'... \r\n\
    Passano altri cinque minuti e arrivano due uomini trascinando un altro poveretto: \r\n\
    - Marisa, il capo ha detto di tagliare via il pisello a questo qui cos\xC3\xAC imparer\xC3\xA0 a non guardare mai pi\xC3\xB9 la donna del capo. Ah, ha detto anche che devi tagliargli la lingua e tutte le dita cos\xC3\xAC non toccher\xC3\xA0 pi\xC3\xB9 nessuna donna della favela! \r\n\
    Marisa, con voce sempre pi\xC3\xB9 grave: \r\n\
    - Mettilo l\xC3\xAC nell'angolo con gli altri, fra un attimo me ne occupo io! \r\n\
    Il primo ragazzino consegnato a Marisa dice allora, con voce estremamente cortese: \r\n\
    - Dottor Marisa... con tutto rispetto... solo per evitare confusioni, io sono quello che lo prende in culo, ok?\r\n\
    ---------\r\n\
    \r\n\
    Se la Fabbrica Italiana Automobili Torino si chiama FIAT... \r\n\
    se l' Istituto Nazionale di Previdenza Sociale si chiama INPS... \r\n\
    se l'Azienda Sanitaria Locale si chiama ASL... \r\n\
    se l'Ente Nazionale Energia Elettrica si chiama ENEL... \r\n\
    perch\xC3\xA8 la Federazione Italiana Consorzi Agrari si chiama Federconsorzi?\r\n\
    ------\r\n\
    \r\n\
    La vagina \xC3\xA8 divisa in due parti: una parte morbida e una parte dura. \r\n\
    La parte morbida sono le grandi labbra. \r\n\
    La parte dura \xC3\xA8 farsela dare..."
