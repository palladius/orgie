  contenuto: "Primus decalogus de boni drogati golirdiae \r\n\
    \r\n\
    Ti accorgi di essere definitivamente dipendente dalla goliardia quando:\r\n\
    \r\n\
    1)\tVedi feluche dappertutto\r\n\
    2)\tCredi che ogni giorno sia mercoled\xC3\xAC\r\n\
    3)\tChiami i tuoi amici con i nomi goliardici e ti scordi che hanno anche un nome di battesimo\r\n\
    4)\tCanticchi il motivetto del gaudeamus sotto la doccia\r\n\
    5)\tRaccogli anche i sassolini per strada, o schiacci le mosche per usarli come ammennicoli\r\n\
    6)\tOgni volta che visiti una citt\xC3\xA0 non riesci a controllare l\xE2\x80\x99impulso irrefrenabile di comprarti una spilletta\r\n\
    7)\tPrima di dire nome, et\xC3\xA0 e qualsiasi cosa su di te, pretendi che ti paghino da bere\r\n\
    8)\tQuando ti presenti ad una persona che un attimo dopo non ricorda il tuo nome chiami scazzo\r\n\
    9)\tTi sei realmente convinto che bere l\xE2\x80\x99acqua faccia male alla salute \r\n\
    10)\tQuando fai il countdown dei giorni che mancano ad un estero cominciando due mesi prima\r\n\
    Secundus decalogus de boni drogati goliardiae\r\n\
    \r\n\
    Ti accorgi di essere definitivamente dipendente dalla goliardia quando:\r\n\
    \r\n\
    1)\tQuando all\xE2\x80\x99aggettivo maledetto associ le nespole\r\n\
    2)\tQuando ti chiedono l\xE2\x80\x99et\xC3\xA0 e rispondi sempre 20\r\n\
    3)\tQuando ti scoli l\xE2\x80\x99ultima goccia dal bicchiere anche se nessuno ha detto ad fundum\r\n\
    4)\tQuando qualcuno fa un brindisi aspetti che beva prima di te\r\n\
    5)\tQuando anzich\xC3\xA9 chiedere scusa chiedi venia\r\n\
    6)\tQuando sei su internet e non riesci a trattenere la mano dal collegarti a goliardia.it\r\n\
    7)\tQuando ti alzi la mattina col proposito di controllare se sei in classifica e con chi sei stato accoppiato sul sito\r\n\
    8)\tQuando guardi le patatine e ti viene in mente Ade\r\n\
    9)\tQuando tirando le tende pensi di sostituire quel cordone a quello della tua feluca\r\n\
    10)\tQuando chiami pax ogni volta che sei a casa affinch\xC3\xA9 i coinquilini non usino le tue cose\r\n\
    \r\n\
    Terzus decalogus de boni drogati goliardiae\r\n\
    \r\n\
    Ti accorgi di essere definitivamente dipendente dalla goliardia quando:\r\n\
    \r\n\
    1)\tQuando ti metti a dieta 3 mesi prima di un estero\r\n\
    2)\tQuando vedi che la tua carta di credito fa la questua in giro per la citt\xC3\xA0\r\n\
    3)\tQuando ti svegli col mal di testa perenne\r\n\
    4)\tQuando aprendo msn ti si apre in automatico la finestrella di capezzolongo\r\n\
    5)\tQuando vedi il mondo con i colori del tuo ordine\r\n\
    6)\tQuando non ti viene pi\xC3\xB9 la voglia di andare in discoteca\r\n\
    7)\tQuando intoni una serata al tuo partner cantando \xE2\x80\x9Cil mostro di Scandicci\xE2\x80\x9D\r\n\
    8)\tQuando parlano di baci e ti vengono i mente quelli perugina\r\n\
    9)\tQuando vedi un elemosinante e ti viene di chiamarlo \xE2\x80\x9Ccollega\xE2\x80\x9D\r\n\
    10)\tQuando alle collane preferisci indossare la placca anche se non vai ad una serata goliardica\r\n\
    \r\n\
    \xE2\x80\xA6ecco\xE2\x80\xA6quando ti accorgi di tutto ci\xC3\xB2\xE2\x80\xA6sei veramente un caso disperato\xE2\x80\xA6\r\n\
    Chiama il Centro di Riabilitazione e Disintossicazione dalla Goliardia!...\r\n\
    Non ti assicuriamo nulla per\xC3\xB2\xE2\x80\xA6  166199XXX\r\n\
    \xE2\x80\xA6e in bocca al lupo!\r\n\
    Roma 27/03/07\r\n\
    Distorta, MagaMag\xC3\xB2, Pasticca\r\n"
