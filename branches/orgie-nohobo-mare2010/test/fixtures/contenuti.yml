contenuti_050: 
  m_bInAttesa: "0"
  datapubblicazione: 2005-10-28 07:40:58
  datacreazione: 2005-10-28 07:39:27
  m_bSerio: "0"
  idlogin: "3"
  m_nLivelloSegretezza: "5"
  titolo: POLITICA
  idcontenuto: "1491452846"
  tipo: attualita
  idloginpubblicante: "3"
  m_battivo: "1"
  contenuto: " \r\n\
    SOCIALISMO\r\n\
    Hai 2 mucche. Il tuo vicino ti aiuta ad occupartene, e tu \r\n\
    dividi il latte con lui.\r\n\
    \r\n \r\n\
    COMUNISMO\r\n\
    Hai 2 mucche. Il governo te le prende, e ti fornisce il latte \r\n\
    secondo i tuoi (SUOI) bisogni.\r\n\
    \r\n \r\n\
    FASCISMO\r\n\
    Hai 2 mucche. Il governo te le prende, e ti vende il latte.\r\n\
    \r\n \r\n\
    NAZISMO\r\n\
    Hai 2 mucche. Il governo prende la vacca bianca, e uccide \r\n\
    quella nera.\r\n\
    \r\n \r\n\
    DITTATURA\r\n\
    Hai 2 mucche. La polizia te le confisca, e ti fucila.\r\n\
    \r\n \r\n\
    FEUDALESIMO\r\n\
    Hai 2 mucche. Il feudatario prende la met\xC3\xA0 del latte e si \r\n\
    scopa la moglie.\r\n\
    \r\n \r\n\
    DEMOCRAZIA\r\n\
    Hai 2 mucche. Si vota per decidere a chi spetta il latte.\r\n\
    \r\n \r\n\
    DEMOCRAZIA RAPPRESENTATIVA\r\n\
    Hai 2 mucche. Si vota per chi elegger\xC3\xA0 la persona che \r\n\
    decider\xC3\xA0 a chi spetta il latte.\r\n\
    \r\n \r\n\
    ANARCHIA\r\n\
    Hai 2 mucche. Lasci che si organizzino in autogestione.\r\n\
    \r\n \r\n\
    CAPITALISMO\r\n\
    Hai 2 mucche. Ne vendi una per comperare un toro e avere dei \r\n\
    vitelli con cui iniziare un allevamento.\r\n\
    \r\n \r\n\
    CAPITALISMO SELVAGGIO\r\n\
    Hai 2 mucche. Fai macellare la prima e obblighi la seconda a \r\n\
    produrre tanto latte come 4 mucche. Alla fine licenzi \r\n\
    l'operaio, che se ne occupava, accusandolo di aver lasciato \r\n\
    morire la vacca di sfinimento.\r\n\
    \r\n \r\n\
    BERLUSCONISMO\r\n\
    \r\n \r\n\
    Hai 2 mucche. Ne vendi 3 alla tua societ\xC3\xA0 quotata in borsa, \r\n\
    utilizzando lettere di credito aperte da tuo fratello sulla \r\n\
    tua banca. Poi fai uno scambio delle lettere di credito, con \r\n\
    una partecipazione in una societ\xC3\xA0 soggetta ad offerta \r\n\
    pubblica, e nell'operazione guadagni 4 mucche, beneficiando \r\n\
    anche di un abbattimento fiscale per il possesso di 5 mucche. \r\n\
    I diritti sulla produzione del latte di 6 mucche, vengono \r\n\
    trasferiti da un intermediario panamense sul conto di una \r\n\
    societ\xC3\xA0 con sede alle Isole Cayman, posseduta clandestinamente \r\n\
    da un azionista, che rivende alla tua societ\xC3\xA0 i diritti sulla \r\n\
    produzione del latte di 7 mucche. Nei libri contabili di \r\n\
    questa societ\xC3\xA0 figurano 8 ruminanti, con l'opzione d'acquisto \r\n\
    per un ulteriore animale. Nel frattempo hai abbattuto le 2 \r\n\
    mucche perch\xC3\xA9 sporcano e puzzano. \r\n \r\n\
    Quando stanno per beccarti, diventi Presidente del Consiglio"
