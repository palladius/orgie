  m_bSerio: "0"
  idlogin: "3"
  m_nLivelloSegretezza: "5"
  titolo: "Dies Natalis Solis Invicti... (segue: rivalutare la paganit\xC3\xA0)"
  idcontenuto: "1460594544"
  tipo: storie
  idloginpubblicante: "3"
  m_battivo: "1"
  contenuto: "Cari Fratelli e di-letto Sorelle,\r\n\
    un piccolo spunto di riflessione ispirato dalla mia \"partigianit\xC3\xA0\" (Lungi da me in senso improprio storico-politico all'italiana ma ...nel senso che parteggio per la sana religione pre-cristiana...): che sopraggiunga morte immediata e dolorosa del clero cristiano -e cattolico in particolare-!\r\n\
    \r\n\
    Buona lettura.\r\n\
    \r\n\
    \xC2\xAB Era costume dei pagani celebrare al 25 dicembre la nascita del Sole, in onore del quale accendevano fuochi come segno di festivit\xC3\xA0. Anche i Cristiani prendevano parte a queste solennit\xC3\xA0. Quando i dotti della Chiesa notarono che i Cristiani erano fin troppo legati a questa festivit\xC3\xA0, decisero in concilio che la \"vera\" Nativit\xC3\xA0 doveva essere proclamata in quel giorno. \xC2\xBB\r\n\
    \r\n\
    \xC2\xAB \xC3\x88 cos\xC3\xAC tanto stimata questa religione del Sole che alcuni cristiani, prima di entrare nella Basilica di San Pietro in Vaticano, dopo aver salito la scalinata, si volgono verso il Sole e piegando la testa si inchinano in onore dell\xE2\x80\x99astro fulgente. Siamo angosciati e ci addoloriamo molto per questo fatto che viene ripetuto per mentalit\xC3\xA0 pagana. I cristiani devono astenersi da ogni apparenza di ossequio a questo culto degli dei. \xC2\xBB\r\n\
    \r\n\
    \r\n\
    IL 25 DICEMBRE NATALE DEL SOLE:\r\n\
    LA FESTA PIU\xE2\x80\x99 \xE2\x80\x9CINTERCULTURALE\xE2\x80\x9D DELL\xE2\x80\x99ANTICHITA\xE2\x80\x99\r\n\
    \r\n\
    La data del 25 dicembre \xC3\xA8 un giorno di festa \xC3\xA8 tra le pi\xC3\xB9 ricca di commistioni culturali e religiose della storia umana:\r\n\
    nelle radici del Natale abbiamo culture e religioni provenienti\r\n\
    dalla Siria,\r\n\
    dall\xE2\x80\x99Egitto,\r\n\
    dalla Mesopotamia,\r\n\
    dalla Persia,\r\n\
    dall\xE2\x80\x99Arabia\r\n\
    e dalla stessa antica Roma.\r\n\
    Il 25 dicembre \xC3\xA8 la data di nascita e festeggiamento di personaggi divini precedenti la comparsa di Cristo: il Dio Horus egiziano, il Dio Mitra indo-persiano, il Dio babilonese Tammuz/Yule e Shamas; sempre il 25 dicembre veniva festeggiato l\xE2\x80\x99Invictus Sol Elagabalus a Emesa e il Dio Sole Dusares/Helios a Petra. In tale data viene accreditata la nascita anche di Zarathustra e Khrisna, Dioniso, Adone, Attis, , il Dio Freyr, secoli o millenni prima di Cristo.\r\n\
    Alcune celebrazioni le troviamo nell\xE2\x80\x99antichit\xC3\xA0 addirittura in Messico ed in India. Basti pensare che in corrispondenza del nostro 25 dicembre, le popolazioni azteche e pre-azteche celebravano la nascita del Dio del Sole Huitzilopochtli e di Bacab nello Yucatan. Nell\xE2\x80\x99Emisfero Sud invece, essendo le stagioni rovesciate e cadendo quindi il solstizio d\xE2\x80\x99inverno in Giugno, vi era la Fiesta del Sol (Inti Raymi \xE2\x80\x93 24 giugno) delle antiche popolazioni incaiche e pre-incaiche, festa ancor oggi celebrata in Per\xC3\xB9 e nella regione andina.\r\n\
    \r\n\
    LE RADICI ASTRONOMICHE DEL NATALE: IL SOLSTIZIO D\xE2\x80\x99INVERNO.\r\n\
    \r\n\
    Nell\xE2\x80\x99emisfero nord, nei giorni 22-23-24 dicembre il Sole sembra fermarsi in cielo (pi\xC3\xB9 si \xC3\xA8 vicini all\xE2\x80\x99equatore pi\xC3\xB9 il fenomeno \xC3\xA8 evidente): \xC3\xA8 il Solstitium (Sole fermo).\r\n\
    In astronomia sono quei giorni in cui il sole si ferma per invertire il proprio moto nel senso della DECLINAZIONE; \xC3\xA8 cio\xC3\xA8 il punto dove il Sole raggiunge la massima distanza dal piano equatoriale. Il buio della notte raggiunge la massima estensione e la luce del giorno la minima. Abbiamo la notte pi\xC3\xB9 lunga ed il giorno pi\xC3\xB9 corto dell\xE2\x80\x99anno. Subito dopo il solstizio, la luce del giorno torna gradatamente ad aumentare ed il buio della notte a ridursi fino al solstizio d\xE2\x80\x99estate, a giugno quando avremo il giorno pi\xC3\xB9 lungo dell\xE2\x80\x99anno e la notte pi\xC3\xB9 corta.\r\n\
    Convenzionalmente il solstizio cade il giorno 21, ma per l\xE2\x80\x99inversione apparente del moto solare diventa visibile il terzo/quarto giorno successivo.\r\n\
    In poche parole il solstizio d\xE2\x80\x99inverno ai tempi significava che il Sole, giunto nella fase pi\xC3\xB9 debole come luce e calore, non sprofondava nelle tenebre dove sembrava precipitare, ma diventava con la sua vitalit\xC3\xA0 \xE2\x80\x9Cinvincibile\xE2\x80\x9D (invictus) sulle stesse tenebre, il Sole \xE2\x80\x9Crinasceva\xE2\x80\x9D, aveva un nuovo \xE2\x80\x9Cnatale\xE2\x80\x9D.\r\n\
    Appunto il \xE2\x80\x9CNatale del Sole Invincibile\xE2\x80\x9D.\r\n\
    Le popolazioni antiche ben conoscevano questo fenomeno del solstizio e lo trasformarono in occasione di festa. Questa interpretazione astronomica spiega perch\xC3\xA9 il 25 dicembre (e giorni adiacenti) sia una data presente in culture e paesi molto distanti tra loro, dall\xE2\x80\x99India al Messico, dal nord Europa all\xE2\x80\x99Etiopia..\r\n\
    \r\n\
    25 DICEMBRE DEL 274 D. C. : IL PRIMO NATALE DEL SOLE\r\n\
    \r\n\
    Il 25 dicembre come giorno di festa grande compare in Italia ed in Europa per la prima volta nel 274 D.C. per ordine dell\xE2\x80\x99 Imperatore Aureliano che fece diventare Festa Ufficiale il Natale del Sole e la volle celebrata in tutto l\xE2\x80\x99Impero Romano:\r\n\
    il Dies Natalis Solis Invicti\r\n\
    L\xE2\x80\x99imperatore Aureliano aveva appena concluso la riunificazione dell\xE2\x80\x99 Impero Romano ed era reduce dalla grande vittoria sull\xE2\x80\x99 allora principale nemica dell\xE2\x80\x99impero, la Regina Zebedia del Regno di Palmira.\r\n\
    La vittoria era stata resa possibile dallo schierarsi di Emesa, citt\xC3\xA0-Stato rivale, a fianco dell\xE2\x80\x99esercito romano in un momento di sbandamento delle milizie; questa discesa in campo a favore dei Romani fu sostenuto dai sacerdoti di Emesa, cultori del Dio \xE2\x80\x9CSol Invictus\xE2\x80\x9D; Aureliano all\xE2\x80\x99inizio della battaglia decisiva disse di aver avuto la visione benaugurante del dio Sole di Emesa..\r\n\
    L\xE2\x80\x99Imperatore trasfer\xC3\xAC a Roma, in segno di ringraziamento, la classe sacerdotale e il culto del Sole di Emesa ed in onore del Dio Sole Invincibile fece edificare un tempio di Stato a Roma, sulle pendici del Quirinale (Campus Agrippae, attuale piazza S. Silvestro). All\xE2\x80\x99imperatore non sfuggiva inoltre come l\xE2\x80\x99adozione del culto del Sole in tutto l\xE2\x80\x99 Impero potesse servire a consolidare la riunificazione ed essere elemento di unit\xC3\xA0 culturale. Nelle diverse forme, il culto del Sole era infatti presente in tutte le regioni dell\xE2\x80\x99impero, dall\xE2\x80\x99Egitto all\xE2\x80\x99Anatolia, tra le popolazioni celtiche fino a quelle arabiche, tra i Greci e gli stessi Romani.\r\n\
    Aureliano propose il Sol Invictus di Emesa ai cultori ellenico-romani del Sole-Apollo, ai diffusissimi seguaci di Mitra, agli egiziani dei riti di Iside/Horus/Se rapide, ai siriani ed arabi dei culti di Helios/Dusares e Baalim, ai Celti della Mastruca e ai Germanici cultori della Yule, la Ruota, indubitabile simbolo del Sole.\r\n\
    Particolarmente solenni erano le celebrazioni del rito della nascita del Sole in Siria ed Egitto: i celebranti si ritiravano in appositi santuari da dove uscivano a mezzanotte, annunciando che la Vergine aveva partorito il Sole (raffigurato dagli egizi come un putto)\r\n\
    La festa del Sol Invictus si afferm\xC3\xB2 come la festa pi\xC3\xB9 importante dell\xE2\x80\x99 Impero, con grande partecipazione popolare a Roma, anche perch\xC3\xA9 si innestava ed andava a concludere la festa romana pi\xC3\xB9 antica, i Saturnali.\r\n\
    In questo grande pentolone di culti solari anche gli stessi culti cristiani si confondevano con i culti solari, tanto che l\xE2\x80\x99imperatore Adriano scriveva nel 134 d.C.: \xE2\x80\x9CGli adoratori di Serapide sono cristiani e quelli che sono devoti al dio Serapide chiamano se stessi Vicari di Cristo.\xE2\x80\x9D\r\n\
    Lo stesso Tertulliano (circa 160-220 d.C.), vescovo di Cartagine cristiano e Padre della Chiesa, cos\xC3\xAC scriveva: \xE2\x80\x9C \xE2\x80\xA6molti ritengono che il Dio cristiano sia il Sole perch\xC3\xA9 \xC3\xA8 un fatto noto che noi preghiamo rivolti verso il Sole sorgente e che nel Giorno del Sole ci diamo alla gioia\xE2\x80\x9D (Ad Nationes I, 13).\r\n\
    Sant\xE2\x80\x99Agostino esortava i fratelli cristiani a non festeggiare il 25 dicembre il Sole, bens\xC3\xAC chi aveva creato il Sole.\r\n\
    \r\n\
    \r\n\
    25 DICEMBRE DEL 330 D.C.: IL PRIMO NATALE CRISTIANO\r\n\
    \r\n\
    L\xE2\x80\x99 Imperatore Costantino, che era, e rimase, anch\xE2\x80\x99egli un cultore del Dio Sole, abbracciando la fede cristiana trasform\xC3\xB2 nel 330 la festa del Sol Invictus del 25 dicembre in Festa Cristiana. In precedenza (7 marzo 321) Costantino aveva cambiato anche il nome del primo giorno della settimana, festivo,: da Dies Solis (\xE2\x80\x9Cil venerabile \xE2\x80\x9Cgiorno del Sole) a Dominus, (giorno del Signore). Questi cambiamenti non furono sempre graditi, tanto che nel centro-nord Europa \xC3\xA8 rimasto l\xE2\x80\x99antico nome di giorno del Sole (Sunday tra i Sassoni, Sontag tra i germanici).\r\n\
    Nel 337 Papa Giulio I ufficializz\xC3\xB2 la data del Natale da parte della Chiesa Cattolica, come riferito da San Crisostomo nel 390:\r\n\
    \xE2\x80\x9CIn questo giorno, 25 dicembre, anche la nativit\xC3\xA0 di Cristo fu ultimamente fissata in Roma\xE2\x80\x9D. Nel 354, si menziona per la prima volta in un calendario della liturgia romana la festa del 25 dicembre cristiano. Nel 461 questa scelta sar\xC3\xA0 riconfermata da Papa Leone Magno. Altri autori ecclesiastici rinviano al 354 con Papa Liberio la prima apparizione del Natale in Occidente.. La scelta della Chiesa di Roma di far coincidere la nascita di Cristo con la festa pagana pi\xC3\xB9 celebrata fu un tentativo di rispondere alla grande partecipazione che il culto del sole conservava tra la popolazione dell\xE2\x80\x99Impero, adattandolo culto alla nuova religione. Successivamente un\xE2\x80\x99operazione del genere fu fatta anche ricorrendo alle figure dei santi per sostituire divinit\xC3\xA0 o feste locali (S.Giorgio=Parilia, S.Giovanni=acqua, Assunzione=Diana.)\r\n\
    In Africa e centro-sud America questa pratica ha preso il nome di sincretismo religioso.\r\n\
    Nei primi tre secoli del Cristianesimo, la nascita di Cristo aveva date diverse: 18 aprile, 29 maggio, per S.Cipriano era il 28 marzo, per S.Ippolito il 23 aprile, secondo Clemente Alessandrino il 20 maggio o il 10 gennaio o il 6 gennaio; quest\xE2\x80\x99ultima data poi si afferm\xC3\xB2 in oriente e da l\xC3\xAC giunse a Roma fino al cambiamento deciso da Costantino e poi ratificato dal Papa Giulio I.\r\n\
    L\xE2\x80\x99imperatore Giustiniano, circa duecento anni dopo, legalizz\xC3\xB2 questa data per tutto l\xE2\x80\x99Occidente\r\n\
    Altre Chiese cristiane, come quella ortodossa, copta, armena, continuano invece a celebrarla il 6 gennaio (Epifania = Annunciazione)\r\n\
    All\xE2\x80\x99epoca i cristiani della Mesopotamia accusarono i loro fratelli \xE2\x80\x9Cromani\xE2\x80\x9D di idolatria e di adorare il Sole per aver adottato la Festa del Sole come festa della nascita di Cristo.\r\n\
    Anche le Chiese della Riforma, a cominciare dai Calvinisti, accusarono la Chiesa di Roma di cedimento dei cristiani al paganesimo. In effetti la dimensione pagana nel Natale dur\xC3\xB2 a lungo.\r\n\
    Ancora centotrenta anni dopo la decisione di Costantino, nel 460, il Papa san Leone Magno sconsolato scriveva: \xE2\x80\x9DE\xE2\x80\x99 cos\xC3\xAC tanto stimata questa religione del Sole che alcuni cristiani, prima di entrare nella basilica di S. Pietro, dopo aver salito la scalinata, si volgono verso il Sole e piegando la testa si inchinano in onore dell\xE2\x80\x99astro fulgente. Siamo angosciati e ci addoloriamo molto per questo fatto che viene ripetuto per mentalit\xC3\xA0 pagana. I cristiani devono astenersi da ogni apparenza di ossequio a questo culto degli dei\xE2\x80\x9D (7\xC2\xB0sermone tenuto nel Natale del 460 \xE2\x80\x93 XXVII-4).\r\n\
    Lo stesso S.Ambrogio dovette ammettere: \xE2\x80\x9CCristo \xC3\xA8 il nostro nuovo Sole\xE2\x80\x9D\r\n\
    Nel 376 venne soppresso il culto di Mitra a Roma per ordine del prefetto.\r\n\
    Con l\xE2\x80\x99editto dell\xE2\x80\x99 imperatore Teodosio del 392 che diede inizio alle persecuzioni contro i riti pagani (da \xE2\x80\x9Cpagos\xE2\x80\x9D=villaggio\xE2\x80\x9D), si conclusero a Roma le ultime celebrazioni alla Dea Iside, madre di Horus (il dio Sole egiziano), e infine nel 536 con i decreti dell\xE2\x80\x99Imperatore Giustiniano con cui chiudeva l\xE2\x80\x99ultimo tempio ad Iside in Egitto, il Natale lentamente si afferm\xC3\xB2 come festa cristiana in tutto l\xE2\x80\x99impero.\r\n\
    \r\n\
    PROTESTANTI E \xE2\x80\x9CRIFORMA\xE2\x80\x9D: VIETATO FESTEGGIARE IL NATALE\r\n\
    \r\n\
    I protestanti della \xE2\x80\x9CRiforma\xE2\x80\x9D misero sotto accusa la scelta della Chiesa Romana di spostare il Natale al 25 dicembre, con la motivazione che fu un cedimento al paganesimo. Il cristianesimo avrebbe fatto rientrare dalla finestra culti solari di Babilonia passati ai pagani romani!\r\n\
    Nella citt\xC3\xA0 di Ginevra di Calvino si poteva essere multati e persino messi in prigione per aver celebrato il Natale.\r\n\
    Il Parlamento Inglese proib\xC3\xAC l\xE2\x80\x99osservanza del Natale, definendola una festa pagana. Quando i cristiani puritani andarono in America, stabilirono questa stessa legge nella \xE2\x80\x9CNuova Inghilterra\xE2\x80\x9D e il 25 dicembre del 1620 lavorarono pi\xC3\xB9 del solito. Quarant\xE2\x80\x99anni pi\xC3\xB9 tardi la Corte civile e penale del Massachussets decret\xC3\xB2 le punizioni per chiunque avesse osservato le festivit\xC3\xA0 natalizie: \xE2\x80\x9DChiunque venga trovato ad osservare, astenendosi dal lavoro e festeggiando, tali giorni come il cosiddetto Natale, pagher\xC3\xA0 per questa trasgressione 5 scellini\xE2\x80\x9D.\r\n\
    Fino al 1800 il Natale non ebbe alcuna rilevanza nelle chiese della \xE2\x80\x9CRiforma\xE2\x80\x9D.\r\n\
    \r\n\
    1. CULTI A ROMA PRIMA DEL NATALE CRISTIANO:\r\n\
    \xC2\xB7 I CULTI SOLARI\r\n\
    \xC2\xB7 I SATURNALI\r\n\
    I CULTI SOLARI:\r\n\
    \r\n\
    La Roma pre-cristiana gi\xC3\xA0 aveva un proprio antico culto solare, quello del Sol Indiges. Oltre duecento anni prima della nascita di Cristo, Roma aveva visto giungere sul proprio territori Dei e culti d\xE2\x80\x99oriente.: Iside e Serapide , poi Cibale.\r\n\
    Il Sole assumeva centralit\xC3\xA0 e attualit\xC3\xA0 nel Mediterraneo: Iambulo, un nabateo, nel 120-100 a.C. scrisse un romanzo dove prefigurava un utopistico nuovo ordinamento sociale, con comunanza dei beni, sotto il governo di Helios, il Sole.\r\n\
    I primi secoli dell\xE2\x80\x99era cristiana videro riversarsi su Roma una alluvione di culti, soprattutto dall\xE2\x80\x99Oriente; in linea di massima ben tollerati dagli Imperatori in quanto accettabili nell\xE2\x80\x99universo politeistico della religione romana. Presero piede in particolare culti solari come quello monoteista persiano di Mitra nel II-III Secolo d.C. (che divent\xC3\xB2 il culto pi\xC3\xB9 concorrenziale al cristianesimo), il culto egiziano di Horus e Iside o di Serapide, il culto ellenico-orientale di Dioniso e Apollo.\r\n\
    Nel primo secolo d.C. scriveva Petronio \xE2\x80\x9CIl nostro territorio pullula di presenze divine, a tal punto che si incontra pi\xC3\xB9 facilmente un Dio che un uomo\xE2\x80\x9D.\r\n\
    Nel secondo secolo d.C. scriveva Celso \xE2\x80\x9CMolte persone anonime si aggirano dentro e fuori dei templi come volessero emettere responsi\xE2\x80\xA6ciascuna di esse \xC3\xA8 sempre pronta a dire: - Io sono Dio-, -Io sono Figlio di Dio-,-Sono uno Spirito Divino-\xE2\x80\x9C.\r\n\
    Il culto del Sole fin dai tempi delle campagne di Giulio Cesare in Egitto era gi\xC3\xA0 penetrato nell\xE2\x80\x99 Impero. Cesare infatti aveva fatto trasportare a Roma non solo gli obelischi di Heliopolis e di altre citt\xC3\xA0 egizie, ma anche i sacerdoti del culto di Helios (uno dei nomi del Dio Sole egiziano) che trovarono subito seguaci nella capitale.. Giulio Cesare fece introdurre il calendario solare egiziano; l\xE2\x80\x99anno solare egiziano (redatto dall\xE2\x80\x99astronomo alessandrino Sosigene) venne successivamente adottato col nome di Calendario Giuliano, di 12 mesi come quello attuale, salvo la correzione apportata da Papa Gregorio nel 1582, che tolse 10 giorni in totale e introdusse l\xE2\x80\x99anno bisestile ogni quattro anni.\r\n\
    In questi secoli, anche a rappresentazione delle nuove tendenze culturali e religiose solari, furono eletti numerosi imperatori cultori del Dio Sole.\r\n\
    L\xE2\x80\x99imperatore Comodo (161-192) si fa raffigurare in compagnia di Iside e Serapide (altro nome del Dio Sole egiziano). Abbiamo la dinastia degli imperatori Severi che prima favoriscono il culto di Iside e Serapide e costruiscono il tempio pi\xC3\xB9 bello della citt\xC3\xA0 sul Quirinale (dove ancora sta un obelisco egiziano), poi favoriscono il culto di Eracle e Dioniso, infine introducono il culto del Dio Sole di Emesa (precedentemente ad Aureliano) . Con l\xE2\x80\x99imperatore Caracalla si ha il passaggio dalle divinit\xC3\xA0 solari egiziane a quelle siriane, e anche il massimo della \xE2\x80\x9Ccontaminazione\xE2\x80\x9D culturale: con lui si invoca il \xE2\x80\x9Dsolo Dio Zeus Serapis Helios, invincibile signore del mondo\xE2\x80\x9D. L\xE2\x80\x99imperatore Massimino il Trace \xC3\xA8 invece cultore del Dio Sole Mitra come sembra lo fosse stato Nerone. Nel 218 divenne imperatore Elagabalus (gi\xC3\xA0 sacerdote del Sole ad Emesa), che si attribu\xC3\xAC il nome del Dio Sole (El Galab = Dio Sole) e che fece costruire un tempio sul Palatino dedicato al Dio Sole Invictus siriano. Successivamente l\xE2\x80\x99imperatore Aureliano stabil\xC3\xAC la festa del Sol Invictus, che continu\xC3\xB2 con Diocleziano ed altri fino a Costantino compreso, che fece incidere il Sole sul suo famoso Arco in Roma. In quei secoli furono fatte coniare da molti imperatori monete con l\xE2\x80\x99effige del Sole e sul retro la propria, in altre monete \xC3\xA8 raffigurata Iside che allatta il Dio Sole putto Horus.\r\n\
    Anche le insegne militari dell\xE2\x80\x99 esercito imperiale portavano i simboli del Sol Invictus\r\n\
    In quei secoli Roma era piena di templi e luoghi di culto delle diverse divinit\xC3\xA0 solari.\r\n\
    Basti pensare che la Basilica di San Pietro \xC3\xA8 stata costruita sopra il tempio del Dio Sole Mitra ed ha tuttora al centro della piazza un obelisco egiziano. Ancora oggi le guide turistiche di Roma offrono escursioni nei mitrei, luoghi catacombali, santuari ricavati in ambienti sotterranei dei cultori di Mitra: le cripte dove avveniva questo culto sono state trovate in tutta Europa fino in Irlanda. I culti di Iside ed Horus, che ebbero addirittura in Roma il loro centro nel II secolo d.C., durarono fino alla fine del IV secolo. Questo quadro dimostra la forte presenza di culti dedicati al Dio Sole dopo la nascita di Cristo e nel periodo precedente al natale Cristiano. Prima ancora della decisione di Aureliano di festeggiare il \xE2\x80\x9CDies Natalis Solis Invicti\xE2\x80\x9D il 25 dicembre, in tale giorno ricorreva il festeggiamento per la nascita del dio Horus in Egitto, la festa del \xE2\x80\x9CSol Invictus\xE2\x80\x9D a Emesa, del Dio Sole Dusares nel Regno di Palmira, delle divinit\xC3\xA0 solari Shamas e poi Yule a Babilonia. In tale data veniva inoltre attribuita la nascita di Mitra e poi del suo profeta Zorohastro (Zarathustra).\r\n\
    \r\n\
    2. DIO SOLE SIRIANO:\r\n\
    \xE2\x80\x9CINVICTUS SOL ELAGABALUS\xE2\x80\x9D DI EMESA\r\n\
    \r\n\
    L\xE2\x80\x99influenza siriana della citt\xC3\xA0 di Emesa (l\xE2\x80\x99odierna Homs in Siria) sulla istituzione della Festa del Natale \xC3\xA8 stata storicamente la pi\xC3\xB9 significativa. L\xE2\x80\x99imperatore Aureliano, che istitu\xC3\xAC il \xE2\x80\x9CDies Natalis Solis Invicti\xE2\x80\x9D il 25 dicembre 274, si ispir\xC3\xB2 proprio al Deus Sol Invictus ed alla sua festa nella citt\xC3\xA0 di Emesa., festa che cadeva il 25 dicembre. Emesa diede tre imperatori a Roma.\r\n\
    Da Emesa l\xE2\x80\x99imperatore romano Settimio Severo prese in moglie Giulia, nata dalla stirpe dei sacerdoti del Dio Sole, e port\xC3\xB2 il culto a Roma gi\xC3\xA0 prima di Aureliano.\r\n\
    Da Emesa proveniva l\xE2\x80\x99imperatore Elagabalus che port\xC3\xB2 a Roma culto, sacerdoti e la sacra pietra a forma di cono con base circolare (pietra che fu riportata dopo l\xE2\x80\x99uccisione dell\xE2\x80\x99imperatore). Sulla pietra era scolpita un\xE2\x80\x99aquila con un serpente nel becco: un simbolo del Sole. Quando fu ucciso, fu rimandata indietro la pietra sacra.\r\n\
    Molti particolari lasciano intendere che il culto del Sole di Emesa fosse di origine araba, di nomadi beduini: la presenza di una pietra cultuale, i nomi delle dinastie reali, l\xE2\x80\x99evirazione del sommo sacerdote, il divieto di mangiare carne di maiale. Altre teorie sostengono la provenienza di questo culto dall\xE2\x80\x99 egiziana citt\xC3\xA0 di Heliopolis o dalla mesopotamica Babilonia, sempre in un epoca antecedente al 1400 a.C.\r\n\
    Eliodoro di Emesa scrisse nel III secolo d.C. il romanzo forse pi\xC3\xB9 completo di quel secolo, \xE2\x80\x9CLe Etiopiche\xE2\x80\x9D che ben descriveva questa \xE2\x80\x9Ccontaminazione\xE2\x80\x9D tra culti solari egiziani e siriani, arabici ed etiopi.\r\n\
    \r\n\
    \r\n\
    3. DIO SOLE INDO-PERSIANO-MESOPOTAMICO:\r\n\
    IL CULTO DI MITRA\r\n\
    \r\n\
    Il culto di Mitra \xC3\xA8 quello che ha sostanzialmente pi\xC3\xB9 influenzato il rito religioso del Natale e la stessa religione cristiana. Sia a Mitra/ Dio Sole sia ad un suo profeta, Zarathustra, sono accreditate le nascite il 25 dicembre, molti secoli prima della nascita di Cristo. Mitra \xC3\xA8 fatto partorire da una vergine, \xC3\xA8 denominato \xE2\x80\x9Cil buon pastore\xE2\x80\x9D, aveva 12 compagni, effettuava miracoli, sepolto in una tomba \xC3\xA8 risorto dopo tre giorni e la sua resurrezione veniva celebrata ogni anno. Il mitraismo \xC3\xA8 una religione che ha avuto il suo massimo sviluppo in Persia ma sembra sia di origine indiana. Altri storici sostengono che sia di origine mesopotamica. Del nome Mitra in Persia, Varuna in India si trovano tracce fin dal 1400 A.C. ( compare nei testi sacri indiani Rig Veda) ma \xC3\xA8 possibile che questa divinit\xC3\xA0 sia ancor pi\xC3\xB9 anteriore.\r\n\
    Gli Ari lo tenevano in grande considerazione.\r\n\
    Mitra, col nome di Bel, compare anche nel 1400 A.C. tra gli Dei di Stato dell\xE2\x80\x99 Impero dei Mitanni in Mesopotamia, dove veniva festeggiato il 25 dicembre con la festa del Son (in babilonese Sole) invincibile: era considerato figlio del Sole e Sole egli stesso\r\n\
    Zarathustra e\xE2\x80\x99 un profeta che si ritiene nato nel 714 A.C. in Persia, combatt\xC3\xA8 il politeismo dei popoli nomadi e favor\xC3\xAC la nascita di un codice di leggi civili e morali valido per la crescente popolazione che da nomade diventava agricola e stanziale. Propose una religione universale e monoteista basata sul \xE2\x80\x9CGiusto sentire, giusto parlare, giusto operare\xE2\x80\x9D richiamandosi all\xE2\x80\x99antico culto del Dio Sole Mitra e facendolo confluire successivamente nel nuovo Dio Mazda. La sua religione \xC3\xA8 nota anche come Parsismo o Zoroastrismo ed \xC3\xA8 ancora praticata in alcune zone dell\xE2\x80\x99India e della Persia. Dai suoi detti, pensieri ed insegnamenti fu scritto il libro sacro \xE2\x80\x9CAvesta\xE2\x80\x9D, gi\xC3\xA0 noto ad Alessandro Magno. Si dice che nessuna religione pi\xC3\xB9 dello Zorohastrismo abbia affermato il valore della cultura. Questa religione avr\xC3\xA0 enormi influenze sulle successive religioni monoteiste, come l\xE2\x80\x99islamismo, il cristianesimo e l\xE2\x80\x99ebraismo\r\n\
    (le famose Leggi di Mos\xC3\xA8 sono le leggi introdotte dal re di Giuda, Gioisa, nel 621 A.C. nel suo Deuteronomio, quindi postume a Zarathustra). Con la conquista persiana di Babilonia il mitraismo entr\xC3\xB2 in relazione con le religioni mesopotamiche ed ebraiche (gli ebrei erano in esilio a Babilonia ed i persiani ne furono i liberatori). Successivamente il culto mitriaco, ebbe una grande ripresa con l\xE2\x80\x99imperatore persiano Artaserse II e nel periodo ellenistico, quando si diffuse nelle province dell\xE2\x80\x99impero Romano e nella stessa Roma portato dai soldati romani che gi\xC3\xA0 sotto Pompeo si convertivano in massa.\r\n\
    Il culto veniva celebrato in grotte o sotterranei; l\xE2\x80\x99iniziazione prevedeva il battesimo con l\xE2\x80\x99acqua santa, il pasto in comune con condivisione di pane e acqua.\r\n\
    Al Mitraismo sono accreditati i rituali e le credenze di:\r\n\
    la recitazione delle preghiere\r\n\
    l\xE2\x80\x99atto delle mani giunte\r\n\
    la genuflessione\r\n\
    confessione delle colpe che contemplavano penitenze (prima corporali, poi sostituite da lavori socialmente utili)\r\n\
    la confermazione (cresima),\r\n\
    segnarsi la fronte con le dita,\r\n\
    esposizione dell\xE2\x80\x99ostia-disco solare sull\xE2\x80\x99altare,\r\n\
    il sacerdozio solo maschile,\r\n\
    credenza nei premi e nelle pene nell\xE2\x80\x99aldil\xC3\xA0, e nel giudizio divino,\r\n\
    il paradiso (parola che in persiano ancor oggi vuol dire \xE2\x80\x9Cgiardino\xE2\x80\x9D),\r\n\
    l\xE2\x80\x99inferno con fuoco e fiamme (non \xC3\xA8 eterno e i \xE2\x80\x9Ccattivi\xE2\x80\x9D verranno restituiti al mondo nel giorno della resurrezione),\r\n\
    la disposizione dell\xE2\x80\x99altare (il banco di pietra davanti l\xE2\x80\x99Abside),\r\n\
    la stola, il copricapo dei vescovi ( che si chiama ancora mitria), le vesti, i colori,\r\n\
    l\xE2\x80\x99uso dell\xE2\x80\x99incenso, l\xE2\x80\x99aspersorio, e dei lumi accesi davanti all\xE2\x80\x99altare,\r\n\
    la stessa architettura delle basiliche, dove si eseguivano i riti in pompa magna.\r\n\
    Mitra, soprannominato \xE2\x80\x9CIl Salvatore\xE2\x80\x9D sal\xC3\xAC al cielo col Carro del Sole dopo aver consumato il pasto sacro; la sua resurrezione avveniva in primavera ed i suoi sacerdoti cos\xC3\xAC recitavano: \xE2\x80\x9CRallegratevi, iniziati; il vostro Dio \xC3\xA8 risorto dalla morte. Le sue pene e sofferenze saranno la vostra salvezza.\xE2\x80\x9D (da Dupois \xE2\x80\x93 Origine di tutti i culti- vol.5)\r\n\
    Nel terzo secolo d. C. l\xE2\x80\x99imperatore di Persia Ardashir, della dinastia dei Sassanidi, dopo aver riunificato l\xE2\x80\x99impero, fece riscrivere in 21 libri l\xE2\x80\x99 \xE2\x80\x9CAvesta\xE2\x80\x9D perduto, e fece del Mitraismo una religione di Stato; sar\xC3\xA0 di esempio per i successivi imperatori romani. Le liturgie e litanie saranno poi mutuate dal cristianesimo, prima con i riti bizantini, poi con quelli della Chiesa Romana (Rituale Romanum); l\xE2\x80\x99Avesta sar\xC3\xA0 di esempio anche a Maometto per la stesura del Corano.\r\n\
    I Magi erano una classe sacerdotale di questo culto e saranno fatti \xE2\x80\x9Centrare\xE2\x80\x9D nella tradizione del Natale Cristiano come annunciatori della nascita del Messia.\r\n\
    \r\n\
    \r\n\
    4. DIO SOLE EGIZIANO:\r\n\
    IL CULTO DI HORUS, OSIRIDE ED ISIDE\r\n\
    \r\n\
    Il 24 /25 Dicembre era festa grande nell\xE2\x80\x99Egitto dell\xE2\x80\x99epoca: in tale data si festeggiava la nascita del Dio Sole Bambino Horus; il culto di Horus e della madre Iside ebbe molta diffusione in Roma nei primi due secoli d.C. con templi ed Imperatori devoti.\r\n\
    Ad Heliopolis si celebrava il 24-25 dicembre gi\xC3\xA0 nel 1400 A.C. la festa del Dio Sole che aveva il nome di Ra, considerato anche lui Figlio del Sole e Sole egli stesso.\r\n\
    Horus, il Dio Sole, era frequentemente rappresentato come un putto con la corona solare in testa. Il Dio Sole in Egitto assunse nel corso dei millenni svariati nomi: Ra, Aton, Osiride, Serapide (nome e culto introdotto da Tolomeo nel III secolo A.C.) e Horus. Il nome \xE2\x80\x9CSerapide\xE2\x80\x9D comparve come attributo addirittura a fianco di nomi di Imperatore romani.\r\n\
    Interessante il culto del Dio Sole Aton, introdotto circa nel 1350 A.C., dal Faraone Amenophi IV, marito di Nefertiti, (il cui successore fu il pi\xC3\xB9 a noi famoso Tutankamen): fu il primo culto monoteista e universalista della storia umana ma fu spazzato via dalla rivolta dei sacerdoti politeisti. In Egitto vi era addirittura una citta dedicata al Dio Sole, la famosa Heliopolis, con una vasta classe sacerdotale dedicata al suo culto ed alla sua diffusione. Il Colosso di Rodi (300\xC2\xB0.C.), una delle sette meraviglie dell\xE2\x80\x99antichit\xC3\xA0, rappresentava il Dio Sole Helios e richiese 12 anni di lavoro. I culti egiziani del Dio Sole hanno forse pi\xC3\xB9 di tutti influenzato il cristianesimo e lo stesso ebraismo (gli ebrei vissero per secoli in Egitto) essendo precedenti ad entrambe queste ultime religioni.\r\n\
    Horus \xC3\xA8 partorito da una vergine, ha avuto 12 discepoli, \xC3\xA8 stato sepolto e poi resuscitato, ha ridato vita ad un morto (El Azar us= Lazzaro), era soprannominato la verit\xC3\xA0, la luce, il messia, il buon pastore, il KRST (l\xE2\x80\x99Unto). Era denominato anche fanciullo divino e Iusa, figlio prediletto.\r\n\
    Il padre divino di Horus era Osiride, con cui si confondeva (\xE2\x80\x9CIo e mio Padre siamo Uno\xE2\x80\x9D), mentre il padre terreno era Seb (Giuseppe); l\xE2\x80\x99angelo Thot annuncia ad Iside che concepir\xC3\xA0 un figlio verginalmente. Nasce in una grotta, annunciato da una stella d\xE2\x80\x99oriente, viene adorato da pastori e da tre uomini saggi che gli offrono doni. A 12 anni insegna nel tempio e poi scompare fino ai 30 anni. Horus viene poi battezzato sulle rive di un fiume da Anup (Giovanni) il battista, il quale in seguito verr\xC3\xA0 decapitato. Combatt\xC3\xA8 40 giorni nel deserto contro Set (Satana), ha compiuto numerosi miracoli e camminato sulle acque..\r\n\
    Con Iside ed Osiride, Horus costituiva la trinit\xC3\xA0 egizia. A Luxor, su edifici risalenti al 1500 A.C. si possono vedere immagini relative all\xE2\x80\x99 Annunciazione e all\xE2\x80\x99 Immacolata Concezione di Iside.\r\n\
    Osiride, il padre di Horus, risale a tempi ancora pi\xC3\xB9 arcaici dell\xE2\x80\x99antico Egitto, anch\xE2\x80\x99esso rappresentava il Dio Sole : aveva oltre 200 definizioni avendo assorbito nel tempo altre divinit\xC3\xA0 egiziane. Il suo culto prevedeva l\xE2\x80\x99ingestione di focacce di frumento in comunione, considerate la sua \xE2\x80\x9Ccarne\xE2\x80\x9D, e l\xE2\x80\x99elevazione al cielo dell\xE2\x80\x99ostensorio. Osiride fu dall\xE2\x80\x99inizio alla fine considerato il Dio che soffr\xC3\xAC e mor\xC3\xAC; al momento della sua morte il cielo si oscur\xC3\xB2.\r\n\
    Vi era in suo onore un inno che assomiglia al Padre Nostro: \xE2\x80\x9CO Amen, che sei nei cieli\xE2\x80\xA6\xE2\x80\x9D. Il salmo 23 della Bibbia \xC3\xA8 considerato la copia di un testo egiziano che nomina Osiride come \xE2\x80\x9CBuon Pastore\xE2\x80\x9D. Spesso Osiride era rappresentato da un occhio racchiuso in un triangolo equilatero, immagine che si pu\xC3\xB2 rivedere all\xE2\x80\x99interno delle Chiese cristiane.\r\n\
    A proposito dell\xE2\x80\x99Ostensorio, la cui elevazione rientrava nei rituali di Osiride, contrariamente a quanto si pensa per la liturgia cristiana, non prende il nome dall\xE2\x80\x99 ostia ma accade il contrario. Si chiamava ostensorio almeno un millennio prima di Cristo; ostiare corrispondeva ad un etimo egizio (e si trasl\xC3\xB2 anche nel latino) e significava mostrare, far vedere, cio\xC3\xA8 mostrare il disco solare ai fedeli.\r\n\
    La liturgia cristiana conserv\xC3\xB2 anche l\xE2\x80\x99abbassamento del capo, perch\xC3\xA9 nei primi riti di Osiride-Aton all\xE2\x80\x99aperto, vi era l\xE2\x80\x99accorgimento di abbassare la testa per non guardare il Sole evitando cos\xC3\xAC il rischio di perdere la vista. Quando i riti di Osiride-Aton furono trasferiti all\xE2\x80\x99interno dei templi, i sacerdoti ricorsero ad un disco d\xE2\x80\x99oro con i raggi intorno; appunto l\xE2\x80\x99ostensorio, elevato in alto, ma rimase l\xE2\x80\x99abitudine di abbassare il capo.\r\n\
    Nel culto cristiano l\xE2\x80\x99ostia consacrata risale alla fine del 1400 d.C., mentre la forma dell\xE2\x80\x99ostia fu stabilita dal Concilio di Trento; per spezzare i legami con il Sole pagano raffigurato nell\xE2\x80\x99ostensorio. All\xE2\x80\x99inizio del 1400 san Bernardino da Siena sostitu\xC3\xAC il disco d\xE2\x80\x99oro luccicante con una teca con dentro il simbolo dell\xE2\x80\x99eucarestia, il pane.\r\n\
    Studiosi sostengono che molte storie presenti nei Vangeli si possono ritrovare molto tempo prima nel Libro di Enoch e nei testi dei monaci egiziani chiamati i \xE2\x80\x9CTerapeuti\xE2\x80\x9D, successivamente associati agli Esseni.\r\n\
    Nei sotterranei di Roma vi \xC3\xA8 una rappresentazione di Horus allattato dalla madre\r\n\
    vergine Iside risalente al II secolo D.C. (v.Allegato)\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    5. DIO SOLE BABILONESE:\r\n\
    IL CULTO DI SHAMASH E TAMMUZ/ YULE / ISHTAR\r\n\
    \r\n\
    Al 3000 A.C. risalgono le feste di celebrazione del Dio del Sole Babilonese Shamash, nel giorno corrispondente al nostro 25 dicembre.\r\n\
    Il Dio Sole Shamash, Utu in sumerico e Shamas in accadico, \xC3\xA8 una divinit\xC3\xA0 popolare in tutta la storia della Mesopotamia; il suo nome si riferisce al Sole, ma anche alla giustizia ed alla predizione in quanto il Sole vede tutto, compreso il futuro; risiede insieme alla sua sposa in templi chiamati \xE2\x80\x9Cla Casa Bianca\xE2\x80\x9D (E\xE2\x80\x99 BABBAR). Shamas \xC3\xA8\xE2\x80\x99 rappresentato da un disco solare. Come tra gli egiziani ed altri popoli di tradizione plurimillenaria, gli dei mutano il nome nel tempo. In Babilonia comparve successivamente il culto della Regina del Cielo (Isthar) e di suo figlio Tammuz, il dio creduto la reincarnazione del Sole. La nascita di questo Dio avveniva proprio durante il solstizio d\xE2\x80\x99inverno: in questa veste di putto a Babilonia il Dio Sole Tammuz prendeva il nome di Yule e il Giorno di Yule veniva festeggiato il 25 dicembre.\r\n\
    La dea Ishtar veniva rappresentata anch\xE2\x80\x99essa (come Iside in Egitto) avente tra le braccia il suo \xE2\x80\x9Cunico figlio\xE2\x80\x9D con una aureola di dodici stelle intorno al capo (i 12 segni zodiacali). Il culto di Tammuz/Yule era talmente forte e diffuso che nella stessa Bibbia troviamo il profeta Ezechiele , nel VI secolo a.C, rimproverare le donne di Gerusalemme perche\xE2\x80\x99 piangevano la morte di Tammuz (in questo culto Tammuz dio-pastore muore e poi risorge dopo tre giorni).\r\n\
    Altra grande divinit\xC3\xA0 di Babilonia era Marduk, o Bel-Marduk che in babilonese voleva dire \xE2\x80\x9Cvitello del Sole\xE2\x80\x9D.\r\n\
    \r\n\
    \r\n\
    6. DIO SOLE ARABO: IL CULTO DI DUSARES/HELIOS\r\n\
    \r\n\
    A Petra (nell\xE2\x80\x99attuale Giordania) il Dio Sole Dusares era celebrato il 25 dicembre gi\xC3\xA0 dal 600 A.C.\r\n\
    Epifanio, il vescovo cristiano della citt\xC3\xA0 di Salamina, padre della Chiesa e noto storico, affermava nel IV secolo d.C. che da tempo a Petra (la capitale del Regno di Palmira) era festeggiato Dusares/Helios, il Dio Sole, nel giorno 25 dicembre. Era la festa principale di questo Regno, governato da una donna nel suo momento massimo di espansione, e che dalla penisola arabica si era esteso fino all\xE2\x80\x99 Etiopia ed a buona parte dell\xE2\x80\x99 Egitto prima di essere distrutto dall\xE2\x80\x99imperatore romano Aureliano nel III secolo d.C.\r\n\
    Dusares veniva celebrato sopra una pietra nera quadrangolare di lato cm 60 e alta cm 120; la presenza della pietra richiama ad una origine animista (i culti delle pietre) della divinit\xC3\xA0, ma altri studiosi ne sostengono l\xE2\x80\x99origine dalla citt\xC3\xA0 egiziana di Heliopolis, o mesopotamica di Babilonia.\r\n\
    \r\n\
    \r\n\
    \r\n\
    7. DIO INDIANO KRISHNA\r\n\
    \r\n\
    C\xE2\x80\x99\xC3\xA8 scritto nei Rig Veda (Veda della Lode) indiani in epoca antecedente al primo millennio A.C.:\r\n\
    \xE2\x80\x9CIl capo degli anacoreti chiam\xC3\xB2 a s\xC3\xA9 Devaki e le disse: - Vergine e madre, salve! Nascer\xC3\xA0 da te un figlio e sar\xC3\xA0 il salvatore del mondo. Ma fuggi, perch\xC3\xA9 il tiranno Kansa ti cerca per farti morire col tenero frutto che rechi nel seno. Darai al mondo il figlio divino e lo chiamerai Krishna il sacro \xE2\x80\x93\xE2\x80\x9C\r\n\
    Krishna nacque da una vergine:\r\n\
    \xE2\x80\x9CMahadeva, il Sole dei Soli, le apparve nel lampo di un folgorante raggio sotto forma umana. Allora concep\xC3\xAC il figlio divino.\xE2\x80\x9D (Rig Veda- brani tratti dalla traduzione di E.Shur\xC3\xA8, I Grandi Iniziati, Bari,1941).\r\n\
    Anche la storia di Krishna suggerisce influenze sulle religioni posteriori, compreso il cristianesimo. E\xE2\x80\x99 partorito da una vergine, chi la feconda compare sotto forma di luce, \xC3\xA8 perseguitato da un tiranno che ordina l\xE2\x80\x99uccisione di migliaia di bambini, \xC3\xA8 la seconda persona della trinit\xC3\xA0 indiana, \xC3\xA8 denominato il dio pastore, fa miracoli e ascende al cielo. La radice del suo nome \xC3\xA8 similare a quella di Cristo (Il nome completo di Ges\xC3\xB9 Cristo fu definito integralmente e ufficialmente solo nel 325 d.C. nel Consiglio di Nicea). La vita di Krishna \xC3\xA8 ricchissima di particolari che ritroviamo nella storia narrata di Cristo.\r\n\
    \r\n\
    8. ALTRI CULTI SOLARI\r\n\
    \r\n\
    Vengono dati per nati o festeggiati ogni anno nel solstizio d\xE2\x80\x99inverno:\r\n\
    Dioniso (di cui Microbio riferisce:\xE2\x80\x9D\xE2\x80\xA6subito dopo la sua sepoltura, egli risuscit\xC3\xB2 dalla morte e sal\xC3\xAC al cielo\xE2\x80\x9D), Apollo, Eracle, il Dio Siriano Adone, il Dio frigio Ati (Attis), lo scandinavo Freyr (figlio di Odino), il celtico-irlandese Samhein (anche lui risorto dalla morte dopo tre giorni).\r\n\
    Inoltre durante il solstizio invernale nelle Americhe del Centro-Nord abbiamo i festeggiamenti di questi Dei: Bacab (Yucatan) messo al mondo dalla vergine Chiribirias ed il Dio azteco del Sole,Huitzilopochtli\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    LA DATA DI NASCITA DI GESU\xE2\x80\x99\r\n\
    \r\n\
    Questa ricostruzione della data di nascita di Ges\xC3\xB9 \xC3\xA8 la versione pi\xC3\xB9 recente e attestata.\r\n\
    Chi stabil\xC3\xAC che Cristo nacque nell\xE2\x80\x99anno 1 fu il monaco Dionigi il Piccolo nel secolo VI, al quale risultava dai suoi calcoli che fosse nato in corrispondenza dell\xE2\x80\x99anno 754 dalla fondazione di Roma. La sua datazione fu poi adottata come inizio dell\xE2\x80\x99era cristiana dal Monaco Beda il venerabile nel 725 d.C. ed \xC3\xA8 la datazione attualmente in uso. Gli storici hanno ampiamente dimostrato che \xC3\xA8 una data errata, anche basandosi sul Vangelo di Matteo (3,16) dove l\xE2\x80\x99evangelista raccontava che Erode decise la strage di tutti i bambini primogeniti sotto i due anni. Di Erode si conosce la data della morte, che avvenne nel 4 A.C. pochi giorni prima dell\xE2\x80\x99eclisse del 13 marzo. Luca, nel suo Vangelo, scrive che Ges\xC3\xB9 era nato durante il censimento di Quirino, funzionario romano in Siria. Quirino per\xC3\xB2 fece due censimenti, uno nel 6 d.C. come Governatore, l\xE2\x80\x99altro nel 6 A.C. come funzionario insieme a Sanzio Saturnino.\r\n\
    Gli storici prendono quindi il 6 A.C. come data di riferimento per ulteriore indagine.\r\n\
    Quando nel 330 d.C. l\xE2\x80\x99imperatore Costantino stabil\xC3\xAC la celebrazione in tutto l\xE2\x80\x99impero del Natale Cristiano in luogo della festa del Sol Invictus (in occasione delle cerimonie per la nuova capitale dell\xE2\x80\x99impero, Bisanzio) accadde che il Natale fu celebrato due volte in quell\xE2\x80\x99anno: il 6 gennaio come da tradizione in Bisanzio e poi ancora il 25 dicembre come da decreto imperiale che fissava il definitivo cambiamento. Cos\xC3\xAC l\xE2\x80\x99anno 1079 dalla fondazione di Roma diventa l\xE2\x80\x99anno 1080, grazie a questa doppia celebrazione. I ricercatori hanno quindi stabilito l\xE2\x80\x99anno di nascita di Cristo nel 7 a.C; poi hanno cercato la conferma astronomica, richiamandosi ai passi del Vangelo di Matteo. Matteo era un uomo istruito formatosi alla squola dei Caldei, i pi\xC3\xB9 competenti in materia di astronomia. In nessun testo religioso orientale o occidentale, compresi i 72 Vangeli, tra riconosciuti ed apocrifi si parla di cometa o di stella in occasione della nascita con esclusione di quello di Matteo..\r\n\
    Solo gli annali cinesi registrano un fenomeno luminoso proprio nel 7 A.C.\r\n\
    Matteo parla di una grande stella luminosa e cos\xC3\xAC scrive: \xE2\x80\x9CI Magi partirono verso occidente seguendo la direzione della grande stella luminosa che indicava loro la via verso Gerusalemme, ma non trovarono col\xC3\xA0 nulla. Sostando nella notte e con gli occhi fissi in cielo, si accorsero che la stella questa volta indicava la nuova direzione, verso sud, verso Betlemme.\xE2\x80\x9D In pratica i Magi si videro indicare prima Gerusalemme (ovest), poi Betlemme (sud).\r\n\
    Gli astronomi utilizzando la simulazione al computer sono riusciti a riprodurre il fenomeno celeste che avvenne sui cieli notturni della Palestina: non si trattava di una stella, men che meno cometa, ma di una straordinaria congiunzione dei pianeti Giove e Saturno, che per diffrazione della luce risultavano 5 volte pi\xC3\xB9 luminosi della somma delle singole sorgenti, come due volte la luna piena. Questi due pianeti apparvero in cielo cos\xC3\xAC vicini da sembrare una unica stella: \xC3\xA8 un fenomeno che si ripete ogni 854 anni.\r\n\
    Giunti su Gerusalemme, Giove e Saturno apparvero spostarsi a sud verso Betlemme\r\n\
    Era la notte del 13 novembre dell\xE2\x80\x99anno 7 A.C.\r\n\
    ALTRI RITI E PERSONAGGI DEL NATALE:\r\n\
    \r\n\
    IL PRESEPE\r\n\
    \r\n\
    La parola presepe significa \xE2\x80\x9Cmangiatoia\xE2\x80\x9D ed indica la greppia nella quale, come racconta il Vangelo di Luca, fu posto il Bambino Ges\xC3\xB9 alla sua nascita.\r\n\
    Sono i Vangeli Apocrifi (cio\xC3\xA8 non accettati dalla Chiesa come ispirati) che parlano della grotta nella quale era collocata la stalla ed indicano la presenza del bue e dell\xE2\x80\x99 asinello che con il loro alito riscaldano l\xE2\x80\x99umile culla.\r\n\
    Pur se i soggetti della nativit\xC3\xA0 compaiono su alcuni sarcofaghi del IV secolo, la vera e propria origine del Presepio \xC3\xA8 da ricondurre alle antiche rappresentazioni sacre eseguite durante le feste natalizie e dalle quali S. Francesco, secondo tradizione, avrebbe tratto l\xE2\x80\x99idea del presepe, realizzandolo per la prima volta in un bosco presso Greccio nel Natale del 1223.\r\n\
    Alla fine del 1200 apparvero rappresentazioni artistiche della nativit\xC3\xA0: la pi\xC3\xB9 antica \xC3\xA8 \xE2\x80\x9CL\xE2\x80\x99 oratorium Praesepis\xE2\x80\x9D di Arnolfo di Cambio, conservato nella Basilica di Santa Maria Maggiore a Roma, su commissione del Papa Onorio IV. La popolarit\xC3\xA0 del presepio ebbe per\xC3\xB2 inizio solo nel 1400, in particolare nell\xE2\x80\x99 Italia centro \xE2\x80\x93 meridionale e per l\xE2\x80\x99opera divulgatrice dei frati francescani e domenicani.. Nella seconda met\xC3\xA0 del secolo, l\xE2\x80\x99 uso di disporre semplicemente una serie di statuine contro uno sfondo dipinto fu sostituito dall\xE2\x80\x99elaborazione di paesaggi in rilievo.\r\n\
    A Napoli sorse una vera e propria arte del presepio: famoso fu quello con figure in legno di S.Giovanni a Carbonara nel 1484. Nell\xE2\x80\x99 Italia settentrionale si producevano invece opere grandi in terracotta.\r\n\
    A Napoli nel 1700 nacque il \xE2\x80\x9Cfigurinaro\xE2\x80\x9D, cio\xC3\xA8 creatore di statuette, e comparvero cos\xC3\xAC gli specialisti di pastori, gli animalisti ecc. Anche le composizioni diventarono pi\xC3\xB9 complesse, con scene di vita quotidiana. Da Napoli questa arte si diffuse in Spagna (figure in creta in Catalogna), in Portogallo, in Francia : in Provenza venivano allestiti presepi, in teatrini o negozi, composti di vari quadri divisi da fondali e le figurine erano marionette mosse da un congegno interno. L\xE2\x80\x99Italia del nord esportava presepi nel nord Europa, in particolare su richiesta delle chiese in Polonia.\r\n\
    Esistono presepi ritagliati nella carta o nella stagnola, presepi splendidi a forma di cattedrale gotica in Polonia; Nel presepe \xC3\xA8 tradizione del nord Italia raffigurare la capanna, e del sud Italia raffigurare la grotta.\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    I RE MAGI\r\n\
    \r\n\
    I Magi, o Magusei, erano una classe sacerdotale del popolo dei Medi, popolo unito e alleato ai Persiani. Questa classe sacerdotale, che parlava aramaico ed era di origine semitica affiancava i grandi sacerdoti dei santuari e praticava gli insegnamenti di Zarathustra ed il culto di Mitra.. Pi\xC3\xB9 anticamente ancora erano chiamati \xE2\x80\x9Cathravan\xE2\x80\x9D (accenditori del fuoco) e praticavano il culto del fuoco sacro. Il compito principale dei Magi era quello di tenere sempre il fuoco acceso; facevano questa cerimonia (di ravvivare il fuoco) 5 volte al giorno e suonavano una campanella per farvi assistere i fedeli, i quali portavano loro offerte di cibo.\r\n\
    I cultori di Zarathustra si tramandavano uno scritto attribuito allo stesso Zarathustra dove si profetizzava l\xE2\x80\x99apparizione di una stella lucente in cielo, e vi erano indicate istruzioni sui doni da offrire al Salvatore. (in allegato questo scritto). Dei Magi ne parla, nel Proto-Vangelo, Giacomo che era un maestro di giustizia degli esseni; numerosi esseni ebrei erano rimasti influenzati dalla religione di Zoroastro, portata dai Persiani quando li liberarono dalla dominazione babilonese.\r\n\
    Nel \xE2\x80\x9C Vangelo arabo-siriaco dell\xE2\x80\x99 infanzia\xE2\x80\x9D la predizione della venuta del Messia \xC3\xA8 attribuita a Zarathustra: \xE2\x80\x9Ce vennero a Gerusalemme dei Magi, come aveva predetto Zarathustra\xE2\x80\x9D. L\xE2\x80\x99evento della nascita di un Salvatore era atteso da molti seguaci delle religioni dell\xE2\x80\x99 epoca, in particolare dagli ebrei.\r\n\
    L\xE2\x80\x99usanza dei doni nel giorno della Epifania risale al fatto che il Natale in oriente veniva e viene festeggiato il 6 gennaio e in concomitanza con l\xE2\x80\x99arrivo dei Magi, che portavano i doni.\r\n\
    A Milano, nella Basilica di S.Eustorgio erano conservare le presunte ossa reliquarie dei Magi fino a che Federico Barbarossa, dopo l\xE2\x80\x99anno mille, le prelev\xC3\xB2 e port\xC3\xB2 in Germania. La Cattedrale di Colonia custodisce ora queste reliquie (presunte). Successivamente una parte di queste reliquie venne restituita a Milano e sono conservate nella basilica milanese.\r\n\
    I nomi dei Magi (che successivamente furono fatti \xE2\x80\x9Cdiventare\xE2\x80\x9D re) compaiono per la prima volta su un mosaico nella basilica di S.Apollinare Nuova a ravenna: Gaspare (il Moro), Melchiorre, Baldassarre.. I loro tre doni consistevano in oro ( dono per i Re), incenso (per le adorazioni sull\xE2\x80\x99altare), mirra (considerato un balsamo per i defunti).\r\n\
    \r\n\
    LA STELLA COMETA\r\n\
    La stella cometa \xC3\xA8 entrata nella tradizione del natale cristiano, ma anch\xE2\x80\x99essa indica la confusione che circonda le radici del Natale. Abbiamo visto che nessuna cometa \xC3\xA8 osservata e registrata negli anni presunti della nascita di Cristo, e che il fenomeno luminoso fu da addebitarsi alla congiunzione di Giove e Saturno il 13 novembre del 7 A.C., nella costellazione dei Pesci.\r\n\
    Tutta la storia della cometa nasce da un quadro di Giotto, nel 1301 alla Cappella degli Scrovegni; il pittore, accanto alla Nativit\xC3\xA0, dipinse l\xE2\x80\x99Epifania e inser\xC3\xAC sopra la capanna una cometa. Per un motivo molto realistico e contemporaneo del suo tempo: proprio in quell\xE2\x80\x99anno, nel 1301, a Dicembre, apparve in cielo la famosa cometa di Halley, allora molto luminosa ed appariscente.\r\n\
    \r\n\
    BABBO NATALE\r\n\
    \r\n\
    Babbo Natale \xC3\xA8 San Nicola. San Nicola nacque a Patara (Turchia) da una ricca famiglia, fu il Vescovo di Myra nel IV secolo d.C. e li venne seppellito.\r\n\
    Nel 1087 la sua salma e il suo tesoro presunto furono trafugati da cavalieri crociati italiani. La salma fu lasciata a Bari e di questa citt\xC3\xA0 San Nicola divent\xC3\xB2 il santo protettore. Di lui parla anche Dante nel Purgatorio (XX-31-33).\r\n\
    La leggenda pi\xC3\xB9 antica su San Nicola ha subito poi leggere correzioni per renderla adatta ai bambini, ma cos\xC3\xAC raccontava:\r\n\
    tre giovani povere erano destinate alla prostituzione. Un nobiluomo caduto in miseria voleva sposarne una ed era commosso dai loro pianti. And\xC3\xB2 da S.Nicola che promise di aiutare tutti: per due notti consecutive lanci\xC3\xB2 un sacco di monete d\xE2\x80\x99oro all\xE2\x80\x99interno della casa delle tre fanciulle. Al terzo giorno trov\xC3\xB2 le finestre chiuse, ed allora fece entrare in casa il sacco calandolo dal camino. Intorno al camino erano stese delle calze, che si riempirono di monete d\xE2\x80\x99oro.\r\n\
    Nella fantasia popolare S. Nicola divent\xC3\xB2 \xE2\x80\x9Cil portatore di doni\xE2\x80\x9D, nella notte del 6 dicembre (S.Nicola) e successivamentei nella notte di Natale.\r\n\
    Il culto di San Nicola, che si era diffuso nel nord Europa, fu poi portato dagli immigrati olandesi in America. Il santo in olandese veniva chiamato Sinter Klass ma negli Stati Uniti si afferm\xC3\xB2 come Santa Klaus.\r\n\
    Nel 1809 lo scrittore Washington Irvin raccont\xC3\xB2 per la prima volta gli spostamenti di Babbo Natale nel cielo per la distribuzione dei regali; nel 1821 il pastore americano Clement Clarice Moore scrisse una favola sul Natale, per i bambini, nella quale il personaggio di Babbo Natale appariva con una slitta tirata da 8 renne.\r\n\
    Nel 1860 Thomas Nast, illustratore e caricaturista del giornale New Yorkais Illustrateur Weekly, rivest\xC3\xAC Babbo Natale di una lunga mantella guarnita di pelliccia. Per quasi 30 anni Nast illustr\xC3\xB2 tutti gli aspetti della leggenda di Natale e nel 1885 stabil\xC3\xAC la residenza di Babbo Natale al Polo Nord. L\xE2\x80\x99Anno seguente lo scrittore americano Gorge P. Webster precis\xC3\xB2 che la fabbrica di giocattoli e dimora di Babbo Natale erano nascosti tra i ghiacciai del Polo Nord.\r\n\
    Nel 1931 la Coca Cola decise di usare Babbo Natale nelle sue campagne pubblicitarie e commission\xC3\xB2 ad un artista americano, tale Haddon Sundblom, l\xE2\x80\x99incarico di ridisegnare e standardizzare il vecchio santo gentiluomo. L\xE2\x80\x99artista si ispir\xC3\xB2 al suo vicino di casa, commesso viaggiatore sempre indaffarato con pacchi e pacchetti, un uomo grasso con barba bianca e fare pacioso. Vicino di casa + colori bianco e rosso della coca cola = Babbo Natale. L\xE2\x80\x99immagine convinse i dirigenti della Coca Cola che la riportarono su una delle prime pubblicit\xC3\xA0: un folletto ciccione con la pancia a botte, il barbone bianco, che indossa un abito rosso bordato di pelliccia bianca, stivali neri e cinturone con in mano una bottiglia di Coca Cola. Da quando quella campagna pubblicitaria fu conclusa, nessuno al mondo ha mai pi\xC3\xB9 visto Babbo Natale raffigurato con colori diversi. Come invece il cavallo bianco di San Nicola si sia trasformato in quattro renne, questo non si sa.\r\n\
    \r\n\
    \r\n\
    L\xE2\x80\x99ALBERO\r\n\
    \r\n\
    L\xE2\x80\x99Albero \xC3\xA8 una cattedrale delle culture animiste pi\xC3\xB9 antiche ed il suo culto \xC3\xA8 ancora diffuso Chi ha viaggiato nell\xE2\x80\x99 India nel nord, nell\xE2\x80\x99Asia Centrale, in Cina, in Tibet, in Siberia avr\xC3\xA0 sicuramente notato che alcuni alberi, in genere i pi\xC3\xB9 antichi o maestosi, sono oggetti di culto: vengono legati sottili fili intorno al tronco per mettervi incensi accesi, infilarvi ghirlande di fiori; alla base dell\xE2\x80\x99albero vengono deposti fiori, cibo, lumi accesi. Questa tradizione si conserva un po\xE2\x80\x99 in tutto il mondo.\r\n\
    Tale G.Moussian ha rinvenuto una tavoletta babilonese molto antica, 1850 a.C., dove vi \xC3\xA8 raffigurato un albero schematizzato, e sui rami delle losanghe che raffigurano gli astri, ed alla sommit\xC3\xA0 il Sole che domina. E\xE2\x80\x99 il pi\xC3\xB9 antico albero di Natale finora rinvenuto (considerato poi che a Babilonia festeggiavano il Dio Sole Samash il 25 dicembre\xE2\x80\xA6.). I babilonesi usavano decorare l\xE2\x80\x99albero con frutti.\r\n\
    L\xE2\x80\x99albero \xC3\xA8 presente in tutte le religioni arcaiche: \xC3\xA8 l\xE2\x80\x99albero cosmico della mitologia germanica (la tradizione odierna riparte proprio dai germani), \xC3\xA8 l\xE2\x80\x99albero indiano dei Veda, \xC3\xA8 l\xE2\x80\x99albero della Vita persiano e biblico\xE2\x80\xA6\r\n\
    Celti, Sassoni, Normanni portavano alberi in casa per tener lontani gli spiriti cattivi, gli Egiziani portavano le palme ed i Romani gli abeti. Come segno di venerazione verso gli alberi consacrati gli antichi erano soliti appendere mele ed altri frutti come offerta alle divinit\xC3\xA0. La tradizione era estesa in tutto il nord Europa.: per ringraziare la terra della sua generosit\xC3\xA0 ed in segno di buon auspicio per i successivi raccolti, i contadinoi appendevano sugli alberi i frutti dei loro raccolti. Gli antichi Germani vi appendevano anche pietre ai rami della quercia per far tornare gli spiriti fuggiti con la caduta delle foglie. Successivamente gli alberi si arricch\xC3\xACrono di frutti colorati, ghirlande, e candeline.\r\n\
    La prima ripresa di questa usanza la troviamo a Strasburgo in Germania nel 1539, ma solo nel 1800 divent\xC3\xB2 una usanza generale. Fabbricanti germanici e svizzeri. cominciarono a produrre ninnoli di vetro soffiato, gli americani successivamente aggiunsero l\xE2\x80\x99idea delle lampadine. Poi nel 1840 la duchessa di Orleans , imitando l\xE2\x80\x99ambasciatore asburgico, fece addobbare un enorme albero nel giardino di Tuilleries e\xE2\x80\xA6la moda dilag\xC3\xB2 tra tutte le corti europee.\r\n\
    \r\n\
    IL CEPPO NATALIZIO\r\n\
    \r\n\
    Dalla festa del Sol Invictus proviene l\xE2\x80\x99usanza di bruciare un ceppo a Natale: Il ceppo doveva essere di quercia e doveva bruciare per 12 giorni: da come era bruciato o dalle scintille si prediceva il futuro. Le ceneri venivano conservate e usate come rimedi contro malattie e calamit\xC3\xA0.\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    IL VISCHIO\r\n\
    \r\n\
    Nei culti dei druidi, i sacerdoti celtici, c\xE2\x80\x99era l\xE2\x80\x99usanza di tagliare il vischio con un falcetto a forma di serpe d\xE2\x80\x99oro. Il vischio poi veniva raccolto in un drappo bianco avendo cura di non farlo toccare per terra e lo si immergeva nell\xE2\x80\x99acqua di un lago.\r\n\
    A questo punto, abbracciarsi sotto il vischio per il natale-festa del Sole era benaugurante; infatti il vischio era anche chiamato \xE2\x80\x9Cguarisci-tutto\xE2\x80\x9D per le sue propriet\xC3\xA0 medicinali. Questa sua natura invita a superare ogni dolore e calamit\xC3\xA0; secondo i druidi il vischio assicurava il bel tempo, il raccolto abbondante e la protezione contro i malefici: per questo si usa regalarlo ad inizio d\xE2\x80\x99anno.\r\n\
    Con l\xE2\x80\x99affermazione della religione cristiana, il vischio , a causa dei suoi legami con la tradizione pagana, fu sostituito dall\xE2\x80\x99 agrifoglio.\r\n\
    \r\n\
    Il CAPODANNO\r\n\
    \r\n\
    Chiamato in epoca romana \xE2\x80\x9CCaledae Ianuariae\xE2\x80\x9D, dal 332 d.C. viene celebrato a Roma come festa liturgica della Circoncisione di Ges\xC3\xB9 Cristo. E\xE2\x80\x99 il capodanno civile per quasi tutti i paesi del mondo, e religioso per cattolici, anglicani ed evangelisti.\r\n\
    I cristiani ortodossi celebrano l\xE2\x80\x99anno nuovo il 14 gennaio.\r\n\
    In Occidente il 1\xC2\xB0 gennaio si fa cominciare l\xE2\x80\x99anno solare, in Cina l\xE2\x80\x99anno inizia con la prima luna nuova nel segno dell\xE2\x80\x99 \xE2\x80\x9CAcquario\xE2\x80\x9D, i mussulmani (che hanno come anno d\xE2\x80\x99inizio delle datazioni il 622 d.C.) seguono un calendario luni- solare e la data del capodanno, come per i cinesi, varia ogni anno. Indiani, persiani, curdi lo inaugurano il 21 marzo, i buddisti dello Sri Lanka iniziano l\xE2\x80\x99anno il 14 aprile\r\n\
    A settembre viene festeggiato il capodanno ebraico e l\xE2\x80\x99antico capodanno cristiano-copto.\r\n\
    \r\n\
    LA STRENNA\r\n\
    \r\n\
    Per strenna natalizia si intendevano, nell\xE2\x80\x99antichit\xC3\xA0 tra i Romani, i rami d\xE2\x80\x99albero che venivano regalati alle Calende di Gennaio come augurio di prosperit\xC3\xA0 ed abbondanza.\r\n\
    I Re dei Sabini volevano che questi rami fossero raccolti nel bosco dedicato alla Dea Strenia.\r\n\
    \r\n\
    L\xE2\x80\x99EPIFANIA E LA BEFANA\r\n\
    L\xE2\x80\x99Epifania, che vuol dire Manifestazione, agli inizi del IV secolo coincideva con la festa per la nascita di Cristo che andava affermandosi il giorno 6 gennaio. Ma a seguito della decisione dell\xE2\x80\x99 Imperatore Costantino di anticipare la festa cristiana del 6 gennaio e di farla coincidere con la festa del Natale del Sole pagano del 25 dicembre, si cre\xC3\xB2 una difformit\xC3\xA0 di rituali. La Chiesa Cattolica allora riemp\xC3\xAC la festa del 6 gennaio con l\xE2\x80\x99arrivo dei Magi, e la chiam\xC3\xB2 festa dell\xE2\x80\x99 Epifania.\r\n\
    Secondo studiosi la parola Epifania nel corso del tempo, in particolare in Toscana, \xC3\xA8 stata corretta dalla lingua locale in Befania e poi Befana. A Firenze nel 1400 si usava festeggiare l\xE2\x80\x99Epifania rievocando l\xE2\x80\x99ultima tappa del viaggio dei Magi con cortei-processioni spettacolari, ma con ridotta valenza religiosa.. Comparvero i primi cortei mascherati con riferimenti alle sacre rappresentazioni medievali ed al viaggio dei Magi a Betlemme. E mimi che rappresentavano i significati religiosi dell\xE2\x80\x99 Epifania.\r\n\
    Pian piano l\xE2\x80\x99aspetto profano della festa prese il sopravvento su quello religioso, prese piede la libert\xC3\xA0 nel mascherarsi ai cortei, successivamente comparvero i carri che raggiunsero il massimo splendore nel 1700. Sui carri, spesso decorati da artisti, c\xE2\x80\x99erano figure femminili chiamate Befane e che rappresentavano la festa.. All\xE2\x80\x99 Epifania o Befania del 1766 il carro pi\xC3\xB9 ammirato fu quello del \xE2\x80\x9CTrionfo di Bacco\xE2\x80\x9D. Si pass\xC3\xB2 anche dallo splendore delle vesti dei primi cortei alla cura del grottesco.\r\n\
    Intorno alle Befane c\xE2\x80\x99erano numerosi Befani, o Befanotti, col volto spesso dipinto di nero, vestiti in modo sgargiante e col volto tinto di nero, che in qualche modo richiamavano i re Magi.. I Befani chiedevano soldi per se e per pubblica beneficenza oppure vino, ed in cambio recitavano canzoni, religiose o profane, dette Befanate.\r\n\
    I partecipanti ai cortei portavano fantocci fatti di stracci e issati su pertiche (\xE2\x80\x9CBefane\xE2\x80\x9D), venivano caricati su carri illuminati da fumose torce. I carri erano attorniati da giovani che soffiavano in stridule e lunghe trombe di vetro. Giunti i carri ed i partecipanti nella piazza principale, veniva dato fuoco ai fantocci-befane: questa usanza a Firenze \xC3\xA8 durata fino a fine 1800. L\xE2\x80\x99 Epifania si caratterizz\xC3\xB2 cos\xC3\xAC come anticamera, festa di apertura del periodo carnevalesco.\r\n\
    In seguito, e dappertutto, l\xE2\x80\x99Epifania si \xC3\xA8 caratterizzata come festa per bambini, con il recupero della tradizione dei doni dei Magi.\r\n\
    \r\n\
    Un abbraccio.\r\n\
    Garrone. "
