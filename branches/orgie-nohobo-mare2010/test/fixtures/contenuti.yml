contenuti_052: 
  m_bInAttesa: "1"
  datapubblicazione: 
  datacreazione: 2005-11-21 14:15:20
  m_bSerio: "0"
  idlogin: "2082"
  m_nLivelloSegretezza: "5"
  titolo: la bionda in treno
  idcontenuto: "673807091"
  tipo: barzellette
  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: "Su un treno per Venezia viaggiano ,affiancati, un distinto signore  \r\n che sta leggendo il giornale e una sventolona bionda con minigonna \r\n ascellare. \r\n\
    All'ingresso di una galleria, l'uomo perde ogni inibizione e mette \r\n una mano sul ginocchio della biondona. Lei si avvicina e gli sussurra \r\n\
    all'orecchio: \"Golosello\". \r\n\
    Lui, eccitatissimo per il complimento, non sta pi\xC3\xB9 nella pelle e le mette una mano sulla coscia. \r\n\
    Lei si avvicina, lo accarezza e gli dice ancora: \"Golosello\". \r\n\
    Lui ormai ha perso la testa e, sicuro delle intenzioni della \r\n\
    donna,  parte spedito: mette una mano tra le cosce ma, allibito, la ritrae \r\n\
    immediatamente.\r\n\
    E lei, ad alta voce: \r\n\
    -\"O benedeto fiol, te ghe l'ho dito fin da subito che g'ho  l'osello!\"-. \r\n"
contenuti_095: 
  m_bInAttesa: "1"
  datapubblicazione: 
  datacreazione: 2008-02-27 11:18:08
  m_bSerio: "0"
  idlogin: "2116"
  m_nLivelloSegretezza: "5"
  titolo: SCORREGGE
  idcontenuto: "1427914662"
  tipo: goliardia
  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: "Sin da quando il mondo aveva\r\n\
    ben viventi Adamo ed Eva\r\n\
    era in voga in tutti quanti\r\n\
    di coprirsi l\xC3\xAC davanti,\r\n\
    mai nessuno penso', strano,\r\n\
    di coprirsi il deretano.\r\n\
    \r\n\
    Le scorregge piu' discrete\r\n\
    conturbavano la quiete\r\n\
    ed allora i dolci suoni\r\n\
    non urtavano i calzoni\r\n\
    \r\n\
    La scorreggia di gran gloria\r\n\
    si e' coperta nella storia\r\n\
    Sin da quando i sodomiti,\r\n\
    di scorregge assai periti,\r\n\
    per eccesso di misura\r\n\
    si otturavan l'apertura,\r\n\
    i Romani allor sommessi\r\n\
    non frenavano gli eccessi.\r\n\
    \r\n\
    Pur Augusto Imperatore\r\n\
    scorreggiava a tutte l'ore\r\n\
    e la corte assai perfetta\r\n\
    scorreggiava in etichetta\r\n\
    e persino in casi gravi\r\n\
    scorreggiavano gli schiavi\r\n\
    \r\n\
    Si racconta che Tiberio\r\n\
    scorreggiasse serio serio\r\n\
    che Caligola il tiranno\r\n\
    scorreggiasse tutto l'anno\r\n\
    e piu' d'una ogni mattina\r\n\
    ne facesse Catilina\r\n\
    \r\n\
    Marco Tullio in Campidoglio\r\n\
    le lasciava come l'olio\r\n\
    e non eran certo poche\r\n\
    domandatelo alle oche;\r\n\
    e perfino le Vestali\r\n\
    ci spegnevano i fanali\r\n\
    \r\n\
    \r\n\
    Ciceron per ore intere\r\n\
    chiacchierava col sedere\r\n\
    quelle poi di Coriolano\r\n\
    si sentivan da lontano;\r\n\
    con lo schiaffo sulla trippa\r\n\
    scorreggiava pure Agrippa!\r\n\
    \r\n\
    Muzio Scevola e Porsenna\r\n\
    ne portarono per strenna\r\n\
    alle feste d'Imeneo\r\n\
    ove il console Pompeo\r\n\
    e piu' ancora il gran Lucullo\r\n\
    scorreggiavan per trastullo\r\n\
    \r\n\
    Scorreggiava Roma intera\r\n\
    da mattina sino a sera,\r\n\
    scorreggiava in grande stile\r\n\
    anche il sesso femminile;\r\n\
    mentre invece Cincinnato\r\n\
    le faceva in mezzo al prato\r\n\
    \r\n\
    Scorreggio' Napoleone\r\n\
    anche al rombo del cannone\r\n\
    \"La battaglia non si perda\"\r\n\
    e Cambrone rispose \"merda\",\r\n\
    ch'e' la cosa piu' sicura\r\n\
    se c'e' in mezzo la paura.\r\n\
    \r\n\
    Scorreggiava come un tuono\r\n\
    fin Cleopatra dal suo trono\r\n\
    in contrasto ad Agrippina\r\n\
    che facevale in sordina\r\n\
    e Cornelia ai suoi gioielli\r\n\
    ne faceva dei fardelli\r\n\
    \r\n\
    Le faceva senza posa\r\n\
    Messalina silenziosa;\r\n\
    scorreggiava assai felice\r\n\
    la dolcissima Beatrice\r\n\
    ed il sommo padre Dante\r\n\
    le annusava tutte quante\r\n\
    \r\n\
    Le scorreggie del Boccaccio\r\n\
    ti rendevano di ghiaccio\r\n\
    Scorreggiava pure Tasso\r\n\
    imitando il contrabbasso.\r\n\
    Mentre invece il Machiavelli\r\n\
    sradicava gli Alberelli\r\n\
    \r\n\
    Il gran Volta con Pila\r\n\
    le faceva sempre in fila,\r\n\
    di Archimede dir si suole,\r\n\
    che oscurasse pure il sole\r\n\
    mentre a colpi di pennello\r\n\
    le faceva Raffaello\r\n\
    \r\n\
    Dopo quanto e' stato detto\r\n\
    non si puo' chiamar difetto\r\n\
    se noi pure qualche volta\r\n\
    le facciamo a briglia sciolta\r\n\
    percio' e' logico e prescritto\r\n\
    CHE SCORREGGI IL SOTTOSCRITTO!\r\n\
    \r\n"
contenuti_074: 
  m_bInAttesa: "0"
  datapubblicazione: 2006-06-14 16:49:22
  datacreazione: 2006-05-26 09:06:45
  m_bSerio: "0"
  idlogin: "2887"
  m_nLivelloSegretezza: "5"
  titolo: Elogio alla generazione anni '80
  idcontenuto: "1428830127"
  tipo: altro
  idloginpubblicante: "1849"
  m_battivo: "1"
  contenuto: "Generazione '80\r\n\
    \r\n\
    Lo scopo di questo articolo \xC3\xA8 quello di rendere giustizia a una generazione,\r\n\
    quella di noi nati agli inizi degli anni '80 (anno pi\xC3\xB9, anno meno), quelli\r\n\
    che vedono la casa acquistata allora dai nostri genitori valere oggi 20 o 30\r\n\
    volte tanto, e che pagheranno la propria fino ai 50 anni.\r\n\
    \r\n\
    Noi non abbiamo fatto la Guerra, n\xC3\xA9 abbiamo visto lo sbarco sulla luna, non\r\n\
    abbiamo vissuto gli anni di piombo, n\xC3\xA9 abbiamo votato il referendum per\r\n\
    l'aborto e la nostra  memoria storica\r\n\
    comincia coi Mondiali di Italia '90.\r\n\
    \r\n\
    Per non aver vissuto direttamente il '68 ci dicono che non abbiamo ideali,\r\n\
    mentre ne sappiamo di politica pi\xC3\xB9 di quanto credono e pi\xC3\xB9 di quanto\r\n\
    sapranno mai i nostri fratelli minori e discendenti.\r\n\
    \r\n\
    Babbo Natale non sempre ci portava ci\xC3\xB2 che chiedevamo, per\xC3\xB2 ci sentivamo\r\n\
    dire, e lo sentiamo ancora, che abbiamo avuto tutto, nonostante quelli che\r\n\
    sono venuti dopo di noi che hanno avuto tutto, e nessuno glielo dice.\r\n\
    \r\n\
    Siamo l'ultima generazione che ha imparato a giocare con le biglie, a\r\n\
    saltare la corda, a giocare a lupo, a un-due-tre-stella, e allo stesso tempo\r\n\
    i primi ad aver giocato coi  videogiochi, ad essere andati ai parchi di\r\n\
    divertimento o aver visto i cartoni animati a colori.\r\n\
    \r\n\
    Abbiamo indossato pantaloni a campana, a sigaretta, a  zampa di elefante e\r\n\
    con la cucitura storta; la nostra prima tuta \xC3\xA8 stata blu con bande bianche\r\n\
    sulle  maniche e le nostre prime scarpe da ginnastica di marca le abbiamo\r\n\
    avute dopo i 10 anni.\r\n\
    \r\n\
    Andavamo a scuola quando il 1 novembre era il giorno dei  Santi e non\r\n\
    Halloween, quando ancora si veniva bocciati, siamo stai gli ultimi a fare la\r\n\
    Maturit\xC3\xA0 e i pionieri del  3+2.\r\n\
    \r\n\
    Siamo stati etichettati come Generazione X e abbiamo dovuto sorbirci\r\n\
    Sentieri e i Visitors, Twin \r\n\
    Peaks e Beverly Hills (ti piacquero allora, vai a rivederli adesso, vedrai\r\n\
    che  delusione).\r\n\
    \r\n\
    Abbiamo pianto per Candy-Candy, ci siamo innamorate dei fratelli di Georgie,\r\n\
    abbiamo riso con Spank, ballato con Heather Parisi, cantato con Cristina\r\n\
    D'Avena e imparato la mitologia greca  con Pollon.\r\n\
    \r\n\
    Siamo una generazione che ha visto Maradona fare campagne contro la droga.\r\n\
    \r\n\
    Siamo i primi ad essere entrati nel mondo del lavoro come Co.Co.Co. e quelli\r\n\
    per cui non gli costa niente licenziarci.\r\n\
    \r\n\
    Ci ricordano sempre fatti accaduti prima che nascessimo, come se non\r\n\
    avessimo vissuto nessun avvenimento storico.\r\n\
    \r\n\
    Abbiamo imparato che cos'\xC3\xA8 il terrorismo, abbiamo visto cadere il muro di\r\n\
    Berlino, e Clinton avere relazioni improprie con la segretaria nella Stanza\r\n\
    Ovale; siamo state le pi\xC3\xB9 giovani vittime di Cernobyl; quelli della nostra\r\n\
    generazione l'hanno fatta la guerra (Kosovo, Afghanistan, Iraq, ecc.);\r\n\
    abbiamo gridato NO NATO, fuori le basi dall'Italia, senza sapere molto bene\r\n\
    cosa significasse, per poi capirlo di colpo un 11 di settembre.\r\n\
    \r\n\
    Abbiamo imparato a programmare un videoregistratore prima di chiunque altro,\r\n\
    abbiamo giocato a Pac-Man, odiamo Bill Gates e credevamo che internet\r\n\
    sarebbe stato un mondo libero.\r\n\
    \r\n\
    Siamo la generazione di Bim Bum Bam, di\r\n\
    Clementina-e-il-Piccolo-Mugnaio-Bianco e del Drive-in.\r\n\
    \r\n\
    Siamo la generazione che and\xC3\xB2 al cinema a vedere i film di Bud Spencer e\r\n\
    Terence Hill.\r\n\
    \r\n\
    Quelli cresciuti ascoltando gli Europe e Nik Kamen, e gli ultimi a usare dei\r\n\
    gettoni del telefono.\r\n\
    \r\n\
    Ci siamo emozionati con Superman, ET o Alla Ricerca  dell'Arca Perduta.\r\n\
    \r\n\
    Bevevamo il Billy e mangiavamo le Big Bubble, ma neanche le Hubba Bubba\r\n\
    erano male; al supermercato le cassiere ci davano le caramelline di zucchero\r\n\
    come resto.\r\n\
    \r\n\
    Siamo la generazione di Crystal Ball (\"con Crystal Ball ci puoi giocare.\"),\r\n\
    delle sorprese del Mulino Bianco, dei mattoncini Lego a forma di mattoncino,\r\n\
    dei Puffi, i Volutrons, Magnum P.I., Holly e Benji, Mim\xC3\xAC Ayuara,\r\n\
    l'Incredibile Hulk, Poochie, Yattaman, Iridella, He-Man, Lam\xC3\x83\xC2\xB9, Creamy, Kiss\r\n\
    Me Licia, i Barbapap\xC3\xA0 , i Mini-Pony, le Micro-Machine, Big Jim e la  casa di\r\n\
    Barbie di cartone ma con l'ascensore.\r\n\
    \r\n\
    La generazione che ancora si chiede se Mila e Shiro alla  fine vanno\r\n\
    insieme.\r\n\
    \r\n\
    La generazione che non ricorda l'Italia Mondiale '82, e che ci viene un riso\r\n\
    smorzato quando ci vogliono dare a bere che l'Italia di quest'anno \xC3\xA8 la\r\n\
    favorita.\r\n\
    \r\n\
    L'ultima generazione a vedere il proprio padre caricare il portapacchi della\r\n\
    macchina all'inverosimile per andare in vacanza 15 giorni.\r\n\
    \r\n\
    L'ultima generazione degli spinelli.\r\n\
    \r\n\
    Guardandoci indietro \xC3\xA8 difficile credere che siamo ancora vivi: viaggiavamo\r\n\
    in macchina senza cinture, senza seggiolini speciali e senza air-bag;\r\n\
    facevamo viaggi di 10-12 ore e non soffrivamo di sindrome da classe turista.\r\n\
    \r\n\
    Non avevamo porte con protezioni, armadi o flaconi di medicinali con\r\n\
    chiusure a prova di bambino.\r\n\
    \r\n\
    Andavamo in bicicletta senza casco n\xC3\xA9 protezioni per le ginocchia o i\r\n\
    gomiti.\r\n\
    \r\n\
    Le altalene erano di ferro con gli spigoli vivi e il gioco delle penitenze\r\n\
    era bestiale.\r\n\
    \r\n\
    Non c'erano i cellulari.\r\n\
    \r\n\
    Andavamo a scuola carichi di libri e quaderni, tutti infilati in una\r\n\
    cartella che raramente aveva gli  spallacci imbottiti, e tanto meno le\r\n\
    rotelle!!\r\n\
    \r\n\
    Mangiavamo dolci e bevevamo bibite, ma non eravamo obesi.\r\n\
    \r\n\
    Al limite uno era grasso e fine.\r\n\
    \r\n\
    Ci attaccavamo alla stessa bottiglia per bere e nessuno si \xC3\xA8 mai infettato.\r\n\
    \r\n\
    Ci trasmettevamo solo i pidocchi a scuola, cosa che le nostre madri\r\n\
    sistemavamo lavandoci la testa  con l'aceto.\r\n\
    \r\n\
    Non avevamo Playstation, Nintendo 64, videogiochi, 99 canali televisivi,\r\n\
    dolby-surround, cellulari, computer e Internet, per\xC3\xB2 ce la spassavamo\r\n\
    tirandoci gavettoni e rotolandoci  per terra tirando su di tutto; bevevamo\r\n\
    l'acqua direttamente dalle fontane dei parchi, acqua non imbottigliata, che\r\n\
    bevono anche i cani!\r\n\
    \r\n\
    E le ragazze si intortavano inseguendole per toccar loro il sedere e\r\n\
    giocando al gioco della bottiglia o a quello della verit\xC3\xA0 , non in una chat\r\n\
    dicendo :) :D :P\r\n\
    \r\n\
    Abbiamo avuto libert\xC3\xA0 , fallimenti, successi e responsabilit\xC3\xA0 e abbiamo\r\n\
    imparato a crescere con tutto ci\xC3\xB2.\r\n\
    \r\n\
    Tu sei uno di nostri? Congratulazioni!\r\n\
    \r\n\
    Invia questo a tutti coloro che hanno avuto la fortuna di crescere come\r\n\
    bambini."
