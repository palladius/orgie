  contenuto: "Ecco cosa vi pu\xC3\xB2 capitare se trascorrete 5 giorni a Milano per le strade \r\n\
    non molto trafficate frequentate principalmente dai milanesi...\r\n\
    \r\n\
    Tutti questi annunci li ho letti veramente sulle vetrine, e ve li voglio riportare:\r\n\
    \r\n\
    In una palazzina con officina artigianale sul retro:\r\n\
    - SI VENDE SOLO IL DAVANTI, IL DIDIETRO SERVE A MIO MARITO\r\n\
    \r\n\
    Negozio di mangimi:\r\n\
    - TUTTO PER IL VOSTRO UCCELLO\r\n\
    \r\n\
    Panificio:\r\n\
    - QUANDO VI DIVENTA DURO VE LO GRATTUGIAMO GRATIS E META' CE LO TRATTENIAMO\r\n\
    - PANE FRESCO CALDO\r\n\
    \r\n\
    Gelateria:\r\n\
    - VENDESI GELATERIA, LIQUIDO TUTTO\r\n\
    - SI VENDE GHIACCIO FRESCO\r\n\
    \r\n\
    Mobiliere:\r\n\
    - SI VENDONO LETTI A CASTELLO PER BAMBINI DI LEGNO\r\n\
    - SI VENDONO MOBILI DEL SETTECENTO NUOVI\r\n\
    \r\n\
    Macelleria:\r\n\
    - DA ROSALIA - TACCHINI E POLLI, A RICHIESTA SI APRONO LE COSCE\r\n\
    - CARNE BOVINA OVINA CAPRINA SUINA POLLINA E CONIGLINA\r\n\
    \r\n\
    Polleria:\r\n\
    - POLLI ARROSTO ANCHE VIVI\r\n\
    - SI AMMAZZANO GALLINE IN FACCIA\r\n\
    - SI VENDONO UOVA FRESCHE PER BAMBINI DA SUCCHIARE\r\n\
    \r\n\
    Sfasciacarrozze:\r\n\
    - QUI SI VENDONO AUTOMOBILI INCIDENTATE MA NON RUBATE\r\n\
    \r\n\
    Negozio di fiori:\r\n\
    - SE MI CERCATE SONO AL CIMITERO... VIVO\r\n\
    - SI INVIANO FIORI UN TUTTO IL MONDO VIA FAX\r\n\
    \r\n\
    Abbigliamento:\r\n\
    - NUOVI ARRIVI DI MUTANDE, SE LE PROVATE NON LE TOGLIETE PIU'\r\n\
    - NON ANDATE ALTROVE A FARVI RUBARE, PROVATE DA NOI\r\n\
    - IN QUESTO NEGOZIO DI QUELLO CHE C'E' NON MANCA NIENTE\r\n\
    - AL REPARTO BAMBINI 3 AL PREZZO DI 2\r\n\
    - SI VENDONO IMPERMEABILI PER BAMBINI DI GOMMA\r\n\
    \r\n\
    Autofficina:\r\n\
    - VENITE UNA VOLTA DA NOI E NON ANDRETE MAI PIU' DA NESSUN'ALTRA PARTE\r\n\
    \r\n\
    Derattizzatori:\r\n\
    - QUI ULTIMA CENA PER TOPI\r\n\
    \r\n\
    Ferramenta:\r\n\
    - SEGA A DUE MANI E A DENTI STRETTI: 50 EURO\r\n\
    \r\n\
    Lavanderia:\r\n\
    - SI SMACCHIANO ANTILOPI\r\n\
    \r\n\
    Meccanico:\r\n\
    - SI RIPARANO BICICLETTE ANCHE ROTTE\r\n\
    \r\n\
    Citofono caserma Carabinieri:\r\n\
    - ATTENZIONE PER SUONARE PREMERE, SE NON RISPONDE NESSUNO \r\n\
    RIPREMERE"
