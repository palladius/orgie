contenuti_076: 
  m_bInAttesa: "1"
  datapubblicazione: 
  datacreazione: 2006-11-23 14:07:55
  m_bSerio: "0"
  idlogin: "383"
  m_nLivelloSegretezza: "5"
  titolo: Come far impazzire un corriere
  idcontenuto: "131556925"
  tipo: cazzate
  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: "Quando sei annoiato e non sai cosa fare, un bel numero verde ti aiuta a passare il tempo con il sorriso sulle labbra. Telefonate ad uno spedizioniere (TNT, DHL, ecc.) e....\r\n\
    1. Mentre state al telefono, premete dei numeri casuali dalla tastiera del telefono e chiedete al ragazzo/a di farla finita!\r\n\
    2. Dopo aver richiesto un ritiro, chiedete se potete pagare col bancomat.\r\n\
    3. Parlate usando il linguaggio dei CB.\r\n\
    4. Dite che dovete spedire un pacco molto grosso, e quando vi chiedono le dimensioni rispondete \"grande cosi\", e quando replicano \"come scusi\", continuate \"cos\xC3\xAC guardi\"\r\n\
    5. Chiudete la chiamata con \"si ricordi, non abbiamo mai avuto questa conversazione\"\r\n\
    6. Dite al corriere che sull'altra linea c'\xC3\xA8 un altro corriere, ed effettuerete la spedizione con il miglior offerente.\r\n\
    7. Chiedete se effettuano spedizione nello stato del \"gurdel\", e quando vi chiedono dove si trova dite \"nel motera\" e quando vi chiedono il continente rispondete \"questo non lo s\xC3\xB2..\"\r\n\
    8. Rispondete alle loro domande con altre domande..\"es. voglio fare una spedizione\" e loro \"dove?\" e voi \"dove posso spedire?\" e loro \"in tutto il mondo\" e voi \"anche nell'alaska?\"\r\n\
    9. Chiedete se \xC3\xA8 possibile spedire un essere umano.\r\n\
    10. Chiedete se \xC3\xA8 possibile spedire della cocaina, e se rispondono \"no\", chiedete se eventualmente potete nasconderla dentro le bombe.\r\n\
    11. Chiedete di poter spedire dell'esplosivo, alla replica negativa aggiungete che vi serve per capodanno, all'ennesima negazione offritene un po' al centralinista.\r\n\
    12. Chiedete se potete spedire un casco di banane e quando dicono \"no\", rispondete se potete spedire almeno le bucce.\r\n\
    13. Fate lo spelling di ogni citt\xC3\xA0.\r\n\
    14. Urlate mente parlate\r\n\
    15. Mettete una forte marcatura sulla lettera \"p\" quando dite Pacco.\r\n\
    16. Chiedete i prezzi della Federal Express, ed alla negazione, rispondete\r\n\
    \"maccheroni!\"\r\n\
    17. Chiedete alla centralinista cosa sta indossando.\r\n\
    18. Scrocchiate le dita nel ricevitore.\r\n\
    19. Dite salve, fate silenzio per qualche secondo e poi reagite come se avessero chiamato loro.\r\n\
    20. Richiedete il ritiro con determinazione e poi quando vi chiedono conferma, fate i perplessi.\r\n\
    21. Dite alla centralinista che vi sentite tristi e di essere carina con voi.\r\n\
    22. Chiedete se potete spedire un gatto vivo ed alla negazione chiedete \"e morto?\".\r\n\
    23. Cambiate accento ogni tre secondi.\r\n\
    24. Chiedete se potete spedire un bel pacchettino rosa con il fiocco dorato\r\n\
    25. Mentre state richiedendo il vostro ritiro, interrompete e fate finta di riconoscere la voce della centralinista che gi\xC3\xA0 vi aveva detto il nome alla risposta (es.Barbara) dicendo \"ma tu non sei Barbara? Non ci siamo conosciuti alla festa di Paolo?\"\r\n\
    26. Iniziate la telefonata con \"vorrei...\" pausa di 5 secondi e poi \"no.. penso di no...\"\r\n\
    27. Chiedete se potete tirare il pacco al corriere dalla finestra perch\xC3\xA8 non avete il portone.\r\n\
    28. Dite alla centralinista che appena avete sentito la sua voce vi siete innamorati di lei, e che volete assolutamente vederla.\r\n\
    29. Richiedete il ritiro mentre avete il frullatore acceso.\r\n\
    30. Richiedete la spedizione di una lettera, appena vi offrono la possibilit\xC3\xA0 di usare un UPS ENVELOPE, accettatelo con un sospiro.\r\n\
    31. Chiedete se potete spedire un \"cazzo di gomma\".\r\n\
    32. Chiedete se potete spedire un pacco parlante, che ha una cordicella e che dice l'indirizzo di destinazione appena uno la tira.\r\n\
    33. Fingete di aver chiamato una ditta che vende dolciumi, affermando, appena la centralinista risponde, che \"i bign\xC3\xA8 sapevano di pollo\".\r\n\
    34. Richiedete il ritiro parlando con le labbra inferiori sporte avanti verso il naso.\r\n\
    35. Chiedete se potete pagare in gettoni d'oro.\r\n\
    36. Imitate la voce del centralinista.\r\n\
    37. Eliminate i verbi dalle vostre frasi.\r\n\
    38. Quando dicono \"Sono Sabrina, posso aiutarla?\" Cominciate a piangere al telefono...\r\n\
    39. Suonate la chitarra mentre parlate.\r\n\
    40. Chiedete se il corriere, alla consegna del pacco, pu\xC3\xB2 recitare una poesia o cantare una canzone.\r\n\
    41. Cercate di divertire il centralinista con informazioni musicali ricorrenti.\r\n\
    42. Affermate che darete il pacco al corriere solo se vi ispira fiducia.\r\n\
    43. Chiedete di mandarvi un corriere bello.\r\n\
    44. Dite che pagherete soltanto a consegna avvenuta.\r\n\
    45. Chiedete la spedizione \"overnight\" perch\xC3\xA8 si tratta di pesce.\r\n\
    46. Chiedete che il corriere consegni il pacco bendato.\r\n\
    47. Chiedete se potete spedire un pacco rotondo, specificando che all'aeroporto non ve lo facciano \"rimbalzare\".\r\n\
    48. Chiedete se il corriere pu\xC3\xB2 consegnarvi a casa una pizza.\r\n\
    49. Se risponde un uomo chiedete di poter parlare con una donna, e vice-versa.\r\n\
    50. Fate i pazzi a met\xC3\xA0 dell'ordine, e chiedete \"chi sei tu?\" \"cosa vuoi da me?\"\r\n\
    51. Cercate di psicanalizzare il centralinista\r\n\
    52. Chiedete di poter parlare con la persona con cui avete parlato l'ultima volta, affermando che non ne ricordate il nome.\r\n\
    53. Chiedete se potete spedire un pacco di 50 kg pieno di monete, appena vi dicono il costo della spedizione replicate \"ma \xC3\xA8 tutto quello che c'\xC3\xA8 nel pacco!\". Poi mandate ai pazzi il centralinista chiedendo il giusto rapporto peso-costo togliendo i soldi dal pacco per il costo della spedizione, affermando che i soldi sono in monete da 100 lire del peso di 1 kg ogni 20.000 lire.\r\n\
    54. Chiedete se potete spedire un pacco contenente: x (elencate una lista di componenti chimici complicati, dopo averli opportunamente imparati a memoria) e quando vi chiedono se si tratta di sostenze nocive, replicate di no, ma lo diventano quando si mischiano, quindi raccomandate la delicatezza del corriere, loro replicheranno che non possono spedire sostanze nocive e voi insistete sul punto che non lo sono a meno che non vengano mischiate.\r\n\
    55. Chiamate per complimentarvi del servizio, richiamate dopo mezz'ora chiedendo della stessa persona, e scusatevi per \"qualsiasi cosa\" avevate detto perch\xC3\xA8 eravate ubriachi.\r\n\
    56. Dite che siete azionista della UPS e dite al centralinista di dire al suo capo servizio di dire al direttore che \xC3\xA8 licenziato.\r\n\
    57. Chiedete se potete spedire della merda di rinoceronte per delle analisi.\r\n\
    58. Chiedete se potete spedire dieci miliardi in contanti, ed alla negazione o al suggerimento del centralinista di usare una banca, fate una voce sottotono ed offritegliene uno per fare l'impiccio.\r\n\
    59. Chiedete se potete spedire dei vermi da pesca vivi, ed alla negazione affermate che siete il campione mondiale di pesca.\r\n\
    60. Mentre state conversando, chiedete al centralinista di restare in attesa un secondo poi fingete di prendere a parolacce qualcuno che vi sta vicino poi tornate al telefono dicendo \"mi scusi, rieccomi\" poi chiedete di nuovo un attimo e ricominciate con le parolacce, appena il centralinista cercher\xC3\xA0 di sbolognarvi, aggiungetelo alla contesa..\r\n\
    61. Chiedete al centralinista se secondo lui/lei dovreste tagliarvi i capelli.\r\n\
    62. Parlante mentre state bevendo o mangiando.\r\n\
    63. Chiedete al centralinista se gli piace il suo lavoro, e poi offritegliene uno migliore, alla fine concludete con \"le far\xC3\xB2 saper\xC3\xA8..\"\r\n\
    64. Affermate di sapere quello che il centralinista sta pensando, poi dite: \"sta pensando che io sono un rompicoglioni\r\n\
    65. Fate il terzo grado al centralinista\r\n\
    66. Siate vaghi al massimo\r\n\
    67. Richiedete una spedizione, specificando che questa volta vorreste (COLPO DI TOSSE) e poi dite, \"ha capito?\"\r\n\
    68. Dite che non sentite bene perch\xC3\xA8 state usando un asciugacapelli\r\n\
    69. Emettete un lungo respiro dopo ogni singola parola\r\n\
    70. Iniziate la conversazione affermando \"attenzione, state parlando con un computer\"\r\n\
    71. Chiamate il numero verde, appuntatevi il nome della ragazza x che risponde e riagganciate, richiamate e dite alla nuova persona che vi risponde di lasciare un messaggio per x senza passarvela. Lasciate detto che avete conosciuto un'altra donna, che siete stufo della relazione e che la lasciate.\r\n\
    72. Chiedi se sanno cosa \xC3\xA8 un \"pacco orbitante\" e chiedete che volete spedire con questa modalit\xC3\xA0.\r\n\
    73. Fate \"ksssshhh\" al telefono e poi chiedete \"ha sentito questo rumore?\"\r\n\
    74. Dite al centralinista che chiamate dall'ospedale e che suo padre ha avuto un incidente grave, poi dite che gi\xC3\xA0 che ci siete vorreste spedire un pacco.\r\n\
    75. Mentre stanno dicendo il costo di un pacco dite \"vorrei spedire anche un altro pacco\" e cos\xC3\xAC in successione per almeno altri 10, poi chiedete il riassunto.\r\n\
    76. Dite che vorreste spedire un pacco a Kansas City e subito dopo aver pronunciato il nome della citt\xC3\xA0, suonate una stringata d'armonica.\r\n\
    77. Chiedete se potete pagare appiccicando dei francobolli sul pacco\r\n\
    78. Imparate ad imitare una celebrit\xC3\xA0 e poi chiedete al centralinista di portarvi il pacco personalmente\r\n\
    79. Metteteli in attesa per sempre.\r\n\
    80. Date al centralinista un codice segreto da usare per i futuri ordini\r\n\
    81. Dite: C'\xC3\xA8 una bomba sotto la sua sedia\" e quando dicono \"pu\xC3\xB2 ripetere?\" rispondete, \"si, da Milano a Firenze, 5 kg, 50x30x30\"\r\n\
    82. Chiedete se potete spedire un fegato, specificando che \xC3\xA8 della massima urgenza\r\n\
    83. Appena l'ordine \xC3\xA8 preso, cambiatelo leggermente e appena il centralinista riassume, ricambiatelo di nuovo affermando \"ma non mi ascolta quando parlo?\"\r\n\
    84. Chiedete se potete pagare in corone ceche\r\n\
    85. Chiedete se potete spedire uno spillo e quanto viene a costare, insistete per uno sconto\r\n\
    86. Chiedete se possono consegnare un pacco sott'acqua (in una piattaforma subaquea)\r\n\
    87. Chiedete una assicurazione sul pacco e poi chiedete se pagano anche in\r\n\
    caso di morte del corriere.\r\n\
    88. Parlate bisbigliando\r\n\
    89. Dite al centralinista che state avendo un infarto\r\n\
    90. Fate finta di parlare portoghese e dopo l'ordine salutate normalmente\r\n\
    91. Fate la vocina, dite al centralinista che siete un bambino e che pap\xC3\xA0 vi sta picchiando\r\n\
    92. Chiedete al centralista se ha visto tal film al cinema e se gli \xC3\xA8 piaciuto\r\n\
    93. Ruotate intorno alla parola \"pacco\" senza mai pronunciarla ma cercando di farla capire al centralinista, ed appena la dice strillate come pazzi \"non dica quella parola!\"\r\n\
    94. Mentre siete al telefono lasciate il televisore a tutto volume con un film dove ci sono spari ed esplosioni e fate \"ouch!\" ad ogni sparo.\r\n\
    95. Appena vi comunicano il prezzo, chiedete perch\xC3\xA8 vogliono punirvi.\r\n\
    96. Affermate che il pacco che vi hanno consegnato era \"sporco\", fingetevi arrabbiati, appena vi chiedono il numero di spedizione, dite che adesso il pacco \xC3\xA8 in lavatrice.\r\n\
    97. Lamentatevi sul pacco che vi hanno consegnato contiene la bambola gonfiabile Betty invece di Lucy che ha le tette pi\xC3\xB9 grandi.\r\n\
    98. Chiamate il numero verde, appuntatevi il nome della ragazza x che risponde e riagganciate, richiamate e dite alla nuova persona che vi risponde di lasciare un messaggio per x senza passarvela. Dite che si \xC3\xA8 scordata il perizoma a casa vostra...\r\n\
    99. Dite alla centralinista che ha una voce bellissima e se le interessa un lavoro in un telefono a luci rosse \r\n\
    ultima grande chicca...\r\n\
    100. Chiedete se potete spedire un pacco contenente un \"plimmer\" e quando vi chiedono che cosa \xC3\xA8 rispondete di nuovo \"un plimmer \xC3\xA8 un plimmer\" e quando chiedono a cosa serve, ancora \"\xC3\xA8 un plimmer e basta\", quando vi chiedono il peso dite \"dai 10 ai 100 grammi dipende dalla temperatura\" per dimensioni dite dimensioni da 10x10x10 a 100x100x100 dipende dalla velocit\xC3\xA0 in cui viene spostato, quando cerceranno di sbolognarvi affermando che non possono spedire oggetti cos\xC3\xAC, specificate che \xC3\xA8 il decimo plimmer che spedite con loro e ricominciate tutto da capo tergiversando qu\xC3\xA0 e la.\r\n\
    \r\n\
    Un grazie a Magnaromagna.it...."
