contenuti_046: 
  m_bInAttesa: "0"
  datapubblicazione: 2005-10-20 10:57:27
  datacreazione: 2005-10-04 12:47:35
  m_bSerio: "0"
  idlogin: "2082"
  m_nLivelloSegretezza: "5"
  titolo: di cazzate ne ho sentite, ma queste...
  idcontenuto: "1241849265"
  tipo: barzellette
  idloginpubblicante: "278"
  m_battivo: "1"
  contenuto: "Il reggiseno \xC3\xA8 uno strumento democratico: separa la destra dalla sinistra, solleva le masse e attira i popoli!!!!!!\r\n\
    ___\r\n\
    \r\n\
    Sto disperatamente cercando di capire perch\xC3\xA8 i Kamikaze indassano il casco\r\n\
    ___\r\n\
    \r\n\
    L'alfabeto Morse, il quaderno pianse\r\n\
    ___\r\n\
    \r\n\
    Ho fatto l' amore con Control , domani provo anche ALT e CANC.\r\n\
    ___\r\n\
    \r\n\
    L'ultima volta che sono entrato in una donna \xC3\xA8 quando ho visitato la Statua della libert\xC3\xA0\r\n\
    ___\r\n\
    \r\n\
    Da bambino ero in grado, bendato, di giocare quattro partite a scacchi contemporanamente. \r\n\
    Le perdevo tutte.\r\n\
    ___\r\n\
    \r\n\
    lo sapete xk\xC3\xA8 i cinesi non ci vedono? ..........................................................................................\r\n\
    ........................................................................................................\r\n\
    ....................................................................................................... \r\n\
    ....................................................................................................... \r\n\
    ....................................................xk\xC3\xA8 siamo troppo lontani..........!!!!!!!\r\n\
    ___\r\n\
    \r\n\
    Quando ero piccolo mia nonna mi port\xC3\xB2 a mangiare in una trattoria all'aperto. \r\n\
    Cominci\xC3\xB2 a piovere. \r\n\
    Ci misi tre ore a finire il brodo.\r\n\
    ___\r\n\
    \r\n\
    Il postino suona sempre due volte. Il che \xC3\xA8 seccante se avete aperto alla prima\r\n\
    ___\r\n\
    \r\n\
    Quand'ero piccolo i miei genitori hanno cambiato casa una \r\n\
    decina di volte. \r\n\
    Ma io sono sempre riuscito a trovarli.\r\n\
    ___\r\n\
    \r\n\
    Se stasera farete qualcosa di cui domattina vi pentirete, \r\n\
    dormite fino a tardi.\r\n\
    ___\r\n\
    \r\n\
    cosa dice un pulcino nel forno.......PIO FOCOOO!\r\n\
    ___\r\n\
    \r\n\
    Berlusconi \xC3\xA8 generoso, onesto, leale, educato, imparziale, sincero, moderato, impegnato, intelligente, ben considerato all'estero, sofisticato, galante, d'animo nobile, simpatico, socievole, bello, alto, biondo..\r\n\
    ___\r\n\
    \r\n\
    Un dottore se ne sta seduto sulla sedia, nel suo ufficio dopo aver avuto un \r\n\
    rapporto sessuale completo con una paziente meditando su quanto \xC3\xA8 appena \r\n\
    successo, e in coscienza continua a ripetersi: \r\n\
    \"Mio Dio, come ho potuto fare una cosa del genere!!! Che vergogna, ho perso \r\n\
    tutta la mia etica professionale!!!\" \"Non far\xC3\xB2 MAI PIU' una cosa del genere, \r\n\
    davvero, pensa se si sapesse in giro...\" \r\n\
    Mentre si sta auto-flagellando per il suo gesto, di colpo sulla sua spalla \r\n\
    destra appare diavoletto che gli dice: \r\n\
    \"DAI RETTA A ME, SMETTILA DI FARE IL PIRLA... MA LO SAI CHE C'E UNA \r\n\
    QUANTITA' INCREDIBILE DI DOTTORI CHE HANNO RAPPORTI SESSUALI CON I PROPRI \r\n\
    PAZIENTI?!?! RAZZA DI INGENUO COSA CREDI, DI ESSERE L'UNICO?! SMETTILA DI \r\n\
    COMPORTARTI DA FARISEO... AMICO NON FAI ASSOLUTAMENTE NIENTE DI MALE... E' \r\n\
    LA COSA PIU' COMUNE CHE CI SIA!!! \" Il dottore si convince, e comincia a \r\n\
    sentirsi molto pi\xC3\xB9 sollevato... annuisce e pensa \"Hai proprio ragione, in \r\n\
    fin dei conti non ho fatto nulla di male !! Appena detto ci\xC3\xB2, sull'altra \r\n\
    spalla appare un angioletto che si avvicina all'orecchio e dice: \r\n\
    \"RICORDATI CHE SEI UN VETERINARIO, NON TE LO DIMENTICARE! VE-TE-RI-NA-RIO, \r\n\
    COGLIONE!!!...\"\r\n\
    ___\r\n\
    \r\n\
    Lei: \r\n\
    - Amore, per quest'anno ho una sorpresa: che ne diresti di una bella \"vacanza intelligente\"??? \r\n\
    Lui: \r\n\
    - Mmmmhh.... cos'\xC3\xA8, tu non vieni?\r\n\
    ___\r\n\
    \r\n\
    NAPOLI. Scuola elementare per bambini down. \r\n\
    \r\n\
    La maestra di Inglese entra e dice : \"Sit down\". \r\n\
    \r\n\
    E i bambini rispondono : \"E tu si 'na zoccola!\"\r\n\
    ___\r\n\
    \r\n\
    Un cavaliere si rivolge ad un mercante: \r\n\
    \r\n\
    Cavaliere: \"Vorrei uno scudo.\" \r\n\
    Mercante: \"Certo, le va bene questo?\" \r\n\
    Cavaliere: \"Si, quant'\xC3\xA8?\" \r\n\
    Mercante: \"Due scudi..\"\r\n\
    ___\r\n\
    \r\n\
    Sulla riva di un fiume un uomo pesca. \r\n\
    dall'altra parte un uomo kiwy.\r\n\
    ___\r\n\
    \r\n\
    Al mare: \r\n\
    - Pap\xC3\xA0, mi compri il materassino a forma di bagnino? \r\n\
    - Ma non esistono. \r\n\
    - Ma come, la mamma dietro lo scoglio ne sta gonfiando uno.\r\n\
    ___\r\n"
