    \r\n\
    \r\n\
    Invito goliardi dai 5 bolli in su a mandarmi idee su eventuali future classificazioni degli ordini che possano andare bene per TUTTE le citt\xC3\xA0 (e qui \xC3\xA8 il casino), ad esempio io pensavo, ma posso sbagliarmi, che un ordine pu\xC3\xB2 essere:\r\n\
    \r\n\
    - in sonno (non fa nulla), \r\n\
    - attivo (fa processi e cene) \r\n\
    - X (cavalleresco? onorifico? nobiliare? non saprei che aggettivo usare) se fa cene ma non fa proseliti attraverso i processi. \r\n\
    \r\n\
    Qualcuno pu\xC3\xB2 mandarmi idee (dopo averci pensato ALMENO 5 minuti di fila e aver contato fino a 16.9, uno dei miei numeri preferiti) via mail all'indirizzo palladius@goliardia.org ?\r\n\
    Grazie mille."
