    17) Automazione sessuale \r\n\
    18) Veicoli pederasti \r\n\
    19) Sistemi \"vibratorii\" \r\n\
    20) Teoria degli amplessi 2 \r\n\
    21) Strumenti e misure pelviche \r\n\
    22) Pornometria \r\n\
    \r\n\
    V\xC2\xB0 anno \r\n\
    23) Sturbomacchine \r\n\
    24) Orgasmoelasticit\xC3\xA0 applicata \r\n\
    25) Sadomeccanismi \r\n\
    26) Materiali per preservativi \r\n\
