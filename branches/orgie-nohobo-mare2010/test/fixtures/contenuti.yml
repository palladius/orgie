  m_battivo: "1"
  contenuto: " \r\n\
    \r\n\
    Prima edizione goliardica a cura di S.E. Prof. Barone Edoardus I\xC2\xB0 Cardinal,\r\n\
    Ordinario e Docente di Uccellologia Applicata presso l'Universit\xC3\xA0 di Porta Pila.\r\n\
    (Anno Sancto, MCMLXIX, Augustae Taurinorum.)\r\n\
    L'Edizione attuale, in lievissima misura riveduta, corretta e aggiornata, \xC3\xA8 stata editata dal Siniscalco del Tempio,\r\n\
    Mons. Manolus II\xC2\xB0 Manginus IV\xC2\xB0 Curial S.O.T.C.a.P.,\r\n\
    nel rispetto delle linee guida tracciate con mirabile chiarezza dall'Autore,\r\n\
    cui va naturalmente tutto il merito di questa opera, oltre al plauso degli Studiosi e del Mondo Accademico tutto\r\n\
    \r\n\
    PREFAZIONE\r\n\
    Questo libro di altissimo valore e di superlativa ricercatezza si prefigge di fornire un conciso riassunto della meravigliosa disciplina che \xC3\xA8 l'Uccellologia.\r\n\
    Nell'interesse della brevit\xC3\xA0 e della chiarezza, sono stati omessi molti dettagli sperimentali che gioveranno alla rapida consultazione.\r\n\
    La materia viene trattata in dieci capitoli riassumibili in altrettanti comandamenti, vere e proprie leggi fondamentali per coloro che si vogliono affacciare alla soglia delle mirabolanti vicende della Disciplina.\r\n\
    Sono profondamente grato a tutti coloro che mi hanno aiutato in questa mia fatica e desidero ringraziare in modo particolare il mio assistente prof. Iucundus per tutta la collaborazione che non mi ha dato.\r\n\
    Con l'uscita della prima edizione, sono lieto di poter annunciare che presto saranno pubblicate le traduzioni in in portoghese, tedesco, inglese, francese, cinese, portoricano, piemontese, siculo, ecc.... \r\n\
    Prof. Barone\r\n\
    INDICE GENERALE\r\n\
    1.\tCapitolo Primo\r\n\
    2.\tCapitolo Secondo \r\n\
    3.\tCapitolo Terzo \r\n\
    4.\tCapitolo Quarto \r\n\
    5.\tCapitolo Quinto \r\n\
    6.\tCapitolo Sesto \r\n\
    7.\tCapitolo Settimo \r\n\
    8.\tCapitolo Ottavo \r\n\
    9.\tCapitolo Nonno \r\n\
    10.\tCapitolo Decimo \r\n\
    11.\tEpilogo Finale e Monito Pastorale \r\n\
    12.\tAppendici (a cura di Manolus Venerabilis) \r\n\
    Cosa volete ancora??\r\n\
    CAPITOLO PRIMO\r\n\
    La prima regola che qui enunceremo \xC3\xA8 una regola antichissima, la si fa infatti risalire ai tempi dell'Antica Grecia, e precisamente al fastoso periodo del predominio di SPARTA.\r\n\
    Potremo quindi definirla con l'appellativo di \"Spartana\" onde distinguerla dalle successive. Essa \xC3\xA8 suddivisa in sei articoli, che sono essenzialmente i seguenti: \r\n\
    a.\tL'Uccellagione \xC3\xA8 sacrosanta, ma chi la compie non deve farsi cogliere sul fatto prima di averla ultimata. \r\n\
    b.\tChi viene colto in atto uccellatorio nei confronti di un Goliarda di pi\xC3\xB9 alta Carica o pi\xC3\xB9 bollato verr\xC3\xA0 punito con punizione di secondo grado essendo a sua attenuante lo avere un bel fegato. \r\n\
    c.\tChi uccella ad un Majore senza farsi cuccare pu\xC3\xB2 chiedere un riscatto, ma si consiglia di farlo da una localit\xC3\xA0 un pochino fuori mano, per esempio Calcutta; codesto riscatto dovr\xC3\xA0 essere richiesto tramite il proprio Vescovo. 1 \r\n\
    d.\tUccellare ad un subalterno \xC3\xA8 cosa dilettevole e rilassante, non comporta rischio alcuno, ma solo abbondanza di riscatti. Unico inconveniente \xC3\xA8 la poca soddisfazione che la cosa comporta. \r\n\
    e.\tUccellare ai filistei (osti, ostesse e simili) \xC3\xA8 cosa sempre meritoria ed in seguito tratteremo l'argomento con codicillare attenzione. 2 \r\n\
    f.\tProverbio Spartano: \"Se Uccellagione tu farai, il riscatto chiederai\". \r\n\
    In conclusione \xC3\xA8 evidente l'utilit\xC3\xA0 meritoria a livello goliardico dell'Uccellagione che affonda le sue radici fino ai tempi epici ed eroici dell'antica Sparta; non si dovr\xC3\xA0 mai dimenticare l'esempio degli antichi, ma ricagando gli antichi sentieri raggiungere nuove tette e nuovi orizzonti.\r\n\
    CAPITOLO SECONDO\r\n\
    In questo capitolo sar\xC3\xA0 trattato il quesito che ogni buon goliarda prima o poi si pone: Perch\xC3\xA9 si uccella?\r\n\
    In genere ognuno uccella pro cazzi sua, ma in questo trattato, che vuole essere esaustivo sull'argomento, tale risposta non pu\xC3\xB2 e non deve essere sufficiente.\r\n\
    Da remote testimonianze e da reperti pompeiani si pu\xC3\xB2 sicuramente affermare che l'Uccellagione scatur\xC3\xAC dal desiderio inconscio del riscatto.3\r\n\
    Illustri docenti sono con me d'accordo: fu il riscatto (1) il primo alito che diede corpo all'Uccellagione, ma non sono da sottovalutare lo spirito del brivido (2), lo spirito d'avventura (3), e (4) lo spirito a 90\xC2\xB0.\r\n\
    (1) Il Riscatto in tutti i suoi molteplici aspetti \xC3\xA8 particolarmente evidenziabile nei rapporti reciproci tra i vari goliardi. Esso deve essere opportunamente valutato e stabilito a seconda della circostanza. Di regola il riscatto si ottiene calcolando la \"Sommatoria Uccellatoria\": 4\r\n\
    S.U. = VP x VS x K\r\n\
    Ove VP     =      Valore pecuniale dell'oggetto uccellato;\r\n\
    Ove VS     =     Valore sentimentale;\r\n\
    Ove K      =      Coefficiente Variabile.\r\n\
    E' evidente che il K dipende da numerosi fattori che principalmente scaturiscono dalla situazione di carica e di bolli dell'uccellatore e dell'uccellato, oltre che naturalmente dalla vis dialettica e dall'esperienza goliardica delle due parti. Per una trattazione empirica del metodo di calcolo di tale coefficiente, si veda l'Appendice II.\r\n\
    (2) Lo Spirito del Brivido non pu\xC3\xB2 essere descritto in termini generali, n\xC3\xA9 espresso in termini matematici; lo stesso discorso va fatto per (3) lo Spirito d'Avventura: essi sono l'essenza inebriante che scaturisce nell'atto uccellatorio, che solo pochi eletti sono in grado di assaporare.\r\n\
    Infine (4) lo Spirito a 90\xC2\xB0 si evidenzia nei rapporti con i gi\xC3\xA0 definiti filistei. Esso assai di rado si presenta al massimo grado: assai pi\xC3\xB9 frequentemente si manifesta nei suoi aspetti inferiori, spirito a 45\xC2\xB0, a 40\xC2\xB0, a 30\xC2\xB0, a 18\xC2\xB0, a 12\xC2\xB0, a 11\xC2\xB0, a 10\xC2\xB0, fino al documentabile spirito tedesco, il cosiddetto \"Bier Spiritk\".\r\n\
    Il famoso Prof. Del B\xC3\xBCs pone in evidenza l'usanza, assai apprezzata dai filistei, di ritornar loro i contenitori dello spirito precedentemente uccellati e successivamente svuotati, ma tale usanza comporta il rischio di arresto da parte della guardia di finanza con l'accusa di fare dello spirito clandestinamente: in tal caso sar\xC3\xA0 opportuno procurarsi in anticipo l'opportuna licenza, cos\xC3\xAC ogni fastidioso contrattempo sar\xC3\xA0 evitato.\r\n\
    CAPITOLO TERZO\r\n\
    Passiamo ora ad un nuovo ed avvincente argomento che nella antitesi totale cogiterei definire \"Quantit\xC3\xA0 e Qualit\xC3\xA0\".\r\n\
    Il goliarda inesperto uccella poco e male, quello esperto uccella molto e tutto quello che gli capita a tiro, ma il goliarda eccelso, la cosiddetta vecchia volpe, \xC3\xA8 assai diverso: nelle sue vene risiede il famoso \"Morbus Segugi\", egli cio\xC3\xA8 punta la sua vittima, la segue, la considera, la valuta, e nell'istante perfetto piomba con volo di falco ed occhio d'aquila. Gli eccelsi uccellatori sono dunque da considerarsi una classe eletta, la loro ricerca mira alla pi\xC3\xB9 sublime qualit\xC3\xA0 e perfezione stilistica. Infatti, come \xC3\xA8 evidente, la quantit\xC3\xA0 soddisfa le esigenze rozze, mentre la qualit\xC3\xA0 \xC3\xA8 l'essenza ideale, l'ottimale fine che \xC3\xA8 di per se stesso premio e virt\xC3\xB9.\r\n\
    Il Morbus Segugi, sia detto per inciso, \xC3\xA8 una forma mutante recessiva del ben pi\xC3\xB9 noto Vibrione Luetico, ma la sua pericolosit\xC3\xA0 \xC3\xA8 per\xC3\xB2 assai meno virulenta, essendone potenzialmente recettivi solo quei goliardi che, geneticamente, siano dominanti sul gene recessivo recentemente isolato in colture di Barol-vine.\r\n\
    Il celeberrimo Prof. Lai Lung, docente di Uccellologia presso l'Universit\xC3\xA0 di Pechino, ha recentemente reso pubblica la documentazione dei suoi ritrovamenti archeologici risalenti all'epoca Ming. L'aspetto pi\xC3\xB9 significativo della sua opera di divulgazione pu\xC3\xB2 essere riassunto in un detto Ming che il Prof. Lai Lung \xC3\xA8 riuscito a tradurre da una decalcomania vespasiana rinvenuta presso un orinatoio sacerdotale della antica Reggia Imperiale. In conclusione di questo capitolo riportiamo proprio la suddetta massima, poich\xC3\xA9 ritengo che esso sia la conclusione pi\xC3\xB9 significativa e didatticamente utile a cui debbano mirare i nuovi adepti della disciplina.\r\n\
    Saggio Ming: \"Quantit\xC3\xA0 non cercare, ma qualit\xC3\xA0 tu cercare.\"\r\n\
    CAPITOLO QUARTO\r\n\
    Passiamo ora ad un nuovo argomento, che \xC3\xA8 certamente di grandissimo interesse generale: lo scopo attivo e politico dell'uccellagione nei rapporti sociali.\r\n\
    Nel rapporto tra singolo e singolo la politica uccellatoria incute terrore nell'individuo meno preparato ed \xC3\xA8 evidente che una Vola costituita da elementi singolarmente preparati incute un cauto rispetto ed un senso di panico generale nei confronti di quelle Vole meno addestrate.\r\n\
    Non si pu\xC3\xB2 quindi negare la grande importanza politica dell'uccellagione nell'ambito diplomatico di una Vola. Ci sono infatti numerosi esempi di Vole assai meno numerose di altre, che tuttavia riuscirono ad affrontare lo scontro numericamente sfavorevole e ad uscirne vittoriose proprio usando la micidiale arma dell'uccellagione.\r\n\
    La cosiddetta \"Bomba U\" si \xC3\xA8 quindi dimostrata di una efficienza mirabolante, e gli scienziati di tutto il mondo hanno torchiato i loro emisferi cerebrali riuscendo infine a sintetizzare la stessa in una pratica confezione che \xC3\xA8 ora la gioia di ogni Vescovo. So infatti parlando della bomboletta spray \"U\" in confezione tascabile di pratico uso, reperibile in ogni grande magazzino nell'offerta lancio \"Tre bombolette pi\xC3\xB9 un preservativo\".\r\n\
    Altro aspetto politico dell'uccellagione \xC3\xA8 il suo profondo carattere diplomatico che permette lo instaurarsi delle principali premesse della guerra ffrreeddaa e di quella surgelata. Il riscatto uccellatorio diviene infatti arma ricattatoria con notevoli possibilit\xC3\xA0 di istituire una intrigata trama spionistica qualora venga opportunamente usato su subdoli individui di Vole avverse. E' evidente la necessit\xC3\xA0 di prevenire lo spionaggio avverso istituendo uno speciale corpo anti-spionistico che gi\xC3\xA0 in molte Vole viene definito come: P.I.S. (Preventive Institution Spionistic).\r\n\
    In conclusione sotto molteplici aspetti l'uccellagione pu\xC3\xB2 senz'altro essere definita attivit\xC3\xA0 politica di Vola, che ogni adepto deve perseguire tenendo bene in conto il bene comune e il prestigio della propria Vola. Come disse infatti lo stratega Von Chiavewitz, \"L'Uccellagione non \xC3\xA8 che la prosecuzione, per altre vie, della guerra e della diplomazia\". (NdC)\r\n\
    CAPITOLO QUINTO\r\n\
    In questo capitolo verr\xC3\xA0 trattato lo scopo ed il valore didattico dell'uccellagione. Tale valore \xC3\xA8 di fondamentale importanza, poich\xC3\xA9 un Goliarda ben preparato ed abile nella disciplina non corre che ben pochi rischi di essere vittima di uccellagione. Si pu\xC3\xB2 quindi affermare, in modo rigoroso, che l'abilit\xC3\xA0 e l'esperienza sono la negazione del vittimismo.\r\n\
    Il Gi\xC3\xA0 citato Prof. Del B\xC3\xBCs ricorda come le statistiche dimostrino che un buon conoscitore della disciplina sia di rado vittima di uccellagione, il che comporta un non indifferente risparmio. Infatti le principali societ\xC3\xA0 di assicurazioni effettuano in tali circostanze notevoli sconti sulla quota annuale dell'assicurazione sul rischio. (Si rammenta che dal prossimo anno tale assicurazione sar\xC3\xA0 obbligatoria e dovr\xC3\xA0 essere stipulata improrogabilmente entro e non oltre il giorno 16 del mese di gennaio, se non si vuole intercorrere nelle sanzioni di legge stabilite nella Lex Picium Tantum).\r\n\
    Veniamo dunque alla didattica uccellatoria: essa si esplicita sotto diversi aspetti, il principale dei quali \xC3\xA8 senz'altro riassunto nella famosa triade vocativa tramandataci dal grande ed eroico capo indiano Uccellopelato: \"SAPERE - PREVENIRE - UCCELLARE, Augh!\".\r\n\
    Non mi stancher\xC3\xB2 mai di far notare la grande importanza di tali parole; il mio augurio \xC3\xA8 che ogni lettore possa fare tesoro di tale incitazione affinch\xC3\xA9 la cima pi\xC3\xB9 alta, l'essenza pi\xC3\xB9 sublime dell'uccellagione possa essere un giorno il suo ambito traguardo: W L'UCCELLAGIONE W.\r\n\
    CAPITOLO SESTO\r\n\
    Regole di uccellagione: \r\n\
    a.\tTenere sempre presente che la regola delle regole \xC3\xA8 quella di non fidarsi mai troppo delle regole. \r\n\
    b.\tEssere sempre accorti e non affidare mai nulla a nessuno, se appena lo si pu\xC3\xB2 evitare. \r\n\
    c.\tLex Massima \xC3\xA8 di non farsi mai uccellare nulla e in nessuna maniera, sia essa consentita o meno. \r\n\
    d.\tNon recriminare di essere stati uccellati in modo irregolare (vedi asportazione abusiva di feluca con taglio di forbici) (NdCuratore: oggi come oggi una simile barbarie comporter\xC3\xA0 invece il linciaggio...) 5 \r\n\
    e.\tCogliere sul fatto gli sforbiciatori solitari e tagliare loro la prima cosa che capita: le palle, un dito, oppure un ciuffo di capelli. (ndC: pratica oggi in disuso, ma perch\xC3\xA9 no: a mali estremi...) \r\n\
    f.\tEssere sempre pronti ad affrontare un tentativo di uccellagione. \r\n\
    g.\tUccellare con amore e con stile. \r\n\
    h.\tChi subisce uccellagione in modo regolare, comprendendo in coscienza di essersi fatto cogliere come si suol dire in castagna, paghi il riscatto, l'ha meritato. \r\n\
    i.\tChiedere un riscatto onesto e calcolato, ottenibile dalla formula della Sommatoria Uccellatoria (vedi Cap. 2). \r\n\
    j.\tUccellare per diletto, mai con cattiveria. \r\n\
    Ricordarsi di dire ogni sera e ad ogni evacuazione la preghiera uccellatoria: \"...Dacci sempre l'Uccellagione quotidiana, Dona Nobis il Riscatto e la P.......!\".\r\n\
    CAPITOLO SETTIMO\r\n\
    Ognuno di voi si sar\xC3\xA0 certamente domandato CHE COSA si deve uccellare. Tale domanda, in apparenza cos\xC3\xAC semplice, non pu\xC3\xB2 avere una risposta altrettanto semplice.\r\n\
    In teoria \xC3\xA8 uccellabile ogni cosa che pu\xC3\xB2 essere asportata ed \xC3\xA8 di appartenenza altrui, ma le tradizioni hanno consacrato alcune \"vittime\" preferenziali: esse sono dunque i vestimenti sacri (Feluca, Manto, Giustacuore). 6\r\n\
    Non sono tuttavia da disprezzare le cosiddette uccellagioni \"Bacchiane\" che fruttano ricche libagioni. Tali libagioni regolarmente inebriano a tal punto li goliardi uccellatori che essi, preda del mistico stato d'animo ch'\xC3\xA8 proprio dei misteri di Dioniso, dimenticano di chiederne il riscatto.. Tuttavia ci\xC3\xB2 \xC3\xA8 perdonato da Bacco, ed \xC3\xA8 quindi atto la cui liceit\xC3\xA0 \xC3\xA8 fuori discussione.\r\n\
    Secondo il parere di grandi luminari, si deve preferire l'uccellagione della feluca, ma il mio parere \xC3\xA8 di non disdegnare gli altri sacri vestimenti, specialmente i novelli adepti dovranno sbizzarrirsi in ogni branca per poter acquisire la cultura e la destrezza in ogni specialit\xC3\xA0. Dalle statistiche D.O.P.S.A. si nota che al primo posto nella graduatoria delle \"Res Uccellata\" figurano comunque le feluche delle malodoranti matricole, seguite a breve distanza dalle feluche dei fagioli, mentre solo al terzo posto troviamo i manti vari; nella parte calda della graduatoria, che va dall'ottavo all'infinito posto, troviamo: la Piuma Cardinalizia all'ottava entry, al nono posto il Manto Cardinalizio. 7 Per ora invece non si hanno notizie di uccellagioni compiute nei riguardi di una rara feluca di color bianco con retina dorata: tale fatto \xC3\xA8 apparentemente primo di motivazioni evidenti, anzi dall'alto della nostra cattedra ci sentiremmo di invitare le maleodoranti matricole ad iniziare la loro carriera uccellatoria proprio da questa corta feluca ornata di bianca piuma. Con questo, sono conscio che mi accuserete di porre un compito semplice e per nulla rischioso, ma \xC3\xA8 evidente che gli inizi debbano essere rigorosamente facili.\r\n\
    CAPITOLO OTTAVO\r\n\
    Passiamo ora al capitolo dell'IMMUNITA'. L'importanza di tale argomento \xC3\xA8 capitale. \r\n\
    L'immunit\xC3\xA0 viene decretata nell'ambito di Vola dal Vescovo Capo Vola, mentre a livello del S.O.T.C.a.P. (Supremus Ordo Taurini Cornus atque Pedemontanus) essa viene sancita da S.S. il Pontefice Massimo. 8\r\n\
    Una volta decretata, essa deve essere rispettata nell'ambito delle modalit\xC3\xA0 con cui \xC3\xA8 stata istituita.\r\n\
    Tuttavia il buon goliarda in tali circostanze, pur evitando categoricamente di uccellare, non mancher\xC3\xA0 mai di prestare la massima attenzione nel salvaguardare i proprio oggetti sacri, poich\xC3\xA9 la storia insegna che ci sono anche i sordi.\r\n\
    Tali sordi, naturalmente, saranno amorevolmente curati con prodigiosi rimedi ed elisir di cui solamente i Vescovi e S.S. il Pontefice Massimo conoscono la formula.\r\n\
    Dalla recensione di numerosi autorevoli trattati, e dalla resintesi di varie minuziose statistiche, posso senza dubbio alcuno affermare che, per mirabolante prodigio scientifico, non si hanno notizie di effetti collaterali di questa cura: infatti tutti coloro che sono stati sottoposti alla terapia sono prontamente e miracolosamente guariti. Le vie e il sapere Pontificali sono infinite, e nulla pu\xC3\xB2 essere posto a paragone per intendere la Sua Mente. Per coloro che temono di essere colpiti da sindrome sorditaria, \xC3\xA8 opportuno procacciarsi il rimedio del caso con prontezza e sollecitudine, presso la propria Farmacia di fiducia. Tale rimedio \xC3\xA8 cos\xC3\xAC costituito: \r\n\
    30 gr. HCl + 20 gr. H2SO4 + eccipiente nitroglicerico q.b.\r\n\
    CAPITOLO NONO\r\n\
    E' questo il capitolo a me pi\xC3\xB9 caro, trattando infatti dello \"Spirito d'Arte\" nell'Uccellagione.\r\n\
    Solo gli animi dolci e delicati riescono a percepire l'Arte nell'Uccellagione: \xC3\xA8 infatti Arte sublime la fine destrezza di delicate dita che, qual soffice piuma, si calano delicatamente sulla preda; pare quasi di sentire una deliziosa e romantica armonia, mentre a tratti esce l'impetuosit\xC3\xA0 violenta e travolgente di un'orchestra al culmine di un'aria verdiana.Lo spirito che scaturisce nell'Atto Uccellatorio ha la perfezione inebrainte di una statua michelangiolesca, \xC3\xA8 in grado di travolgere come l'assenzio.\r\n\
    A voi, nuovi discepoli; a voi che vi affacciate a questa per voi nuova disciplina, auguro di giungere alla percezione di tale livello artistico. Solo cos\xC3\xAC, infatti, potrete affermare di essere alfine giunti alla meta dei vostri desideri. Le sofferenze e le delusioni non vi dovranno fermare, ma dovrete allenarvi ogni giorno con abnegazione e sacrificio, sempre mirando a questo fine ultimo, per ottenere la perfezione artistica.\r\n\
    L'Arte Uccellatoria ed il suo spirito sono evidenziabili, in conclusione, con il fine ultimo uccellatorio.\r\n\
    Il Prof. Ciucia-An-Ci\xC3\xB2 dell'Universit\xC3\xA0 di Ci-Cago nelle sue Tavole Uccellatorie decreta la primaria importanza dello spirito artistico nell'Uccellologia e nessuno \xC3\xA8 stato finora in grado di affermare una tesi che sia anche in minima parte contrastante con la sua teoria, che storicamente viene tramandata come: \r\n\
    Teoria pratico-artistica di Ciucia-An-Ci\xC3\xB2 (universalmente nota in ogni postribolo orientale).\r\n\
    CAPITOLO DECIMO\r\n\
    Eccoci giunti all'ultimo capitolo che si svilupper\xC3\xA0 in due paragrafi: la Teoria Uccellatoria (a), e la Pratica Uccellatoria (b) .\r\n    A) TEORIA UCCELLATORIA\r\n\
    Tale argomento \xC3\xA8 stato trattato nel corso di lezioni che questo trattato ha sviluppato e sviscerato, non vi \xC3\xA8 perci\xC3\xB2 alcunch\xC3\xA9 che debba venire aggiunto. Ci pare per\xC3\xB2 utile ricordare al lettore di studiare e applicarsi.\r\n    B) PRATICA UCCELLATORIA\r\n\
    Dalla teoria alla pratica il passo \xC3\xA8 breve, ma dovrete farlo voi: i rischi e le soddisfazioni vi attendono. Non attendete oltre, lanciatevi nella mischia e siate qual mosca sulla ...\r\n\
    L'ultimo mio consiglio o detto finale sia per voi monito di tutto ci\xC3\xB2 che si deve e non si deve fare: rimembratelo e cogitatelo!\r\n\
    Detto Finale Baronale: 9\r\n\
    Tanto va la Ricciolina in Goliardia\r\n\
    che ci lascia la Feluca\r\n\
    Il consiglio di anzianit\xC3\xA0 mia\r\n\
    \xC3\xA8 che la tenga sempre in su la zucca\r\n\
    (cos\xC3\xAC nessun gliela cucca). 10\r\n\
    \r\n\
    EPILOGO FINALE\r\n\
    Imparare dalla Goliardia per vivere bene nel mondo e nella vita.\r\n \r\n\
    - FINE -                 - THE END -                 - FINIS -                 - A L'E' FINI -\r\n \r\n\
    Barone Editore\r\n\
    APPENDICI (A cura di Manolus Venerabilis)\r\n\
    Tale tratatto, quintessenza della disciplina Uccellatoria e massima espressione teoretica della medesima, \xC3\xA8 al giorno d'oggi quanto di pi\xC3\xB9 dotto e completo sia stato scritto al riguardo. Tuttavia esso venne vergato nell'Anno Santo, pi\xC3\xB9 di 30 anni fa, e constatato che i Tempi, gli Usi, gli Uomini, le Donne cambiano (non nelle cose essenziali, Deo Gratias, ma cambiano...) ci pare Cosa Buona & Giusta aggiungere un modesto contributo di aggiornamento, scritto di Nostro Pugno, onde rendere questo monumento del sapere goliardico ancora pi\xC3\xB9 utile a chi voglia accostarsi alla Scienza. Nel corso del testo, inoltre, siamo intervenuti l\xC3\xA0 dove lo stile arcaico della trattazione (e il tasso etilico di composizione) andavano a scapito della chiarezza espositiva, ma il nostro labor lim\xC3\xA6 si riduce a ben poca cosa. In questa sezione, invece, ci accingiamo a chiarire i passi pi\xC3\xB9 oscuri di quanto sopra esposto, con agili note direttamente collegate al testo originale (APPENDICE I). Ci \xC3\xA8 parsa inoltre cosa utile allegare piccoli compendi atti ad aggiornare il lettore sulle nuove tendenze della Disciplina, senza trascurare l'aspetto prettamente matematico e teoretico della stessa, trattato con rigorosa esattezza. (APPENDICE II).\r\n\
    APPENDICE I\r\n\
    1.\tIn realt\xC3\xA0 al giorno d'oggi tale usanza \xC3\xA8 in disuso, essendo ogni goliarda responsabile di se stesso; tale \"canale\" di richiesta del riscatto \xC3\xA8 per\xC3\xB2 perfettamente lecito, ed in particolari casi consigliabile. Se poi l'Uccellagione aveva valenze politiche tra Vola e Vola, sarebbe buona regola rimettere la Res Capta nelle mani del proprio Vescovo, che sapr\xC3\xA0 premiare l'ardito uccellatore. \r\n\
    2.\tLa promessa dell'Autore non viene mantenuta all'interno di questo trattato, sarebbe infatti dovuto uscire alle stampe, a due mesi dalla pubblicazione della presente opera, il \"Compendio Universale Uccellatorio\". Si quietino per\xC3\xB2 i bibliofili: tale opera non figura in nessun catalogo poich\xC3\xA9 non vide mai la luce. Pare infatti che l'Autore, in un momento di crisi artistica, avesse usato il manoscritto per avvolgere un mazzo di rosmarino; alcuni aghi sono per\xC3\xB2 conservati al Museo Universitario dell'Ateneo di Porta Pila, e sono oggetto di pellegrinaggi annuali da parte del mondo accademico tutto, che ancor'oggi piange la perdita di un'opera fondamentale. Comunque, valgano in generale le seguenti considerazioni: l'Uccellagione a filistei deve sempre essere \"estemporanea\" e restituita e risarcita quanto prima, nel giro di pochi minuti al massimo. Si applichi per\xC3\xB2, a questo proposito, la Lex Menga. \r\n\
    3.\tIn realt\xC3\xA0 nuovi, recenti scavi archeologici presso le rovine di Gomorra hanno permesso di allargare notevolmente le conoscenze in questo settore: \xC3\xA8 in particolare dimostrato che la pratica dell'Uccellagione sorse intorno alla met\xC3\xA0 degli Anni '50, inizialmente allo scopo di insegnare alle fetentissime matricole a badare e a onorare le proprie insegne goliardiche. L'Uccellagione veniva dunque compiuta da un Anziano alle spese del novizio, che pagava un simbolico riscatto come ammonimento a prestare pi\xC3\xB9 attenzione. Prima di questa epoca, invece, di uccellagione non v'era traccia, tant'\xC3\xA8 che i Goliardosauri pi\xC3\xB9 anziani (ante Anni '50) non portano alcun tipo di cordone, non dovendo temere uccellagioni di sorta (e chi mai oserebbe levare mani rapaci sulle Loro Reverende Canizie??). In seguito per\xC3\xB2 l'Uccellagione venne ad acquisire, oltre allo scopo primo, essenzialmente didattico, nuove motivazioni, che sono quelle magistralmente indicate dall'Autore. Divenne, insomma, un momento ludico, elevandosi in seguito a vera forma d'Arte. \r\n\
    4.\tSarebbe pi\xC3\xB9 corretto dire \"Produttoria Uccellatoria\", non comparendo nella formula addizioni ma moltiplicazioni; tuttavia al lettore agile in campo matematico non sfuggir\xC3\xA0 che, dalla formula fornita, passando alla trasformata di Cambronne, estraendo la radice sessantanovesima e ritrasformando mediante forme integrate differenziali di De Sade, \xC3\xA8 possibile ricondursi, con semplici passaggi algebrici che qui, per brevit\xC3\xA0, omettiamo, ad una forma fasoriale in cui compare la somma convergente in antani di una Serie di Logaritmi di Masoch. (c.v.d.) \r\n\
    5.\tSi \xC3\xA8 negli ultimi tempi affermata la cosiddetta \"Corrente di Lupin\" secondo la quale un'uccellagione, per essere valida, deve essere esclusivamente frutto di destrezza e arguzia, mai di violenza. Per violenza si intende qualsiasi atto che leda l'integrit\xC3\xA0 materiale dell'oggetto da uccellare, quindi ogni tipo di danno, strappo, perforazione, scollamento, scucimento comporta l'immediata gogna del danneggiatore, che pagher\xC3\xA0 il doppio del valore dell'oggetto danneggiato, oltre che le eventuali riparazioni e sostituzioni. \r\n\
    6.\tIn realt\xC3\xA0 prede ancora pi\xC3\xB9 gustose e facili da uccellare sono le placche, specie quelle di Capo Ordine che fruttano riscatti immensi. Caso a parte \xC3\xA8 costituito dai Gonfaloni, sempre sorvegliatissimi: l'uccellagione di un tale oggetto ha conseguenze devastanti, paragonabili a quelli della bomba all'Idrogeno. In sintesi, ogni oggetto di pertinenza goliardica sarebbe uccellabile, con le dovute distinzioni: oggetti goliardici ma che, per la loro funzione o natura, necessariamente devono passare di mano in mano (come canzonieri, chitarre con simboli goliardici, o album di fotografie) non sono naturalmente uccellabili. \r\n\
    7.\tLe recenti statistiche coincidono solo in parte con quelle antiche: in particolare l'uccellagione di placche e corpetti ha registrato un vero e proprio boom, in netto calo sono invece i manti cardinalizi, vuoi per il sano rispetto che incutono, vuoi per altre oscure motivazioni. \r\n\
    8.\tLa Pax Goliardica pu\xC3\xB2 essere sancita dal CapoOrdine, o dal Capocitt\xC3\xA0 se presente, o da chi ne fa le veci se assente (in riunioni di Corno, il Nobile Piumato di pi\xC3\xB9 alto grado e anzianit\xC3\xA0, in questo ordine di importanza). Si noti che sul territorio del S.O.T.C.a.P. (Piemonte, Valle d'Aosta, Nizza, Savoia, ed Anche Pi\xC3\xB9 In L\xC3\xA0...) vige Pax Perpetua su alcuni oggetti: in particolare su tutte le insegne e le propriet\xC3\xA0 del Pontefice Massimo (Placca, Scettro, Manto, Feluca, Piuma, Ammenicoli Pontifici, Pastorale, Mitra, eccetera, ivi inclusi papiri in Suo Possesso e persone alla Sua Difesa, Guardie Svizzere incluse con relativi possedimenti, oggetti e divise). Pax Perpetua, per 24 ore e 69 secondi vige poi sulle insegne e sul Papiro appena conferiti dal Pontefice ad un Nobile del Corno. Pax Declarata o Implicita vige poi qualora goliardi depongano le insegne in un luogo comune (in treno, in una casa o altro luogo dove pi\xC3\xB9 goliardi abitano o dormono), per\xC3\xB2 fate attenzione perch\xC3\xA9 \xC3\xA8 almeno in parte discutibile. Infine lo Ius Magionis sancisce la nullit\xC3\xA0 degli scazzi o delle uccellagioni patiti dal proprietario materiale o ideale di un luogo (casa, automobile) al suo interno. Non \xC3\xA8 per\xC3\xB2 una buona ragione per invitare a cena a casa propria il Pontefice ed intonargli il Gaudeamus sotto il naso, il cibo potrebbe in questo caso entrare nei dotti digerenti per vie traverse... \r\n\
    9.\tIn questo ultimo brano il lettore attento noter\xC3\xA0 l'accresciuto livello etilico del Professore, chiaramente deducibile dalla metrica \"ispirata\" dei versi. Numerose ipotesi sono state formulate sull'identit\xC3\xA0 di \"Ricciolina\", e le ipotesi pi\xC3\xB9 accreditate la identificano con una matricola di sesso femminile piuttosto sprovveduta, che dovendo pi\xC3\xB9 volte pagare in Venere onde riottenere il berretto (Si quieti il purista, ho detto proprio berretto, a Torino si chiamava anticamente cos\xC3\xAC, non feluca che \xC3\xA8 termine toscano, non pileo che \xC3\xA8 termine veneto!) aveva reso note oves et boves talune particolarit\xC3\xA0 anatomiche sulle quali sorvoliamo... \r\n\
    Si noti che nel territorio di Supremazia del S.O.T.C.a.P. tale regola \xC3\xA8 universale e non discutibile: non pu\xC3\xB2 venire uccellata la feluca indossata in capo. In altre zone, per\xC3\xB2, vigono differenti usanze, ad esempio quella del Colpo di Bora, quindi occhio se vi trovate all'estero!\r\n\
    APPENDICE II\r\n\
    Il lettore che sia interessato agli aspetti prettamente matematici del calcolo del Coefficiente K della Sommatoria Uccellatoria potr\xC3\xA0 trovare, conservato sotto vetro nella Biblioteca del Dipartimento di Matematica Superiore dell'Universit\xC3\xA0 di T\xC3\xBC-spingen, l'antico incunabolo che ne riporta fedelmente tutti i passaggi matematici e le doverose, rigorose dimostrazioni. Tale Opera, scaturita dalla mente inarrivabile di Fr\xC3\xA0 Martino Kampanarus, antico monaco dell'Abbazia di Dindondanus, pu\xC3\xB2 essere liberamente consultato da chiunque sia in grado di suonare \"Bambina Mia di Zucchero\" sulle campane della Cattedrale di T\xC3\xBCspingen. Buona consultazione.\r\n\
    Per coloro che invece non apprezzano le limpide sottigliezze della scienza matematica, o che non possiedono i requisiti per capirla a fondo, non avendo (tapini!) sostenuto con esito positivo gli esami di \"Analisi Matematica VII\", \"Calcolo Tensoriale Iperspaziale\" e \"Complementi di Algebra applicata all'Uncinetto\"... non possiamo farci nulla... rimarranno privi di questo fondamentale arricchimento culturale.\r\n"
