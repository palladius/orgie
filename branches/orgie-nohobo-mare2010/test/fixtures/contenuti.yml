  m_battivo: "1"
  contenuto: "In un gruppo di bellissime isole deserte perdute nell'oceano giungono, separatamente, i seguenti gruppi di naufraghi:\r\n\
    \r\n\
    \r\n\
    \r\n\
    due uomini italiani e una donna italiana \r\n\
    due uomini francesi e una donna francese \r\n\
    due uomini tedeschi e una donna tedesca \r\n\
    due uomini turchi e una donna turca \r\n\
    due uomini inglesi e una donna inglese \r\n\
    due uomini bulgari e una donna bulgara \r\n\
    due uomini giapponesi e una donna giapponese \r\n\
    due uomini cinesi e una donna cinese \r\n\
    due uomini statunitensi e una donna statunitense \r\n\
    due uomini irlandesi e una donna irlandese \r\n\
    \r\n\
    Un mese dopo ecco quello che \xC3\xA9 successo in quelle meravigliose isole perdute nell'oceano. \r\n\
    \r\n\
    Un italiano ha ucciso l'altro per amore della italiana. \r\n\
    \r\n\
    I due francesi e la francese vivono felicemente insieme in uno stuzzicante menage-a-trois. \r\n\
    \r\n\
    I due tedeschi stanno osservando un rigoroso programma settimanale di visite alternate alla donna tedesca. \r\n\
    \r\n\
    I due turchi dormono insieme, mentre la donna turca cucina e pulisce per loro. \r\n\
    \r\n\
    I due inglesi stanno ancora aspettando che qualcuno li presenti alla donna inglese. \r\n\
    \r\n\
    I due bulgari hanno guardato a lungo all'oceano infinito, poi hanno guardato a lungo la donna bulgara e hanno cominciato a nuotare. \r\n\
    \r\n\
    I due giapponesi hanno inviato un fax a Tokyo e stanno aspettando istruzioni. \r\n\
    \r\n\
    I due cinesi hanno impiantato un negozio di liquori/ristorante/lavanderia e hanno messo incinta la donna per avere mano d'opera per la loro impresa. \r\n\
    \r\n\
    I due statunitensi stanno riflettendo sui vantaggi del suicidio perch\xC3\xA9 la donna statunitense non fa altro che arringarli sul suo corpo, la vera natura del femminismo, sul fatto che lei \xC3\xA9 in grado di fare tutto quello che fanno loro, sulla necessit\xC3\xA0 dell'autorealizzazione, sull'equa divisione dei \r\n\
    lavori domestici, su come la sabbia e le palme la facciano sembrare grassa, sul fatto che il suo ultimo boy-friend rispettava le sue opinioni e la trattava meglio di quanto non facciano loro, su come le sue relazione con la madre stiano migliorando, sul fatto che le tasse sono finalmente diminuite e non sta piovendo... \r\n\
    \r\n\
    I due irlandesi hanno diviso la loro isola in Nord e Sud e hanno avviato una distilleria. Non sono in grado di dire se il sesso rientri nei programmi perch\xC3\xA9 tutto si \xC3\xA9 fatto abbastanza confuso dopo i primi litri di whiskey di cocco. Sono comunque soddisfatti perch\xC3\xA9 se non altro gli inglesi non si \r\n\
    stanno divertendo per niente.\r\n\
    \r\n\
    \r\n\
    \r\n"
