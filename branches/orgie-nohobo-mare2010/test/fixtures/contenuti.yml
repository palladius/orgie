  contenuto: "Curious things\xE2\x80\xA6\r\n\
    Studiando studiando s\xE2\x80\x99imparano tante cose\xE2\x80\xA6di tutti i tipi\xE2\x80\xA6 \r\n\
    \r\n  \r\n\
    \r\n\
    Sapevate che: \r\n\
    \r\n\
    \xC2\xA8       In Europa sorridere ascoltando \xC3\xA8 segno di accordo o comprensione ma in Giappone \xC3\xA8 imbarazzo e disaccordo \r\n\
    \r\n\
    \xC2\xA8       In Estremo Oriente fissare un uomo \xC3\xA8 segno di sfida ma fissare una donna \xC3\xA8 segno di proposta erotica \r\n\
    \r\n\
    \xC2\xA8       In alcuni paesi del Mediterraneo orientale annuire significa \xE2\x80\x9Cno\xE2\x80\x9D \r\n\
    \r\n\
    \xC2\xA8       Fare la v con le dita in Inghilterra \xC3\xA8 segno di vittoria ma col palmo rivolto verso dentro significa \xE2\x80\x9Cvaff\xE2\x80\xA6\xE2\x80\x9D \r\n\
    \r\n\
    \xC2\xA8       Fare ok con la mano nei paesi slavi significa \xE2\x80\x9Cti faccio un cul. cos\xC3\xAC\xE2\x80\x9D \r\n\
    \r\n\
    \xC2\xA8       Il gesto abituale di noi siciliani per dire \xE2\x80\x9Cma chi dici?!\xE2\x80\x9D con la mano rivolta verso l\xE2\x80\x99alto con le dita raccolte a grappolo e fatta oscillare basso-alto in Turchia significa \xE2\x80\x9Ceccellente\xE2\x80\x9D \r\n\
    \r\n\
    o        Le due mani a taglio con la sinistra tenuta ferma e la destra dal basso colpisce l\xE2\x80\x99altra oscillando come a dire \xE2\x80\x9Cfila via\xE2\x80\x9D oppure \xE2\x80\x9Cme ne vado\xE2\x80\x9D in Turchia significa \xE2\x80\x9Cti ho fottuto\xE2\x80\x9D oppure indicando una ragazza significa \xE2\x80\x9Cquella me la sono fatta\xE2\x80\x9D \r\n\
    \r\n\
    \xC2\xA8       Il pollice tra indice e medio raccolti a pugno in Turchia significa \xE2\x80\x9Cvaff..\xE2\x80\x9D \r\n\
    \r\n\
    \xC2\xA8       Il segno che facciamo noi per dire \xE2\x80\x9Cstringi il discorso e arriva al dunque\xE2\x80\x9D in Turchia \xC3\xA8 un volgare invito sessuale \r\n\
    \r\n\
    \xC2\xA8       Nella cultura araba accavallare le gambe mostrando la suola della scarpa \xC3\xA8 segno di ineducazione \r\n\
    \r\n\
    \xC2\xA8       In Medio Oriente e in Turchia asciugarsi il sudore \xC3\xA8 ineducato. Ma in Giappone il sudore ha valore positivo perch\xC3\xA9 indica partecipazione e nel mondo arabo \xC3\xA8 segno di virilit\xC3\xA0 infatti gli uomini che si lavano troppo o che usano deodoranti sono considerati gay. \r\n\
    \r\n\
    \xC2\xA8       Soffiarsi il naso in Giappone \xC3\xA8 considerato irrispettoso e volgare. In Turchia ci si limita ad inspirarlo anche rumorosamente e inghiottirlo. \r\n\
    \r\n\
    \xC2\xA8       Il ruttare e dar sfogo a rumori intestinali sono tollerati in Asia. Il ruttare \xC3\xA8 ancora permesso in Scandinavia, Russia e nel sud-est asiatico \r\n\
    \r\n\
    \xC2\xA8       Vomitare in Giappone \xC3\xA8 una sorta di omaggio per indicare agli amici che si \xC3\xA8 passati una bella serata bevendo \r\n\
    \r\n\
    \xC2\xA8       Sputare e scatarrare \xC3\xA8 comunissimo in Oriente e nelle culture arabe e nero-africane \r\n\
    \r\n\
    \xC2\xA8       Toccarsi i genitali in Grecia significa \xE2\x80\x9Cti mostro cosa sei, un c\xE2\x80\xA6\xE2\x80\x9D \r\n\
    \r\n\
    \xC2\xA8       In Congo i cattolici missionari pretendevano che le donne si coprissero il seno quando nella loro cultura le prostitute portano il seno coperto \r\n\
    \r\n\
    \xC2\xA8       In USA chi porta la felpa o il maglione sulle spalle con le maniche legate davanti \xC3\xA8 omosessuale \r\n\
    \r\n\
    \xC2\xA8       In USA e Giappone non \xC3\xA8 educato offrire le sigarette \r\n\
    \r\n\
    \xC2\xA8       In Germania non si regalano i fiori con la confezione o in Inghilterra non si regalano le piante agli ammalati in ospedale \r\n\
    \r\n\
    \xC2\xA8       Gli americani lasciano appesa l\xE2\x80\x99etichetta col prezzo del regalo \r\n\
    \r\n  \r\n\
    \r\n\
    Tratto dai miei studi di psicologia della comunicazione\xE2\x80\xA6DISTORTA\r\n"
