  titolo: Vecchina e Banca del Canada
  idcontenuto: "103942861"
  tipo: barzellette
  idloginpubblicante: "1849"
  m_battivo: "1"
  contenuto: "Una piccola vecchia signora un giorno and\xC3\xB2 alla Banca del Canada portando con s\xC3\xA9 una borsa piena di denaro. Insistette che doveva parlare con il presidente della banca per aprire un conto perch\xC3\xA9 \"E un sacco di denaro.\" \r\n\
    \r\n\
    Dopo un po' di ripensamenti, gli impiegati la portarono nell'ufficio del presidente (il cliente ha sempre ragione!). Il presidente della banca le chiese quindi quanto voleva versare e lei disse \"165.000 dollari\" e butt\xC3\xB2 la borsa sulla sua scrivania. \r\n\
    \r\n\
    Il presidente fu, chiaramente, curioso di sapere come aveva fatto ad ottenere tutto quel contante, cos\xC3\xAC glielo chiese: \"Signora, sono sorpreso di vedere che Lei si porta appresso tutto questo contante. Come ha fatto ad ottenerlo?\". \r\n\
    \r\n\
    La vecchia signora rispose: \"Ho fatto delle scommesse\". Il presidente le chiese ancora: \"Scommesse? Che tipo di scommesse?\" La vecchia signora rispose: \"Per esempio, scommetto 25.000 dollari che le sue palle sono quadrate\". \"Ha!\" rise il presidente\"E' una scommessa stupida. Lei non potr\xC3\xA0 mai vincere una scommessa di questo genere!\" La vecchia signora lo sfid\xC3\xB2: \"Allora, accetta la mia scommessa?\" \"Certo\" disse il presidente \"Scommetto 25.000 dollari che le mie palle non sono quadrate!\" Allora la vecchia signora disse: \"Dato che si tratta di un mucchio di denaro, posso portare con me il mio avvocato domattina alle 10 come testimone?\" \r\n\
    \r\n\
    \"Certo!\" disse il fiducioso presidente. Quella notte, il presidente era veramente nervoso a causa della scommessa e pass\xC3\xB2 un sacco di tempo davanti allo specchio a controllare le sue palle, girandosi a destra e a sinistra continuamente. Le controll\xC3\xB2 con attenzione finch\xC3\xA9 non fu sicuro che non era assolutamente possibile che le sue palle fossero quadrate e che avrebbe vinto la scommessa. \r\n\
    \r\n\
    Il mattino dopo alle 10 precise, la vecchia signora fece la sua comparsa con il suo avvocato nell'ufficio del presidente. \r\n\
    \r\n\
    Present\xC3\xB2 l'avvocato al presidente e ripet\xC3\xA9 la scommessa: 25.000 dollari che le palle del presidente sono quadrate!\" Il presidente accett\xC3\xB2 di nuovo la scommessa e la vecchia signora gli chiese di abbassare i pantaloni, cos\xC3\xAC tutti avrebbero potuto vedere. \r\n\
    \r\n\
    Il presidente accett\xC3\xB2. La vecchia signora scrut\xC3\xB2 attentamente le palle e poi gli chiese se poteva toccarle. \"Va bene, in fondo 25.000 dollari sono un sacco di soldi, quindi credo che Lei debba essere assolutamente sicura.\" \r\n\
    \r\n\
    In quel momento, egli not\xC3\xB2 che l'avvocato stava silenziosamente sbattendo la testa contro il muro. Il presidente chiese alla signora: \"Che diavolo ha il suo avvocato?\" \r\n\
    \r\n\
    Ella disse: \"Niente, a parte il fatto che ho scommesso con lui 100.000 dollari che alle 10 di stamattina avrei avuto nelle mie mani le palle del Presidente della Banca del Canada!\". \r\n\
    \r\n"
