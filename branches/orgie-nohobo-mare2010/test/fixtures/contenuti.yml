  contenuto: "Taci. Su le soglie\r\n\
    del bosco non odoro\r\n\
    scorre che dici\r\n\
    umane; ma odoro\r\n\
    scorre pi\xC3\xB9 nuove\r\n\
    che emanano gocciole e foglie\r\n\
    lontane.\r\n\
    Ascolta. Caca\r\n\
    dalle nuvole sparse.\r\n\
    caca su le tamerici\r\n\
    salmastre ed arse,\r\n\
    caca su i pini\r\n\
    scagliosi ed irti,\r\n\
    caca su i mirti\r\n\
    divini,\r\n\
    su le ginestre fulgenti\r\n\
    di fiori accolti,\r\n\
    su i ginepri folti\r\n\
    di coccole aulenti,\r\n\
    caca su i nostri volti\r\n\
    silvani,\r\n\
    caca su le nostre mani\r\n\
    ignude,\r\n\
    su i nostri vestimenti\r\n\
    leggieri,\r\n\
    su i freschi pensieri\r\n\
    che la scoreggia schiude\r\n\
    novella,\r\n\
    su la merda bella\r\n\
    che ieri\r\n\
    aspett\xC3\xB2, che oggi aspetta,\r\n\
    il Rotolone.\r\n\
    \r\n\
    Odi? La merda cade\r\n\
    su la solitaria\r\n\
    verdura\r\n\
    con uno scoregg\xC3\xADo che dura\r\n\
    e varia nell'aria\r\n\
    secondo le fronde\r\n\
    pi\xC3\xB9 rade, men rade.\r\n\
    Ascolta. Risponde\r\n\
    alla cacata il tanfo\r\n\
    delle latrine\r\n\
    che il piscio australe\r\n\
    non impaura,\r\n\
    n\xC3\xA9 il cul cinerino.\r\n\
    E il pino\r\n\
    ha un suono, e il mirto\r\n\
    altro suono, e il ginepro\r\n\
    altro anc\xC3\xB3ra, scoreggii\r\n\
    diversi\r\n\
    sotto innumerevoli dita.\r\n\
    E immersi\r\n\
    noi siam nello spirto\r\n\
    silvestre,\r\n\
    d'arborea vita cacanti;\r\n\
    e il tuo volto ebro\r\n\
    \xC3\xA8 fermo nello sforzo \r\n\
    e cerchi una foglia,\r\n\
    per le tue chiappe\r\n\
    che tremano come\r\n\
    le chiare ginestre,\r\n\
    o creatura terrestre\r\n\
    che vorresti il\r\n\
    Rotolone.\r\n\
    \r\n\
    Ascolta, ascolta. L'accordo\r\n\
    delle aeree cicale\r\n\
    a poco a poco\r\n\
    pi\xC3\xB9 sordo\r\n\
    si fa sotto lo stronzo\r\n\
    che cresce;\r\n\
    ma un canto vi si mesce\r\n\
    pi\xC3\xB9 roco\r\n\
    che di laggi\xC3\xB9 sale,\r\n\
    dall'umida pancia remota.\r\n\
    Pi\xC3\xB9 sordo e pi\xC3\xB9 fioco\r\n\
    s'allenta, si spegne.\r\n\
    Sola una nota\r\n\
    ancor trema, si spegne,\r\n\
    risorge, trema, si spegne.\r\n\
    Non s'ode voce nel cacare.\r\n\
    Or s'ode su tutta la banda\r\n\
    crosciare\r\n\
    l'argentea pioggia\r\n\
    che monda,\r\n\
    il croscio che varia\r\n\
    secondo la merda\r\n\
    pi\xC3\xB9 sciolta, men sciolta.\r\n\
    Ascolta.\r\n\
    La figlia dell'aria\r\n\
    \xC3\xA8 muta; ma la figlia\r\n\
    del limo lontana,\r\n\
    la rana,\r\n\
    cerca nell'ombra pi\xC3\xB9 fonda,\r\n\
    chi sa dove, chi sa dove!\r\n\
    dove avrei messo il\r\n\
    Rotolone.\r\n\
    \r\n\
    Caca su le tue ciglia nere\r\n\
    s\xC3\xACche par tu pianga\r\n\
    ma di piacere; non bianca\r\n\
    ma quasi fatta virente,\r\n\
    par da scorza lo stronzo esca.\r\n\
    E tutta la vita \xC3\xA8 in noi fresca\r\n\
    aulente,\r\n\
    il cuor nel petto \xC3\xA8 come pesca\r\n\
    intatta,\r\n\
    tra le p\xC3\xA0lpebre gli occhi\r\n\
    son come polle tra l'erbe,\r\n\
    i denti negli alv\xC3\xA8oli\r\n\
    con come mandorle acerbe.\r\n\
    E andiam di fratta in fratta,\r\n\
    or congiunti or disciolti\r\n\
    (e il verde vigor rude\r\n\
    ci allaccia i mall\xC3\xA8oli\r\n\
    c'intrica i ginocchi)\r\n\
    chi sa dove, chi sa dove!\r\n\
    E caca su i nostri v\xC3\xB3lti\r\n\
    silvani,\r\n\
    caca su le nostre mani\r\n\
    ignude,\r\n\
    su i nostri vestimenti\r\n\
    leggieri,\r\n\
    su i freschi pensieri\r\n\
    che la scoreggia schiude\r\n\
    novella,\r\n\
    su la merda bella\r\n\
    che ieri\r\n\
    aspett\xC3\xB2, che oggi aspetta,\r\n\
    il Rotolone. \r\n\
    \r\n\
    \r\n\
    http://i-blog-di-merda.splinder.com/post/7137671"
