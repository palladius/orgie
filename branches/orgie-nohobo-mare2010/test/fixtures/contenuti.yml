  idloginpubblicante: "0"
  m_battivo: "0"
  contenuto: "Me piacerebbe farmi quattro chiacchiere con l'inventore del T9, un giorno. \r\n\
    Me lo metterei davanti. Gli offrirei un t\xC3\xA8. Lui \xC3\xA8 sicuramente uno che non beve alcolici, lui sar\xC3\xA0 per forza uno che beve t\xC3\xA8 e un sacco di caff\xC3\xA9. \r\n\
    Gli offrirei dei pasticcini, anche. Aspetterei di vederlo addentare la ciliegia verde della frolla per bloccargli il polso e chiedergli: \"Ma ora, dimmi: come c***o ti \xC3\xA8 venuto di mettere \xC2\xABvi\xC2\xBB come prima opzione al posto di \xC2\xABti\xC2\xBB??\" \r\n\
    Chi \xC3\xA8 che non ha mai ricevuto il famigerato sms ottocentesco \"Vi passo a prendere stasera\"? \r\n\
    \r\n\
    E quando lui tossir\xC3\xA0, si ingolfer\xC3\xA0, si batter\xC3\xA0 il petto e cercher\xC3\xA0 di arrivare con quella sua mano pallida alla tazzina di t\xC3\xA8, io stringerei ancora di pi\xC3\xB9 la morsa e gli chiederei: \"E come c***o ti \xC3\xA8 venuto di mettere \xC2\xABpaura\xC2\xBB come prima opzione rispetto a \xC2\xABscusa\xC2\xBB?? ...\"Paura, ero senza credito\". \r\n\
    Chi \xC3\xA8 che utilizza la parola \"paura\" negli sms? A chi pensavi come utente ideale? A Stephen King? Dimmelo. \r\n\
    A questo punto ingollerei anch'io un pasticcino per ostentare nervosismo. \r\n\
    \r\n\
    E perch\xC3\xA9 (sputando briciole di pasticcino) quando scrivo \"tu\" mi viene fuori \"tv\"? Che prendi, le mazzette dalla Rai? \r\n\
    A questo punto lui cercherebbe di bofonchiare qualcosa. Io lo interromperei bloccandogli anche l'altro polso. \r\n\
    Alla mia coinquilina oggi \xC3\xA8 arrivato un messaggio che diceva: \"Ti \r\n\
    rifaccio gli ampliodoti per il meraviglioso sorriso\". \r\n\
    Cosa sono gli ampliodoti, testa di minchia? I complimenti?? \"Ampliodoti\" n-o-n-e-si-s-t-e. Il tuo dizionario di merda \xC3\xA8 pieno di parole che n-o-n-e-si-s-t-o-n-o.\r\n\
    \r\n A questo punto gli toglierei la tazza davanti, mi alzerei e la metterei nel lavandino. Cos\xC3\xAC, per fare massaia. Con voce ferma gli direi (magari strofinandomi le mani sul grembiule): \"Il mio amico si chiama Savior. Ok, ha un nome di merda, siamo d'accordo. \r\n\
    Fatto sta che per colpa del tuo c***o di T9 lui non si chiama pi\xC3\xB9 Savior, che \xC3\xA8 un brutto nome, si chiama Pathos, che \xC3\xA8 peggio. \r\n\
    E per dirti quante vite hai incasinato. \r\n\
    \r\n\
    Il mio amico Bernardo. Ok, un nome di merda anche quello, siamo d'accordo, infatti \xC3\xA8 amico di Savior. \r\n\
    B\xC3\xA8 il caro Bernardo stava tampinando una ragazza. Era riuscito ad avere il numero. Le stava mandando il primo dannato messaggio galante per rompere il dannato ghiaccio.\r\n Il messaggio diceva: \"Vi va se stasera andiamo a mangiare qualcosa e poi andiamo a ballare? Vi porto a Testaccio, c'\xC3\xA8 il mio amico che mette i dischi. Vi riaccompagno a casa io\". \r\n\
    E a parte che sembra scritto da Mozart. Ma a parte. \r\n\
    A un certo punto lo spazio era quasi finito, per cui Bernardo non si \r\n\
    firm\xC3\xB2 \"Bernardo\", si firm\xC3\xB2 \"Bern\". \r\n\
    Peccato che il messaggio sia arrivato firmato \"Afro\", a sottintendere un individuo con una minchia di due metri intenzionato a concludere degnamente la serata sul divano. Ovviamente la ragazza in questione non si \xC3\xA8 mai pi\xC3\xB9 fatta viva, e Afro si \xC3\xA8 fatto un anno di pippe. \r\n\
    \r\n\
    A questo punto mi risiederei e lo fisserei negli occhi. \r\n\
    Uno scrive aiuto. E fin qui. Poi gli diventa aiut\xC3\xB2. E fin qui. Poi \r\n\
    diventa bitum. S\xC3\xAC, esatto, bitum. Intendi bitume? S\xC3\xAC, intendi bitume. \r\n\
    E allora se conosci la fottuta parola bitume, perch\xC3\xA9 non mi prendi \r\n\
    \"merda\"?? Secondo te c'\xC3\xA8 pi\xC3\xB9 gente al mondo che scrive \"merda\" o che scrive \"bitume\"!? \r\n\
    \r\n\
    Poi volteggerei verso di lui e gli direi: \"Oggi mi sento romantico: \xC2\xABVariazioni sul Ti amo\xC2\xBB\". \r\n\
    \"Vi con\" (dislessia allo stato puro. Variante: un noto detersivo d'importazione) \r\n\
    \"Vi amo\" (un po' demod\xC3\xA9, ma pur sempre efficace) \r\n\
    \"Vi amm\" (vi amm, vi amm, 'ncopp viamm i\xC3\xA0) \r\n\
    \"Ti bon\" (nota bistecca) \r\n\
    \"Ti anm\" (un volgare insulto in foggiano) \r\n\
    \"Ti coo\" (...pulo) \r\n\
    \"Ti bom\" (bo) \r\n\
    \"Ti ano\" (vab\xC3\xA8) \r\n\
    \"Tg com\" (mazzetta da Canale 5) \r\n\
    \"Tg cnn\" (notizie dal mondo). \r\n\
    Perch\xC3\xA9? Non? Vai? Da? Un? Buon? Psicologo? \r\n\
    Dovresti smettere di fare questo lavoro. Dovresti fare un lavoro che \r\n\
    pi\xC3\xB9 ti si conf\xC3\xA0. \r\n\
    E a questo punto lo porterei al lavandino e gli farei lavare la tazzina. \r\n\
    \r\n"
