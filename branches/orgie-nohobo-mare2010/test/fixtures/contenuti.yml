  idloginpubblicante: "294"
  m_battivo: "1"
  contenuto: "   MASTER PER UOMINI (lord.o, 2006-03-22 09:38:00) \r\n\
    \r\n L''importo dei corsi \xC3\xA8 da calcolare in base alle effettive necessit\xC3\xA0, \r\n\
    si offrir\xC3\xA0 uno sconto per chi vorr\xC3\xA0 frequentare tutti i corsi. \r\n\
    Obiettivo pedagogico: corso di formazione che permetta agli uomini di \r\n\
    sviluppare quella parte del cervello di cui ignorano l''esistenza. \r\n\
    \r\n\
    Programma: 4 moduli di cui uno obbligatorio. \r\n\
    \r\n\
    ******** Modulo 1: corso obbligatorio ********* \r\n\
    1. imparare a vivere senza la mamma (2000 ore) \r\n\
    2. la mia donna NON \xC3\xA8 la mia mamma (350 ore) \r\n\
    3. capire che il calcio non \xC3\xA8 altro che uno sport (500 ore) \r\n\
    \r\n\
    ******** Modulo 2: vita a due ********* \r\n\
    1. avere bambini senza diventare geloso (50 ore) \r\n\
    2. smettere di dire cretinate quando la mia donna riceve i suoi amici (500ore) \r\n\
    3. vincere la sindrome del telecomando (550 ore) \r\n\
    4. non faccio pip\xC3\xAC fuori dal water (100 ore + esercizi pratici con video) \r\n\
    5. comprendere che le scarpe non camminano mai da sole fino allascarpiera (800 ore) \r\n\
    6. come arrivare fino al cesto dei panni sporchi senza perdersi (500ore) \r\n\
    7. come sopravvivere ad un raffreddore senza agonizzare \r\n\
    \r\n\
    ******* Modulo 3: tempo libero ********* \r\n\
    1. stirare in due tappe una camicia in meno di due ore (esercizi pratici) \r\n\
    2. digerire senza ruttare mentre lei lava i piatti (esercizi pratici) \r\n\
    ******* Modulo 4 : Corso di cucina ********* \r\n\
    Livello 1 (principianti): gli elettrodomestici: \r\n\
    ON acceso \r\n\
    OFF spento \r\n\
    Livello 2 (avanzato): la mia prima quick soup senza bruciare la pentola. \r\n\
    Esercizi pratici: far bollire l''acqua prima di aggiungere gli spaghetti. \r\n\
    \r\n\
    +++++++++++++++++++++++++++++++++++++++++++++ \r\n\
    \r\n\
    TEMI DI APPROFONDIMENTO \r\n\
    \r\n\
    A causa della complessit\xC3\xA0 e difficolt\xC3\xA0 di comprensione dei temi trattati i corsi \r\n\
    avranno un massimo di 8 iscritti. \r\n\
    TEMA 1: Il ferro da stiro: dalla lavatrice all''armadio, questo processo misterioso. \r\n\
    TEMA 2: I rischi di riempire il portacubetti di ghiaccio. \r\n\
    (dimostrazione con supporto di diapositive) \r\n\
    TEMA 3: Tu e l''elettricit\xC3\xA0: vantaggi economici del contattare un tecnico competente \r\n\
    per le riparazioni (anche le pi\xC3\xB9 elementari). \r\n\
    TEMA 4: Ultima scoperta scientifica: cucinare e buttare la spazzatura NON provoca \r\n\
    n\xC3\xA9 impotenza ne tetraplegia (pratica in laboratorio). \r\n\
    TEMA 5: Perch\xC3\xA9 non \xC3\xA8 reato regalarle fiori anche se sei gi\xC3\xA0 sposato con lei. \r\n\
    TEMA 6: Il rullo di carta igienica: \"Nasce la carta igienica nel portarullo?\" \r\n\
    (Esposizioni sul tema della generazione spontanea) \r\n\
    TEMA 7: Come abbassare la tavoletta del bagno passo passo. \r\n\
    (Teleconferenza con l''universit\xC3\xA0 di Harvard) \r\n\
    TEMA 8: Perch\xC3\xA9 non \xC3\xA8 necessario agitare le lenzuola dopo aver emesso gas intestinali. \r\n\
    (esercizi di riflessione in coppia) \r\n\
    TEMA 9: \"Gli uomini che guidano possono chiedere informazioni ai passanti \r\n\
    quando si perdono senza il rischio di sembrare impotenti?\" (Testimonianze) \r\n\
    TEMA 10: I detersivi: dosi, consumi, applicazioni pratiche per evitare \r\n\
    danni irreparabili alla casa. \r\n\
    TEMA 11: La lavatrice: questa grande sconosciuta. \r\n\
    TEMA 12: Differenze fondamentali tra il cesto della roba sporca e il suolo. \r\n\
    (esercizi in laboratori di musicoterapia) \r\n\
    TEMA 13: L''messere nel posto del passeggero: \r\n\
    \"E'' geneticamente possibile non parlare o agitarsi convulsivamente mentre lei parcheggia?\" \r\n\
    TEMA 14: La tazza della colazione: lievita da s\xC3\xA9 fino al lavandino? \r\n\
    (Esercizi diretti da David Copperfield) \r\n\
    TEMA 15: Comunicazione extrasensoriale: \r\n\
    Esercizi mentali in modo che quando gli si dice che qualcosa \xC3\xA8 nel cassetto dell''armadio \r\n\
    non domandi: \"in quale cassetto e di quale armadio?\" \r\n\
    \r\n\
    \r\n\
    \r\n\
    Lord''O ..ad ogni iscritto il pratico set di ricamo in omaggio. \r\n \r\n "
