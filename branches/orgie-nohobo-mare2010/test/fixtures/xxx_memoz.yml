xxx_memoz_003: 
  chiave: header
  valore: "Benvenuti nel sito <a href=\"http://www.goliardia.it\">www.goliardia.it</a>!<br/>\r\n\
    \r\n\
    1) Questo sito e' aperto a tutti ma SOLO sotto iscrizione, questo per poter moderare meno il forum e per mantenere un po' sotto controllo le informazioni. Se vi iscrivete, NON riceverete spam ne merdate varie poiche' io stesso le odio, e odio infliggere cio' che odio ricevere.<br>\r\n\
    \r\n\
    2) Il sito e' diventato <i><a href='http://www.fsf.org/'>open source</a></i> (ovvero libero). Nella <a href=\"http://sourceforge.net/projects/opengoliardia/\">mia pagina su <b>Sourceforge</b></a> Da l\xC3\xA0, potete scaricare liberamente il codice, sotto licenza <a href='http://www.gnu.org/licenses/'>GNU GPL</a>. Potete <i>altres\xC3\xAC</i> (ieri sera mi son letto l'intera A dello Zingarelli) scaricare la skin del sito, modificarla e spedirmela; se mi date una mano anche solo con i CSS il sito potrebbe3 essere pi\xC3\xB9 accattivante<br>\r\n\
    <b>PS</b> Un grazie a Buddha, Npp e Kash per hosting e ciappini vari; un grazie inoltre ai miei aiutanti (Quine, Vipera, Cavedano, Gimmygod, ...) che mi aiutano a tenere tutto un po' pulito e in ordine....<br>\r\n\
    <b>PPS</b> Come avrete notato, il sito sta invecchiando... negli ultimi tempi \xC3\xA8 notevolmente ingiallito. Se qualcuno vuol dare una mano di bianco... ;)<br>\r\n\
    <div align=right><i>(22 gen 07, il webmaster <a href=\"http://www.palladius.it/\">Palladius</a>)</i></div>"
