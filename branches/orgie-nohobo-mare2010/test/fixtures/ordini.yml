  storia: "Fu fondata nel 1969 da Napoleone I.\r\n\
    \r\n\
    Irripetibile la presentazione all'allora Pontefice Zeus con 16 goliardi trovati in 24 ore. Alla cena di apertura l'allora Conte Nero Pappo sfid\xC3\xB2 Napoleone a mingere scrivendo qualcosa. In risposta al notevole \"Pappus Niger Conteanus\" dell'avversario, l'Imperatore rispose con un irripetibile \"Napoleon Primus Imperator Grande Arm\xC3\xA8e\" tra gli applausi della folla convenuta! Per il conclave dell'anno successivo, Napoleone si present\xC3\xB2 insieme alla sua vola, con accanto il mitico Cambronne (poi S.S. Jesus) e 3 Fiat 500 affiancate (blu, bianca e rossa) con i megafoni che diffondevano l'inno francese, davanti a Palazzo Nuovo, sede universitaria torinese."
