  storia: "L'Ordine S.D.I.F. Sacro Dauno Impero Fovea, o Impero di Foggia, nasce nella citt\xC3\xA0 di Foggia nel 2005, con l'avvento della nuova Universit\xC3\xA0 di Foggia, sostituendo il vecchio Ordine Sovrano del S.O.P.O. Papera D'Oro di San Severo  ( provincia di Foggia), e         l' Ordine Goliardico di Foggia chiamato \xE2\x80\x9CIl Coito\" Centronis Ordo Invictus Tetragonus Omnibus\xE2\x80\x9D in verit\xC3\xA0 di Cerignola (anch'essa provincia di Foggia). Il nuovo Ordine S.D.I.F. nasce come Ordine Sovrano su Foggia e relativa Provincia, la I imperatrice \xC3\xA8 kinta al sec. Vittoria Salice vecchia goliarda dei Frati Gaudenti di Bologna. Gli Ordini Vassalli Minori sono: 1. Ascoli Satriano (S.O.T.Sacer Ordo Taccariellum), 2. Lesina (S.O.S.Sacer Ordo Scorpionis), 3. Sannicandro Garganico (O.V.A. Ordo Volantis Avis) , 4. San Paolo Civitate (S.I.S. Sacro Impero Sanpaolese), 5.San Severo (S.O.P.O. Papera D'Oro), 6.San Marco in Lamis (S.O.A.S.M.Sacer Ordo Abatiae Sancti Marci) , 7.Torremaggiore, (S.O.P. Ordo Primi Solis)  8. Poggio Imperiale (S.T.A.F. Sacro Ordo Taurus Fortis);  Non tutti hanno accettato ancora il vassallaggio e alcuni di loro sono in sonno."
  Motto: Gaudere sempre ledere mai
  Sigla: S.D.I.F.
  indirizzo: |-
    Kinta: Salice Vittoria 
    Via De Miro D'Ajeta 7 - 71100 Foggia
    Tel: 335-1735478
    blog:http://goliardiafg.blogspot.com
    vittoria.salice@gmail.com
  note: Ordine serio e attivo porta i colori rosso e blue di Foggia e lo stemma di Federico II a Foggia e sulla feluca l'imperatore/trice porta la piuma blue.
