ordini_133: 
  ID_ORD: "146"
  m_fileImmagine: si-balia.gif
  Nome_completo: Princeps Baliaque Senensium
  m_bSerio: "1"
  datadinascita: 0000-00-00 00:00:00
  emailordine: fedelialsollevante@scuoleabollore.it
  data_creazione: 2008-06-20 13:11:34
  id_utente_creatore: "1427"
  storia: "Dal '45 ogni anno facciamo tre serate di operetta, scritta e recitata solo dagli studenti, nel teatro pi\xC3\xB9 importante di Siena.\r\n\
    Per quattro giorni si \"va alle scuole\" ovvero facciamo la Liberatio Scholarum!\r\n\
    La mattina entriamo dentro tutte le scuole, liberiamo gli studenti e riempiamo le macchine di fichette!\r\n\
    Tutti gli anni facciamo una decina di macchine: prendiamo una macchina, ne smontiamo gli interni e seghiamo il tetto, con dei tubi da muratori facciamo un impalcatura e le  dipingiamo a seconda del titolo che gli vogliamo dare [titoli celebri: Il Castello de'Troiai, La Fotteria, Brodeo cavalca questo cazzo, Black Vagin etc.] \r\n\
    Durante l'anno facciamo una decina di feste offerte dal Principe e dalla Balia.\r\n\
    Andiamo a Venezia due giorni per il carnevale!\r\n\
    In montagna a sciare! Facciamo il giro di Montalcino e del Chianti! \r\n\
    Al Mare!\r\n\
    Stampiamo un numero unico in 6000 copie che vendiamo in tutta Siena e provincia!\r\n\
    www.goliardisenesi.com"
  Motto: EXORIARE ALIQUIS NOSTRIS EX OSSIBUS ULTOR
  Sigla: P.B.Q.S.
  indirizzo: |-
    Angolo dell'UNTO
    [leggi Via Banchi di Sopra 
    Bar Nannini Conca d'Oro]
    www.goliardisenesi.com
  note: "Ogni anno il senato composto dagli studenti antiani elegge un Principe che propone i suoi balioti che per meriti e/o beri e cene pagati ai suddetti antiani vengono eletti Balioti.\r\n\
    La carica \xC3\xA8 annuale e non si pu\xC3\xB2 essere 2 volte n\xC3\xA8 Principe n\xC3\xA8 Baliota.\r\n\
    SIAMO SOLO UOMINI, LA FICA NON PUO' METTERSI IL GOLIARDO NE' FAR PARTE DELLE FERIAE MATRICULARUM, PUO' ALTRESI' VENIRE ALLE NOSTRE NUMEROSE FESTE E SOLLAZZARCI PIACEVOLMENTE (COME FA)!\r\n\
    www.goliardisenesi.com"
  m_fileImmagineTn: si_balia.gif
  "Citt\xC3\xA0": Siena
  m_nPrecedenzaCittadina: "0"
  m_bInSonno: "0"
