ordini_096: 
  ID_ORD: "107"
  m_fileImmagine: govsbnb.gif
  Nome_completo: Goduriosus Ordo Vagorum Sine Bolli
  m_bSerio: "1"
  datadinascita: 2007-01-19 17:40:27
  emailordine: ignota
  data_creazione: 2007-01-19 17:40:27
  id_utente_creatore: "17"
  storia: "Fu in una fumosa taverna di Barcellona che il Pontifauss Conditor, ispirato da litri di sangria e spalleggiato da due Scardinati e un Carretiere, balz\xC3\xB2 sul tavolo e inton\xC3\xB2 il Gaudeamus fondando l'Ordine fra gli inneggiamenti di una cinquantina di liceali festanti. Da allora l'Ordine gir\xC3\xB2 per tre estati di fila le piazze di Francia e Spagna (e S.F. Plinganius gioc\xC3\xB2 uno scherzetto ai Goliardi di Salamanca) scrivendo pagine indelebili di casino sfrenato e cameratismo, coinvolgendo anche i filistei liceali in cori goliardici a settanta voci per le vie di varie citt\xC3\xA0... Da segnalare poi, durante l'anno scolastico, le Sacre Consuetudini del campionato uccellatorio di Cancellini, la proclamazione del Weiser Maximus, la Prostratio Priminorum e l'esazione delle decime da parte dei Dignitari dell'Ordine, l'apertura ufficiale della Caccia al Primino, e molte altre iniziative...\r\n\
    Ordine interamente fondato e composto da Feti e bustine Liceali di un famoso liceo torinese che gi\xC3\xA0 diede i natali goliardici e scolastici a personaggi di spicco come Crapulus, Ballustrus e S.S. Ottone Nicholaus II... per citarne solo tre... :)\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n"
  Motto: semper vincit sine bolli
  Sigla: G.O.V.(T.)S.B.N.B.
  indirizzo: "null"
  note: "Le donne, i liceal, l'amor, gli ardori / Le porcherie, l'audaci imprese io canto / Che furo al tempo pria della matura / quando ancora non solean studiar s\xC3\xAC tanto / Ma seguian l'orme e i giovenil furori / Di Golia padre, sempre loro accanto / E notte e d\xC3\xAC se la godeano un sacco.\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n"
  m_fileImmagineTn: govsbnb.gif
