  storia: "Il Tenebroso Impero dei Signori della Notte viene fondato a cavallo della met\xC3\xA0 del 1800 fra studenti dell'antica Scuola Superiore di Scienze Economiche di Trieste con scopi di solidariet\xC3\xA0 e ricreazione culturale: nasce cos\xC3\xAC il primo Ordine Goliardico triestino quando ancora la lingua madre della maggior parte della popolazione era l'Austriaco e il Triestino era la lingua dei filo-italiani, parlato quasi di nascosto. Seppur andato in sonno all\xE2\x80\x99inizio degli anni '70, quando la politicizzazione dell'Universit\xC3\xA0 oppresse il libero pensiero e quasi riusc\xC3\xAC ad estinguere la Goliardia, il libero pensiero sopravvisse e di nuovo, grazie al Principe Piovra Guzzante, nell'A.D. 1991 i colori argento e blu del T.I.S.N. si rividero nell'Ateneo Tergestino."
