ordini_033: 
  ID_ORD: "33"
  m_fileImmagine: soas.gif
  Nome_completo: SUPREMUS ORDO AUREI SCORPIONIS
  m_bSerio: "1"
  datadinascita: 2008-02-16 14:33:08
  emailordine: soas@virgilio.it
  data_creazione: 2008-02-16 14:33:08
  id_utente_creatore: "4342"
  storia: "Il S.O.A.S. di Ivrea\r\n\
    \r\n\
    Il S.O.A.S. \xC3\xA8 l\xE2\x80\x99Ordine Goliardico Sovrano in Ivrea (Eporedia) e Canavese, territorio situato all\xE2\x80\x99estremo nord occidentale del Piemonte, ai confini con la Valle d\xE2\x80\x99Aosta, zona di transito commerciale fin dai tempi dell\xE2\x80\x99 antico Impero romano.\r\n\
    \r\n\
    Le origini del famoso e tanto amato Carnevale d\xE2\x80\x99Ivrea risalgono ai primi anni del 1800 e questa tradizionale e originalissima festa ha permesso che anche ad Ivrea trovasse spazio e si consolidasse Nostra Santa Madre Goliardia.\r\n\
    \r\n\
    In una citt\xC3\xA0 che non \xC3\xA8 sede universitaria la Goliardia si \xC3\xA8 singolarmente inserita in un contesto fortemente e giustamente legato al Carnevale, costruendo una tradizione affermata e riconosciuta ancora oggi.\r\n\
    \r\n\
    Origine e Fondazione\r\n\
    \r\n\
    I Goliardi ad Ivrea sono sempre esistiti\xE2\x80\xA6 ma \xC3\xA8 a partire dai primi anni del Novecento che gli studenti eporediesi iniziano a distinguersi e a lottare per ottenere una propria autonomia rispetto a Torino.\r\n\
    \r\n\
    Ma il felice e mitico fervore degli anni della Belle Epoqu\xC3\xA8 viene presto interrotto dalla parentesi del Ventennio; con esso anche la Goliardia scompare, un po\xE2\x80\x99 come nel resto d\xE2\x80\x99Italia.\r\n\
    \r\n\
    Soltanto a partire dal secondo dopoguerra si pu\xC3\xB2 parlare di nascita della Goliardia moderna ad Ivrea; in un primo tempo viene ricostituita la cos\xC3\xAC detta Associazione Universitaria Canavesana, gruppo votato alle attivit\xC3\xA0 ricreative e politico-culturali ma solo di facciata soprannominatasi \"goliardica\".\r\n\
    \r\n\
    In questo contesto un gruppo di studenti vicini ai costumi e alle leggi di N.S.M.G. inizia a costruire le fondamenta di quell\xE2\x80\x99Ordine goliardico che sar\xC3\xA0 a partire dagli anni cinquanta il Supremus Ordo Aurei Scorpionis.\r\n\
    \r\n\
    Ufficialmente il S.O.A.S. verr\xC3\xA0 riconosciuto per acclamazione Ordine Sovrano in Ivrea e Canavese, in qualit\xC3\xA0 di Ordine Goliardico Minore Italiano, nel corso del I Congresso Nazionale degli Ordini Sovrani e del III Convegno dei Principi della Goliardia Italiana, tenutosi il 29 e 30 aprile del 1961 presso la citt\xC3\xA0 di Genova.\r\n\
    \r\n\
    Il Fondatore\r\n\
    \r\n\
    Fondatore, Artefice, Motore e Anima carismatica e leggendaria del S.O.A.S. fu il valoroso Goliarda Pier Sandro Allera, Johannes IV Eporediensis, il gran-de \"Peru\". Principe del S.O.A.S. dal 1961 al 1965 Pier Sandro ha ricoperto la carica di Pontifex Maximus di Torino e per il successivo decennio come tenutario dell\xE2\x80\x99Ordine ha ricoperto la carica di Conservatore del S.O.A.S.\r\n\
    \r\n\
    Conosciuto e stimato dai vecchi goliardi di tutta Italia, Pier Sandro ha per molti anni recitato un ruolo di primo piano all\xE2\x80\x99interno dell\xE2\x80\x99Ordine e nel corso delle Feriae Matricularum e dei Convegni Goliardici di molte Piazze italiane.\r\n\
    \r\n\
    Territorio\r\n\
    \r\n\
    Al S.O.A.S. appartengono in signoria la citt\xC3\xA0 di Ivrea, Sua Sede tradizionale, e le terre del Canavese, citt\xC3\xA0, borghi e castelli, laghi e fiumi, confinando tali territori:\r\n\
    \r\n        - ad oriente, con quelli posti sotto la giurisdizione degli Ordini Goliardici di Vercelli e Biella;\r\n\
    \r\n        - a meridione, con I Domini Pontifici, amministrati direttamente dal S.O.T.C.a.P. e con le terre degli Ordini Goliardici di Chivasso e Settimo;\r\n\
    \r\n        - ad occidente, ancora con I Domini Pontifici del S.O.T.C.a.P. e con I territori della Gallia transalpina posti sotto la giurisdizione della Universit\xC3\xA0 di Gr\xC3\xA8noble;\r\n\
    \r\n        - a settentrione, con le terre sotto la giurisdizione della Goliardia della Valle d\xE2\x80\x99Aosta.\r\n\
    \r\n\
    Il Carnevale\r\n\
    \r\n\
    Lo Storico Carnevale d\xE2\x80\x99Ivrea richiama ogni anno migliaia di turisti provenienti da tutto il mondo.\r\n\
    \r\n\
    Nell\xE2\x80\x99 arco di una settimana ad Ivrea tutta la citt\xC3\xA0 dimentica gli impegni politici ed economici per concentrarsi nella manifestazione che consegna nelle mani dei personaggi storici le chiavi delle porte della citt\xC3\xA0: il Generale e la Mugnaia, lo Stato Maggiore, il Podest\xC3\xA0, il Sostituto Gran Cancelliere, gli Abb\xC3\xA0, gli Aranceri, I Goliardi ecc\xE2\x80\xA6\r\n\
    \r\n\
    Il S.O.A.S. inizia I festeggiamenti carnescialeschi con l\xE2\x80\x99Elezione del Praefectus per proseguire la settimana Santa con la Liberatio, la Fiaccolata Goliardica del sabato sera, la Cena Matricularum, l\xE2\x80\x99Abbruciamento degli Scarli\xE2\x80\xA6\r\n\
    \r\n\
    Attivit\xC3\xA0 dell\xE2\x80\x99 anno\r\n\
    \r\n\
    Ad Ivrea si \xC3\xA8 abituati a considerare la Goliardia come una parte del nostro Storico Carnevale, ma l\xE2\x80\x99attivit\xC3\xA0 del gruppo va ben oltre: nel corso dell\xE2\x80\x99intero anno accademico si succedono numerosi appuntamenti conviviali, feste e ricorrenze dove I Goliardi soassini possono esprimere il loro amore verso Bacco Tabacco e Venere.\r\n\
    \r\n\
    All\xE2\x80\x99inizio dell\xE2\x80\x99anno accademico (ottobre-novembre) avviene l\xE2\x80\x99Elezione del Principe, il Capo Ordine, che guider\xC3\xA0 il S.O.A.S. per tutto l\xE2\x80\x99anno."
  Motto: "null"
  Sigla: Real SOAS
  indirizzo: "null"
