  storia: "L'ordine nasce nel marzo del 1954 grazie a studenti friulani che studiavano ovviamente fuori sede (vedi pd e ts), infatti la nascita dell'ateneo udinese \xC3\xA8 datata 1978. Nella citt\xC3\xA0 di pd l'ordine diede anche CapiCitt\xC3\xA0 ricoprendo cariche importanti all'interno del Tribunato. Lo stesso avvenne anche a Trieste. Nel 1978 riunite le insegne sotto la citt\xC3\xA0 di Udine si svilupp\xC3\xB2 un'intensa attivit\xC3\xA0 goliardica che sfoci\xC3\xB2 nel 1990 con l'uscita da parte dell'Angelo dal GOSO, ordine sovrano in Trieste. Per quanto riguarda il DUCATO DEL FRIULI la storia \xC3\xA8 ben piu' complessa e antica.\r\n\
