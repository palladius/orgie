ordini_142: 
  ID_ORD: "154"
  m_fileImmagine: ivcuria.gif
  Nome_completo: CURIA-Curiales Universitatae Rejecti Invicti Aucis
  m_bSerio: "1"
  datadinascita: 0000-00-00 00:00:00
  emailordine: danlucca@email.it
  data_creazione: 2008-01-31 18:22:19
  id_utente_creatore: "1890"
  storia: "La C.U.R.I.A. (Curiales Universitatae Rejecti Invicti Aucis - nel seguito CURIA) e\xE2\x80\x99 un\xE2\x80\x99associazione goliardica \"post lauream\", retta dalla volont\xC3\xA0 di mantenere vivo e alto lo spirito goliardico, sempre e comunque. E' una emanazione dell'AUC-SASO (Associazione Universitari Canavesani - Supremus Aurei Scorpionis Ordo - nel seguito AUC) Sovrano Ordine Goliardico in Eporedia atque Canavisio (IVREA) per il quale garantisce, senza interferenza alcuna, di custodire e proteggere la memoria storica e la tradizione goliardica. LA CURIA riconosce l'AUC quale UNICO ordine goliardico sovrano in Eporedia atque Canavisio. Si pone al servizio dell\xE2\x80\x99AUC quale depositaria della memoria storica e riconosce l'autorit\xC3\xA0 del suo Prefetto nell\xE2\x80\x99ambito delle norme che regolano i comportamenti ed i principi di Sancta Mater Goliardia. La CURIA non \xC3\xA8 e non sar\xC3\xA0 mai una alternativa dell\xE2\x80\x99AUC, in quanto i propri membri, derivandone dalle fila al termine della militanza attiva, ne conservano dignit\xC3\xA0, gradi e conformit\xC3\xA0 di spirito. La CURIA rappresenta il naturale prosieguo della costituente goliardica principale, in un differente contesto sociale.\r\n\
    \r\n\
    \r\n\
    La CURIA \xC3\xA8 retta dal CAPO BRANCO e dal CUMSESSUM. Il CAPO BRANCO \xC3\xA8 l\xE2\x80\x99unico ed indiscusso capo supremo della CURIA, assume in se\xE2\x80\x99 tutti i poteri e voleri della CURIA, tranne la destituzione del CUMSESSUM. Il Capo Branco ha incarico annuale e viene eletto nel contesto dell\xE2\x80\x99Adunanza plenaria della CURIA nel Solstizio di Inverno mediante il TIRALEPETTEANNUSA."
  Motto: "-"
  Sigla: C.U.R.I.A.
  indirizzo: "La CURIA \xC3\xA8 onnipresente. Laddove spiriti sovrani si radunano per celebrare fasti e ricorrenze in onore di Sancta Mater Goliardia, l\xC3\xAC \xC3\xA8 la sede."
  note: "La CURIA e\xE2\x80\x99 uno stato d\xE2\x80\x99animo che travalica il limite temporale del singolo: i costituenti il gruppo sono tra loro uniti da un invisibile ma resistentissimo legame,di superior natura, che nel corso dei millenni poeti e cantastorie hanno appellato con il nome di Amicizia e che rappresenta il solo e unico legame indissolubile tra le genti di uno stesso pensiero. Questa unione e\xE2\x80\x99 resa salda ancor pi\xC3\xB9  dal trascorrere del tempo, con le sue vicissitudini umane, le sue necessit\xC3\xA0, i suoi problemi: la risata profonda  che sgorga dalla gola di un Curiale a seguito del \xE2\x80\x9Cdelirio kafkiano\xE2\x80\x9D, il canto che sorge spontaneo alla fine della nottata trascorsa insieme, le ore rubate al sonno e i boccali che si accatastano nella taverna fumosa, sono i simboli esteriori di quel divenire, eterno ed incorruttibile, di un presente che ha in se\xE2\x80\x99 qualcosa del passato e del futuro. L\xE2\x80\x99eternit\xC3\xA0\xE2\x80\x99 della GOLIARDIA. \r\n\
    \r\n\
    \xE2\x80\x9C\xE2\x80\xA6tutto questo non dovrebbe durare, per\xC3\xB2 durer\xC3\xA0 sempre; il sempre umano, beninteso, un secolo, due secoli \xE2\x80\xA6; e dopo sar\xC3\xA0 diverso ma peggiore. Noi fummo i gattopardi, i leoni; chi ci sostituir\xC3\xA0 saranno gli sciacalletti, le iene \xE2\x80\xA6\xE2\x80\x9D\r\n\
    \r\n\
    g. tomasi di Lampedusa \xE2\x80\x93 Il gattopardo."
  m_fileImmagineTn: ivcuria.gif
  "Citt\xC3\xA0": Ivrea (TO)
  m_nPrecedenzaCittadina: "1"
  m_bInSonno: "0"
  Nome_veloce: Curia
