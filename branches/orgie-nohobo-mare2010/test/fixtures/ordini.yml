ordini_107: 
  ID_ORD: "120"
  m_fileImmagine: to-tarocchi.gif
  Nome_completo: Summus Taroccorum Ordo Taurinensis
  m_bSerio: "1"
  datadinascita: 2004-10-05 09:31:22
  emailordine: ignota
  data_creazione: 2004-10-05 09:31:22
  id_utente_creatore: "539"
  storia: "Il Summus Taroccorum Ordo Taurinensis nasce nel 1976 grazie a un compatto gruppo di amici, ex studenti liceali, tra cui Marco Albera (Innominatus I\xC2\xB0, Cardinal Conservatore del Corno), Roberto Vairo (Pingos I\xC2\xB0), Nico Bracco (Domenico \xC3\xA8 sempre Domenico\xE2\x80\xA6. Bracco ovvero\xE2\x80\xA6 Cicciolinus). Si uniscono., poi, a loro Gabriele Danesin (Ballustrus Kappelmeister, \xE2\x80\x9Cla biro profumata\xE2\x80\x9D) e Paolo Benevelli (Crapulus). Si segnala, in quegli anni, il gemellaggio tra i Tarocchi e lo IOVSJ.\r\n\
    \r\n\
    L'attivit\xC3\xA0 Goliardica dei Tarocchi procede ininterrotta fino al 1980, anno dopo il quale solo Benevelli, a capo del Principato, continua ad essere presente sulle Piazze.\r\n\
    Alcuni anni dopo, nel 1986, i Tarocchi si ritrovano per celebrare il decennale della fondazione, e sulla spinta dell'entusiasmo per questo evento tornano a riunirsi.\r\n\
    Nel 1989, su invito di Manlio Collino Zeus, prendono parte alla Cena Merlin, e inizia una tradizione di Cabaret Goliardico e di grande disponibilit\xC3\xA0, che pone i Tarocchi al servizio del Corno in infinite occasioni.\r\n\
    In seguito a questi avvenimenti ai Tarocchi torna la voglia di trovarsi e di stare insieme, e vengono ripresi il filone Musicale , che ha i suoi protagonisti in Danesin, Benevelli, Bracco, Vairo, Ferdinando Rosso (Pantagruelicus), Manino Podest\xC3\xA0 (Passepartout); il filone di ricerca storica, che fa capo ad Albera ed al suo Centro di Documentazione Goliardico \xE2\x80\x9CUniversitas Scholarum\xE2\x80\x9D, e che ha portato alla realizzazione di varie mostre in Italia; il filone letterario, che ha in Vairo e nei suoi libelli, e naturalmente nei numeri di \"Mala Tempora\", la sua massima espressione. Infine, grazie allo stesso Vairo e ad Andrea Vanner (S.S. Sylenus) la produzione di CD, musicassette e filmati dei vari spettacoli realizzati dall'Ordine.\r\n\
    \r\n\
    Grandi Tarocchi furono, oltre a quelli gi\xC3\xA0 citati, Franchino Ressa (Archeophilus) e Guido Pazzi (Gaius Micropenicus, Colui che ricevette in dono da mamma due begli occhi) di Asti, insuperato \"Torero\". Oltre a loro, naturalmente Mim\xC3\xAC, e Gim Culo Glabro, e tutti gli altri componenti di PLUBELLES e PLUBONS, che diedero un nuovo impulso agli spettacoli dell'Ordine, avvenuti in occasione delle Feriae Matricularum di Padova, Ferrara e Bologna. Si segnalano anche diversi concerti a Genova, Firenze, Pisa, Milano, Parma e Torino (qui in occasione del Cinquantenario del S.O.T.C.a.P.)\r\n\
    \r\n\
    Nonostane i membri fondatori, tranne qualche eccezione, non facciano pi\xC3\xB9 vita universitaria attiva, l'Ordine si segnala per una straordinaria apertura ai giovani, importantissimi, tra cui citiamo S.E. Evaristo, S. E. Manolus, S.Ecc. Lapalisse, Virus, S.Ecc. Vitellicus e S.Ecc. Mauritianus e Mons. Masturbanipal.\r\n\
    \r\n\
    Sintetizzando, i Tarocchi si distinguono da ogni altro Ordine Italiano in virt\xC3\xB9 dei loro rapporti interpersonali basati sull'amicizia, delle loro inclinazioni artistiche, del loro poco formalismo nella visione goliardica, e della generosa disponibilit\xC3\xA0 che li ha messi in tutte le occasioni al servizio della Goliardia Piemontese.\r\n\
    \r\n\
    Proprio l\xE2\x80\x99unione di questo incredibile gruppo ha spinto alcuni dei suoi componenti a trovarsi per suonare insieme e a fondare un gruppo di musica piemontese \xE2\x80\x93 \xE2\x80\x9CIj Tar\xC3\xB2ch\xE2\x80\x9D \xE2\x80\x93 inizialmente formato da Ballustrus e da Pantagruelicus, a cui si sono aggiunti, con il tempo, S. E. Omega, Mons. Mala Abitatione \xE2\x80\x9CMalmaison\xE2\x80\x9D,  Mons. Masturbanipal ed il Cavaliere Eliano Bonafini \xE2\x80\x9CVirus\xE2\x80\x9D. A parte l\xE2\x80\x99interesse per la musica cantata in dialetto, si \xC3\xA8 trovata una scusa per riprendere a suonare insieme in Goliardia. Non si pu\xC3\xB2 dimenticare il trionfale successo alle Matricolari di Bologna del 2003, dove, per richiesta del Magistrato del Fittone, ci si \xC3\xA8 recati a suonare in un magnifico carro fornito dai Bolognesi. Ci si \xC3\xA8 anche trovati, sempre nel 2003, al Circolo degli Artisti!\r\n\
    \r\n\
    Attualmente la vena artistico musicale  \xE2\x80\x9Ccontinua\xE2\x80\x9D, portata sulle piazze di tutta Italia dai Tarocchi, e, con la supervisione di Innominatus, proseguono le ricerche storiche sulla Goliardia, seguite, in particolar modo da S.E. Manolus e Mons. Innominatus II.\r\n\
    \r\n\
    \r\n"
  Motto: non al pero, non al melo, ma al fico e alla sua Si
  Sigla: S.T.O.T.
  indirizzo: |
    indirizzo di Ballustrus?!?
    Lele DANESIN
    Via Pedrotti 23
    10152 torino to
    kappelmeister@libero.it

  note: "Inno del Summus Taroccorum  Ordo Taurinensis\r\n\
    \r\n\
    (Musica L.Van Beethoven \xE2\x80\x93 Testo A.M. Pingos I\xC2\xB0, Sull\xE2\x80\x99aria dell\xE2\x80\x99Inno alla Gioia)\r\n\
    \r\n\
    \r\n\
    Viva sempre viva il Summus Taroccorum Ordo,\r\n\
    \r\n\
    anche dopo morti rester\xC3\xA0 il nostro ricordo\r\n\
    \r\n\
    vento e sole, nei nostri cuori,\r\n\
    questa \xC3\xA8 l\xE2\x80\x99eterna Giovent\xC3\xB9\r\n\
    \r\n\
    Liberi siam noi del Summus Taroccorum Ordo!!!\r\n\
    \r\n"
