  storia: "Da che mondo \xC3\xA8 mondo qualcuno non ama la gerarchia o si rompe del suo capo. \r\n\
    Allora ci sono due strade: se hai almeno due mesi di goliardia, apri un ordine, se non ce li hai, sei giovane, e diventi libero goliarda in attesa di compiere il secondo mese.\r\n\
    \r\n\
    :-)\r\n\
    \r\n\
    Questa definizione \xC3\xA8 per tutti quelli che non hanno capito che Goliardia \xC3\xA8 Cultura, Intelligenza, Tradizione ma soprattutto che GOLIARDIA NON E' DEMOCRAZIA."
  Motto: Il Capoordine mi rompeva i coglioni!
  Sigla: L.G.
  indirizzo: Non esiste nessun tipo di recapito.
  note: "Questo ordine \xC3\xA8 un accettore per  tutti i liberi goliardi che razzolano su questo sito. Pensate per il significato come a un \"NESSUN ORDINE IN PARTICOLARE\". In realt\xC3\xA0 ci vorrebbe un ordine per ogni citt\xC3\xA0, ma chi se ne frega!, \xC3\xA8 un errore di modello che non prevedeva i L.G.\r\n\
    Tanto i L.G. NON SONO PREVISTI E/O ACCETTATI praticamente da nessuno!"
