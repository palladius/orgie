ordini_153: 
  ID_ORD: "165"
  m_fileImmagine: s.i.s.fg.gif
  Nome_completo: CATAPANATO
  m_bSerio: "1"
  datadinascita: 2009-02-11 11:38:24
  emailordine: arkkit2@hotmail.it
  data_creazione: 2009-02-11 11:38:24
  id_utente_creatore: "3475"
  storia: "Il primo movimento Goliardico Sanpaolense si ha nel 1966 con il sultano\r\n\
    Al\xC3\xAC Fonzinillus Curtissimus Et Malicavatus dopo nel 1967 poich\xC3\xA8 molti paesi limitrofi avevano come capo citt\xC3\xA0 il sultano si decise di cambiare e si ha l'avvento del Catapanato....\r\n\
    Il primo anno nel 1967 si ha il primo Catapano Lellus de la Giannubiliana Gens Vulgo nomato \"Long Lenz\" al quale si succedettero XLI catapani...\r\n\
    Il primo anno ci fu uno stupore generale nel paesino poich\xC3\xA8 nn si capiva il significato della goliardia e i cittadini trovati di fronte ad un'atto goliardico forte nn riuscivano a capacitarsi come, un gruppo di universitari,riuscivano a sbeffegiare tutti...\r\n\
    Proprio il 1\xC2\xB0 atto goliardico, il quale restera nella storia...\r\n\
    I goliardi sanpaolesi dopo aver \"rattato\" un aereoplano di legno, nel feudo di san severo, lo portarono nel cuore della notte nella piccola cittadina; l'indomani mattina tutti i cittadini videro con stupore l'aereo e, impauriti pensarono che fossero tornati i tedeschi.... fu un mattinata strana.... gente che correva in piazza, tutti si chiedevano ma nn riuscivano a darsi risposte.... \r\n\
    E da quell'anno per XLI anni la tradizione nn si \xC3\xA8 mai fermata... \r\n\
    Il fiore all'occhiello della nostra festa \xC3\xA8 il Recital Goliardico dove i goliardi, appunto,  con il loro spirito dello sberleffo, dicono tutto di tutti senza avere peli sulla lingua... Il recital molto seguito ed applaudito da tutti i cittadini \xC3\xA8 l'orgoglio di tutti noi... \r\n\
    Per\xC3\xB2 va detto anche che per impegni universitari la goliardia sanpaolese si concentra solo nel periodo di dicembre infatti in quello stesso periodo avvengono fatti insoliti nel nostro paese il quale,incuriosito segue le nostre vicende...\r\n\
    I nostri impegni goliardici iniziano cn la \"questua\"per il paese...;\r\n\
    il 22 dicembre giorno prima giorno dopo di solito c'\xC3\xA8 il \"passaggio\" dal vecchio Catapano che passa il CHIAVE ET REMO al nuovo Catapano il quale, proclamer\xC3\xA0 la sua corte...;\r\n\
    il 23 l'elezione della matricola ufficiale con il concorso scritto ed orale...;\r\n\
    il 26, di solito, si sfila in paese con carri allegorici...\r\n\
    poi la recita ed il veglione nel quale vengono accolte le delegazioni estere....nello stesso si balla e vengono elette miss veglione miss eleganza e miss goliardia\r\n\
    Nei primi giorni di gennaio con il \"pranzo ufficiale\" si chiudono li festeggiamenti de le \"Feriae Matriocularum\"...\r\n\
    Quest' anno ci accingiamo a festeggiare il XLII anno di festa.... nella speranza che la tradizione non muoia mai....\r\n\
    A SANCTA MATER....\r\n\
    NUNC ET SEMPER\r\n \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    Scritto sotto il magno consiglio del\r\n\
    CATAPANO I\xC2\xB0 Lellus de la Giannubiliana Gens  Vulgo nomato \"Long Lenz\""
