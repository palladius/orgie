ordini_041: 
  ID_ORD: "41"
  m_fileImmagine: fe-ducatus.gif
  Nome_completo: Ducatus Estensis A.F.U. de li 4 S
  m_bSerio: "1"
  datadinascita: 2009-05-05 14:47:52
  emailordine: ---
  data_creazione: 2009-05-05 14:47:52
  id_utente_creatore: "542"
  storia: "Nel 12/1945, con Azzo I (Gipo Bonfiglioli) viene istituito il Ducatus Estensis A.F.U. de li 4 S, che comprende gli aspetti goliardici (Ducato) e quelli associazionistici (AFU) della vita universitaria ferrarese.\r\n\
    Il Duca \xC3\xA8 presidente dell'AFU e viene creato, a seconda dei momenti storici, per acclamazione, per elezione, per investitura.\r\n\
    Con l'avvento e il riconoscimento degli Ordini Vassalli, il Duca mantiene la sovranit\xC3\xA0 assoluta e l'istituzione dell\xE2\x80\x99Ordine dei Cavalieri de li 4 S assurge a suprema carica onorifica cittadina."
  Motto: ---
  Sigla: ---
  indirizzo: |-
    Alessandro Lancellotti
    Via Ariosto 58 - 44100 Ferrara
  note: "Il Duca imperante pu\xC3\xB2 deliberare convocando a Sua discrezione la Corte Ducale, composta, secondo consuetudine non vincolante, dal Suo Gran Maestro, dal Barone di Pomposa e dal suo Vicario, dal Marchese delle Torre Matildea e dal suo Camerlengo, da Magister Ignis e Magister Equitum, da Gran Cordoni, Collari e Cavalieri de li 4 S da Lui scelti. Quando la Corte \xC3\xA8 riunita in Rettorato, Tradizione vuole che l'invito sia esteso al Magnifico Rettore e al Decano dei bidelli."
  m_fileImmagineTn: fe-ducatus_rid.gif
