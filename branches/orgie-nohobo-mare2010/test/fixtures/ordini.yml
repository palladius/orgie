ordini_105: 
  ID_ORD: "118"
  m_fileImmagine: sos.GIF
  Nome_completo: Sacer Ordo Scorpionis
  m_bSerio: "1"
  datadinascita: 2008-11-22 15:41:30
  emailordine: fiorellos_i@yahoo.it
  data_creazione: 2008-11-22 15:41:30
  id_utente_creatore: "669"
  storia: "Ordine fondato da tre amici che erano tutti del segno dello Scorpione, da qui il nome. Si rivolsero al Sultano della Papera D'Oro di San Severo (Ordine allora Sovrano sul territorio di tutta Foggia) e riscattarono il territorio di Lesina.\r\n\
    Il S.O.S. \xC3\xA8 ordine sovrano sul territorio di Lesina, Lesina Marina, Poggio Imperiale, Apricena, Ripalta e parte di Torremileto."
  Motto: Ubi major minor cessat
  Sigla: S.O.S.
  indirizzo: http://www.sos.ilbello.com
  note: |-
    NON SIAMO VASSALLI DI NESSUNO !!!
    Fino al 2008 si sono succeduti 39 Principi con rispettiva Corte e immatricolazioni delle matrincule...i nostri Ludi iniziano il 26/12 con il corteo in citta' e relativa questua, continuano con i processi alle matrincule la sera del 27/12, il Gran Gala' Goliardico del 29/12 e si concludono con la cena goliardica del 03/01.
    
    Il Principe reggente e' l'unico a scegliere il suo successore se ritiene che ce ne sia uno capace tra i suoi sudditi (in generale il designato e' il GranDuca). La nomina avviene il Sabato Santo. Il Principe convoca la riunione dell'intero Ordine in cui nominera' il suo successore oppure si terra' le chiavi della Citta' ancora per un altro anno.
