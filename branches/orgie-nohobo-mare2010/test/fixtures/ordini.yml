ordini_036: 
  ID_ORD: "36"
  m_fileImmagine: pr-salam.gif
  Nome_completo: "\xC3\x86ternum Ordo Salamandre Terre Salsesi"
  m_bSerio: "1"
  datadinascita: 2006-10-20 12:46:45
  emailordine: boccadirosa84@hotmail.it
  data_creazione: 2006-10-20 12:46:45
  id_utente_creatore: "1453"
  storia: "29 aprile di un anno immemorabile: attorno ai colli di Salsomaggiore, al calar del sole, si aggirava intrepido un Goliardo ignaro che da quel momento sarebbe entrato a far parte della Leggenda. Egli errava con un sigaro in bocca, un fiasco di vino di ottima qualit\xC3\xA0 e, sulla pelle, il sapore della donna appena consumata. Ad un tratto, come ad un novello Mos\xC3\xA8, gli appar\xC3\xAC, davanti ai suoi occhi stupefatti, una luce abbagliante che lo attir\xC3\xB2 a s\xC3\xA8 come sotto l'effetto di un incantesimo. Il Goliardo, abituatosi lentamente al forte bagliore, riusc\xC3\xAC ad intravedere all'interno dell' aura infuocata il contorno del Sacro Animale, simbolo del Fuoco e del quale aveva sempre sentito parlare in tutte le contrade dei colli salsesi. Tale Animale, infatti, \xC3\xA8 da sempre l'effige e simbolo di Salso Maggiore e da allora anche dell'Ordine Nobile pi\xC3\xB9 attivo del Ducato di Parma. Da quel giorno, il goliardo che porta dentro al suo cuore la Sacra fiamma \xC3\xA8 per tradizione il condottiero dell'ordine stesso e vive assieme alla sua nobile corte nell'oramai mitico Castello di Vigoleno, da sempre sede indiscussa delle Salamandre.\r\n\
    Da qui lo Gran Maestro, grazie all'intelligenza e al senso del gioco che lo ha sempre contraddistinto, muove i suoi nobili e meno nobili contro le misere schiere degli ordini avversari di Rane, Lunigiane e Terronia Tellus, uscendone sempre indenne (non c' era bisogno di dirlo) e a testa alta. A voi che siete dentro le nostre terre ordino di difenderle con ARGUZIA e SAPIENZA, a voi che ne state fuori sar\xC3\xA0 concesso di entrare solo rispettando le nostre giuste leggi e voi Duca, Capi Ordini e nostri fratelli tutti sarete sempre ben accetti nelli nostri baccanali per gioire e godere de li frutti che le nostre ricche terre Ci e Vi offriranno. \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n"
  Motto: Che non abbia mai fine!
  Sigla: "\xC3\x86.O.S.TT.SS."
  indirizzo: |
    Salamandre - Via Bixio 30 - 43100 Parma
    
    
    Strada Cava in Vigatto 69
    43010 Corcagnano -pr-

