appuntamenti_825: 
  Abdicabilita: "95"
  luogo: "\r\n\
    Il I CONGRESSO NAZIONALE de lo CALLARO si terr\xC3\xA0 presso il (consueto) \"RISTORANTE VALENTINO\" in ELCE-PERUGIA. Alle 19.30 inizier\xC3\xA0 l'accoglienza dei partecipanti CONGRESSISTI/CALLARISTI intorno alla cassa del locale. Sono ammessi ACCOMPAGNATORI CALLARI. "
  Nome: I Congresso nazionale Callaristi d'Italia
  ID_appuntamento: "1259"
  data_invio: 2009-03-04 23:16:29
  note: "La seduta congressuale sar\xC3\xA0 scandita da interventi scientifici intorno al nobile Callaro e alla fine arte del Callarista che si snoderanno, nell'arco della serata, accompagnandosi allo splendido men\xC3\xB9, appositamente strutturato per l'occasione:\r\n\
    1- Antipasto alla maialona (tris di pane umbro bruscato su carboni di autentico tiglio francescano [appositamente donati dalle callare di claustura in Assisi] con lardo, broccoli e salciccia, olio e tartufo di Castelluccio);\r\n\
    2- Zuppa dal Callaro (mix di veraci leguminose e coticosi cereali provenienti dal vicino appennino Umbro-marchigiano-abbruzzese-catalano) su vellutata emulsionata di grasso suino e olio d'oliva con sentori di sottobosco mediterraneo;\r\n\
    3- Bocconcini di parti scelte di maiala (di molteplici provenienze) con proibizionistici sentori della media Valle del Tevere;\r\n\
    4- Verdure scelte stracinate in padella con aglio di Cannara e peperoncino di Bastardo (vivi sentori della centrale a carbone di Pietrafitta)\r\n\
    5- Caff\xC3\xA8, dolci e amari... in compagnia del Callaro al bar. \r\n\
    \r\n\
    Il tutto sublimamente accompagnato da tipici vini callaristi:\r\n\
    - Gew\xC3\xBCrtzcallaren \r\n\
    - Callarino di Montefalco\r\n\
    - Nobile di MonteCallaro"
  recapitogoliarda1: "331"
  "citt\xC3\xA0": Perugia
  tipodiappuntamento: Festa delle Matricole
  recapitogoliarda2: "2444"
  data_fine: 2009-03-04 23:16:29
  id_login: "2640"
  recapitogoliarda3: "3192"
  data_inizio: 2009-03-04 23:16:29
