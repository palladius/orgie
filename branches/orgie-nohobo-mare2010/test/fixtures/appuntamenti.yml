appuntamenti_298: 
  Abdicabilita: "100"
  luogo: "Bologna \xE2\x80\x93 dalle 14,30 alle 18,30\r\n\
    Tra i  portici, gallerie, logge, chiostri, corti e cortili  di via Zamboni,  p.zza Verdi, via Rizzoli, Mercanzia e  p.zza Grande (o Maggiore che dir si voglia).\r\n\
    Estendibile, a discrezione, tra Bolognina, Porto e San Vitale\xE2\x80\xA6\r\n\
    e pure Murri, San Donato e Saragozza\r\n\
    \r\n"
  Nome: TORTELLINO D'ORO c.a.
  ID_appuntamento: "548"
  data_invio: 2004-05-06 15:14:08
  note: "Auto.Min.Conc.6969/1969+35\r\n\
    \r\n\
    Norme del concorso\r\n\
    Sono  trasmesse verbalmente da ogni Clerico presente in Felsina. Basta chiedere.\r\n\
    Le interpretazioni personali delle norme saranno ammesse a imprescindibile discrezione et t.d.c. del Gran Priore\r\n\
    \r\n\
    Veniamo alla parte pi\xC3\xB9 interessante: I PREMI!\r\n\
    \r\n\
    Al Tortellino Vincitore verr\xC3\xA0 consegnato, alla Magna Libationem dei C.V., il Premio Tortellino d\xE2\x80\x99Oro 2004.\r\n\
    \r\n\
    All\xE2\x80\x99Ordine di appartenenza del Tortellino Vincitore, nelle mani del suo Capo Ordine, avendo contribuito significativamente alla segnalazione dei suoi potenziali tortellini, verr\xC3\xA0 consegnata una mega cassa di vino da gustarsi con chi pi\xC3\xB9 aggrada, tabacco a profusione e Venere illesa in resa.\r\n\
    \r\n\
    A tutti i partecipanti il premio del piacere del gioco fine a se stesso.\r\n"
  recapitogoliarda1: "1187"
