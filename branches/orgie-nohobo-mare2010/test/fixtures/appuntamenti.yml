  ID_appuntamento: "1082"
  data_invio: 2007-10-16 19:41:58
  note: "Cena europea sulle Tradizioni Studentesche 3 novembre 2007a Strasburgo sotto l'Alto Patronato della Signora Elisabetta ELLISON-KRAMER Console d'Austria\r\n\
    \r\n\
    \r\n\
    L'Associazione dei Faluchards Alsaziani vi invita ad una grande cena europea a Strasburgo. Quest\xE2\x80\x99evento ha per scopo di fare incontrare studenti di tutti i paesi dell'Europa tramite le loro tradizioni studentesche in occasione di una cena per stringere relazioni durature ed amichevoli.\r\n\
    \r\n\
    Nel quadro di un progetto realizzato con alcuni amici belgi, ci piacerebbe riunire i canti della vostra citt\xC3\xA0/facolt\xC3\xA0/il vostro ordine, come degli elementi storici ed esplicativi delle vostre tradizioni studentesche. Sarebbe possibile che ci trasmetteste questi documenti, formato Word, prima del 30 settembre?*\r\n\
    \r\n\
    Condizioni-    \r\n\
    \r\n\
    Prezzo:  40 \xE2\x82\xAC  a testa per il sabato tutto compreso-    \r\n\
    Alloggio:  in parte in case private, in parte in albergo-    \r\n\
    Tenuta:  \xC2\xA7    ragazzo:  abito con cravatta o abito tradizionale\xC2\xA7    ragazze:  abito, tailleur ecc., o abito tradizionale\r\n\
    \r\n\
    IscrizioniData limite: 25 ottobre"
