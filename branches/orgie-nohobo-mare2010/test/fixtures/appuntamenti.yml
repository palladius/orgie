appuntamenti_758: 
  Abdicabilita: "100"
  luogo: |-
    Appuntamento ne lo die XIII de lo
    Juniolino Menstruo presso 
    Piazza Carignano, a partire
    da la VI ora Pomeridiana.
  Nome: Augusta Taurinorum
  ID_appuntamento: "1177"
  data_invio: 2008-05-05 14:01:59
  note: "Constatato lo periodo di Bagordi che lo Studente intrattiene ne lo suo Vagare presso le Nobili Aule de li Alti Dignitari de lo intero Stivale,\r\n\
    <BR> \r\n\
    a nome di \r\n\
    <br><c>\r\n\
    <h1>Sua</h1><br> <h1>Santit\xC3\xA0</h1><br>\r\n\
    Baldovinus Renatus XIII Celticus<br>\r\n\
    L Pontifex Maximus Goliardorum\r\n\
    </c><br>\r\n\
    siamo lieti di Invitare le Vostre gaudenti schiere presso la nostra Santa Augustana Ecclesia, acciocch\xC3\xA8 la preghiera de li Nostri Santi possano purificarci tutti \r\n\
    con abbondante Ablutione in Bacco, Redentione in Venere et Beneditione in Tabacco, cos\xC3\xAC come Nostra Sancta Mater Goliardia detta.\r\n\
    <br>\r\n\
    L'intera Liturgia si svolger\xC3\xA0 ne li Gloriosi Giorni XIII, XIV et XV de lo Juniolino Mentsruo, et secondo li Antichi Messali, avr\xC3\xA0 come tema:\r\n\
    <br><c>\r\n\
    <h1>LO COSTUME.</h1>"
