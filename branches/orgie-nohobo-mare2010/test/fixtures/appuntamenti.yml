appuntamenti_282: 
  Abdicabilita: "15"
  luogo: "Circolo Garibaldi, via Giuria 56, Torino (\xC3\xA8 vicino all'incrocio tra c.so Dante e c.so Massimo)\r\n"
  Nome: GRANDE FIESTA LATINA dai DRUIDI
  ID_appuntamento: "521"
  data_invio: 2004-02-20 14:01:45
  note: "Si svolger\xC3\xA0 una mega festa di carnevale su sfondo latino americano, aperta a goliardi e non. Per cui spargete la Voce alle masse bailanti.\r\n\
    \r\n\
    Ci sar\xC3\xA0 sangria a go go e stuzzichini vari. Balli latino americani e tante sorprese. Il garibaldi sar\xC3\xA0 traformato in un quartiere de l'Avana e vestiremo Terzo Mondo da ballerina si Salsa.\r\n\
    \r\n\
    Tutti sono invitati a venir vestiti in ambito ispanico, latino americano, hawaiano e messicano (tutto ci\xC3\xB2 che possa essere in tema con l'ambiente palmizio tropicale).\r\n\
    \r\n\
    Gi\xC3\xA0 mi vedo Lord'O con sombrero e vestito da messicano.\r\n\
    Organizzeremo inoltre un mini corso per principianti per far ballare persino Ulul\xC3\xA0 e Oslo...\r\n\
    \r\n\
    Omega lo stiamo quasi convincendo a ballare, per cui non potete non venire...\r\n\
    Sar\xC3\xA0 comunque aperto il bar per gli scazzanti e per coloro che non ballano.\r\n\
    \r\n\
    Per altre informazioni mander\xC3\xB2 l'invito dettagliato o se volete vedere il volantino andate in facolt\xC3\xA0 e vedrete il nostro invito affisso alle masse.\r\n"
  recapitogoliarda1: "191"
