appuntamenti_643: 
  Abdicabilita: "95"
  luogo: |
    segui il Barone dell'Idromele di Montelago Lord'O e la sua botticella piena del prezioso nettare.. non potrai sbagliarti!
    
    
    

  Nome: ---> Montelago Celtic Night <---
  ID_appuntamento: "1014"
  data_invio: 2007-05-24 01:05:10
  note: "Un evento giunto alla quinta edizione che ha finora richiamato pi\xC3\xB9 di 70.000 presenze provenienti da tutta Italia. Montelago Celtic Night \xC3\xA8 l\xE2\x80\x99appuntamento imperdibile per chi coniuga amore per la musica e rispetto per l\xE2\x80\x99ambiente, per chi si sente in pace con il mondo e apprezza la frugalit\xC3\xA0 della vita nomade in tenda. E\xE2\x80\x99 ancora un esempio di come musica e cultura siano grandi veicoli per la conoscenza del territorio e lo sviluppo turistico.\r\n\
    \r\n\
    Infoline: Arte Nomade tel 0733.201359 \r\n\
    E-mail artenomade@artenomade.com\r\n\
    \r\n\
    INFO MONTELAGO CELTIC NIGHT\r\n \r\n\
    Dove - Montelago \xC3\xA8 un altopiano posto a 1000 metri s.l.m. in cui convergono i confini dei comuni di Sefro, Camerino e Serravalle del Chienti.\r\n \r\n\
    Quando - Montelago Celtic Night si svolge Sabato 4 agosto dal tramonto fino all\xE2\x80\x99alba del giorno successivo.\r\n \r\n\
    Programma 2007\r\n \r\n\
    \r\n\
    GIOCHI CELTICI ore16:00\r\n\
    MOGUL (Germania) ore 21:00\r\n\
    VINCANTO (Marche) ore 22:45\r\n\
    WIG A WAG (Francia)  ore 01:00\r\n\
    GENS D\xE2\x80\x99YS (Lombardia) ore 02:45\r\n\
    MONTELAGO CELTIC PROJECT (Marche) ore 03:45\r\n\
    MCBETH (Marche) ore 5:00 \r\n \r\n\
    STAGES \r\n \r\n\
    \r\n\
    Cornamusa scozzese a cura di Franco Calanca\r\n\
    Inizio Stage ore 17,00\r\n\
    per prenotazioni e-mail: artenomade@artenomade.com \r\n\
    o dalle ore 14,00 del 4 agosto presso la tenda di Arte Nomade\r\n\
    \r\n\
    Danze celtiche a cura di Gens d\xE2\x80\x99Ys\r\n\
    Inizio Stage ore 17,00\r\n\
    per prenotazioni e-mail: umberto.crespi@fastwebnet.it \r\n\
    o dalle ore 14,00 del 4 agosto presso la tenda di Arte Nomade\r\n\
    \r\n\
    Arpa celtica a cura di Katia Zunino\r\n\
    Inizio Stage ore 16,00\r\n\
    per prenotazioni tel. 3336203379\r\n\
    o dalle ore 14,00 del 4 agosto presso la tenda di Arte Nomade\r\n\
    \r\n\
    Combattimenti con spade a cura di Behoram Wallace\r\n\
    Inizio Stage ore 15,00\r\n\
    per prenotazioni tel. 3478633814 \r\n\
    o dalle ore 14,00 del 4 agosto presso la tenda di Arte Nomade\r\n \r\n\
    \r\n\
    GIOCHI CELTICI \r\n \r\n\
    \r\n\
    MONTELAGO CELTIC GAMES 2006\r\n\
    \r\n\
    LANCIO DEL TRONCO\r\n\
    LANCIO DELLA PIETRA\r\n  \r\n\
    \r\n\
    LANCIO DEL TRONCO  \r\n  Finalit\xC3\xA0: Il concorrente dovr\xC3\xA0 lanciare pi\xC3\xB9 lontano possibile un tronco di lunghezza variabile in base alle categorie. La vittoria andr\xC3\xA0 al concorrente che lancer\xC3\xA0 il tronco pi\xC3\xB9 distante dalla linea di separazione delle aree del campo di gioco.  \r\n \r\n\
    Regole: Il concorrente dovr\xC3\xA0 sorreggere il tronco con le due mani unite impugnando il tronco alla base; per l\xE2\x80\x99eventuale rincorsa avr\xC3\xA0 a disposizione un\xE2\x80\x99area di mt. 5 (Pedana di Spinta) delimitata da una linea rossa che non potr\xC3\xA0 in alcun modo essere sorpassata o calpestata. Eventuali infrazioni a quanto sopra decreteranno la nullit\xC3\xA0 del lancio. La lunghezza del lancio sar\xC3\xA0 calcolata tra il limite della linea rossa (verso l\xE2\x80\x99Area di Lancio) e la parte del tronco pi\xC3\xB9 vicina ad essa. Per raggiungere la distanza ottimale il concorrente avr\xC3\xA0 a disposizione tre lanci da effettuarsi a rotazione con gli altri concorrenti. L\xE2\x80\x99ordine di lancio verr\xC3\xA0 sorteggiato dalla giuria prima dell\xE2\x80\x99inizio della gara. \r\n\
    \r\n\
    Nelle gare saranno presenti due categorie: \r\n\
    \r\n\
    1- Highlanders (Tronco da 3 metri) \r\n\
    \r\n\
    2- Ladies (tronco da 1,8 metri) \r\n\
    \r\n \r\n \r\n \r\n  \r\n \r\n\
    \r\n\
    LANCIO DELLA PIETRA \r\n\
    Finalit\xC3\xA0: Il concorrente dovr\xC3\xA0 lanciare pi\xC3\xB9 lontano possibile una pietra di peso variabile in base alle categorie. La vittoria andr\xC3\xA0 al concorrente che lancer\xC3\xA0 la pietra pi\xC3\xB9 distante dalla linea di separazione delle aree del campo di gioco. \r\n \r\n\
    Regole: Il concorrente dovr\xC3\xA0 sorreggere la pietra con le due mani unite e la lancer\xC3\xA0 all\xE2\x80\x99indietro facendosela passare sopra la testa; il lancio dovr\xC3\xA0 essere effettuato senza rincorsa e la linea rossa non potr\xC3\xA0 in alcun modo essere sorpassata o calpestata. Eventuali infrazioni a quanto sopra decreteranno la nullit\xC3\xA0 del lancio. \r\n\
    \r\n\
    La lunghezza del lancio sar\xC3\xA0 calcolata tra il limite della linea rossa (verso l\xE2\x80\x99Area di Lancio) e la parte  della pietra pi\xC3\xB9 vicina ad essa Per raggiungere la distanza  ottimale il concorrente avr\xC3\xA0 a disposizione tre lanci da effettuarsi a rotazione con gli altri concorrenti. L\xE2\x80\x99ordine di lancio verr\xC3\xA0 sorteggiato dalla giuria prima dell\xE2\x80\x99inizio della gara. \r\n\
    \r\n\
    Nelle gare saranno presenti due categorie: \r\n\
    \r\n\
    1- Highlanders \r\n\
    \r\n\
    2- Ladies \r\n\
    \r\n \r\n \r\n \r\n\
    ISCRIZIONI: fino al 2 agosto ARTE NOMADE Tel. 0733.201359 Fax 0733.203258 email artenomade@artenomade.com \r\n\
    \r\n\
    Dal 3 agosto fino alle ore 16 del 5 agosto direttamente presso lo stand informazioni \r\n\
    \r\n\
    INIZIO GARE Sabato 4 agosto ore 16:00\r\n \r\n\
    PER TUTTI GLI STANDISTI DEL MERCATINO CELTICO\r\n \r\n\
    Tutti gli standisti di artigianato celtico che vogliono partecipare come espositori alla notte di Montelago possono fare riferimento per la prenotazione spazi a Giuseppe Lupi, telefonicamente al 3286183552 o tramite e-mail: peppelupi@inwind.it . \r\n\
    vi ricordiamo che per partecipare \xC3\xA8 obbligatoria la prenotazione. \r\n\
    \r\n \r\n\
    mappa per raggiungere il posto!!\r\n\
    \r\n\
    http://www.artenomade.com/festival/attuali/montelago/catrtina_montelago_smol.jpg\r\n \r\n\
    \r\n\
