appuntamenti_416: 
  Abdicabilita: "50"
  luogo: "Ferrara, ritrovo venerd\xC3\xAC 22 in stazione dalle ore 19 con aperitivo, trasferimento alla  Cena Grande del Ducatus Estensis e Festa Danzante; sabato 23 inaugurazione con aperitivo in Castello, pranzo, Ludi Lazzi et Sollazzi in Piazza, cena per i superstiti e ballo; domenica colazione con gli irriducibili e saluti."
  Nome: Feriae Matricularum Ducatus Estensis
  ID_appuntamento: "709"
  data_invio: 2005-03-23 10:54:46
  note: "<b>Venerd\xC3\xAC 22:</b><br>\r\n\
    ore 18:30 - Chiusura della mostra fotografica sui 60 anni del Ducatus Estensis - Associazione Ferrarese Universitaria de li 4S<br>\r\n\
    ore 19:00 - Accoglienza ospiti in stazione con aperitivo e preparazione della carovana verso la cena<br>\r\n\
    ore 21:00 - Cena al ristorante Elsa a Vigarano Mainarda<br>\r\n\
    ore 01:00 - Festa Danzante con sorpresa allo Spirito, sempre a Vigarano<br>\r\n\
    <b>Sabato 23:</b><br>\r\n\
    ore 07.30 - Liberatio Scholarum<br>\r\n\
    ore 10.30 - Aperitivo in Castello con apertura delle Feriae Matricularum<br>\r\n\
    ore 12.30 - Pranzo de li Capi Ordine Sovrani e de li altri Goliardi ospiti<br>\r\n\
    ore 16.00 - Ludi Lazzi et Sollazzi in centro e Maialiadi<br>\r\n\
    ore 19.30 - Aperitivo per chi resta<br>\r\n\
    ore 21.00 - Cena con i superstiti organizzata dagli Ordini Vassalli<br>\r\n\
    ore 00.00 - Altra Festa Danzante con altra sorpresa<br>\r\n\
    <b>Domenica 24:</b><br>\r\n\
    ore 12.00 - Colazione con gli irriducibili e arrivederci alla prossima occasione!<br>\r\n\
    <br>Per info: <br>\r\n\
    Psycho - Gran Maestro a le Crapule et a li Bagordi 3357896995<br>\r\n\
    Adamo - Gran Maestro OCS 3405670633<br>\r\n\
    Amicici - Governatore BOP 3334611930<br>"
