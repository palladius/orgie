    Gli orari sono molto indicativi. Alle 8.30 inizier\xC3\xA0 tutto l'ambaradan e verso le 11.30 dovrebbe esserci la proclamazione.\r\n\
    Dopo ci si sposter\xC3\xA0 tutti quanti al Garibaldi, Via Pietro Giuria 56, a mangiare bere fumare scopare o a fare quel cacchio che volete. Vi aspetto numerosi."
