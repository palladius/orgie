appuntamenti_375: 
  Abdicabilita: "95"
  luogo: |-
    Al Cinese in Vicolo dei Ranocchi, traversa di v. Orefici.
    <br>
    <br>
    Segue nelle note un copia/incolla della mail di invito a 15 pochi fortunati... lo pubblico sul sito ma le persone noiose e troppo inquadrate  non si ritengano invitate(me escluso)!
  Nome: Cena Asinelli
  ID_appuntamento: "655"
  data_invio: 2004-11-07 17:06:15
  note: "Lunedi' 8 novembre si pensava io e Bimbogigi di fare una serata al cinese 'maldistomaco' in Vicolo dei Ranocchi (traversina di V Orefici per chi non avesse la cultura goliardico/culinaria di averlo nell'imprinting genetico labiale/dentale/palatale/sboccale).\r\n\
    Confermati siamo io Bimbogigi e Titanicus e Mannarus, per ora. Estendo l'invito a tutti.<br>\r\n\
    Se avete in mente qualche casinista da aggregare fatermi sapere  ed estendete l'invito agratis.<br>\r\n\
    Propongo di trovarci tutti in vicolo Ranocchi al cinese alle ore <b>20.30</b> di lunedi'... le insegne non sono indispensabili ma vi dico subito che solo chi le dimentica a casa pu\xC3\xB2 sperare di poter fallire il colpo di stato, e quindi diventare il nuovo Cromosoma Ipsilon Tre (per l'Ipsilon 10 dovremo aspettare altri 14 colpi di stato, dato che noi e la matematica non siamo mai andati molto d'accordo).<br/>\r\n\
    Poi si potrebbe andare a ragliare in Via Senzanome come la sera di fondazione degli asinelli.\r\n\
    Se qualcuno riesce a contattare anche Valvola e quel simpatico giovanotto del feudo di 2 3 anni fa di cui mi sfugge il nome... l'unica cosa importante \xC3\xA8 che si portino o persone divertenti, o segaioli mentali. Persone normali non ne vogliamo.<br>\r\n\
    <br>\r\n\
    Palladius BuonTonno,<br>\r\n    Primo Unico e Indiscusso Elemento Immaginario degli Asinelli,<br>\r\n       nonch\xC3\xA9 primo segretario alle secrezioni\r\n\
    <br>\r\n\
    PS contattatemi x conferma via mail o via telefono. Al lavoro il mio cell non prende, ma prende l'ufficio che \xC3\xA8 qui sotto. Se non mi dite che ci siete, non mi aspetter\xC3\xB2 che ci siate. E se la serata fa flop perch\xC3\xA8 nessuno mi conferma e all'ultimo BimboGigi e Tit hanno un impegno, cazzi vostri.<br>\r\n\
    Ciao!\r\n\
    <br>\r\n\
    <b>PS</b> Le donne sono assolutamente vietate, i mona sono invece incoraggiati"
  recapitogoliarda1: "31"
  "citt\xC3\xA0": Bologna
  tipodiappuntamento: Altra cena
