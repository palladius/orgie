    Si va a sciare alle ore 9 agli impianti del Col de Joux sopra a Saint Vincent (AO). Se c'e' crisi di neve deviamo in Valtournenche ma, visti i cannoni nuovi di zecca, direi che non dovrebbero esserci problemi. Il giornaliero costa poco (14 euro) e, non essendoci le tessere mageniche, e' facilmente sgamabile. C'e' un bar ed una sola seggiovia quindi anche chi non sciare puo' stare tranqui a prendere il sole e godersi le cadute dei temerari...
    Altre cose da spiegare non ce ne sono, e' il tipico e mitico DisOrdine della Grolla!!!
    
