  luogo: "Signori \xC3\xA8 giunta l'ora. Dopo dieci anni di onorata (poco) carriera universitaria \xC3\xA8 arrivato il momento di cedere lo scettro di mega fuori corso ad un impavido pretendente.\r\n\
