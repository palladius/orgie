appuntamenti_617: 
  Abdicabilita: "100"
  luogo: "La Cena, come da antiquissima atque notissima tradizione dell'Eccelsa Balla del Nettuno, si terr\xC3\xA0 in una meravigliosa villa rinascimentale, adorna di tappeti preziosi e pregevoli statue, inserita perdipi\xC3\xB9 in una lasciva cornice di verde, con estesi giardini in cui dare sfogo alle Vostre pi\xC3\xB9 lascive inclinazioni.\r\n\
    \r\n\
    \r\n"
  Nome: Cena di Gran Gala dell'Eccelsa Balla del Nettuno
  ID_appuntamento: "981"
  data_invio: 2007-01-22 15:13:46
  note: "Ferma il tuo sguardo, o ramingo esploratore della perigliosa rete. Un bivio si apre ora davanti ai tuoi occhi stanchi e gli strumenti per decidere in tua mano sono davvero pochi.. apparentemente. L\xE2\x80\x99unico dato a tua disposizione \xC3\xA8 che mancano pochi volger di lune a un Misterioso Evento.. una serata che sconvolger\xC3\xA0 percezioni, idee, valori, abitudini sessuali e tutto ci\xC3\xB2 che fa della tua vita ci\xC3\xB2 che essa \xC3\xA8 in questo momento. La Cena al paragone della quale tutte le altre cercheranno nascondiglio.. a te la scelta, ora: pillola BiancoNera o pillola Grigia? Chi non c\xE2\x80\x99\xC3\xA8, non ci sar\xC3\xA0!\r\n\
    \r\n\
    (Per ovviare alle difficolt\xC3\xA0 derivanti dall'inflazione, dal carovita e dai soldi da Voi scialacquati nella frequentazione di peripatetiche, il prezzo della cena verr\xC3\xA0 mantenuto sotto i 20 Marchi Potaniani, il ch\xC3\xA8 equivale all'incirca a una ventina di euro. Dato l'alto livello della Nostra bellezza, \xC3\xA8 gradito nonch\xC3\xA8 consigliato, per quanto non esatto (da \"esigere\"), l'abito scuro per gli uomini, nonch\xC3\xA8 lungo per le donne. I trans e gli indecisi si vestano secondo il proprio impeccabile gusto.)\r\n\
    \r\n"
  recapitogoliarda1: "1640"
  "citt\xC3\xA0": Bologna
  tipodiappuntamento: Altra cena
  recapitogoliarda2: "499"
  data_fine: 2007-03-17 00:00:00
  id_login: "184"
  recapitogoliarda3: "0"
  data_inizio: 2007-03-16 00:00:00
