  note: "Come al solito vi ricordo che per fare la via Trucis consiglio scarpe comode e magari stomaco pieno, l'ultima tappa \xC3\xA8 come al solito a Grappa!!! E state attenti a non perdervi!!\r\n\
    Consiglio a chi ne fosse munito di portare, per sicurezza, il sacco a pelo, oppure un sacco di peli, fate voi. "
