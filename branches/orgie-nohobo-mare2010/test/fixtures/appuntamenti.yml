appuntamenti_576: 
  Abdicabilita: "100"
  luogo: Serramonacesca (o Piano d'Orta di Bolognano), entrambi in provincia della ridente cittadina di Pescara
  Nome: Sublime Arrostellata
  ID_appuntamento: "926"
  data_invio: 2006-08-09 19:53:37
  note: "Per chiunque non abbia un cazzo da fare il giorno di Ferragosto, e voglia godersi una SUBLIME mangiata di arrosticini, sto organizzando una arrostellata nell'entroterra pescarese. Alcuni piccoli accorgimenti:\r\n\
    1) Visto che non andiamo al ristorante, ma devo comprare da mangiare io, ho bisogno delle conferme dei partecipanti AL PIU' TARDI entro il 12, senn\xC3\xB2 chi tardi arriva... niente mangia! Gli arrosticini devo prenotarglieli per ferragosto, o mi manda a cagare la macellaia.\r\n\
    \r\n\
    2) Il costo della giornata non \xC3\xA8 chiaramente stabilibile in anticipo, ma dovr\xC3\xB2 fare la colletta al momento dell'arrivo. Colletta che sara equamente divisa fra tutti i partecipanti in base a quanto ho speso. Capi(popolo/ordine/citt\xC3\xA0/balla/universo) NON sono accreditati, anche perch\xC3\xA8...\r\n\
    \r\n\
    3) NON \xC3\xA8 un evento goliardico. Se volete portare qualsiasi cosa al collo o in testa, non aspettatevi che TUTTI abbiano voglia di giocare con voi. I mantelli li sconsiglio, non mi sembra il posto adeguato al giusto mantenimento delle propriet\xC3\xA0 coesive delle fibre che li compongono...\r\n\
    \r\n\
    4) L'appuntamento \xC3\xA8 alla MATTINA, non alla sera. L'idea \xC3\xA8 partire di buon'ora per riuscire ad arrivare prima che i posti siano troppo affollati per poter stare in pace. Tendenzialmente la mia idea \xC3\xA8 vederci intorno alle 10 alla vecchia stazione dei treni di Pescara (o anche alla nuova, visto che credo sia pi\xC3\xB9 comodo per tutti, sebbene ci sia meno parcheggio).\r\n\
    \r\n\
    Sperando di poter godere della piacevole compagnia di quanti pi\xC3\xB9 fratelli possibile (e sperando anche di avere abbastanza macchine per portare tutti, altrimenti la gente resta a pedagna e Serramonacesca non \xC3\xA8 vicinissima...) mando a tutte voi femmine una Sublime palpata sul gluteo sinistro! Mi raccomando, accorrete numerose! Il programma prevede svariati giochi erotici di gruppo oltre ai soliti veniali divertimenti tanto d'uso in cotal forma di celebrazioni."
