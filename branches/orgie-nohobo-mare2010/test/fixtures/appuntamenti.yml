appuntamenti_620: 
  Abdicabilita: "0"
  luogo: |
    Saint Vincent (AO) - Col de Joux - Loc. Pallu 20 - Sciata e cena nello stesso posto.
    

  Nome: X DisOrdine della Grolla
  ID_appuntamento: "984"
  data_invio: 2007-01-28 18:06:44
  note: |-
    I goliardi valdostani sono lieti d'invitarvi nella loro terra per questa fantastica festa in montagna.
    Siamo ormai giunti alla decima edizione della giornata goliardica sulla neve piu' famosa del pianeta. Centinaia di feluche hanno gia' solcato le piste valdostane ed hanno gustato le pietanze tipiche in tutti questi anni.
    Sabato 10 febbraio 2007 dalle ore 9 (del mattino) ci troviamo sulle piste da sci del colle de joux sopra saint vincent dove scieremo nelle mitiche 3 piste alla modica cifra di 18 euro per il giornaliero e 14 per il pomeridiano. Una seggiovia ci porta in cima al monte in modo da poter confluire a valle ritrovandoci sempre tutti assieme al bar. Quindi sono benvenuti tutti, anche coloro che non sanno sciare.
    Quest'anno ritorniamo alla formuna denominata "distruzione", in pratica si mangia nello stesso locale delle piste polenta concia, selvaggina e vino a nastro.
    Il costo della cena (rigorosamente alle ore 19), senza nessun tipo di accredito o entrata con solo bevuta, viene 20 euro per tutti, me compreso!!! :-)
    
    Attenzione che e' obbligatoria la prenotazione la mio numero: 347.9666106
    A chi serve da dormire ce la vediamo direttamente li' visto che Woby ci tiene ad avere degli ospiti in casa... :-)
    
    V'aspettiamo...
    RulS*
    
    Bollettino neve: http://www.regione.vda.it/turismo/discesanew_i.asp?fk_analoc=37&pk=424
    
    Ecco il percorso da Torino:
    http://www13.mappy.com/sidvRbT77lyKzrMn21w/CFGT?anchor=0&option=0&csl=i1%2Cv1%2Cv2%2Cv3%2Cv4%2Cv5%2Ci2&fsl=i1%2Cv1%2Cv2%2Cv3%2Cv4%2Cv5%2Ci2&gsl=i1%2Cv1%2Cv2%2Cv3%2Cv4%2Cv5%2Ci2&isl=i0&ivsl1=v1&ivsl2=v2&ivsl3=v3&ivsl4=v4&ivsl5=v5&iveh=car&isveh=sedcar&xsl=2&out=2&issl=i1&iesl=i2&wci1=3358055&wni1=corso+giulio+cesare&noi1=&tci1=74151&tni1=torino&pci1=&a10i1=&cci1=380&wci2=4021443&noi2=&wni2=pallu&tci2=73839&tni2=saint+vincent&pci2=&a10i2=&cci2=380&imode=0&wnv1=&wcv1=&nov1=&tnv1=&pcv1=&tcv1=&a10v1=&xv1=&yv1=&csv1=4326&CAN=&USA=&ccv1=380&cov1=EU&wnv2=&wcv2=&nov2=&tnv2=&pcv2=&tcv2=&a10v2=&xv2=&yv2=&csv2=4326&CAN=&USA=&ccv2=380&cov2=EU&wnv3=&wcv3=&nov3=&tnv3=&pcv3=&tcv3=&a10v3=&xv3=&yv3=&csv3=4326&CAN=&USA=&ccv3=380&cov3=EU&wnv4=&wcv4=&nov4=&tnv4=&pcv4=&tcv4=&a10v4=&xv4=&yv4=&csv4=4326&CAN=&USA=&ccv4=380&cov4=EU&wnv5=&wcv5=&nov5=&tnv5=&pcv5=&tcv5=&a10v5=&xv5=&yv5=&csv5=4326&CAN=&USA=&ccv5=380&cov5=EU&order=0&x=12&y=12
    
