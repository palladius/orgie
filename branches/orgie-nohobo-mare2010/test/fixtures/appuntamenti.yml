    \r\n\
    \r\n\
    \r\n\
    Marted\xC3\xAC 2 Maggio\r\n\
    \r\n\
    \xE2\x80\xA2\tore 23:00   Apertura ufficiosa delle Feriae Matricularum 2006 al Teatro dei Rozzi con fuochi d\xE2\x80\x99artifizio in piazza del Campo\r\n\
    \r\n\
    Mercoled\xC3\xAC 3 Maggio\r\n\
    \r\n\
    \xE2\x80\xA2\tore 8:30   Liberatio Scholarum\r\n\
    \xE2\x80\xA2\tore 12:30   Apertura ufficiale delle Feriae con la carciofata in piazza Tolomei\r\n\
    \xE2\x80\xA2\tore 13:30   Pranzo in onore della Madrina nel Cortile del Podest\xC3\xA0\r\n\
    \r\n\
    Gioved\xC3\xAC 4 Maggio\r\n\
    \r\n\
    \xE2\x80\xA2\tore 9:30   Liberatio Scholarum\r\n\
    \xE2\x80\xA2\tore 13:30   Pranzo a gruppi di studenti di vario genere e tipologia                            \r\n\
    \xE2\x80\xA2\tore 17:00   Concerto di Apertura delle Feriae Matricularum 2006 in Piazza Indipendenza: i Goliardi, impegnati alternativamente nelle prove pomeridiane in Teatro, saranno chiamati a partecipare vivacemente al concerto, aperto a tutta la cittadinanza, in cui suoneranno a rotazione gruppi di vario genere e per il quale sar\xC3\xA0 allestito un palco, un bar, tavolini e quant\xE2\x80\x99altro. Il concerto durer\xC3\xA0 fino all\xE2\x80\x99inizio dell\xE2\x80\x99Operetta.\r\n\
    \xE2\x80\xA2\tore 21:00   Prima rappresentazione dell\xE2\x80\x99Operetta goliardica \xE2\x80\x9CLa Serenissima burlata\xE2\x80\x9D\r\n\
    \xE2\x80\xA2\tore 24:00   Cena degli attori nella Contrada della Selva\r\n\
    \r\n\
    Venerd\xC3\xAC 5 Maggio\r\n\
    \r\n\
    \xE2\x80\xA2\tore 9:30   Liberatio Scholarum\r\n\
    \xE2\x80\xA2\tore 13:30   Pranzo a gruppi di studenti di vario genere e tipologia                             \r\n\
