  luogo: "Festa della birra Hofbr\xC3\xA4u organizzata dalla HB Genova presso il Parco Braia di Crocefieschi, localita' gia conosciuta da alcuni personaggi della Fenice e di Congiura. La festa dovrebbe iniziare intorno alle diciotto e finire teoricamente intorno alle 5.30 di ogni giorno.\r\n"
  Nome: "HOFBR\xC3\x84U CR\xC3\x9BXE BIERFEST"
  ID_appuntamento: "927"
  data_invio: 2006-08-10 22:24:47
  note: "Arriveranno una paio di TIR di birra Hofbr\xC3\xA4u in anteprima (e' la Marzen per l'Octoberfest), cibo e musica in tema fino alla mezzanotte (dallo stinco all'orchestrina dell'HB di Monaco), poi subentra un DJ. Durante il giorno se non volete riprendervi sono disponibili alcune attivita' del Parco Braia. \r\n\
    Importante: area di campeggio ad accesso GRATUITO.\r\n\
    Io saro' li' coi miei sodali, se mi piacete vi salutero'."
