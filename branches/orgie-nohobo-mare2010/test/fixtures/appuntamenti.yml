    Siamo in trattativa con un posto.
  Nome: Compleanno Paladano
  ID_appuntamento: "817"
  data_invio: 2005-12-21 15:04:28
  note: "Il compleanno unificato Palladius e Aladano vedr\xC3\xA0 per la prima volta riuniti a un'unica tavola persone di tutte le et\xC3\xA0, dai 6 mesi a 40 anni. Se ho dimenticato di dirlo a qualcuno di voi, fatemelo presente dandomi dello stronzo o per telefono o via mail.\r\n\
    \r\n\
    ( Aladano ha deciso di fare il compleanno con me perch\xC3\xA9, compiendoli il 30, si era stancato di rovinare a s\xC3\xA8 e agli amici il fegato la vigilia di capodanno )"
