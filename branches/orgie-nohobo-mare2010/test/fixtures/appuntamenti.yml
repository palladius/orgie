appuntamenti_749: 
  Abdicabilita: "69"
  luogo: "Ovviamente si svolger\xC3\xA0 nelle terre camerti.\r\n\
    \r\n\
    Rendez Vous Venerd\xC3\xAC 23 Maggio ore 16:00 presso Dada Zen\r\n\
    Via XX Settembre\r\n\
    Camerino (MC)"
  Nome: Feriae Matricularum Camerini
  ID_appuntamento: "1166"
  data_invio: 2008-05-08 16:45:19
  note: "PROGRAMMA FERIAE MATRICULARUM\r\n\
    \r\n\
    VENERDI 23 MAGGIO\r\n\
    * Ore 16:00 Accoglienza delegazioni estere presso Dada Zen\r\n\
    * Ore 18:00 Palio degli Arcieri e Visita alla Citt\xC3\xA0\r\n\
    * Ore 20:00 Pizzata offerta sotto le stelle\r\n\
    * Ore 21:30 Echi di Guerra in Piazza\r\n\
    * Ore 02:00 Il riposo del GranDuca\r\n\
    \r\n\
    SABATO 24 MAGGIO\r\n\
    * Ore 12:00 Colazione del Campione (Aperitivo presso Bar Centrale)\r\n\
    * Ore 13:00 Pranzo offerto in Piazza\r\n\
    * Ore 13:00 Pranzo dei Capicitt\xC3\xA0\r\n\
    * Ore 15:00 Disfida Medievale\r\n\
    Elezione della \xE2\x80\x9CDama del Torneo\xE2\x80\x9D (premiata con una bottiglia a sorpresa ed una notte di passione con il GranDuca)\r\n\
    Al miglior giostrante una bottiglia di Verdicchio\r\n\
    Alla squadra vincitrice una damigiana da 5 litri di vino\r\n\
    Al Capitano della Squadra Vincitrice una Passerina\r\n\
    * Ore 17:00 Palietto Goliardico\r\n\
    * Ore 19:00 Merenda del Campione (Aperitivo presso Bar Centrale)\r\n\
    * Ore 20:00 Cena nel portico con il sistema APQ (Associazione Proletaria Questua free), il costo della cena sar\xC3\xA0 di 10 euro\r\n\
    * Ore 23:00 Canti e sollazzi\r\n\
    \r\n\
    N.B.\r\n\
    Le prenotazioni dovranno arrivare entro e non oltre il 19 Maggio 2008 per facilitare l'ospitalit\xC3\xA0.\r\n\
    \r\n\
    A causa delle condizioni in cui si trovano le casse cittadine verranno accreditati solo i Capi Citt\xC3\xA0 effettivamente presente ed i Capi Ordine con al seguito almeno 5 persone\r\n\
    \r\n\
    Le Feriae sono state pensate per essere vissute con una spesa minima da parte dei partecipanti allo scopo di incentivare i giovani (notoriamente studenti squattrinati) a muoversi."
  recapitogoliarda1: "2458"
  "citt\xC3\xA0": Camerino (MC)
