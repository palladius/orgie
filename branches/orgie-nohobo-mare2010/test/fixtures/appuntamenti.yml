appuntamenti_322: 
  Abdicabilita: "0"
  luogo: Torino
  Nome: Cena delle Veneri
  ID_appuntamento: "591"
  data_invio: 2004-07-15 01:25:38
  note: "Diletti fratelli, ho il piacere di informarvi che mercoled\xC3\xAC 21 luglio presso \"La Baracca\" in via Passo Buole 45 (proprio di fronte a \"El Paso\"), si terr\xC3\xA0, in un fresco dehor all'aperto, la prima \"Cena delle Veneri\".\r\n\
    Si tratta di una cena a cui parteciperanno le modelle che hanno dato vita al calendario delle Veneri 2004.\r\n\
    L'invito \xC3\xA8 aperto a tutti, basta farmi sapere entro luned\xC3\xAC, marted\xC3\xAC al pi\xC3\xB9 tardi, chi ha piacere di partecipare.\r\n\
    \r\n\
    Il prezzo della cena si aggirer\xC3\xA0 sui 15 euro per persona.\r\n\
    \r\n\
    Durante la cena verr\xC3\xA0 presentato il CD contenente tutti gli scatti del calendario, il back stage ed il famoso tetta contest che ho fotografato all'ultima cena Merlin.\r\n"
  recapitogoliarda1: "224"
  "citt\xC3\xA0": Torino
  tipodiappuntamento: Altra cena
  recapitogoliarda2: "435"
  data_fine: 2004-07-21 01:25:38
  id_login: "217"
  recapitogoliarda3: "0"
  data_inizio: 2004-07-21 20:00:00
