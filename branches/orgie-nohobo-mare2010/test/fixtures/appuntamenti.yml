  Abdicabilita: "100"
  luogo: "Si inizia in Piazza Verdi, poi ci si sposter\xC3\xA0 a al Nettuno.\r\n\
    \r\n\
    O viceversa.\r\n\
    \r\n\
    Oppure no."
  Nome: Tarantellata - Guarattellata Meridionale
  ID_appuntamento: "1081"
  data_invio: 2007-10-15 12:07:40
  note: "Con l'arrivo di ottobre, nella citt\xC3\xA0 felsinea l'autunno \xC3\xA8 presenza oramai stabile.\r\n\
    \r\n\
    Con freddo, pioggia e vento alcuni frutti tipici della bella stagione scompaiono dalle nostre tavole per ritornare solo in estate.\r\n\
    \r\n\
    E' il caso di un particolare frutto del Sud Italia: l' \"anguria semi-dolce\" meglio conosciuta come \" 'O Cetrulo\".\r\n\
    \r\n\
    Per festeggiare l'evento adeguatamente, la Societ\xC3\xA0 Organizzatrice di Tradizioni Popolari Meridionali ha organizzato una tipica e folcloristica esibizione di Tarantelle e Guarattelle che si terr\xC3\xA0 al centro di Bologna.\r\n\
    \r\n\
    Vista la sua natura tipicamente rumorosa e clamorosa, l'esibizione - tipicamente terrona - potrebbe disturbare il pudore e la sensibilit\xC3\xA0 dei convenuti non adeguatamente abituati.\r\n\
    \r\n\
    Astenersi perditempo e cacacassi"
