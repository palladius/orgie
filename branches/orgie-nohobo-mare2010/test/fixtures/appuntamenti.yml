appuntamenti_625: 
  Abdicabilita: "95"
  luogo: |
    Torino, Circolo ARCI "La Cadrega", via Principessa Clotilde 23 bis (vicino a Piazza Statuto)
    
    
    
    
    

  Nome: "Compleanno di Qui Ne Bul\xC3\xA8"
  ID_appuntamento: "991"
  data_invio: 2007-02-23 12:58:33
  note: "Compio 26 anni e sono ufficialmente entrato nel mio secondo quarto di secolo!\r\n\
    \r\n\
    Invito quindi alla mia festa di compleanno tutti coloro che hanno avuto l'onore (e non) di farsi triturare le palle dal sottoscritto negli anni passati in giro per l'Italia.\r\n\
    \r\n\
    Come negli anni scorsi la festa \xC3\xA8 a tema: \"Russia e gli stereotipi russi\" (quindi vodka, bionde, caviale, orsi, putin, comunismo ecc ecc). \r\n\
    \r\n\
    Quindi per entrare sara richiesto che portiate su di voi qualcosa di tipicamente russo (un vestito, un oggetto, una cartolina, un orso al guinzaglio, qualunque cosa!). Questo E' OBLIGATORIO :)\r\n\
    \r\n\
    So che vi manca il vostro russo molesto da quando mi sono ritirato in pensione! \r\n\
    \r\n\
    Quindi non rompete le palle e venite a Torino, ci sara gnocca a fiocchi, numeri russi, un sacco di gente e molto posto per dormire (per terra) nella mia nuova casa.\r\n\
    \r\n\
    La festa sara alla Cadrega, \xC3\xA8 un cirolo ARCI ma la tessera questa volta NON \xC3\xA8 obligatoria (se comunque volete farla sono 10 euro con una consumazione in omaggio). Dalle 22.30 fino al mattino. Portate chi volete.\r\n\
    \r\n\
    L'unico appunto: la festa non \xC3\xA8 goliardica, ma una \"normale\" festa di compleanno.\r\n\
    \r\n\
    Perfavore confermate la presenza al mio \r\n\
    cell: 348 2449 123\r\n\
    mail: pavel@maximov.it\r\n\
    \r\n\
    A presto!\r\n\
    \r\n\
    Pavel / Quine\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n"
