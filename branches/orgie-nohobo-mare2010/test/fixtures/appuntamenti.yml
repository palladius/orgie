  luogo: "\"Merenda Sin\xC3\xB2ira\", piazza Hermada 12, Augusta Taurinorum"
  Nome: "Cardinali dell'Apocalisse: Selezione e 1^a merenda"
  ID_appuntamento: "1274"
  data_invio: 2009-04-29 22:17:05
  note: "Dopo tanta attesa, ecco la prima \"merenda Sin\xC3\xB2ira\" dei Cardinali dell'Apocalisse, e l'agognata apertura delle SELEZIONI per il posto vacante di 7\xC2\xB0 Cardinale dell'Apocalisse.\r\n\
    \r\n\
    Tutti i goliardi di almeno 4 bolli possono intervenire alla Merenda Sin\xC3\xB2ira dandone cortese preavviso.\r\n\
    \r\n\
    Tutti coloro che ricoprono la carica di Cardinale Albo d'Oro o superiore (avendo a suo tempo indossato attivamente e degnamente la Porpora Cardinalizia senza decadere) hanno diritto a candidarsi al posto di Cardinale dell'Apocalisse.\r\n\
    \r\n\
    L'invito ufficiale, nella dovuta forma, lo trovate qui:\r\n\
    http://venerabile.altervista.org/docs/invitoMerendaSinoira.pdf"
