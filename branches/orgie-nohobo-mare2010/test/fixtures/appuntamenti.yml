    \xE2\x80\xA2\tore 17:30   Corsa dei Carretti: partenza dalla cima di via del Casato e arrivo davanti al Comune di Siena. Gli studenti concorreranno per la vincita di uno o pi\xC3\xB9 premi (ancora da concordare) consegnati direttamente dalla Madrina nelle mani dei vincenti. \r\n\
    \xE2\x80\xA2\tore 21:00   Seconda rappresentazione dell\xE2\x80\x99Operetta goliardica \xE2\x80\x9CLa Serenissima burlata\xE2\x80\x9D \r\n\
    \xE2\x80\xA2\tore 24:00   Cena degli attori nella Contrada della Selva\r\n\
