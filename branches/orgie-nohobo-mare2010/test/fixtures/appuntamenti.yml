appuntamenti_303: 
  Abdicabilita: "0"
  luogo: |
    Prozzolo (Camponogara - VE)

  Nome: Occidente
  ID_appuntamento: "554"
  data_invio: 2004-05-25 18:15:55
  note: "VENERD\xC3\x8C 4 Giugno  \r\n\
    15:00  Apertura ufficiale al pubblico.  \r\n\
    16:00  Musica e spettacoli itineranti, artigianato, didattica storica sui Popoli e le Culture di Occidente.  \r\n\
    18:30  Rituale di accensione dei fuochi negli accampamenti.  \r\n\
    19:00  Inizio della Rappresentazione Teatrale-Storica e di Combattimento, che con la sua Trama interesser\xC3\xA0 tutta la festa e si concluder\xC3\xA0 Domenica.  \r\n\
    21:00  Rievocazione di un Rituale sacrificale antico con il fuoco e presenza di figure storiche mai rievocate precedentemente.  \r\n\
    22:00  Inizio festa notturna con l'accensione delle fiaccole: canti, ballate, racconti con accompagnamento d'arpa.  \r\n\
    SABATO 5 Giugno  \r\n\
    10:00  Apertura ufficiale al pubblico.  \r\n\
    11:00  Preparazione dell\xE2\x80\x99accampamento romano.  \r\n\
    11:30  Musica e spettacoli itineranti, didattica negli accampamenti, animazione.  \r\n\
    12:30  Corsi e seminari tenuti dai vari gruppi partecipanti: arpa celtica, tiro con l'arco, scherma antica per bambini e per adulti. Antichi mestieri all'opera.  \r\n\
    15:00  Dimostrazioni storiche di collaborazioni, alleanze e Spiritualit\xC3\xA0.  \r\n\
    16:00  Prima fase del I Torneo dei Quattro Popoli di HARPASTUM (Calcio-Rugby dell\xE2\x80\x99Antichit\xC3\xA0).  \r\n\
    17:00  Combattimenti e scontri tra guerrieri.  \r\n\
    19:00  Scontri ed incontri tra culture diverse. Musiche balli e racconti.  \r\n\
    20:00  Scontro finale, e consacrazione dei patti di Alleanza e di Pace.  \r\n\
    21:30  Celebrazione Solare del Fuoco sacro.  \r\n\
    22:00  Inizio festa notturna con l'accensione delle fiaccole: canti, ballate, racconti con accompagnamento d'arpa.  \r\n\
    DOMENICA 6 Giugno  \r\n\
    10:00  Apertura ufficiale al pubblico.  \r\n\
    11:00  Musica e spettacoli itineranti, didattica negli accampamenti. Corsi di arpa celtica e scherma per bambini e adulti. Antichi mestieri all'opera.  \r\n\
    11:30  Fase Finale del Torneo dei Quattro Popoli di HARPASTUM. (Calcio-Rugby dell'Antichit\xC3\xA0).  \r\n\
    12:00  Scontri ed incontri tra culture. Musiche balli e racconti.  \r\n\
    15:00  Scontri tra guerrieri e dimostrazioni di collaborazioni ed alleanze.  \r\n\
    18:00  Musica e spettacoli itineranti, didattica negli accampamenti.  \r\n\
    \r\n\
    www.festivaloccidente.it\r\n\
    \r\n\
    c'\xC3\xA8 possibilit\xC3\xA0 di dormire (in tenda o palazzetto dello sport) e mangiare...per non parlare del bere!\r\n\
    \r\n"
