    \xE2\x80\xA2\tore 17:00   Tentativo di Guinness in Piazza del Campo: i Goliardi, insieme a tutta la cittadinanza (fino a raggiungere un tetto minimo di 3100 persone) tenteranno di battere un Guinness dei Primati ovvero \xE2\x80\x9Cla pi\xC3\xB9 grossa battaglia di cuscini del mondo\xE2\x80\x9D. Una cuscinata, quindi, gigantesca, dove il ricavato della vendita dei cuscini (1,00 \xE2\x82\xAC al pezzo) sar\xC3\xA0 devoluto in beneficenza alla Legatumori senese. All\xE2\x80\x99evento \xC3\xA8 gradita la partecipazione di tutti!\r\n\
