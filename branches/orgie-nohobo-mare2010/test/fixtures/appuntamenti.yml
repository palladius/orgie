  note: "Ottima palestra di allenamento per l'evento postato da Diegus Pinae. \r\n\
    In sostanza:\r\n\
    \r\n\
    -birra di gran qualit\xC3\xA0 \r\n\
    -gastronomia bavarese\r\n\
    -musica tradizionale + disco dalle 0.30 in poi\r\n\
    -ambientazione particolare, fuori dal cemento cittadino\r\n\
    -camping gratuito\r\n\
    \r\n\
    La Birra e' la Hof tedesca preparata per l'Octoberfest, che fermenta da Marzo e si infusta il 30 Agosto come da tradizione. E' un'esclusiva per l'italia! Il posto e' tra La Spezia e Parma, comodo da Genova, Pisa, Parma e Firenze. Per tutti gli altri... volere e' potere....\r\n\
    Per il programma specifico contattatemi."
