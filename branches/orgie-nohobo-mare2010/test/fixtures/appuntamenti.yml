appuntamenti_607: 
  Abdicabilita: "69"
  luogo: "nella Calda Torino, concomitante con la fine delle Universiadi Invernali 2007,si terranno le matricolari + uniche che rare..\r\n\
    incontro il gioved\xC3\xAC pomeriggio, al Poli di corso Duca degli Abruzzi.\r\n\
    nella festa delle matricole pi\xC3\xB9 europea mai vista(ci saranno molti tunos, feluchards e goliardi del belgio) avrete la possibilit\xC3\xA0 di partecipare a manifestazioni sportive ufficiali e finte(quelle delle universiadi), utilizzare mezzi pubblici, visitare musei, mangiare e bere, ovviamente tutto gratis.."
  Nome: Matricolari Augustae Taurinorum
  ID_appuntamento: "962"
  data_invio: 2007-01-15 19:52:32
  note: "Vi comunico che per ottenere i pranzi e le cene gratis dovete iscrivervi al sito <b>www.yeppies.eu</b> mettendo come associazione universitaria \"goliardia\" .E\xE2\x80\x99 importante perch\xC3\xA8, ribadisco, vi permetter\xC3\xA0 di ritirare il pass per il cibo, bus e musei gratuiti. Per il pernottamento non dovete far caso a ci\xC3\xB2 che c'\xC3\xA8 scritto sul sito www.yeppies.eu ... questo serve solo per ottenere il pass cibo musei bus e gare..\r\n\
    I pass si ritireranno il gioved\xC3\xAC(25)pomeriggio all'atrium in piazza Solferino e il venerd\xC3\xAC(26)pomeriggio al poli;poi non pi\xC3\xB9.\r\n\
    E\xE2\x80\x99 necessario che i dati al secolo della persona siano corretti poich\xC3\xA9 il pass \xC3\xA8 nominale.... se non corrispondono...torino offre una bella serie di allegre trattorie in cui potrete mangiare a spese vostre!"
  recapitogoliarda1: "520"
  "citt\xC3\xA0": Torino
  tipodiappuntamento: Festa delle Matricole
  recapitogoliarda2: "0"
  data_fine: 2007-01-28 19:52:32
  id_login: "3"
  recapitogoliarda3: "0"
  data_inizio: 2007-01-28 19:52:32
