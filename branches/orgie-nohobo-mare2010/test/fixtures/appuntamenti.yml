  note: "Venerdi 24 Aprile :\r\n\
    ore 18,00 : Accoglienza Delegazioni Estere in Piazza IV Novembre (quella con la fontana)\r\n\
    ore 18,30 : Ercolano \xC3\xA8 sbronzo dopo aver fatto sgorgare, per l'occasione, tequila dalla fontana\r\n\
    ore 20,30 : Panini, panini, panini e vino a profusione offerti da lo G.G.P.\r\n\
    ore 21,30 : Concerto in Piazza della Repubblica con l'esordio sul palcoscenico mondiale de \"La BandaGrifo\" e del coro russo finto rock new wave italiano free jazz punk inglese nero africano \"WHIP !\"\r\n\
    ore 03,00 : Sogni d'oro ! Si va tutti a nanna...\r\n\
    \r\n\
    Sabato 25 Aprile :\r\n\
    ore 12,00 : Ritrovo in Piazza IV Novembre per un confronto sui postumi della sbronza\r\n\
    ore 13,00 : Pranzo dei Capicitt\xC3\xA0\r\n\
    ore 13,30 : Panini, panini, panini e vino a profusione offerti da lo G.G.P.\r\n\
    ore 16,00 : Corteo storico ed esibizione del \"Gruppo Sbandieratori Citt\xC3\xA0 di San Gemini\"\r\n\
    ore 17,30 : Cammellata Etilica accompagnata dal gruppo folk \"La Rakkia\"\r\n\
    ore 21,30 : Cena del \"Griphonatus Goliardiae Perusinae\" eccezionalmente per questa volta presso il ristorante \"Valentino\"\r\n\
    \r\n\
    Domenica 26 Aprile : \r\n\
    ore 12,00 : Ritrovo alla Stazione di Perugia, partenza della carovana e tutti a pranzo al Lago Trasimeno\r\n\
    ore 15,00 : Saluti , Baci e Abbracci !"
