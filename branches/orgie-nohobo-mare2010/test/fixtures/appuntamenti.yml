appuntamenti_279: 
  Abdicabilita: "0"
  luogo: "Tra le verdi e lussureggianti colline dell\xE2\x80\x99Appennino bolognese, \r\n\
    tra vitigni di Albana e Sangiovese,\r\n\
    folle di gaudenti giallo-neri,\r\n\
    lasciati i panni seri e troppo austeri, \r\n\
    abbracceranno il pomeriggio e poi  notte\r\n\
    cercando situazioni, le pi\xC3\xB9 ghiotte,\r\n\
    tra  Clerici, Volpi, Volpini, lupi e tacchini.\r\n\
    \r\n\
    \r\n\
    Conoscete tutti, tanti, alcuni, pochi\xE2\x80\xA6anche un solo Clerico?\r\n\
    Contattatelo, ne saprete di pi\xC3\xB9 e, come consuetudine,  a lui piacendo sarete suo ospite.\r\n"
  Nome: "A VOLTE  TORNANO\xE2\x80\xA6. percorso nella memoria del futu"
  ID_appuntamento: "515"
  data_invio: 2004-02-16 12:50:36
  note: "Ardir\xC3\xB2 ancor tra i desinari illustri\r\n\
    sul meriggio innoltrarmi umil cantore,\r\n\
    poi che troppa di te cura mi punge,\r\n\
    signor, ch'io spero un d\xC3\xAC veder maestro\r\n\
    e dittator di graziosi modi\r\n\
    all'alma giovent\xC3\xB9 che Italia onora.\r\n\
    Tal, fra le tazze e i coronati vini,\r\n\
    onde all'ospite suo fe' lieta pompa\r\n\
    la punica regina, i canti alzava.\r\n\
    \r\n\
    Pomeriggio e serata tra  colori, sapori, amori e canti \r\n\
    dei Clerici Vaganti.\r\n\
    \r\n"
  recapitogoliarda1: "1172"
  "citt\xC3\xA0": Altro (in Italia)
