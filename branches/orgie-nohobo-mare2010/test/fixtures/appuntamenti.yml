appuntamenti_333: 
  Abdicabilita: "5"
  luogo: "A Monte Donato. Appuntamento in Pincherle alle ore 18.-18.30, poi si parte tutti x Monte Donato. La strada \xC3\xA8 la seguente (facilissima): da Porta S Donato prendere per Porta S Stefano (verso i giardini Margherita); l\xC3\xAC girare a sinistra per Via Murri; andare dritto per circa un km finch\xC3\xA8 sulla destra trovate un indicazione \"monte donato\". Prendete quella stradina e la seguite sempre finch\xC3\xA8 non treoverete su una collina un sacco di macchine parcheggiate sulla strada. La festa \xC3\xA8 l\xC3\xAC (attenti perch\xC3\xA8 l\xC3\xAC il cellulare non prende).\r\n"
  Nome: Grigliata pallladiana 2004
  ID_appuntamento: "602"
  data_invio: 2004-09-08 11:18:32
  note: "Carne e vino a 10 euro (modificabili in funzione di quanti siamo, credo cmq tra 8 e 12 euro).\r\n\
    \r\n\
    Portatevi asciugamani e CHITARRE x simulare l'effetto 'fal\xC3\xB2 sulla spiaggia'. Iscrivetevi x tempo se volete mangiare tanto e spendere poco ;-)\r\n\
    Non sono in grado di garantire posti letto (ma ci siam sempre arrangiati); io vi consiglio di prendere direttamente contatto coi bolognesi che sapete essere presenti... Mi raccomando ragazzi le CONFERME.\t\r\n\
    PS Tanto per cambiare non vorrei fare una grigliata goliardica, ma solo una grigliata tra amici.\r\n\
    PPS Se va tutto in porto, portiamo su un impianto da 600 watt per metter su musica tutta la notte. Non garantisco ma se riesce acrete l'onore di sentire Gigi e Ric DJ (come alla mia festa di laurea, x chi c'era)."
  recapitogoliarda1: "1"
  "citt\xC3\xA0": Bologna
  tipodiappuntamento: Altra cena
  recapitogoliarda2: "120"
  data_fine: 2004-09-11 11:18:32
  id_login: "3"
  recapitogoliarda3: "0"
