    \r\n\
    <b>Sabato 6 Maggio 2006</b>\r\n\
    \r\n\
    Ore 08:30\tEroica liberazione degli studenti maggiorenni dei Licei cittadini;\r\n\
    Ore 11:30\tRievocazione storica del \"dono della palla di neve\" allo rettore del Collegio di \t\t\tSpagna;\r\n\
    Ore 13:30\tInizio sfilata dei carri allegorici e saluto alla folla festante in Piazza Verdi\r\n\
    \t\tcon apertura del corteo da parte degli sbandieratori, tamburi, menestrelli e \t\t\tgiocolieri;\r\n\
    Ore 18:30\tRappresentazione dell''operetta goliardica \"Trans-Fictonis\" presso il Teatro San \t\t\tMartino in Via Oberdan 25;\r\n\
    Ore 21:00\tReplica dell''operetta goliardica \"Trans-Fictonis\";\r\n\
    Ore 21:00\tFesteggiamenti ad oltranza ai Giardini Margherita con buffet offerto a tutti gli \t\t\tastanti;\r\n\
    \r\n\
    <b>Domenica 7 Maggio 2006</b>\r\n\
    \r\n\
    Ore 13:30\tTradizionale discesa dei carrioli lungo il tracciato che porta dall''Ospedale \t\t\tRizzoli ai Giardini Margherita lungo Via Putti e Via Castiglione;\r\n\
    Ore 16:00\tI Goliardi vi attendono ai giardini Margherita;\r\n\
    Ore 00:00\tCerimonia di chiusura delle Feriae ad opera del Gran Maestro e intonazione del \t\t\t\"Gaudeamus Igitur\" attorno alla statua del Nettuno;\r\n\
    \r\n\
    <b>Luned\xC3\xAC 8 Maggio 2006</b>\r\n\
    \r\n\
    Ore 13:00 \tPresso il Caff\xC3\xA9 del Teatro distribuzione delle \"marchette\" per la visione gratuita \t\t\tnei cinematografi a tutti i possessori di spilletta commemorativa della Festa \t\t\tdelle Matricole MMVI.\r\n\
    \r\n\
    <i>(da un''improbabile collaborazione mOntecristo/oCa)</i>"
