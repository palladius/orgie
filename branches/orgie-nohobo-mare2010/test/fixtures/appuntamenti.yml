appuntamenti_614: 
  Abdicabilita: "95"
  luogo: "-->Venerd\xC3\xAC 27 aprile: \r\n\
    ritrovo ore 19-20 in stazione a Ferrara (al solit pust\xC3\xA0zz), con successiva trasmigrazione al luogo della cena;\r\n\
    ore 20.30 appuntamento per la cena presso il ristorante Il Pozzo a localit\xC3\xA0 Borgo (comune di Vigarano Mainarda, per intenderci circa 1 km pi\xC3\xB9 avanti rispetto al solito ELSA, ristorante merdo che ho volutamente boicottato) - costo della cena 20 neuri (antipastino, primo, secondo, caff\xC3\xA8, vino a go-go, acqua per chi vuol marcire, limoncino finale);\r\n\
    per chi alle ore 1-2 non \xC3\xA8 ancora collassato si conclude la nottata presso il circolo-discoteca RENFE a Ferrara per il colpo di grazia;\r\n\
    tutti a dormire.\r\n\
    -->Sabato 28 Aprile:\r\n\
    ore 11 ritrovo presso il Rettorato in via savonarola (per chi arriva dalla stazione, autobus linea 1 fermata a parco pareschi);\r\n\
    ore 12 Gaudeamus Igitur di apertura delle Feriae con aperitivo offerto dalle copiose (al c\xC3\xA0z) casse Ducali;\r\n\
    ore 13 spostamento in piazza Trento-Trieste (il listone a fianco al Duomo) ove verr\xC3\xA0 dispensato cibo anch'esso offerto dalle un po' meno copiose (al c\xC3\xA0z) casse Ducali;\r\n\
    Permarr\xC3\xA0 per tutto il pomeriggio un servizio bar di minima, ma ben fornito, presso i gazebi degli ordini (questo non offerto perch\xC3\xA9 nel frattempo le casse Ducali si sono prosciugate, eccheccazzo!);\r\n\
    (per i capi citt\xC3\xA0) ore 13 spostamento presso il ristorante \"Da Settimo\", in via cortevecchia, per il consueto pranzo capicitt\xC3\xA0;\r\n\
    ore 15 dopo molto gozzovigliare a sbafo si dar\xC3\xA0 inizio alle Majaliadi, i cui giochi continueranno fino a quando lo culo ci tirer\xC3\xA0;\r\n\
    ore 18 se lo culo non ci ha tirato prima, ci tira ora: cerimonia di premiazione delle Majaliadi e concomitante FESTIVAL DELLA CANZONE GOLIARDICA D'ATTUALIT\xC3\xA0 (ovvero canzoni goliardiche ispirate a fatti di cronaca recentemente accaduti).\r\n\
    ore 20-21 per chi ancora avr\xC3\xA0 qualcosa da tirar fuori (che non sia vomito!) cena superstiti, che verr\xC3\xA0 organizzata al momento, come vuol la tradizione.\r\n\
    Ci\xC3\xB2 che succeder\xC3\xA0 poi sar\xC3\xA0 solo il frutto dell'improvvisazione.\r\n\
    \r\n\
    \r\n"
  Nome: Festa della Matricola di Ferrara - Majaliadi I Edi
  ID_appuntamento: "978"
  data_invio: 2007-04-21 10:25:27
  note: "Le specialit\xC3\xA0 mejalimpiche:\r\n\
    TORTAZIO - \r\n\
    TROFEO TWISTER V (GARA DI RUTTI) - \r\n\
    TRIATHLON (WURSTEL+BIRRA+RUTTO) - \r\n\
    NUTELLAZIO - \r\n\
    TOCIAZIO - STAFFETTA AWURSTEL E SALSE (CON SORPRESA) - \r\n\
    SCARPETTA 4X100 - \r\n\
    GRANFONDO ALITAZIO - \r\n\
    STAFFETTA ALL'ULTIMO SORSO (AD GRANFUNDUM LISTONE) - \r\n\
    APPUNTAMENTO AL BUIO (ENDURANCE BACIO CON SCONOSCIUTO) - \r\n\
    FUMAZIO (SIGARETTA AD FUNDUM) - \r\n\
    MAMMA UCCELLO (COPPIE E ZITI DI BOCCA IN BOCCA).\r\n\
    e che vincano i migliori\r\n\
    \r\n"
  recapitogoliarda1: "777"
  "citt\xC3\xA0": Ferrara
  tipodiappuntamento: Festa delle Matricole
  recapitogoliarda2: "1090"
  data_fine: 2007-04-29 23:25:27
  id_login: "294"
  recapitogoliarda3: "0"
  data_inizio: 2007-04-27 10:25:27
