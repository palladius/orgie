appuntamenti_831: 
  Abdicabilita: "0"
  luogo: "Per chi arriva da NORD-MILANO, andare\r\n\
    1a) Andate sulla Tangenziale in direzione SUD, e poi uscite all\xE2\x80\x99uscita di Corso REGINA \r\n     MARGHERITA. \r\n\
    \r\n\
    Per chi arriva da SUD-PIACENZA-GENOVA-ALESSANDRIA, andare\r\n\
    1b) Andate sulla Tangenziale in direzione NORD, e poi uscite all\xE2\x80\x99uscita di Corso REGINA \r\n     MARGHERITA. \r\n\
    \r\n\
    2) Proseguite per Corso REGINA MARGHERITA fino a quando non incrociate\r\n    Corso ALESSANDRO TASSONI. (OKKIO all\xE2\x80\x99autovelox FISSO \xE2\x80\xA6 max 70 km/H).\r\n\
    3) Svoltate a DESTRA in Corso ALESSANDRO TASSONI. \r\n\
    4) Proseguite in C.so TASSONI fino alla ROTONDA di Piazza LORENZO BERNINI, dove \r\n    s\xE2\x80\x99incrociano Corso TASSONI e Corso FRANCIA. \r\n\
    5) Fate la rotonda e prendete C.SO FRANCIA a SINISTRA. \r\n\
    6) Proseguite per Corso FRANCIA ed arrivate in Piazza STATUTO. \r\n\
    L\xE2\x80\x99appuntamento \xC3\xA8 presso il giardino dietro la fontana della piazza. \r\n\
    \r\n\
    TRENO: \r\n\
    a) per chi arriva da MILANO - NORD scendere alla stazione di Torino Porta Susa. Come uscite dalla Stazione FS girate a Destra in C.so San Martino. Fate questo piccolo corso a piedi ed arrivate in Piazza Statuto. Girate a Destra e ci vedete nel giardino dietro la fontana. \r\n\
    \r\n\
    b) per chi arriva da SUD: scendete a Torino Porta Susa e seguite le indicazioni del caso precedente. \r\n\
    Se siete costretti a scendere a Torino Porta Nuova perch\xC3\xA9 il treno non arriva a Torino Porta Susa, cercate la metropolitana (davanti alla stazione), e prendetela in direzione COLLEGNO. \r\n\
    Scendete alla stazione Porta Susa 18 Dicembre. \r\n\
    Come uscite dalla stazione prendete C.so San Martino. Fate questo piccolo corso a piedi ed arrivate in Piazza Statuto. Girate a Destra e ci vedete nel giardino dietro la fontana."
  Nome: Feriae Matricolarum Taurinensis
