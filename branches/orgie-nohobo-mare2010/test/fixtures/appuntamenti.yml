  luogo: |-
    Ca' de Mandorli, Via Idice 24 San Lazzaro di Savena Bologna.
    
    Mappa: http://www.cademandorli.com/index.php?page_id=4
    
    SE VOLETE VENIRE ALLA CENA DITEMELO ESPRESSAMENTE! A ME FA PIACERE!
  Nome: Addio al Bolognato di Palladius
  ID_appuntamento: "1229"
  data_invio: 2008-10-10 10:22:59
  note: "Come tutti ormai saprete mi levo dai coglioni dalla ridente citt\xC3\xA0 dei por(ti)ci per trasferirmi a Dublino a fine mese.\r\n\
    Chi volesse fare un saluto e bersi una birra con me prima della partenza ben venga!\r\n\
    Ovviamente chi di voi fosse impossibilitato il 18 potr\xC3\xA0 farsi un Ryanair e scroccarmi un divano (o il mio letto se non sar\xC3\xB2 mestruato).\r\n\
    \r\n\
    Ho messo l'evento anche sul faccialibro e penso che terr\xC3\xB2 l\xC3\xAC il computo dei convenuti...\r\n\
    \r\n\
    CHI VUOLE VENIRE ALLA CENA (ore 2100) lo scriva \r\n\
    ESPRESSAMENTE: \xC3\xA8 l'unico computo che devo tenere... per il dopo venite quando volete, con chi volete, tanto il posto \xC3\xA8 pub(bl)ico!"
