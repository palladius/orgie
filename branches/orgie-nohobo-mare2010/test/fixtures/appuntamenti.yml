  luogo: "Al col de Joux con una sciata etilica. Se il sole scioglie tutto allora decidiamo un altro impianto. In ogni caso ci si trova alle 9 (del mattino) al tradizionale Caff\xC3\xA8 Savini di Saint Vincent (AO). Alla sera cenassa tipica valdostana all'insegna di polenta concia e selvaggina al tradizionale ristorante Chez Nous a Ussel, sotto al castello medioevale. Portate sulla neve qualsiasi mezzo idoneo allo scivolamento e venite anche se non sciate, c'e' il bar a fondo pista che unisce tutti!!!"
