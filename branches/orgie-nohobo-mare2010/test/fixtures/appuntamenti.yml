appuntamenti_273: 
  Abdicabilita: "0"
  luogo: "Al Soda Pops Disco-Bar, in Via Casteltialto (l'ultima traversa sulla destra prima delle due torri venendo da via san vitale), facciamo la consueta e ormai tradizionale Festa del Feudo Romagnolo.La serata \xC3\xA8 molto divertente,con musica e animazione fatta da noi,inoltre per tutti i fratelli Goliardi ci sar\xC3\xA0 uno strepitoso happy hours dalle 22.30 fino alle 2.00 assicurato,poi dalle 2.00 alle 4.00 comunque ci saranno dei prezzi di favore per tutti i Goliardi, che dovranno comunque presentarsi con la patacca o la placca,le altre insegne non sono necessarie (e visto il caldo che fa li dentro vi consiglio di non venire coi mantelli).E' una serata che vuol promuovere la Goliardia per farla conoscere anche a chi non \xC3\xA8 nell'ambiente e per fare una serata \"diversa\" per tutti noi Goliardi.Vi aspetto numerosi.La festa inizia alle 22.30 e finisce alle 4.00,quindi avete tutto il tempo di sbronzarvi con calma e di divertirvi.Quasi mi dimenticavo una cosa fondamentale...l'ingresso \xC3\xA8 gratuito!!!!!Ciao"
  Nome: Festa del Feudo Romagnolo
  ID_appuntamento: "502"
  data_invio: 2004-01-30 15:26:11
