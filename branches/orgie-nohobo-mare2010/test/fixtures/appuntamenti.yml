  luogo: "Aula B\r\n\
    Facolt\xC3\xA0 di Lettere Via Zamboni 34\r\n\
    \r\n\
    Ore 17:00\r\n\
    \r\n\
    Anonimo Berico\r\n\
    \r\n\
    Ordinario \r\n\
    della Facolt\xC3\xA0 di Giurisprudenza \r\n\
    nell\xE2\x80\x99Universit\xC3\xA0 di Bologna\r\n\
    (autore dei libri \r\n\
    \xE2\x80\x9CIl dono dell\xE2\x80\x99obliquit\xC3\xA0\xE2\x80\x9D e \r\n\
    \xE2\x80\x9CCos\xC3\xAC parl\xC3\xB2 Kamasutra\xE2\x80\x9D)"
  Nome: Conferenza di Anonimo Berico
  ID_appuntamento: "999"
  data_invio: 2007-04-10 19:31:02
  note: "Fucina di cultura da quasi dieci secoli, l\xE2\x80\x99Alma Mater dispensa la sua scienza nei pi\xC3\xB9 disparati campi dello scibile: scienze della natura e scienze umanistiche vengono per\xC3\xB2 reinterpretate dall\xE2\x80\x99uomo politico (o, come egli stesso si definisce, \xC2\xABhomus pubblicum\xC2\xBB), con varianti significative rispetto alle usuali.\r\n\
    Ma siamo davvero sicuri che quando un politico decide di \xC2\xABinvertire la rotta di 360 gradi\xC2\xBB abbia torto? O che quando parla di \xC2\xABkamikaiser\xC2\xBB non stia semplicemente proponendo in uno splendido neologismo una sintesi tra due culture - giapponese e tedesca - che nell\xE2\x80\x99Asse aveva gi\xC3\xA0 trovato consacrazione negli anni \xE2\x80\x9940?\r\n\
    In tempi in cui \xC2\xABpiovono tegole a ciel sereno\xC2\xBB e \xC2\xABuna nevicata non fa pi\xC3\xB9 primavera\xC2\xBB, cercare il perch\xC3\xA9 i tante ardite reinterpretazioni della scienza a opera degli uomini pubblici \xC3\xA8 utile per rinsaldare il legame tra la gente e la politica, tra il linguaggio comune e l\xE2\x80\x99onesto meta-linguaggio della politica.\r\n"
  recapitogoliarda1: "2260"
  "citt\xC3\xA0": Bologna
