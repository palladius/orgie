appuntamenti_283: 
  Abdicabilita: "5"
  luogo: "Il programma in breve:\r\n\
    - Venerd\xC3\xAC nel primo pomeriggio visita alla mostra della Goliardia Ligure presso la sede di Ingegneria in via Montallegro 1.\r\n\
    - ore 17 accoglimento delegazioni estere in piazza Matteotti. \r\n\
    - ore 20 cena offerta dai Gonfalonierati (al solito lasagne al pesto, focaccia e vino a schifo)\r\n\
    - ore 24 The Pinguin Game Real Edition gioco a premi per i Goliardi pi\xC3\xB9 sadici.\r\n\
    - dalle ore 4 in poi mi sembra il caso che andiate a letto balordi!!!\r\n\
    \r\n\
    Sabato \r\n\
    - ore 12 pranzo in piazza con lasagne e salumi di Santolcese.\r\n\
    - ore 15 Partenza per la tradizionale via Trucis.... buona fortuna!\r\n\
    - ore 21 Cena del Dogatum Genuense."
  Nome: Feriae Matricularum Janua 2004
  ID_appuntamento: "539"
