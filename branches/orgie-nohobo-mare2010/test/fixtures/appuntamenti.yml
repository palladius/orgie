appuntamenti_781: 
  Abdicabilita: "0"
  luogo: Marzabotto - Parco Bottonelli dal 27 al 29 giugno
  Nome: KAINUA-Occidente 08
  ID_appuntamento: "1205"
  data_invio: 2008-06-25 19:28:55
  note: "KAINUA \xE2\x80\x93 Occidente 2008, sar\xC3\xA0 una coinvolgente macchina del tempo, che dal 27 al 29 giugno nella fresca cornice del Parco Bottonelli, con personaggi in abito storico, conferenze, teatro, musica, spettacoli, attivit\xC3\xA0 didattiche, gastronomia, mercatino artigianale e dei contadini e visite guidate trasporter\xC3\xA0 gli spettatori in una esperienza immersiva a diretto contatto con la storia e la vita quotidiana di Etruschi, Galli e Romani. Sin dalla mattina, e fino a notte, sotto antichi cieli, circondati dai sapori, dai colori e dagli odori della Valle del Reno scopriremo i popoli che contribuirono a forgiare la nostra cultura. \r\n\
    Venerd\xC3\xAC 27 alle 21.30 concerto dei Druid\xE2\x80\x99s e a seguire Green Man, sabato 28 alle 21,30 concerto dei Drunk Butchers.\r\n\
    Programma a www.festivaloccidente.it"
  recapitogoliarda1: "321"
  "citt\xC3\xA0": Bologna
  tipodiappuntamento: Altra Festa
