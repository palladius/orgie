appuntamenti_348: 
  Abdicabilita: "0"
  luogo: |
    Montelago Celtic Night
    Sabato 5 Agosto 2006
    Altopiano di Montelago di Sefro (MC)
    
    Un'occasione quasi unica per vedere e sentire dal vivo i mitici Mortimer McGrave e bere dell'ottimo idromele!
    

  Nome: Montelago Celtic Night
  ID_appuntamento: "841"
  data_invio: 2006-05-17 14:20:49
  note: "Montelago Celtic Night \xC3\xA8 un festival di musica celtica che si svolger\xC3\xA0 sabato 5 agosto 2006 dal tramonto fino all\xE2\x80\x99alba del giorno successivo sull\xE2\x80\x99altopiano di Montelago in comune di Sefro (MC) nella cornice montana dell\xE2\x80\x99Appennino marchigiano.\r\n\
    \r\n\
    Montelago Celtic night sar\xC3\xA0 una notte dedicata alla cultura dei misteriosi Celti. La trib\xC3\xB9 gallica dei Senoni raggiunse il territorio marchigiano nel periodo preromano, e ivi si stabil\xC3\xAC intrecciando per qualche secolo buoni rapporti con i Piceni fino a quando i Romani li respinsero al di l\xC3\xA0 delle Alpi dove ancora oggi ne rintracciamo i discendenti, in Galizia, nelle Asturie, in Irlanda, Scozia, nel Galles, e nella Bretagna francese. \r\n\
    \r\n\
    L\xE2\x80\x99idea \xC3\xA8 quella di rincontrare idealmente i nostri antenati invitando i migliori gruppi contemporanei di musica celtica in una festa di spirito gallico, con rievocazioni di battaglie, danze celtiche, fuochi e menhir. Si potranno degustare men\xC3\xB9 della tradizione celtica \xE2\x80\x93 cinghiale allo spiedo e fiumi di birra \xE2\x80\x93 in un villaggio celtico. Non mancheranno anche stands di artigianato e liuteria celtica. L\xE2\x80\x99ingresso \xC3\xA8 gratuito come l\xE2\x80\x99accoglienza in campeggio.\r\n\
    \r\n\
    \r\n\
    E intanto beccatevi questa chicca...\r\n\
    \r\n\
    http://www.artenomade.com/festival/attuali/immagini/montelago_007.jpg\r\n\
    \r\n"
  recapitogoliarda1: "129"
  "citt\xC3\xA0": Camerino (MC)
  tipodiappuntamento: Altra Festa
  recapitogoliarda2: "731"
  data_fine: 2006-08-07 00:00:00
  id_login: "44"
  recapitogoliarda3: "0"
  data_inizio: 2006-08-05 00:00:00
