appuntamenti_566: 
  Abdicabilita: "95"
  luogo: |
    PALMANOVA (UD)
    
    

  Nome: RIEVOCAZIONE ASSEDIO PALMANOVA
  ID_appuntamento: "911"
  data_invio: 2006-07-03 17:31:53
  note: "La Rievocazione Storica in costume, che cade la seconda domenica di luglio, ricorda un avvenimento del luglio 1602, quando il Provveditore Gerolamo Capello fece per la prima volta innalzare al centro della Piazza d'Arme, su un albero di galea, il vessillo della Serenissima Repubblica di Venezia.\r\n\
    A questa manifestazione partecipano centinaia di figuranti in abiti secenteschi. Vi si pu\xC3\xB2 ammirare il Provveditore Generale, accompagnato dalla scorta dei dodici alabardieri, le milizie, formate dai picchieri e archibugieri, i bombardieri con i tonanti pezzi d'artiglieria, dame, nobili e popolani; al calar della sera al lume dei ferali viene levato il gonfalone.\r\n\
    All'interno della manifestazione vengono simulate delle vere e proprie battaglie.\r\n\
    Sia all'interno che all'esterno della cinta della citt\xC3\xA0 sorgono accampamenti organizzati come in passato, forniti di artiglieria come cannoni e altre armi.\r\n\
    \r\n\
    \r\n\
    PRESENTA L'EVENTO IL MARCHESE....quindi SI BEVE MOLTO- SI MANGIA BENE - LE FEMINE SON BELLE - I MASCULI AITANTI - LE FELUCHE CHE SI PRESENTANO al MARCHESE MAGARI BEVONO AGGRATIS !!!!! http://www.palmanova.it\r\n\
    \r\n\
    \r\n"
  recapitogoliarda1: "0"
