appuntamenti_272: 
  Abdicabilita: "0"
  luogo: "Presso il Soda Pops Disco-Bar,in Via Casteltialto (traversa di via San Vitale prima delle due torri) facciamo,come da due anni,la Festa del Feudo con musica e animazione fatta da noi.E' una setata molto divertente nella quale ci potr\xC3\xA0 venire chiunque,con solo patacca o placca (non servono le altre insegne),non c'\xC3\xA8 bisogno di presentare alcun tipo di invito scritto anche perch\xC3\xA8 non ne facciamo in quanto invitiamo tutti coloro che hanno piacere di venire.Ci sar\xC3\xA0 per tutti i goliardi con le insegne (ripeto patacca o placca) uno speciale happy hours dalle 22.30 fino alle 2.00,ma io credo che alla fine ce lo faranno fino alle 4.00,ma non garantisco al 100%.L'entrata \xC3\xA8 assolutamente libera e gratuita.Vi aspetto numerosi,\xC3\xA8 un bel modo per promuovere,a mio avviso, la Goliardia in posti frequentati anche da non Goliardi.Vi aspetto.Ciao "
  Nome: Festa del Feudo Romagnolo
  ID_appuntamento: "501"
