appuntamenti_286: 
  Abdicabilita: "95"
  luogo: "VENERDI' 7\r\n\
    mattina - presentazione del Sindaco al Venerabile Gran Maestro e cerimonia di consegna delle Chiavi della Citt\xC3\xA0\r\n\
    pomeriggio - ricevimento delegazioni estere in via Zamboni, imberrettamento della foetentissima matricola ad opera del Magnifico Rettore nel giardino del pozzo in Rettorato (via Zamboni, 33)\r\n\
    sera - stand enogastronomici in piazza Maggiore allestiti dalle Balle Bolognesi\r\n\
    23.59 - imberrettamento del Nettuno\r\n\
    \r\n\
    SABATO 8\r\n\
    tarda mattina - sfilata dei carri da p.zza Verdi a p.zza Maggiore \r\n\
    tarda ora di pranzo - pranzo\r\n\
    pomeriggio - concerti e giochi in p.zza Verdi. a seguire serata a sfondo Epicureo\r\n\
    \r\n\
    DOMENICA 9\r\n\
    primo pomeriggio - tradizionale discesa dei carrioli dall'Ospedale Rizzoli ai Giardini Margherita\r\n\
    tardo pomeriggio - lascivo abbandono sui prati dei Giardini Margherita\r\n\
    ora di cena - cena\r\n\
    23.59 - sberrettamento del Nettuno e cerimonia di chiusura delle Feriae 92 Fictone Translato (ab Fictonis Translatione - per tassonomica e didascalica completezza)\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n"
