appuntamenti_615: 
  Abdicabilita: "0"
  luogo: "Il 69\xC2\xB0 Premio Indianopolis \xE2\x80\x93 2\xC2\xB0 Memorial Yuri Colorito (la storica gara dei carretti del Dogatum Genuense) si terr\xC3\xA0 domenica 4 marzo 2007 dalle ore 10. La gara avr\xC3\xA0 luogo nello stesso tratto cittadino (la partenza da Largo Caproni; il percorso lungo tutta Via Carso) dell'anno scorso. Seguir\xC3\xA0 nel pomeriggio gran corteo per le vie principali della Serenissima citt\xC3\xA0 e ricchi premi e cotillons in Piazza della Vittoria nel tardo pomeriggio e nella serata. \r\n\
    \r\n\
    \r\n\
    \r\n"
