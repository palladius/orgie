appuntamenti_741: 
  Abdicabilita: "0"
  luogo: "Roma, il prato pi\xC3\xB9 vicino al pranzo dei Capi Citt\xC3\xA0."
  Nome: Picnic dei Portaborse II Edizione
  ID_appuntamento: "1154"
  data_invio: 2008-02-20 10:20:04
  note: "Sei un goliarda?\r\n\
    Il tuo Capo Citt\xC3\xA0 ti ha obbligato ad andare a Roma?\r\n\
    Sai gi\xC3\xA0 che ti toccher\xC3\xA0 riportalo a casa sbronzo?\r\n\
    Sai che dovrai aspettare quelle 5 o 6 ore che il pranzo finisca?\r\n\
    Te sei l'uomo che fa per noi!!!\r\n\
    Ruba il cestino da funghi di tuo nonno, mettici una bella tovaglia a quadrettoni, un paio di boccioni di vino, quanti piu panini con la porchetta puoi, e mettiti con noi a sedere nel prato piu vicino a sbronzarsi, parlare dei massimi sistemi goliardici (ovvero chi si scopa chi), e a fare foto coi i giapponesi!!!\r\n\
    Non temere fratello! Tornerai da questa avventura rigenerato nel corpo e nell'anima!\r\n"
  recapitogoliarda1: "0"
  "citt\xC3\xA0": Roma
  tipodiappuntamento: Altro
  recapitogoliarda2: "1308"
  data_fine: 2008-02-23 00:00:00
  id_login: "1133"
  recapitogoliarda3: "1475"
  data_inizio: 2008-02-23 00:00:00
