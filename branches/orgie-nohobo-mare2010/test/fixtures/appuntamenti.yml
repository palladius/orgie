appuntamenti_490: 
  Abdicabilita: "5"
  luogo: |
    Appuntamento alle ore 19.30 presso l'impermercato Auchan alla fine di C.so Giulio Cesare, vicino all'imbocco dell'Autostrada Torino Milano. 
    
    
    
    

  Nome: Compleanno Sacra atque Temibilis Vola del Vampiro
  ID_appuntamento: "801"
  data_invio: 2005-11-22 07:03:16
  note: "Come arrivare direttamente al luogo della cena \xE2\x80\x9CMANDRIA\xE2\x80\x9D: \r\n\
    Arrivando da TORINO:\r\n\
    A) Prendere l\xE2\x80\x99autostrada Torino-Milano. \r\n\
    B) Uscire a Rondissone\r\n\
    C) Come si \xC3\xA8 usciti dall\xE2\x80\x99autostrada vi ritrovate \r\n      davanti ad una rotonda.\r\n\
    D) Percorrere la rotonda e prendete la statale in \r\n      direzione RONDISSONE. \r\n\
    E) Passare il cavalcavia dell\xE2\x80\x99autostrada che c\xE2\x80\x99\xC3\xA8 \r\n      subito dopo. \r\n\
    F) Passato il cavalcavia svoltate subito dopo a \r\n      sinistra in una strada chiamata \xE2\x80\x9CDella Mandria e \r\n       delle Campagne\xE2\x80\x9D, . \r\n\
    G) Fate 2.4 km e siete arrivati. \r\n\
    \r\n\
    Arrivando da MILANO: \r\n\
    A) Uscite a RONDISSONE\r\n\
    B) Vi ritrovate subito dopo ad una rotonda.\r\n\
    C) Percorrete la rotonda e prendete la statale in \r\n       direzione \xE2\x80\x9CCHIVASSO\xE2\x80\x9D.\r\n\
    D) Fate 50 m. e troverete sulla vostra destra una \r\n       strada chiamata \xE2\x80\x9CDella mandria e delle  \r\n       Campagne. \r\n\
    E) Prendetela, fate 2.4 Km e siete arrivati. \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n"
  recapitogoliarda1: "1834"
  "citt\xC3\xA0": Torino
  tipodiappuntamento: Cena di Compleaano
  recapitogoliarda2: "2447"
  data_fine: 2005-12-03 00:00:00
  id_login: "1759"
  recapitogoliarda3: "0"
  data_inizio: 2005-12-03 00:00:00
