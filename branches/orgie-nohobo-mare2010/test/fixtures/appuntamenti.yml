appuntamenti_626: 
  Abdicabilita: "95"
  luogo: |
    Bologna, <b><a href='http://maps.google.it/maps?f=q&q=Piazza+Maggiore,+Bologna+Bologna,+Emilia+Romagna,+Italia&layer=&ie=UTF8&sll=41.895888,12.489052&sspn=11.639995,23.203125&hl=it&num=10&z=17&ll=44.494286,11.342418&spn=0.005449,0.01133&om=1&msid=102138850983411024094.0000011241526bf40b6b7&msa=0'>Piazza Maggiore</a></b>.
    
    

  Nome: Feriae Matricolarum Bononiae
  ID_appuntamento: "992"
  data_invio: 2007-04-30 15:31:46
  note: "PROGRAMMA DELLA Festa delle Matricole 2007\r\n\
    \r\n\
    <b>Venerdi 4 Maggio 2007</b>\r\n\
    11:30\tPresentazione del Sindaco al Presidente del S.V.Q.F.O. (in seguito denominato, \"Gran Maestro\"), con donazione al medesimo delle chiavi della citt\xC3\xA0 per i giorni della Festa                             \r\n\
    14:00\tRappresentazione della storia dell\xE2\x80\x99Alma Mater in zona Universitaria\r\n\
    16:00\tTradizionale imberettamento delle matricole al Rettorato, ad opera del Gran Maestro e del Magnifico Rettore\r\n\
    16:30\tRinfresco presso il Cortile d'Ercole\t\r\n\
    17:00\tInizio allestimento dei tavoli in Piazza del Nettuno per il buffet delle 20:00\r\n\
    20:00\tFine delle operazioni di allestimento dei tavoli - Apertura della Festa a Piazza del Nettuno, ove il S.V.Q.F.O. offre gaudio ed intrattenimento agli intervenuti ed alla popolazione tutta\r\n\
    23:00\tInterruzione del sottofondo musicale alla festa \r\n\
    23:30\tInizio disallestimento tavoli da Piazza del Nettuno\r\n\
    00:00\tAccesso nella Piazza del Nettuno, sgombra, dell'autocestello utilizzato per il rituale dell'imberrettamento della statua del Nettuno\r\n\
    00:30\tFine delle manifestazioni in Piazza del Nettuno\r\n       \r\n\
    <b>Sabato 5  Maggio 2007</b>\r\n\
    08:30\tLiberazione degli studenti maggiorenni dei Licei cittadini\r\n\
    12:30\tDistribuzione di panini a tutti coloro che si presenteranno all'Universit\xC3\xA0\r\n\
    13:00\tInizio sfilata dei carri allegorici - saluto della folla festante lungo Via Zamboni sino a Piazza Maggiore - apertura del corteo da parte di sbandieratori, tamburi, menestrelli e giocolieri\r\n\
    15:00\tArrivo del corteo in Piazza Maggiore\r\n\
    17:00\tTradizionale dono della damigiana al Sindaco per allietare tutta la Giunta - sgombero di Piazza Maggiore\r\n\
    20:00\tRappresentazione dell'Operetta Goliardica presso Giardini Margherita\r\n\
    22:00\tBuffet freddo offerto a tutti i cittadini ai Giardini Margherita\r\n\
    \r\n\
    <b>Domenica 8 Maggio 2007</b>\r\n\
    12:30\tTradizionale discesa dei carioli lungo il tracciato che porta dall'Ospedale Rizzoli ai Giardini Margherita\r\n\
    14:30\tPremiazioni della discesa dei carioli\r\n\
    24:00\tCerimonia di chiusura delle Feriae ad opera del Gran Maestro - Intonazione del \"Gaudeamus Igitur\" attorno alla statua del Nettuno"
