  Nome: Feriae Matricolarum Perugia
  ID_appuntamento: "836"
  data_invio: 2006-04-22 19:14:38
  note: "Venerdi 28\r\n\
    \r\n\
    Ore 17:00 Accolgienza delegazioni estere in p.zza IV Noverbre (quella con la fontana).\r\n\
    Ore 19:30 Concerto in p.zza della Repubblica (quella senza fontana).\r\n\
    Ore 20:30 Magna libagione servita dalle giovani pulzelle degli Ordini Vasalli.\r\n\
    Ore 23:30 Fine del concerto e tutti a \"pecchia\" per eventuale... spaghettata di mezzanotte.\r\n\
    Ore 02:30 Tutti, in modo coercitivo ma amorevole, saranno messi a nanna.\r\n\
    \r\n\
    Sabato 29\r\n\
    Ore 07:30 Sveglia a suon di pitali, trombe, trictrac e bombe a mano suonati egragiamente dal Decano (o dalle sue controfigure).\r\n\
    Ore 12:00 Spettacolo delle Majorette ad altissimo contenuto erotico.\r\n\
    Ore 13:30 Gran pranzo in piazza con panini, panini, panini...\r\n\
    Ore 16:00 Corteo storico con sbandieratori e combattenti.\r\n\
    Ore 18:00 Cammellata etilica.\r\n\
    Ore 19:30 Aperitivo con Gattapone Magno che provveder\xC3\xA0 che nessuno resti sobrio.\r\n\
    Ore 21:30 Cena de lo G.G.P.\r\n\
    \r\n\
    Domenica 30\r\n\
    Ore 13:00 Tutti a pranzo da \"Maria\" al lago."
