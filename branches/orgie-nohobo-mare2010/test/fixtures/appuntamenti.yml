    \r\n"
  Nome: Festa di Halloween
  ID_appuntamento: "644"
  data_invio: 2004-10-24 20:02:31
  note: "C'\xC3\xA8 chi si veste e chi no. Fate vobis.\r\n\
    La musica \xC3\xA8 ROCK e i dj siamo io e il mitico Gigi (chi mi conosce lo conosce). Gli amanti della musica House se ne stiino allegramente a casa ;-)\r\n\
    Non so dirvi l'ingresso, ma di solito era qualcosa come 8 euro con la prima consumazione. Spesse volte c'erano parrucchieri che tio acconciavano AGRATIS in maniere strane.\r\n\
    Il locale ospita un migliaio di persone e negli anni ne ho sempre visto intorno al mezzo migliaio.\r\n\
    NB. La festa NON \xC3\xA8 goliardica, ma ovviamente \xC3\xA8 aperta a tutti.\r\n"
