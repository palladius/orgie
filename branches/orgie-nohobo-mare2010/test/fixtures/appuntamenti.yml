appuntamenti_631: 
  Abdicabilita: "0"
  luogo: "Regola numero uno: Dire a tutti del PILLOW FIGHT CLUB. \r\n\
    Dillo a tutti i tuoi amici.\r\n\
    Lo spam \xC3\xA8 un bene.\r\n\
    No, davvero: avverti altra gente. Pi\xC3\xB9 siamo, meglio \xC3\xA8.\r\n\
    Ti ringrazieranno.\r\n\
    Davvero.\r\n\
    A meno che non lo facciano, e vuol dire che sono dei bastardi ingrati, e chi li vuole come amici comunque?\r\n\
    \r\n\
    Regola numero due: Arrivare all'appuntamento, e in orario. \r\n\
    SABATO 21 aprile, ci troviamo in Piazza Maggiore, di fronte a S.Petronio, alle 18 (sono le sei di sera), in punto.\r\n\
    Puntuali. Davvero. Siamo seri. \r\n\
    Non c'\xC3\xA8 nulla di pi\xC3\xB9 triste che arrivare DOPO una lotta con il cuscino, quando tutti sono esausti e affannati Ok. Ci sono un paio di cose pi\xC3\xB9 tristi al mondo, ma poche.\r\n\
    \r\n\
    Regola numero tre: Portare un cuscino. Nascosto. In una borsa, zaino, nello stomaco di amici o parenti.\r\n\
    Non far vedere il cuscino a nessuno prima della lotta. E\xC2\xB4 una questione di sorpresa.\r\n\
    \r\n\
    Regola numero quattro: All\xC2\xB4ora esatta (18:00), tirar fuori il cuscino e lottare!\r\n\
    Regola numero cinque: NON colpire nessuno senza un cuscino (a meno che non lo voglia, e chieda per favore)!\r\n\
    Altre regole: Non c\xC2\xB4\xC3\xA8 NULLA da vincere, per cui non barare mettendo qualcosa di PESANTE nel cuscino. S\xC3\xAC, diciamo a te. Non fare finta di niente.\r\n"
  Nome: Pillow Fight Club
  ID_appuntamento: "1000"
