appuntamenti_736: 
  Abdicabilita: "0"
  luogo: |-
    Si scia al Col de Joux, sopra Saint Vincent in Valle d'Aosta.
    La cena sara' ad Ussel, ristorante "Chez Nous" sopra Chatillon alle ore 20.
    Per sapere dove si trovano le localita' usate google maps, siete grandi e vaccinati.
  Nome: Decennale del DisOrdine della Grolla
  ID_appuntamento: "1147"
  data_invio: 2008-01-31 12:57:55
  note: |-
    Siamo ormai giunti alla decima edizione del noto DisOrdine della Grolla. Festa che vede la neve e la montagna al centro del delirio goliardico.
    Di giorno una sciata in compagnia nel piccolo, ma impegnativo, comprensorio del Col de Joux. Giornaliero a circa 20 euro a testa. Ci sono 3 piste ed una sola seggiovia con bar annesso. Bellissimo anche per chi non scia e vuole godersi una gironata in compagnia.
    
    Alla sera cenassa valdostana a base di polenta concia e selvaggina. Costo sui 20 euro o poco piu' (contrattazione in base ai partecipanti).
    
    Essendo un DisOrdine, si sa che non esistono accrediti e che le matricole avranno, come da sempre, un ruolo moooooolto speciale.
    
    Conferma presenza obbligatoria a me (3479666106)
    
    Rulettus Astrolabius Johannes VIII che ormai si fa sentire solo una volta all'anno!!! :D
  recapitogoliarda1: "546"
  "citt\xC3\xA0": Italia
  tipodiappuntamento: Altra Festa
