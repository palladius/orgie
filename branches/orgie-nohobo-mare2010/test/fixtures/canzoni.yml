  Corpo: "Laggi\xC3\xB9 nell\xE2\x80\x99Arizona,\r\n\
    terra di sogni e di chimere,\r\n\
    se una chitarra suona\r\n\
    cacano mille capinere,\r\n\
    se due chitarre suonano\r\n\
    cacan duemila capinere,\r\n\
    se tre chitarre suonano\r\n\
    cacan tremila capinere...\r\n\
    A mezzanotte va     lo stronzo dal sedere\r\n\
    e nell\xE2\x80\x99oscurit\xC3\xA0     nel cesso va a cadere.\r\n\
    E\xE2\x80\x99 merda di passion     che il cul non sa tenere\r\n\
    E questa \xC3\xA8 la canzon     del buco del sedere.\r\n"
  Autore: "null"
  ID_canzone: "1949293024"
  Note: "Noi lo cantavamo cos\xC3\xAC... Satanasso"
  titolo: Il tango delle capinere
  tipo: 
