  Corpo: "Osteria numero zero\r\n\
    vedo un prete tutto nero\r\n\
    che con mille contorsioni\r\n\
    suona il piano coi coglioni.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero uno\r\n\
    al casino non c'e' nessuno\r\n\
    ci sono solo preti e frati\r\n\
    che si inculano beati.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero due\r\n\
    le mie gambe fra le tue\r\n\
    le tue gambe fra le mie\r\n\
    fanno mille porcherie.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero tre\r\n\
    la peppina fa il caffe'\r\n\
    fa il caffe' una volta al mese\r\n\
    con le pezze del marchese.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero tre\r\n\
    te lo metto nel dedr\xC3\xA8\r\n\
    te lo metto quando \xC3\xA8 duro \r\n\
    ti far\xC3\xB2 tremare il culo.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero quattro\r\n\
    la Peppina ha rotto il piatto\r\n\
    e per non farlo piu' vedere\r\n\
    se lo ficca nel sedere.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero quattro\r\n\
    la marchesa aveva un gatto\r\n\
    con la coda del felino\r\n\
    si faceva un ditalino.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero cinque\r\n\
    c'e' chi perde e c'e' chi vince\r\n\
    ma chi perde caso strano\r\n\
    se lo trova dentro l'ano.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero sei\r\n\
    e' il casino degli ebrei\r\n\
    ma gli ebrei son sporcaccioni\r\n\
    ficcan dentro anche i coglioni.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero sette\r\n\
    il salame piace a fette\r\n\
    ma alle donne caso strano\r\n\
    il salame piace sano.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero otto\r\n\
    la marchesa fa il risotto\r\n\
    fa il risotto ben condito\r\n\
    con lo sperma del marito.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero otto\r\n\
    cazzo in mano e culo rotto\r\n\
    culo rotto e cazzo in mano\r\n\
    per inculare il Vaticano.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero nove\r\n\
    i goliardi fan le prove\r\n\
    fan le prove contro il muro\r\n\
    per veder chi l'ha pi\xC3\xB9 duro.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero nove\r\n\
    la marchesa fa le prove\r\n\
    fa le prove col prosciutto\r\n\
    per veder se c'entra tutto.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero nove\r\n\
    resta ferma e non te move\r\n\
    te sei mossa appena appena\r\n\
    t'ho sborrato sulla schiena\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero dieci\r\n\
    se hai fame mangia i ceci\r\n\
    per la figa e per il culo\r\n\
    te lo metto come un mulo.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero dieci\r\n\
    il sagrestano fa le veci\r\n\
    fa le veci del cappellano\r\n\
    e lo prende dentro l'ano.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero venti\r\n\
    se la figa avesse i denti\r\n\
    quanti cazzi all'ospedale\r\n\
    quante fighe in tribunale.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero ventitre\r\n\
    chiavan tutti tranne me.\r\n\
    E 'st estate la va magra\r\n\
    meglio prendersi il viagra.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero trenta\r\n\
    chi ha un bel culo non si penta\r\n\
    oggigiorno caso strano\r\n\
    va di moda il deretano.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero cento\r\n\
    se la figa andasse a vento\r\n\
    quanti cazzi in alto mare\r\n\
    si vedrebbero navigare.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero cento\r\n\
    il mio cazzo e' di cemento\r\n\
    di cemento bene armato\r\n\
    quando e' dentro fa il selciato.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria centouno\r\n\
    in fondo al mare c'\xC3\xA8 Nettuno\r\n\
    in una mano c'ha il tridente\r\n\
    e con l'altra fa il fetente\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero mille\r\n\
    il mio cazzo fa scintille\r\n\
    fa scintille sulla legna \r\n\
    figuriamoci nella fregna.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria numero enne\r\n\
    il mio cazzo ha due antenne\r\n\
    se inculassi il sagrestano\r\n\
    sentirei radio Vaticano.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria del cimitero\r\n\
    e' successo un fatto vero\r\n\
    due cadaveri putrefatti\r\n\
    si inculavano come matti.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria del Vaticano\r\n\
    e' successo un fatto strano\r\n\
    c'era il Papa con gli occhiali\r\n\
    che inculava i cardinali.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria del Vaticano\r\n\
    pure il papa ha il cazzo in mano\r\n\
    va gridando \"Porco D**,\r\n\
    voglio figa pure io...\".\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria dell'antinferno\r\n\
    s'e' incazzato il padreterno\r\n\
    perche' il suo divin figliolo\r\n\
    e' tornato con lo scolo.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria del Paradiso\r\n\
    c'era Dante con sorriso\r\n\
    Beatrice, la sua donna,\r\n\
    gli e' tornata senza gonna.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria della stratosfera\r\n\
    si e' scoperto cosa c'era\r\n\
    nello Sputnik la cagnetta\r\n\
    si sparava una pugnetta.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria dell'invertito\r\n\
    qui non metto proprio il dito\r\n\
    non vorrei che il suo strumento\r\n\
    mi mirasse proprio al centro.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria della mignotta\r\n\
    non vogliamo una bigotta\r\n\
    la vogliamo emancipata\r\n\
    e per giunta un po' infoiata.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria del vescovado\r\n\
    l\xC3\xA0 di certo non ci vado\r\n\
    non e' posto da goliarda\r\n\
    perche' manca la bernarda.\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria del Viminale \r\n\
    il Ministro s'\xC3\xA8 fatto male \r\n\
    l'ha colpito un cazzo duro\r\n\
    l'ha centrato in pieno culo\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria della stazione\r\n\
    sui binari c'\xC3\xA8 un barbone\r\n\
    contro il cazzo suo arrapato\r\n\
    l'eurostar ci s'\xC3\xA8 scontrato\r\n\
    \r\n\
    Dammela a me biondina, dammela a me biondaaa\r\n\
    \r\n\
    Osteria del Gallo d'Oro\r\n\
    e' uno stronzo chi fa il coro\r\n\
    \r\n\
    Osteria del Gallo Fritto\r\n\
    e' uno stronzo chi sta zitto.\r\n\
    \r\n\
    \r\n\
    \r\n"
