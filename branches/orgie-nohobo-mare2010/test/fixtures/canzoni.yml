canzoni_275: 
  m_bSeria: "1"
  Data_creazione: 2004-06-10 15:57:03
  Corpo: "1- A due ragazzi del borgo {LAm}\r\n\
    cresceva troppo in fretta {SOL}\r\n\
    loro unica passione {FA}\r\n\
    era la fighetta {MI}\r\n\
    \r\n\
    Ma la jella od il destino {LAm}\r\n\
    rimpicciol\xC3\xAC la gloria {SOL}\r\n\
    ors\xC3\xB9 narriamo allora {FA}\r\n\
    dei due la strana storia {MI}\r\n\
    \r\n\
    Una storia d'altri tempi {FA}\r\n\
    di prima del goldone {SOL}\r\n\
    quando si trombava {RE}\r\n\
    per mancanza di calore {FA}\r\n\
    Ma tra Pino e Gaetano {DO}\r\n\
    il divario gi\xC3\xA0 cresce {SOL}\r\n\
    e chi sar\xC3\xA0 il guardone {FA}\r\n\
    gi\xC3\xA0 si capisce... {MI7}\r\n\
    \r\n\
    RIT.: Pino si scalda a guardar le battone {DO SOL}\r\n\
    e passa le ore su quello stradone {FA DO}\r\n\
    si apposta paziente per vedere gli amplessi {DO SOL}\r\n\
    delle rare coppiette che lo fanno nei cessi. {FA MI}\r\n\
    \r\n\
    2- Ma accadde che Gaetano\r\n\
    per una distrazione\r\n\
    divenne gi\xC3\xA0 a vent'anni\r\n\
    un temibile ricchione\r\n\
    \r\n\
    Lasci\xC3\xB2 il suo gran pisello\r\n\
    in una sera trista\r\n\
    entrare nella bocca\r\n\
    di una femminista\r\n\
    \r\n\
    E lo sanno perfino\r\n\
    quelli senza cervello\r\n\
    una volta tagliato\r\n\
    non ricresce l'uccello\r\n\
    ma tra Taurus e Mandingo\r\n\
    di provare si stanca\r\n\
    a Gaetano non resta\r\n\
    che Casablanca...\r\n\
    \r\n\
    RIT.: Sbadata infermiera un errore inaudito\r\n\
    a fare del ragazzo un penoso invertito\r\n\
    lei porse al primario la topa di Enrica\r\n\
    cercavi una minchia... ti trovasti la fica!\r\n\
    \r\n\
    3- Dovette anche Gaetano\r\n\
    trovare un bel mestiere\r\n\
    decise per denaro\r\n\
    di dare via il sedere\r\n\
    \r\n\
    ma un bravo poliziotto\r\n\
    stronc\xC3\xB2 la tua passione\r\n\
    di lasciarti spiare\r\n\
    dall'amico guardone\r\n\
    \r\n\
    E fingendosi cliente\r\n\
    ti mise le manette\r\n\
    non trovando le mani\r\n\
    te le strinse alle tette\r\n\
    ma chi allora pensava\r\n\
    \"Gaetano \xC3\xA8 finito\"\r\n\
    ignorava che il body\r\n\
    era solo imbottito\r\n\
    \r\n\
    RIT.: Scappa Gaetano con Pino il guardone\r\n\
    lo sbirro li insegue su quello stradone\r\n\
    Gaetano \xC3\xA8 convinto, rivuole il suo glande\r\n\
    Casablanca \xC3\xA8 lontana... \xC3\xA8 sempre + distante! {LAm DO}\r\n\
    Sempre + lontana, sempre + distante! {LAm MI}"
