canzoni_338: 
  m_bSeria: "1"
  Data_creazione: 2005-05-14 16:02:54
  Corpo: "Quando me sentire odore di banana\r\n\
    subito pensare a mia Africa lontana\r\n\
    tra le tigri e le pantere, zebre elefanti e gn\xC3\xB9\r\n\
    me pensare ancor di pi\xC3\xB9 a mio coso nel\r\n tucullala, tucullala, tucullalallero,\r\n\
    \r\n\
    Quando me pensare a mia Africa lontana\r\n\
    me sentire in cuore nostalgia davvero strana\r\n\
    Il tucul \xC3\xA8 una capanna dove Zambo fa la nanna\r\n\
    il tucul \xC3\xA8 un antro tetro dove s'entra dal di dietro\r\n\
    non c'\xC3\xA8 sedia, non c'\xC3\xA8 letto per il povero negretto\r\n\
    sulla porta del tucul, il mio uccello fa\r\n\
    cucullala, cucullala, cucullalallero\r\n\
    \r\n\
    Una volta, a Mozambico, fatto male a grosso dito\r\n\
    sono stato alla missione: necessaria amputazione\r\n\
    la negretta disse a Zambo: \xC2\xABNon ti voglio senza gambo, non potremo amarci pi\xC3\xB9\" - Huhari-yuu!\r\n\
    \r\n\
    Quando guerra poi scoppiata, arruolato in quinta armata,in Italia destinato, sono a Napoli arrivato\r\n\
    c'eran tante bimbe belle che chiedevan caramelle\r\n\
    ma se chiedere di pi\xC3\xB9 io mandare a fare in \r\n\
    cullala cucullala cucullalallalero\r\n\
    \r\n\
    Se fortuna destinare, voglio in Africa tornare\r\n\
    rivedere la negretta e tenerla stretta stretta\r\n\
    ed allora, a Mozambico, miei signori, ve lo dico\r\n\
    io non voglio viver pi\xC3\xB9, ma morire nel \r\n tucullala, tucullala, tucullalallero..."
