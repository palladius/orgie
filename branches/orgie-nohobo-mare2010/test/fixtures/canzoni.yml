    cos\xC3\xAC finalmente potr\xC3\xB2 riposare, eviter\xC3\xB2 di farmi segare\r\n\
    poi apro un libro, me sento coglione, accatt'a feluca e vado alla riunione\r\n\
    \r\n\
    RIT:o che bello che \xC3\xA8\r\n\
