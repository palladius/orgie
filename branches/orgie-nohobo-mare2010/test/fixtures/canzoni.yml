    \r\n\
    Morbido il suo corpo nuovo,  \r\n\
    strano che sia ancora vivo...  \r\n\
    strano avere nuovamente  \r\n\
    dentro me lo stesso vento di  \r\n\
    \r\n\
    Morbide le sue carezze,  \r\n\
    poi il ritorno... voglie pazze..  \r\n\
    conclusioni inverosimili  \r\n\
