  Corpo: "{    Re                          Sol                    La             Re}\r\n     Si accende il gran giorno di un appuntamento \r\n   { Re             Sol          La              Re    }\r\n     tra tutti i partenti c'\xC3\xA8 gi\xC3\xA0 gran fermento\r\n     C'\xC3\xA8 chi si ricorda di vecchie passioni\r\n     chi fa domande e chi ripassa canzoni\r\n\
    \r\n\
    {                        Si-                           Sol}\r\n     E quando sul treno si guarda il paesaggio\r\n\
    {                         Re                     La}\r\n     \xC3\xA8 sempre lo stesso, lo stesso miraggio\r\n     Si sente il profumo e ci batto la testa\r\n     io non resisto sento aria di festa\r\n\
    \r\n\
    {                Sol                   La               }\r\n                 Saluti e baci a tutti quanti\r\n\
    {             Re                      Sol                }\r\n                 sono arrivato anch'io\r\n\
    {               Mi-               La                     }\r\n                 ad inventare questa sera\r\n\
    {             Re                     Re7    }\r\n                 a raccontare la mia storia   \r\n                 Ma adesso che viene notte\r\n                 ci guarderemo negl'occhi\r\n                 e sar\xC3\xA0 vita e sar\xC3\xA0 amore\r\n                 e sar\xC3\xA0 sempre il sole\r\n\
    \r\n     Voci di piazza giochi e sapori \r\n     la giostra riflette i suoi mille colori\r\n     e c'\xC3\xA8 lei che danza tra sguardi e parole\r\n     di chi sogna un ritmo che gli scaldi il cuore\r\n\
    \r\n     E quando lui suona la sua canzone\r\n     \xC3\xA8 sempre la stessa, la stessa emozione\r\n     si sente il profumo e ci batto la testa\r\n     io non resisto sento aria di festa\r\n\
    \r\n             Saluti e baci...\r\n\
    \r\n     E quando sul treno si guarda il paesaggio\r\n     ancora lo stesso, lo stesso miraggio\r\n     si sente il profumo e ci batto la testa\r\n     io non resisto sento aria di festa\r\n\
    \r\n             Saluti e baci... \r\n"
