  Note: "I tre recitativi sono brani di una lettera che Loretti scrisse a Fin\xC3\xA0 dal Kenia, dove iniziava a lavorare in un ospedale missionario. Gli incisi musicali, corali, creano ed esaltano l'atmosfera emotiva. In osteria, per evidenti ragioni mnemoniche e per mancanza di fini dicitori, i brani sono, purtroppo, spesso tralasciati."
