    Se la mamma ti domandasse: 
    
    Chi ti ha ridotto il culo a schegge
    non ti devi confondere, devi rispondere:
    uno studente in legge.
    
    Chi te l'ha messo in simmetria
    uno studente in ingegneria.
    
    Chi te l'ha rotto con arte fina
    uno studente in medicina.
    
    Chi te lo mette e scappa via
    uno studente di farmacia.
    
    Chi ti ha messo un cazzo pingue
    uno studente iscritto a lingue.
    
    Chi te l'ho ha messo con arte pura
    uno studente di architettura.
    
    Chi te l'ho ha messo da tutte le parti
    uno studente in belle arti
    
    Chi non te l'ha saputo mettere 
    uno studente iscritto a lettere.

