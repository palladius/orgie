  Corpo: "Quand\xE2\x80\x99eri al liceo guardavi il bar\r\n\
    Desiderando un misero bicchiere\r\n\
    E venne della Topa  il  Cancelliere\r\n\
    la tua merdosa scuola a liberar\r\n\
    \r\n\
    Matricolaccia dei miei coglioni\r\n\
    Tu bevi latte e mangi solo maccheroni\r\n\
    Quando saremo insieme a te\r\n\
    Leccherai tope e berrai litri di jack\r\n\
    \r\n\
    La legge \xC3\xA8 con le donne far l\xE2\x80\x99amore\r\n\
    Il nostro moto \xC3\xA8 vivere e godere\r\n\
    Noi si che siam goliardi veri \r\n\
    E non segaioli come te\r\n \r\n\
    Matricolaccia dei miei coglioni\r\n\
    Tu bevi latte e mangi solo maccheroni\r\n\
    Quando saremo insieme a te\r\n\
    Leccherai tope e berrai litri di jack\r\n\
    \r\n\
    O vergine biondina liceale\r\n\
    Vieni insieme a noi e sarai chiavata\r\n\
    Dal nostro Bacco tu sarai eccitata\r\n\
    Diventerai goliarda pure te\r\n\
    \r\n\
