canzoni_271: 
  m_bSeria: "1"
  Data_creazione: 2004-05-27 19:23:17
  Corpo: "1- Uscendo sulla strada, {LA}\r\n\
    qualche passo nella luna {DO#/SOL#}\r\n\
    dietro l'ombra che ti scivola {FA#m}\r\n\
    davanti come seta. {MI}\r\n\
    Un calcio ad un cappello {RE}\r\n\
    senza idee, senza padrone, {LA/DO#}\r\n\
    che ricade accartocciato {SIm}\r\n\
    senza piangere nemmeno. {MI}\r\n\
    \r\n\
    2- Un gatto affila gli occhi \r\n\
    nella notte dal suo muro \r\n\
    pronto al balzo della fuga \r\n\
    disturbato nel suo canto \r\n\
    d'amore come il pianto \r\n\
    di un bambino di nessuno\r\n\
    poi scompare per incanto \r\n\
    ma lo senti che \xC3\xA8 vicino, \r\n\
    ma lo senti che \xC3\xA8 vicino.  \r\n\
    \r\n\
    RIT.: \xC3\x88 tardi, eppure c'\xC3\xA8 {LA}\r\n\
    qualcosa nell'aria: {SIm}\r\n\
    tutta la malinconia {MI}\r\n\
    di chi non ha compagnia {MI7 LA}\r\n\
    di chi vive di niente, {SIm MI}\r\n\
    di chi vive di niente. {LA MI7}\r\n\
    Avr\xC3\xA0 bevuto e sta {LA}\r\n\
    contando le stelle: {SIm}\r\n\
    dal suo letto di magia {MI}\r\n\
    il creato \xC3\xA8 cosa sua {MI7 LA}\r\n\
    laggi\xC3\xB9 sotto il ponte {SIm MI}\r\n\
    laggi\xC3\xB9 sotto il ponte. {LA MI7}\r\n\
    \r\n\
    3- L\xC3\xA0 sotto a quell'arcata \r\n\
    nella casa aperta al vento \r\n\
    c'\xC3\xA8 una sedia, un pagliericcio \r\n\
    ed un armadio un po' sbilenco. \r\n\
    Lui ti guarda con due pozze \r\n\
    di celeste quasi perse \r\n\
    nell'enorme barba incolta del suo viso.\r\n\
    \r\n\
    4- Sorride, amico, un po' \r\n\
    con tutti,  amico della vita, \r\n\
    se hai da bere, amico, lui \r\n\
    ti offre la sua sedia. \r\n\
    Si stringe nei suoi stracci \r\n\
    e dopo un attimo di gioia \r\n\
    pian piano insieme al fiume si addormenta. [2v] \r\n\
    \r\n\
    RIT.: \xC3\x88 tardi, eppure c'\xC3\xA8 \r\n\
    qualcosa nell'aria: \r\n\
    tutta la malinconia \r\n\
    di chi non ha compagnia \r\n\
    di chi vive di niente\r\n\
    di chi vive di niente.\r\n\
    Avr\xC3\xA0 bevuto e sta \r\n\
    piangendo da solo: \r\n\
    quel momento di follia \r\n\
    quando uccise Fantasia \r\n\
    la sua unica donna\r\n\
    la sua unica donna. \r\n\
    \r\n\
    5- Seduto a testa bassa\r\n\
    sui gradini di una chiesa \r\n\
    parla piano e si ricorda \r\n\
    dei vent'anni di galera \r\n\
    S'illuminano gli occhi \r\n\
    e lui ripensa alla sua donna, \r\n\
    la pi\xC3\xB9 bella del quartiere, \r\n\
    la pi\xC3\xB9 donna. [2v]  \r\n\
    \r\n\
    6- Adesso \xC3\xA8 sul suo viso \r\n\
    come un alito di vento, \r\n\
    levigata vita lenta, \r\n\
    misteriosa ricompensa,  \r\n\
    poi si alza barcollando \r\n\
    e porta via le sue parole  \r\n\
    che ormai son la sua ultima ricchezza. [2v] \r\n\
    \r\n\
    RIT.: \xC3\x88 tardi, eppure c'\xC3\xA8 \r\n\
    qualcosa nell'aria: \r\n\
    tutta la malinconia \r\n\
    di chi non ha compagnia \r\n\
    di chi vive di niente\r\n\
    di chi vive di niente. \r\n\
    Avr\xC3\xA0 bevuto e sta \r\n\
    contando le stelle: \r\n\
    dal suo letto di magia \r\n\
    il creato \xC3\xA8 cosa sua \r\n\
    laggi\xC3\xB9 sotto il ponte\r\n\
    laggi\xC3\xB9 sotto il ponte.\r\n"
  Autore: "Piero Fin\xC3\xA0"
  ID_canzone: "663112018"
  Note: "Parole e musica originali - In alcuni passaggi ho indicato anche le note per il basso (... se c'\xC3\xA8...). Per gli schitarratori solitari, sia da considerare soltanto l'accordo prima della barra /"
