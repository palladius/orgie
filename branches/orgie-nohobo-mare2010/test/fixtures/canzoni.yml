  Corpo: "E le toccai..i capelli,\r\n\
    lei mi disse \"non son quelli,\r\n\
    vai pi\xC3\xB9 giu che son pi\xC3\xB9 belli...\r\n\
    amor se mi vuoi bene pi\xC3\xB9 giu tu devi andar..\"\r\n\
    \r\n\
    e allora pi\xC3\xB9 gi\xC3\xB9, pi\xC3\xB9 gi\xC3\xB9, pi\xC3\xB9 gi\xC3\xB9 (2 v.)\r\n\
    pi\xC3\xB9 giu...\r\n\
    \r\n\
    E le toccai..il viso,\r\n\
    lei mi disse col sorriso:\r\n\
    \"Vai pi\xC3\xB9 gi\xC3\xB9, c'\xC3\xA8 il paradiso...\r\n\
    amor se mi vuoi bene pi\xC3\xB9 giu tu devi andar..\"\r\n\
    \r\n\
    e allora pi\xC3\xB9 gi\xC3\xB9, pi\xC3\xB9 gi\xC3\xB9, pi\xC3\xB9 gi\xC3\xB9 (2 v.)\r\n\
    pi\xC3\xB9 giu...\r\n\
    \r\n\
    E le toccai..il petto,\r\n\
    lei mi disse con sospetto:\r\n\
    \"Vai pi\xC3\xB9 gi\xC3\xB9 che c'\xC3\xA8 un boschetto,\r\n\
    amor se mi vuoi bene pi\xC3\xB9 giu tu devi andar..\"\r\n\
    \r\n\
    e allora pi\xC3\xB9 gi\xC3\xB9, pi\xC3\xB9 gi\xC3\xB9, pi\xC3\xB9 gi\xC3\xB9 (2 v.)\r\n\
    pi\xC3\xB9 giu...\r\n\
    \r\n\
    E le toccai..l'addome,\r\n\
    lei mi disse:\"sei un coglione,\r\n\
    vai pi\xC3\xB9 gi\xC3\xB9 che c'\xC3\xA8 un burrone...\r\n\
    amor se mi vuoi bene pi\xC3\xB9 giu tu devi andar..\"\r\n\
    \r\n\
    e allora pi\xC3\xB9 gi\xC3\xB9, pi\xC3\xB9 gi\xC3\xB9, pi\xC3\xB9 gi\xC3\xB9 (2 v.)\r\n\
    pi\xC3\xB9 giu...\r\n\
    \r\n\
    E le toccai..il ginocchio,\r\n\
    lei mi disse:\"Sei un finocchio!\r\n\
    Vai pi\xC3\xB9 su che ho il terz'occhio...\r\n\
    amor se mi vuoi bene pi\xC3\xB9 su tu devi andar..\"\r\n\
    \r\n\
    e allora pi\xC3\xB9 su, pi\xC3\xB9 su, pi\xC3\xB9 su (2 v.)\r\n\
    pi\xC3\xB9 su...\r\n\
    \r\n\
    E le toccai..la figa,\r\n\
