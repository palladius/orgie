  Data_creazione: 2005-06-30 22:27:07
  Corpo: "E' finito il tempo bello\r\n\
    non ho voglia di chiavar,\r\n\
    non mi tira pi\xC3\xB9 l'uccello\r\n\
    non so pi\xC3\xB9 che cazzo far...\r\n\
    \r\n\
    Fosti tu l'ultima fica\r\n\
    che il mio pene delib\xC3\xB2,\r\n\
    fosti l'ultima fatica\r\n\
    or vi narro come and\xC3\xB2...\r\n\
    \r\n\
    Eri distesa, l\xC3\xA0 sopra il divano\r\n\
    e mi succhiavi, golosa, il banano,\r\n\
    succhia, risucchia, rosicchia e divora,\r\n\
    tu mi dicevi: dammene ancora...\r\n\
    \r\n\
    Ma nell'attimo pi\xC3\xB9 bello,\r\n\
    non ricordo come fu,\r\n\
    fuoriusc\xC3\xAC dal tuo budello\r\n\
    una vampa di gris\xC3\xB9...\r\n\
    \r\n\
    Si bruci\xC3\xB2 cos\xC3\xAC ogni pelo,\r\n\
    si afflosciarono i coglion, \r\n\
    e su tutto cadde un velo\r\n\
    di tristezza e compassion...\r\n\
    \r\n\
    ora solingo e deserto \xC3\xA8 il divano,\r\n\
    e tu, golosa, non succhi il banano,\r\n\
    pi\xC3\xB9 non divori st\xC3\xB2 povero uccello,\r\n\
    com'era bello, com'era bello..."
