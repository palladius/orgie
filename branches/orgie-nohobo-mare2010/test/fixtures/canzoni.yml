  Corpo: "[strofa] {la- sol fa mi}\r\n\
    bianco come un anemico stanco\r\n\
    biondo come un angelo azzurro\r\n\
    giro per le strade del mio quartiere\r\n\
    fiutando l'aria come fossi un doberman \r\n\
    doberman doberman doberman\r\n\
    doberman doberman doberman\r\n\
    \r\n\
    rit  {do la- fa sol}\r\n\
    la mia mamma mi ha detto \r\n\
    picchia duro il negretto\r\n\
    fammi fuori un ebreo se ti senti un p\xC3\xB2 gi\xC3\xB9 lo rimandiamo nel ghetto\r\n\
    mamma te lo prometto\r\n\
    st\xC3\xB2 diventando un ometto\r\n\
    non mi pettino pi\xC3\xB9 con il ciuffo all'in s\xC3\xB9\r\n\
    io sono un nazzi perfetto\r\n\
    \r\n\
    duro come l'acciaio delle mie catene \r\n\
    freddo pi\xC3\xB9 freddo della neve\r\n\
    sono suscettibile e pericoloso\r\n\
    sono bianco freddo duro sono un nazziskin\r\n\
    nazziskin nazziskin nazziskin\r\n\
    nazziskin nazziskin nazziskin\r\n\
    \r\n\
    rit\r\n\
    \r\n\
    basta con tutta questa confusione \r\n\
    finito il tempo della convinzione \r\n\
    silenzio e preparate le valige\r\n\
    adesso si ritorna tutti in senegal\r\n\
    senegal senegal senegal\r\n\
    senegal senegal senegal\r\n\
    \r\n\
    rit"
