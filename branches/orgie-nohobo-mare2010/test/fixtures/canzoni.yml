  Corpo: "Gaudeamus Igitur \r\n\
    Iuvenes dum sumus! [bis] \r\n\
    Post iucundam iuventutem, \r\n\
    Post molestam senectutem \r\n\
    Nos habebit humus. [bis]     \r\n\
    \r\n\
    Ubi sunt qui ante nos \r\n\
    in mundo fuere? \r\n\
    Vadite ad superos, \r\n\
    transite ad inferos \r\n\
    ubi iam fuere.  \r\n\
    \r\n\
    Vita nostra brevis est, \r\n\
    brevi finietur; \r\n\
    venit mors velociter, \r\n\
    rapit nos atrociter, \r\n\
    nemini parcetur.  \r\n\
    \r\n\
    Vivat academia, \r\n\
    vivant professores; \r\n\
    vivat membrum quodlibet, \r\n\
    vivant membra qu\xC3\xA6libet; \r\n\
    semper sint in flore!  \r\n\
    \r\n\
    Vivant omnes virgines \r\n\
    faciles, formos\xC3\xA6! \r\n\
    Vivant et mulieres \r\n\
    tener\xC3\xA6, amabiles, \r\n\
    bon\xC3\xA6, laborios\xC3\xA6!  \r\n\
    \r\n\
    Vivat et res publica \r\n\
    et qui illam regit! \r\n\
    Vivat nostra civitas, \r\n\
    m\xC3\xA6cenatum charitas \r\n\
    qu\xC3\xA6 nos hic protegit.  \r\n\
    \r\n\
    Pereat tristitia, \r\n\
    pereant osores; \r\n\
    pereat diabolus, \r\n\
    quivis antiburschius \r\n\
    atque irrisores!  \r\n \r\n"
