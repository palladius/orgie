  Corpo: "AFFILA LA LIMA\r\n\
    (Manolus, De Andr\xC3\xA9 - Sull'aria di \"Fila La Lana\")\r\n\
    \r\n\
    \r\n \r\n\
    Dalla terra di Savoie\r\n\
    il signor Vittorio IV\r\n\
    se commerci in donne o in armi\r\n\
    non si sa, non \xC3\xA8 ancor certo\r\n\
    N\xC3\xA9 se i garga rovinati\r\n\
    dall'Augusta concorrenza\r\n\
    per mill'anni e forse ancora\r\n\
    fuggiranno in sua presenza.\r\n \r\n RIT:     Affila la lima, annoda i lenzuoli\r\n            nel sole a scacchi di Regina Coeli\r\n            non pi\xC3\xB9 corazze, non pi\xC3\xB9 corone\r\n            soltanto un triste, offuscato blasone.\r\n \r\n\
    Vacanzieri che in Sardegna\r\n\
    s\xE2\x80\x99abbronzarono col piombo\r\n\
    poi le botte con l'Aosta\r\n\
    al matrimonio del Borbone\r\n\
    Ma al telefono che squilla\r\n\
    troppo lesto a dar risposta\r\n\
    perch\xC3\xA9 dentro alla Procura\r\n\
    lo s'ascolta senza sosta.\r\n \r\n\
    RIT:     Affila la lima, annoda i lenzuoli\r\n            nel sole a scacchi di Regina Coeli\r\n            non pi\xC3\xB9 corazze, non pi\xC3\xB9 corone\r\n            soltanto un triste, offuscato blasone.\r\n \r\n\
    Han regnato per mill'anni\r\n\
    i re guerrieri di Savoie\r\n\
    hanno vinto pure i Franchi\r\n\
    han difeso la Citt\xC3\xA0.\r\n\
    Conte Verde alle Crociate\r\n\
    Re Vittorio a Porta Pia\r\n\
    or soltanto un Principino\r\n\
    infilza olive di Sacl\xC3\xA0.\r\n \r\n\
    RIT:     Affila la lima, annoda i lenzuoli\r\n            nel sole a scacchi di Regina Coeli\r\n            non pi\xC3\xB9 corazze, non pi\xC3\xB9 corone\r\n            soltanto un triste, offuscato blasone.\r\n"
