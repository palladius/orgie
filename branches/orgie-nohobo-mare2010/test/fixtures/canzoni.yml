  Corpo: "Questa \xC3\xA8 la storia di uno di noi,\r\n\
    anche lui nato, per caso, a Betlemme,\r\n\
    in una stalla fuori citt\xC3\xA0,\r\n\
    gente tranquilla che lavorava.\r\n\
    L\xC3\xA0 dov\xE2\x80\x99era la greppia ora c\xE2\x80\x99\xC3\xA8 un Cristo-Grill...\r\n\
    E quel somaro l\xC3\xA0 tra il verde, ormai, dove sar\xC3\xA0?\r\n\
    Questo ragazzo della via Crucis\r\n\
    si divertiva a cenare coi santi.\r\n\
    Un giorno dice \xE2\x80\x9Cvado in montagna\xE2\x80\x9D,\r\n\
    e lo diceva mentre piangeva:\r\n\
    \xE2\x80\x9Cl\xC3\xA0 trover\xC3\xB2 la croce che non ho avuto qui,\r\n\
    e sentir\xC3\xB2 la Maddalena pianger cos\xC3\xAC...\xE2\x80\x9D\r\n\
    Passano i giorni, e quaranta son lunghi,\r\n\
    per\xC3\xB2 quel ragazzo ne ha fatta di strada!\r\n\
    Torna e non trova i ladroni che aveva:\r\n\
    con l\xE2\x80\x99amnistia glieli hanno schiodati!\r\n\
    L\xC3\xA0 dov\xE2\x80\x99era la greppia ora c\xE2\x80\x99\xC3\xA8 un Cristo-Grill...\r\n\
    e quel somaro in mezzo al verde, ormai, dove sar\xC3\xA0?...\r\n"
