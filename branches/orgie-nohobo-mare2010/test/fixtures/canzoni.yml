  Corpo: "Voglia amara di lasciare...  \r\n\
    dolci amici e strade care...  \r\n\
    confusione dolce dentro  \r\n\
    strano odore di rimpianto,  \r\n\
    strano odore...  \r\n\
    \r\n\
    Strano odore di citt\xC3\xA0...  \r\n\
    sbagli ancora fatti mai...  \r\n\
    strano odore di partenze,  \r\n\
    di stazioni e lontananze,  \r\n\
    strano odore...  \r\n\
    \r\n\
    Stati d'animo incredibili  \r\n\
    tra le dita stanche scivolano...  \r\n\
    ...come sabbia...  \r\n\
    e pensieri un poco... torbidi,  \r\n\
    malinconici, ora \xC3\xA8 tardi  \r\n\
    e il presente? ...E gi\xC3\xA0 ricordo...  \r\n\
    \r\n\
    Strana stanza sconosciuta,  \r\n\
