    I CAZZOTTI PER L\xE2\x80\x99 APPUNTO\t\t\t\tVIRGOLAX\r\n\
    FIRMATO \tDRUIDO PANORAMIX\t\t\tPUNTOX\r\n\
    \r\n\
    ~Mercoled\xC3\xAC VIII Ottobre MIIM, ore 10,00~\r\n\
    IV fax scritti su sasso ~SASSOFAX~ all\xE2\x80\x99 Imperatore dei Romani.\r\n\
    Ad ogni invio esultiamo, su esortazione del Druido.\r\n\
    \r\n \r\n\
