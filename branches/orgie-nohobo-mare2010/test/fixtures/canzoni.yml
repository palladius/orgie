  Corpo: "Il canto della mosca  \r\n\
    quello che tu non sai  \r\n\
    e se imparar lo vuoi  \r\n\
    noi te lo insegneremo.  \r\n\
    \r\n\
    Queste son le nostre grazie,  ma\r\n\
    questi sono i nostri doni  \r\n\
    ........................[nome del cantato]  \r\n\
    levati dai coglioni  \r\n\
    tanto in culo, tanto in culo  \r\n\
    ce l'hai gi\xC3\xA0!  \r\n\
    \r\n\
    [Cantato] Ahi, che mal!  \r\n\
    \r\n\
    Ti sta' ben! Culaton!  \r\n\
    Fatti una sega\r\n\
    \r\n\
    Dottore, dottore, dottore del buco del cul  \r\n\
    vaff'an'cul, vaff'an'cul, vaff'an'cul.  \r\n\
    \r\n"
