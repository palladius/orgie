  titolo: Figli di Dei
  tipo: 
  id_login: "616"
canzoni_292: 
  m_bSeria: "1"
  Data_creazione: 2004-10-04 21:08:15
  Corpo: "Si parlava alla buona tra noi,  \r\n\
    ma guardandoci dritti negli occhi:  \r\n\
    veramente potevi capire,  \r\n\
    veramente potevi sapere.  \r\n\
    Era il terzo notturno d'autunno,  \r\n\
    ma vivevi come in primavera,  \r\n\
    ubriaco di studi e parole,  \r\n\
    ubriaco di vino e d'amore.  \r\n\
    \r\n\
    Si dorme con il sole o con la pioggia  \r\n\
    per essere i padroni delle strade  \r\n\
    affrettando l'arrivo nel pensiero.  \r\n\
    Ragazze pi\xC3\xB9 vibranti di malizia  \r\n\
    coi seni aperti al gioco e alla stagione  \r\n\
    e donne fatte nostre, e fantasia  \r\n\
    e sogni di fanciulli, e fantasia  \r\n\
    e cristalli d'idee, cavalli in corsa,  \r\n\
    sospiri e sogni, sempre nuove cose.  \r\n\
    Si giunse sempre da periferie  \r\n\
    dove arrivava l'eco dei clamori  \r\n\
    e l'euforia rapiva in un momento. \r\n\
    \r\n\
    Poi le notti trascorse a vegliare  \r\n\
    macinando parole e parole:  \r\n\
    tutto quanto pi\xC3\xB9 semplice, come  \r\n\
    tutto fosse a portata di mano.  \r\n\
    Era il terzo notturno d'autunno,  \r\n\
    ma vivevi come in primavera,  \r\n\
    nuove storie rubate alla notte,  \r\n\
    strani dei luminosi e pagani.  \r\n\
    \r\n\
    \xC3\x88 gi\xC3\xA0 tramonto e piove, lento, il buio.  \r\n\
    Il pianto delle gatte \xC3\xA8 roco e incerto,  \r\n\
    si spengono nel sogno i desideri  \r\n\
    Giacendo in solitudine mi sciolgo  \r\n\
    ed \xC3\xA8 un cuore velato nell'attesa:  \r\n\
    ecco la presunzione di vittoria,  \r\n\
    ecco la pregustata libert\xC3\xA0!  \r\n\
    Ecco un pianeta riscoperto a caso,  \r\n\
    sospiri e sogni, sempre nuove cose.  \r\n\
    Trattengo il fiato, e intorno \xC3\xA8 tutto mio,  \r\n\
    con gli occhi sfioro un brivido di stelle:  \r\n\
    in fondo \xC3\xA8 proprio questo il paradiso.  \r\n\
    \r\n\
    Silenzio. Ed \xC3\xA8 una notte cos\xC3\xAC bella...  \r\n\
    ...Silenzio. Ed \xC3\xA8 una notte cos\xC3\xAC beeellllaaa...\r\n\
    \r\n"
