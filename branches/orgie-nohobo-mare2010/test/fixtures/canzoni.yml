    e quaranta marchette sbaf\xC3\xB2\r\n\
    poi alla fine la gir\xC3\xB2!\r\n\
    ...e il maiale volevi rubar\r\n\
    ma il contadino ti fece arrestar\r\n\
    e ti disse: \"se hai voglia di rubar,\r\n\
    ruba il maiale di t\xC3\xB2 mar\"\r\n\
    ...e la vecchia bagascia disse: \"no,\r\n\
    il culo no, il culo non te lo d\xC3\xB2,\r\n\
    e se proprio ci hai voglia d'incular,\r\n\
    e vaffanculo alla majala di t\xC3\xB2 mar!\"\r\n\
    e vaffancul, vaffancul, vaffancul,\r\n\
    e vaffancul, vaffancul, vaffancul,\r\n\
    ....adl lib.\r\n"
