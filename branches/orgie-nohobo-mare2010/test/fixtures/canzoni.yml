  Corpo: "Sono anni che sto in goliardia e anche stamane sto' na' fetenzia\r\n\
    ieri sera c'\xC3\xA8 stata riunione me sono scolato tutt'un bottiglione\r\n\
    come sempre me sento no' straccio, sulla fronte la borsa del ghiaccio\r\n\
    una panza come no' bign\xC3\xA8, sar\xC3\xA0 stata la pasta oppur il vin brul\xC3\xA8\r\n\
    \r\n\
    Ho un esame domani al mattino, ma saltare riunione sarebbe un casino\r\n\
    i miei libri l\xC3\xAC sullo scaffale li guardo no poco non stanno poi male\r\n\
    il libretto tutto 'npolverato, da n'angolino me guarda schifato,\r\n\
    mi chiede le tasse che le paghi a fa' se pensi soltanto a bere e a scop\xC3\xA0\r\n\
    \r\n\
    RIT: o che bello che \xC3\xA8\r\n\
    bere per quattro e fumare per tre\r\n\
    sentirsi cazziare da mamma e pap\xC3\xA0\r\n\
    che strunza de vita mio figlio che fa\r\n\
    lalalalalalalalalalalalalalalalalala\r\n\
    \r\n\
    Quando vado alle matricolari per il mio fegato son cazzi amari\r\n\
    tra vecchi amici, fanciulle e buon vino, lo prendo ,lo annego e combino un casino\r\n\
    quando poi torno alla mia residenza, s'incazza e reclama la sua indipendenza\r\n\
    mi vengono pustole anche sul seder che neanche se mi giro non riesco a vedere\r\n\
    \r\n\
    Anche a Torino alle Caterinette il mio povero fisico ho messo alle strette\r\n\
    faccio bordello con gli altri guaglioni fin quando rimango ubriaco a carponi\r\n\
    Ho un aspetto che sta na schifezza, la panza le occhiaie color del limone\r\n\
