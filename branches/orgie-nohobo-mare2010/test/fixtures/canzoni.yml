  Corpo: "{La- sol6 fa maj.7 sol6}\r\n\
    Amico assai pi\xC3\xB9 esperto di me, ne hai viste tante,\r\n\
    dannato e affascinante sei, Clerico Vagante,\r\n\
    mille donne degne di te, ma non tutte quante,\r\n\
    cuore avvelenato da lei, sottile e intrigante\r\n\
    {do sol7}\r\n\
    la vita ti riserver\xC3\xA0 ancora tanti \xE2\x80\x9Cperch\xC3\xA9\xE2\x80\x9D, troppi per te\r\n\
