canzoni_349: 
  m_bSeria: "1"
  Data_creazione: 2005-11-19 14:34:55
  Corpo: "  \r\n\
    \r\n\
    [...]\r\n\
    Dissegli con ardor, et ei mostrolle.\r\n\
    \r\n\
    [...]\r\n\
    Quivi la bella, che d'accampamenti,\r\n\
    Di milizie e bordelli avea sapienza\r\n\
    S\xC3\xAC come di stallieri e pur d'armenti\r\n\
    Visto avea tutto e avea data accoglienza,\r\n\
    Quivi ristette, e scolorolle il viso.\r\n\
    \r\n\
    [...]\r\n\
    Qual da pietroso picco al ciel si spinge\r\n\
    L'eburnea del tiranno torre oscura\r\n\
    Che ad ogne pellegrin lo cor si stringe\r\n\
    Al rimirarla s\xC3\xAC erta et grande et dura,\r\n\
    Cos\xC3\xAC di Tano il nerboruto arnese\r\n\
    La bella intimor\xC3\xB2 per sua misura.\r\n\
    Poi che sconforto al suo bel cor s'apprese,\r\n\
    Vergognosa guatando il fiero usbergo,\r\n\
    Domandolli con proferir cortese:\r\n\
    - Fra le mie grazie va trovar albergo? -\r\n\
    Ei non rispuose ma fra coscia e coscia \r\n\
    Glielo pignea, e cintala da tergo\r\n\
    Con baldanza trombolla alquanto e poscia,\r\n\
    Senza por tempo in mezzo n\xC3\xA9 far motto,\r\n\
    Con belluino ardor tutta la scroscia\r\n\
    Con attacchi da manca, sopra e sotto.\r\n\
    Quanti gridi d'amor, quali favelle\r\n\
    Della sua bocca usciro -Deh, che botto!-\r\n\
    Gritava nei sospir -Costui mi svelle!-\r\n\
    Tano quei lai udendo a la gioconda\r\n\
    Fronte di lei s'accinge, e tra le belle\r\n\
    Labbra vermiglie sua virt\xC3\xB9 s'affonda\r\n\
    E n'entra e n'esce come fa in burrasca\r\n\
    Entro l'angusto approdo il flutto e l'onda.\r\n\
    Ella stupisce e qual gufo su frasca\r\n\
    Strabuzza i lumi per la maraviglia\r\n\
    Di poi che lassa in su l'alcova accasca.\r\n\
    Come lo cavaller tolta la briglia\r\n\
    In ver la pugna suo destrier conduce\r\n\
    E con motti di guerra lo consiglia\r\n\
    Quasi la bestia al dir si fia pi\xC3\xB9 truce,\r\n\
    Cos\xC3\xAC fe' Tano e l'enfie poppe tange\r\n\
    Pago di brama e con pietosa vuce\r\n\
    - Non aver tema - dice - a che tu piange?\r\n\
    Parti codesto amor un sagrifizio? -\r\n\
    E lei - Messer, d'ogne gran duol mi frange\r\n\
    L'aspro ment\xC3\xB2re di cotanto uffizio! -\r\n\
    Compassion il cor di Tano affrena\r\n\
    E per fugar di Cerere il supplizio\r\n\
    Ei s'unge la protuberanza oscena\r\n\
    Di cui la bella dicesi assai grata\r\n\
    - Non gi\xC3\xA0 di posa, ma di minor pena. -\r\n\
    Ah meretrici! Che per l'anni bui \r\n\
    Dell'empio Bacco foste le vestali!\r\n\
    Cantica non fu mai scritta per vui,\r\n\
    Sol nelle voci d'ebbri saturnali,\r\n\
    \xC3\x88 la sgraziata ode che v'incensa\r\n\
    Muse d'alti poeti e generali\r\n\
    [...]\r\n\
    \r\n\
    \r\n\
    \r\n"
  Autore: pseudo-Dante Alighieri
  ID_canzone: "1022522267"
  Note: "Il presente frammento, trovato per caso da un camionista che con il suo mezzo ha sfondato per errore le antiche mura di un monastero benedettino, ha portato lo scompiglio fra gli studiosi quando, dopo attento esame, \xC3\xA8 stato unanimemente attribuito al grande Poeta. Il componimento, in cui non \xC3\xA8 difficile scorgere tracce di quanto pi\xC3\xB9 tardi Dante avrebbe sviluppato nella Comedia, ritrae l'amplesso di un non meglio noto Tano e di una donzella \"che di milizie e bordelli avea sapienza\". Da qui l'annosa diatriba di chi vuol riconoscere nella smaliziata Cerere una giovane Beatrice. \r\n\
    \r\n\
    \r\n"
  titolo: Tano e Cerere
  tipo: 
  id_login: "2193"
