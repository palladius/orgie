canzoni_281: 
  m_bSeria: "1"
  Data_creazione: 2004-08-10 18:35:48
  Corpo: "{SOL RE}\r\n\
    1- L\xE2\x80\x99ai giurailo al bon gesu\xE2\x80\x99,che i saria fame santa,\r\n\
    {RE7 SOL}\r\n\
    Pero\xE2\x80\x99 dopu, l\xE2\x80\x99ai nen podu\xE2\x80\x99,l\xE2\x80\x99ai aossa\xE2\x80\x99 bandiera bianca,\r\n\
    {SOL RE}\r\n\
    Tuta colpa d\xE2\x80\x99na smangisson,ch\xE2\x80\x99ij sentiva \xE2\x80\x98n\xE2\x80\x99t la bogioeuja,\t\r\n\
    {RE7 SOL}\r\n\
    E anvece ad feme santa,son butame a fe la troeuja\r\n\
    \r\n\
    {DO SOL}\r\n\
    RIT.- O nos sgnur, ch\xE2\x80\x99ij seve \xE2\x80\x98n ciel,\t\r\n\
    {RE7 SOL}\t\t\t\t\r\n\
    Prepareme n\xE2\x80\x99 bel toch d\xE2\x80\x99usel (2 vv.)\t\r\n\
    \r\n\
    2- Son andaita dal bon curari,ch\xE2\x80\x99a\xE2\x80\x99m spiegheissa \xE2\x80\x98sta facenda,\r\n\
    A l\xE2\x80\x99a dime \xE2\x80\x9Cl\xE2\x80\x99e cosa grave,j\xE2\x80\x99e\xE2\x80\x99 gnun cas ch\xE2\x80\x99a na difenda\xE2\x80\x9D\r\n\
    Se ti t\xE2\x80\x99veule l\xE2\x80\x99assolussion,sia \xE2\x80\x98n materia che \xE2\x80\x98n sostanssa,\r\n\
    T\xE2\x80\x99deuvi vene senssa mudandeundes ore \xE2\x80\x98n\xE2\x80\x99t\xE2\x80\x99la mia stanssia\r\n\
    \r\n\
    RIT.- O nos sgnur, ch\xE2\x80\x99i seve \xE2\x80\x98n ciel...\r\n\
    \r\n\
    3- Quand son staita an\xE2\x80\x99t\xE2\x80\x99la soa stanssia,j\xE2\x80\x99era gia\xE2\x80\x99 cogia\xE2\x80\x99 \xE2\x80\x98n \xE2\x80\x98s\xE2\x80\x99el let\r\n\
    Senssa cota, e senssa braje,con so manich benedett\r\n\
    Con so manich ch\xE2\x80\x99ai bandava,long e gross come \xE2\x80\x98n tojror\r\n\
    A l\xE2\x80\x99a dime \xE2\x80\x9Cse t\xE2\x80\x99a stass brava,lon ch\xE2\x80\x99i\xE2\x80\x99t mostro a l\xE2\x80\x99e l\xE2\x80\x99amor...\r\n\
    \r\n\
    RIT.- O nos sgnur ch\xE2\x80\x99ij seve \xE2\x80\x98n ciel...\r\n\
    \r\n\
    4- L\xE2\x80\x99a butame contra la sponda, con le braje giu dal cul\r\n\
    L\xE2\x80\x99a possamlu giu per le tripe,a bandava come \xE2\x80\x98n mul\r\n\
    A l\xE2\x80\x99a fam-ne una veloce,l\xE2\x80\x99a sburane \xE2\x80\x98n barachin\r\n\
    Poi, rivolti gli occhi alla croce, l\xE2\x80\x99a sbalame \xE2\x80\x98l sigilin     \r\n\
    \r\n\
    RIT.- O nos sgnur, ch\xE2\x80\x99i seve \xE2\x80\x98n ciel...\r\n\
    \r\n\
    5- Preuva pura tute le mode, tuti i metodi pi neuv,\r\n\
    Ma se t\xE2\x80\x99veule peui propi gode, t\xE2\x80\x99deuve fe l\xE2\x80\x99sessantaneuv\r\n\
    Quand ch\xE2\x80\x99e t\xE2\x80\x99sente \xE2\x80\x98n bel picio \xE2\x80\x98n boca,\r\n\
    E due bale ch\xE2\x80\x99a sbato \xE2\x80\x98n\xE2\x80\x99s\xE2\x80\x99j\xE2\x80\x99eui,\r\n\
    E na lenga ch\xE2\x80\x99a t\xE2\x80\x99la stopa, t\xE2\x80\x99vas tuta n\xE2\x80\x99 breud d\xE2\x80\x99 faseui\r\n\
    \r\n\
    RIT.- O nos sgnur, ch\xE2\x80\x99ij seve \xE2\x80\x98n ciel,\r\n\
    Prepareme \xE2\x80\x98n bel toch d\xE2\x80\x99usel     ( 2 vv. )\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n"
