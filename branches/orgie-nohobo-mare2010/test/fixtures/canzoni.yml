canzoni_096: 
  m_bSeria: "1"
  Data_creazione: 2003-07-04 18:28:52
  Corpo: "{   do fa la- fa sol sol7 do }\r\n\
    HO VISTO UN BIMBO CHE SI MISURAVA LO STRUMENTO\r\n\
    E A GIUDICARE DALLA FACCIA ERA CONTENTO\r\n\
    IO ME LO GUARDO E SEMBRA SOLO UN RAPANELLO\r\n\
    NON POSSO CERTO DIRE CHE SIA MLTO BELLO\r\n\
    {   do la- fa sol7 }x N volte...... {(fa sol)}\r\n\
    PERCHE\xE2\x80\x99 E\xE2\x80\x99 CORTO\r\n\
    IO PROVO A RADDRIZZARLO E RESTA STORTO\r\n\
    NON DA SEGNI DI VITA\xE2\x80\xA6 E\xE2\x80\x99 UN ABORTO\xE2\x80\xA6\r\n\
    \r\n\
    IO PENSO\r\n\
    CHE QUELLI DELLA MIA ETA\xE2\x80\x99 CE L\xE2\x80\x99HAN PIU\xE2\x80\x99 GROSSO\r\n\
    E SI DIVERTONO A CIULARE A PIU\xE2\x80\x99 NON POSSO\r\n\
    IO FACCIO CURE DI POMATE E CREME STRANE\r\n\
    DEI RISULTATI NON MI SONO MAI ACCORTO\r\n\
    PERCHE\xE2\x80\x99 E CORTO\xE2\x80\xA6\r\n\
    NON ALZA MAI LA TESTA E RESTA SMORTO\r\n\
    L\xE2\x80\x99ALTRANNO SI E\xE2\x80\x99 SVEGLIATO E SI E\xE2\x80\x99 CONTORTO\r\n\
    MA DOPO DUE MINUTI, ERA GIA\xE2\x80\x99 MORTO\xE2\x80\xA6\r\n\
    \r\n\
    IO PROVO\r\n\
    DA MOLTI ANNI A FAR L\xE2\x80\x99AMORE A PAGAMENTO\r\n\
    IN BANCA ORMAI MI SI E\xE2\x80\x99 ACCORCIATO PURE IL CONTO\r\n\
    E LE RAGAZZE QUANDO GUARDAN \xE2\x80\x98STO COSINO\r\n\
    FANNO LA FACCIA STRANA E DOPO MI DERIDONO\r\n\
    MA PENSO CHE UN BEL GIORNO ASSAI LONTANO\r\n\
    IN MEZZO A UN CAMPO, OPPURE IN BARCA O IN AEROPLANO\r\n\
    SARA\xE2\x80\x99 UN GIGANTE NEL MOMENTO DEL BISOGNO\r\n\
    CREDO PERO\xE2\x80\x99 CHE RESTERA\xE2\x80\x99 SOLO UN BEL SOGNO\r\n\
    PERCHE\xE2\x80\x99 E\xE2\x80\x99 CORTO\r\n\
    LO SCUOTO, LO SCHIAFFEGGIO, E RESTA SMORTO\r\n\
    GLI ATTACCO PURE I PESI E RESTA CORTO\r\n\
    IO PIANGO E MI DISPERO,.. SEMBRA MORTO\xE2\x80\xA6"
