    ...come sabbia...  \r\n\
    e pensieri un poco... torbidi,  \r\n\
    malinconici, ora \xC3\xA8 tardi  \r\n\
    e il presente? ...E gi\xC3\xA0 ricordo...  \r\n\
    \r\n\
    Sguardi dolci rifiutati,  \r\n\
    un volo breve di minuti...  \r\n\
    resta uno stupido bicchiere  \r\n\
    il presente \xC3\xA8 gi\xC3\xA0 passato...  \r\n\
    \r\n\
    Vecchio dai puoi farne senza  \r\n\
    poi fredda notte di partenza  \r\n\
    e le calde labbra morbide  \r\n\
    ed i brevi baci gelidi...  \r\n\
    son gi\xC3\xA0 ricordi...  \r\n\
    \r\n\
