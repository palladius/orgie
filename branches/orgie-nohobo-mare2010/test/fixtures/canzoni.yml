  Corpo: "1- Passa il tempo amore  {RE}\r\n\
    come il vento passa e va  {FA#m SOL}\r\n\
    ma a soffrire siamo sempre noi  {SI7 MIm}\r\n\
    a crepare siamo sempre noi.  {LA RE}\r\n\
    C'\xC3\xA8 chi dice amore  {RE}\r\n\
    sii paziente e ci sar\xC3\xA0  {FA#m SOL}\r\n\
    una ricompensa, un aldil\xC3\xA0.  {SI7 MIm}\r\n\
    \r\n\
    RIT.: Grazie, Ges\xC3\xB9 Cristo, non mi va  {SOLm RE}\r\n\
    ho la mia famiglia e vive qua. [2v]  {MIm LA RE}\r\n\
    \r\n\
    2- Se mio figlio ha fame  \r\n\
    che gli dico: \"amore mio  \r\n\
    non ti preoccupare che c'\xC3\xA8 Dio\"  \r\n\
    credi che la fame passer\xC3\xA0?  \r\n\
    Come alternativa \r\n\
    mi si offre un aldil\xC3\xA0  \r\n\
    fatto di uguaglianza e di umilt\xC3\xA0.\r\n\
    \r\n\
    RIT.: Grazie, Ges\xC3\xB9 Cristo, non mi va  \r\n\
    ho la mia famiglia e vive qua. [2v] \r\n \r\n\
    3- Questa \xC3\xA8 la mia terra  \r\n\
    e nelle braccia amore mio  \r\n\
    trovo la risposta che mi va \r\n\
