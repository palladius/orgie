  Corpo: "C'era una volta una favola antica quasi da tutti\r\n\
    ormai dimenticata che continuava a volare \r\n\
    nell'aria aspettando colui che l'avrebbe di nuovo\r\n\
    narrata,\xC3\xA8 una favola vecchia e un poco svanita\r\n\
    con un barattolo di aranciata aperta ma non voleva\r\n\
    rassegnarsi e cercava di non dimenticarsi uehh\r\n\
    parlava di una bambina bionda che non voleva dormire\r\n\
    da sola e la sua mamma poverina doveva starle sempre\r\n\
    vicina,ma un giorno venne una bella signora tutta vestita\r\n\
    di luce viola prese la mamma per la mano e la porto \r\n\
    lontano lontano la bimba pianse cento sere e poi si stanc\xC3\xB2\r\n\
    e si addorment\xC3\xB2-quando il mattino la venne a svegliare \r\n\
    con un bellissimo raggio di sole vide la mamma poverina\r\n\
    che sotto un albero dormiva e la signora vestita di viola\r\n\
    disse non devi pi\xC3\xB9 avere paura di restare sola.C'era una volta una favola antica quasi da tutti ormai dimenticata\r\n\
    che continuava a volare nell'aria aspettando colui che\r\n\
    l'avrebbe di nuovo narrata \xC3\xA8 una favola vecchia un poco \r\n\
    svanita con un barattolo di aranciata aperta e per non essere dimenticata divento vera diivento ohoh oh divento\r\n\
    la vita diventoo diventoo vita."
