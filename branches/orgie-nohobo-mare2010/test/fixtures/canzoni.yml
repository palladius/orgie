  Corpo: "Veronica, \r\n\
    amavi sol la musica sinfonica\r\n\
    ma la suonavi con la fisarmonica,\r\n\
    Veronica, perch\xC3\xA8?\r\n\
    \r\n\
    Veronica, \r\n\
    se non mi sbaglio stavi in via Canonica;\r\n\
    dicevi sempre: \"voglio farmi monaca!\"\r\n\
    ma intanto bestemmiavi contra i pr\xC3\xA9!\r\n\
    \r\n\
    Ti ricordo ancora come un primo amore:\r\n\
    lacrime, rossore fingesti per me.\r\n\
    Mi lasciasti fare senza domandare \r\n\
    quello che pensassi di te, oh!\r\n\
    \r\n\
    Veronica,\r\n\
    il primo amor di tutta via Canonica:\r\n\
    con te, non c'era il rischio del platonico,\r\n\
    Veronica, con te!\r\n\
    \r\n\
    Veronica, \r\n\
    da giovane, per noi eri l'America:\r\n\
    davi il tuo amore per una cifra modica\r\n\
    al Carcano, in p\xC3\xA9, ma...\r\n\
    \r\n\
    Ti ricordo ancora come un primo amore:\r\n\
    lacrime, rossore fingesti per me.\r\n\
    Mi lasciasti fare senza domandare \r\n\
    quello che pensassi di te, oh!\r\n\
    \r\n\
    Veronica,\r\n\
    l'amor con te non era cosa comoda,\r\n\
    n\xC3\xA8 il luogo, forse, era il pi\xC3\xB9 poetico:\r\n\
    al Carcano, in p\xC3\xA9; ma...\r\n\
    \r\n\
    Ti ricordo ancora come un primo amore:\r\n\
    lacrime, rossore fingesti per me.\r\n\
    Mi lasciasti fare senza domandare \r\n\
    quello che pensassi di te,\r\n\
    mi lasciasti fare senza domandare... \r\n\
    al Carcano, in p\xC3\xA9!"
