  Corpo: "introduzione {mi-7 re sus9 mi-7}\r\n\
    \r\n\
    {mi-7 re9 sol mi-7 re9 mi-7}\r\n\
    Braccata dai servi del potere, \xE2\x80\x9Co la volpe o il sangue\xE2\x80\x9D non mi va!\r\n\
    {Do re do re}\r\n\
    vento che le scuote il muso, prigioniera di un sopruso\xE2\x80\xA6\r\n\
    {mi-7 re sol mi-7 re mi-7}\r\n\
    E\xE2\x80\x99 un gioco astuto del priore! \xE2\x80\x9Co la volpe o il sangue\xE2\x80\x9D non mi va!\r\n\
    {Do re do re}\r\n\
    Stati d\xE2\x80\x99animo letali, sottoposti e principali\r\n\
    {Sol do re}\r\n\
    Ma il passato \xC3\xA8 bracconiere, e alla volpe non le va\r\n\
    {sol do re}\r\n\
    Troppi cuori nel carniere, e mai nessuno che ci sta\r\n\
    {La- do sol re}\r\n\
    Non lasciatemi giocare! Non lasciatemi sognare!\r\n\
    {Do re mi-7 re mi-7}\r\n\
    Troppi cuore nel carniere, e mai nessuno che ci sta.\r\n\
    \r\n\
    Troppi cani, troppi servi, \xE2\x80\x9Co la volpe o il sangue\xE2\x80\x9D non mi va!\r\n\
    Troppe donne di nessuno, che nessuno potr\xC3\xA0 avere\r\n\
    Cento denti cento sguardi, \xE2\x80\x9Co la volpe o il sangue\xE2\x80\x9D non mi va!\r\n\
    Cento spade, cento fanti, non potranno mai bastarti\xE2\x80\xA6\r\n\
    \r\n\
    Ma il passato \xC3\xA8 bracconiere, e alla volpe non le va\r\n\
    Troppi cuori nel carniere, e mai nessuno che ci sta\r\n\
    Non lasciatemi giocare! Non lasciatemi sognare!\r\n\
    Troppi cuore nel carniere, e mai nessuno che ci sta. "
