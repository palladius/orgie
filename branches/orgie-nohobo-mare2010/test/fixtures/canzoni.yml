  Data_creazione: 2007-04-21 11:14:20
  Corpo: "andr\xC3\xB2 verso la vita\r\n\
    andr\xC3\xB2 verso la FIGA\r\n\
    e se non me ne tocca\r\n\
    almen mi d\xC3\xACan di bocca\r\n\
    al sol sentir l'afrore\r\n\
    mi monta un gran furore\r\n\
    le ultime cartucce\r\n\
    io v\xC3\xB2 a sparar - merdacce! -\r\n\
    finch\xC3\xA8 dura il drizzagno\r\n\
    io non me lo sparagno\r\n\
    e sburro in gaudio magno\r\n\
    lo f\xC3\xB2 senza ritegno!\r\n\
    la studentessa dice\r\n\
    che mi conservo bene\r\n\
    sarebbe assai felice\r\n\
    di accogliere il mio pene\r\n\
    se c'\xC3\xA8 un po' di pancetta\r\n\
    non me lo fa pesare\r\n\
    l'azzurra pastiglietta\r\n\
    non devo ancor comprare\r\n\
    invece le tardone\r\n\
    mi voglion palestrato\r\n\
    se voglio un rampigone\r\n\
    devo sprecare fiato\r\n\
    con tutto 'sto fermento\r\n\
    mi viene da pensare\r\n\
    che devomi, al momento,\r\n\
    finir di sviluppare!\r\n\
    di nuovo in Goliardia\r\n\
    ma con discernimento\r\n\
    convinto che non sia\r\n\
    s\xC3\xAC sterile argomento\r\n\
    se vuoi che ti trasmetta\r\n\
    un po' del mio sapere\r\n\
    tu offrimi una tetta\r\n\
    o un pezzo di sedere\r\n\
    lo faccio di buon grado\r\n\
    scegli il momento giusto\r\n\
    sorreggimi se cado\r\n\
    abbi un po' di buon gusto.\r\n\
    <I>so if you meet me, have some courtesy\r\n\
    have some sympathy, and some taste\r\n\
    Use all your well-learned politesse\r\n\
    Or I'll lay your soul to waste...</I>"
