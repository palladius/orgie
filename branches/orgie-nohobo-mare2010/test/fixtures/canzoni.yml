  Corpo: "La-\t\t\tDo\r\n\
    Santi cavalieri ci chiamavano\r\n\
    Sol\t\t\tRe\r\n\
    Cavalcavamo verso il sole\r\n\
    La-\t\t\tDo\r\n\
    Verso le chimere del futuro\r\n\
    Sol\t\t\tRe\tLa-  Sol  La-  Sol  La-\r\n\
    Portavo fiero il mio destriero\r\n\
    Re-\t\t\tDo\r\n\
    Ma ora mi porta il vento\r\n\
    Sol\t\tRe-\tLa-\r\n\
    Le parole del tempo\r\n\
    Mi-\t\t\tDo\r\n\
    Lascio a voi la mia storia\r\n\
    Sol\t\t\tRe- La-\r\n\
    Che diventi una leggenda\r\n\
    \r\n\
    RIT.\r\n\
    Fa\t\tDo\r\n\
    Sono un Templare\r\n\
    Sol\t\t       Re-  La-\r\n\
    In viaggio verso il futuro\r\n\
    Fa\t    Do\r\n\
    La rossa Croce\r\n\
    Sol\t\t     Re- La-  Sol  La-\r\n\
    E la rosa van con me\r\n\
    \r\n\
    La-\t\t\tDo\r\n\
    A nuova vita rinasceremo\r\n\
    Sol\t\t\tRe\r\n\
    Come fenice dal sacro fuoco\r\n\
    La-\t\t\tDo\r\n\
    Figli miei con grande onore\r\n\
    Sol\t\t\t      Re\t\tLa-  Sol  La-  Sol  La-\r\n\
    La rossa Croce portate al mondo\r\n\
    Re-\t\t\t\tDo\r\n\
    Scorgo l\xE2\x80\x99alba di un nuovo giorno\r\n\
    Sol\t\t\t\tRe-\r\n\
    Guardo avanti e gli corro in contro\r\n\
    Mi-\t\t\tDo\r\n\
    Sellate presto il mio destriero\r\n\
    Sol\t\t\t\tRe-\r\n\
    \xC3\x88 giunto dunque il gran momento\r\n\
    \r\n\
    RIT. X 2 (la seconda con In viaggio verso il mare)\r\n\
    \r\n\
