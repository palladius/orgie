canzoni_283: 
  m_bSeria: "1"
  Data_creazione: 2004-09-08 21:07:32
  Corpo: "In una chiesa un poco malandata\r\n\
    un uccello da una finestra spalancata\r\n\
    entr\xC3\xB2, vol\xC3\xB2 su e gi\xC3\xB9 per la navata\r\n\
    tra lo stupore di chi era inginocchiata\r\n\
    \r\n\
    Poi stanco del continuo svolazzare\r\n\
    sul pavimento se ne and\xC3\xB2 a posare\r\n\
    e ad un tratto si ud\xC3\xAC un cinguettio\r\n\
    che ruppe il silenzio nella casa di Dio\r\n\
    \r\n\
    Qualcuno rise e il prete che sent\xC3\xAC\r\n\
    volle domare quel chiasso e interven\xC3\xAC\r\n\
    si arrampic\xC3\xB2 sul pulpito e veloce\r\n\
    arring\xC3\xB2 i parrocchiani ad alta voce\r\n\
    \r\n\
    \"Fratelli, chi ha l'uccello, per favore\r\n\
    abbandoni subito la casa del Signore\"\r\n\
    gli uomini un p\xC3\xB2 stupiti a tal sentire\r\n\
    ad uno ad uno cominciarono ad uscire\r\n\
    \r\n\
    Il prete allor cap\xC3\xAC l'errore madornale\r\n\
    \"Fermi - grid\xC3\xB2 - forse mi sono espresso male\r\n\
    tornate indietro e statemi a sentire\r\n\
    solo chi ha preso l'uccello in chiesa deve uscire\"\r\n\
    \r\n\
    A questi detti e proprio in quest'istante\r\n\
    alcune monache si alzarono all'istante\r\n\
    s'erano guardate in faccia e con rossore\r\n\
    tentavan di lasciare la casa del Signore\r\n\
    \r\n\
    \"O Santa Vergine - esclam\xC3\xB2 il prete -\r\n\
    tornate indietro, o mie sorelle chete\r\n\
    ancor ripeto, e che non sia pi\xC3\xB9 vano\r\n\
    esca soltanto chi ha l'uccello in mano!\"\r\n\
    \r\n\
    Una ragazza che col fidanzato\r\n\
    s'era seduta in un angolo appartato\r\n\
    all'ombra di una cappella laterale \r\n\
    poco manc\xC3\xB2 che si sentisse male\r\n\
    \r\n\
    E con un fil di voce disse all'amato\r\n\
    \"Te lo dicevo che il parroco ha guardato!\"\r\n"
