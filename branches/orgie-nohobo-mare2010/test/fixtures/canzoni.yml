    ti sembrer\xC3\xA0 strano ma - perep\xC3\xA8 - \r\n\
    c'\xC3\xA8 volpe e c'\xC3\xA8 tadorna insieme nella tana...\r\n\
    \r\n\
    Detto fra noi,\r\n\
    il bello della nostra congrega,\r\n\
    e ognuno lo sa,\r\n\
    \xC3\xA8 che si vale minus quam sega,\r\n\
    si spera che almeno salti fuori dal mazzo\r\n\
