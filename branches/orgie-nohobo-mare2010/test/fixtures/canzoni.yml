  Corpo: "Il Sor Antonio, che sta a Belvedere, \r\n\
    s'\xC3\xA8 fatto l'altra sera visitare; \r\n\
    il medico gli ha detto di non bere, \r\n\
    di non andare a donne e non fumare. \r\n\
    Fiore di viola... \r\n\
    La moglie non gli ha detto una parola \r\n\
    ma gli ha comprato tosto una pistola... \r\n\
    Fiore di viola... \r\n\
    Tuo padre mi rifiuta la tua mano, \r\n\
    m'ha detto che sei un ricco bocconcino \r\n\
    e che ti voglio solo per il grano; \r\n\
    ma tu faresti becco anche un becchino. \r\n\
    Fiore di spino... \r\n\
    \xC3\x88 vero che sei un ricco bocconcino \r\n\
    ma in troppi ci hanno fatto uno spuntino. \r\n\
    Fiore di spino... \r\n\
    Domani che ricorre l'Ascensione \r\n\
    ti vo' portare meco alle Cascine, \r\n\
    ricordati del vino e del salmone, \r\n\
    che io ti porto del salame fine! \r\n\
    Fior di betullo... \r\n\
    Il tu' sarebbe un fidanzato grullo \r\n\
    se ti mandasse a casa senza grillo. \r\n\
    Fior di betullo...\r\n"
