  Corpo: "TI DETONERO\xE2\x80\x99 UNA ROSA \r\n\
    (L.Pautasso \xE2\x80\x93 S.Cristicchi) \r\n\
    \r\n\
    \r\n\
    Mi chiamo Cho e sono stufo \r\n\
    occhi spalancati come un gufo \r\n\
    m\xE2\x80\x99aggiro per un campus grande ma che mi sta stretto. \r\n\
    Non bastano due Colt, mi ci vorrebbe uno schioppetto \r\n\
    per fare un repulisti \r\n\
    generale \r\n\
    di tutti questi musi tristi \r\n\
    che all\xE2\x80\x99intervallo fan merenda col caviale \r\n\
    ricchi straricchi come Cresi \r\n\
    racce da telefilm nemmeno fossero Dawson e Pacey, \r\n\
    \r\n\
    Io invece son piccolino, \r\n\
    meschino, per giunta \"cino\" \r\n\
    fatto e finito, \r\n\
    il portafogli vuoto come il pozzo senza fondo \r\n\
    dove con tanto ardore getterei tutto quanto questo porco mondo \r\n\
    e tu, ragazza, non ci pensi troppo a darmi il benservito, \r\n\
    per cui lo spazio che ti lascio, \r\n\
    nel mio Cuore, son solo i 9 millimetri di questa canzone \r\n\
    coi quali sfascio \r\n\
    la vita e le speranze di trentatr\xC3\xA8 persone \r\n\
    \r\n\
    Rit. \r\n\
    Ti detoner\xC3\xB2 una rosa, \r\n\
    di pallini plumbei che distruggano ogni cosa \r\n\
    bastano soltanto una pistola ed un caricatore \r\n\
    e poi via il dente, via il dolore. \r\n\
    Cadon uno dopo l\xE2\x80\x99altro gli studenti a iosa \r\n\
    sotto il mio grilletto che lavora senza posa \r\n\
    tiro alla studentessa ciospa come alla pi\xC3\xB9 bella. \r\n\
    Poi sparo anche alla bidella \r\n\
    \r\n\
    Ora \xC3\xA8 finita. \r\n\
    Ora che il sangue di cento persone macchia le mie dita \r\n\
    e da dentro un armadietto, il mio ultimo baluardo \r\n\
    un viavai di ambulanze, lampeggianti, cani e poliziotti guardo, \r\n\
    ripenso a quel che ho fatto e, vi giuro, non ne ho rimorso \r\n\
    del resto nella vita sono stato sempre un orso \r\n\
    nessun amico, nessun legame, innamorato come un nerd di una che non mi filava \r\n\
    ma che ridendo alle mie spalle questo e quello si faceva. \r\n\
    Scrivete pure che ero matto, forse strafatto \r\n\
    magari che in preda al misticismo col diavolo avevo stretto un patto \r\n\
    ma vi sbagliate, non sono affatto un pazzo \r\n\
    se proprio ho una sindrome, \xC3\xA8 soltanto quella della testa di astrokazzo di Gundam \r\n\
    \r\n\
    Rit. \r\n\
    Ti detoner\xC3\xB2 una rosa\xE2\x80\xA6 \r\n\
    \r\n\
    Adesso basta chiacchierare. \r\n\
    Ho gi\xC3\xA0 esaurito tutte le parole cos\xC3\xAC come le pallottole che avevo da detonare \r\n\
    meticolosa \xC3\xA8 stata dei compagni di corso la mia esecuzione \r\n\
    alla morte andati in fila, uno dopo l\xE2\x80\x99altro, come i cristiani alla comunione \r\n\
    poi quelli in corridoio, che ho preso a caso, come veniva veniva \r\n\
    sfigati che scappavano ma che ho lasciato stesi a terra, nessuno sfuggiva \r\n\
    in quel delirio onnipotente in cui ero piombato \r\n\
    mi son venuto nelle brache da quanto ero eccitato. \r\n\
    Dispensatore di morte, giudice supremo dei destini \r\n\
    Di gente che di fronte a me tremando svuotava a terra gli intestini. \r\n\
    Non ho paura di morire n\xC3\xA9 di finire arrestato \r\n\
    perch\xC3\xA9 so di essere invincib\xE2\x80\xA6 \r\n\
    Merda! Mi hanno beccato \r\n\
    BANG \r\n\
    \r\n\
    Rit. \r\n\
    Ti detoner\xC3\xB2 una rosa... \r\n\
    \r\n\
    from: \r\n\
    http://ilrestodelpautasio.blogspot.com"
