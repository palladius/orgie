canzoni_194: 
  m_bSeria: "1"
  Data_creazione: 2003-05-14 13:29:30
  Corpo: "[Strofa A] {DO FA DO FA\r\n\
    DO FA SOL7}\r\n\
    Dormi, s'\xC3\xA8 fatto tardi;  \r\n\
    sono ore che mi guardi in silenzio e che non parli  \r\n\
    tranquillizza le tue gambe nervose,  \r\n\
    sono come ragazze offese, carine e troppo vanitose.  \r\n\
    Sciogli i capelli, lasciati andare,  \r\n\
    hai gli occhi stanchi dell'amore,  \r\n\
    spegni la luce e vieni subito qui,  \r\n\
    io ti voglio bene.  \r\n\
    \r\n\
    [Strofa B]{LA- MI FA DO\r\n\
    FA DO SOL7}\r\n\
    In questa stanza all'ultimo piano,  \r\n\
    in questa stanza appiccicata al cielo,  \r\n\
    una donna m'ha detto \"amore,  \r\n\
    ora non sei pi\xC3\xB9 solo\"  \r\n\
    \r\n\
    T'avevan detto che sono bugiardo  \r\n\
    ma tu non credere a quelle parole,  \r\n\
    son solo un uomo normale  \r\n\
    che ha bisogno d'amore.  \r\n\
    \r\n\
    T'avevan detto che son pericoloso  \r\n\
    ma sono solo un pochino nervoso,  \r\n\
    l'amore mi rende tranquillo:  \r\n\
    l'hai capito o no?  \r\n\
    \r\n\
    Dormi, e non preoccuparti  \r\n\
    difficilmente il sole domani potr\xC3\xA0 disturbarti,  \r\n\
    Dormi, e respira piano,  \r\n\
    tanto tra poco respirerai sempre di meno.\r\n Le mie mani sul tuo collo  \r\n\
    e tutto quanto qui diventa pi\xC3\xB9 bello:  \r\n\
    vedo le pareti girare, ti vedo morire.  \r\n\
    Come sei bella quando gridi aiuto,  \r\n\
    l'ultimo respiro, l'ultimo saluto,  \r\n\
    il fondotinta non ti serve pi\xC3\xB9:  \r\n\
    stai diventando bl\xC3\xB9.  \r\n\
    \r\n\
    Come sei bella con la lingua fuori,  \r\n\
    con quegli occhi cos\xC3\xAC grandi e profondi,  \r\n\
    ti chiedo \"cosa c'\xC3\xA8 che non va?\"  \r\n\
    ma tu non mi rispondi...  \r\n\
    Non ti diverti, ti vedo un po' tesa  \r\n\
    forse dovevo inventare qualcosa,  \r\n\
    probabilmente con i piedi all'ins\xC3\xB9  \r\n\
    ti diverti di pi\xC3\xB9.  \r\n\
    \r\n\
    Dormi, \xC3\xA8 finito tutto.  \r\n\
    Con lo sguardo assente insegui le ombre sul soffitto.  \r\n\
    Fuori, senti... urlano le sirene.  \r\n\
    Sicuramente stanotte qualcuno s'\xC3\xA8 sentito un po'male."
