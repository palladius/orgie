  Corpo: "Quando un goliarda muore, muore due volte:  \r\n\
    muore l'uomo che \xC3\xA8 in lui, muore l'amico che \xC3\xA8 in te.  \r\n\
    Quando un goliarda muore solo tu e sua madre  \r\n\
    sapete veramente che cos'\xC3\xA8 il dolore.  \r\n\
    Quando un goliarda muore non bastano le lacrime  \r\n\
    a calmare la sete che arde nel tuo cuore.  \r\n\
    \r\n\
    Abbiamo urlato stonati le stesse canzoni  \r\n\
    vivendo felici i vent'anni e le nostre illusioni.  \r\n\
    Potrei cantare di te, della donna che mi ha dato  \r\n\
    la felicit\xC3\xA0, ma il mio tempo \xC3\xA8 la coscienza di  \r\n\
    chi lotter\xC3\xA0 per il pane della sua libert\xC3\xA0.  \r\n\
    \r\n\
    Mi regalarono i fiori, le stelle, la luna, il sole, l'amore.  \r\n\
    Volli solo sfiorarli con la mano  \r\n\
    per possederne il suono e la voce, ma ho conservato  \r\n\
    gli occhi umidi della tristezza del mondo, per regalarli  \r\n\
    a chi ha dimenticato che c'\xC3\xA8 ancora chi piange.  \r\n\
    \r\n\
    Quando un goliarda muore, muore un poeta  \r\n\
    che ancora non ha scritto il suo inno alla vita.  \r\n\
    Quando un goliarda muore, muore un pittore  \r\n\
    che ancora non ha rubato alle farfalle il colore.  \r\n\
    Quando un goliarda muore, non si accorge la gente  \r\n\
    di lui che ha visto tanto e non ha chiesto niente.  \r\n\
    \r\n\
    Abbiamo urlato stonati le stesse canzoni  \r\n\
    vivendo felici i vent'anni e le nostre illusioni.  \r\n\
    Potrei cantare di te, della donna che mi ha dato  \r\n\
    la felicit\xC3\xA0, ma il mio tempo \xC3\xA8 la coscienza di  \r\n\
    chi lotter\xC3\xA0 per il pane della sua libert\xC3\xA0.  \r\n\
    \r\n\
    Perch\xC3\xA8 libert\xC3\xA0 \xC3\xA8 rifiutare ci\xC3\xB2 che di pi\xC3\xB9 ci viene offerto, \r\n\
    perch\xC3\xA9 libert\xC3\xA0 \xC3\xA8 spezzare ogni lusinga,  \r\n\
    perch\xC3\xA9 libert\xC3\xA0 \xC3\xA8 pensare con il proprio cervello.\r\n\
    \r\n"
