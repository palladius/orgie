  Corpo: "Si sveglia il mondo lo accarezza il sole\r\n\
    si sveglia l\xE2\x80\x99ape Maia dentro un fiore\r\n\
    Apre i suoi occhi sorridenti\r\n\
    stropiccia le sue ali trasparenti\r\n\
    \r\n\
    Vola, vola, vola vola, vola l\xE2\x80\x99ape Maia\r\n\
    gialla e nera nera e gialla, tanto gaia\r\n\
    Vola sopra un monte, sfiora il cielo\r\n\
    per rubare il nettare da un melo\r\n\
    \r\n\
    Vola, vola, vola vola, vola l\xE2\x80\x99ape Maia\r\n\
    gialla e nera nera e gialla, tanto gaia\r\n\
    \r\n\
    Il grillo canterino s\xE2\x80\x99\xC3\xA8 svegliato\r\n\
    fa la serenata a tutto il prato\r\n\
    In quel prato verde come il mare\r\n\
    l\xE2\x80\x99importante \xC3\xA8 un fiore da trovare\r\n\
    \r\n\
    Bzzzzzzzzzzzzzzzzzzzzzzzzz\r\n\
    \r\n\
    Vola, vola, vola vola, vola l\xE2\x80\x99ape Maia\r\n\
    gialla e nera nera e gialla, tanto gaia\r\n\
    Finch\xC3\xA9 il ragno tesse la sua tela\r\n\
    mentre il vento la sua trama svela\r\n\
    \r\n\
    Vola, vola, vola vola, vola l\xE2\x80\x99ape Maia\r\n\
    gialla e nera nera e gialla, tanto gaia\r\n\
    \r\n\
    Bzzzzzzzzzzzzzzzzzzzzzzzzzz\r\n\
    \r\n\
    Vola, vola, vola vola, vola l\xE2\x80\x99ape Maia\r\n\
    gialla e nera nera e gialla, tanto gaia\r\n\
    Nuvole di panna su nel cielo\r\n\
    brilla sulla Terra e sotto un melo\r\n\
    \r\n\
    Vola, vola, vola vola, vola l\xE2\x80\x99ape Maia\r\n\
    gialla e nera nera e gialla, tanto gaia\r\n"
