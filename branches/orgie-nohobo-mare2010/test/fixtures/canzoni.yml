    RIT.: Non voglio mica la mona {SOL DO}\r\n\
    Chiedo soltanto di andare {RE/DO SIm}\r\n\
    Di andare al cesso a spararmi le seghe {MIm DO}\r\n\
    Ma senza di te {RE}\r\n\
    Non voglio mica la mona {SOL DO}\r\n\
    Voglio soltanto un momento {RE/DO SIm}\r\n\
