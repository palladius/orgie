  Corpo: "Ho comprato una sciarpa di lana,\r\n\
    l'ho comprata soltanto per te;\r\n\
    ho saputo che fai la putt\xC3\xA0na:\r\n\
    la sciarpa di lana la tengo per me.\r\n\
    Ho comprato una radio Marelli,\r\n\
    l'ho comprata soltanto per te;\r\n\
    ho saputo che lecchi gli uccelli:\r\n\
    la radio Marelli la tengo per me.\r\n\
    Ho comprato una radio Phonola,\r\n\
    l'ho comprata soltanto per te;\r\n\
    ho saputo che fai la spagnola:\r\n\
    la radio Phonola la tengo per me.\r\n\
    Ho comprato un bel vaso di vetro,\r\n\
    l'ho comprato soltanto per te;\r\n\
    ho saputo che vendi il didietro:\r\n\
    il vaso di vetro lo tengo per me.\r\n\
    Ho comprato un bel fiasco di vino,\r\n\
    l'ho comprato soltanto per te;\r\n\
    ho saputo che vai al casino:\r\n\
    il fiasco di vino lo tengo per me.\r\n\
    Ho comprato un bel paio di guanti,\r\n\
    li ho comprati soltanto per te;\r\n\
    ho saputo che hai molti amanti:\r\n\
    il paio di guanti lo tengo per me.\r\n\
    Ho comprato una moto Gilera,\r\n\
    l'ho comprata soltanto per te;\r\n\
    ho saputo che chiavi ogni sera:\r\n\
    la moto Gilera la tengo per me.\r\n\
    Ho comprato due belle calosce,\r\n\
    l'ho comprate soltanto per te;\r\n\
    ho saputo che fai gli infracosce:\r\n\
    le belle calosce le tengo per me.\r\n\
    Ho comprato un' Isotta Fraschini,\r\n\
    l'ho comprata soltanto per te;\r\n\
    ho saputo che fai gran pompini:\r\n\
    l' Isotta Fraschini la tengo per me.\r\n\
    Ho comprato una vacca ed un mulo,\r\n\
    li ho comprati soltanto per te;\r\n\
    ma da quando lo prendi nel culo\r\n\
    la vacca ed il mulo li tengo per me.\r\n\
    Ho comprato una mazza da polo,\r\n\
    l'ho comprata soltanto per te;\r\n\
    ma da quando mi hai dato lo scolo\r\n\
    la mazza da polo la tengo per me.\r\n\
    Ho comprato due lunghi bastoni,\r\n\
    li ho comprati soltanto per te;\r\n\
    ma da quando mi hai rotto i coglioni\r\n\
    i lunghi bastoni li tengo per me. \r\n\
    \r\n"
