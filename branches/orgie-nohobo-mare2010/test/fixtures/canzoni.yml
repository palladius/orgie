  Data_creazione: 2005-02-21 21:50:08
  Corpo: "Si chiudono i casini\r\n\
    e la Merlin fa festa\r\n\
    perch\xC3\xA8, l'ha detto sempre,\r\n\
    vuol la puttana onesta.\r\n\
    La senatrice rossa,\r\n\
    testarda pi\xC3\xB9 di un mulo,\r\n\
    la libert\xC3\xA0 ci ha tolta\r\n\
    di andare tutti in culo.\r\n\
    Addio casini, frutto\r\n\
    della saggezza antica,\r\n\
    ove conobbi, imberbe,\r\n\
    il volto della fica.\r\n\
    Addio, sale fumose\r\n\
    con bersaglieri e fanti,\r\n\
    dai cazzi turgidissimi\r\n\
    gi\xC3\xA0 pronti a farsi avanti.\r\n\
    Addio metresse pingui,\r\n\
    che deste fica al mondo,\r\n\
    rendendoci l'uccello\r\n\
    pi\xC3\xB9 lieto e pi\xC3\xB9 giocondo.\r\n\
    Addio, raccolte camere\r\n\
    ove il villan fottuto\r\n\
    freva rapidissimo,\r\n\
    magari con lo sputo!\r\n\
    Addio, puttane storiche,\r\n\
    addio cara 'Mondiale',\r\n\
    che desti a culo e fica\r\n\
    fama internazionale.\r\n\
    Addio, chiavate sapide\r\n\
    del letto sulla sponda,\r\n\
    addio, bocchini celebri\r\n\
    di mora oppur di bionda!\r\n\
    I giovani domandano\r\n\
    dover chiavar. Mistero!\r\n\
    Il cazzo \xC3\xA8 umiliatissimo,\r\n\
    e vede tutto nero.\r\n\
    La sentatrice, intanto,\r\n\
    sorride e se ne frega\r\n\
    e dice agli italiani:\r\n\
    \"Tirateve una sega!\"\r\n\
    \r\n\
    Parlato: Ma come avete fatto a chiudere le case chiuse?!\r\n\
    Salacabula magicabula bididibodidibu\r\n\
    faccio una legge e il casin non c'\xC3\xA8 pi\xC3\xB9\r\n\
    bididibodidi bididibodidi\r\n\
    mettitiilbody mettitilbody\r\n\
    mettitilbody anche tu"
