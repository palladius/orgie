canzoni_321: 
  m_bSeria: "1"
  Data_creazione: 2005-04-03 02:23:49
  Corpo: "A go cat\xC3\xA0 sento carte par tera,\r\n\
    le go cat\xC3\xA0 sora el marciapi\xC3\xA8:\r\n\
    me so compr\xC3\xA0 un giubotto da guera\r\n\
    e un par de anfibi del '43.  \r\n\
    A mi so el duro metropolitano,\r\n\
    mi so el duro metropolita-a-a\r\n\
    e mi so il duro metropolitano\r\n\
    che quando rivo, quando rivo, quando rivo...\r\n\
    ...se scansa anche el sacrestan.  \r\n\
    A mi so el capo de 'na compagnia:\r\n\
    i ne ciama le anime n\xC3\xA8re;\r\n\
    tutte le sere sora el cavalcavia\r\n\
    a butare basso le piere,\r\n\
    e serco de ciapare, serco de ciapare,\r\n\
    serco de ciapare i tram...  \r\n\
    St'altra sera gero massa tranquilo,\r\n\
    a gero duro come na rocia:\r\n\
    so' 'nda fora co n'amigo mio\r\n\
    e ghemo men\xC3\xA0 forte un bocia.\r\n\
    I me mola, i me mola, i me mola, drio i can...  \r\n\
    Cole femene so massa crudele:\r\n\
    mi le trato pezo de un cane,\r\n\
    mi no riesso miga a stare fedele\r\n\
    e ze per questo che vado a puttane.\r\n\
    E me saluda, me saluda, me saluda, me saluda le african...  \r\n\
    Al sabo sera vago in disco balera:\r\n\
    in mezo a tutte chele fighe de legno\r\n\
    resto solo con la canottiera,\r\n\
    e de sudore tutte le impregno.\r\n\
    I me saluda, i me saluda,\r\n\
    i me saluda, i me saluda da lontan...  \r\n\
    E la domenica mi vago allo stadio,\r\n\
    mi ghe vago col me drapelo,\r\n\
    mi me porto sempre la radio\r\n\
    e la tegno vissin al corteo.\r\n\
    E se sfregia, e se sfregia,\r\n\
    e se sfregia, e se sfregia l'ascolan...!  \r\n"
