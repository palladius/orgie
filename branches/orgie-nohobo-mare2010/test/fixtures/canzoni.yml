  Corpo: " E\xE2\x80\x99giunta mezzanotte, la Clizia \xC3\xA8 ormai finita,\r\n\
    a casa se ne torna la maiala di to m\xC3\xA0\r\n\
    si spegne il riflettore, a letto va l\xE2\x80\x99attore,\r\n\
    son pochi i merdaioli che restare voglion qua\r\n\
    son arrapati un mare vorrebbero chiavare,\r\n\
    ma solo qualche sega questa sera si faran\r\n\
    sognando il cul dell\xE2\x80\x99uomo in frac!\r\n\
    Ha un cilindro per cappello,\r\n\
    ma ci ha pure un bell\xE2\x80\x99uccello\r\n\
    Una fava smerigliata per chiavare brevettata\r\n\
    E poi sotto coso c\xE2\x80\x99\xC3\xA8 due bei coglion, \r\n\
    oh\xC3\xB2 che impression\r\n\
    Quei due coglion\r\n\
    Qualche volta mi sollazzo per diletto del mio cazzo\r\n\
    Spennellando un sederino ad un tenero bambino\r\n\
    Ad un tratto lui mi fa \xE2\x80\x93 Vorrei cacar \xE2\x80\x93\r\n\
    Non mi smerdar fa l\xE2\x80\x99uomo in frac\r\n\
    Adieu, Adieu, Adieu, addio al mondo\r\n\
    Alle troie dei casini\r\n\
    Che ora voglion pi\xC3\xB9 quattrini, \r\n\
    ma inculando i ragazzini\r\n\
    Vado in culo pure a lor."
