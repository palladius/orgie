  Corpo: |-
    E' Mezzanotte
    oh porca troia
    m'aspetta 'ngilina pe' chiocchia' ju la marrogghia
    me la promessa
    che me la dane
    su quella pecchia ce vojo sta' fino a dimane.
    Co' 'stu pensieru
    me ce so' arzatu
    c'agghiu lu picchiu duru duru a canne arzatu
    tu non ce cridi
    e me canzuni
    pargo affiascatu pe' quanto c'ho gunfi li carzuni
    Vicino a te
    'ngilina mia
    me s' arisveja tutta quanta la fantasia
    se me ce caschi
    te faccio tenca
    te fo senti' de che sapore c'ha 'sta renga
    Te dagu 'n bacittu
    e pu' n'abbracciu
    te butto sune tuttu quantu 'st'armanacciu
    pijalu tuttu
    oh brutta trogghia
    pe' 'a ricurdanza de' 'stu gran picchiu de la marrogghia
    E' Mezzanotte
    no' sto piu' nella pelle
    vo ju lu barre pe' compra' du' caramelle
    scappo de fora
    de prescia e 'n fretta
    ma quarghitunu ma sbuciato la lamboretta
    Non ce sta dubbiu
    ho sentitu 'na votta
    chi sara' statu 'stu gran fiju de 'na mignotta
    guarda che scherzi
    tu non ce credi
    lasso via tuttu e ce corro ju a piedi
    'rrio su la ripa
    sudu che fumu
    la chiamo, je fischio, sci! Non risponne nisciunu
    e so' sicuru
    'ngilina mia
    agghio attardatu e testa se n'e' jita via
    Stago arrapatu
    come un lione
    e me decido de sparamme un pugnettone
    oh 'ngelinetta, oh brutta trogghia, co 'sta sborrata c'ho appinatu la marrogghia! (2 volte, la II con pathos)
