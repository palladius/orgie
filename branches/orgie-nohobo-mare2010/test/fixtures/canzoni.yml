  Corpo: "Una notte all'Irish Rover\r\n \r\n\
    Con la pioggia che cade\r\n\
    ed il freddo che mi assale\r\n\
    non sopporto le luci \r\n\
    e il casino nei bar\r\n\
    Son malato senza cura\r\n\
    non mi resta pi\xC3\xB9 una lira\r\n\
    e mi aggiro per le strade\r\n\
    di Roma...\r\n\
    \r\n\
    La figlia del dottore\r\n\
    ha gli occhi come il mare\r\n\
    che se ci guardi dentro\r\n\
    ci rischi di affogare\r\n\
    e se ci aggiungi il carico \r\n\
    che io non so nuotare\r\n\
    ogni volta che la incontro\r\n\
    mi comincio a preoccupare\r\n\
    Portami una birra \r\n\
    che mi ci butto dentro\r\n\
    e portamene un'altra\r\n\
    che una neanche la sento\r\n\
    se sono un ubriacone \r\n\
    ma che ci posso fare\r\n\
    ogni volta che non bevo\r\n\
    mi vien da vomitare\r\n\
    \r\n\
    E ora scende la sera\r\n\
    e io mi sciolgo come cera\r\n\
    e mi sembra di entrare\r\n\
    nella scena di un film\r\n\
    quando lei diceva amore\r\n\
    non ti voglio pi\xC3\xB9 lasciare\r\n\
    ed invece spariva\r\n\
    senza neanche un perch\xC3\xA9\r\n\
    \r\n\
    Potevo stare in Africa\r\n\
    a caccia di leoni\r\n\
    e invece son rimasto qui\r\n\
    a rompermi i coglioni\r\n\
    pensavo fosse amore\r\n\
    ma \xC3\xA8 una bicicletta\r\n\
    eppure mi ha spaccato \r\n\
    il cuore con l'accetta\r\n\
    E portami da bere\r\n\
    che almeno mi consolo\r\n\
    versa quanto ti pare\r\n\
    che tanto me la scolo\r\n\
    e se sei un vero amico \r\n\
    e non vuoi farmi dispiacere\r\n\
    ogni volta che si svuota \r\n\
    riempimi il bicchiere\r\n\
    \r\n\
    E ora il cielo si rischiara \r\n\
    e la bocca si fa amara\r\n\
    e la testa mi batte\r\n\
    come fosse un tam tam\r\n\
    ci vediamo qui stasera\r\n\
    se la mente si ristora\r\n\
    e se lei non ritorna\r\n\
    tanto peggio per me..."
