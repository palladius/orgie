  Corpo: "Laggi\xC3\xB9 nell'Arizona,\r\n\
    terra di sogni e di chimere,\r\n\
    se una chitarra suona,\r\n\
    cantano mille capinere;\r\n\
    Il pistolero stanco\r\n\
    sente la merda in cul\r\n\
    c'\xC3\xA8 chi la tiene dentro\r\n\
    c'\xC3\xA8 chi la manda gi\xC3\xB9.\r\n\
    A mezzanotte va\r\n\
    lo stronzo dal sedere,\r\n\
    e nell'oscurit\xC3\xA0\r\n\
    nel cesso va a cadere.\r\n\
    E' merda di passion,\r\n\
    che il cul non sa tenere,\r\n\
    \xC3\xA8 questa la canzon\r\n\
    del buco del sedere.\r\n\
    A mezzanotte va\r\n\
    Rosina col pompiere,\r\n\
    e nell'oscurit\xC3\xA0\r\n\
    si chiavano a dovere.\r\n\
    A mezzanotte va\r\n\
    quello che ha preso l'olio,\r\n\
    con le mutande in man,\r\n\
    su e gi\xC3\xB9 pel corridoio. \r\n\
    \r\n"
