  Corpo: " Bimbe belle, facciamo l\xE2\x80\x99amore,\r\n\
    ch\xE2\x80\x99\xC3\xA8 la cosa pi\xC3\xB9 bella del mondo:\r\n\
    chi non chiava nel tempo giocondo\r\n\
    quand\xE2\x80\x99\xC3\xA8 vecchio lo prende nel cul!\r\n\
    Fate largo, che passano i giovani,\r\n\
    i seguaci di Bacco e di Venere,\r\n\
    coi cappelli color d\xE2\x80\x99ogni genere\r\n\
    e la fava rivolta all\xE2\x80\x99ins\xC3\xB9!\r\n\
    Che c\xE2\x80\x99importa se voi non volete?\r\n\
    Siete vecchi, barbosi e tiranni:\r\n\
    i goliardi hanno sempre vent\xE2\x80\x99anni\r\n\
    anche quando ne hanno di pi\xC3\xB9!\r\n\
    \r\n "
  Autore: "null"
  ID_canzone: "1661540413"
  Note: "\"Bimbe belle\" \xC3\xA8 l'autentico Inno Nazionale dlel'Italica Goliardia, e come l'Inno Nazionale italiano \xC3\xA8 variamente preceduto da versetti e musichette. Nelle occasioni pi\xC3\xB9 solenni, all\xE2\x80\x99Inno vero e proprio vengono premessi altri versi e note. Questa una versione cerimoniale pomposa molto in voga intorno al 69+1 :\r\n\
    \r\n\
    Bolognesi, culi rotti,\r\n\
    chi di voi ci fa una sega?\r\n\
    Norma, dei tuoi rimproveri\r\n\
    non ce ne frega un cazzo,\r\n\
    della tua fica vergine\r\n\
    noi ne farem strapazzo!\r\n\
    Sotto le nostre potenti cappelle\r\n\
    scomparir\xC3\xA0     scomparir\xC3\xA0     scomparir\xC3\xA0\r\n\
    ogni traccia di verginit\xC3\xA0!\r\n\
    Questo gli \xC3\xA8 il lago dov\xE2\x80\x99\xC3\xA8 affogato Gasparo:\r\n\
    l\xE2\x80\x99acqua salata gli avea corroso il bischero!\r\n\
    Donne, vendetela: che la tenete a fare?\r\n\
    Viene l\xE2\x80\x99autunno, e rischia di fermentare,\r\n\
    viene l\xE2\x80\x99inverno, e rischia di congelare,\r\n\
    vien primavera, e rischia di germogliare,\r\n\
    viene l\xE2\x80\x99estate, e puzza di baccal\xC3\xA0!\r\n\
    Bimbe belle...\r\n\
    \r\n\
    (nota filologica: le canzoni goliardiche non son state concepite per essere messe per iscritto, non sono canzoni d\xE2\x80\x99autore \xE2\x80\x93 salvo pochissime \xE2\x80\x93 ma frutto dell\xE2\x80\x99elaborazione collettiva di una Volksgemeinschaft; dunque i testi differiscono notevolmente da Ateneo ad Ateneo, da generazione a generazione, n\xC3\xA9 esiste \xE2\x80\x93 ed \xC3\xA8 auspicabile tutto sommato che non esista mai... - una editio princeps dei canti goliardici; fra le varianti che interessano il \xE2\x80\x9Cprologo\xE2\x80\x9D di Bimbe belle c\xE2\x80\x99\xC3\xA8 quella \xE2\x80\x9Cviene l\xE2\x80\x99autunno, e rischia di seccare\xE2\x80\x9D, meteorologicamente molto corretta; dopo \xE2\x80\x9Cogni traccia di verginit\xC3\xA0\xE2\x80\x9D si aggiunge a volte, con enfasi: \xE2\x80\x9Cper veder chi l\xE2\x80\x99ha pi\xC3\xB9 duro, lo sbatteremo contro un muro / per veder chi l\xE2\x80\x99ha pi\xC3\xB9 dritto, lo sbatteremo sul soffitto / per veder chi l\xE2\x80\x99ha pi\xC3\xB9 grosso / lo ficcheremo dentro un fosso\xE2\x80\x9D). \r\n\
    Satanasso"
