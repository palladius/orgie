  Corpo: "Siamo la parte eletta\r\n\
    dell\xE2\x80\x99Universit\xC3\xA0,\r\n\
    la schiera venerabile\r\n\
    dell\xE2\x80\x99alta Anzianit\xC3\xA0.\r\n\
    C\xE2\x80\x99\xC3\xA8 chi sulle dispense\r\n\
    perse la vista, ahim\xC3\xA9!,\r\n\
    chi fra pandette e codici\r\n\
    grigia la barba fe\xE2\x80\x99.\r\n\
    Ma il cuor rimane giovane\r\n\
    non si raffredda, ohib\xC3\xB2!\r\n\
    o morettina bella,\r\n\
    se vuoi io te la d\xC3\xB2!\r\n"
