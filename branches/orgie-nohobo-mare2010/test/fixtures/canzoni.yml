  Corpo: "Inno della SaTVP\r\n\
    (sulle note di \xE2\x80\x9CFare il soldato\xE2\x80\x9D, celebre motivo da caserma)\r\n\
    \r\n\
    Largo al Vampiro, sotto, alla pugna!\r\n\
    Stasera in piazza ciadello sar\xC3\xA0\r\n\
    E se c\xE2\x80\x99\xC3\xA8 in palio un tocco di prugna\r\n\
    Sar\xC3\xA0 il Vampiro che vincer\xC3\xA0\r\n\
    \r\n\
    Dal Colonnato a tutta l\xE2\x80\x99Italia\r\n\
    Col nostro Principe in testa al ploton\r\n\
    Un solo grido chiaro si staglia\r\n\
    Forza Vampiro, fiero dimon\r\n\
    \r\n\
    Con un bicchiere di vino sincero\r\n\
    Torna il Non-morto a fare casin\r\n\
    E se goliarda tu sei per davvero\r\n\
    Porta da bere almeno un quartin\r\n\
    \r\n\
    La nostra placca pentacolore\r\n\
    Nostro vessillo sempre sar\xC3\xA0\r\n\
    La porteremo sempre sul cuore\r\n\
    Finch\xC3\xA9 la morte ci ghermir\xC3\xA0"
