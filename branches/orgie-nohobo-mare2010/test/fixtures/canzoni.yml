    Per testare se ce l'ho ancora duro {LAm MIm} naaaa {RE}\r\n\
    \r\n\
    VAR-Un giornaletto {DO SOL/SI}\r\n\
    Di quelli che non si trovan pi\xC3\xB9 {SI/FA# MIm} naaaa {RE}\r\n\
    \r\n\
    Un vibratore rotto {DO SOL/SI}\r\n\
