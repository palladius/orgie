canzoni_192: 
  m_bSeria: "1"
  Data_creazione: 2003-06-17 11:38:33
  Corpo: "Sulla piazza d'una citt\xC3\xA0\r\n\
    la gente guardava con ammirazione\r\n\
    un gorilla portato l\xC3\xA0\r\n\
    dagli zingari di un baraccone\r\n\
    con poco senso del pudore\r\n\
    le comari di quel rione\r\n\
    contemplavano lo scimmione\r\n\
    non dico dove non dico come\r\n\
    attenti al gorilla !\r\n\
    d'improvviso la grossa gabbia\r\n\
    dove viveva l'animale \r\n\
    s'apr\xC3\xAC di schianto non so perch\xC3\xA9\r\n\
    forse l'avevano chiusa male\r\n\
    la bestia uscendo fuori di l\xC3\xA0\r\n\
    disse: \"quest'oggi me la levo\"\r\n\
    parlava della verginit\xC3\xA0\r\n\
    di cui ancora viveva schiavo\r\n\
    attenti al gorilla !\r\n\
    il padrone si mise a urlare\r\n\
    \" il mio gorilla , fate attenzione\"\r\n\
    non ha veduto mai una scimmia\r\n\
    potrebbe fare confusione\r\n\
    tutti i presenti a questo punto\r\n\
    fuggirono in ogni direzione\r\n\
    anche le donne dimostrando\r\n\
    la differenza fra idea e azione\r\n\
    attenti al gorilla !\r\n\
    tutta la gente corre di fretta\r\n\
    di qui e di l\xC3\xA0 con grande foga\r\n\
    si attardano solo una vecchietta \r\n\
    e un giovane giudice con la toga\r\n\
    visto che gli altri avevan squagliato\r\n\
    il quadrumane acceller\xC3\xB2\r\n\
    e sulla vecchia e sul magistrato\r\n\
    con quattro salti si port\xC3\xB2\r\n\
    attenti al gorilla !\r\n\
    bah , sospir\xC3\xB2 pensando la vecchia\r\n\
    ch'io fossi ancora desiderata\r\n\
    sarebbe cosa alquanto strana\r\n\
    e pi\xC3\xB9 che altro non sperata\r\n\
    che mi si prenda per una scimmia\r\n\
    pensava il giudice col fiato corto\r\n\
    non \xC3\xA8 possibile, questo \xC3\xA8 sicuro\r\n\
    il seguito prova che aveva torto\r\n\
    attenti al gorilla !\r\n\
    se qualcuno di voi dovesse\r\n\
    costretto con le spalle al muro ,\r\n\
    violare un giudice od una vecchia\r\n\
    della sua scelta sarei sicuro\r\n\
    ma si d\xC3\xA0 il caso che il gorilla\r\n\
    considerato un grandioso fusto\r\n\
    da chi l'ha provato per\xC3\xB2 non brilla\r\n\
    n\xC3\xA9 per lo spirito n\xC3\xA9 per il gusto\r\n\
    attenti al gorilla !\r\n\
    infatti lui , sdegnando la vecchia\r\n\
    si dirige sul magistrato\r\n\
    lo acchiappa forte per un'orecchia\r\n\
    e lo trascina in mezzo ad un prato\r\n\
    quello che avvenne fra l'erba alta\r\n\
    non posso dirlo per intero\r\n\
    ma lo spettacolo fu avvincente\r\n\
    e lo \"suspence\" ci fu davvero \r\n\
    attenti al gorilla !\r\n\
    dir\xC3\xB2 soltanto che sul pi\xC3\xB9 bello \r\n\
    dello spiacevole e cupo dramma\r\n\
    piangeva il giudice come un vitello\r\n\
    negli intervalli gridava mamma\r\n\
    gridava mamma come quel tale\r\n\
    cui il giorno prima come ad un pollo\r\n\
    con una sentenza un po' originale\r\n\
    aveva fatto tagliare il collo.\r\n\
    attenti al gorilla !"
  Autore: "F. De Andr\xC3\xA8 - G. Brassens"
