canzoni_358: 
  m_bSeria: "1"
  Data_creazione: 2006-01-25 18:15:33
  Corpo: "Quanno i romani fanno aoh ce sta un motivo!\r\n\
    Quanno i romani fanni aoh,te dico arivo!\r\n\
    Si c'\xC3\xA8 na cosa che nun so\r\n\
    \xC3\xA8 si je gira er cazzo oppure no,\r\n\
    io sono fiero de far casino cor motorino!\r\n\
    tutti i romani fanno aoh,\r\n\
    prennemo i caschi,\r\n\
    annamo a menaje!\r\n\
    Sai da solo nun se po,\r\n\
    senza qualcuno nessuno\r\n\
    puo sderenare n'omo!\r\n\
    E per annare a fare a botte,a botte,a botte,\r\n\
    prima se fomentamo un po,\r\n\
    poi colli caschi e le catene armeno armeno dai,\r\n\
    je spacchi un rene!\r\n\
    Cosi ogni cascata n'faccia lo scrafagna\r\n\
    e quanno sta pe tera\r\n\
    i romani fanno aoh:devi morire!!!\r\n\
    Quanno i romani fanno aoh,\r\n\
    so cazzi tua,so cazzi tua!\r\n\
    Me cojoni vedi per\xC3\xB2,per\xC3\xB2,\r\n\
    mo me trastullo un po\r\n\
    perch\xC3\xA8 me rode il culo aoh\r\n\
    e poi te pisto quanno me pija,\r\n\
    perch\xC3\xA8 il romano nun ha paura\r\n\
    de massacratte co na bottija!!\r\n\
    I romani sono molto n'cazzati,\r\n\
    sono avvelenati,\r\n\
    coi disadattati!\r\n\
    Nei romani vale la fantasia,\r\n\
    perch\xC3\xA8 co quarche magg\xC3\xACa\r\n\
    te porteno via a'radio!\r\n\
    Ma poi quanno poi ariva la volante\r\n\
    e quanno caca er cazzo,\r\n\
    i romani fanno aoh:\r\n\
    \xC3\xA8 la polizia,e guerra sia!!\r\n\
    Quanno i romani fanno aoh\r\n\
    s\xC3\xB2 cazzi tua,s\xC3\xB2 cazzi tua!\r\n\
    Me cojoni vedi per\xC3\xB2,per\xC3\xB2!\r\n\
    Te sto a chiam\xC3\xA0 nun senti AOH!\r\n\
    Dovemo annare fuori lo stadio:\r\n\
    ce sta un conijo,\r\n\
    prova a scappare\r\n\
    ma m\xC3\xB2 lo pijooooo!\r\n\
    M\xC3\xB2 se lo becco vedi,\r\n\
    m\xC3\xB2 se lo becco vedi,\r\n\
    m\xC3\xB2\xC3\xB2\xC3\xB2\xC3\xB2,chiamo n'po' de gente,\r\n\
    m\xC3\xB2 se i romani nun ce sooo:\r\n\
