canzoni_433: 
  m_bSeria: "1"
  Data_creazione: 2009-04-06 23:52:37
  Corpo: "Siamo quelli del Mercurio\r\n\
    ci inkuliamo lo Spadon\r\n\
    il Ducato ci fottiamo\r\n\
    i Monatti non caghiam!\r\n\
    \r\n\
    Sotto i nostri manti azzurri\r\n\
    troveran soddisfazion\r\n\
    bimbe belle e generose\r\n\
    gli altri si spugnetteran!\r\n\
    \r\n\
    Ci hanno fatto i nostri anziani\r\n\
    belli e pieni di virt\xC3\xB9\r\n\
    nella vita noi faremo\r\n\
    solo quel che piace a noi!\r\n\
    \r\n\
    Quando il caro Ferdinando\r\n\
    la Bocconi ci don\xC3\xB2\r\n\
    era certo era sicuro\r\n\
    i migliori erano l\xC3\xAC!\r\n\
    \r\n\
    Siamo belli siamo ricchi\r\n\
    del Golia ce ne infischiam\r\n\
    Santa Madre Goliardia\r\n\
    solo a noi sorrider\xC3\xA0!\r\n\
    \r\n\
    Dio Mercurio l'ha insegnato\r\n\
    dio dei ladri e mentitor\r\n\
    ci inkuliamo tutti quanti\r\n\
    col sorriso e vaffancul!"
  Autore: Maxdeldollaro
  ID_canzone: "1632462669"
  Note: "Sulla musica di : Oh my darling Clementine!\r\n\
