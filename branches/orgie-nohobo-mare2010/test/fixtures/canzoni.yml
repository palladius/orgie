  Corpo: "Romagna e Sangiovese\r\n\
    c'\xC3\xA8 sempre nel mio cuore,\r\n\
    quest'aria di paese\r\n\
    c'invita a far l'amore.\r\n\
    \r\n\
    La briscola e il tresette\r\n\
    si gioca all'osteria\r\n\
    e col bicchiere in mano\r\n\
    si canta in allegria:\r\n\
    \r\n\
    \"E quando vien la notte romagnola (romagnola)\r\n\
    la mi mur\xC3\xB4sa b\xC3\xA9la e campagn\xC3\xB4la (campagn\xC3\xB4la)\r\n\
    \r\n\
    m'invita a far l'amore\r\n\
    amor senza pretese\r\n\
    evviva la Romagna\r\n\
    evviva il Sangiovese!\r\n"
