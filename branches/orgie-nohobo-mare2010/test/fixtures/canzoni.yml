canzoni_198: 
  m_bSeria: "1"
  Data_creazione: 2004-11-26 22:28:53
  Corpo: "Mai pi\xC3\xB9 mi chinai e nemmeno su un fiore,\r\n\
    pi\xC3\xB9 non arrossii nel rubare l'amore\r\n\
    dal momento che Inverno mi convinse che Dio\r\n\
    non sarebbe arrossito rubandomi il mio\r\n\
    Mi arrestarono un giorno per le donne ed il vino,\r\n\
    non avevano leggi per punire un blasfemo,\r\n\
    non mi uccise la morte, ma due guardie bigotte,\r\n\
    mi cercarono l'anima a forza di botte\r\n\
    Perch\xC3\xA9 dissi che Dio imbrogli\xC3\xB2 il primo uomo,\r\n\
    lo costrinse a viaggiare una vita da scemo,\r\n\
    nel giardino incantato lo costrinse a sognare,\r\n\
    a ignorare che al mondo c'\xC3\xA8 il bene e c'\xC3\xA8 il male\r\n\
    Quando vide che l'uomo allungava le dita\r\n\
    a rubargli il mistero di una mela proibita\r\n\
    per paura che ormai non avesse padroni\r\n\
    lo ferm\xC3\xB2 con la morte, invent\xC3\xB2 le stagioni\r\n\
    ...mi cercarono l'anima a forza di botte...\r\n\
    E se furon due guardie a fermarmi la vita,\r\n\
    \xC3\xA8 proprio qui sulla terra la mela proibita,\r\n\
    e non Dio ma qualcuno che per noi l'ha inventato,\r\n\
    ci costringe a sognare in un giardino incantato. "
