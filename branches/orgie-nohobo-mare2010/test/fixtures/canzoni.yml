  Corpo: "In quest\xE2\x80\x99 inverno picchia zero!\r\n\
    Non s\xE2\x80\x99armedia un buco nero a pagallu oro\xE2\x80\xA6\r\n\
    Porkamadoro!\r\n\
    \r\n\
    A testa alta vado in centro,\r\n\
    c\xE2\x80\x99ho lu picchio sotto il mento e nun me movo\r\n\
    (no, nun se move).\r\n\
    \r\n\
    E abbocco dritto a lu Grande V\xC3\xB9:\r\n\
    guarda che bionda ce sta laggi\xC3\xB9!\r\n\
    Io quaci quaci me fionco ll\xC3\xA0,\r\n\
    chiss\xC3\xA0 se me ce sta?\r\n\
    \r\n\
    \xE2\x80\x9CPermetti, scusa, bambolina, \r\n\
    ma lo sai che sei carina? Come te chiami?\xE2\x80\x9D\r\n\
    (Come se chiama?)\r\n\
    \r\n\
    Je faccio l\xE2\x80\x99occhio a pesce fracio\r\n\
    accanto a lei ce sta uno pacio, sar\xC3\xA0 il ragazzo?\r\n\
    (Sapemo un cazzo!)\r\n\
    \r\n\
    Non faccio in tempo a dije \xE2\x80\x9CAh!\xE2\x80\x9D\r\n\
    che quistu qui me se sta a fiara\xE2\x80\x99\r\n\
    e poi m\xE2\x80\x99allenta du\xE2\x80\x99 sbarbazzoni:\r\n\
    \xE2\x80\x9CF\xC3\xB2ri da li cojoni!\xE2\x80\x9D\r\n\
    \r\n\
    Momenti m\xC3\xB2ro, momenti m\xC3\xB2ro\xE2\x80\xA6\r\n\
    \xE2\x80\x9CCo\xE2\x80\x99 la Marlboro che v\xC3\xB2le fa\xE2\x80\x99?\xE2\x80\x9D\r\n\
    Poi me la spegne sopra \xE2\x80\x98na recchia\xE2\x80\xA6 \r\n\
    Tutta la picchia me sta a guarda\xE2\x80\x99!\r\n\
    \r\n\
    E poi a stento m\xE2\x80\x99 artiro su,\r\n\
    l\xE2\x80\x99amici mia nun ce stonno pi\xC3\xB9, \r\n\
    in discoteca staronno a anna\xE2\x80\x99;\r\n\
    li provo a ribecca\xE2\x80\x99!\r\n\
    \r\n\
    Ma io che sono un ottimista\r\n\
    faccio il ganzo ll\xC3\xA0 la pista e ce riprovo\xE2\x80\xA6 \r\n\
    Porkamadoro!\r\n\
    \r\n\
    C\xE2\x80\x99ho pure la consumazione, \r\n\
    me dirigo gi\xC3\xB9 al bancone da la barista\xE2\x80\xA6\r\n\
    (S\xE2\x80\x99addrizza l\xE2\x80\x99asta!)\r\n\
    \r\n\
    Me dice: \xE2\x80\x9CBello cosa ti va?\xE2\x80\x9D\r\n\
    A me sta mora me sta a \xE2\x80\x98cchiappa\xE2\x80\x99\xE2\x80\xA6\r\n\
    Quanno un po\xE2\x80\x99 tuttu j\xE2\x80\x99ho gi\xC3\xA0 tastato,\r\n\
    guarda sicchi \xC3\xA8 arrivato\xE2\x80\xA6\r\n\
    \r\n\
    Lu buttafuori, lu buttafuori\r\n\
    me porta f\xC3\xB2ri, me sta a crocchia\xE2\x80\x99,\r\n\
    prima de destro, poi de sinistro.\r\n\
    il gentil sesso male me fa\xE2\x80\xA6\r\n\
    \r\n\
    Momenti m\xC3\xB2ro, momenti m\xC3\xB2ro \r\n\
    \xE2\x80\x9CCo\xE2\x80\x99 la Marlboro che v\xC3\xB2le fa\xE2\x80\x99? \xE2\x80\x9D\r\n\
    Poi me la spegne sopra \xE2\x80\x99na recchia\xE2\x80\xA6\r\n\
    Tutta la picchia me sta a guarda\xE2\x80\x99!"
