  Corpo: "Ndovio ma muzzicatu la tarantula \r\n\
    e ma muzzicato aru pedi \r\n\
    pedi pi pedi mo sinni veni \r\n\
    sinni veni e sinni va \r\n\
    chiss\xC3\xA0 \xC3\xA8 a tarantula. \r\n\
    E ma muzzicatu ara gamma \r\n\
    gamma pi gamma mo' chiamu a mamma \r\n\
    pedi pi pedi mo sinni veni \r\n\
    sinni veni e sinni va \r\n\
    chiss\xC3\xA0 \xC3\xA8 a tarantula. \r\n\
    E ma muzzicatu ara coscia \r\n\
    coscia pi coscia na bella brioscia \r\n\
    gamma pi gamma mo' chiamu a mamma \r\n\
    pedi pi pedi mo sinni veni \r\n\
    sinni veni e sinni va \r\n\
    chiss\xC3\xA0 \xC3\xA8 a tarantula. \r\n\
    E ma muzzicatu ara panza \r\n\
    panza pi panza nu poco i crianza \r\n\
    coscia pi coscia na bella brioscia \r\n\
    gamma pi gamma mo' chiamu a mamma \r\n\
    pedi pi pedi mo sinni veni \r\n\
    sinni veni e sinni va \r\n\
    chiss\xC3\xA0 \xC3\xA8 a tarantula. \r\n\
    E ma muzzicatu a ro piettu \r\n\
    piettu pi piettu nu poco i rispiettu \r\n\
    panza pi panza nu poco i crianza \r\n\
    coscia pi coscia na bella brioscia \r\n\
    gamma pi gamma mo' chiamu a mamma \r\n\
    pedi pi pedi mo sinni veni \r\n\
    sinni veni e sinni va \r\n\
    chiss\xC3\xA0 \xC3\xA8 a tarantula. \t\t\t\t\r\n\
    E ma muzzicatu are cuoddru \r\n\
    cuoddru pi cuoddru nu capa cuoddru \r\n\
    piettu pi piettu nu poco i rispiettu \r\n\
    panza pi panza nu poco i crianza \r\n\
    coscia pi coscia na bella brioscia \r\n\
    gamma pi gamma mo' chiamu a mamma \r\n\
    pedi pi pedi mo sinni veni \r\n\
    sinni veni e sinni va \r\n\
    chiss\xC3\xA0 \xC3\xA8 a tarantula. \r\n\
    E ma muzzicatu aru culu \r\n\
    culu pi culu nu bellu citrulu \r\n\
    cuoddru pi cuoddru nu capa cuoddru \r\n\
    piettu pi piettu nu poco i rispiettu \r\n\
    panza pi panza nu poco i crianza \r\n\
    coscia pi coscia na bella brioscia \r\n\
    gamma pi gamma mo' chiamu a mamma \r\n\
    pedi pi pedi mo sinni veni \r\n\
    sinni veni e sinni va \r\n\
    chiss\xC3\xA0 \xC3\xA8 a tarantula. \r\n\
    E ma muzzicatu aru vrazzu \r\n\
    vrazzu pi vrazzu na capa i cazzu \r\n\
    culu pi culu nu bellu citrulu \r\n\
    cuoddru pi cuoddru nu capa cuoddru \r\n\
    piettu pi piettu nu poco i rispiettu \r\n\
    panza pi panza nu poco i crianza \r\n\
    coscia pi coscia na bella brioscia \r\n\
    gamma pi gamma mo' chiamu a mamma \r\n\
    pedi pi pedi mo sinni veni \r\n\
    sinni veni e sinni va \r\n\
    chiss\xC3\xA0 \xC3\xA8 a tarantula.\r\n"
