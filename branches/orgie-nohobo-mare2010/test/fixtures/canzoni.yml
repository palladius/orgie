canzoni_390: 
  m_bSeria: "1"
  Data_creazione: 2007-10-18 15:01:49
  Corpo: "Ricordo ancora la piazza\r\n\
    dove ti ho conosciuto\r\n\
    non eravamo poi molti \r\n\
    a frequentare quel gruppo\r\n\
    \r\n\
    Stavi scrivendo su un foglio\r\n\
    tutto indaffarato\r\n\
    Una parola strana\r\n\
    ma dal chiaro significato\r\n\
    \r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    \r\n\
    Forse era solo lo sfogo\r\n\
    di un Vaccino arrabbiato\r\n\
    Ma io 50 anni dopo\r\n\
    Non l'ho ancora dimenticato\r\n\
    Perch\xC3\xA8 sai certe emozioni \r\n\
    Specialmente se sincere\r\n\
    Le conservi nella mente \r\n\
    E diventano bandiere\r\n\
    \r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    \r\n\
    Ci hanno detto \"Goliardi!\r\n\
    Qualcuno s'era sbagliato\r\n\
    Adesso la moda cambia \r\n\
    Il PODVS verr\xC3\xA0 scordato\"\r\n\
    Ma c'e' qualcosa che stona \r\n\
    in questo ragionamento\r\n\
    Qualcosa che non perdona \r\n\
    Che s'alza ancora nel vento\r\n\
    Saranno le voci di molti \r\n\
    che ci hanno gi\xC3\xA0 lasciato\r\n\
    Ma non mi pare che siano andati\r\n\
    gridando \"Il PODVS sar\xC3\xA0 scordato!\"\r\n\
    \r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    IL NOSTRO MOTTO E' OIBO'\r\n\
    \r\n\
    \r\n\
    \r\n\
    Canzone dedicata ai vaccini e ai goliardi tutti che hanno reso indimenticabile l' esperienza goliardica"
  Autore: Orso / Fera
  ID_canzone: "1929021889"
  Note: "null"
  titolo: "Il nostro motto \xC3\xA8 OIBO'"
  tipo: 
  id_login: "3335"
canzoni_343: 
  m_bSeria: "1"
  Data_creazione: 2005-07-05 22:40:56
  Corpo: "Cos'\xC3\xA8, cos'\xC3\xA8 che mi gonfia la mutanda\r\n\
    la gente si domanda:\r\n\
    \"Sar\xC3\xA0 forse un bign\xC3\xA8?\"\r\n\
    Ma a ben guardare, di pi\xC3\xB9 sembra un cannuolo\r\n\
    o forse un usignuolo, \r\n\
    chiss\xC3\xA0 che uccello \xC3\xA8!\r\n\
    \r\n\
    Lo fai provare pure a me,\r\n\
    che piacere, che piacere!\r\n\
    \r\n\
    Io certe volte per via di questo attrezzo\r\n\
    mi trovo in imbarazzo\r\n\
    se dovo fa' il bidet.\r\n\
    Per cui ritengo, senza modestia alcuna,\r\n\
    c'\xC3\xA8 solo la laguna\r\n\
    che pu\xC3\xB2 fare per me!\r\n\
    \r\n\
    Lo fai provare...\r\n\
    \r\n\
    Perch\xC3\xA8, perch\xC3\xA8 ce l'ho fuori proporzione\r\n\
    induco in tentazione\r\n\
    ma cosa ci vuoi far...\r\n\
    Madre natura mi ha fatto sto' regalo\r\n\
    che rassomiglia a un palo\r\n\
    di metri centotre...\r\n\
    \r\n\
    Lo fai provare...\r\n\
    \r\n\
    Se mai per caso tra il pubblico presente\r\n\
    qualcuno \xC3\xA8 diffidente\r\n\
    per cui non crede a niente...\r\n\
    Care signore lo posso dimostrare\r\n\
    basta telefonare\r\n\
    sessantanove, ventitre!"
