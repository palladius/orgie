  Corpo: "La Contessa di Castiglione dava il culo a Napoleone,\r\n\
    la Contessa di Castiglione dava il culo a Napoleon.\r\n\
    \r\n\
    E a Torino, rimasto Camillo, in barba degli amanti si trastullava il lillo;\r\n\
    e il prode Nigra faceva il rufiano, mentre l'imperatrice glielo prendeva in mano!\r\n\
    \r\n\
    E il re, e il re, Vittorio Emanuele,\r\n\
    durante, durante, durante Solferino,\r\n\
    vedendo, vedendo, vedendo un contadino,\r\n\
    gli chiese, gli chiese, gli chiese un gran favor.\r\n\
    \r\n\
    Che favor?\r\n\
    \r\n\
    Me la dai la moglie tua? Me la dai la moglie tua?\r\n\
    Me la dai la moglie tua? La moglie tua dov'\xC3\xA8?!\r\n\
    A tua moglie, per piacere, voglio metterlo nel sedere;\r\n\
    A tua moglie, per piacere, voglio metterlo nel seder.\r\n\
    Per l'Italia, sulla Sila, ci son 1000 cazzi in fila;\r\n\
    Per l'Italia, sulla Sila, ci son 1000 cazzi in fil.\r\n\
    \r\n\
    E il re Borbone, fuggendo a dirotto,\r\n\
    messa una mano al culo, grid\xC3\xB2: \"me l'hanno rotto!!!\"\r\n\
    \r\n\
    e Garibaldi, rivolto al cavallo, \r\n\
    disse \"Tu ma' puttana, tu m'ha' pestato un pi\xC3\xA8!!!\"\r\n\
    \r\n\
    Cos\xC3\xAC, cos\xC3\xAC, l'Italia la fu fatta,\r\n\
    fu fatta, fu fatta, fu fatta a stivaletto,\r\n\
    tra una, tra una, tra una chiavata e un letto\r\n\
    e mille, e mille, e mille trovatel!\r\n\
    \r\n\
    E tu di chi sei figlio, e tu di chi sei figlio,\r\n\
    e tu di chi sei figlio, di chi sei figlio tu?\r\n\
    Sei figlio di puttana, sei figlio di puttana,\r\n\
    sei figlio di puttana e di un garibaldin!\r\n\
    \r\n\
    Me piase il vin!!!"
