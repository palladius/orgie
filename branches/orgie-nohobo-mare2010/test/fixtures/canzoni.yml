  Corpo: "                                                                       \r\n\
    \"Se la mamma ti domanda\r\n\
    chi t\xE2\x80\x99ha rotto la passerina\r\n\
    uno studente di medicina\r\n\
    uno studente di medicina\".\r\n\
    Dove siamo?\r\n\
    Spinte pugni gomitate\r\n\
    che non fanno mai paura\r\n\
    che non lasciano mai traccia\r\n\
    n\xC3\xA9 un\xE2\x80\x99ombra di rancore\r\n\
    nell\xE2\x80\x99espressione della faccia\r\n\
    e quando udite un grido\r\n\
    \xE2\x80\x9C\xC3\xA8 un grido di dolore?\xE2\x80\x9D\r\n\
    vi vien fatto di pensare,\r\n\
    neanche per idea,\r\n\
    son le giovani membra \r\n\
    che si affrancano\r\n\
    dalle angustie del nido.\r\n\
    Di dove veniamo?\r\n\
    Per trovarci sopra un piano\r\n\
    di eguaglianza\r\n\
    scendiamo\r\n\
    da ogni gradino\r\n\
    della societ\xC3\xA0\r\n\
    sgorghiamo come l\xE2\x80\x99acqua\r\n\
    da ogni rivolo della terra.\r\n\
    Quanti siamo?\r\n\
    A contarci non pensiamo\r\n\
    non abbiamo mai pensato\r\n\
    e quando ci contiamo\r\n\
    non lo facciamo per calcolo:\r\n\
    ci contiamo cantando.\r\n\
    Che cosa siamo?\r\n\
    Perch\xC3\xA9 ripetere\r\n\
    quello che tutti sanno?\r\n\
    che banalit\xC3\xA0!\r\n\
    Lo sanno anche le donne\r\n\
    oramai\r\n\
    che siamo le colonne\r\n\
    dell\xE2\x80\x99Universit\xC3\xA0.\r\n\
    Che cosa vogliamo?\r\n\
    Tanto vogliamo\r\n\
    che non riusciamo a dirvelo\r\n\
    perch\xC3\xA9 vogliamo tutto\r\n\
    non solo quello\r\n\
    che vi par bello\r\n\
    ma quello altres\xC3\xAC\r\n\
    che vi par brutto.\r\n\
    Dove andiamo?\r\n\
    Non si sa\r\n\
    n\xC3\xA9 ce lo domandiamo:\r\n\
    si va... si va... si va...\r\n\
    ma sappiamo\r\n\
    senza saperlo\r\n\
    e nel modo pi\xC3\xB9 sicuro\r\n\
    che l\xE2\x80\x99avvenire \xC3\xA8 nostro\r\n\
    e nessuno ce lo toglier\xC3\xA0.\r\n\
    \"Se la mamma te lo domanda\r\n\
    chi te l\xE2\x80\x99ha rotto l\xE2\x80\x99\xC3\xB2bice\r\n\
    uno studente che studia il codice\r\n\
    uno studente che studia il codice.\"\r\n\
    Siamo belli?\r\n\
    Lo affermiamo solamente\r\n\
    con un fugacissimo sorriso\r\n\
    difficile da cogliere\r\n\
    sopra le nostre labbra\r\n\
    enigmatiche\r\n\
    come quelle di Narciso\r\n\
    ogni qualvolta avvenga\r\n\
    di vedere riprodotta\r\n\
    la nostra immagine\r\n\
    in uno specchio:\r\n\
    le sembianze del nostro viso.\r\n\
    Siamo violenti?\r\n\
    Siamo giovani: ecco tutto,\r\n\
    e da tali\r\n\
    ci dovete giudicare,\r\n\
    volenti o nolenti,\r\n\
    anche allorquando\r\n\
    gridiamo a perdifiato\r\n\
    minacciando\r\n\
    una scarica di botte\r\n\
    solo per affermare\r\n\
    senza complimenti\r\n\
    la nostra naturale\r\n\
    vitalit\xC3\xA0\r\n\
    e al tempo stesso\r\n\
    per svegliare i dormienti\r\n\
    giacch\xC3\xA9 dormono indisturbate\r\n\
    in mezzo a noi\r\n\
    un\xE2\x80\x99infinit\xC3\xA0 di marmotte.\r\n\
    Che sappiamo?\r\n\
    Troppe cose dovendo imparare\r\n\
    abbiamo imparato a sapere\r\n\
    soltanto\r\n\
    quello che non sappiamo\r\n\
    ma non vi sembri poco\r\n\
    perch\xC3\xA9 ora sappiamo dov\xE2\x80\x99\xC3\xA8\r\n\
    per impararlo.\r\n\
    Quando piace di vivere\r\n\
    sembra di amare tutto\r\n\
    che tutto corrisponda\r\n\
    al nostro amore\r\n\
    amore che non conosce limiti\r\n\
    che non conosce soste\r\n\
    e colui che lo respinge,\r\n\
    fate bene attenzione\r\n\
    a quel monsi\xC3\xB9,\r\n\
    perch\xC3\xA9 \xC3\xA8 precisamente quello\r\n\
    a cui piace di pi\xC3\xB9.\r\n\
    Chi saremo?\r\n\
    Non \xC3\xA8 facile dirlo\r\n\
    a questa et\xC3\xA0\r\n\
    ma sappiamo\r\n\
    senza tema di sbagliare\r\n\
    che saremo qualcheduno\r\n\
    qualcheduno molto in su\r\n\
    nella scala dei giganti\r\n\
    dell\xE2\x80\x99intera umanit\xC3\xA0,\r\n\
    non ci basta di contare\r\n\
    quanto conta un pap\xC3\xA0.\r\n\
    E poi?\r\n\
    L\xE2\x80\x99ufficio\r\n\
    di pensare al poi\r\n\
    lo riserbiamo a quelli\r\n\
    che sono nati\r\n\
    prima di noi.\r\n\
    \"Se la mamma ti domanda\r\n\
    chi t\xE2\x80\x99ha rotto il tafanario\r\n\
    uno studente veterinario\r\n\
    uno studente veterinario.\r\n\
    Era lei s\xC3\xAC s\xC3\xAC\r\n\
    era lei no no\r\n\
    era lei che lo voleva\r\n\
    quel mazzolin di fior\".\r\n"
