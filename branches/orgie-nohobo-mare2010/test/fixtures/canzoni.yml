canzoni_156: 
  m_bSeria: "1"
  Data_creazione: 2003-07-31 22:11:11
  Corpo: "{Strofa: SOL DO RE MI-\r\n\
    SOL DO RE MI-\r\n\
    RE MI- RE SOL}\r\n\
    Tuonavano i fucili sotto gli alberi del bosco  \r\n\
    ho avuto sette anni solo ieri  \r\n\
    uccidono il mio amico dieci messicani  \r\n\
    e fuggono tra il fumo degli spari  \r\n\
    tra un gelato e un succo di lamponi  \r\n\
    sentivo il tintinnare degli sproni  \r\n\
    \r\n\
    Giuro amico mio che ti vendicher\xC3\xB2  \r\n\
    quel cane di Ramon ammazzer\xC3\xB2  \r\n\
    nei sogni di ieri patetico ma maschio  \r\n\
    eroe di solitudine e di rischio  \r\n\
    eroe senza un amico e senza moglie  \r\n\
    usava la pistola controvoglia  \r\n\
    \r\n\
    {Rit: DO RE SOL MI-\r\n\
    DO RE SOL MI-\r\n\
    SOL MI- SOL MI-\r\n\
    LA- SOL MI- LA- MI- credo...}\r\n\
    E Peter Pan, era il mio eroe di allora  \r\n\
    e certo quand'ero giovane  \r\n\
    e andare via, e dondolare in cielo  \r\n\
    ed essere tiepido e libero  \r\n\
    Essere Peter Pan, Peter Pan, Peter Pan,  \r\n\
    essere Peter Pan, essere Peter Pan!  \r\n\
    \r\n\
    Il compito \xC3\xA8 cercare il Graal del Redentore  \r\n\
    ho avuto tredici anni solo ieri  \r\n\
    l'anima temprata forte ma devota  \r\n\
    del mito degli argentei cavalieri  \r\n\
    d'acciaio scintillante e di purezza  \r\n\
    Madonna, quale angelica fattezza  \r\n\
    \r\n\
    Nei sogni di ieri nelle stanze del castello  \r\n\
    ma se torto viene fatto alla mia dama  \r\n\
    il paggio ha gi\xC3\xA0 bardato il candido destriero  \r\n\
    galoppo ad arrossare la mia lama  \r\n\
    tra la pubblicit\xC3\xA0 di reggiseni  \r\n\
    ho combattuto maghi e saraceni.  \r\n\
    \r\n\
    E Peter Pan, era il mio eroe di allora  \r\n\
    e certo quand'ero giovane  \r\n\
    e andare via, e dondolare in cielo  \r\n\
    ed essere tiepido e libero  \r\n\
    Essere Peter Pan, Peter Pan, Peter Pan,  \r\n\
    essere Peter Pan, essere Peter Pan! \r\n\
    \r\n\
    Amore e spiegazione, nocciolo del mondo  \r\n\
    ho avuto sedici anni solo ieri  \r\n\
    l'unica risposta \xC3\xA8 in uno sguardo chiaro  \r\n\
    nelle parole: insegnami a baciare  \r\n\
    sai ho un po' paura della strada,  \r\n\
    ma ti accompagner\xC3\xB2 comunque vada!  \r\n\
    \r\n\
    Nei sogni di ieri non \xC3\xA8 sesso, non \xC3\xA8 carne  \r\n\
    ma \xC3\xA8 il tepore della convivenza  \r\n\
    \xC3\xA8 l'unica maniera di guardare in faccia al mondo  \r\n\
    di non aver paura finalmente  \r\n\
    ed ogni giorno il mito si rinnova  \r\n\
    negli occhi della mia ragazza nuova \r\n\
    \r\n\
    E Peter Pan, era il mio eroe di allora  \r\n\
    e certo quand'ero giovane  \r\n\
    e andare via, e dondolare in cielo  \r\n\
    ed essere tiepido e libero  \r\n\
    Essere Peter Pan, Peter Pan, Peter Pan,  \r\n\
    essere Peter Pan, essere Peter Pan!  \r\n\
    \r\n\
    Dopo la canzone a tutti resta un eco  \r\n\
    ho avuto i miei vent'anni solo ieri,  \r\n\
    m'inventer\xC3\xB2 una nota, trover\xC3\xB2 quella parola  \r\n\
    voglio colorare i miei pensieri  \r\n\
    odio la canzone del silenzio  \r\n\
    la tragica canzone del silenzio.  \r\n\
    \r\n\
    Nei sogni di ieri manca poco ancora  \r\n\
    e allora ti stavamo ad ascoltare  \r\n\
    intanto con i suoni delle corde e con la voce  \r\n\
    tu prova l'atmosfera di stasera  \r\n\
    canta tu e vedrai per una volta  \r\n\
    tra tutti gli altri un occhio che ti ascolta.  \r\n\
    \r\n\
    E Peter Pan, era il mio eroe di allora  \r\n\
    e certo quand'ero giovane  \r\n\
    e andare via, e dondolare in cielo  \r\n\
    ed essere tiepido e libero  \r\n\
    Essere Peter Pan, Peter Pan, Peter Pan,  \r\n\
    essere Peter Pan, essere Peter Pan!"
