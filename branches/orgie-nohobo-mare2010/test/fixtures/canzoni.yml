  Corpo: "Di canti di gioia\r\n\
    Di canti d\xE2\x80\x99amore\r\n\
    Risuoni la vita\r\n\
    Mai spenta nel cuore,\r\n\
    Non cada per essi\r\n\
    La nostra virt\xC3\xB9. [bis]\r\n\
    \r\n\
    Dai lacci sciogliemmo\r\n\
    L\xE2\x80\x99avvinto pensiero\r\n\
    Che or libero spazia\r\n\
    Sui campi del vero\r\n\
    E sparsa la luce\r\n\
    Sui popoli fu. [bis]\r\n\
    \r\n\
    Ribelli ai tiranni\r\n\
    Di sangue bagnammo\r\n\
    Le zolle d\xE2\x80\x99Italia\r\n\
    Fra l\xE2\x80\x99arti sposammo\r\n\
    In sacro connubio\r\n\
    La Patria al saper. [bis]\r\n\
    \r\n\
    La Patria faremo\r\n\
    Coi petti e coi carmi\r\n\
    Superba nell\xE2\x80\x99arti\r\n\
    Temuta nell\xE2\x80\x99armi\r\n\
    Regina nell\xE2\x80\x99opre\r\n\
    Del divo pensier. [bis]\r\n\
    \r\n\
    Di canti di gioia\r\n\
    Di canti d\xE2\x80\x99amore\r\n\
    Risuoni la vita\r\n\
    Mai spenta nel cuore! \r\n\
    \r\n\
    {DO FA SOL DO\r\n\
    FA SOL DO\r\n\
    LA- MI- DO SOL\r\n\
    DO FA SOL DO}"
