  Corpo: "C'era un frate di Certosa  {RE LA RE}\r\n\
    con la fava lacrimosa.  {SOL LA RE SI-}\r\n [coro] che voleva fottere... {LA SOL RE}\r\n\
    \r\n\
    Suor Alice, madre amata,  \r\n\
    fammi fare una chiavata...  \r\n [coro]  ti dar\xC3\xB2 un paulo...\r\n\
    \r\n\
    Per un paulo, fra  Cazzaccio\r\n\
    queste cose non le faccio...  \r\n [coro] ti far\xC3\xB2 una sega...\r\n  \r\n\
    Suor Alice, madre onesta,  \r\n\
    glielo prende per la testa...  \r\n [coro]  finch\xC3\xA8 il frate parte...\r\n\
    \r\n\
    Suor Alice, madre amena,  \r\n\
    tutta notte lo dimena...  \r\n [coro] finch\xC3\xA8 il frate viene...\r\n\
    \r\n\
    Fra Cazzaccio, cuor contento,  \r\n\
    se ne torna al suo convento.  \r\n [coro] con la fava moscia...\r\n\
    \r\n\
    La morale della storia:  \r\n\
    anche i frati fan baldoria.  \r\n\
    S\xC3\xAC, ma...  \r\n [coro] religiosamente... \r\n "
