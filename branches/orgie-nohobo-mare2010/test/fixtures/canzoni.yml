  Corpo: "Un giorno settembrino\r\n\
    di fine settimana\r\n\
    \xC3\xA8 nato in un casino\r\n\
    un figlio di puttana.\r\n\
    La mamma merdaiola,\r\n\
    al povero bambino,\r\n\
    nel fare una spagnola,\r\n\
    il latte cambi\xC3\xB2 in vino.\r\n\
    L\xE2\x80\x99allattamento alcolico,\r\n\
    quale trasformazione,\r\n\
    il ciclo metabolico\r\n\
    cambi\xC3\xB2 in fermentazione.\r\n\
    D'istinto naturale\r\n\
    beone smoderato\r\n\
    goliarda eccezionale\r\n\
    fosti considerato.\r\n\
    Ma un giorno dio sagrato\r\n\
    amara fu la sorte\r\n\
    tu fosti avvelenato,\r\n\
    avvelenato a morte:\r\n\
    Dal tuo bicchier di Chianti,\r\n\
    con acqua, a tradimento!\r\n\
    Prima di andar fra i Santi\r\n\
    facesti testamento:\r\n\
    Le mie bestemmie amate,\r\n\
    compagne della vita,\r\n\
    le voglio tramandate\r\n\
    da un nero gesuita.\r\n\
    Tutte le mie battone\r\n\
    che mi hanno sollazzato\r\n\
    facciano un rampicone\r\n\
    a chi mi ha sotterrato.\r\n\
    Amore mai trovato\r\n\
    in giro per la terra\r\n\
    quello che ti ho cantato\r\n\
    dentro al tuo cuor rinserra\r\n\
    Fratelli in Goliardia\r\n\
    dentro un bicchier di vino\r\n\
    vi lascio la follia:\r\n\
    fateci un gran casino!\r\n\
    Il mio goliardo nero\r\n\
    resti con me in eterno:\r\n\
    lo voglio al cimitero,\r\n\
    lo voglio anche all'inferno.\r\n\
    Il mio goliardo rosso,\r\n\
    che l'\xC3\xA8 di medicina,\r\n\
    lo tromba a pi\xC3\xB9 non posso,\r\n\
    davanti e a pecorina.\r\n\
    Il mio goliardo rosa\r\n\
    l'ho preso su dal cesso,\r\n\
    lo so che fa cagare,\r\n\
    ma lo porto lo stesso.\r\n\
    Il mio goliardo blu,\r\n\
    con l'aquila dorata\r\n\
    lo dono alle battone \r\n\
    per farci una chiavata.\r\n\
    Il mio goliardo verde\r\n\
    come dei prati in fiore\r\n\
    anche se pien di merde\r\n\
    resta del suo colore.\r\n\
    Il mio goliardo azzurro\r\n\
    ch'\xC3\xA8 di Giurisprudenza\r\n\
    io te lo caccio in culo\r\n\
    e tu porta pazienza.\r\n\
    Il mio goliardo bianco\r\n\
    bianco da letterato\r\n\
    ha fatto il,Kama Sutra\r\n\
    ed ha ricominciato.\r\n\
    (colar della purezza\r\n\
    di averlo non mi stanco\r\n\
    lo porto con fermezza.)\r\n\
    Il mio goliardo giallo\r\n\
    colar d'economia\r\n\
    chiaro come cristallo\r\n\
    ma \xC3\xA8 sempre cosa mia.\r\n\
    Il mio goliardo \xC3\xA8 viola\r\n\
    di politica il colore\r\n\
    \xC3\xA8 stato la mia scuola\r\n\
    di fratellanza ed amore.\r\n\
    Il mio goliardo \xC3\xA8 grigio\r\n\
    colore indefinito\r\n\
    in testa me lo pigio\r\n\
    finch\xC3\xA9 non san finito.\r\n\
    Fratelli in Goliardia\r\n\
    dentro un bicchier di vino\r\n\
    vi lascio la follia:\r\n\
    fateci un gran casino!\r\n\
    \r\n\
    \r\n"
