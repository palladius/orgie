  Corpo: "1- Ho conosciuto un deputato radicale {LAm REm LAm}\r\n\
    che, a dire il vero, \xC3\xA8 un tipo un po' speciale {LAm REm LAm}\r\n\
    \r\n\
    da quando siede laggi\xC3\xB9 nel Parlamento {REm LAm}\r\n\
    tra i suoi colleghi \xC3\xA8 tutto un gran lamento.  {MI MI7}\r\n\
    \r\n\
    \r\n\
    RIT.: Cicciolina, porca vacca, {LA MI}\r\n\
    non pisciarmi sulla giacca! {MI LA}\r\n\
    Tira fuori dalla potta  {LA MI}\r\n\
    quella povera marmotta! {MI LA}\r\n\
    Non ti fare un ditalino {RE}\r\n\
    quando parla la Bonino, {LA}\r\n\
    e il discorso, quando smette, {MI}\r\n\
    non si applaude con le tette!{LA MI LA}\r\n\
    \r\n\
    2- Ma un bel giorno un prete che conosco\r\n\
    l'ha convertita parlando di Don Bosco:\r\n\
    ha preso i voti, si \xC3\xA8 chiusa in un convento, \r\n\
    ma tra le suore \xC3\xA8 tutto un gran lamento. \r\n\
    \r\n\
    RIT.: Cicciolina, \xC3\xA8 un chiodo fisso: \r\n\
    non si lecca il crocifisso! \r\n\
    Cosa fai con tre candele \r\n\
    infilate tra le mele? \r\n\
    Non andare col priore \r\n\
    sotto l'ombra di una pianta, \r\n\
    non ti fare ogni due ore \r\n\
    il bid\xC3\xA8 con l'acqua santa! \r\n\
    \r\n\
    3- Ma fu ad Assisi in un pellegrinaggio, \r\n\
    la vide il papa, che era di passaggio: \r\n\
    volle sentirla in privata udienza,   \r\n\
    e qui Woytyla perse ogni prudenza. \r\n\
    \r\n\
    RIT.: Cicciolina, qua la mano, \r\n\
    io te porta in Vaticano! \r\n\
    Ch\xC3\xA8 Pertini, ch\xC3\xA8 Cossiga, \r\n\
    finalmente un po' di figa! \r\n\
    Finalmente in aeroplano \r\n\
    potr\xC3\xB2 farmi qualche mano, \r\n\
    e, se hai cura di mio uc\xC3\xA8lo, \r\n\
    vado pi\xC3\xB9 su l'Adam\xC3\xA8lo!\"\r\n\
    \r\n"
