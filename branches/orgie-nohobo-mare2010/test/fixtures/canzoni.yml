  Corpo: "Son qua, lavoro in ospedale dall'inizio del mese e non ci sono dottori con me. \xC3\x88 tutto diverso da quello che mi aspettavo, ma \xC3\xA8 estremamente stimolante. Gente che ha perso, o meglio, gente a cui \xC3\xA8 stata tolta gran parte delle proprie radici; e che l'uomo bianco ha costretto a divenire adulta in una civilt\xC3\xA0 che le \xC3\xA8 completamente estranea. \r\n \r\n\
    Se metti i ferri ai miei polsi \r\n\
    se strappi il blu dai miei occhi, \r\n\
    non potr\xC3\xB2 piangere, sai, \r\n\
    quando anche tu morirai. \r\n\
    non potr\xC3\xB2 piangere, sai, \r\n\
    quan do anche tu morirai. \r\n\
    Ma se c'\xC3\xA8 un Cristo lass\xC3\xB9 \r\n\
    che conta un poco per te \r\n\
    nemmeno si accorger\xC3\xA0 \r\n\
    che stai passando di l\xC3\xA0. \r\n\
    nemmeno si accorger\xC3\xA0 \r\n\
    che stai passando di l\xC3\xA0. \r\n \r\n\
    Grossi problemi, economici, sociali, culturali, ideologici. Atteggiamenti prettamente colonialistici nei confronti delle altre trib\xC3\xB9. Operazioni di polizia contro presunti briganti che chiedono l'annessione alla Somalia. Una polizia assurda che accerterebbe anche l'anima sua; un moralismo di stato ridicolo. \r\n \r\n\
    Se metti i ferri ai miei polsi \r\n\
    se strappi il blu dai miei occhi, \r\n\
    non potr\xC3\xB2 piangere, sai, \r\n\
    quando anche tu morirai. \r\n\
