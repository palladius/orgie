canzoni_290: 
  m_bSeria: "1"
  Data_creazione: 2004-10-04 14:57:47
  Corpo: "Sciabu dabu sciabu dabu sciabu dabu dabu  \r\n\
    \r\n\
    Momentaneamente mi sento libero  \r\n\
    considero la vita come un fatto igienico  \r\n\
    l'ho detto anche alle stelle che non mi sfrutteranno pi\xC3\xB9.  \r\n\
    \r\n\
    Confidenzialmente sono un po' scettico  \r\n\
    non credo nelle formule che mi coinvolgono  \r\n\
    nemmeno nelle massime che mi confondono di pi\xC3\xB9.  \r\n\
    \r\n\
    Fatalit\xC3\xA0  \r\n\
    ho un portamento atletico  \r\n\
    e con lo sguardo angelico sprigiono  \r\n\
    simpatia, fantasia, cortesia  \r\n\
    \r\n\
    Genialit\xC3\xA0  \r\n\
    ho un sorriso atomico  \r\n\
    e il cuore ti d\xC3\xA0 un fremito  \r\n\
    se passo accanto.  \r\n\
    \r\n\
    Sciabu dabu sciabu dabu sciabu dabu dabu... \r\n\
    \r\n\
    Probabilmente qualche volta esagero  \r\n\
    dipende dalle femmine che mi circondano  \r\n\
    accontentare i sensi talvolta \xC3\xA8 logico si s\xC3\xA0.  \r\n\
    \r\n\
    Sfortunatamente gli anni passano  \r\n\
    li vedo allontanarsi di qualche secolo  \r\n\
    qualcuno deve far qualcosa qualcuno ci sar\xC3\xA0.  \r\n\
    \r\n\
    Fatalit\xC3\xA0  \r\n\
    sono un artista  \r\n\
    catalogo i sogni e le emozioni  \r\n\
    ho tantissime virt\xC3\xB9.  \r\n\
    \r\n\
    Genialit\xC3\xA0  \r\n\
    \xC3\xA8 la parola giusta  \r\n\
    anticipare il mondo  \r\n\
    e guardarlo rotolare.  \r\n\
    \r\n\
