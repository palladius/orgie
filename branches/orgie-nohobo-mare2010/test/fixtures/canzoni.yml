    Ma se c'\xC3\xA8 un Cristo lass\xC3\xB9 \r\n\
    che conta un poco per te \r\n\
    nemmeno si accorger\xC3\xA0 \r\n\
    che stai passando di l\xC3\xA0. \r\n\
    nemmeno si accorger\xC3\xA0 \r\n\
    che stai passando di l\xC3\xA0. \r\n \r\n\
    Ma le persone sono simpaticissime, profondamente umane. Faccio grossi sforzi per la lingua, se ne rendono conto e l'apprezzano: sono belli, coloratissimi. Insomma, troppe cose da tenere dentro, e non c'\xC3\xA8 nessuno di voi con cui spartirle. Una terra rossa, staordinariamente, sotto l'erba. \r\n \r\n\
