  Corpo: "Ballata di poche pretese,    [1a strofa ad una voce]\r\n\
    {DO FA DO }\r\n\
    cantata una sera qualunque\r\n\
    { FA SOL DO }\r\n\
    davanti a un bicchiere di vino,\r\n\
    {FA SOL DO }\r\n\
    davanti a qualcuno che canta con te.  \r\n\
    {FA DO RE SOL  }\r\n\
    \r\n\
    Cantiamo e beviamo cantando, [2a strf. a 2 voci]\r\n\
    insieme al fratello ubriaco,\r\n\
    insieme alla vecchia bagascia\r\n\
    che si sente vergine e canta con noi.  \r\n\
    {FA DO SOL DO }\r\n\
    \r\n\
    E al coro si unisce altra gente,     [tutti]\r\n\
    quel tizio che stava da solo,\r\n\
    pensando a suo figlio che nacque e mor\xC3\xAC\r\n\
    portando sua madre con s\xC3\xA9.  \r\n\
    {FA DO RE SOL  }\r\n\
    \r\n\
    E il vecchio che ha speso nel vino,\r\n\
    i soldi di un pasto mai fatto,\r\n\
    che forse nemmeno domani far\xC3\xA0\r\n\
    e beve per non pensarci pi\xC3\xB9 su!  \r\n\
    \r\n\
    E canta anche quel fuorisede\r\n\
    che studia per farsi un domani,\r\n\
    pensando a parenti ed amici laggi\xC3\xB9,\r\n\
    convinti che non torner\xC3\xA0.  \r\n\
    \r\n\
    E canta anche il pregiudicato\r\n\
    che \xC3\xA8 uscito da una settimana,\r\n\
    e da sette giorni lui cerca lavoro\r\n\
    e lavoro nessuno gli d\xC3\xA0.  \r\n\
    { FA DO SOL DO  }\r\n\
    \r\n\
    Che importa se fuori fa freddo\r\n\
    che importa se si e' fatto tardi,\r\n\
    in fondo noi siamo goliardi e perci\xC3\xB2\r\n\
    \r\n\
    {DO FA DO FA SOL DO}\r\n\
    Gaudeamus Igitur iuvenes dum sumus!\r\n\
