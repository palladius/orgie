  Corpo: "1947, D.Olivieri-Nisa-P.Redi\r\n\
    \r\n\
    I personaggi di questa canzone\r\n\
    ve li hanno inventati gli autor...\r\n\
    Se c'\xC3\xA8 attinenza con delle persone,\r\n\
    scusate gentil signor...\r\n\
    Qui si parla di una tale\r\n\
    che baciar una sera si fe'\r\n\
    da una guardia forestale\r\n\
    il cui nome \xC3\xA8 De Rossi Giosu\xC3\xA8..\r\n\
    Voi non la conoscete, ha gli occhi belli...\r\n\
    chi?\r\n\
    Eulalia Torricelli da Forl\xC3\xAC...\r\n\
    Voi non la conoscete ha tre castelli...\r\n\
    chi?\r\n\
    Eulalia Torricelli da Forl\xC3\xAC...\r\n\
    Un castello per mangiare,\r\n\
    un castello per dormire,\r\n\
    un castello per amare,\r\n\
    per amare De Rossi Giosu\xC3\xA8.\r\n\
    Voi non la conoscete, ha gli occhi belli...\r\n\
    chi?\r\n\
    Eulalia Torricelli da Forl\xC3\xAC...\r\n\
    \r\n\
    Seconda parte, secondo programma...\r\n\
    Eulalia riposo non ha...\r\n\
    Dice a De Rossi: \"Parliamone a mamma...\"\r\n\
    Ma l'altro risponde:\"Va l\xC3\xA0!...\"\r\n\
    Poi la cosa si ingarbuglia\r\n\
    si ingarbuglia e sapete perch\xC3\xA8?...\r\n\
    Con il treno che va in Puglia \xC3\xA8 partito Giosu\xC3\xA8...\r\n\
    Vuol morire Eulalia Torricelli...\r\n\
    u\xC3\xA8!...\r\n\
    E mangia i zolfanelli di Giosu\xC3\xA8...\r\n\
    Fa testamento e lascia i tre castelli...\r\n\
    u\xC3\xA8!...\r\n\
    A chi non ha castelli come me!\r\n\
    Un castello lo d\xC3\xA0 a Nisa...\r\n"
