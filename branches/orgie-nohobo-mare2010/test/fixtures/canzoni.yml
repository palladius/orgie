  Data_creazione: 2007-01-28 20:31:58
  Corpo: "\r\n\
    Era un frate di Francia,\r\n\
    Abelardo il suo nome\r\n\
    l\xE2\x80\x99amor,la passione ,\r\n\
    che la Chiesa scacci\xC3\xB2 ,\r\n\
    e girando contrade ,\r\n\
    raccogliendo compagni ,\r\n\
    eran preti spretati\r\n\
    che lui radun\xC3\xB2.\r\n\
    \r\n\
    Eran fuori dal mondo ,\r\n\
    da tutti odiati\r\n\
    ridendo spietati\r\n\
    della gente all\xE2\x80\x99intorno,\r\n\
    gia\xE2\x80\x99 chiamati  Vaganti\r\n\
    ed odiando anche i santi\r\n\
    ed odiando chi un giorno\r\n\
    lontan li cacci\xC3\xB2.\r\n\
    \r\n\
    Di castello in castello\r\n\
    venne infin ricevuto,\r\n\
    maestro adottato\r\n\
    di una vergine bella,\r\n\
    ma passion fu pi\xC3\xB9 forte\r\n\
    tra il Vagante spietato\r\n\
    e la dolce fanciulla\r\n\
    un amore sbocci\xC3\xB2.\r\n\
    \r\n\
    Ma il ricco signore\r\n\
    \xC3\xA8 offeso e scornato \r\n\
    per un dei Vaganti\r\n\
    l\xE2\x80\x99amore \xC3\xA8 vietato.\r\n\
    Alla gogna di tutti\r\n\
    lui fa s\xC3\xAC che Abelardo\r\n\
    non rimanga pi\xC3\xB9 uomo\r\n\
    e non ami mai pi\xC3\xB9.\r\n\
    Fu lui il primo Goliardo\r\n\
    che la vita spezz\xC3\xB2\r\n\
    perch\xC3\xA9 volle gridare\r\n\
    la sua verit\xC3\xA0 !\r\n"
