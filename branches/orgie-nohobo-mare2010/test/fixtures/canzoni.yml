  Corpo: "Vocalizzato\t\t{LA-; SOL; DO; LA-; SOL; DO; LA-; }\r\n\
    {FA; SOL; DO; FA; SOL ; RE-; FA; SOL; LA-}\r\n\
    \r\n\
    {La-                     Sol                    Do                                     Fa                       Sol                Do                      La-}\r\n\
    L\xE2\x80\x99ultimo Drago e il grande Guerriero, l\xE2\x80\x99un contro l\xE2\x80\x99altro ansante il respiro\r\n\
    {Fa                         Sol                 Do                La-}\r\n\
    Verdi le squame sul petto infinito, \r\n\
    {          Fa                        Sol                         Re-}\r\n\
    ma rosso era il sangue del Drago ferito \r\n\
    {Fa                                  Sol                        La-}\r\n\
    ma rosso era il sangue del Drago ferito \r\n\
    Alza la lancia San Giorgio, poi mira: un ultimo colpo l\xC3\xAC, sotto la spira\r\n\
    Ma trema la mano, il cuor si sconsola, \r\n\
    quel Drago \xC3\xA8 l\xE2\x80\x99ultimo che ancora vola\r\n\
    quel Drago \xC3\xA8 l\xE2\x80\x99ultimo che ancora vola\r\n\
