canzoni_205: 
  m_bSeria: "1"
  Data_creazione: 2003-07-03 17:51:14
  Corpo: "Adesso che meglio ti ho conosciuta \t\t{DO\tMI-}\r\n\
    mi vergogno un pochino di me: \t\t\t{LA\tRE-}\r\n\
    l'altra sera nel tuo appartamento \t\t\t{SOL\tDO}\r\n\
    ho sbagliato il comportamento... \t\t\t{LA\tSOL}\r\n\
    ma spero tu possa capir certe cose: \t\t{DO\tMI-}\r\n\
    una donna come te, \t\t\t\t{LA\tRE-}\r\n\
    che studia psicologia, \t\t\t\t{SOL\tDO}\r\n\
    si interessa di sociologia; \t\t\t\t{LA\tSOL}\r\n\
    perci\xC3\xB2 io ti dir\xC3\xB2 parole buone,  \t\t\t{FA\tMI-\tRE- \tMI-}\r\n\
    quattro parole in semplicit\xC3\xA0: \t\t\t{MI-\tSOL}\r\n\
    \r\n\
    Comunione e liberazione, \xC3\xA8 partita la processione, \r\n\
    il problema della fame, la Santissima Trinit\xC3\xA0: \r\n\
    dai, parliamo di cose importanti, \r\n\
    di argomenti davvero scottanti; \r\n\
    son d'accordo con te: per poter stare insieme \r\n\
    c'\xC3\xA8 bisogno di un nesso comune, \r\n\
    di interessi perlomeno adiacenti \r\n\
    alla luce degli avvenimenti, \r\n\
    perci\xC3\xB2 io ti dir\xC3\xB2 parole buone, \r\n\
    quattro parole in semplicit\xC3\xA0: \r\n\
    \r\n\
    Se me lo fai, se me lo fai diventar duro \r\n\
    io studier\xC3\xB2, io studier\xC3\xB2 Martin Lutero; \r\n\
    imparo a memoria il Corano \r\n\
    se me lo prendi un po' in mano; \r\n\
    se me la dai, se me la dai seduta stante \r\n\
    imparo a memoria la vita di Dante \r\n\
    e sulla Divina Commedia \r\n\
    scopiamoci qui sulla sedia \r\n\
    e poi ti chiaver\xC3\xB2 sul lavandino, \r\n\
    semplicemente cantando \"only you\"...\r\n"
