canzoni_386: 
  m_bSeria: "1"
  Data_creazione: 2007-08-16 21:56:05
  Corpo: "Un giorno quando te ne andrai, fra poco tempo ancora,\r\n\
    allora forse capirai quanto sia bella un'ora.\r\n\
    Un'ora per capire cosa vuol dire insieme,\r\n\
    insieme per cantare i pensieri di sempre.\r\n\
    \r\n\
    Note fatte di vino, urlo che esplode dentro:\r\n\
    ti tremano le mani, troppo da dire insieme.\r\n\
    \r\n\
    Ti stringi nel ricordo di qualche anno fa:\r\n\
    \xC3\xA8 sempre pi\xC3\xB9 sdrucito, ma un altro non ti sta.\r\n\
    Ecco le notti bianche urlate in osteria,\r\n\
    e bevevamo il sole nella malinconia.\r\n\
    \r\n\
    Stringetemi per ultimo in un abbraccio forte:\r\n\
    le labbra che mi tremano cantano l'onest\xC3\xA0.\r\n\
    \r\n\
    Un giorno quando te ne andrai... (2v.)"
  Autore: "Piero Fin\xC3\xA0"
  ID_canzone: "1065246696"
  Note: "Il Fin\xC3\xA0 degli anni '70.\r\n \"...vibra la nostalgia della fratellanza goliardica, di quell'amore spontaneo, diverso, che \xC3\xA8 il tesoro pi\xC3\xB9 importante che si trovi sotto la feluca, il primo che viene alla mente quando si ripensa agli anni vagabondi dei mantelli...\" \r\n\
    Cos\xC3\xAC la commenta \"Zeus\" Collino nella sua antologia \"Come stracci al vento\"."
  titolo: Un giorno quando te ne andrai
  tipo: 
  id_login: "3723"
