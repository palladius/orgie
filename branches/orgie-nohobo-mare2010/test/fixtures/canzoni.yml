canzoni_429: 
  m_bSeria: "1"
  Data_creazione: 2008-11-20 04:53:43
  Corpo: "Sento la nostalgia del Calvario,\r\n\
    del centurion, del prode legionario:\r\n\
    mai ti potr\xC3\xB2 scordar, Calvario mio,\r\n\
    ma che bella inchiodata, quella notte stellata,\r\n\
    a quel porco di dio...\r\n\
    Calvario mio, Calvario in fiore,\r\n\
    dove inchiodarono nostro Signore,\r\n\
    Calvario, Calvario mio,\r\n\
    lontan da te non si pu\xC3\xB2 star!\r\n"
  Autore: Musica Raul Casadei testo Goliarda anonimo
