  Corpo: "Chi di voi mi accompagner\xC3\xA0\r\n\
    dove si getta il cuore,\r\n\
    spero che si ricorder\xC3\xA0\r\n\
    di non guardarmi andare via,\r\n\
    di non lasciarmi andare via...\r\n\
    \r\n\
    Ci sar\xC3\xA0, certo ci sar\xC3\xA0\r\n\
    chi non vorr\xC3\xA0 venire,\r\n\
    ma sar\xC3\xA0 sempre insieme a me\r\n\
    nei gesti della Fantasia,\r\n\
    nei campi della Fantasia...\r\n\
    \r\n\
    Ai tempi venivo, venivo, venivo, venivo volando...\r\n\
    Adesso, mi muovo, mi muovo, mi muovo, mi muovo di un passo...\r\n\
    Grazie alla Fantasia,\r\n\
    sai sempre come andar...\r\n\
    Grazie alla Fantasia,\r\n\
    conti che non finisca mai...\r\n\
    \r\n\
    Venendo da mille e pi\xC3\xB9 mille da mille e pi\xC3\xB9 mille colonne,\r\n\
    vedremo sfiorire e fiorire, sfiorire e fiorire le stelle...\r\n\
    Grazie alla Fantasia,\r\n\
    sai sempre come andar...\r\n\
    Grazie alla Fantasia,\r\n\
    conti che non finisca mai...\r\n\
    \r\n\
    Si lo so che succeder\xC3\xA0\r\n\
    e mi dovr\xC3\xB2 fermare\r\n\
    ma chiss\xC3\xA0 se anche sua maest\xC3\xA0\r\n\
    verr\xC3\xA0 a giocare a casa mia,\r\n\
    solo a giocare e cos\xC3\xAC sia...\r\n\
    \r\n\
    Ai tempi venivo, venivo, venivo, venivo volando...\r\n\
    Adesso, mi muovo, mi muovo, mi muovo, mi muovo di un passo...\r\n\
    Grazie alla Fantasia,\r\n\
    sai sempre come andar...\r\n\
    Grazie alla Fantasia,\r\n\
    conti che non finisca mai...\r\n\
    \r\n\
    Venendo da mille e pi\xC3\xB9 mille da mille e pi\xC3\xB9 mille colonne,\r\n\
    vedremo sfiorire e fiorire, sfiorire e fiorire le stelle...\r\n\
    Grazie alla Fantasia,\r\n\
    sai sempre come andar...\r\n\
    Grazie alla Fantasia,\r\n\
    conti che non finisca mai...\r\n"
