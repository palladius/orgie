canzoni_332: 
  m_bSeria: "1"
  Data_creazione: 2005-04-22 12:39:43
  Corpo: |-
    Se per verso divino il primo posto
    ebbe Dante tra gl'itali cantori,
    se con penna immortale canto' l'Ariosto
    le donne, i cavalieri, l'arme e gli amori,
    e se dovunque strepito e fracasso
    fece il poema di Torquato Tasso,
    e se Petrarca sopra gli occhi chiari
    di Laura bella scrisse tanti versi
    e molti altri poeti illustri e rari
    speser del tempo in temi si' diversi,
    or io vo' vendicar l'ingiusto oblio
    in che cadesti tu, Venere bella.
    Tempra tu stessa questo scettro mio
    e infondine la tua dolce favella
    ond'io con scienza arguta e dotta
    cantar potro' la lingua della potta.
    Questo e' il mio grande e portentoso tema
    cui spesi volentier tempo e fatica.
    Non vi par cosa degna di un poema
    la leccatura di una bella fica?
    Per me, chi non lecca e' empio e pazzo
    e non ha sangue al cuor ne' sugo al cazzo.
    Se frequenti il bel sesso e se tu hai
    stoffa da indagator qual io t'assembro,
    con gran facilita' t'accorgerai
    che per la donna non e' tutto il membro.
    Onde la sua lascivia ben s'estinga
    val piu' d'un cazzo un pezzettin di lingua.
    Armati di costanza e d'accortezza,
    e quando la vedrai tutta vibrante
    non espugnar d'un tratto la fortezza
    come suol far qualunque collegiante
    che da' tosto l'assalto alla trincea
    per piantar l'asta della della sua bandiera.
    Ma gioca ognor d'astuzia e l'arte adopra
    che alla donna riesce assai gradita
    e quando alfine le cavalchi sopra,
    fa' che d'ogni finezza resti conquita.
    Solo allor dov'e' del gaudio il centrp
    sfodera il brando e piantaglielo dentro!
    Adotta tal sistema e sempre avrai
    dalla tua donna amor costante e stima.
    Non dalla fica cominciar dovrai;
    leccale il lobodell'orecchio prima.
    Baciala. Metti a leila lingua in bocca.
    Succhiale le mammelle. Il collo toccale,
    l'ebbrezza le vedrai dipinta in viso,
    le poppe dure, il seno eretto, ansante,
    beata ella sara' nel suo sorriso.
    La bocca sua allor bacia anelante.
    Discendi costeggiando piano piano
    quasi un pennello la tua lingua fosse.
    Serpeggia dall' orfizio al deretano
    con lievi tratti e delicate mosse.
    Indi la fatta via torna a rifare
    e lecca sempre e mai non ti stancare
    che all'ombelico infine e' giunta l'ora
    in cui la sensualissima ragazza
    per la libidine sara' resa pazza.
    Poich'ella e' presa da brama ardente
    d'aver tra le sue cosce la tua testa,
    spingila dentro tosto avidamente
    poi con scaltrezza e con manovra lesta
    prendi, mentr'ella languida si muove,
    la posizione del sessantanove!
    Mentre in tal modo tu resti impegnato
    il cazzo tuo tanto superbo e ardito
    dalle mani di lei sara' impugnato,
    nella sua bocca messo e ben forbito.
    Indi la lingua con lasciva mossa
    chiamera' il tuo sperma alla riscossa.
    Allor vedrai che nello stesso istante
    due bocche succhieran lo stesso umore.
    Vedrai un cazzo ed una fica ansante,
    uniti, succhieran lo stesso umore
    ed in tal momento di suprem desio
    scorderai persin la terra e Dio.
