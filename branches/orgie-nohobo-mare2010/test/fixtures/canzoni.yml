  Data_creazione: 2007-05-18 18:04:30
  Corpo: "Toni Toni, \xC3\xA8lo che?\r\n\
    xe arivadi i Venexiani\r\n\
    xe vestidi come Thoeni\r\n\
    scarpe lustre coi pom\xC3\xA8i\r\n\
    i se parla in seggiovia\r\n\
    che i le sente tute quante\r\n\
    sul skilift i passa avante\r\n\
    sule piste i resta en bus!\r\n\
    e i Venexianiiiiiii\r\n\
    so' ariv\xC3\xA0 col vaporin\r\n\
    per andar sul visentin\r\n\
    e sui sci, per andar megio\r\n\
    mi go miso l'ogio e l'agio.\r\n\
    la vippera, la vippera,\r\n\
