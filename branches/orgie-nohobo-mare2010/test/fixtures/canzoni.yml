  Corpo: "Intro\r\n\
    {La\tLa7+\tLa6\tMi\tLa \r\n\
    La\tLa7+\tLa6\tMi\tLa\tMi}\r\n\
    \r\n\
    Strofa\r\n\
    {La\tLa7+\tLa6\tLa\r\n\
    La\tLa7+\tRe\r\n\
    Sim\tMi\tLa\tRe\tMi\tLa\tMi\r\n\
    La\tLa7+\tLa6\tLa\r\n\
    La\tLa7+\tRe\r\n\
    Sim\tMi\tLa\tRe\tMi\tLa}\r\n\
    Tintoretto insegnami i segreti del colore  \r\n\
    i tuoi passaggi morbidi dal giallo all'arancione  \r\n\
    le curve e le parabole di luce inesistente  \r\n\
    L\xC3\xA0 dove l'occhio insiste, cerca le risposte giuste  \r\n\
    che non esistono.  \r\n\
    \r\n\
    Capitan Corto Maltese portami su un'isola tropicale  \r\n\
    dove tra sole e noci di cocco possa ritornare un animale  \r\n\
    dove tra fantasia e coriandoli, scorpioni e barracuda  \r\n\
    l\xC3\xA0 dove l'acqua bianca incontra l'onda azzurra  \r\n\
    dell'oceano.  \r\n\
    \r\n\
    {Re\tMi}\r\n\
    Tutto il resto \xC3\xA8 superfluo  \r\n\
    Tutto quanto dimentico  \r\n\
    {Re\tLa\tSim\tMi\tLa\r\n\
    Re\tLa\tSim\tMi\tLa\r\n\
    Sim\tMi } \r\n\
    Un bicchiere di champagne, al\xC3\xA8, voil\xC3\xA0  \r\n\
    Adios all'amico che resta, \xC3\xA8 una magnifica fiesta  \r\n\
    ma io non puedo restar\xC3\xA0 A chi  \r\n\
    un pochito de sangria, v\xC3\xA0 via Maria  \r\n\
    Adios all'amico che parte  \r\n\
    io sono un clerico vagante io no puede restar.  \r\n\
    \r\n\
    Amico mio dimentica di essermi fedele  \r\n\
    evita le consuetudini e spezza le catene  \r\n\
    risparmiami il panegirico sul vuoto dell'assenza  \r\n\
    Almeno in mia presenza, evita la circostanza  \r\n\
    delle lacrime.  \r\n\
    \r\n\
    Eugenio suggeriscimi un'ermetica conclusione  \r\n\
    una capriola magica sulla pagina del cuore  \r\n\
    Quattro parole stupide dal senso inesistente  \r\n\
    Un qualcosa che non sento, un simpatico argomento  \r\n\
    per concludere.  \r\n\
    \r\n\
    Tutto il resto \xC3\xA8 superfluo  \r\n\
    Tutto quanto dimentico  \r\n\
    Un bicchiere di champagne, al\xC3\xA8, voil\xC3\xA0  \r\n\
