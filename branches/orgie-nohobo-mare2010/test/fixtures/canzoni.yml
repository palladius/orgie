  Corpo: "Mi avevano detto che la Goliardia\r\n\
    non \xC3\xA8 cosa santa, non \xC3\xA8 cosa pia\r\n\
    per un po', per un po', l'ho fatta pure io\r\n\
    bastava gridare in giro: \"n\xC3\xA8 stato n\xC3\xA8 Dio\"\r\n\
    ma Goliardia, \xC3\xA8 dittatura e schiavit\xC3\xB9\r\n\
    fatta apposta, per far quel c\xC3\xA0zzo che vuoi tu\r\n\
    Goliardia, \xC3\xA8 prender la vita cos\xC3\xAC come va\r\n\
    senza i problemi di questa nostra societ\xC3\xA0\r\n\
    Oh, yeah, oh yeah, oh yeah\r\n\
    Leccami le caccole dell'intestino cieco,\r\n\
    ungimi il budello con il grasso di tricheco,\r\n\
    poi con il resto di un pompin,\r\n\
    imbottisciti un panin\r\n\
    magna merda, v\xC3\xA0 in casin.\r\n\
    la' troverai tua mamma\r\n\
    con le mutande in mano,\r\n\
    che se fa la putt\xC3\xA0na\r\n\
    per guadagnarse il pano-quotidiano.\r\n\
    (UPIM-STANDA-RINASCENTE-COIN)\r\n\
    Schiacciati i coglioni tra i battenti di una porta,\r\n\
    sparati una sega con la mano di una morta,\r\n\
    poi con il succo di un bide'\r\n\
    fatti' un consomme', bevilo per me.\r\n\
    Succhiati un foruncolo scoppiato ad un beduino,\r\n\
    bacia l'orinale di una troia da casino,\r\n\
    poi con l'estratto di un pital,\r\n\
    incartato in un giornal, fatti un baccanal.....\r\n\
    \r\n \r\n\
    \r\n\
    \r\n"
