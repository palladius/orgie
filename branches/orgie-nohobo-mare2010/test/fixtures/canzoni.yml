  Data_creazione: 2005-04-03 02:04:08
  Corpo: "Le ragazze che stanno a Pracchia\r\n\
    si imboscano nella macchia\r\n\
    mentre quelle di Porretta \r\n\
    te ne danno solo una fetta\r\n\
    \r\n\
    Le ragazze di Viareggio \r\n\
    per trombare sono le peggio\r\n\
    mentre quelle di Massarosa\r\n\
    si tengan strette la loro cosa\r\n\
    \r\n\
    Le ragazze del Mugello\r\n\
    per la testa chan solo quello\r\n\
    mentre quelle di Scarperia\r\n\
    \xC3\xA8 difficile che ti dian la fia\r\n\
    \r\n\
    Le ragazze di Masotti\r\n\
    pur di tromb\xC3\xA0 fanno a cazzotti\r\n\
    mentre quelle della valle del Chianti \r\n\
    neanche se tu le pigli a schianti\r\n\
    \r\n\
    Le ragazze del Signorino \r\n\
    si farebbero anche un bambino\r\n\
    mentre quelle di Barberino \r\n\
    preferiscono un ditalino\r\n\
    \r\n\
    Le ragazze di Gavinana\r\n\
    se li dividono \"alla romana\"\r\n\
    mentre quelle di Garfagnana \r\n\
    te la danno se hai \"la grana\"\r\n\
    \r\n\
    Le ragazze di Fucecchio \r\n\
    se la spulciano allo specchio\r\n\
    mentre quelle di Mammiano \r\n\
    usano sempre l'asciugamano\r\n\
    \r\n\
    Le ragazze di chiesina Montalese\r\n\
    sono gi\xC3\xA0 pronte, nude e distese\r\n\
    mentre quelle di Chiesina Uzzanese\r\n\
    solo se hai un grosso \"arnese\"\r\n\
    \r\n\
    Le ragazze del Neto \r\n\
    te la danno se sei discreto\r\n\
    mentre a quelle di Poggio a Caiano\r\n\
    tromb\xC3\xA0 troppo gli pare strano\r\n\
    \r\n\
    Le ragazze della Clonna \r\n\
    non si levan neanche la gonna \r\n\
    mentre quelle di Scandicci \r\n\
    chan peli duri paian de ricci\r\n\
    \r\n\
    Le ragazze di Lucca centro \r\n\
    lo prendan da tutti e se lo infilan dentro\r\n\
    mentre quele di fornaci di Barga \r\n\
    per numerarli c'attaccan la targa\r\n\
    \r\n\
    Le ragazze di Montale\r\n\
    la maggior parte son gran cicale\r\n\
    mentre quelle di altopascio\r\n\
    ti dicon subito \"te lo sganascio\"\r\n\
    \r\n\
    le ragazze di Spazzavento \r\n\
    n'hanno provati almeno ducento\r\n\
    mentre quelle di cutigliano\r\n\
    vedessi che giochi con quella mano\r\n\
    \r\n\
    Dalle ragazze che stanno a Pistoia\r\n\
    forse l'avrai prima che tu moia\r\n\
    mentre quelle di quarrata\r\n\
    ce l''hanno sempre tutta bagnata\r\n\
    \r\n\
    Le ragazze di Agliana\r\n\
    la danno via dopo una settimana\r\n\
    mentre quelle di Monsummano\r\n\
    te lo prendono subito in mano\r\n\
    \r\n\
    Le ragazze di Montecatini\r\n\
    amano troppo fare i pompini\r\n\
    mentre a quelle di Serravalle\r\n\
    gli piace tutto comprese le palle\r\n\
    \r\n\
    Le ragazze di Maresca\r\n\
    se la lavan con l'acqua fresca\r\n\
    mentre quelle di San Marcello\r\n\
    Vanno a funghi col randello\r\n\
    \r\n\
    Le ragazze di Popiglio \r\n\
    c'hanno il pelo pare un coniglio\r\n\
    mentre quelle di Piteglio\r\n\
    voglion solo e sempre i meglio\r\n\
    \r\n\
    Alle ragazze di Capostrada\r\n\
    piace farlo x la strada\r\n\
    mentre a quelle di Bonelle\r\n\
    gli gusta prenderlo sotto le ascelle\r\n\
    \r\n\
    Le ragazze del Bottegone\r\n\
    sono quasi tutte bone\r\n\
    mentre quelle della Consuma\r\n\
    sono tegami tranne che una\r\n\
    \r\n\
    Le ragazze di Castello\r\n\
    gli garba lungo grosso e bello\r\n\
    mentre quelle di Porta a serraglio\r\n\
    lo prendono in bocca con il bavaglio\r\n\
    \r\n\
    Le ragazze di Prato centrale \r\n\
    se la svendono come il maiale\r\n\
    mentre quelle di Sesto fiorentino\r\n\
    ce l'hanno larga come un furgoncino\r\n\
    \r\n\
    Le ragazze di Rifredi\r\n\
    sei fortunato se gliela vedi\r\n\
    mentre quelle si S.M.Novella\r\n\
    ci mettan dentro anche la nutella\r\n\
    \r\n\
    Le ragazze di Calenzano\r\n\
    ne voglion uno anche x l'ano\r\n\
    mentre quelle delle Cascine \r\n\
    sono mignotte anche le pi\xC3\xB9 piccine\r\n\
    \r\n\
    Le ragazze dell'Abetone\r\n\
    prenderli tutti \xC3\xA8 la loro missione\r\n\
    mentre quelle di bagni di Lucca\r\n\
    te la danno se hanno la \"ciucca\"\r\n\
    \r\n\
    Le ragazze di Borgo a Mozzano\r\n\
    se la trastullano con la mano\r\n\
    mentre quelle del Monte cimone\r\n\
    usano solo certe persone\r\n\
    \r\n\
    Le ragazze di Valenzatico\r\n\
    ci vai se gli stai simpatico\r\n\
    mentre con quelle di Ponte buggianese\r\n\
    ci vai solo se non hai pretese\r\n\
    \r\n\
    Le ragazze di borgo a Buggiano\r\n\
    lo voglion dentro piano piano \r\n\
    mentre quelle di Diacceto\r\n\
    se la ungono con l'aceto\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n"
