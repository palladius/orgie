  Data_creazione: 2004-09-23 16:32:20
  Corpo: "Cico\r\n\
    \r\n\
    Lungo le strade del Messico (Messico strade del Messico)\r\n\
    Con in testa un sombrero made in Italy (Italy made in Italy)\r\n\
    Cico dice che tardi ci dobbiamo fermare (Cico Cico dice cos\xC3\xAC)\r\n\
    Presto il sole tra i monti scomparir\xC3\xA0 (sole sole scomparir\xC3\xA0)\r\n\
    Davanti ad un fuoco si parla\r\n\
    Ci si racconta tante storie tante ma\r\n\
    Un brivido mi fa tremar\r\n\
    \r\n\
    Vedi cico \xC3\xA8 bello il tuo Messico (Messico bello Messico)\r\n\
    Ma ci son posti magici in Italy (Italy solo in Italy)\r\n\
    Dove si incontrano amici\r\n\
    E le ragazze ti regalano baci complici\r\n\
    Ed ora \xC3\xA8 i tempo di ritornare\r\n\
    \r\n\
    Rit. Ci ritroveremo ancora a crescere \r\n\
    Stupiti ed imbarazzati anche a sorridere \r\n\
    Perch\xC3\xA9 qui (qui) si gioca ancora\r\n\
    Qui (Qui) si canter\xC3\xA0\r\n\
    Qui (Qui)si gioca ancora\r\n\
    Qui (Qui)si canter\xC3\xA0\r\n\
    E anche se c\xE2\x80\x99\xC3\xA8 poca luce\r\n\
    Ascolteremo quello che si dice dentro ad un bar \r\n\
    Noi che brindiamo alla libert\xC3\xA0\r\n\
    \r\n\
    Cico mi guarda e dice cos\xC3\xAC (Cico Cico dic\xC3\xA8 cos\xC3\xAC)\r\n\
    Io nn sono mai stato in italy (Italy Mai in Italy)\r\n\
    E se tu vuoi tornare\r\n\
    Io son curioso di vedere portami con te\r\n\
    E sar\xC3\xB2 anch\xE2\x80\x99io uno di voi\r\n\
    \r\n\
    Rit.\r\n\
    \r\n"
