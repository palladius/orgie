  Corpo: "Quando tu mi dicesti sono stanca\r\n\
    Facciamo festa  olla vol perch\xC3\xA8\r\n\
    Che 'un turna nei discorsi e sar\xC3\xB2 franca\r\n\
    C'\xC3\xA8 un altro che mi garba pi\xC3\xB9 di te\r\n\
    \r\n\
    Cos\xC3\xAC tu ti lasciasti e me tu ti scordasti\r\n\
    Bambina tanto amata su quella cantolata\r\n\
    \r\n\
    'N riva all'Arno andai co' mi dolore \r\n\
    Ma la  pace 'n trovai pe' 'l mi 'ore\r\n\
    E dissi allor di botto \"Mi butter\xC3\xB2 di sotto\" \r\n\
    Ma l'Arno l'era in secca o bimba mia \r\n\
    E quella vorta presi e venni via.\r\n\
    \r\n\
    Ma m'era riservato ancor soffrire \r\n\
    Credetti perfin di perdere giudizio\r\n\
    Quando da casa tua e veddi uscire\r\n\
    Un bel mattino un lieto sposalizio\r\n\
    \r\n\
    Cos\xC3\xAC tu ti sposasti di me tu ti scordasti\r\n\
    Da qui dolore pazzo e dissi \"Ora m'ammazzo\"\r\n\
    \r\n\
    'N riva all'Arno andai sulla spalletta \r\n\
    Ma la sopra montai e 'ppe disdetta\r\n\
    Siccome 'un so notare e vorsi in gi\xC3\xB9 guardare  \r\n\
    Ma l'Arno l'era in piena o mia fanciulla \r\n\
    E quella volta 'un ne feci di nulla\r\n\
    \r\n\
    Tolto dal mi' dolor guarito e fui\r\n\
    Io ho visto il tu' marito angelo mio\r\n\
    E dissi che se 'un ti sposava lui\r\n\
    Ne le su' 'ondizioni e c'ero io\r\n\
    \r\n\
    L'\xC3\xA8 secco e allampalato e tutto sgangherato\r\n\
    Non l'ha pi\xC3\xB9 scarpe in piede l'\xC3\xA8 becco e 'un se lo avvede\r\n\
    \r\n\
    Sull Arno a sospirare ora va lui\r\n\
    Se si voll' affogare...'azzi sui\r\n\
    Intanto dal Lungoarno e rido e guardo l'Arno\r\n\
    E se mi ridovessi innamorare\r\n\
    Mi importa un fischio adesso 'e so notare!!"
