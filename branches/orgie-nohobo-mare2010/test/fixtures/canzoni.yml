  Corpo: "{si- la}\r\n\
    Raggio che si riflette sui vetri colorati\r\n\
    {mi mi- si- la re la si-}\r\n\
    Sfuggendo ai serramenti del portone\r\n\
    {si- la}\r\n\
    Mentre la schiuma densa si appiccica al boccale\r\n\
    {mi mi- si-}\r\n\
    Sul fondo del banco del salone\r\n\
    {mi- la re la si-}\r\n\
    Sguardo dell\xE2\x80\x99oste trucido, sguardo perfido e letale\r\n\
    {mi- la re fa#}\r\n\
    Appoggiato con la pancia sul bancone\r\n\
    {mi- la re la si-}\r\n\
    Madamigella impavida, occhio molto truccato\r\n\
    {mi- la fa#- fa# si-}\r\n\
    Sbucata chiss\xC3\xA0 quando, chiss\xC3\xA0 co___ome.\r\n\
    {sol la fa#- si-}\r\n\
    Dimmi che stiam facendo insieme a questa gente\r\n\
    {sol la fa#}\r\n\
    Dimmi che sta accadendo di cosi travolgente\r\n\
    {sol la re la si-}\r\n\
    Dimmi cosa stiamo aspettando insieme a questa gente\r\n\
    {mi- la fa#- fa# si-}\r\n\
    Tu che mi stai violentando con i tuoi probabilmente\r\n\
    \r\n\
    \r\n\
    Tutto il vino \xC3\xA8 finito prima che l\xE2\x80\x99oste chiuda\r\n\
    Ed io che mi alzo, astuto, prima di aver pagato\r\n\
    L\xE2\x80\x99abbraccio ad un vecchio amico, dentro il suo cuore ottuso\r\n\
    Evita lo sguardo altero dei conti del passato\r\n\
    \r\n\
    Antico e felice rito, modesto e triste uso\r\n\
    Ma \xC3\xA8 in questo modo amico che io ti ho ritrovato\r\n\
    Creando il proprio mito; \xC3\xA8 cosi che sono fuso\r\n\
    Ma \xC3\xA8 in questo modo amico che io ti ho ritrovato\r\n\
    \r\n\
    Dimmi che stiam facendo insieme a questa gente\r\n\
    Dimmi che sta accadendo di cos\xC3\xAC travolgente\r\n\
    Dimmi cosa stiamo aspettando insieme a questa gente\r\n\
