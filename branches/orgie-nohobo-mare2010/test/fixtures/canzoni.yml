  Corpo: "{MI- LA- SI7 MI-}\r\n\
    I colori del giorno sono idrogeno e carbone,\r\n\
    {MI- DO7 SI7 MI-}\r\n\
    gli occhi quasi chiusi sopra l'acqua del mare;\r\n\
    {SOL DO SI7 MI-}\r\n\
    facciamo collezione di conchiglie e di sale,\r\n\
    {LA- MI- SI7}\r\n\
    perch\xC3\xA9 il tempo passa pi\xC3\xB9 piano senza pensare. \r\n\
    \r\n\
    Luca ha sempre avuto il brutto vizio di giudicare:\r\n\
    da Bambino mi diceva \"questo non lo devi fare\".\r\n\
    Ora parla pi\xC3\xB9 piano e cerca un amico pi\xC3\xB9 vero,\r\n\
    magari mezzo giallo e mezzo nero.\r\n\
    \r\n\
    {SOL DO}\r\n\
    Ma noi non resteremo immobili,\r\n\
    {LA- RE SI7}\r\n\
    perch\xC3\xA9 noi non siamo mica isole;\r\n\
    {SOL SI- LA- MI-}\r\n\
    forse \xC3\xA8 vero: siamo gli ultimi,\r\n\
    {LA- SI7 MI-}\r\n\
    fuori e dentro nelle favole.\r\n\
    \r\n\
    Alle tre del mattino ho visto Icaro volare\r\n\
    sopra bianche rive, in mezzo a nuvole scure:\r\n\
    perforava il silenzio in cerca di un altro sole,\r\n\
    perch\xC3\xA9 Icaro \xC3\xA8 leggero quanto vuole.\r\n\
    \r\n\
    Ma in queste notti fatte a fiori comuni\r\n\
    non \xC3\xA8 il momento di mettersi le ali;\r\n\
    in queste notti fatte di nuvole e gente\r\n\
    \xC3\xA8 tardi, ho sonno e poi non \xC3\xA8 importante...\r\n\
    \r\n\
    Ma noi non resteremo immobili,\r\n\
    perch\xC3\xA9 noi non siamo mica isole;\r\n\
    forse \xC3\xA8 vero: siamo gli ultimi,\r\n\
    fuori e dentro nelle favole.\r\n\
    \r\n\
    Chiamaci pure uomini:\r\n\
    nelle mani abbiamo un sogno gelido...\r\n\
    Forse \xC3\xA8 vero: siamo gli ultimi\r\n\
    che ogni giorno continuamo a viverlo...\r\n\
    che ogni giorno continuamo a viverlo...\r\n\
    che ogni giorno continuamo a viverlo.\r\n\
    \r\n\
    \r\n"
