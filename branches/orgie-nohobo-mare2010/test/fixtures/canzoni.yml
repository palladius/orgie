canzoni_074: 
  m_bSeria: "1"
  Data_creazione: 2004-11-28 13:57:21
  Corpo: "Farsalo, nano gibbuto,  \r\n\
    primo buffone del re  \r\n\
    sputi e pedate se un nobile ha troppo bevuto  \r\n\
    ridete ridete di me  \r\n\
    \r\n\
    Farsalo \xC3\xA8 un uomo a sonaglio,  \r\n\
    il giocattolo storpio del re  \r\n\
    son per i nobili solo una bestia al guinzaglio  \r\n\
    ridete ridete di me.  \r\n\
    \r\n\
    Ma tu nobile ignori e tu non sai cortigiano  \r\n\
    che il tuo vero sire \xC3\xA8 proprio Farsalo il nano  \r\n\
    a quel fantoccio che siede sul trono  \r\n\
    lui tutte le notti un filtro propina  \r\n\
    \r\n\
    Il re resta inebriato e io l\xC3\xAC a comandare  \r\n\
    quel che domani gli piacer\xC3\xA0 fare  \r\n\
    il re crede di avere il regno in sua mano  \r\n\
    ma esegue soltanto il volere del nano.  \r\n\
    \r\n\
    E il nano assapora il potere  \r\n\
    che buon profumo che ha... ha... ha...  \r\n\
    ha... ha... ha... ha... ha... ha...  \r\n\
    \r\n\
    Ugo stalliere di vaglia,  \r\n\
    figlio del nano del re  \r\n\
    bado ai focosi destrieri spalando la paglia  \r\n\
    non vi curate di me \r\n \r\n\
    Puzzo di orina e letame  \r\n\
    i cavalli sono figli per me  \r\n\
    non mi odorate, se passo voltate le dame  \r\n\
    non vi curate di me  \r\n\
    \r\n\
    Ma suo padre non sa e certo ignora il sovrano  \r\n\
    che ha scoperto per caso il segreto del nano  \r\n\
    gli bastan due gocce nella coppa del vino  \r\n\
    per rendere succube il caro babbino  \r\n\
    \r\n\
    Di notte non puzzo di stalla e di prato  \r\n\
    mentre sussurro di affari di stato  \r\n\
    godetevi pure onori e potenza  \r\n\
    per\xC3\xB2 \xC3\xA8 uno stalliere che guida la danza  \r\n\
    \r\n\
    E Ugo assapora il potere  \r\n\
    che buon profumo che ha... ha... ha...  \r\n\
    ha... ha... ha... ha... ha... ha... \t\r\n\
    \r\n\
    Olga Ludmilla Regina,  \r\n\
    graziosa consorte del re  \r\n\
    passo i miei giorni tra nubi di cipria e di trina  \r\n\
    governare non \xC3\xA8 cosa per me  \r\n\
    \r\n\
    Consorte altezzoso e potente  \r\n\
    cosa diresti tu se  \r\n\
    scoprissi che mentre tu giochi coi tuoi reggimenti  \r\n\
    c'\xC3\xA8 uno stalliere con me?  \r\n\
    \r\n\
    Lei giacendo con Ugo in mezzo alla paglia  \r\n\
    ha scoperto il segreto del magico intruglio  \r\n\
    Ugo guida suo padre, suo padre il sovrano  \r\n\
    ma adesso le briglie son passate di mano  \r\n\
    \r\n\
    Mi basta una goccia dentro il liquore  \r\n\
    che Ugo ingordo trangugia dopo l'amore  \r\n\
    Lui crede di tesser da solo la trama  \r\n\
    ma esegue i disegni di una fragile dama.  \r\n\
    \r\n\
    E lei assapora il potere  \r\n\
    che buon profumo che ha... ha... ha...  \r\n\
    ha... ha... ha... ha... ha... ha...  \r\n\
    \r\n\
    Polipo ottavo sovrano,  \r\n\
    a ragione mi chiamano re  \r\n\
    posso arricchirti o impiccarti con un cenno di mano  \r\n\
    vieni prostrato da me. \r\n \r\n\
    Polipo uomo di scettro,  \r\n\
    nessuno pi\xC3\xB9 in alto di me  \r\n\
    vivo tra onori e paure, tra ori e sospetto  \r\n\
    Polipo ottavo \xC3\xA8 il tuo re.  \r\n\
    \r\n\
    Ma col complice stuolo dei suoi cortigiani  \r\n\
    sempre pronto a mandarli a far da cibo ai suoi cani  \r\n\
    lui sospetta sua moglie Ludmilla la pura  \r\n\
    di tesser nell'ombra l'oscena congiura  \r\n\
    \r\n\
    Cos\xC3\xAC con l'aiuto del fatale liquore  \r\n\
    le comanda ogni notte ci\xC3\xB2 che deve tramare  \r\n\
    qui chi complotta non complotta per s\xC3\xA8  \r\n\
    fa sempre il mio gioco, il gioco del re.  \r\n\
    \r\n\
    Cos\xC3\xAC si mantiene il potere  \r\n\
    che buon profumo che ha... ha... ha...  \r\n\
    ha... ha... ha... ha... ha... ha... \r\n"
  Autore: "null"
  ID_canzone: "7100024"
  Note: "null"
  titolo: Orgia del Potere (Farsalo)
