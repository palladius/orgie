canzoni_334: 
  m_bSeria: "1"
  Data_creazione: 2005-04-23 16:16:50
  Corpo: "Nel continente padano,\r\n\
    (paraponzi, ponzi, Po)\r\n\
    alle falde del delta del Po,\r\n\
    (paraponzi, ponzi, Po)\r\n\
    E ci sta un popolo di stronzi\r\n\
    che son tutti culi rotti:\r\n\
    son chiamati rovigotti, rovigotti, rovig\xC3\xB2oo... \r\n \r\n\
    Siam rovigotti, siam rovigotti,\r\n\
    portiamo gran sfiga;\r\n\
    siam grindolotti, siam grindolotti,\r\n\
    con noi non ci si intriga, \r\n\
    Noi siamo quelli che al sabato sera\r\n\
    veniamo a Ferrara per farci una vera\r\n\
    noi siam rovigotti.  \r\n\
    \r\n\
    Alle mignotte sborriamo negli occhi\r\n\
    ed ai finocchi lo mettiamo negli orecchi,\r\n\
    se non credete venite quaggi\xC3\xB9,\r\n\
    venite, venite quaggi\xC3\xB9-u-u-u...\r\n\
    \r\n\
    In corso Isonzo, in corso Isonzo\r\n\
    passiamo la notte,\r\n\
    per sgabanarci, per sgabanarci,\r\n\
    schifose mignotte; \r\n\
    le carichiamo sulla Prinz verde\r\n\
    siamo brutti come le merde\r\n\
    siam rovigotti!\r\n  \r\n\
    Io per guidare mi tengo il cappello,\r\n\
    e son convinto di essere il pi\xC3\xB9 bello, \r\n\
    l'anonimato mi fa conservar\r\n\
    quando pelo io vado a comprar...  \r\n    Le nostre vetture, le nostre vetture,\r\n\
    han mille cazzate\r\n\
    che noi crediamo, che noi crediamo,\r\n\
    sian grosse figate.  \r\n\
    E anche se avessi un intero autob\xC3\xB9sse\r\n\
    lo coprirei di arancio peluche\r\n\
    siam rovigotti!  \r\n\
    Agli incroci non diam precedenza,\r\n\
    e dei semafori possiamo fare senza\r\n\
    se non credete venite quaggi\xC3\xB9,\r\n\
    venite, venite quaggi\xC3\xB9-u-u-u."
