  Corpo: "S A S S O F A X\r\n\
    \r\n\
    AT:\t\tROMA ~ PALAZZO DELL\xE2\x80\x99 IMPERATORE\r\n\
    DA:\t\tCELTIA ~ GALLIA\r\n\
    \r\n\
