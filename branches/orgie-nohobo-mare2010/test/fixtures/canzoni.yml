    un goliarda solingo ed errante,\r\n\
    l\xE2\x80\x99animale pi\xC3\xB9 fiero incontr\xC3\xB2.\r\n\
    Tra le fiamme forgiato in eterno,\r\n\
    del sole lui porta il color,\r\n\
    ha scolpito in fondo al suo cuore\r\n\
    la virt\xC3\xB9 eterna dell\xE2\x80\x99onor...\r\n\
    \r\n\
    Salamandre, Salamandre,\r\n\
    che non abbia mai fine per noi.\r\n\
    Salamandre, Salamandre,\r\n\
    che non abbia mai fine per noi.\r\n\
    \r\n\
