  Corpo: "SCUSA, NON RICORDO CHE NOME MI HAI DETTO                                   {SOL            DO}\r\n\
    MA SON SICURO DI AVERTI GIA\xE2\x80\x99 VISTO                                                {SOL}\r\n\
    FORSE ERAVAMO IN UN\xE2\x80\x99ALTRA CITTA\xE2\x80\x99                                               {LAM            SIM}\r\n\
    CAMMINAVO, SOTTO UN CIELO DI NUVOLE CHIARE                     {SOL            DO}\r\n\
    QUANDO A UN TRATTO HO SENTITO SUONARE                             {SOL}\r\n\
    UNA MUSICA CHE NON SCORDO PIU\xE2\x80\x99                                                    {LAM            SIM}\r\n\
    E ANCORA TI RICORDERAI I SUOI OCCHI                                               {DO            SOL}\r\n\
    CHE NON AVEVANO PADRONE                                                                 {DO             RE7}\r\n\
    \r\n\
    E TARANTELLE E VINO, E CANZONI E FUMO                                    {DO             RE7            SOL}\r\n\
    QUALCUNO DI SICURO LO RICONOSCERAI                                         {DO            RE7            SOL}\r\n\
    E TARANTELLE E VINO, I SOGNI SCENDONO DAL CIELO               {DO            RE7            SOL}\r\n\
    SE ERI UNA REGINA IO NON L\xE2\x80\x99HO SCOPERTO MAI.               {DO             RE7            SOL}\r\n\
    \r\n\
    PAZZI, CHITARRISTI E VAGABONDI\r\n\
    ACCECATI DA UNA LUCE STELLARE\r\n\
    CHE ILLUMINA LA NOTTE\r\n\
    SONO SOLO UN ACROBATA CHE GIOCA COL VENTO\r\n\
    IN UNA PIAZZA PIENA DI GENTE\r\n\
    CAMMINO SOPRA UN FILO FATTO DI NIENTE\r\n\
    \r\n\
    ANCORA TI RICORDERAI I SUOI OCCHI\r\n\
    CHE NON AVEVANO PADRONE\r\n \r\n\
    RIT.\r\n \r\n\
    E\xE2\x80\x99 NOTTE, SEMBRA UN GIOCO GUARDARSI NEGLI OCCHI\r\n\
    CI VUOLE POCO A VEDERSI DIVERSI\r\n\
    COME QUELLI DI QUALCHE ANNO FA\r\n\
    E SENTIRSI COME FOSSIMO ZINGARI STRANI\r\n\
    COME SE NON CI FOSSE DOMANI\r\n\
    DENTRO A UN TRENO CHE NON FERMA QUI\r\n\
    E ANCORA TI RICORDERAI I SUOI OCCHI\r\n\
    CHE NON AVEVANO PADRONE\r\n\
    \r\n\
    RIT.\r\n\
