  Corpo: "1\xC2\xB0 voce:\r\n\
    Meri Meri \r\n\
    L\xE2\x80\x99ha data via! E l\xE2\x80\x99hanno vista piangere!\r\n\
    Lo prendeva nel buio di una ferrovi-i\xC3\xA0 !\r\n\
    Notti di sirene in quella periferia,sanno che la dava!\r\n\
    Si dice che dei nostri \xE2\x80\x9Cmembri\xE2\x80\x9D abbia un po\xE2\x80\x99 nostalgia,\r\n\
    ma se la sono fatta tutti a Meri! \r\n\
    Meri,Meri,Meri,Meri ! \r\n\
    \r\n\
    2\xC2\xB0 voce:\r\n\
    Ora l\xE2\x80\x99ha data Meri e cede le sue sensazioni\r\n\
    In ogni pagina del diario che ora ha tra le mani\r\n\
    La madre che sa tutto e sta zitta ora la sua fi*a porta i segni di \r\n\
    Una nuova \xE2\x80\x9Cinfilata\xE2\x80\x9De l\xE2\x80\x99ho vista batter per i marciapiedi senza \r\n\
    Una meta\xE2\x80\xA6 \r\n\
    1\xC2\xB0 voce:\r\n\
    Dicono che Meri l\xE2\x80\x99ha data via! Trombava nel buio di una Ferrovi\xC3\xA0!\r\n\
    Sanno che si prostituiva!\r\n\
    Notti di sirene in quella periferia ,(ma nessuna paura perch\xC3\xA9 si faceva \r\n\
    Anche i poliziotti)si dice che dei nostri c***i abbia un po nostalgia, \r\n\
    Ma lei si prostituisce Meri! Che prende i c***i dei neri , e prendendo \r\n\
    I c***i pi\xC3\xB9 neri sul diario segreto scrivevi di quella bestia che ha il tuo pap\xC3\xA0\r\n\
    Uauuh! Meri che prendevi i c***i dai neri e sul diario segreto scrivevi \r\n\
    Di quella bestia che ha il tuo pap\xC3\xA0-\xC3\xA0 ! Meri!\r\n\
    \r\n"
