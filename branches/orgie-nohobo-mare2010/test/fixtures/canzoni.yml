  Corpo: "Sull'aria di \"Non voglio mica la luna\"\r\n\
    \r\n\
    1- Vorrei una mano gigante {SOL RE/FA#}\r\n\
    Con la quale posso farmene tante {LAm MIm} naaaa {RE}\r\n\
