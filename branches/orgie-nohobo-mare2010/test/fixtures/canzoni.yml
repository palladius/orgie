  titolo: Chernobyl
  tipo: 
  id_login: "62"
canzoni_314: 
  m_bSeria: "1"
  Data_creazione: 2005-03-29 12:41:32
  Corpo: |
    Non mi tira piu' l'uccello,
    non ho voglia di chiavar,
    e' passato il tempo bello,
    or mi sembra di sognar,
    e miei poveri coglioni,
    che l'usura dissecco',
    non stan piu' nei pantaloni,
    ed il ciel mi castigo',
    fosti tu l'ultima fica,
    che il mio pene delibo',
    fosti l'ultima fatica.
    Eri sdraiata la sopra il divano,
    e mi suggevi golosa il banano,
    e succhia e strizza, rosicchia e irrora
    tu mi dicevi : "Dammelo ancora !"
    Ma nell'attimo piu' bello,
    te lo misi dentro il cul,
    e appiciandomi il fornello,
    io bandava come un mul,
    nel momento del godere,
    non ricordo come fu,
    fuoriusci' dal tuo sedere
    una vampa di grisu',
    mi sentii bruciare il pene,
    si afflosciarono i coglion,
    e su tutto scese un velo,
    di tristezza e compassion,
    Ora deserto e solingo e' il divano,
    piu' non mi succhi golosa il banano,
    piu' non mi tira sto povero uccello,
    come era bello, come era bello.
    
     
    

