  Corpo: "{Si-                                              Sol}\r\n\
    Addio mio dolce amore, mia fedele compagna di giovent\xC3\xB9\r\n\
    {Si-                                                  Sol}\r\n\
    Io ti lascio ai nostri giochi e vado via verso nuove vite.\r\n\
    {Si-                                                            Sol}\r\n\
    Ora mia cara sono un uomo, con tutto quello che si pu\xC3\xB2 volere\r\n\
    {Si-                                                Sol                                               Si- Do}\r\n\
    Una donna, una casa, un cane e cose che non avrei voluto avere\r\n\
    {Do             Sol}\r\n\
    Ma tu lo sai che i pazzi non stanno in cielo\r\n\
    {Do                     Sol}\r\n\
    E i nostri giochi sono da bambini\r\n\
    {Do           Sol}\r\n\
    Io vivo qui e ti lascio andare\r\n\
    {Do                Sol}\r\n\
    Insieme a ci\xC3\xB2 che ho di caro.\r\n\
    {Si-                                                  Sol}\r\n\
    Passano giorni, mesi e anni e tu ancora mi osservi da l\xC3\xAC\r\n\
    {Si-                                         Do}\r\n\
    Da l\xC3\xAC dove ti ho lasciata immutata e ancora giovane\r\n\
    {Sol                                         Do                               Re}\r\n\
    Tu mi tenti mio verde amore con sottili poesie\r\n\
    \r\n\
    {Re                                               Sol}\r\n\
    Torna a giocare con me, lascia andare tutto ci\xC3\xB2 che non ti appartiene\r\n\
    {Re                                               Sol}\r\n\
    C\xE2\x80\x99\xC3\xA8 ancora posto per noi tra le sette stelle nel cielo\r\n\
    {Do                               Sol}\r\n\
    E tra gli amici quelli che conoscono il vero\r\n\
    {Re                                                     Sol}\r\n\
    E canteremo ancora insieme fino a vedere luce del mattino\r\n\
    {Re                                             Sol}\r\n\
    Fino a sentire il coro di una siepe che si sta svegliando ancora\r\n\
    {Re                                                           Sol}\r\n\
    E torneremo a girare il mondo e come zingari senza meta\r\n\
    {Do                                                   Sol}\r\n\
    E ci addormenteremo accanto come fu.\r\n\
    \r\n\
    {Si-                                               Sol}\r\n\
    E allora s\xC3\xAC torno bambino e con te a giocare agli uomini\r\n\
    {Si-                                             Do                                Sol}\r\n\
    E di nuovo ti calzer\xC3\xB2 e come trofeo di mille avventure\r\n\
    {Re                           Sol}\r\n\
    Ti porter\xC3\xB2\xE2\x80\xA6..mio dolce amore.\r\n\
    {Si-                                           Do                                 Sol}\r\n\
    E di nuovo ti calzer\xC3\xB2 come trofeo di pochi amici veri\r\n\
    {Re                            Do             Sol}\r\n\
    Ti porter\xC3\xB2\xE2\x80\xA6..mio dolce amore.\r\n\
    \r\n"
