  Corpo: "Un sacco di risate sulle spalle\r\n\
    un calcio dato in faccia alla ragione\r\n\
    le briciole di un gioco di parole\r\n\
    la mente nella trappola del sogno\r\n\
    \r\n\
    e tu figlia di servi e di padroni\r\n\
    di uccelli di montagne e di radici\r\n\
    tu barbara tu nobile tu amore\r\n\
    sottile mito eterno della vita\r\n\
    \r\n\
    Ti rivedrei non so come\r\n\
    ti rivedrei non so come\r\n\
    ma dietro agli occhi dentro al tempo sei\r\n\
    ti rivedrei non so come\r\n\
    ti rivedrei non so come\r\n\
    ti rivedrei cos\xC3\xAC t'invento\r\n\
    ti rivedrei respiro umano\r\n\
    ti rivedrei farfalla al vento\r\n\
    ti rivedrei vestita d'acqua\r\n\
    ti rivedrei vestita d'acqua\r\n\
    \r\n\
    Leggeri lungo l'argine del tempo\r\n\
    nell'ultima parabola del giorno\r\n\
    sfiorando appena i suoni della notte\r\n\
    volevi ed io volevo andare avanti\r\n\
    \r\n\
    di corsa alla sorgente dell'idea\r\n\
    madrina di perenne giovinezza\r\n\
    un sorso un altro ed eravamo dei\r\n\
    ma il marmo ti venava la bellezza\r\n\
    \r\n\
    Ti rivedrei...\r\n\
    \r\n\
    Adesso qui spogliati di leggenda\r\n\
    di falsi miti elettrici e di nomi\r\n\
    adesso qui privati di coscienza\r\n\
    nell'ultimo possibile cammino\r\n\
    \r\n\
    tua madre maga aveva fra le dita\r\n\
    il filtro ancora caldo della vita\r\n\
    col polline volava sulla strada\r\n\
    moriva nelle gocce di rugiada\r\n\
    \r\n\
    Ti rivedrei...\r\n\
    \r\n\
    (1969)\r\n"
