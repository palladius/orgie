  Corpo: "Re                      \r\n\
    Il sole sorge, ecco il nuovo giorno\r\n                              Si-\r\n\
    Come un occhio di luce su questo vecchio mondo \r\n                Sol\r\n\
    Il mare si sveglia e viene lento verso la costa\r\n                  La\r\n\
    Il vento accarezza dolce l'onda sulla cresta\r\n\
    \r\n\
    Voglio rubare i segreti del cielo \r\n\
    Diventare un maestro nell'arte del volo \r\n\
    Volteggiare leggero come un aquilone,\r\n\
    Veloce come un falco, bello come un airone\r\n\
    \r\n            Fa#-                                               Si-\r\n\
    E non m'importa se gli altri dicono che non lo devo fare\r\n\
    Che sono solo un gabbiano e da gabbiano devo ragionare\r\n\
    \r\n                    Sol                               La\r\n\
    Ma io voglio volare........libero io devo andare.....\r\n\
    \r\n                    Sol          Re\r\n               Partir\xC3\xB2, cercher\xC3\xB2 la mia isola \r\n                    Sol          Re   \r\n               Voler\xC3\xB2, riposer\xC3\xB2 sopra una nuvola\r\n                    Sol          Re\r\n               E vedr\xC3\xB2 dove nascono i colori\r\n                            La\r\n               dove il cielo si fonde col mare\r\n                                                     La7                        Re                       \r\n               dove non servono ali per volare ....io andr\xC3\xB2. \r\n\
    \r\n\
    Restar sospeso su un filo di vento\r\n\
    Poi gi\xC3\xB9 in picchiata veloce come il lampo\r\n\
    Sfiorare l'oceano, le sue onde d'argento\r\n\
    Guardare sotto il suo velo e poi tuffarsi dentro\r\n\
    \r\n\
    Cos\xC3\xAC ho varcato la soglia del pensiero\r\n\
    Oltrepassato il confine della vita\r\n\
    Ed ora vivo in una nuova dimensione\r\n\
    Dove tanti come me bruciano di passione\r\n\
    \r\n\
    Loro dicono che sono pronto e che non serve pi\xC3\xB9 cercare\r\n\
    Le risposte di cui ho bisogno si trovano in fondo al cuore\r\n\
    \r\n\
    Perch\xC3\xA9 c'\xC3\xA8 amore.........ed io posso amare......\r\n\
    \r\n               Partir\xC3\xB2...... \r\n\
    \r\n\
    \r\n\
    Giovani gabbiani sfrecciano nel cielo\r\n\
    Un giro attorno ad una stella e poi gi\xC3\xB9 verso il suolo\r\n\
    Planando leggeri sulla spiaggia dorata\r\n\
    Un'altra volta \xC3\xA8 stata una magnifica giornata\r\n\
    \r\n\
    Le mie parole sono raffiche di vento\r\n\
    Spazzano via l'ombra a far posto al sentimento\r\n\
    Un dolce profumo colora la sera\r\n\
    La gioia di vivere un'intensa primavera\r\n\
    \r\n\
    Ormai c'\xC3\xA8 luce nei miei pensieri, ora in me tutto \xC3\xA8 chiaro\r\n\
    Il mio corpo senza pi\xC3\xB9 forma splende alto nel cielo\r\n\
    \r\n Ora devo andare..........libero io devo volare........\r\n\
    \r\n               Partir\xC3\xB2......"
