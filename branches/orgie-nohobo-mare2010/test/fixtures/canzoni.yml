canzoni_268: 
  m_bSeria: "1"
  Data_creazione: 2004-05-27 18:22:34
  Corpo: "1- S'infilavano stivali grandi da uomo {SOL DO}\r\n\
    per accalappiare le stelle; {DO SOL}\r\n\
    s'affilavano le spade, figlie del tuono, {SOL DO}\r\n\
    per vendere cara la pelle: {DO SOL}\r\n\
    impazienti eroi, {RE}\r\n\
    terribili divinit\xC3\xA0, {SOL}\r\n\
    forti quanto noi{RE}\r\n\
    nessuno per l'eternit\xC3\xA0. {SOL}\r\n\
    \r\n\
    RIT.: E fughe di cavalli, {RE}\r\n\
    stormi d'angeli \r\n\
    e occhi da sgranare {SOL}\r\n\
    e siamo l\xC3\xAC da anni, cos\xC3\xAC tanti {RE}\r\n\
    che si soffre a ritornare. {SOL}\r\n\
    Quando saremo bimbi, ti ricordi,  {DO}\r\n\
    dammi il tempo di arrivare,  {SOL}\r\n\
    quando saremo bimbi, ti ricordi...  {DO}\r\n\
    \r\n\
    2- S'intrecciavano stagioni, muscoli e cuore,  \r\n\
    le feste di Calendimaggio,  \r\n\
    esultavano le prime storie d'amore,  \r\n\
    di sogni, pudori e coraggio.  \r\n\
    Quando tu lo vuoi ti dono la verginit\xC3\xA0, \r\n\
    da quel giorno in poi nessuno ci divider\xC3\xA0.\r\n\
    \r\n\
    RIT.: E profumava donna, fiore e rondine \r\n\
    bruna al maestrale, \r\n\
    e mi diceva grande come il mondo \r\n\
    oltre il bene e il male. \r\n\
    Quando saremo bimbi, ti ricordi, \r\n\
    dammi il tempo di arrivare, \r\n\
    quando saremo bimbi, ti ricordi...\r\n\
    \r\n\
    3- Ti ricordi che si giocher\xC3\xA0 per davvero\r\n\
    di uomini, nani e giganti, \r\n\
    ti ricordi se capiter\xC3\xA0 che non c'ero\r\n\
    che i cieli sono tutti distanti: \r\n\
    non mi cibo mai di briciole di verit\xC3\xA0, \r\n\
    noi restiamo noi, terribili divinit\xC3\xA0. \r\n\
    \r\n\
    RIT.: E seminava l'ombra di un pulviscolo\r\n\
    d'oro giallosole \r\n\
    e la volevo grande come l'urlo \r\n\
    che dal cielo squarcia il mare. \r\n\
    Quando saremo bimbi, ti ricordi,  \r\n\
    dammi il tempo di arrivare,  \r\n\
    quando saremo bimbi, ti ricordi...  \r\n\
    \r\n\
    4- Fu cos\xC3\xAC che non ne siamo usciti pi\xC3\xB9 fuori \r\n\
    nemmeno per pochi momenti, \r\n\
    siamo adulti e fortunatamente nei cuori \r\n\
    non siamo cresciuti per niente: \r\n\
    prigionieri o no \xC3\xA8 timida la realt\xC3\xA0, \r\n\
    come fantasia saremo quello che sar\xC3\xA0. \r\n\
    \r\n\
    RIT.: E muoio come il giorno, nel crepuscolo, \r\n\
    invece di dormire \r\n\
    e mi ritrovo sveglio con il giorno, \r\n\
    quello nuovo da scoprire. \r\n\
    Quando saremo bimbi, ti ricordi,\r\n\
    dammi il tempo di arrivare, \r\n\
    quando saremo bimbi, ti ricordi o no?\r\n"
