  Corpo: "Onzeme el bunigolo con l'olio del tricheco, \r\n\
    magname le caccole dell'intestino cieco; \r\n\
    poi con i resti de un pompin imbottisseme un panin, \r\n\
    magna merda, canta e va in casin:  \r\n\
    l\xC3\xA0 troverai tua madre (oh yeah) \r\n\
    che fa la puttana (oh yeah) \r\n\
    e casso in culo, casso in man \r\n\
    se guadagna onestamente el pan.  \r\n\
    Strenzeme i cojoni fra i batenti de una porta, \r\n\
    sbarame una sega con la mano de una morta; \r\n\
    poi con i resti di un bid\xC3\xA8 fatti un caldo consomm\xC3\xA8: \r\n\
    bevilo per me.  \r\n\
    Succhia il buon foruncolo scoppiato al beduino, \r\n\
    bacia l'orinale di una troia da casino; \r\n\
    poi uno sporco, vecchio Hatu inghiottisci e manda gi\xC3\xB9, \r\n\
    magna merda, canta e vaffancul.  \r\n\
    Scivola col culo sulla lama di un rasoio, \r\n\
    affettati i coglioni e poi servili in vassoio; \r\n\
    poi con i resti di un pital incartati in un giornal \r\n\
    fatti un baccanal.  \r\n"
