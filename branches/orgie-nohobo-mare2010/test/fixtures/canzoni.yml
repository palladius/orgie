  Corpo: "Mentre ch\xE2\x80\x99i setavu an s\xE2\x80\x99el bord d\xE2\x80\x99al tani\r\n\
    T t\xE2\x80\x99tenie sciassa e mi con el mani\r\n\
    Fricugnava poch o tant to mudand e to collant\r\n\
    Peui andavo anca pi n\xE2\x80\x99giu, tra la bergna, tra la bergna\r\n\
    E \xE2\x80\x98l to cul, lalla, col cul lalla to cul lala\xE2\x80\x99\r\n\
    \r\n\
    Giu le braje i l\xE2\x80\x99ai cala\xE2\x80\x99, i cotin i t\xE2\x80\x99l\xE2\x80\x99ass aussa\xE2\x80\x99\r\n\
    Peui doi tett rotond e sodi son saota\xE2\x80\x99 fora d\xE2\x80\x99al body\r\n\
    L\xE2\x80\x99ei gavame la camisa, ti squatavi la barbisa\r\n\
    M\xE2\x80\x99infilavo n\xE2\x80\x99bel guldun... L\xE2\x80\x99e rivaje l\xE2\x80\x99e rivaje l\xE2\x80\x99alluviun\r\n\
    Lala, luviun, lala, luviun lala\xE2\x80\x99\r\n\
    \r\n\
    L\xE2\x80\x99onda a l\xE2\x80\x99a portami come doi fustel\r\n\
    Ti tuta pata-na mi fora l\xE2\x80\x99usel\r\n\
    Galegiavo come natte, la corent fasia sbatte\r\n\
    Che bide\xE2\x80\x99 ch\xE2\x80\x99ij soma fa, senssa gnanca senssa gnanca avej ciola\xE2\x80\x99\r\n\
    Lala, ciola lala, ciola\xE2\x80\x99 lala.\r\n\
    \r\n\
    Coj cojon fasio timon, con  la bergna aossavo vela\r\n\
    A m\xE2\x80\x99a smijava d\xE2\x80\x99esse skipper manovrand la me candela\r\n\
    Fin a pontelagoscuro l\xE2\x80\x99e restame ancora duro\r\n\
    Con le tette a salvagent a venessia soma andait ant in moment\r\n\
    Lala, moment, lala, moment lala...\r\n\
    \r\n\
    Se quaidun a veul mostre\xE2\x80\x99, cari amis da st\xE2\x80\x99aventura\r\n\
    Come s\xE2\x80\x99possa mai scampe\xE2\x80\x99 da la rabia d\xE2\x80\x99la natura\r\n\
    A l\xE2\x80\x99e mej che con na fija s\xE2\x80\x99a strafogna e peuj s\xE2\x80\x99a pija\r\n\
    Mej savej dovre\xE2\x80\x99 ij cojon che fidesse d\xE2\x80\x99la civile protession,\r\n\
    Lala, tenssion, lala, tension lala.\r\n"
