    I miei muri sono tutti imbiancati \r\n\
    \r\n\
    VAR- Io vorrei \r\n\
    Masturbarmi per i fatti miei \r\n\
    Io dovrei \r\n\
    Riposarmi per\xC3\xB2 \r\n\
    Potrei farne una in pi\xC3\xB9 \r\n\
    \r\n\
    RIT.: Non voglio mica la mona \r\n\
    Chiedo soltanto di andare \r\n\
    Di andare al cesso a spararmi le seghe \r\n\
    Ma senza di te \r\n\
    Non voglio mica la mona \r\n\
    Voglio soltanto un momento \r\n\
    Per rinfrescarmi le palle mi siedo qui sopra il bid\xC3\xA8 \r\n\
    E con l'acqua fredda mi scordo di te \r\n\
    \r\n\
    Non voglio mica la mo-na ma \r\n\
    Voglio solo un po' fare \r\n\
    L'amore da me \r\n\
    Non voglio mica la mo-na ma \r\n\
    Voglio entrare nel guinnes \r\n\
    Del gran fai da te \r\n\
    \r\n\
    Non voglio mica la mona \r\n\
    Chiedo soltanto di andare \r\n\
    Di andare al cesso a spararmi le seghe \r\n\
    Ma senza di te \r\n\
    \r\n\
    Non voglio mica la mona \r\n\
    Ora ti spiego un momento \r\n\
    Tu me lo tiri, lo strizzi, lo strazzi ed ecco perch\xC3\xA9 \r\n\
    Io le seghe so farle assai meglio di te\r\n"
