    mille donne degne di te, ma non tutte quante,\r\n\
    cuore avvelenato da lei, sottile e intrigante\r\n\
    {do sol7}\r\n\
    la vita ti riserver\xC3\xA0 ancora tanti \xE2\x80\x9Cperch\xC3\xA9\xE2\x80\x9D, troppi per te\r\n\
    {fa la- sol}\r\n\
    che insegui un\xE2\x80\x99identit\xC3\xA0 di rispettabile giocosit\xC3\xA0\r\n\
    {do sol 7}\r\n\
    ma la vita ti sguinzaglier\xC3\xA0 addosso ancora tanti lacch\xC3\xA8, troppi per te,\r\n\
    {fa sol fa sol do do mi- la-}\r\n\
    e tu non li puoi evitar, un altro scontro dovrai affrontar\r\n\
    \r\n\
    onirico ce l\xE2\x80\x99hai con gli dei, eroe di Cervantes,\r\n\
    poi subito ti sciogli per lei, rapito e sognante\r\n\
    un bacio e una canzone perch\xC3\xA9 \xC3\xA8 una tra le tante,\r\n\
    la strada \xC3\xA8 ancora tutta per te, hai il cuor di vagante\r\n\
    \r\n\
    la vita ti riserver\xC3\xA0 ancora tanti \xE2\x80\x9Cperch\xC3\xA9\xE2\x80\x9D, troppi per te\r\n\
