  Corpo: "L\xC3\xA0 nel centro del Nord est c\xE2\x80\x99\xC3\xA8 una magica citt\xC3\xA0,\r\n\
    quasi tutti gli abitanti vanno all\xE2\x80\x99universit\xC3\xA0,\r\n\
    poi ce n\xE2\x80\x99\xC3\xA8 un gruppetto strano che si veste come me,\r\n\
    beve molto e studia poco, Giarda il suo nome \xC3\xA8\xE2\x80\xA6\r\n\
    \r\n\
    Rit1: Giarda, Giarda combina guai,\r\n       in tribunato di certo non vai,\r\n       se non per mettere gli atri nei guai, nei guai\xE2\x80\xA6\r\n       Giarda, Giarda combina guai,\r\n       su dai racconta quello che tu sai\r\n       sui goliardi di questa citt\xC3\xA0 (citt\xC3\xA0)!\r\n\
    \r\n\
    Ce n\xE2\x80\x99\xC3\xA8 uno grosso e rosso lui comanda la citt\xC3\xA0,\r\n\
    anche se \xC3\xA8 un democristiano poi in Giarda torner\xC3\xA0.\r\n\
    C\xE2\x80\x99\xC3\xA8 Quintale, ancor pi\xC3\xB9 grosso, che dottor chiamar si fa,\r\n\
    se quando scopa si impantana col trattor si aiuter\xC3\xA0\xE2\x80\xA6\r\n\
    \r\n\
    Rit2: Giarda, Giarda combina guai,\r\n       ma quante burle ancora farai,\r\n       un ordine di giullari tu sei, sei tu\xE2\x80\xA6\r\n       Giarda, Giarda combina guai,\r\n       su dai racconta quello che tu sai\r\n       sui goliardi di questa citt\xC3\xA0 (citt\xC3\xA0)!\r\n\
    \r\n\
    C\xE2\x80\x99\xC3\xA8 anche qualche traditore che abbandona la citt\xC3\xA0,\r\n\
    la sua laurea a testa bassa forse a Parma prender\xC3\xA0.\r\n\
    Ce n\xE2\x80\x99\xC3\xA8 una cicciotella sempre tesa ed incazzata,\r\n\
    il suo nome \xC3\xA8 assai invitante, ma vogliamo marmellata\xE2\x80\xA6\r\n\
    \r\n\
    (Rit1)\r\n\
    \r\n\
    Il Peronio un direttore ed una cameriera ha,\r\n\
    che zitti zitti di nascosto a pinciare se ne van,\r\n\
    e una Stella \xE2\x80\x9Cpiccolina\xE2\x80\x9D che veder sempre si fa,\r\n\
    anche al buio con Getullo generosa lei sar\xC3\xA0\xE2\x80\xA6\r\n\
    \r\n\
    (Rit2)\r\n\
    \r\n\
    Rucoletta al suo processo meritato il nome ha,\r\n\
    Coniglietta invece subito Uait Socs fatto se l\xE2\x80\x99ha!\r\n\
    E Frittoletta le giardine tutte quante insidier\xC3\xA0,\r\n\
    ma nessuna mai a lui annusare la far\xC3\xA0\xE2\x80\xA6\r\n\
    \r\n\
    (Rit1)\r\n\
    \r\n\
    L\xE2\x80\x99Artusi gli occhi dolci alla nostra Micia fa,\r\n\
    ma se troppo si avvicina pronta lei lo graffier\xC3\xA0.\r\n\
    La Giarda altre cose da narrare ancora sa,\r\n\
    per\xC3\xB2 in futuro ora noi a ber vogliamo andar\xE2\x80\xA6\r\n\
    \r\n\
    (Rit1 e Rit2).\r\n"
