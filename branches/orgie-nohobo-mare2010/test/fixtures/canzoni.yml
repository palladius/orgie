  Corpo: "{  DO                                                        FA                         DO  }\r\n\
    Aggiungi un posto al trogolo, che c'\xC3\xA8 un suino in pi\xC3\xB9:  \r\n  {                                                       RE                  SOL  }\r\n\
    \xC3\xA8 un tipo assai ridicolo, quel mona di Ges\xC3\xB9;  \r\n\
    {    DO                                  MI                  LAm  }\r\n\
    ti sparer\xC3\xA0 parabole, dir\xC3\xA0 di suo pap\xC3\xA0  \r\n {     FA                 DO             FA            DO  }\r\n\
    ma sono solo favole, la sai la verit\xC3\xA0:  \r\n  {      FA                          DO  }\r\n\
    col grugno e con le setole  \r\n    {   FA                                                             SOL   DO  }\r\n\
    dio porco, dio porco, dio porco... eccolo qua!  \r\n\
    \r\n\
    \r\n\
    Aggiungi un posto al Golgota e inchiodaci Ges\xC3\xB9,  \r\n\
    sforacchiagli le natiche con canne di bamb\xC3\xB9;  \r\n\
    poi prendi quattro apostoli e inchiodali lass\xC3\xB9,  \r\n\
    aggiungi un p\xC3\xB2 di mastice e un litro di gris\xC3\xB9,  \r\n\
    dai fuoco e per i secoli  \r\n\
    non romperan, non romperan, non romperan.... mai pi\xC3\xB9!  \r\n\
    \r\n\
    Poi prendi in mano il bischero e menalo su e gi\xC3\xB9:  \r\n\
    vedrai che anche il vescovo dir\xC3\xA0 porco Ges\xC3\xB9;  \r\n\
    e i preti se lo menano nel nome del signor,  \r\n\
    in orge si scatenano pensando al redentor  \r\n\
    e il popolo fanatico che grida  \r\n\
    dio porco, dio porco, dio porco... e culaton!"
