canzoni_077: 
  m_bSeria: "1"
  Data_creazione: 2003-07-31 21:54:25
  Corpo: "Ritorner\xC3\xB2, non ci son santi  \r\n\
    ritorner\xC3\xB2, ho un conto aperto con il cielo terreno  \r\n\
    tra il nero e il giallo, scelgo il giallo col nero,  \r\n\
    ritorner\xC3\xB2oooo....  \r\n\
    \r\n\
    Quando giravamo il mondo  \r\n\
    ci bastava un canto d'allegria  \r\n\
    ora latitiamo il mondo  \r\n\
    chi lo sa con quanta nostalgia.  \r\n  \r\n\
    Con lei, con lei  \r\n\
    riprenderemmo il mare  \r\n\
    con lei, con lei, con lei  \r\n\
    sarebbe bello andare.  \r\n  \r\n\
    Per chi non ha cantato almeno un coro  \r\n\
    per chi ci ha bestemmiato affari loro  \r\n\
    per non cadere a terra al primo vino  \r\n\
    per non pietire il bacio di nessuno.  \r\n\
    \r\n\
    Con lei, con lei  \r\n\
    riprenderemmo il mare  \r\n\
    con lei, con lei, con lei  \r\n\
    sarebbe bello andare.  \r\n\
    \r\n\
    Clerici Vagantes  \r\n\
    ci chiamavano una volta  \r\n\
    quando bussavamo  \r\n\
    e cantavamo ad ogni porta.\r\n\
    \r\n\
    Quando ridevamo il mondo  \r\n\
    ci moriva intorno Goliardia  \r\n\
    quando torneremo al mondo  \r\n\
    torneremo Davide e Golia.  \r\n\
    \r\n\
    Con lei, con lei  \r\n\
    riprenderemmo il mare  \r\n\
    con lei, con lei, con lei  \r\n\
    sarebbe bello andare.  \r\n\
    \r\n\
    Con lei che ti sa prendere per mano  \r\n\
    Con lei che ti fa perdere terreno  \r\n\
    Con lei che fa geniale l'idiozia  \r\n\
    Con lei ch'\xC3\xA8 Madre Vostra e Madre Mia.  \r\n\
    \r\n\
    Con lei, con lei  \r\n\
    riprenderemmo il mare  \r\n\
    con lei, con lei, con lei  \r\n\
    sarebbe bello andare.  \r\n\
    sarebbe bello anda...re  \r\n\
    riprenderemmo il ma...re  \r\n"
