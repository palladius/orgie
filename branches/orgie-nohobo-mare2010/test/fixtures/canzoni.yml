canzoni_286: 
  m_bSeria: "1"
  Data_creazione: 2004-09-16 21:44:00
  Corpo: "Nella Espa\xC3\xB1a c'\xC3\xA8 un torero\r\n\
    con el cazzo lungo e nero;\r\n\
    le ragazze di Siviglia\r\n\
    fanno a gara a chi lo piglia...  \r\n\
    \r\n\
    E allora prendimelo, sguarattaintingimelo,\r\n\
    scappellaimpugnamelo, fammi un pompin!\r\n\
    \r\n\
    La se\xC3\xB1ora Consuelo m'ha donato lo scuelo,\r\n\
    e per cinco pesetas le ho palpato las tetas...\r\n\
    era meglio una siega, fata con mucha passion:\r\n\
    sparambiavo el dinero, non prendevo lo scuelo,\r\n\
    e no gero un coion!  \r\n\
    \r\n\
    Per un pompino, per\xC3\xB2, solo per un pompino, per\xC3\xB2,\r\n\
    solo per un pompino, per\xC3\xB2, me lo potevi far...  \r\n\
    \r\n\
    La se\xC3\xB1ora Rodriguez m'ha donato la figuez,\r\n\
    e per poco dinero le ho sfondato il derrero...\r\n\
    era meglio una siega, fata con mucha passion:\r\n\
    sparambiavo el dinero, non prendevo lo scuelo,\r\n\
    e no gero un coion!  \r\n  \r\n\
    Per un pompino, per\xC3\xB2, solo per un pompino, per\xC3\xB2,\r\n\
    solo per un pompino, per\xC3\xB2, me lo potevi far...  \r\n\
    \r\n\
    Ahi mama, el torero de Pamplona\r\n\
    me vol palpar la mona, ma mi ghe digo no!\r\n\
    Ahi mama, el torero de Cambrette\r\n\
    me vol tocar le tete, ma mi ghe digo no!\r\n\
    Ahi mama, el torero de Siviglia\r\n\
    te vol ciavar la figlia, ma mi ghe digo no!  \r\n\
    \r\n\
    E allora prendimelo, sguarattaintingimelo,\r\n\
    scappellaimpugnamelo, fammi un pompin!  \r\n"
