  Corpo: "China su fronte\r\n\
    Si ses sezzidu pesa \r\n\
    Ch\xE2\x80\x99 est passende\r\n\
    Sa goliardia othieresa\r\n\
    Boh!! Boh!!\r\n\
    Imbreagusu che linna \r\n\
    Sa mezzus gioventude de saldigna\r\n\
    \r\n\
    \r\n\
    Semus istiga \r\n\
    de cudda antiga zente\r\n\
    ch\xE2\x80\x99at abbaldente\r\n\
    s\xE2\x80\x99iscaldaiat su coro\r\n\
    boh!! Boh!!\r\n\
    Es nostra oe s\xE2\x80\x99insigna\r\n\
    Pro su giogu e logudoro\r\n\
    E de saldigna.\r\n\
    \r\n\
    \r\n\
    Cun berritolu \r\n\
    Prenu de mustizzolu \r\n\
    sos othieresos \r\n\
    faghene baldoria\r\n\
    boh!! Boh!!\r\n\
    Faghimos un ispuntinu\r\n\
    Buffende a carradasa\r\n\
    Su inu\r\n\
    \r\n\
    \r\n\
    Venere bella \r\n\
    este  sa nostra dea\r\n\
    et giallo blu\r\n\
    colores s\xE2\x80\x99istendarde\r\n\
    boh!!boh!!\r\n\
    goliardas de natura\r\n\
    cun sa topa\r\n\
    no giughimoso tristura.\r\n\
    \r\n\
    Sa vida nostra \r\n\
    No giughede dinari\r\n\
    Ajho istudentes giogamus tottus impari.\r\n\
    \r\n\
    \r\n By  Gnomo \r\n"
