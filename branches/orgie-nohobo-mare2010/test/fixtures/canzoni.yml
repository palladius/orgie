  Corpo: "Vola Gigino, vola Gigetto,  \r\n\
    questa \xC3\xA8 la storia dell'uccelletto;  \r\n\
    era sparuto e spennacchiato,  \r\n\
    ma Teresina se l'\xC3\xA8 curato.  \r\n\
    Passanno Teresina sopra'n prato  \r\n\
    te trova 'sto uccelletto spennacchiato  \r\n\
    gli alliscia la capocchia con amore,  \r\n\
    l'uccello le se rizza con furore!  \r\n\
    \r\n\
    Vola Gigino, vola Gigetto,  \r\n\
    questa \xC3\xA8 la storia dell'uccelletto;  \r\n\
    era patito, pareva un osso,  \r\n\
    ma Teresina l'ha reso grosso!  \r\n\
    \r\n\
    Er passerotto non \xC3\xA8 pi\xC3\xB9 depresso,  \r\n\
    ha ritrovato l'animo in se stesso;  \r\n\
    nell'aria lui si sente invigorido,  \r\n\
    e - zacchete - se infila ner su nido! \r\n Vola Gigino, Vola Gigetto,  \r\n\
    questa \xC3\xA8 la storia dell'uccelletto;  \r\n\
    era sparuto e spennacchiato,  \r\n\
    ma Teresina l'ha rimpolpato.  \r\n\
    L'uccello l'\xC3\xA8 volato, ma che rabbia!  \r\n\
    Teresina lo voleva mette' 'n gabbia;  \r\n\
    ma a lei, che d'uccelletti se ne intenne,  \r\n\
    ie so' remaste in mano quattro penne!  \r\n\
    \r\n\
    Vola Gigino, vola Gigetto,  \r\n\
    questa \xC3\xA8 la storia dell'uccelletto;  \r\n\
    era patito, poi s'\xC3\xA8 ingrassato,  \r\n\
    e Teresina non l'ha pi\xC3\xB9 trovato! \r\n"
