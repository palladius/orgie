  Corpo: "Ho preso un bicchiere di acqua che schifo\r\n\
    a momenti beccavo anche il tifo \r\n\
    era inquinata, tanto inquinata, non ne bevo pi\xC3\xB9.\r\n\
    Con il latte ho cercato cos\xC3\xAC di curarmi \r\n\
    ma i raggi ho dovuto poi farmi \r\n\
    tubercolosi intestinale..e il sanatorio fu.\r\n\
    \r\n\
    Clisteri con il th\xC3\xA8 non dire che fan bene a me\r\n\
    le emorroidi non le ho, oppure si e poi cosa hooooo\r\n\
    io muoio ahiaahiahia, tifo, tbc e lo scolo che Suor Celeste\r\n\
    mi ha dato sollevandosi la veste..\r\n\
    \r\n\
    Ma cosa fai??? \r\n\
    Nel bicchiere hai versato Barbera\r\n\
    ne ho bevuto un litro stasera mi ha fatto bene \r\n\
    tanto ma tanto ne berr\xC3\xB2 di pi\xC3\xB9\r\n\
    Eppure forse hai ragione che strano \r\n\
    d'improvviso bevendo del vino \r\n\
    mi \xC3\xA8 passato ogni male malsano \r\n\
    mi \xC3\xA8 sol rimasta un p\xC3\xB2 di cirrosi \r\n\
    e nulla pi\xC3\xB9!!!!!!\r\n\
    \r\n\
    lalalalalala!lalalalala!"
