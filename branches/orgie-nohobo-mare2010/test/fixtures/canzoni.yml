  Corpo: "Dimmi chi sei\r\n\
    e dimmi come indossi il cappello,\r\n\
    con chi te la fai \r\n\
    se vivi in pace con il cervello,\r\n\
    come ti va\r\n\
    ricordati che porti la coda\r\n\
    quella folta, rigogliosa.\r\n\
    \r\n\
    L'unghia che hai\r\n\
    \xC3\xA8 troppo lunga, no non \xC3\xA8 bello,\r\n\
    avanti cos\xC3\xAC\r\n\
    sar\xC3\xA0 a sinistra come il coltello,\r\n\
    che te ne fai\r\n\
    se non \xC3\xA8 pi\xC3\xB9 neanche di moda\r\n\
    oggi anti-bellicosa\r\n\
    \r\n\
    Vecchio Clerico vagante e retr\xC3\xB2\r\n\
    che ti incazzi coi vaganti che sei,\r\n\
    se sei forte e picchi duro\r\n\
    puoi trovare contro un muro \r\n\
    un'atmosfera goliardica...\r\n\
    Vecchio Clerico vagante e retr\xC3\xB2,\r\n\
    la violenza \xC3\xA8 un'arte gi\xC3\xA0 demod\xC3\xA8,\r\n\
    noi che siamo fior di conio\r\n\
    promettiamo un manicomio,\r\n\
    un'atmosfera goliardia...\r\n\
    Ti sembrer\xC3\xA0 strano ma - perep\xC3\xA8 -\r\n\
    c'\xC3\xA8 volpe e c'\xC3\xA8 tadorna insieme nella tana,\r\n\
    ti sembrer\xC3\xA0 strano ma - perep\xC3\xA8 - \r\n\
    c'\xC3\xA8 volpe e c'\xC3\xA8 tadorna insieme nella tana...\r\n\
    \r\n\
    Qualche anno fa\r\n\
    si dice non mancasse mai niente,\r\n\
    il Michelin si superava a fare il serpente,\r\n\
    oggi per\xC3\xB2 la storia \xC3\xA8 pi\xC3\xB9 grottesca che rosa,\r\n\
    manca sempre qualche cosa...\r\n\
    \r\n\
    Vecchio Clerico vagante e retr\xC3\xB2\r\n\
