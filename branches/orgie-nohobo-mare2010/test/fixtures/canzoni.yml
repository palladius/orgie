  Data_creazione: 2003-04-17 14:59:47
  Corpo: "Aezan, ti ricordi quando usciva il sole,  \r\n\
    ti allontanava dai giacigli d'erba  \r\n\
    con le dita di fiamma:  \r\n\
    la tua paura era la notte e il tuono  \r\n\
    la luna era una dea, la tua divinit\xC3\xA0.  \r\n\
    Aezan, ti ricordi quando a caccia il vento  \r\n\
    ti riportava l'odore della belva  \r\n\
    che ti stava fuggendo:  \r\n\
    la sua paura era la notte e il tuono  \r\n\
    la luna era la via e tu la sua vilt\xC3\xA0.  \r\n\
    \r\n\
    Poi rubasti il fuoco dalla roccia viva  \r\n\
    ed anche nella notte non temevi pi\xC3\xB9,  \r\n\
    ti facesti forte della sua conquista  \r\n\
    divenisti eroe di tutte le trib\xC3\xB9.  \r\n\
    \r\n\
    Con il braccio alzato poi sfidasti il vento,  \r\n\
    nella gola l'urlo dell'umanit\xC3\xA0,  \r\n\
    nei tamburi il brivido di un mondo aperto,  \r\n\
    nella danza il passo della libert\xC3\xA0.  \r\n\
    \r\n\
    Aezan, non ci fu il tempo per il tuo trionfo  \r\n\
    mentre la terra ti si offriva intatta  \r\n\
    come un corpo di carne:  \r\n\
    la fecondavi, pazza di frutti e d'acqua,  \r\n\
    era la nuova dea la sua fertilit\xC3\xA0.  \r\n\
    \r\n\
    Aezan, tutte le sere ritornavi al fuoco,  \r\n\
    e l\xC3\xAC cantavi delicate nenie  \r\n\
    con i flauti di canna:  \r\n\
    le donne intanto creavano l'amore,  \r\n\
    la sicurezza estrema della comunit\xC3\xA0.  \r\n\
    Poi salisti in alto ad oscurare il sole,  \r\n\
    ma la tua saggezza non teneva pi\xC3\xB9:  \r\n\
    fuoco ferro ed oro, presunzione e pianto  \r\n\
    nella tua caduta trascinavi gi\xC3\xB9.  \r\n\
    E precipitavi in incubi di sogno  \r\n\
    dentro gli occhi tutte le tue folli et\xC3\xA0,  \r\n\
    flauti senza voce, maschere d'orrore  \r\n\
    nell'angoscia vuota dell'umanit\xC3\xA0,  \r\n\
    ma restava il tempo che spezzava il sogno  \r\n\
    dal delirio uscivi nella realt\xC3\xA0  \r\n\
    fu pi\xC3\xB9 tua la terra nella sua purezza  \r\n\
    madre appassionata per l'eternit\xC3\xA0.  \r\n\
    \r\n\
    Poi rubasti il fuoco dalla roccia viva  \r\n\
    ed anche nella notte non temevi pi\xC3\xB9,  \r\n\
    ti facesti forte della sua conquista  \r\n\
    divenisti eroe di tutte le trib\xC3\xB9.  \r\n\
    \r\n\
    Con il braccio alzato poi sfidasti il vento,  \r\n\
    nella gola l'urlo dellumanit\xC3\xA0,  \r\n\
    nei tamburi il brivido di un mondo aperto,  \r\n\
    nella danza il passo della libert\xC3\xA0.\r\n\
    \r\n"
