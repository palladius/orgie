canzoni_317: 
  m_bSeria: "1"
  Data_creazione: 2005-04-03 02:15:54
  Corpo: "Accoccolati ad ascoltare il mare,\r\n\
    quanto tempo siamo stati senza chiavare...\r\n\
    Riuscivo solo ad infilarti un dito\r\n\
    quando tu dicesti piano: non hai capito \r\n\
    che Hatu, tu sei protetto Hatu, mi puoi venire dentro tu;\r\n\
    ed io, che lo capivo io, mandavo in farmacia mio zio e restavo ad aspettare con l'uccello in mano,\r\n\
    mentre tu mi dicevi mettilo nell'ano, ed ancora pi\xC3\xB9 \r\n\
    su ed ancora pi\xC3\xB9 su, \r\n\
    E nascoste nell'ombra di un moscone le mie palle\r\n\
    la tua fregna che prudeva un po' impaziente\r\n\
    io continuavo a sfondarti il culo\r\n\
    e pensavo veramente d'essere un mulo \r\n\
    e Hatu, non arrivava Hatu, e ti agitavi sempre pi\xC3\xB9;\r\n\
    ed io, che non venivo, io pensavo al mona di mio zio.\r\n\
    Ti chiedevo voglioso succhiami il banano\r\n\
    rispondevi scontrosa no lo voglio in ano, ed ancora \r\n\
    pi\xC3\xB9 su,ed ancora pi\xC3\xB9 su... senti che rumore \r\n\
    e adesso che \xC3\xA8 arrivato Hatu\r\n\
    muoviti mettitelo su mi son bagnata le mutande io\r\n\
    e mentre mi parlavi tu, io armeggiavo con Hatu\r\n\
    che non entrava nell'uccello mio... \r\n \r\n\
    \r\n \r\n\
    \r\n"
