  Data_creazione: 2005-04-03 02:25:21
  Corpo: "Sono un gigolo e vive al casin\xC3\xB2\r\n\
    per moltiplicar le fiches.\r\n\
    Sono un gran viveur, vive nel piacer,\r\n\
    passo notti nelle bische.\r\n\
    La disperazion sono di pap\xC3\xA0,\r\n\
    ma la vita \xC3\xA8 una partita\r\n\
    da giocare a \"chemin\" oppure a \"tressett\"\r\n\
    finch\xC3\xA9 gira la roulette.  \r\n\
    Ma sono solo un uomo...\r\n\
    la tua bont\xC3\xA0 per sempre stupir\xC3\xA0!\r\n\
    Ma sono un vero uomo...\r\n\
    potrai aiutar noi poveri mortal!  \r\n\
    Sono molto chic, adori le boutique, sono un tipo troppo forte;\r\n\
    tra la gente che vive intorno a te amo farmi far la corte;\r\n\
    vesto da gag\xC3\xA0 coi soldi di pap\xC3\xA0, solo il meglio voglio avere:\r\n\
    ed invito gli amici gi\xC3\xB9 a cena da me:\r\n\
    e ci facciamo anche un bicchiere!  \r\n\
    Ma sono...  \r\n\
    Bevo M\xC3\xB6et e Chandon a pranzo e a colazion\r\n\
    mentre spolpo un'aragosta;\r\n\
    Nizza e St. Tropez dicono di te \"\xC3\xA8 il pi\xC3\xB9 fico della costa\".\r\n\
    Per amici ho solo due ladron e anche Giuda, quel gran baro\r\n\
    che gioc\xC3\xB2 la mia vita per trenta danar\r\n\
    ma pi\xC3\xB9 tardi l'ha riavuta!  \r\n\
    Ma sono...  \r\n"
