canzoni_368: 
  m_bSeria: "0"
  Data_creazione: 2008-03-28 16:02:36
  Corpo: "Oggi lo zio Giangy che risiede all'Idroscalo\r\n\
    viene dal cognato Giamminonni Alvaro.\r\n\
    Mo do' cazzo lo portamo? Su la Croce 'n ce se va\r\n\
    qui fa un callo che se schiatta, rischia de crep\xC3\xA0\r\n\
    Lo faccio mont\xC3\xA0 su la Prisma\r\n\
    \xE2\x80\x9CDove che vuoi annare, mio caro zio?\r\n\
    Causulae l'hai gi\xC3\xA0 visitata\r\n\
    la Cascata no\xE2\x80\x9D.\r\n\
    \r\n\
    L'acqua vene gi\xC3\xB9, scrosciava\r\n\
    e la strada poi bagnava\r\n\
    \xE2\x80\x9CGuardala perch\xC3\xA8 \xC3\xA8 la Cascata yeah\xE2\x80\x9D\r\n\
    Pijo pe' la Valnerina,\r\n\
    Collestatte e Torre Orsina\r\n\
    Me rintorno ch\xC3\xA8 me so' sbajato yeah\r\n\
    \r\n\
    \xE2\x80\x9CLo sai che il mago Haldin s'\xC3\xA8 buttato da lass\xC3\xB9,\r\n\
    sotto fanno il rafting, vuoi provarlo tu?\xE2\x80\x9D\r\n\
    Te s'\xC3\xA8 fatta fame, alla porchetta fai la posta\r\n\
    s\xC3\xAC proprio de Milano, butti via la crosta\r\n\
    \r\n\
    L'acqua vene gi\xC3\xB9, fa du' zompi\r\n\
    e ti senti come al cinema\r\n\
    Poi ti sporgi dal belvedere\r\n\
    occhio a non casc\xC3\xA0\r\n\
    \r\n\
    L'acqua vene gi\xC3\xB9, fiotta, piscia\r\n\
    tu me dici che \xC3\xA8 ridicola\r\n\
    Io t'allento uno sbarbazzone\r\n\
    e tu caschi gi\xC3\xB9\r\n\
    \r\n\
    Caschi sopre lu canotto\r\n\
    stiacci la merenna a un potto\r\n\
    no, nun poi toccamme la Cascata yeah\r\n\
    \r\n\
    Essa a noi ce d\xC3\xA0 la luce\r\n\
    me fa specie che 'n te piace\r\n\
    zittu sa' perch\xC3\xA8 \xC3\xA8 la Cascata yeah\r\n"
  Autore: Altoforno
  ID_canzone: "113106940"
  Note: "La Cascata \xC3\xA8 solo quelle delle Marmore.\r\n\
    \r\n\
    (Sulle note di Tropicana, Gruppo italiano)"
