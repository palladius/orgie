canzoni_345: 
  m_bSeria: "1"
  Data_creazione: 2005-08-13 18:52:48
  Corpo: "E quando la beghina si marita al damo d\xC3\xA0 la mano e al prete il resto.\r\n\
    E quando la beghina \xC3\xA8 maritata per star col prete ha sempre un buon pretesto.\r\n\
    Vado a fare la mia confessione non posso star senza l'assoluzione, oh marito, oh marito quel che il prete pu\xC3\xB2 dare a me tanto \xC3\xA8 inutile non ce l'hai te!\r\n\
    Ho messo in pegno orecchini e cordone i soldi li ho dati per l'assoluzione.\r\n\
    \r\n\
    Mentre il marito mio se ne va ai campi e sotto il sole abbrustolisce il viso.\r\n\
    Io resto in casa e aspetto l'arciprete che aprir mi sa la via del paradiso...\r\n\
    Anche in casa so far penitenza mostrando al curato la nera coscienza. Oh la fede, oh la fede or capisco il vantaggio che c'\xC3\xA8 quando il parroco prega per me.\r\n\
    Ho preparato del brodo e il cappone da dare al curato per l'assoluzione.\r\n\
    \r\n\
    Ogn'anno cresce in casa un nuovo figlio che ha il viso tale e quale del curato.\r\n\
    Io dico che \xC3\xA8 un mistero della fede e mio marito \xC3\xA8 sempre pi\xC3\xB9 beato.\r\n\
    Sulla casa che c'\xC3\xA8 religione dal cielo discende la benedizione. \r\n\
    \"Quanti figli? Quanti figli?\", tu domandi oh marito perch\xC3\xA9: c'\xC3\xA8 il curato che prega per te!\r\n\
    Tu non capisci mio caro babbione che sono i misteri della religione! \r\n\
    \r\n"
  Autore: "null"
  ID_canzone: "1741782873"
  Note: |
    * Le "beghine", nella tradizione popolare, sono le bigotte, le donne che si dedicano alla cura della chiesa, collaborando con il parroco.
    

  titolo: La Beghina
  tipo: 
  id_login: "979"
