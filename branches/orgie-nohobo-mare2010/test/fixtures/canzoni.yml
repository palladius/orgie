  Data_creazione: 2007-01-27 10:32:35
  Corpo: "Hai mai visto tua madre \r\n\
    cadere gi\xC3\xB9 per le scale \r\n\
    e molti molti metri pi\xC3\xB9 in basso \r\n\
    gridare - Aiuto, figlio mio. sto male \r\n\
    Hai mai visto tuo padre \r\n\
    girare per casa ubriaco \r\n\
    e dire a sua moglie \xE2\x80\x93 Piango \r\n\
    perch\xC3\xA9 oggi m'hanno insultato  \r\n\
    Hai mai visto un amico \r\n\
    pallido come mai l'hai visto prima \r\n\
    che ti dice - Sono felice \r\n\
    nelle mie vene scorre cocaina \r\n\
    Hai mai visto una donna \r\n\
    piangendo recitare i padrenostro \r\n\
    perch\xC3\xA9 il figlio che ha portato in grembo \r\n\
    non \xC3\xA8 nato uomo ma \xC3\xA8 nato mostro \r\n\
    Hai mai visto una vergine \r\n\
    camminare verso te, magari con amore \r\n\
    trascinandosi dietro lo spettro \r\n\
    di un moccioso non nato, uno schifoso errore \r\n\
    Hai mai visto te stesso \r\n\
    camminare ubriaco in una notte scura \r\n\
    e pensare che in fondo in fondo \r\n\
    per davvero non sai che cos'\xC3\xA8 la paura \r\n\
    Hai mai visto il sole di notte \r\n\
    hai mai visto di giorno la tua luna \r\n\
    hai mai avuto mille cose \r\n\
    senza averne mai cercata una\r\n\
    Hai guardato bene il sole di giorno \r\n\
    Quante notti hai passato ad amare la luna \r\n\
    Hai mai cercato la tua donna \r\n\
    Senza trovare n\xC3\xA9 lei n\xC3\xA9 nessuna.\r\n"
