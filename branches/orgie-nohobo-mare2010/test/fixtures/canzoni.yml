  Corpo: "{Do sol la- sol do 7}\r\n\
    Intro: Ritorna la sera, ritorna la sete, canzoni ritornano in mente\r\n\
    {Fa do sol 7 do}\r\n\
    In quella strada, in quella osteria, vibrante ancora di gente\r\n\
    {Do sol la- sol do 7}\r\n\
    Rit: C\xE2\x80\x99erano tanti Clerici Vaganti, studenti, poeti e cantanti\r\n\
    {Fa do sol do}\r\n\
    Ci passa davanti la vita in un giorno a sentire la storia passare\r\n\
    {La- mi-}\r\n\
    Strofa: Ci basta ben poco, per noi \xC3\xA8 quasi un gioco\r\n\
    {Fa la-}\r\n\
    Sei corde ed un paio di mani\r\n\
    {La-7 mi-7 fa sol}\r\n\
    \r\n\
    Ci si guarda negli occhi il frutto pi\xC3\xB9 buono sappiamo \xC3\xA8 il frutto di tutti\r\n\
    C\xE2\x80\x99erano tanti, Clerici Vaganti, studenti, poeti e cantanti\r\n\
    Ci passa davanti la vita in un giorno a sentire la storia passare\r\n\
    Coi versi racconti diversi pensieri, storie mai consumate\r\n\
    di notti d\xE2\x80\x99autunno e di primavera per vite da ricamare\r\n\
    C\xE2\x80\x99erano tanti, Clerici Vaganti, studenti, poeti e cantanti\r\n\
    Ci passa davanti la vita in un giorno a sentire la storia passare\r\n\
    I dottori mi han detto che oggi ho trent\xE2\x80\x99anni, dormi, la voglia \xC3\xA8 amara\r\n\
    e Tintoretto dipinge su un piatto la Lola, con Torquemada\r\n\
    C\xE2\x80\x99erano tanti, Clerici Vaganti, studenti, poeti e cantanti\r\n\
    Ci passa davanti la vita in un giorno a sentire la storia passare\r\n\
    Terzo notturno d\xE2\x80\x99autunno quando il serpente usc\xC3\xAC sulla strada\r\n\
    E nella grotta il Clerico disse la mela, l\xE2\x80\x99ho preparata\r\n\
    C\xE2\x80\x99erano tanti, Clerici Vaganti, studenti, poeti e cantanti\r\n\
    Sul magico libro la luce ha riflesso due ali per farci volare."
