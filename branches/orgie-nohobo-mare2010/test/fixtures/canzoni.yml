  Corpo: "Era d'Agosto e un povero uccelletto,  \r\n\
    ferito dalla fionda di un maschietto  \r\n\
    and\xC3\xB2 a riposare 1'ala offesa  \r\n\
    sulla finestra aperta d'una chiesa.\r\n  \r\n\
    Dalla tendina del confessionale  \r\n\
    il parroco intravide 1'animale,  \r\n\
    ma, pressato da molti peccatori,  \r\n\
    che pentirsi volean degli errori,  \r\n\
    richiuse le tendine immantinente  \r\n\
    e si rimise a confessar la gente. \r\n \r\n\
    Mentre in ginocchio oppur stando a sedere  \r\n\
    diceva ogni fedele le preghiere,  \r\n\
    una donna, notato l'uccelletto,  \r\n\
    lo prese al caldo e se lo mise in petto. \r\n \r\n\
    D'un tratto, improvviso un cinguettio  \r\n\
    ruppe il silenzio del tempio di Dio.  \r\n\
    Rise qualcuno, e il prete a quel rumore  \r\n\
    il ruolo abbandon\xC3\xB2 del confessore; \r\n \r\n\
    s'arrampic\xC3\xB2 sul pulpito veloce  \r\n\
    e di lass\xC3\xB9 grid\xC3\xB2 ad alta voce:  \r\n\
    \"Fratelli, chi ha l'uccello, per favore  \r\n\
    vada fuori dal tempio del Signore.\"  \r\n\
    \r\n\
    I maschi, un po' stupiti a tal parole,  \r\n\
    lesti s'accinser ad alzar le suole,  \r\n\
    ma il prete a quell'errore madornale  \r\n\
    veloce si frem\xC3\xB2: \"Mi son espresso male! \r\n \r\n\
    Rientrate tutti e statemi a sentire:  \r\n\
    Sol chi ha preso l'uccello deve uscire!\"\t        A tali detti, nello stesso istante,  \r\n\
    le donne si levaron tutte quante.\r\n  \r\n\
    E mentre se ne andavano di fora  \r\n\
    il prete replico: \" Sbagliamo ancora!  \r\n\
    Ors\xC3\xB9, restate tutte. figlie amate  \r\n\
    ch'io non voleva dir quel che pensate!\" \r\n \r\n\
    E riprese: \"Gi\xC3\xA0 dissi, e torno a dire  \r\n\
    che chi ha preso l'uccello deve uscire,  \r\n\
    ma mi rivolgo a voce chiara e tesa  \r\n\
    soltanto a chi 1'uccello ha preso in chiesa!\"  \r\n\
    \r\n\
    A testa bassa, la corona in mano,  \r\n\
    le monache s'alzaron piano piano,  \r\n\
    quindi, col viso pieno di rossore,  \r\n\
    lasciarono la casa del Signore.  \r\n\
    \r\n\
    \"Oh Santa Vergine!\" Esclam\xC3\xB2 il buon Prete:  \r\n\
    \"Sorelle, ors\xC3\xB9, rientrate e state liete,  \r\n\
    perch\xC3\xA9 vogliam concluder, Sissignori,  \r\n\
    la serie degli equivoci ed errori;  \r\n\
    \r\n\
    perci\xC3\xB2, senza rumore, piano piano  \r\n\
    esca soltanto chi ha 1'uccello in mano.\"  \r\n\
    Una fanciulla con il fidanzato,  \r\n\
    ch' era nascosta in un angolo appartato  \r\n\
    dietro un cappelletta laterale  \r\n\
    poco manc\xC3\xB2 che si sentisse male  \r\n\
    e mormor\xC3\xB2 col viso tutto smorto:  \r\n\
    \"Te lo dicevo ! Hai visto ? Se n'\xC3\xA8 accorto!\" \r\n \r\n"
