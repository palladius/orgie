  Corpo: "REm] [LAm] [REm][MI7][LAm] \r\n\
    \r\n (parlato)\r\n\
    E' una canzone senza titolo\r\n\
    tanto pe' cant\xC3\xA0\r\n\
    pe' fa quarche cosa...\r\n\
    non \xC3\xA8 gnente de straordinario\r\n\
    robba der paese nostro\r\n\
    cche se p\xC3\xB2 cant\xC3\xA0 pure senza voce...\r\n\
    basta 'a salute...\r\n\
    quanno c'\xC3\xA8 'a salute c'\xC3\xA8 tutto...\r\n\
    basta 'a salute e un par de scarpe nove\r\n\
    poi gir\xC3\xA0 tutto er monno\r\n\
    e m' 'a accompagno da me\r\n\
    \r\n\
    \r\n\
    [LAm] Pe' f\xC3\xA0 la vita meno a[REm]mara\r\n\
    me so' [MI7]comprato 'sta chi[LAm]tara\r\n\
    e quanno er solo scenne e [REm]more\r\n\
    [MI7] me sento 'n core canta[LAm]tore.\r\n\
    La voce \xC3\xA9 poca ma into[REm]nata,\r\n\
    nun serve a [MI7]fa' 'na sere[LAm]nata\r\n\
    ma solamente a f\xC3\xA0 'n ma[REm]niera\r\n\
    de famme 'n sogno a prima [MI7]sera...\r\n\
    \r\n\
    {soc}\r\n\
    [LA]Tanto pe' cant\xC3\xA0\r\n\
    perch\xC3\xA8 me sento un friccico [MI]ner [MI7]core\r\n\
    tanto pe' sogn\xC3\xA0\r\n\
    perch\xC3\xA8 ner petto me ce na[MI7/5+]sca un [LA]fiore\r\n\
    fiore de lill\xC3\xA0\r\n\
    che m'ariporti verso er [LA7]primo a[RE]more\r\n\
    che sospirava le can[RE]zone [LA]mie \r\n\
    e m'ari[MI7]ncojoniva de bu[LA]gie.\r\n\
    {eoc}\r\n\
    \r\n\
    \r\n\
    Canzone belle e appassionate\r\n\
    che Roma mia m'aricordate,\r\n\
    cantate solo pe' dispetto\r\n\
    ma co' 'na smania dentro ar petto,\r\n\
    io nun ve canto a voce piena\r\n\
    ma tutta l'anima \xC3\xA8 serena\r\n\
    e quanno er cielo se scolora\r\n\
    de me nessuna se 'nnamora...\r\n\
    \r\n\
    \r\n\
    Tanto pe' cant\xC3\xA0...\r\n"
