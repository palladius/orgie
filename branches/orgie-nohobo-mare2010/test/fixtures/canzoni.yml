canzoni_131: 
  m_bSeria: "0"
  Data_creazione: 2008-03-28 15:38:03
  Corpo: "Trecento mila d'affitto, luce, gas e condominio\r\n\
    Luned\xC3\xAC tu prendi il trenino.\r\n\
    Quello solo puoi scegliere tu: F.S. o F.C.U.\r\n\
    \r\n\
    A qualcuno non sembrer\xC3\xA0 strano,\r\n\
    il ternano ci ha gi\xC3\xA0 preso la mano\r\n\
    a emigrare per studio, si sa,\r\n\
    s'\xC3\xA8 fatto sempre, che ce voi fa!\r\n\
    \r\n\
    Voglio andare a Perugia \r\n\
    solo quando c'\xC3\xA8 il derby\r\n\
    tanto poi chi lo vince si sa\r\n\
    E chi non \xC3\xA8 d'accordo \r\n\
    se ne annasse da Terni\r\n\
    non \xC3\xA8 degno di questa citt\xC3\xA0\r\n\
    \r\n\
    E a Perugia, quanno scenni\r\n\
    c'hai lu freddo e la rabbia fra i denti\r\n\
    paghi il bus per andare in facolt\xC3\xA0,\r\n\
    lu borsone coi vestiti, e da magn\xC3\xA0\r\n\
    \r\n\
    Quando senti parlare la gente\r\n\
    tu capisci che non c'entri niente,\r\n\
    ma oramai te ce tocca sta\r\n\
    vento e scale, ma che cazzo de citt\xC3\xA0\r\n\
    \r\n\
    Voglio andare a Perugia \r\n\
    solo quando c'\xC3\xA8 il derby\r\n\
    tanto poi chi lo vince si sa\r\n\
    E chi non \xC3\xA8 d'accordo \r\n\
    se ne annasse da Terni\r\n\
    non \xC3\xA8 degno di questa citt\xC3\xA0\r\n\
    Non ce l'ho coi perugini,\r\n\
    so' coniji, ma non so' cretini\r\n\
    Non so' loro che c'hanno da fa\r\n\
    se je lascio tutti i sordi de pap\xC3\xA0\r\n\
    \r\n\
    Anche a Terni c'\xC3\xA8 cultura,\r\n\
    ma da sempre c'\xC3\xA8 chi ha avuto paura,\r\n\
    chi s'\xC3\xA8 venduto pensanno per s\xC3\xA9\r\n\
    e s'\xC3\xA8 scordato lu panpepato com \xC3\xA8\r\n\
    \r\n\
    Quanno esci perito, tu te fai da 'nderculo\r\n\
    lu diploma in fondo cos'\xC3\xA8?\r\n\
    L'Ateneo per Terni rappresenta la vita,\r\n\
    porta soldi, cultura e tanta fica"
