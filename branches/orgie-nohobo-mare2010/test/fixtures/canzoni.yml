  Corpo: "Con sta pioggia e con sto vento,  {DO SOL}\r\n\
    chi \xC3\xA8 che bussa al mio convento?        {DO}\r\n\
    -Sono una povera vecchierella     {DO SOL}\r\n\
    che si vuole confessar!                       {DO}  \r\n  \r\n\
    -Co'sti lampi e co' sti tuoni          {FA DO}\r\n\
    no' sta rompere i coglioni!           {FA SOL}\r\n\
    Vattene via, vattene via,             {FA DO}\r\n\
    disperazione dell'anima mia!        {FA SOL}\r\n\
    \r\n\
    -Con sta pioggia e con sto vento \r\n\
    chi \xC3\xA8 che bussa al mio convento?  \r\n\
    -Sono una povera verginella  \r\n\
    che si vuole confessar!\r\n\
    \r\n\
    -Falla entrare, falla entrare  \r\n\
    ch'or la vengo a confessare.  \r\n\
    Vieni avanti, vieni avanti,  \r\n\
    che confesso tutti quanti!\xC2\xBB  \r\n\
    \r\n\
    -T'hanno mai toccato il petto?  \r\n\
    -Padre s\xC3\xAC, ma con rispetto! \r\n\
    -T'han toccato mai la panza?  \r\n\
    -Padre s\xC3\xAC, ma con creanza! \r\n\
    \r\n\
    -T'han toccato mai il culo?  \r\n\
    -Padre s\xC3\xAC, col c.azzo duro!  \r\n\
    -T'han toccato mai la fica?  \r\n\
    -Padre s\xC3\xAC, ma con fatica!  \r\n\
    \r\n\
    -Or, se vuoi l'assoluzione,  \r\n\
    prendi in mano sto cordone!  \r\n\
    -Non son scema, non son orba  \r\n\
    questo \xC3\xA8 c.azzo, non \xC3\xA8 corda!\r\n\
    \r\n\
    \r\n"
