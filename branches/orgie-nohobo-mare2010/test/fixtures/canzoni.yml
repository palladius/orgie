  Data_creazione: 2005-04-22 12:22:07
  Corpo: |-
    La dolorosa istoria io vi narro
    e vi prego voi datemi ascolto
    se volete, volete sentire
    quel che avvenne un di' a Concettina,
    Concettina Marchesi fu Astorre,
    giovinetta virtuosa ed assai fiera
    usciva una sera in preghiera
    dalla chiesa del santo patron.
    Uno strano prurito alla coscia
    ferma Concetta ad un tempo
    ed alzarsi la gonna in un lampo
    per grattarsi nel punto fatal.
    Arfileo Badolascia fu Anepore
    macellaro del borgo paesano
    uscendo ubriaco ed insano
    si fermo' e si mise a piscia'.
    Udite udite quel che avvenne
    allontanate i vostri bambini;
    se no quelli poverini
    vanno a casa e si fanno i seghin.
    Concettina spaurita rimase
    e correndo gia' molto tremava
    ma pestando una buccia di fava
    lunga stesa per terra casco'.
    Arfileo Badolascia fu Anepore
    macellaro del borgo paesano
    il gran tubo tenendo per mano
    a guisa di lancia punto'.
    se dei cani avrete veduto
    per la strada tra loro chiavare
    la scena la fu tale e quale
    nel frenetico suo danzar.
    Son passati ormai nove mesi
    ed e' nato un biondo bambino
    bello assai ma senza pipino.
    Ed il povero bambino padre non ha
    Arfileo Badolascia fu Anepore
    era gia' coniugato.
