  Corpo: "Questa di Marinella \xC3\xA8 la storia strana\r\n\
    che una mattina si svegli\xC3\xB2 puttana\r\n\
    e un giovin che la vide cos\xC3\xAC bella\r\n\
    sent\xC3\xAC rizzarsi a un tratto la cappella.\r\n\
    \r\n\
    Tu eri verginella, eri pudica,\r\n\
    ti ritrovasti un cazzo nella fica;\r\n\
    tu eri bionda e avevi gli occhi belli\r\n\
    e ti arriv\xC3\xB2 uno schizzo fra i capelli.\r\n\
    \r\n\
    (...)\r\n\
    Furono cazzi e furono pompini\r\n\
    poi furono soltanto i ditalini. \r\n\
    \r\n\
    Questa \xC3\xA8 la tua canzone, Marinella:\r\n\
    seguisti il mestier di tua sorella,\r\n\
    e quando la tua fica fu una fogna\r\n\
    finisti in un casino di Bologna! \r\n"
