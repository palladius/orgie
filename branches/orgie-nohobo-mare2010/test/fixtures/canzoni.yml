  Corpo: "Sento la nostalgia del passato,\r\n\
    quando la mamma mia ho lasciato.\r\n\
    Non ti potr\xC3\xB2 scordar casetta mia,\r\n\
    in questa notte stellata\r\n\
    la mia serenata io canto per te.\r\n\
    \r\n\
    Romagna mia, Romagna in fiore,\r\n\
    tu sei la stella, tu sei l'amore.\r\n\
    Quando ti penso, vorrei tornare\r\n\
    dalla mia bella al casolare.\r\n\
    \r\n\
    Romagna, Romagna mia,\r\n\
    lontan da te non si pu\xC3\xB2 star!\r\n"
