  Corpo: "MISTERI\r\n\
    \r\n\
    Pisciamo tra le rose\r\n\
    tra le rose pisciamo.\r\n\
    Do e do quattro.\r\n\
    Quattro e do sie.\r\n\
    Do e do quattro.\r\n\
    Quattro e do sie.\r\n\
    Mariarosa scoresa.\r\n\
    Scoresa Mariarosa.\r\n\
    E misureremo il vostro col nostro e se troveremo il nostro pi\xC3\xB9 lungo del vostro taglieremo un pezzo dal nostro e lo giunteremo al vostro in modo che il nostro sia uguale al vostro cosicch\xC3\xA9 il vostro ed il nostro comparati siano uguali, e mettiamo il nostro nel culo vostro.\r\n\
    Amen\r\n\
    \r\n\
    Nel primo (2\xC2\xB0, 3\xC2\xB0, ...) mistero lussurioso\r\n\
    (godurioso, peccaminoso, voluttuoso, misterioso) si contempla... \r\n\
    Sant'Agnese\r\n\
    che mangiava uova\r\n\
    e cagava maionese...\r\n\
    (tutti rispendono ad ogni invocazione) SOCMEL\r\n\
    La sorella di Sant'Agnese\r\n\
    che con le pezze del marchese\r\n\
    lustrava i cazzi\xE2\x80\xA6\r\n\
    (lucidava i mobili...)\r\n\
    Sant' Ambrogio\r\n\
    che col cazzo ad orologio\r\n\
    istituiva l'ora legale...\r\n\
    (soppesava gli attimi...)\r\n\
    Sant'Amelia\r\n\
    che si metteva in culo una bottiglia\r\n\
    per ubriacare il verme solitario...\r\n\
    Sant' Arturo\r\n\
    che col cazzo nel futuro\r\n\
    inculava i posteri...\r\n\
    Sant' Asdrubale\r\n\
    che col cazzo fra le nuvole\r\n\
    inculava i paracadutisti...\r\n\
    Santa Benigna\r\n\
    che per difendere la sua verginit\xC3\xA0\r\n\
    si metteva in figa un palo da vigna...\r\n\
    San Bonaventura\r\n\
    che mangiava legna\r\n\
    e cagava segatura...\r\n\
    Santa Bruna\r\n\
    che con la figa a mezzaluna\r\n\
    aiutava Gheddafi...\r\n\
    San Brunone\r\n\
    che col cazzo bianco e marrone\r\n\
    lo vendeva per castagna...\r\n\
    San Casimiro\r\n\
    che col cazzo a ferro da stiro\r\n\
    faceva la piega ai coglioni...\r\n\
    Santa Cecilia\r\n\
    che con la fica a conchiglia\r\n\
    giocava a rugby\xE2\x80\xA6\r\n\
    (catturava i bigoli...)\r\n\
    San Cirillo\r\n\
    che col cazzo fatto a spillo\r\n\
    inculava i microbi...\r\n\
    San Clemente\r\n\
    che col cazzo evanescente\r\n\
    inculava le anime...\r\n\
    San Colletta\r\n\
    che con la figa a trombetta\r\n\
    dirigeva una banda militare\xE2\x80\xA6\r\n\
    (che col cazzo a buretta titolava gli acidi...)\r\n\
    Santa Cunegonda\r\n\
    che con la fica fatta a fionda\r\n\
    abbatteva i passeri...\r\n\
    Sant'Elisabetta\r\n\
    che con la figa a bacchetta\r\n\
    puniva i cazzi ribelli...\r\n\
    Sant'Ermete\r\n\
    che col cazzo fatto ad ariete\r\n\
    demoliva l\xE2\x80\x99imene\xE2\x80\xA6\r\n\
    (demoliva gli alberi...)\r\n\
    Sant'Emesto\r\n\
    che col culo fatto a cesto\r\n\
    andava a funghi allucinogeni\xE2\x80\xA6\r\n\
    (allenava il Simmental...)\r\n\
    Sant'Er\xC3\xB2s\r\n\
    che col cazzo a Womer Br\xC3\xB2s\r\n\
    sborrava in tecnicolor...\r\n\
    Sant'Esa\xC3\xB9\r\n\
    che col cazzo rosso e blu\r\n\
    correggeva i compiti...\r\n\
    Sant'Evarista\r\n\
    che con la fica fatta a pista\r\n\
    allenava Bartali...\r\n\
    San Fattore\r\n\
    che col cazzo a bimotore\r\n\
    bombardava il Vaticano...\r\n\
    San Filippo\r\n\
    che col cazzo fatto a cippo\r\n\
    separava il traffico\xE2\x80\xA6\r\n\
    San Fiorello\r\n\
    che col cazzo a ramoscello\r\n\
    dava la pace (al Vietnam...)\r\n\
    San Florinto\r\n\
    che col cazzo dipinto\r\n\
    ispirava Picasso\xE2\x80\xA6\r\n\
    (allestiva personali...)\r\n\
    San Galeazzo\r\n\
    che col cazzo fatto a cazzo\r\n\
    passava inosservato...\r\n\
    San Gallo\r\n\
    che col cazzo giallo\r\n\
    faceva la spia ai cinesi... \r\n\
    San Gedeone\r\n\
    che col cazzo a galeone\r\n\
    inculava le balene...\r\n\
    San Giacinto\r\n\
    che col culo a labirinto\r\n\
    ingannava i busoni...\r\n\
    San Giobatto\r\n\
    che col cazzo piatto\r\n\
    inculava le sogliole...\r\n\
    Santa Gioconda\r\n\
    che con la figa a sponda\r\n\
    arginava il Po...\r\n\
    San Giovanni Bosco\r\n\
    che nel culo fatto a chiosco\r\n\
    vendeva giornali... \r\n\
    Sant\xE2\x80\x99Ignazio\r\n\
    che col cazzo nello spazio\r\n\
    rimorchiava i missili...\r\n\
    Sant'Ilario\r\n\
    che col cazzo sul binario\r\n\
    deragliava i rapidi...\r\n\
    Sant'Isidoro\r\n\
    che col cazzo tutto d'oro\r\n\
    svalutava il dollaro...\r\n\
    San Leone\r\n\
    che col cazzo ad equazione\r\n\
    ricercava i limiti...\r\n\
    San Marcello\r\n\
    che con il cazzo a pennello\r\n\
    inculava i critici della Biennale...\r\n\
    San Massimino\r\n\
    che col cazzo fatto a grissino\r\n\
    rompeva il culo ai tonni\xE2\x80\xA6\r\n\
    (inculava i frati grossi...)\r\n\
    Santa Minerva\r\n\
    che mangiava i pomodori\r\n\
    e cagava conserva...\r\n\
    Santa Monica\r\n\
    che con la fica a fisarmonica\r\n\
    assordava gli angeli...\r\n\
    Sant'Ottone\r\n\
    che con il cazzo ad arpione\r\n\
    fiocinava le foche...\r\n\
    San Paziente\r\n\
    che col cazzo a salvagente\r\n\
    salvava i naufraghi...\r\n\
    San Pietro\r\n\
    che con l'uccello nel didietro\r\n\
    inculava i gamberi...\r\n\
    San Polluce\r\n\
    che col cazzo fatto a duce\r\n\
    inculava i popoli...\r\n\
    San Procopio\r\n\
    che col cazzo a periscopio\r\n\
    inculava i naufraghi...\r\n\
    Santa Regina\r\n\
    che col culo pieno di paraffina\r\n\
    lucidava i mobili...\r\n\
    San Roberto\r\n\
    che mangiava l' ombrello chiuso\r\n\
    e lo cagava aperto...\r\n\
    Santa Scolastica\r\n\
    che con la figa a svastica\r\n\
    spaventava gli ebrei...\r\n\
    San Severo\r\n\
    che col culo tutto nero\r\n\
    inneggiava al duce...\r\n\
    San Simone\r\n\
    che con il culo a cannone\r\n\
    sparava cazzate\xE2\x80\xA6\r\n\
    (cagava proiettili da 88...)\r\n\
    Santa Teresa\r\n\
    che con la mona fatta a fresa\r\n\
    segava i coglioni...\r\n\
    San Valente\r\n\
    che dava il ricostituente\r\n\
    alle fighe pallide\xE2\x80\xA6\r\n\
    (alle spirochete pallide...)\r\n\
    San Vittore\r\n\
    che col cazzo a trimotore\r\n\
    rimpatriava i reduci...\r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n\
    \r\n"
