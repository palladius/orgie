  Corpo: "C`hai 15 anni e scopi come na jena\r\n\
    chiavi in balcone e pure sull'altalena\r\n\
    lo pigli in culo anche quando dormi, ma come fai?\r\n\
    ormai lo prendi in quantit\xC3\xA0 industriali\r\n\
    e se non chiavi per un giorno t'ammali\r\n\
    senza nerchia tu non vivi proprio pi\xC3\xB9\r\n\
    l'aiddiesse te fa proprio na sega\r\n\
    basta che trombi a te che cazzo te frega\r\n\
    ti sei scopata anche babbo natale e Peter Pan (e Marino Sumo)\r\n\
    tra un raspone una sega e una pompa \r\n\
    quel p\xC3\xB2ro culo tra un p\xC3\xB2 te se smonta\r\n\
    e se ti becca tuo padre t'ingroppi pure lui\r\n\
    Alice nel paese dei cazzi (x2) \r\n\
    in culo lo prendi anche da quelli piu` orendi\r\n\
    chiunque arriva te lo trombi ma come te va! \r\n\
    Alice nel paese dei cazzi (x2)\r\n\
    a tutti la d\xC3\xA0 ma chi se la sfonder\xC3\xA0 \r\n\
    con lo scolo e la sifilide si ritrover\xC3\xA0\r\n\
    a sq\xC3\xB2la sempre durante le lezioni\r\n\
    in fondo all'aula succhia due piselloni\r\n\
    tanto il preside se l'\xC3\xA8 strombato da quel d\xC3\xAC\r\n\
    quando va al bagno lei si tromba i bidelli\r\n\
    a ricreazione prende anche due piselli\r\n\
    e poi a casa col trattore anale lei giocher\xC3\xA0\r\n\
    la fica ormai ce l'ha ridotta una fogna\r\n\
    un culo nuovo lei se lo sogna\r\n\
    con le ovaie ormai ci gioca a ping pong (o a pong ping)\r\n\
    e dice sempre che la sua \xC3\xA8 una missione\r\n\
    trombarsi tutti quanti anche un bel caprone\r\n\
    Dora \xC3\xA8 una sua grande amica, chiss\xC3\xA0 perch\xC3\xA8?!\r\n\
    Alice nel paese dei cazzi (x2) \r\n\
    col culo a brandelli succhia ancora piselli\r\n\
    l'aiddiesse je rimbalza e per sempre vivra'\r\n\
    Alice nel paese dei cazzi (x2) \r\n\
    tra una nerchia e una trave, tra una ceppa e due fave\r\n\
    con Gaetana, Abdula e Dora sempre salter\xC3\xA0\r\n\
    Alice nel paese dei cazzi (x2) \r\n\
    il culo ormai \xC3\xA8 andato, l'intestino \xC3\xA8 crepato\r\n\
    e con l'utero a freesby ormai giocare tu puoi\r\n\
    Alice nel paese dei cazzi (x2) \r\n\
    ormai stai alla frutta ti hanno sfondata tutta\r\n\
    ancora un paio di ceppe e poi morire potrai\r\n"
