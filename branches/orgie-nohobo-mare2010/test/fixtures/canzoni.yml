  Corpo: "Estuans intrinsecus     ira vehementi\r\n\
    in amaritudine     loquor mee menti.\r\n\
    Factus de materia     levis elementi\r\n\
    folio sum similis     de quo ludunt venti.\r\n\
    \r\n\
    Cum sit enim proprium     viro sapienti,\r\n\
    supra petram ponere     sedem fundamenti,\r\n\
    stultus ego comparor     fluvio labenti,\r\n\
    sub eodem aere     numquam permanenti.\r\n\
    \r\n\
    Feror ego veluti     sine nauta navis,\r\n\
    ut per vias aeris     vaga fertur avis;\r\n\
    non me tenet vincula,     non me tenet clavis,\r\n\
    quero mei similes     et adiungor pravis.\r\n\
    \r\n\
    Michi cordi gravitas     res videtur gravis,\r\n\
    iocus est amabilis     dulciorque favis.\r\n\
    Quicquid Venus imperat     labor est suavis,\r\n\
    que numquam in cordibus     habitat ignavis.\r\n\
    \r\n\
    Via lata gradior     more iuventutis,\r\n\
    implico me vitiis     immemor virtutis,\r\n\
    voluptatis avidus     magis quam salutis,\r\n\
    mortuus in anima     curam gero cutis.\r\n\
    \r\n\
    Presul discretissime,     veniam te precor,\r\n\
    morte bona morior,     dulci nece necor,\r\n\
    meum pectum sauciat     puellarum decor,\r\n\
    et quas tactu nequeo,     saltem corde mechor.\r\n\
    \r\n\
    Res est arduissima     vincere naturam,\r\n\
    in aspectu virginis     mentem esse puram;\r\n\
    iuvenes non possumus     legem sequi duram\r\n\
    leviumque corporum     non habere curam.\r\n\
    \r\n\
    Quis in igne positus     igne non uratur?\r\n\
    Quis Papie demorans     castus habeatur,\r\n\
    ubi Venus digito     iuvenes venatur,\r\n\
    oculis illaqueat,     facie predatur?\r\n\
    \r\n\
    (...)\r\n\
    \r\n\
    Meus est propositum     in taberna mori,\r\n\
    ut sint vina proxima     morientis ori;\r\n\
    tunc cantabunt letius     angelorum chori:\r\n\
    \xE2\x80\x9CSit Deus propitius     huic potatori\xE2\x80\x9D.\r\n\
    \r\n\
    (...)\r\n\
    \r\n\
    Unicuique proprium     dat Natura munus:\r\n\
    ego numquam potui     scribere ieiunus,\r\n\
    me ieiunum vincere     posset puer unus.\r\n\
    Siti et ieiunum     odi tamquam funus.\r\n\
    \r\n\
    Unicuique proprium     dat Natura donum:\r\n\
    ego versus faciens     bibo vinum bonum,\r\n\
    et quod habent purius     dolia cauponum;\r\n\
    vinum tale generat     copia sermonum.\r\n\
    \r\n\
    Tales versos facio,     quale vinum bibo,\r\n\
    nichil possum facere     nisi sumpto cibo;\r\n\
    nichil valet penitus,     que ieieunus scribo,\r\n\
    Nasonem post calices     carmine preibo...\r\n"
  Autore: Archipoeta di Colonia ; musicata da Carl Orff
