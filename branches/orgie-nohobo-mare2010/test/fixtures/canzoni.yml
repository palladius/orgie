  Data_creazione: 2008-01-29 22:24:55
  Corpo: "L\xC3\xA0 nella steppa fredda\r\n\
    l\xC3\xA0 nella steppa brulla\r\n\
    tra i fiori di betulla\r\n\
    trotta e galoppa un cavalier.\r\n\
    \r\n\
    Il cosacco torna a casa\r\n\
    ma Natascha non lo aspetta\r\n\
    era andata a far marchetta\r\n\
    dal marchese Sbororov.\r\n\
    \r\n\
    (Rit.)Ullall\xC3\xA0,ullall\xC3\xA0,ulla ulla ullall\xC3\xA0\r\n\
    Ullall\xC3\xA0,ullall\xC3\xA0,ulla ulla ullall\xC3\xA0\r\n\
    Menga menga menga menga\r\n\
    chi l'ha in culo se lo tenga!\r\n\
    Volga volga volga volga\r\n\
    chi l'ha in culo se lo tolga\r\n\
    oh oh oh oh oh oh oooh!\r\n\
    \r\n\
    Il cosacco incazzato\r\n\
    prende l'ascia e la doppietta\r\n\
    e balzato in bicicletta\r\n\
    dal marchese se ne va.\r\n\
    \r\n\
    E Natascha,svergognata\r\n\
    giace prona sopra un letto\r\n\
    e il marchese con rispetto\r\n\
    le palpeggia il bus del cul!\r\n\
    \r\n\
    (Rit.)\r\n\
    \r\n\
    Il cosacco,cazzo in mano\r\n\
    glielo punta contro l'ano\r\n\
    e spingendo come un mulo\r\n\
    gli sfond\xC3\xB2 il buco del cul!\r\n\
    \r\n\
    Il cosacco prende l'ascia\r\n\
    e ti squarta la bagascia\r\n\
    e poi priva dei coglioni\r\n\
    il marchese Sbororov.\r\n\
    \r\n\
    (Rit.)\r\n\
    \r\n\
    Il cosacco,vendicato\r\n\
    prende l'ascia e la doppietta\r\n\
    e salito in bicicletta\r\n\
    per la steppa se ne va.\r\n\
    \r\n\
    L\xC3\xA0 nella steppa fredda\r\n\
    l\xC3\xA0 nella steppa brulla\r\n\
    tra i fiori di betulla\r\n\
    trotta e galoppa un cavalier..\r\n\
    \r\n\
    \r\n"
