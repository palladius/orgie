  Corpo: "RIT.: Non basta dire \"Io son libero\" {LAm SOL}\r\n\
    ma dare agli altri libert\xC3\xA0  {SOL LAm }\r\n\
    Non basta dire \"Io so vivere\" {LAm SOL}\r\n\
    devi spiegarlo a chi non sa. {SOL LAm }\r\n\
    \r\n\
    1- Ho visto la tua mente cercar la verit\xC3\xA0 \r\n\
    nelle torri d'avorio sola sempre di pi\xC3\xB9 \r\n\
    si dibatteva stanca senza respiro ormai \r\n\
    sono fredde prigioni le tue capacit\xC3\xA0. \r\n\
    \r\n\
    RIT.: Non basta dire \"Io son libero\" \r\n\
    ma dare agli altri libert\xC3\xA0 \r\n\
    Non basta dire \"Io so vivere\"\r\n\
    devi spiegarlo a chi non sa. \r\n\
    \r\n\
    2- Ho visto gli occhi tuoi piangere verso il cielo \r\n\
    ed invocare aiuto credendo che verr\xC3\xA0\r\n\
    Rivolgi gli occhi in terra ci siamo noi quaggi\xC3\xB9 \r\n\
    sono le nostre mani la fede e la piet\xC3\xA0. \r\n\
    \r\n\
    RIT.: Non basta dire \"Io son libero\" \r\n\
    ma dare agli altri libert\xC3\xA0  \r\n\
    Non basta dire \"Io so vivere\" \r\n\
    devi spiegarlo a chi non sa.  \r\n\
    \r\n\
    3- A te giovane parlo che soffri come noi \r\n\
    le costrizioni assurde di questa umanit\xC3\xA0\r\n\
    Spezza le tradizioni idolo di una vita\r\n\
    gettarsi in questa lotta vuol dire libert\xC3\xA0.\r\n\
    \r\n\
    RIT.: Non basta dire \"Io son libero\" \r\n\
    ma dare agli altri libert\xC3\xA0 \r\n\
    Non basta dire \"Io so vivere\r\n\
    devi spiegarlo a chi non sa\r\n"
