    Vocalizzato\r\n\
    \r\n\
    Il Drago lo guarda, San Giorgio sorride: \xE2\x80\x9CTi dono la vita, s\xC3\xAC, ti lascio andare!\xE2\x80\x9D\r\n\
    Ma un urlo tremendo sconquassa l\xE2\x80\x99altura\r\n\
    Risuona la valle di forza sicura \r\n\
    Risuona la valle di forza sicura \r\n\
    Il Drago ferito ora \xC3\xA8 in piedi, di peso si getta l\xC3\xAC sopra la lancia\r\n\
    Trafitto si accascia, il suo urlo si estingue\r\n\
    Ecco ora \xC3\xA8 morto, or giace esangue \r\n\
    Ecco ora \xC3\xA8 morto, or giace esangue\r\n\
    \r\n\
    Rit.\t\t\xE2\x80\x9COh scellerato, qual gesto inaudito!\xE2\x80\x9D\r\n\
    \t\tGrida San Giorgio, \xC3\xA8 affranto, \xC3\xA8 stupito\r\n\
    \t\t\xE2\x80\x9CPotevi volare, volare nel vento,\r\n\
    \t\tvolare cent\xE2\x80\x99anni, cent\xE2\x80\x99anni e altri cento!\xE2\x80\x9D\r\n\
    Vocalizzato\r\n\
    \r\n\
    Rallentato\tIl Drago lo guarda con l\xE2\x80\x99occhio ormai spento                \r\n\
