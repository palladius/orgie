canzoni_009: 
  m_bSeria: "1"
  Data_creazione: 2003-11-05 10:28:51
  Corpo: "{La do sol re}\r\n\
    Bella e seducente Eloisa dentro te\r\n\
    {La do sol re}\r\n\
    Morbida ti avvolge / e non ti spieghi mai perch\xC3\xA9\r\n\
    {La do sol re}\r\n\
    Come in un bel sogno / affascinante sei\r\n\
    {La do sol re}\r\n\
    Lei ti insinua il dubbio / e tu chiss\xC3\xA0 se cederai\r\n\
    \r\n\
    Passioni intellettuali, il sesso va da s\xC3\xA9\r\n\
    \r\n\
    Fulbert gran bastardo ti odia e sai perch\xC3\xA9\r\n\
    La sfida \xC3\xA8 un\xE2\x80\x99altra donna tu non ce la farai\r\n\
    E lui ti aspetta infido e tu ti scornerai\r\n\
    {La do sol re}\r\n\
    E\xE2\x80\x99 perfida, \xC3\xA8 comoda, \xC3\xA8 facile\xE2\x80\xA6la tentazione\r\n\
    {La do sol la}\r\n\
    Ti provoca, ti stimola, ti sregola\xE2\x80\xA6la tentazione RIT.\r\n\
    \r\n\
    La chiesa di Bernardo ( Santo questa poi )\r\n\
    Non tollera l\xE2\x80\x99amore, non ne tollera gli eroi\r\n\
    Alla porca inquisizione non sfuggirai perch\xC3\xA9\r\n\
    L\xE2\x80\x99abate cistercense ti tradir\xC3\xA0 per s\xC3\xA9\r\n\
    \r\n\
    Il Chierico Vagante comunque prode sia\r\n\
    A parte i grandi eloqui a parte l\xE2\x80\x99eresia\r\n\
    Contro la Santa Chiesa contro l\xE2\x80\x99inquisizione\r\n\
    La tentazione \xC3\xA8 spada ed \xC3\xA8 rivoluzione"
  Autore: Testo di Andrea Villani, musica di Paolo Battistini
  ID_canzone: "1115812983"
  Note: "P.S.. l\xE2\x80\x99argomento trattato \xC3\xA8 assai caro alla Goliardia; trattasi della vicenda intercorsa tra Abelardo, Eloisa, S.Bernardo e Fulbert. Coloro i quali si fregiano di insegne goliardiche conoscono evidentemente\xE2\x80\x9Ce senza ombra di dubbio\xE2\x80\x9D la questione ed avranno inteso cosa significhi realmente per un clerico la tentazione. Ovvero questa diventa, paradossalmente, l\xE2\x80\x99amore per la cultura e/o il contenzioso dialettico piuttosto che il gioco e il sesso mentre lo stesso invito alle armi diventa una tentazione da evitare piuttosto che un onore .\r\n\
    Ed esprimere un simile concetto, nel periodo del mito del Parsifal tanto per intenderci, era una vera e propria rivoluzione intellettuale. Vallo a spiegare a certi figuri, oggi, con tanto di patacche, manti e pennacchi\xE2\x80\xA6( 174 )\r\n\
    \r\n\
    Canta Caterina Ciriolo \r\n\
    ABELARDO (La Tentazione) (3\xC2\xB0 Canzone)\r\n"
  titolo: Abelardo (la tentazione)
  tipo: 
  id_login: "3"
canzoni_293: 
  m_bSeria: "1"
  Data_creazione: 2004-10-04 21:36:53
  Corpo: "Nell'ora del crepuscolo, c'\xC3\xA8 un senso di citt\xC3\xA0,  \r\n\
    ma \xC3\xA8 un misero miracolo che presto svanir\xC3\xA0;  \r\n\
    c'\xC3\xA8 fuori porta un vicolo, la noia \xC3\xA8 il solo re,  \r\n\
    le lacrime di un cucciolo, lo specchio di un caff\xC3\xA8.  \r\n\
    \r\n\
    Tra gli ubriachi scivola con lei nessuno c'\xC3\xA8,  \r\n\
    vestita di oro e nuvole si siede dietro me;  \r\n\
    ha il profumo delle favole che ormai non sono pi\xC3\xB9:  \r\n\
    come due ali fragili ondeggia gi\xC3\xB9 e s\xC3\xB9.  \r\n\
    \r\n\
    Qua dalla metropoli nessun rumore giunge,  \r\n\
    la luna \xC3\xA8 il solo demone e sola in cielo piange;  \r\n\
    ho un solo amico livido nel calice con me:  \r\n\
    bevendo il folle liquido sar\xC3\xB2 solo, ma re. \r\n\
    \r\n\
    I camerieri oscillano le teste qua e l\xC3\xA0  \r\n\
    tra quelli che spergiurano che il vino \xC3\xA8 verit\xC3\xA0;  \r\n\
    di femmina un'immagine dentro lo specchio appare,  \r\n\
    non so se reale o magica, non mi sapr\xC3\xB2 voltare.  \r\n\
    \r\n\
    E nello specchio torbido lei s'avvicina a me,  \r\n\
    ci vedo un viso morbido e un mare che non c'\xC3\xA8;  \r\n\
    e sogni e voli d'angelo e un altro sole \xC3\xA8 l\xC3\xA0:  \r\n\
    dell'anima negli angoli il vino vero va.  \r\n\
    \r\n\
    Mi treman le vertigini di monti che non ho,  \r\n\
    vibrano come glicini i sogni che non ho;  \r\n\
    la chiave del miracolo nell'anima mi st\xC3\xA0:  \r\n\
    demonio o incanto magico o nel vino verit\xC3\xA0?\r\n"
