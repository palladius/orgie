    \r\n\
    1-  Come 2 stelle noi, soli nella notte noi ci incontriamo \r\n\
    come 2 stelle noi, silenziosamente insieme ci sentiamo\r\n\
    Non c\xE2\x80\x99\xC3\xA8 tempo di fermare questa storia senza fine che ci sta portando via\r\n\
    E non si spegner\xC3\xA0 questo fuoco che si accende\r\n\
    Quando sono in te, quando tu sei in me\xE2\x80\xA6\r\n\
    \r\n\
    RIT.: \tMa se ti piglio le mammelle sono ormai 2 ore che ci giro intorno\r\n\
    \tVoglio palpare le mammelle, me le guardo e sono tonde come il mondo\r\n\
    \tFammi ciucciare le mammelle, tu mi parli ed io le guardo e me le sogno\r\n\
    \tSe stanotte acchiappo le mammelle, ci divertiamo senza perdere altro tempo!\r\n\
    \r\n\
    2- Come 2 stelle noi, riflessi sulle onde scivoliamo\r\n\
    Come 2 stelle noi, avvolti nelle ombre noi parliamo\r\n\
    Tu che insisti nel parlarmi, io che cerco di fermarti e non prendi fiato mai\r\n\
    Profonda come sei\xE2\x80\xA6 io non ti scorder\xC3\xB2\r\n\
    Ovunque tu sarai, ovunque io sar\xC3\xB2\xE2\x80\xA6\r\n\
    \r\n\
    RIT.: \tMa se ti piglio le mammelle sono ormai 2 ore che ci giro intorno\r\n\
    \tVoglio palpare le mammelle, mele guardo e sono tonde come il mondo\r\n\
    \tFammi ciucciare le mammelle, tu mi parli ed io le guardo e me le sogno\r\n\
    \tSe stanotte acchiappo le mammelle, ci divertiamo senza perdere altro tempo!\r\n\
    \r\n"
