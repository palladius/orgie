  Data_creazione: 2005-04-03 02:33:09
  Corpo: "T'ho messo l'uccello nel culo: hai sentito un dolores,\r\n\
    ma lo scuelo ho beccato l'istesso,\r\n\
    con mucho dolores.\r\n\
    Tu potessi crepare all'istante, schifosa megera!\r\n\
    Io vado a dormire da solo, oramai, questa sera. \r\n\
    Ti conobbi seduta su un cesso,\r\n\
    per\xC3\xB2 mi piacesti l'istesso:\r\n\
    il cuore batteva, l'uccello fremeva... \r\n\
    Passarono i giorni veloci, i sessi si uniron feroci,\r\n\
    ma un triste mattino ho sentito un dolores... \r\n\
    Sentivo prurito al'uccello, giungeva quel male novello:\r\n\
    sembrava vaiuelo, ma era lo scuelo... \r\n\
    Mia cara, io quero te dica: bacati ci hai il culo e la fica;\r\n\
    bisogna te pierda: sei proprio una mierda!  \r\n"
