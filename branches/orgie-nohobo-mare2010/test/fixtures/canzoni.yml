  Corpo: "Dio del cielo  \r\n\
    se mi vorrai  \r\n\
    in mezzo alle boscaglie  \r\n\
    tu mi cercherai. \r\n\
    \r\n\
    Dio del cielo  \r\n\
    se mi cercherai  \r\n\
    in piole ed in casini  \r\n\
    tu mi troverai. \r\n\
    \r\n\
    Dio del cielo  \r\n\
    se sei fra di noi  \r\n\
    non rompere i coglioni  \r\n\
    fatti i cazzi tuoi. \r\n\
    \r\n\
    Io sono il Signore  \r\n\
    Io sono il tuo Dio  \r\n\
    tu fatti i cazzi tuoi  \r\n\
    ai miei ci penso io.  \r\n\
    \r\n\
    Non avrai altro Dio  \r\n\
    all'infuori di me  \r\n\
    tu sei un egoista  \r\n\
    io ne ho gi\xC3\xA0 tre.\r\n\
    \r\n\
    Non nominare  \r\n\
    il nome di Dio invano  \r\n\
    ma succhiami piuttosto  \r\n\
    questo gran banano. \r\n\
    \r\n\
    Ricordati le feste  \r\n\
    di santificare  \r\n\
    ma io la domenica  \r\n\
    vado a chiavare.\r\n  \r\n\
    Al babbo e alla mamma  \r\n\
    obbedire \xC3\xA8 un dovere  \r\n\
    ma vattelo a prendere  \r\n\
    un po' nel sedere.\r\n\
    \r\n\
    Il prossimo tuo  \r\n\
    non devi ammazzare  \r\n\
    ma chi se ne frega  \r\n\
    io continuo a chiavare.\r\n\
    \r\n\
    Ricordati poi  \r\n\
    di non fornicare  \r\n\
    ormai \xC3\xA8 troppo tardi  \r\n\
    sto gi\xC3\xA0 per sborrare.\r\n\
    \r\n\
    Non devi fregare  \r\n\
    la roba degli altri  \r\n\
    non \xC3\xA8 colpa nostra  \r\n\
    se siamo pi\xC3\xB9 scaltri. \r\n\
    \r\n\
    Ricordati poi  \r\n\
    di non dire bugie  \r\n\
    tu pensa alle tue  \r\n\
    che io penso alle mie.  \r\n\
    \r\n\
    Alla donna degli altri  \r\n\
    non devi pensare  \r\n\
    Giusto... prima la chiavo  \r\n\
    poi la mando a cagare. \r\n\
    \r\n\
    Non desiderare  \r\n\
    degli altri l'avere  \r\n\
    ma torna tra i tuoi santi  \r\n\
    e lasciaci godere. \r\n\
    \r\n\
    Se hai preso per il culo  \r\n\
