faq_059: 
  domanda: COME PASSARE DA GUEST A UTENTE SU GOLIARDIA.IT
  idfaq: "89"
  risposta: "MODO 1) usando la pagina del mandafoto inserire una foto della tua faccia \r\n\
    1.1) la foto deve essere un file jpg di massimo 10kb e il viso si deve vedere bene, altrimenti viene cestinata.\r\n\
    1.2) ricordare che il mandafoto \xC3\xA8 un parcheggio in cui la foto viene messa prima di essere attivata (di solito tutto ci\xC3\xB2 avviene tempo un paio di giorni ma poich\xC3\xA9 siamo solo in due ad occuparci di questo pu\xC3\xB2 capitare che ci siano ritardi nell\xE2\x80\x99attivazione)\r\n\
    MODO 2) se la foto che hai \xC3\xA8 di dimensioni maggiori rispetto a quelle accettate dal sito e quindi la devi ritagliare ma non sai come fare allora mandala via mail a un admin.\r\n\
    2.1) ovviamente nella mail specifica qual \xC3\xA8 l\xE2\x80\x99utente o il goliarda a cui la foto corrisponde (non siamo indovini!)\r\n\
    IMPORTANTE: la foto deve sempre corrispondere all\xE2\x80\x99utente o al goliarda altrimenti viene cestinata (quindi se ti sei registrato come utente \xE2\x80\x9Cpippo\xE2\x80\x9D la tua foto deve chiamarsi per forza \xE2\x80\x9Cpippo.jpg\xE2\x80\x9D, se hai creato un goliarda dal nome \xE2\x80\x9Cpaperino\xE2\x80\x9D la foto da inserire dovr\xC3\xA0 essere \xE2\x80\x9Cpaperino.jpg\xE2\x80\x9D). Il sito non contempla l\xE2\x80\x99utilizzo delle maiuscole nelle foto n\xC3\xA9 di caratteri strani (es. di carattere strano: la &).\r\n"
  data: 2009-03-13 23:12:53
faq_048: 
  domanda: "Che \xC3\xA8 successo al sito?!?"
  idfaq: "75"
  risposta: "Oggi, in data 17 aprile 06, ho migrato finalmente il sito cui lavoravo da gennaio. \r\n\
    Le differenze sono poche, a occhio, comunque fateci l'abitudine. Ci sono BUGZ qua e l\xC3\xA0, se me li segnalate via mail (non GMS, non Contavalli, non MSN) ve ne sono molto grato.\r\n\
    Una cosa bella \xC3\xA8 che ora il motore di ricerca cerca anche tra i messaggi...\r\n\
    Grazie."
  data: 2006-04-17 19:21:49
