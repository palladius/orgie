faq_060: 
  domanda: COME CREARE UN GOLIARDA DA INSERIRE IN UN ORDINE SU GOLIARDIA.IT
  idfaq: "90"
  risposta: "Sembrano istruzioni complicate ma in realt\xC3\xA0 \xC3\xA8 facilissimo e anche se sei impedito impiegherai solo un minuto di tempo:\r\n\
    1) INIZIO: Andare su \xE2\x80\x9Cgestioni\xE2\x80\x9D \r\n\
    2) Andare al riquadro rosa con su scritto \xE2\x80\x9Ccrea nuovo goliarda\xE2\x80\x9D e inserisci il tuo nome (es. \xE2\x80\x9Cpippo\xE2\x80\x9D)\r\n\
    3) Si apre un menu da completare in questo modo: \r\n\
    3.1) Nome e Cognome: se puoi o vuoi riempi tutti e due i campi, di solito si usa sempre almeno il nome ma c'\xC3\xA8 anche chi usa solo le iniziali; insomma fai come vuoi basta che qualcosa riempi (non \xC3\xA8 bello vedere i campi vuoti, se proprio devi lasciarli vuoti inserisci i soliti trattini --- ).\r\n\
    3.2) Recapiti Personali: puoi decidere se scriverli o meno, se non li inserisci sposta il pallino su privato, se li inserisci e vuoi farli vedere lascia il pallino su pubblico. Puoi anche decidere di scriverne uno solo o metterli mezzi in privato e mezzi in pubblico. E\xE2\x80\x99 possibile modificare in qualsiasi momento i propri contatti (e anche i contatti dei goliardi che si hanno in gestione).\r\n\
    IMPORTANTE: i recapiti servono principalmente quando uno \xC3\xA8 responsabile di ordini, cene ed eventi\xE2\x80\xA6 se questo \xC3\xA8 il tuo caso inseriscili in modo da facilitare eventuali contatti. \r\n\
    3.3) Nome Goliardico: inserisci il tuo nome goliardico (o quello del goliarda che stai creando). Ovviamente il nome pu\xC3\xB2 essere composto da pi\xC3\xB9 parole rispetto a quello con cui ti sei registrato come utente (es. \xE2\x80\x9CPippo Qualcosa\xE2\x80\x9D) e comprendere anche il nome nobiliare (es. a \xE2\x80\x9CPippo Qualcosa\xE2\x80\x9D che \xC3\xA8 il nome goliardico di base aggiungi \xE2\x80\x9CQualcosaltro\xE2\x80\x9D come nome nobiliare); se non hai un nome nobiliare inserisci i soliti trattini ---, potrai sempre aggiungerlo in seguito quando ne avrai uno. \r\n\
    3.4) Data Processo: non \xC3\xA8 un obbligo inserire la propria  data di processo, di solito viene comunque messa poich\xC3\xA9 altrimenti il sito utilizza una data di default (c\xE2\x80\x99\xC3\xA8 chi usa come data processo quella di registrazione al sito e anche chi mette solo zeri... questo trucco di solito viene usato solo da goliardi anziani).\r\n\
    3.5) Ordine Di Nascita: selezionare quello di appartenenza dal menu a tendina. \r\n\
    3.6) Foto: di default in questo campo viene scritto il nome foto associato all\xE2\x80\x99utente che sta creando il goliarda (es. se sei l\xE2\x80\x99utente \xE2\x80\x9Cpippo\xE2\x80\x9D che sta creando il goliarda \xE2\x80\x9CPippo Qualcosa\xE2\x80\x9D in questo campo ci sar\xC3\xA0 scritto \xE2\x80\x9Cpippo.jpg\xE2\x80\x9D; se per\xC3\xB2 sei l\xE2\x80\x99utente \xE2\x80\x9Cpippo\xE2\x80\x9D che sta creando il goliarda \xE2\x80\x9CPinco Pallino\xE2\x80\x9D in questo campo ci sar\xC3\xA0 comunque scritto \xE2\x80\x9Cpippo.jpg\xE2\x80\x9D e quindi va modificato in \xE2\x80\x9Cpinco pallino.jpg\xE2\x80\x9D\xE2\x80\xA6 il sito \xC3\xA8 stupido per certe cose!). \r\n\
    IMPORTANTE: questo campo non deve mai essere vuoto, deve sempre esserci corrispondenza tra il nome foto del goliarda e il nome foto utente. \r\n\
    3.7) Facolta: selezionare quella di appartenenza dal menu a tendina.\r\n\
    4) dopo aver riempito i vari campi cliccare sul pulsante \xE2\x80\x9Cregistra i cambiamenti\xE2\x80\x9D.\r\n\
    5) Ora hai creato il goliarda ma restano ancora due passi da fare per associarlo al tuo utente\r\n\
    5.1) Andare alla propria pagina personale cliccando su \xE2\x80\x9Cutente\xE2\x80\x9D, scorrere al menu in fondo alla pagina e cercare il tuo goliarda che \xC3\xA8 appena stato creato (dovrebbe essere il primo della lista), trovarlo e associarlo al tuo utente (cliccare su \xE2\x80\x9Csono io\xE2\x80\x9D).\r\n\
    5.2) Andare di nuovo alla propria pagina personale cliccare sul tuo goliarda (nello spazio foto) e quando si apre la pagina del tuo goliarda cliccare su \xE2\x80\x9Cmodifica goliarda\xE2\x80\x9D e aprire nuovamente la pagina di creazione del tuo goliarda ma con una casella in pi\xC3\xB9.\r\n\
    5.3) Titolo: qui puoi scriverci il tuo titolo (la tua carica) oppure mettere i soliti trattini.\r\n\
    6) Cliccare di nuovo sul pulsante \xE2\x80\x9Cregistra i cambiamenti\xE2\x80\x9D\r\n\
    7) PROCEDURA FINITA\r\n"
