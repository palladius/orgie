faq_054: 
  domanda: Come faccio a farmi sospendere l'account e/o buttare fuori da www.goliardia.it?
  idfaq: "82"
  risposta: "\r\n\
    Non \xC3\xA8 semplicissimo, ma neppure particolarmente difficile.\r\n\
    \r\n\
    E\xE2\x80\x99 solitamente sufficiente:\r\n\
    \r\n\
    - Creare un full user (\xE2\x80\x9Csbur-user\xE2\x80\x9D) fittizio. \r\n\
    \r\n\
    - Postare messaggi pubblicitari a scopo guadagno personale nel forum o in chat.\r\n\
    \r\n\
    - Inviare pubblicit\xC3\xA0, spam o messaggi indesiderati via e-mail o gms agli utenti del sito.\r\n\
    \r\n\
    - Utilizzare impropriamente il sito, creare scompiglio o infastidire ripetutamente altri utenti.\r\n\
    \r\n\
    - Danneggiare altri utenti o persone estranee al sito, ad esempio violandone la privacy.\r\n\
    \r\n\
    - Persistere in comportamenti assolutamente non incoraggiati e/o rompere i coglioni oltre un certo limite.\r\n\
    \r\n\
    Ci sono tanti altri modi, basta usare la fantasia. Ma consigliamo vivamente di impiegarla in attivit\xC3\xA0 pi\xC3\xB9 proficue.\r\n\
    \r\n\
    In particolare (repetita juvant, etc etc), tentativi di creare un utente \xE2\x80\x9Csbur-user\xE2\x80\x9D farlocco (fake, finto) munito di foto (altrui) costano all\xE2\x80\x99autore un ban perenne dal sito. \r\n"
  data: 2007-01-21 21:32:09
