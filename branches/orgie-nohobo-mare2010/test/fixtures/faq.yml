faq_058: 
  domanda: "Perch\xC3\xA8 il mio messaggio sul forum \xC3\xA8 stato cancellato?"
  idfaq: "85"
  risposta: "\r\n\
    Questi sono i possibili motivi: \r\n\
    \r\n\
    - Il messaggio conteneva dati personali altrui (quali cognome al secolo, numero di telefono, indirizzo e-mail) senza l\xE2\x80\x99autorizzazione o il benestare dell\xE2\x80\x99interessato/a. \r\n\
    \r\n\
    - Il contenuto del messaggio violava la privacy altrui. \r\n\
    \r\n\
    - Il messaggio consisteva esclusivamente in una barzelletta o link. E\xE2\x80\x99 possibile che alcuni post contenenti barzellette e link pi\xC3\xB9 o meno faceti di vario genere vengano cancellati dal forum, soprattutto se postati in stecca e aprendo ogni volta un nuovo thread. Dopotutto, esiste una sezione \xE2\x80\x9Ccontenuti\xE2\x80\x9D del sito per barzellette & minchiate varie. \r\n\
    \r\n\
    - Il messaggio conteneva una lunga serie di caratteri senza spazi inframezzati e scombiccherava l\xE2\x80\x99impaginazione del forum. \r\n\
    \r\n\
    - Il messaggio era troppo lungo, un copia-incolla, una violazione di copyright o una combinazione di questi. \r\n\
    \r\n\
    - Il messaggio consisteva in una serie di caratteri privi di senso e/o era stato evidentemente postato al solo scopo di occupare spazio, fare una prova o rompere i coglioni. \r\n\
    \r\n\
    - Il messaggio conteneva uno spoiler (finale di libro o film, soluzione di gioco) ed ha suscitato proteste. \r\n\
    \r\n\
    - Il messaggio era, o appariva come, mirato a boicottare www.goliardia.it (il concetto non ha nulla a che vedere con quello di \xE2\x80\x9Ccritica costruttiva\xE2\x80\x9D). \r\n\
    \r\n\
    - Il messaggio era fuori posto (se state rispondendo a qualcuno che ha postato pochi messaggi pi\xC3\xB9 sotto, utilizzate il thread originario: non c\xE2\x80\x99\xC3\xA8 bisogno di aprirne uno nuovo). \r\n\
    \r\n\
    - Il messaggio era fuori luogo e/o l\xE2\x80\x99utente stava utilizzando il forum come una chat (\xE2\x80\x9Cwe, ki c\xE2\x80\x99\xC3\xA8 in giro?\xE2\x80\x9D) o per comunicazioni strettamente private (\xE2\x80\x9C[nomedestinatario], come stai, chiamami qualche volta, baci, ******\xE2\x80\x9D). Si ricorda che esistono i GMS per queste cose! \r\n\
    \r\n\
    - Il thread stava degenerando in un flame particolarmente acceso o in qualcosa di altrettanto sgradevole. \r\n\
    \r\n\
    - Il webmaster o gli admin hanno ricevuto esplicita richiesta di cancellare il messaggio e questa \xC3\xA8 stata ritenuta ragionevole. \r\n\
    \r\n\
    - Il messaggio \xC3\xA8 stato cancellato per errore. (Eh s\xC3\xAC, succede, anche se assai di rado. Il caso pi\xC3\xB9 frequente \xC3\xA8 quando viene postato un messaggio in duplice copia e sparisce anche il messaggio originale quando si cancella il doppione.) \r\n\
    \r\n\
    - Il messaggio \xC3\xA8 stato cancellato per ragioni diverse da quelle sopra esposte. Chiedete pure spiegazioni (preferibilmente via e-mail), \xC3\xA8 probabile che le otteniate. \r\n\
    \r\n\
    --------------------------------------------- \r\n\
    \r\n\
    Gli admin-vip si riservano il diritto di cancellare messaggi a loro discrezione/buon senso. \r\n\
    \r\n\
    Il Webmaster si riserva il diritto di cancellare qualsivoglia messaggio a sua discrezione/buon senso/tiramento di culo. \r\n"
