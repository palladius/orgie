faq_055: 
  domanda: "Gioco delle coppie: perch\xC3\xA8 risulto votato da 17 persone ma mi appaiono solo 12 voti? di cui uno a firma \"?!?\" che vuol dire??!?"
  idfaq: "54"
  risposta: "Uno dei + fighi del sito mi scrive: \"perch\xC3\xA8 risulto votato da 17 persone ma mi appaiono solo 12 voti? di cui uno a firma ''?!?'' che vuol dire? Grazie in anticipo\".\r\n\
    \r\n\
    Ripondo: se uno vi da un voto ANONIMO e vi dice: \"mi fai cagare\" il suon nome non compare n\xC3\xA8 apparir\xC3\xB9\xC3\xA0 mai in coppia con voi. Quindi caro mio in 5 ti hanno votato in modo anonimo (sebbene il commento tu lo veda) e di queste 4 hanno cliccato e basta (commento nullo -> lo filtra lo zio Pal) mentre un'altra ti ha scritto \"faccia di culo\" ma era timida la ragazza.\r\n\
    \r\n\
    Chiaro?!?\r\n\
    \r\n\
    PS Mi chiedono se posso leggere tutti i vostri commenti. La risposta \xC3\xA8 s\xC3\xAC, ma non lo faccio. A voi crederci."
