faq_047: 
  domanda: Come si fa a scrivere in corsivo, sottolineare, fare il bacio, etc. ?
  idfaq: "74"
  risposta: |
    
    Per il <I>corsivo</I>:
    
    racchiudere le parole da scrivere in <I>corsivo</I> tra:
    
    [simbolo "minore di"] I [simbolo "maggiore di"] e [simbolo "minore di"] /I [simbolo "maggiore di"]
    
    Per il <B>grassetto</B>:
    
    racchiudere le parole da scrivere in <B>grassetto</B> tra:
    
    [simbolo "minore di"] B [simbolo "maggiore di"] e [simbolo "minore di"] /B [simbolo "maggiore di"].
    
    
    Per <U>sottolineare</U>:
    
    racchiudere le parole da scrivere in <I>corsivo</I> tra:
    
    [simbolo "minore di"] U [simbolo "maggiore di"] e [simbolo "minore di"] /U [simbolo "maggiore di"].
    
    
    In altre parole, 
    si usano i <B>tag HTML</B> per corsivo, grassetto, sottolineature, etc.
    
    
    Ci sono anche altri tag HTML attivi.
    
    
    Per fare il bacio sbrilluccicoso (K):
    
    K maiuscolo tra parentesi tonde.

