faq_053: 
  domanda: "Cosa vuol dire che il sito \xC3\xA8 migrato?"
  idfaq: "52"
  risposta: "Sono un tecnico e da tecnico vi rispondo. \r\n\
    Quando voi digitate \"www.goliardia.it\" andate su un server gestito da {{user;NPP}} (le doppie graffe sono una mia sega mentale autoesplicativa che in futuro forse implementer\xC3\xB2), ovvero NonPigliaPesci da Peroscia, che spara i vostri collegamenti su un server gestito da Buddha (il pesopiuma Doge di Genova) che fa gentilmente l'HOSTING vero e proprio del sito.\r\n\
    Ci\xC3\xB2 significa che se Buddha decide di cambiare macchina (cio\xC3\xA8p migra ad esempio da Miami a Francoforte, com' accaduto ai primi di Ottobre 2004) occorre: \r\n\
    - copiare le pagina da l\xC3\xA0 a qua\r\n\
    - spostare il database (x intenderci i contenuti dinamici) da l\xC3\xA0 a qua\r\n\
    - configurare per benino i cazzilli (son tanti, ad esempio ci\xC3\xB2 che consente di loggare i vostri ingressi, di mandarvi le mail, di accedere al db, ...)\r\n\
    \r\n\
    I due problemi + vistosi sono:\r\n\
    1) c'\xC3\xA8 un periodo non nullo in cui l'URL www.goliardia.it punta a un server inesistente, quindi voi esperite un disservizio\r\n\
    2) c'\xC3\xA8 un periodo in cui il DB \xC3\xA8 stato salvato da l\xC3\xA0, spostato QUA, e continua a essere modificato da voi di l\xC3\xA0; quando tutti migran qua sembra che dei messaggi siano stati cancellati: \xC3\xA8 un'impressione (a parte le barzellette di Occhiaiolo).\r\n\
    \r\n\
    Se non sono stato chiaro e avete le tette grosse, chiamatemi e vi dar\xC3\xB2 spiegazioni ulteriori."
