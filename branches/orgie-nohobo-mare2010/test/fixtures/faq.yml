faq_049: 
  domanda: Come funzionano le coppie nel sito nuovo?
  idfaq: "46"
  risposta: "Sinceramente non ne ho gran idea. Le ho fatte ieri di fretta. non so come saranno tra 1 o 2 weeks (who'll live will see), ma posso dirvi come sono ora: sulla pagina utente della persona X se \xC3\xA8 user e di ssesso opposto vi compare la possibilit\xC3\xA0 di votarla. PUNTO. quando qualcuna mi voter\xC3\xA0 vi dir\xC3\xB2 che si vede.\r\n\
    \r\n\
    voi popolate il DB, intanto, che io mi dedico ad altro, per ora, x tornare sul gdc in futuro (e vi assicuro che ne ho in serbo tante...)\r\n\
    \r\n\
    ;-)"
