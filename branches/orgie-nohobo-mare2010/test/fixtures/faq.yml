faq_031: 
  domanda: Voglio aggiungere un ordine, come faccio?!?
  idfaq: "58"
  risposta: "\r\n\
    Verrano inseriti <B>SOLO</B> ordini che:\r\n\
    \r\n\
    - siano stati <B>storicamente importanti</B>\r\n\
    \r\n\
    o che\r\n\
    \r\n\
    -sono attualmente <B>ATTIVI</B>, e con almeno <B><I>6,9</I></B> persone a farne parte.\r\n\
    \r\n\
    Ci sentiremo perfettamente liberi di contattare una persona che riteniamo fidata in quella citt\xC3\xA0, \r\n\
    \r\n\
    e di rigettare eventualmente la richiesta. \r\n\
    \r\n\
    \r\n\
    Per inserire un ordine, fare richiesta (via e-mail) ad un <I>admin-vip</I>:\r\n\
    \r\n\
    [<U>lista degli admin-vip</U>:\r\n\
    - Palladius\r\n\
    - Cavedano\r\n\
    - Gimmygod\r\n\
    - Manolus\r\n\
    - Vipera\r\n\
    - Ophelia\r\n\
    - Pariettus]\r\n\
    \r\n\
    Quando si fa richiesta per aggiungere un ordine, fornire quei <B>DATI</B> che si trovano normalmente nei vari \"campi\" della pagina di un ordine, vale a dire:\r\n\
    \r\n\
    - nome semplice\r\n\
    - nome lungo\r\n\
    - sigla\r\n\
    - citt\xC3\xA0\r\n\
    - se \xC3\xA8 ordine sovrano o vassallo; di quale ordine \xC3\xA8 eventualmente vassallo\r\n\
    - storia dell'ordine\r\n\
    - indirizzo del capoordine (per inviti)\r\n\
    - motto dell'ordine\r\n\
    - etc"
