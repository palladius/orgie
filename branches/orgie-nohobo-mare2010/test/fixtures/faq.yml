faq_038: 
  domanda: Come mai nel Gioco delle Coppie dice che ho votato 187 persone su 186?!? Sei diventato matto?
  idfaq: "77"
  risposta: "No, paradossalmente \xC3\xA8 giusto cos\xC3\xAC.\r\n\
    \r\n\
    Almeno nel mio malato cervello.\r\n\
    \r\n\
    Semplicemente quando dice <i>\"Hai votato X persone su Y\"</i>, il primo valore \xC3\xA8 il numero di donne che hai votato, mentre Y \xC3\xA8 il numero di donne votabili. Non \xC3\xA8 semanticamente necessario che X <= Y se ci pensate.\r\n\
    Una donna che diventa guest non \xC3\xA8 votabile, ma si tiene il proprio voto, quindi...\r\n\
    \r\n\
    Oddio forse pi\xC3\xB9 che rispondere a sta faq facevo prima a modificare il codice per far s\xC3\xAC che X sia l'insieme delle votate NON GUEST, ma tant'\xC3\xA8..."
  data: 2006-05-09 17:12:15
