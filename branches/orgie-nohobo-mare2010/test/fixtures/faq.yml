faq_061: 
  domanda: "COME INSERIRE UN NUOVO ORDINE SU GOLIARDIA.IT "
  idfaq: "91"
  risposta: "L'inserimento sul sito un ordine nuovo oppure riemerso dal sonno va richiesto via mail a un admin e servono alcuni requisiti:\r\n\
    1) Innanzitutto la vita effettiva dell'ordine, cio\xC3\xA8 che esista sulle piazze e non sulla carta e quindi non sia soltanto un ordine storico in sonno (questo perch\xC3\xA9 se si mettessero tutti gli ordini goliardici italiani che attualmente sono dormienti o chiusi avremmo troppe pagine vuote e non gestite).\r\n\
    2) L'autorizzazione del CapoCitt\xC3\xA0 o chi per lui se si tratta di Ordini Vassalli (\xC3\xA8 sgradevole se il CapoCitt\xC3\xA0 X si incazza perch\xC3\xA9 gli sono comparsi nuovi ordini in casa senza che ne sapesse niente... questo pu\xC3\xB2 anche succedere sulle piazze ma non sul sito).\r\n\
    3) Per quanto riguarda il contenuto e la composizione della pagina dell\xE2\x80\x99Ordine \xC3\xA8 facile servono le stesse informazioni valide per gli ordini gi\xC3\xA0 inseriti sul sito (basta aprire una pagina qualsiasi e fare un confronto):\r\n\
    3.1) nome dell\xE2\x80\x99ordine (completo, sbrigativo e sigla), utenti che lo gestiscono, indirizzo per inviti, elenco delle varie cariche (attive, onorifiche, hc)\r\n\
    4) Inviare lo Stemma dell\xE2\x80\x99ordine (in formato jpg o gif). \r\n"
  data: 2009-03-13 23:32:32
faq_050: 
  domanda: Posso creare un ordine?
  idfaq: "50"
  risposta: "NO.\r\n\
    E' un potere lasciato solo a pochissimi eletti... immaginate un mondo in cui oltre agli ordini storici si vengono a vedere anche mille ordini pacco assolutamente inutili e/o inventati?\r\n\
    Se volete aggiungere un ordine, ci sono due passi da fare:\r\n\
    1) (fondamentale) convincermi via mail che l'ordine vada inserito. es: mancano gli Uccellacci di Voghera o la Greca a Bologna e mi fate capire che ha un senso metterli nel sito (dir\xC3\xB2 di s\xC3\xAC, in buona approssimazione se l'ordine ESISTE o \xC3\xA8 esistito E avete qualche goliarda da aggiungervi, di modo che non rimanga vuoto vuoto).\r\n\
    2) quando vi dar\xC3\xB2 l'assoluzione, tirar devi sto cordone... ehm no scusate; quando vi dir\xC3\xB2 s\xC3\xAC, guarderete in un ordine a caso, estrapolerete le informazioni necessarie, e mi manderete via mail una schedina compilativa dell'ordine stesso. Se guardate un ordine a caso, troverete: nome lungo, nome breve, storia, note, indirizzo di casa del referente (x inviti), ... poi che ne so. Le cose posson cambiare, quindi guardateci!\r\n\
    \r\n\
    Ciao!!"
  data: 2004-06-04 10:11:47
faq_039: 
  domanda: Come collego un goliarda a un utente?
  idfaq: "78"
  risposta: "Collegare utenti e goliardi \xC3\xA8 una cosa che il mio prof di DB non ha gradito, ma all'orale gli ho detto che era buona cosa, e alla fine ho ravanto un bel 30L nonostante questo 'baco di progettazione'. Quindi se non lo capite, \xC3\xA8 ok, mea culpa!\r\n\
    \r\n\
    Non ricordo bene le condizioni necessarie, ve ne do una sufficiente.\r\n\
    \r\n\
    1. L'utente dev'essere sbur-user. Se no non si va da nessuna parte (per essere sbur-user dovete O mandarmi una foto O darmela)\r\n\
    2. All'utente va regalato il goliarda\r\n\
    3. Una volta fatto, andate nella sua pagina, e tra le opzioni dovrebbe comparire ci\xC3\xB2 che volete.\r\n\
    \r\n\
    Prego, Diegus (o <i>Di Punto Pin\xC3\xA0e</i> come dice qualcuno)"
