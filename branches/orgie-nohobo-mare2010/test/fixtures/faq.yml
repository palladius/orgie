faq_056: 
  domanda: "Perch\xC3\xA9 sono ancora guest/ sono stato fatto guest?"
  idfaq: "79"
  risposta: "\r\n\
    Probabilmente mancano foto, data di nascita o citt\xC3\xA0  nella vostra scheda utente.\r\n\
    \r\n\
    Nella foto dovete figurare voi stessi (**dallo spacciare una foto altrui per vostra consegue come minimo un ban dal sito**), \r\n\
    la data di nascita dev\xE2\x80\x99essere la vostra reale data di nascita. \r\n\
    \r\n\
    Una volta sistemati questi dettagli,  \xC3\xA8 solitamente solo una questione di tempo. \r\n\
    \r\n\
    Se siete guest da giorni, la scheda \xC3\xA8 a posto e continuate a gironzolare nel sito senza che nessuno vi noti, contattate (preferbilmente via e-mail) un admin che conosca voi o qualcuno che possa garantire sulla vostra reale identit\xC3\xA0. \r\n\
    Altrimenti \xC3\xA8 meglio contattare il webmaster. \r\n"
