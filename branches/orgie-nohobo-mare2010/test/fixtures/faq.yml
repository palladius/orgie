faq_057: 
  domanda: Ho scordato la password e non riesco a farmela spedire via email.
  idfaq: "56"
  risposta: "Quando cliccate su \"ho dimenticato la password\", all'atto del login, c'\xC3\xA8 un oggettino semplice semplice che vi chiede chi siete e vi manda la password.\r\n\
    In quello spazio dovete digitare qualcosa e POI cliccare su \"spediscimi la password\". Il sistema prende il nome, cerca l'utente con quel nome, manda un'amail all'email segreta associata al nome (per motivi di privacy).\r\n\
    Se all'atto dell'iscrizione sbagliate l'email, GIUSTAMENTE non riuscirete mai a ricevere quella password.\r\n\
    \r\n\
    Se vi capita che non vi arrivi niente e non sapete se \xC3\xA8 colpa vostra o del fatto che il sito non manda email, potete fare due cose:\r\n\
    1 (consigliato). Chiedete a un vostro amico utente di provare a farsela spedire lui. Se a lui funziona, \xC3\xA8 un problema vostro. In tal caso, mandatemi un'email PROVENIENTE dall'email che volete sul sito e io provveder\xC3\xB2 a cambiarla.\r\n\
    2 (non consigliato). Mi mandate una mail dicendo: tanti cari saluti sono Pippo e non va il login. Cos\xC3\xAC retrocediamo all'et\xC3\xA0 della pietra e devo perdere mezz'ora a capire chi siete e soprattutto che legame c'\xC3\xA8 tra: 1- PIPPO, 2- l'email da cui mi state mandando lo sbotro, 3- l'email che vorreste (ma devo inventarmela poich\xC3\xA9 voi non me la dite), 4- l'utente che siete nel sito che ovviamente NON sar\xC3\xA0 Pippo (se no sarebbe troppo facile).\r\n\
    \r\n\
    PS. Pigliatemi per il culo quanto volete ma queste sono cose realmente accadute, e pure spesso."
