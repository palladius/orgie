faq_052: 
  domanda: Posso cambiare il mio nome? E la mia mail??!?
  idfaq: "49"
  risposta: "rispettivamente NO e SI.\r\n\
    \r\n\
    Mi spiace, ma il vostro nome \xC3\xA8 cablato nel db insieme alla vostra mail.\r\n\
    Per farvi cambiare di nome, dovrei creare delgi automatismi che non ho ancora trovato il tmepo di fare (tipo controllare che non esista gi\xC3\xA0 e rinominare la foto di conseguenza, se c'\xC3\xA8)\r\n\
    \r\n\
    \r\n\
    Per farvi cambiare mail, invece, andate sotto UTENTE e vi mettete la nuova mail. Ovviamente x essere sicuro che sia onesta (per potervi contattare se ci son problemi, eccetera) la vostra password verr\xC3\xA0 cambiata immediatamente dopo e quindi vi verr\xC3\xA0 spedita alla nuova mail.\r\n\
    \r\n E mi raccomando, se la mail che avete messo all'iscrizione non la leggete pi\xC3\xB9, mandatemi la 'nuova'! come vedete non vi mando merda ogni settimana come fanno certi putribondi figuri in altri siti! \r\n\
    per\xC3\xB2 se si creano casini vorrei che la mailbox rispondesse e non mi desse errori. se non mi rispondete in tempi utili x i problemi che sorgono, rischio di cancellarvi l'account, quindi... fate vobis."
